body:
  text: 古文集成巻二十八宋王霆震編前丁集七劄乙巳輪對第一劄子誠齋臣聞惟天愛君惟聖畏天天之於君厭之者則驕之以嘉祥愛之者則譴之以變異絶之者則誤之以强盛愛之者則懼之以災害故夫災異者天之所以愛君也聖人以已占天而不以天占天太戊修徳而桑木即枯成王怛然而偃禾盡起故夫警懼者聖人所以畏天也仰惟陛下聖神之資與天同徳寛大之政與天同仁上天眷之享國乆長固無時而不得乎天意矣然迺者上天見異時則有星變地震之灾頻年無秋時則有水旱相仍之患外夷多詐時則有邊防危疑之慮陛下法堯之兢兢體舜之業業恐懼修省夙夜靡遑是以一念禱於此而妖星退於彼前日之灾異一變而為清寧前日之水旱一變而為豐穰前日之危疑一變而為安靖至於告廟郊天前期而雪旣雪而霽旣霽而欲雨欲雨而復霽頃刻之間感召轉移汔成熙事孰謂天道之逺乎此惟聖畏天之明效也然臣聞之聖人不畏多難而畏無難非畏無難也實自畏驕心之易生也臣願陛下移前日之恐懼為今日之恐懼移前日之修省為今日之修省属任大臣非不推誠也得無猶有逺嫌顧身而不敢任事者乎延納臺諫非不聴言也得無猶有避怨畏禍而不敢深言者乎中外臣子不間小大無不賜對許以盡言此固美矣豈無聞見輕信得失相半或犯嚴忤勢而以言為諱者乎權貴近習無所親疏苟有弄權即從退斥此固肅矣豈無上畏聖明下憚物議或陽退陰進而害攻無形者乎朝政修明矣必思其或舉其小者近者而逺者大者未有講也邊備整輯矣必思其虚名末節而實務宿弊有未察也懲贓吏以惠民非不嚴也必思以懲疎逺小吏之法為懲貴近權要之法也禁軍債以惠軍非不峻也必思以禁軍債剝割之意為禁債帥交結之意也以此推之其類非一惟陛下思之思之又重思之戒之戒之又重戒之則聖徳日新天命永保實宗社無疆之休取進止己酉奏事上殿第一劄誠齋臣聞天下有無形之禍僣非權臣而僣於權臣擾非盗賊而擾於盗賊彊非猛獸而彊於猛獸其惟朋黨之論乎蓋欲激人主之怒莫如黨論欲盡逐天下之君子莫如黨論欲盡空天下之人才莫如黨論族親黨也交游黨也薦引黨也欲陷一士止於一士而已矣至舉而名之以黨則族親也交游也所薦引也可一網而盡矣漢之黨錮唐之牛李是也本朝仁宗之世始於宰臣吕夷簡與諫官范仲淹交論上前遂黜仲淹而諫官髙若訥盡指歐陽脩尹洙之徒為仲淹之黨一切貶逐未幾仁宗感悟大用仲淹而召用脩與洙不惟禍黨遂息而已至於與仁宗同致慶厯之治者乃前日所謂黨人者也其後紹聖崇觀之間宰臣章子厚蔡京盡指司馬光蘇軾之徒凡元祐之忠臣義士三百餘人目為姦黨斥逐禁錮死徙殆盡君子盡逐小人滿朝馴至靖康之變黨人則一空矣國家之禍何如哉臣竊觀近日以來朋黨之論何其紛如也有所謂甲宰相之黨有所謂乙宰相之黨有所謂甲州之黨有所謂乙州之黨有所謂道學之黨有所謂非道學之黨是何朋黨之多歟且天下士大夫孰不由宰相而進者進以甲宰相一日甲罷則盡指甲之人以為甲之黨而盡逐之進以乙宰相一日乙罷則又盡指乙之人以為乙之黨而盡逐之若夫甲州之士乙州之士道學之士非道學之士好惡殊而嚮背異則相攻相擯莫不皆然黨論一興臣恐其端發於士大夫而其禍及於天下國家前事已然矣可不懼哉臣願陛下建皇極於聖心酌大公於天下公聴並觀壞植散羣曰賢者曰才者曰忠正者曰君子者從而用之勿問其某黨某黨也曰不肖者曰不才者曰邪佞者曰小人者從而廢之勿問其某黨某黨也在廷之臣有復陳黨論於前者取其尤者而斥之聲其罪於天下則黨論不攻而自破矣復二帝三王之中道以消漢唐靖康之顯禍惟陛下留神第二劄誠齋臣竊觀陛下臨御以來聖徳日新聖政日美一賞一罰春生秋殺一號一令雷動風散總攬天下之大柄而歸之於獨斷凜凜乎漢宣帝唐太宗之上矣然古之帝王固有知以一已攬其權而不知臣下竊其權者大臣竊之則權在大臣大將竊之則權在大將外戚竊之則權在外戚近習竊之則權在近習竊權之最難防者其惟近習乎蓋近習之在君側何起居之不侍何言語之不聞君喜知喜君怒知怒未命而唯唯未語而諾諾此其所以能測人主幾微之指而遂至於竊其廢置予奪之權也非敢公竊之也私測之也能測之斯能竊之矣甚者至於政事之罷行出於此輩之議論人才之進退出於此輩之抑揚外廷之章奏此輩得以去取羣臣之獻納此輩與之表裏事至於此豈惟私測之而已也人主威福之大權彼皆得而公竊之矣周之棸子内史秦之景監趙髙漢之𢎞恭石顯唐之鄭注王叔文仇士良田令孜皆是物也今陛下始初清明之日福威玉食莫不惟辟禮樂征伐莫不自天豈容有此而近者乃有以招權用事自抵譴黜陛下赫然震怒屏之外服此天下所以詠歌奮激仰服聖斷而不能自已也大抵近習者便嬖使令之臣也宰執者輔賛彌縫之臣也侍從者論思獻納之臣也臺諫者箴規君徳糾逖官邪之臣也是數人者各盡其公互防其私而不相附麗則朝廷正而天下治在哲宗時范祖禹為諫官其東鄰宦官陳衍園亭在焉衍至園中不敢髙聲謂同列曰范諫議一言到上前吾輩不知死所矣此近習之臣與臺諫之臣兩不相通所以致元祐之治在徽宗時王黼為宰相與宦官梁師成鄰居一日帝幸黼私第徘徊觀覽適見其後户與師成後户相通帝大不樂此近習之臣與宰執之臣合而為一所以致靖康之變若使内廷之近習與外朝之羣臣合而為一則人主之燕私人主之嚬笑下皆得而知矣羣臣之姦邪天下之情偽上皆不得而聞矣唐庚曰奴婢同則家道危臣下同則人主孤可不懼哉可不懼哉惟陛下察之察之又重察之防之防之又重防之不勝天下國家之福取進止古文集成巻二十八
