body:
  text: 古文集成巻六十七宋王霆震編前壬集六辯皇極辯晦庵洛書九數而五居中洪範九疇而皇極居五故自孔安國訓皇極為大中而後之諸儒莫有以為非者予嘗考之皇者君之稱也極者至極之義標準之名常在物之中央而四外望之以取正焉者也故以極為在中之至則可而直謂極為中則不可若北辰之為天極屋棟之為屋極其義皆然而周禮所謂民極者於皇極之義為尤近觀今之説者既誤於此而並失於彼是以其説展轉迷謬而終不能以自明也即如舊説姑亦無問其他但於洪範之文易皇以大易極以中而讀之則所謂惟大作中大則受之之屬為何等語乎故予切獨以為皇者君也極者至極之標準也人君以一身立乎天下之中而能修其身以為天下至極之標準則天下之事固莫不協於此而得其本然之正天下之人亦莫不觀於此而得其固有之善焉所謂皇極者也是其見於經者位置法象盖皆本於洛書之文其得名則與夫天極屋極民極者皆取居中而取極之義初非指中為極也則又安得而訓之哉曰皇建其有極者言人君以其一身而立皇極之標準於天下也曰斂時五福用敷錫厥庶民者言人君能建其極而於五行焉得其性於五亊焉得其理則固五福之所聚而又推以化民則是布此福而與民也曰惟時厥庶民于汝極錫汝保極者言民視君以為至極之準而從其化則是以此福還錫其君而使之長為天下之標準也曰凡厥庶民無有淫朋人無有比徳惟皇作極者言民之所以能若此者皆君之德有以為至極之標準也曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之者言君既立極于上而民之從化或有遲速深淺之不同則其有謀為操守者固當念之而不忘其不能盡從而未底於大戾者亦當受之而不拒也曰而康而色曰予攸好德汝則錫之福時人斯其惟皇之極者言人有能革面而以好德自名雖未必出中心之實亦當教以修身求福之道則是人者亦得以君為極而勉其實也曰無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌者言君之於民不當問其貴賤强弱而欲其有以進德故其有不能者必皆使之勉進其行而後國可賴以興也曰凡厥正人既富方穀汝不能使好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎者言欲正人者必先有以富之而後納之於善若不能使之有所顧於其家則此人必將陷于不義而不復更有好德之心矣至此而後始欲告之以修身求福之説則已緩不及事而其起而報汝惟有惡而無善矣盖人之氣稟不同有不可以一律齊者是以聖人立極於上者至嚴至密而所以接引於下者至寛至廣雖彼之所以趨於此者遲速真偽才德髙下有萬不同而吾之所以應於彼者矜憐撫奄懇惻周盡未嘗不一也曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極者言民皆不溺於已之私以從夫上之化而歸㑹于至極之標準也析而言之則偏陂好惡以其生於心者言也偏黨反側以其見於事者言之也遵義遵道遵路方㑹其極也蕩蕩平平正直者則已歸于極矣曰皇極之敷言是彛是訓于帝其訓者言人君以身為表而布命于天下則其所以為常為教者一皆循天之理而不異乎上帝之降衷也曰凡厥庶民極之敷言是訓是行以近天子之光者言民於君之所命能視以為教而謹行之則是能不自絶逺而有以親被其道德之光華也曰天子作民父母以為天下王者言能建其有極所以有作民父母而為天下之王也不然則有其位無其德不足以建立標準子育元元而履天下之極尊矣天之所以錫禹箕子之所以告武王者其大指盖如此雖其奥雅深微或非淺聞所能窺測然嘗試以是讀之則亦坦然明白而無一字之可疑者但先儒昧於訓義之實且未嘗講於人君修身立道之本既誤以皇極為大中又見其辭多為含洪寛大之意因復誤認以為所謂中者不過如此殊不知居中之中既與無過不及之不同而無過不及之中乃義理精微之極有不可以毫釐差者又非含糊苟且不分善惡之名也今以誤認之中為誤認之極不謹乎至嚴至密之體而務為至寛至廣之量則漢元帝之優游唐代宗之姑息皆是物也彼其是非雜揉賢不肖混淆方且昏亂陵夷之不暇尚何斂福錫民之可望哉吾意如此而或者疑之以為經言無偏無陂無作好惡則所謂極者豈不實有取乎得中之義而所謂中者豈不真為無所去就憎愛之意乎吾應之曰無偏無陂者不以私意而有所去就爾然曰遵王之義則其去惡而從善未嘗不力也無作好惡者不以私而自為憎愛爾然曰遵王之道遵王之路者則其好善而惡惡固未嘗不明也是豈但有包容漫無分别之謂又况經文所謂王義王道王路者乃為皇建有極之體而所謂無所偏陂反側者自為民歸有極之事其文義亦自不同也邪必若子言吾恐天之所以錫禹箕子之所以告武王者上則流於老荘依阿無心之説下則溺於鄉原同流合汙之見雖欲深體而力行之是乃所以幸小人而病君子亦將何以立大本而序彛倫哉作皇極辯或問附或曰皇極之為至極何也予應之曰人君中天下而立四方面内而觀仰之者至此輻湊於此而皆極焉自東而望者不能過此而西也自西而望者不能踰此而東也以孝言之則天下之孝至此無以加以弟言之則天下之弟至此而無少過此人君之位之徳所以為天下之至極而皇極所以得名之本意也故曰惟聰明睿智首出庶物如所謂天下一人而已者然後有以履之而不疚豈曰含容寛裕一徳之偏而足以當之哉客曰唯唯因復記于此以發前之未盡皇極辯後晦庵莊子曰為善無近名為惡無近刑縁督以為經莊子養生主篇云云督舊以為中上文縁督以為經注李云縁順也督中也經常也盖人身有督脈循脊之中貫徹上下見醫書故衣背當中之縫亦謂之督見禮記深衣篇注云皆中意也老莊之學不論義理之當否而但欲依阿於其間以為全身避患之計正程子所謂閃姦打訛者也故其意以為為善而近名者為善之過為惡而近刑者亦為惡之過也唯能不大為善不大為惡而但循中以為常則可以全身而盡年矣然其為善無近名者語或似是而實不然盖聖賢之道但教人以力於為善之實初不教人以求名者自非為已之學盖不足道若畏名之累已而不敢盡其為學之力則其為心亦已不公而稍入於惡矣至謂為惡無近刑則尤悖理夫君子之惡惡如惡惡臭非有所畏而不為也今乃擇其不至於犯刑者而竊為之至於刑禍之所在巧其途以避之而不敢犯此其計私而害理又有甚焉乃欲以其依違苟且之兩間為中之所在而循之其無忌憚益甚矣客嘗有語予者曰昔人以誠為入道之要恐非易行不若以中易誠則人皆可行而無難也予應之曰誠而中者君子之中庸不誠而中則小人之無忌憚耳今世俗苟偷恣睢之論盖多類此不可不深察也或曰然則莊子之意得無與子莫之執中者類邪曰不然子莫執中但無權耳盖猶擇於義意而誤執此一定之中也老莊之意則不論義理專計利害又非子莫之比矣盖迹其本心實無以異世俗鄉原之所見而其揣摩精巧校計深切則又非世俗鄉原之所及乃賊德之尤者所以清談盛而晉俗衰盖其勢有所必至而王通猶以為非老莊之罪則吾不能識其何説也既作皇極辯因感此意有相似者謾筆之於其後云聲律辯晦庵五聲之序宫最大而沈濁羽最細而輕清商之大次宮徴之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以為宫因其每變而益上則為商為角為變徴為徴為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思盖以其正當衆聲和與未和用與未用隂陽際㑹之中所以為盛若角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徴以居焉亦非五聲之取正也然自其聲之始和者推而上之亦至於變宮而止耳自是以上則又過乎輕清而不可以為宫於是就其兩間而細分之則其别又十有二以其最大而沈濁者為黄鍾以其極細而輕清者為應鍾及其旋相為宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以為貴賤者亦然若諸半聲以上則又過乎輕清之甚而不可以為樂矣盖黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可為樂者也正如子時初四刻屬前日正四刻屬後日其兩日之間即所謂始之始中之中也然則聲自屬隂以下亦當黙有十二正變半律之地以為中聲之前叚如子初四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾盖不以十二律節之則無以著夫五聲之實不得黄鍾之正則十一律者又無所受以為本律之宫也今有極論宫聲之妙而無曰黄鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黄帝大舜之君伶倫后䕫之佐亦如之何徒手而可以議大樂之和哉又有為宫當配仁之説者恐亦非是迹其所以盖以仁當四德之元而有包四者之義耳夫仁木行而角聲者也以之配宫則仁既不安而信亦失據然以為可包四者則不害其有是理也夫五行之序木為之始水為之終而土為之中以河圖洛書之數言之則水一木三而土五皆陽之生數而不可易者也故得以更迭為主而為五行之綱以德言之則木為發生之性水為貞静之體而土又包育之母也故木之包五行也以其流通貫徹而無不在也水之包五行也以其歸根反本而藏於此也若夫土則水火之所寄金木之所資居中而應四方一體而載萬物者也故孔子賛乾之四德而以貞元舉其終始孟子論人之四端而不敢以信者列序於其間盖以為無適而非此也是則宮之統五聲仁之包五常盖有並行而不悖者矣何必奪彼以予此然後快於其心哉文辯艮齋禮始於太一文亦始於太一混沌鑿矣文無不在於天得文之髙於地得文之厚於日月星辰得文之光輝發越於風雷雨露霜雪得文之鼓舞震曜潤澤嚴威於山岳得文之􅍶崒峥嶸於江河淮濟大海得文之源深流長千變萬態不主故常而卒有所歸於鬼神得文之幽於草木花實得文之微於金石得文之堅於鳥獸蟲魚得文之飛動儔匹於都邑城池屋廬冠屨衣裳車輿旂旗百爾器械得文之方圓曲直巧而且法其在人也於君臣父子兄弟夫婦朋友得文之順於升降揖遜獻酬得文之和於賀慶福祥得文之喜於干戈兵戎得文之怒於富貴利達得文之顯於貧賤困窮幽憂無聊得文之抑於莊欽端肅得文之正是其文也而其實也道也徳也忠信也孝弟也仁義禮智也耳所聴目所視手所執足所履無非文也耳目手足所及即理之所在理之所在乃文之所在也理發於外得於心成於文謂之自然聖人以自然為經經者聖人不能不為者也堯舜禹湯文武周孔皆是也去聖人日逺孰不為文而有所謂自然之重者人之重之也莫知其所由已之見重於人也亦莫知其所由重之者不必在於當時尤在於後世此所以見其自然也孟荀揚韓其自然之重歟四氏之文亦有議其非者矣亦有自為矛盾者矣終不足以奪衆多之重世固有為四氏之所為以自附於四氏而人卒不與者猶宋襄公之霸有附之者有不附之者而霸卒不成不若威文得衆而後世猶以為霸也文未嘗無弊也欲去之非他也唯循中則無詭譎夸誕唯自得則無攘奪刦取唯髙明則無暗沓鄙淺唯勁挺則無柔靡蕪穢唯廣大則無碎鎖叢雜唯檢束則無濫溢瀰漫唯公平則無險怪僻執唯變通則無局趣拘牽唯有守則無遷就傅㑹唯不惑則無妖冶侈縱意得其正智得其圓氣得其直神得其全故能推而納諸自然古文集成巻六十七
