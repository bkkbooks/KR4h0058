body:
  text: 古文集成巻三十一宋王霆震編前戊集一論為君難論歐陽公東萊批子由君術論正是此意嗚呼用人之難難矣未若聴言之難也夫人之言非一端也巧辯縱横而可喜忠言質樸而多訥此非聴言之難在聴者之明暗也䛕言順意而易恱直言逆耳而觸怒此非聴言之難在聴者之賢愚也下字不苟明暗賢愚四字移易不得是皆未足為難也若聴其言則可用然用之有輒敗人之事者聴其言若不可用然非如其言不能以成功者一篇主意先説兩叚後入主意是文字委曲此然後為聴言之難也請試舉其一二戰國時趙將有趙括者實事善言兵自謂天下莫能當其父奢趙之名將老於用兵者也毎與括言亦不能屈然奢終不以括為能也歎曰趙若以括為將必敗趙事其後奢死趙遂以括為將其母自見趙王亦言括不可用趙王不聴使括將而攻秦括為秦軍射死趙兵大敗降秦者四十萬人坑於長平盖當時未有如括善言兵亦未有如括大敗者也承接變化結精神此聴其言可用用之輙敗人事者趙括是也秦始皇欲伐荆問其將李信用兵幾何信方年少而勇對曰不過二十萬足矣始皇大喜又以問老將王剪剪曰非六十萬不可始皇不恱曰將軍老矣何其怯也因以信為可用即與兵二十萬使伐荆王剪遂謝病退老於頻陽已而信大為荆人所敗亡七都尉而還始皇大慙自駕如頻陽謝剪因彊起之剪曰必欲用臣非六十萬不可於是卒與六十萬而往遂以滅荆規摹一定夫初聴其言若不可用然非如其言不能以成功者王剪是也繳意盡結且聴計於人者宜如何聴其言若可用用之宜矣輒敗事聴其言若不可用捨之宜矣下三宜字精神然必如其説則成功此所以為難也闗鎖此段不承接宜字眼目予又以謂秦趙二主非徒失於聴言亦由樂用新進忽棄老成此其所以敗也大抵新進之士喜勇鋭老成之人多持重此所以人主之好立功名者聴勇鋭之語則易合聞持重之言則難入也若趙括者則又有説焉予畧考史記所書是時趙方遣亷頗攻秦頗趙名將也秦人畏頗而知括虛言易與也因行反間於趙曰秦人所畏者趙括也若趙以為將則秦懼矣趙王不悟反間也遂用括為將以代頗藺相如力諫以為不可趙王不聴遂至於敗由是言之括虛談無實而不可用其父知之其母亦知之趙之諸臣藺相如等亦知之外至敵國亦知之獨其主不悟爾夫用人之失天下之人皆知其不可而獨其主不知者莫大之患也前世之禍亂敗亡由此者不可勝數也君心論林之竒帝王逺矣其常存乎天下者心也非麗乎形非依乎象人有握手而言同室而居終其身不能以相得者㳂萬古之下以泝萬古之上茫茫昧昧編斷簡短人曰堯舜禹湯文武其心至今存焉不已戱乎曰未之思也帝王奚逺哉人與天地一心也天地不息人心亦不息天地無古今人心亦無古今知此説者帝王胸次盡在人方寸中矣嗟乎百世而下帝王何寡也是非心之罪也心本無異人自異之人之有負於心也甚矣即一而言塗之負販且不可謂無帝王之心離異而言雖與帝王勢均位敵遐乎藐矣奚啻相望於霄壤帝王之治經緯乎一心無得於其心則亦無得於其治君子謂是不可不熟講也天下萬物莫不有偶善與惡分邪與正歧賢之反也為愚是之敵也為非瞀於色者指白為黒迷於方者指東為西人常於處事之際方寸了然所處必當事至而心弗寜雖小必敗况四海九州如何其大一日之間一時之頃事之至者不知其幾其可以擾心而應之哉且帝王之心何心也一者心體之所以全帝王之所以同乎萬世者也心存於一則體用俱備擾而雜之體虧而用喪矣天下安危治亂之機特起於存不存之間而存之奚難居則喪焉動而存之難也隐則息焉顯而存之難也優游暇豫則不素養焉觸事物而存之難也帝王亦是心爾日應百事如未嘗接事而亦未嘗有遺事非莫然也非適然也亦不至乎臨事而存之耳存之為言特其粗也存之而不覺其存用之而不知其為用存之神用之妙也堯以精一執中三四言併與天下而致之舜舜受其天下而守其治天下之法其後七十年復以命禹禹又受其天下而守其治天下之法三聖人一心也三百餘年一日也亦其親傳之符所宜然者也湯之於禹去之五百嵗文武之於湯去之五百嵗心惟一心也治惟一日也然則求心術者宜於此焉思之也秦漢以還治道衰矣非失於為治失於心術矣天下之大不越乎此心心術茫然奚所取而為治化民者必以誠而心或流於荒也養民者必以仁而心或蔽於私也處事者必以智而心或昏於疑也成事者必以武而心或沈於弱也而况一人趨向天下標凖人才之進退議論之離合莫不於此焉古之治亂安危俄且分焉心體全則必髙明必廣大卑汙淺狹之説必不入心體一虧毎毎反是反是而望治猶南行而望燕其背馳逺矣然則如之何曰一之一之者何也堯舜禹之惟精湯之日新文王之純亦不已武王之㒺有不欽皆所以一之也一者全而萬有餘矣有復於人主者必曰正心人主亦皆知曰吾惟正心也噫心非可以聞人之言而正之也非可以慕古人之美而正之也臨朝而正之未正也觸類而正之未正也卒然加意而銳於正焉未正也一暴十寒物未有能生者揠苗助長無乃速其槁歟君體論鄭湜人主所以制天下之命者權也權之在我雖不可一日脫於手然知操之而不知縱知収而不知散知翕而不知張則權雖在我而我終無以用是權也有是權而不能用譬之於物非不􅑎然大也然挈之則不能運錯之地又懼有負之而去者不幾於廢物乎夫惟聖人者能屬人以權而權不下移舉天下之權攬於我而無吝權權移於下則國不立吝權以自用則國無與共功者然既屬之人矣而不下移者操縱自我也我既攬之而不吝於人者我提其要也世之人主惟不能自執天子之權故權移於下又恐權之下移執之而至於自用此所以兩失之也今夫人主所為置宰輔捐爵禄而崇寵之者非以夫萬機不可以自治故擇人而委之耶然則議論政事進退人才乃其職也若夫政事不出於中書而指撝悉自於㫖意人才不繇於廟堂而驟遷驟罷於冥冥無據之中以此為能收威福之柄在已又焉用彼相曰政事出於中書議論皆當耶人才由於廟堂進退皆能公耶使皆當而公則天子安用自勞哉既不能皆當而公則夫天子自執其權者宜也曰吾惟擇其人而用之以議論進退之權而授之其或當耶否耶公耶私耶然後吾從而黜陟之如是則議論進退之權雖在宰相而黜陟宰輔之權實在人主也苟預疑不能為公與當也而奪之權誤於委任以制斷由已為權柄昧於責成以齷齪順㫖為忠純使材者鬱蓄而無所施不才者得以黙黙而安其愚則成敗是非之責盡歸於人主而威福之柄乃隂奪於私門烏在其為權在我也孰若授之權而懲其不公與其不當者使進得以効其忠退有所顧忌而不敢其委任之體豈不愽大而責之之術豈不甚精且覈耶且大臣之任自與有司不同人主之權又與臣下不同人主惟不自用乃能用人人主不用人而自用何異於臣下乎大臣侵有司之職猶且不可而况人主奪臣下之權乎夫天下人才之夥政事之繁决非一人聰明所能了吾既疑大臣而不敢屬之以權則夫所與議論進退此者果誰耶必左右曲躬附耳者得以售其姦矣然則吾之執權而自用乃姦人之幸也夫世之姦臣欲得其君之權非肆然而據之彼固隂有以使權於已雖明主所不悟也何者明主必欲操天下之權彼惟因其欲操天下之權也故間摘事之可喜而説之使益奪臣下之權臣下之權一侵則彼之説益進明主惟見威福之出於已而不知彼實借吾權以行其説則權實在彼也此人主所以喜奪大臣之權而忘其機柄之旁落也是以自古明王執權而自用者其遺患於國或甚於庸主漢宣帝懲霍氏之敝躬總核之政雖甚尊寵丙魏然所與出納樞機裁可政事者皆出於中書尚書故其功雖足以中興然所以滋恭顯亦不薄也光武號總攬權綱然薄三公之任不付以事方其無事時權雖在人主繼之幼少而大柄委於内而無所屬故外戚閹宦乘間而竊之雖三公憤激而不能救之者權素奪也夫二君攬天下之權而執之所以求為無失也然其末流權歸於嬖戚乃有甚於大臣之専何也患生於所偏而勢失於所不料此操權者所深戒君體論鄭湜有聖質必有聖學質非聖人之所恃也有聰明聖智天縱之質而不知聖學之本其於天下國家必有悖理傷道不中節者矣終不可入於聖人之域堯舜禹湯文武之所以聖非特其質過人以有堯舜禹湯文武之學也堯舜禹湯文武所以不作於後世者豈後世之君絶無堯舜禹湯文武之質哉數聖之學不傳也漢髙祖豁達大度寛仁愛人其質固有合於詩書者然雖銷印輟洗從諫如流而溺愛易嫡争臣不敢捄諫雖誅秦蹙項如此其壯而鵔鸃冠之婉媚公卿乃因以開説其雄略雖足以駕馭桀猾而伉㢘慢侮商山之老齊魯大臣終不肯從之游文帝恭儉元黙化民以躬二十三年如一日可謂盛徳矣然惜百金之費不營露臺而賞賜㺯臣累百鉅萬稽古禮文謙遜未遑而眩於玊杯之説及議制度封禪號稱寛厚而所學者申韓其與廷尉議刑常過於刻唐太宗文武之才英烈之氣自足髙出前古然優容王魏導人使諫而有不殺此老之恨力行仁義欲與三王比隆而窮兵伐遼乃欲求勝於隋氏制度紀綱雖足為子孫憑藉而家法不正父子兄弟之間為有慙徳夫髙帝之度孝文之仁太宗之才雖古之聖君不過如是然而所蔽乃與庸主相類者何也可以為聖賢之君者是質也其蔽不免類庸主者不得聖賢之學也使三主者挾如是之質而留意於聖賢之學袪其所蔽廣而充之則功業所就豈止為漢唐之君哉世之人主明智者或失於伺察果决者或暗於先入彊毅者或吝於自用英銳者或喜功而貪利夫明智也果决也彊毅也英銳也皆明主之美質也天下所喜聞而欣道也然有是質而反以害治而便嬖姦巧之人從而窺伺其志之所向而隂投之滋其蔽而甚其惑者學不足以用其質也古之帝王亦豈外是質而能為聖人哉然而其心曠然無所偏繫嬖佞不能移功利機巧不能入雖明智足以照物而無先事之察雖果决足以主斷而無偏信之惑雖彊毅足以有立而無輕待臣下之意雖英銳足以有為而無謀淺妄動之人同是明智爾同是果决爾同是彊毅爾同是英銳爾然居之無所蔽用之而不偏者學之力也廣厦之下細旃之上留意藝文表章經術親與經生儒士考論同異寜不曰學乎曰非聖賢所謂學也夫學者所以正其心也堯舜禹之所以精一湯之所以日新文之所以純亦不已者果何所致力哉皆從事於其心也何則心者萬物之一源聖人所以治天下之本也是心虚明純一則事之是非利害君子小人忠邪之情狀昭然吾前是心一差則諛佞得而誘之左右得而蔽之憸巧得而乘之作於事害於政皆自其端發耳天錫人主之質雖有所甚美必有所甚偏所謂明智也果决也彊毅也英銳也皆其所甚美而不能無偏也必能用其質則質之美者日以充大而偏處日以消融是心既差則其病必於其質之偏處而發而并其質之美者而汨亂之是以聖賢不恃其有過人之質日就月將體察其病之所從起而究其病根之所伏而治之至於學力純至足以化其質而不為所勝則其發也未有不中節者矣嗚呼此乃堯舜禹湯文武之所以作聖人之地又奚止於治天下哉人主幸而有可致之資不以堯舜禹湯文武所以為學者為學而自期望止於漢唐之君惜夫古文集成巻三十一
