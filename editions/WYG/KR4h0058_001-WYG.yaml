body:
  text: 古文集成巻宋王霆震編前甲集一序送孟東野序韓愈迂齋批曲盡文字變態之妙大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴金石草木各只是一句而水分出四句此是不整齊中整齊錯綜妙處人之於言也亦然此是以金石草木引入人来有不得已而後言不平其歌也聲有思不平其哭也聲有懐不平凡出乎口而為聲者其皆有弗平者乎活樂也者聲鬰不平於中而泄於外者也善下語擇其善鳴者而假之鳴又生出善字與假字金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然此又以天時引入人来錯綜妙甚擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推奪其必有不得其平者乎無人推原及此其於人也亦然人聲之精者為言文辭之於言又其精者也尤擇其善者而假之鳴其在於唐虞咎陶禹其善鳴者也而假之以鳴䕫弗能以文辭鳴又自假於韶以鳴将無作有夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺含自鳴其不幸一句意傳曰天將以夫子為木鐸見鳴字其弗信矣乎其末也莊周以其荒唐之辭鳴楚大國也其亡也以屈原鳴亦自鳴其不幸臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老耼申不害韓非慎到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也就其善鳴者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章此數語褒貶相錯將天醜其徳莫之顧邪何為乎不鳴其善鳴者也唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴見前數子是逹者其存而在下者孟郊東野始以其詩鳴其髙出晉魏不懈而及於古其他浸淫乎漢氏矣語有輕重從吾游者李翺張籍其尤也三子者之鳴信善鳴矣抑不知天將和其聲而使鳴國家之盛邪前面許多鋪叙亦兼有此兩段意了抑將窮餓其身思愁其心腸而使自鳴其不幸耶當時必先有此兩句三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之應前送文暢師序韓愈東萊批體格好就他身上說極好處人固有儒名而墨行者問其名則是校其行則非可以與之游乎如有墨名而儒行者問其名則非校其行則是可以與之游乎頭兩段起語新文義見意格正楊子雲稱在門牆則揮之下段鎖前二段有力在夷狄則進之吾取以為法焉上段一便以古人之言引證大段自在文暢喜為文章其周逰天下凡有行必請於搢紳先生以求詠歌其所志貞元十九年春將行東南栁君宗元為之請觧其裝得所叙詩累百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告者此見昌黎本意處而徒舉浮屠之說贈焉主意夫文暢浮屠也如欲聞浮屠之說警策精髓處當自就其師而問之何故謁吾徒而来請也起好警䇿彼見吾君臣父子之懿文物禮樂之盛其心必有慕焉大抵古人許予不肯直致言詞又見得文暢是浮屠也拘其法而未能入故樂聞其說而請之如吾徒者承接好宜當告之以二帝三王之道應後日月星辰之所以行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之說而凟告之也應前結好民之初生固若禽獸夷狄然應後說起善惡相形聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏先說至不好事然後形容聖人好處是故道莫大於仁義教莫正乎禮樂刑政施之於天下萬物得其宜此說聖人之道本原見儒者有来厯措之於其躬體安而氣平承接上文有力堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之耶見得浮屠無根抵此句結簡有力夫鳥俯而啄仰而四顧應前夫獸深居而簡出懼物之為已害也猶且不脫焉最警䇿處弱之肉彊之食今吾與文暢安居而暇食優㳺以生死結得最有意說破有不盡意與禽獸異者寜可不知其所自耶應前結好夫不知者非其人之罪也知而不為之者惑也恱乎故不能即乎新者弱也餘意此段結得如破的知而不以告之者不仁也告而不以實者不信也此二句昌黎本意兩句說儒者連下五也字如破竹一段工夫極大余既重栁請又嘉浮屠能喜文辭於是乎言此二句見得不是昌黎有意予文暢送董邵南㳺河北序韓愈燕趙古稱多感慨悲歌之士董生舉進士連不得志於有司懐抱利器鬰鬰適兹土吾知其必有合也董生勉乎哉夫以子之不遇時苟慕義彊仁者皆愛惜焉矧燕趙之士出乎其一有情字性者哉然吾嘗聞風俗與化移易吾惡知其今不異於古所云一作聞聊以吾子之行卜之也董生勉乎哉吾因子有所感矣為我弔望諸君之墓樂毅傳趙封毅於觀津號曰望諸君而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可以出而仕矣送王塤秀才序韓愈吾嘗以為孔子之道大而能愽門弟子不能徧觀而盡識也故學焉皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子原逺而末益分盖子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名曰馯音韓臂子弓子弓受易於商瞿音衢孟子師子思子思之學盖出於曾子自孔子没羣弟子莫不有書獨孟軻氏之傳得其宗故余少而樂觀焉太原王塤示予所為文好舉孟子之所道者與之言信恱孟子而屢賛其文辭夫沿河而下苟不止雖有疾遲必至於海如不得其道也雖疾不止終莫得而至焉故學者必慎其所道道於楊墨老莊佛之學而欲至聖人之道猶航斷港絶潢以望至於海也故求觀聖人之道者必自孟子始今塤之所由既幾於知道如又得其船與檝知沿而不止嗚呼其可量也哉送薛存義序栁子厚東萊批雖句少極有反覆斆齋古文標凖評曰此篇文勢轉圎如珠走盤中畧無凝滯加之論為吏者乃民之役非以役民議論過人逺甚中間以庸夫受直怠事為譬且云勢不同而理同此識見最髙至於結句用賞以酒肉而重之以辭亦與發端數語相應學者宜玩味河東薛存義將行栁子載肉于俎崇酒于觴追而送之江之滸飲食之且告曰凡吏于土者若知其職乎盖民之役非以役民而已也一篇骨力凡民之食於土者出其十一傭乎吏使司平於我也下的當今受其直怠其事者天下皆然豈唯怠之又從而盜之下的當向使傭一夫於家受若直怠若事又盜若貨器則必甚怒而黜罰之矣譬得切以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何下得好有逹於理者斡旋一篇精神得不畏而恐乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無懐詐暴憎其為不虚取直也的矣應前直其知恐而畏也審矣吾賤且辱不得與考績幽明之說於其往也故賞以酒肉而重之以辭送梅聖俞歸河陽序歐公至寳潜乎山川之幽而能先羣物以貴於世者負其有異而已故珠潜于泥玉潜于璞不與夫蜃蛤珉石混而棄者其先膺美澤之氣輝然特見于外也士固有潜乎卑位而與夫庸庸之流俯仰上下然卒不混者其文章才美之光氣亦有輝然而特見者矣然求珠者必之乎海求玉者必之乎藍田求賢士者必之乎通邑大都據其㑹就其名而擇其精焉爾洛陽天子之西都距京師不數驛搢紳仕宦雜然而處其亦珠玉之淵海歟予方據是而擇之獨得於梅君聖俞其所謂輝然特見而精者耶聖俞志髙而行潔氣秀而色和嶄然獨出於衆人中初為河南主簿以親嫌移佐河陽常喜與洛之士逰故因吏事而至於此余嘗與之徜徉於嵩洛之下每得絶崖倒壑深林古宇則必相與吟哦其間始而歡然以相得終則暢然覺乎薰蒸浸漬之為益也故久而不厭既而以吏事訖言歸余且惜其去又悲夫潜乎下邑混於庸庸然所謂能先羣物而貴於世者特其異而已則光氣之輝然者豈能掩之哉送游生還鄊讀書序東堂毛澤民吴人有欲舟而之宋者不問途之所從不具竿檝桅柂帆繂信水而下順風而前沿畨陽渡彭澤過九江郡浮岳陽洞庭至于荆州問之則楚也更信而之焉泝三峽望峩眉則既入于蜀而宋益逺矣嵗月耗而舟以弊陋意將還而茫然矣故卒以荒唐無歸此不知途不利器之罪也今有之宋者吾將告曰必具竿檝桅柂帆繂求嘗至宋者道之自西至于揚州浮淮泗泝汴水不㡬乎宋歟今而必有之宋者乎之宋者多而未必皆有舟也有舟者不患不至宋庻得其道而之焉游生於學類欲宋而有舟者也雖未即至宋又未至迷妄而之楚蜀然試求其竿檝桅柂帆繂得無猶缺然乎且將必具之乎將求其嘗至宋者為之道乎苟如是宋逺乎哉元豐九年冬吾始見㳺生於餘杭州黑面而峻眉目好頡頏作氣有古燕趙士風自言寡師友不喜讀古今人文章見其獨有前後所作歌詩文論一篋東西南北隨之閑暇輒自讀誦不厭吾惜其漫濫而無歸孤陋而無根欲其愽學之審問之慎思之明辨之篤行之日知其所亡月無忘其所能以成其美材而庻㡬於道將行也作之宋喻以告㳺生勉乎哉吾且見生至宋也送應太丞赴闕序篔窓陳耆卿貴溪應先生以淳熈丁未唱第嘉定辛未登朝繇棘丞丐外歴郡守常平使者陞轉漕辭不拜改刺處州有問處州之政者皆曰先生有恢恢之才而宅以謙有稜稜之威而陶以和有了了之智而載以黙凝香宴坐未嘗疾聲躁色也而千里之人每愛而師畏之古所謂儒者政真其人歟和氣川融嵗以稔吿逺近稚耋免從理入口之相非飽於稼飽先生之仁義也方將用借冦故事請于朝然滿且召矣或謂先生三十二年之科名八年之班綴久于外以部使者屈治郡今再入已回翔矣而未知造物意也浮花艶卉無兩日長而鉅柏之亭亭參天不改非雪霜畔常有陽春耶久於外者惠吾民也以部使者屈治郡者辭尊居卑之義也踰滿而後召者不輕奪赤子之乳也召之賛奉常者有興禮樂致太平之具而以為之兆也某下邑勾稽吏爾樸拙根性先生覆露之吹送之煦我以道徳鞭我以文辭恩獨厚念雖束縛千兔未白此悃矧一幅剡藤哉觀唐人送李正字皆以詩以序者獨韓退之意序厚也然觀退之諸序有祝體有規體今將為規乎尚何規盍亦不以規而以祝乎秋浸疎梧月酣新桂祖帳溢衢餞觴浮空一祝曰寒燠未齊宜戸牖泰和夀斯文脉再祝曰上方禮羅鴻碩九鼎宗社詔爾父老先生去是邦非忘之也起而漸澤八荒則一州固在其中矣三祝曰牛馬走尚伏泥塗望先生今在何許異時邂逅毋相忘一祝為先生也再祝為父老也三祝自為也酒三行而祝辭備體古也送友人逰武林序陳同父古之達者求士今之達者厭士嗚呼其世變愈下矣乎古之士耕雲釣月齒石耳泉幅巾孤頂扁舟斷涯或悽歌而愴吟或詼諧而笑吁浩乎其自得而頽乎其處順也與其闖伺於侯門孰若北窓之髙卧與其乞憐之千言孰若爐香之一巻達者曰是非可以利餌之也遜辭以為媒厚禮以為羅庶乎其致之也否則彼有南山之南北山之北而已而吾君孰與共理哉故古之達時宜者非掠禮士之美名也自世變愈下士無圭田始喪所守豢利慾而恧貧賤盖溺焉于兹者有年矣自晉而觀望塵之俗人才衰陋已不逮兩漢尚何望其三代如也哉於是公卿大夫過髙而一介之士過卑過髙者日以傲過卑者日以諂傲則不求即人諂則求即於人是以尊者勢益重而卑者勢益輕國朝之初公卿大夫猶有重士之意今則亡矣盖自渡江以來士之萃於吴越者肩摩袂錯欲鋤無田欲樵無山者十五六則常産已亡矣遷徙之無常滫瀡之所迫則常心莫能存矣以其非所有之常産加之以莫能存之常心則隨染隨遷不動而遷於俗者盖寡故授書獻記過媚以圖恱卑姝以取幸者亦其勢之必然無足怪也又况今之取士皆有定式羔帛不逮於巖穴而公卿大夫要以如格而止又奚必勤勤焉過求繩墨之外必如古之薦士也哉有厭薄貧賤之意而無寵藉後輩之心也亦宜今吾子之逰武林也武林士夫之叢薄也子將往而謁之吾懼子之遭厭薄而亟返也然士夫之中亦有古人之風者盍以吾說語之送羅永年序楊誠齋今年六月予歸自都下一書生來謁予羅其姓椿其名永年其字永豐之人也問其所以來則曰椿世吏也今去吏而儒是習過不自量其不肖來見麻陽縣尹達齋先生先生不鄙揖而進之以為可教是以在此自是與予相過欵且久見其文辭清潤日異而月不同駸駸乎進而未止者也予甚愛之嵗且竟將歸覲省其母與兄來與予别且求予言予曰子歸乎吾言亦奚以為永年曰椿之命儒也邑之人恱我者之衆未若嗤我者之衆也得一言恱者信嗤者息矣予曰子之邑人固嗤夫命儒者乎永年曰非嗤夫命儒者也嗤我之用儒變吏也予曰然則嗤之所在在子不加多在彼不加少矣且用儒變吏與用吏變儒孰可孰不可也用皂𨽻而變公卿者無之乎用暴客而變衣冠者無之乎用樲棘變臺池也用豺狼變父子兄弟也不惟用吏變儒而已也吾不以嗤夫嗤子者吾以悲夫嗤子而不自嗤者彼不病其悲子獨病其嗤何也送王主簿序止齋陳傳良苟可以寘吾力而寘致者得之之道也而假諸人者必廢今夫物其飛也以羽其走也以蹄其啄也以咮未有非其自為而得之者也而况於人乎是故吾播也斯榖吾植也斯果吾漁也斯魚吾畋也斯禽如是而或不得者則非其常不如是而或得者亦非其常天下之物莫易得乎水也井而飲池而澣瀦而注溉凡其足吾用者吾有之也而旦夕焉求諸人則必不繼雖火亦然宿焉而噓之燧焉而改之無不得者半夜有急持束緼而叩其鄰以請雖不吾却火至且無及矣而豈不盡吾却哉金在山珠在淵其難得固宜人惟利之也以縋淵窮嵗月鑿山而隧之果有得水火滿天下而金與珠隠深而匿䆳寘吾力焉則金珠可覬不然而徯夫人水火吾見其缺者矣嗚呼焉用以假人為哉假舟楫者廢涉假車馬者廢征凡天下之事假焉而不廢也㡬希僕始力學切有意於用念今仕者進無援立無儔則艱孤以卑危於是慨然當世之公卿大夫願交焉以速化而既至此恍然而莫之涯也以驚絶然而果不可以幸也以悲今則悵然曰嗟乎吾方能為之而猶有命焉制於疾徐徒人乎取之疎矣哉是以勇於歸將益治其學以俟命之及今君以官窮亦惟親之老也家貧而養匱惻惻乎将有所求而亦不得以還吾察其貌以戚聆其音以怨故道天下之理與吾悔者慰規之庶乎其無尤送羅以寜上書歸郷序撙齋曾丰淳熈十有五年秋豐城布衣羅氏子以寜投匭上書三上而三不報浩然歸歟顧余同舘又同為江西人獨見善厚行業具朅來吿别意其辭色若欲得余贈者乃與坐有頃為言三代取士一出於學故天下無不羇之士七國取士一出於客故天下無有常之士至於漢去七國未逺雖漸興學而未容頓禁客故士之出入於客與學常相半而取士則别設科目不一途而足夫科目繩尺事也有常之士所樂趨而不覊之士所厭就故士之出入於學者相率而應科目晁錯公孫𢎞董仲舒魏相杜欽之徒是也彼出入於客者往往轉而他售或上書獻頌朱買臣徐樂司馬相如車千秋之徒是也方今取士之法自廷尉而賜第者十之九自舍選而釋褐者十之一自囊封而授官者率千百不一二故上而祿于朝次而祿于州縣大抵有常之士也不羇之士雖間出焉求其稍能自致美官者始有鄧酢次吴曾又次戴之邵之徒十數人耳夫今天下無事朝廷之上惟簿書獄訟是務雖庸夫髙枕而有餘至於邉烽猝警羽檄交馳雖聖人繭足而不給况區區有常之士哉以寜挟不羇之才乃於庸夫髙枕之時出售其説三上而三不報無怪也横渠張公載少喜談兵質於范文正公公責以儒者自有名教何事於兵勉之讀中庸横渠公退而變所習卒為河南學者宗師自末言之講學之功大於談兵固矣自初言之談兵非無益於人之國者而遽責之文正公豈沮人赴功名者哉誠以横渠之資可進於道不止於兵機吾遽以談兵予之彼且自滿不復折而入於道是以寜固拂之俾勉其大毋姑順之俾苟安於小以寜歸余敢誦所聞以薦焉令所上書中天子意急徴而驟用雖少慰所志其終所成要不過鄧酢輩耳不然而竟歸雖初志亦未惬然繼自今以趨時之心趨古以談事之口談道他日學成則為横渠公不竢其成而姑為時出猶不失為有常之士如公門人顧决擇如何耳所親劉純叟余友也於理道明歸以余所告告之屬為决擇㑹得其當焉古文集成巻一
