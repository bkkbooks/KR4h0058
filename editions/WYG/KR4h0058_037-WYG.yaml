body:
  text: 古文集成巻三十七宋王霆震編前戊集七論論法上宛丘迂齋批反本之論亦頗參之以莊周之說古之善為天下者不患法不立而患不能為法不患法不足而患法宻而不勝然則天下治亂不繫法之存亡歟夫亦推本而後知其至也夫法之所生不生於無事事起而不可理則法從而經之事日益多法日益用事日益新法日益工並起而相制則不勝者受其患故法不勝事則天下之亂紛然而起故治天下者非無法之為尚也為其無事之可貴也非法備之可削也為其事變之可慮也昔者三代之治不若堯舜商周之治不如夏后孔子曰後世有作者虞舜弗可及已又曰虞夏之道寡怨於民商周之道不勝其弊夫舜之禮比於夏后之時則畧矣商周之禮比於夏后之時則備矣夫四代之治否豈禮不具之罪哉制度日多淳粹日衰矣天下之勢譬如人之一身夫世之人有不畏寒暑不治藥石恣口之所食肆體之所安夫如是則問其年必壯者也深居奥處愛養備至藥石百物毒烈並進而灸艾鍼砭遍膚而無遺問其年則必老者也夫虞夏之道壯者也其不治可為也其不足可補也壯者疾易治也其成質未虧而可以有為也商周之道老者也其不治難為也以其嘗治之而不信故也其不足難補也以其嘗補之而不滿故也彼之疾方來而吾之術已窮彼之變未休而待之道已盡如是則死繼之矣嗟夫天下之所不願取辦於法也如此而世之君子因事制變而尤法不足豈不悲哉夫法度之弊起於徳不足而求勝其民而敗於啓民之邪心而多怨夏之繼舜也豈不知舜之為不可及也商周之繼夏也豈不知弊之將不勝也然而明見其弊而為之不已何也豈其世變日繁而徳有所不足故耶徳不足以還民之初熟視其亂而莫之禁則將以智加之故曰法起於徳不足而求勝其民夫上以智勝其下則下亦以智勝其上不絡馬首則毁銜竊馬終身而不知不立門􅉹則穿窬竊發終身而不為法之於民常制其一而開其一制之者易見而開之者難防上下以智相勝而姦邪詭偽不可勝究故天下之人始忘其歡欣戴君之心而有怨怒忌上之仇故曰敗於啟民之邪心而多怨嗚呼夏之後為商商之後為周三代之治未甚相變也其治亂之迹未易相逺也周亡而為秦天下大亂先王之治掃滅而無餘治世之迹卒不能復先王之絲毫而三代之俗遂以不見於後世何也夫法未極則俗之變未足夏商之法嘗若極矣然民未大厭也民有未厭之心則其淳氣美質猶有存者周之法詳矣不可以復加其俗之變已窮而民之姦心邪態靡不畢出其知備其質盡其惡甚其美殫故周之亡而不可復為矣此聖人之所以深悲之而曰周人未瀆神而爵賞刑罰窮矣此後所以必為秦也歟論法下宛丘迂齋批議論好文勢委蛇曲折用字尤工古之有天下者必得於紛争敗亂之後夫人之情出於亂亡之後則其情苦而思安夫惟其情苦而思安故其事簡而易教天下有易教之俗則上無難立之法故有國家者其初下常綏静而易治安平之日乆推原得好而民之侈心生嗜欲之動無窮而罪過繁故居其上者乃始日夜補完其缺敗而調伏其崛彊下字好曲為之防多為之制法度繁興刑政畢舉文勝而質不足名美而實不稱大抵有國者中世以後天下之事常多而國家之觀甚美生民之過日滋而有司之文加備而世之惑者以謂能完上世之不足而務求前人之所未成以為成功而不知其不若使上世之質未散而前人之樸常在也天下之物其勢相激而後變生焉觀美者實之所由亡文備者偽之所自起盖嘗以漢之事考之髙祖取天下於秦民出於百戰傷夷之餘父子兄弟僅相保聚以安其生故其氣帖然静愿而少事而髙祖文景得以畫一之法羈縻而安輯之四字工歴數世而天下安妥海内有大亂而豪傑不作此民淳而法簡之效也結有力至於武宣天下之勢乆習於無事民意日縱豪俠盜賊稍起於田閭而二帝乃修明制度収納天下之才講政備物以與天下戰於才智之中才者奮而姦者隨之彊者勝而亂者因之紛紛籍籍以傳於不肖之子孫而漢以大壞此則事衆而法備之弊也故天下之難治不在於創始鹵莽之初而常在於積安大備之後是故君子必觀其兆而審其宜解其甚而不激其變使其勢不為周人之已甚而務使後世可以有加議論好嗚呼其本果何在哉盖天下之弊好極治者必召天下之大亂務窮利者必受天下之大害夫汙樽而抔飲蕢桴而土鼔天下之人苟未厭其為禮樂也則吾之禮樂雖足以備天下之聲容藏而勿陳可也橧巢營窟之居衣薪不封之𦵏天下之人苟不失其生死之所安也則吾之制度雖足以建九筵之堂五稱之衣棄而勿用可也不亂則已不必邀其敬不欺則已不必盡其忠是謂不求備於民夫可乆之道起於不求備而效於人不厭譬之萬金之家責之千金其力亦足以供我之求然吾日取一金焉於是有不得已而取之百金彼猶樂輸而不怨何則彼惟所有者未竭而不厭故也禮樂刑政之設於下使民有未厭之意則後世有作者得以復加焉故其弊也可以有救而不至於術窮智竭而無繼嗚呼或者徒見法度宻而民不化文理具而功不立日夜從而加之嗚呼亦失其本矣天下之勢不可以激而民之智不可窮激之以所欲者必得其所不欲窮之以所能者必報之以其所不能徐導其欲激之勢而扶其未用之智㸔他用徐導兩字扶一字則天下可以乆安而無虞然則周人其未足以知此歟彼或者遭其㑹而有不得已焉故也存法論程大昌法之設以寓公亦以杜私也然則孰為重曰杜私重孰明之以迹明之也著圓於規托方於矩以為方圓之則而格夫不方圓者豈為能方圓者設哉是故法之設以迹繩私也至私行乎無形而人莫得見其情則蕩然無所限制故聖人設法以為寓公之具寓公之有具則戾公者有形矣情然邪而法亦然則固得見其公矣法然邪而迹不然則童子亦得議其私也夫惟迹暴於外而人皆有所執著以為參按之形則縱私者其亦有所礙矣是設法者之意而行私者之所深忌也春秋之世諸侯相與削去周官之籍夫何讎而為此直惡夫行私而有迹爾夫籍所著刑政有平制度有中班爵有等分田有限昭昭乎至公之的迹與法揆則有指籍以責私者故子産詰晉曰先王之制大國不過一圻今數圻矣若無侵小何以致此祭仲曰先王之制大都不過乎三國之一中五之一小九之一今京不度非制也凡此皆衆忌所萃而周籍之不得不毁者也古語有之不知其形視其影苟未知夫人公私之分於法之存亡觀之亦足以察矣曹參之相漢忘天下之凋瘵而放心乎荒酣似不足恤民也而天下歌之政以其不失畫一之法也畫一之法非唐虞成周之法也天下何樂而歌之聞之曰紿長短者不操尺譎輕重者不持衡何之畫一至公寓焉參也委其可以行私之勢而一切付之定法之無心非天下之至公能乎哉是故非守法之足尚而至公之為可貴也不然參當坐因循之罪奚以功冠漢哉一令論程大昌國有定法則吏有定守民有定嚮若二三焉則惑矣前法既淆於後令而舊習固揺於新制吏民將安所取中乎遵前則戾乎後棄舊則不安乎新擾擾焉適從之無所故君子當其二三則求有以一之一之者非一諸我也一諸所安而已一代之興必有一代之制其品章條目上下循焉耳目熟焉所謂安也歴世滋乆必有講明世變而創為新議者焉聴其言亦切於事揆諸世亦未戾於民從其一旦之宜推而行之於是有與成法相悖者今日之言如此明日之言如彼積彼此之異而法不勝其二三天下始皇惑無凖矣吾將剗去一切權宜之議盡復前朝世守之法則是二三而一之復以所安者遺焉吏守民嚮皆有定而無惑矣無亦便而易治歟昔日蕭何削秦之苛而為九章天下便其簡當謂之畫一畫一之法守之以曹參之清净鎮之以孝文之元黙無増損也孝武親崇給捷之士講故改制務以生事相髙張湯杜周因得舞其智巧焉敢為紛更而憚其言曰三尺律令安在哉前王所是著為律後王所是疏為令宜世是為何古之法乎斯言一出向之畫一者盖歧中又有歧矣而不止乎二三也魏相之相宣帝也數陳國家便宜故事以為古今異制當今惟在奉行故事而已夫故事即畫一以來承襲之舊而武帝之所紛更者也以一漢世而有所謂髙帝之法焉有所謂武帝之法焉為吏若民宜何從乎相之専行漢家故事也所以懲武而遵髙也所以定法而一制也元帝嘗有所闗説而宣帝不肯以為漢家自有制度不宜純用周政其知所以而一焉或者相之言有以啟迪之歟雖然天下之事不見其害不知其利令之布也知行其意之所可而不防其二三則一君之身有自相蹖駮者矣蕭瑀為内史髙祖嘗以不即宣勅責之瑀曰大業之世内史宣勅或前後相違有司不知所從故臣每受一勅必勘審與前勅不違始敢宣行太宗嘗勅選人詐冒者死未幾有犯者上欲殺之戴胄處法當流曰勅者出於臨事之喜怒法者國家布大信於天下卒得不殺夫後與前不相應勅與法不相當此法令所從二三而天下之所為疑悞者也髙祖太宗曽不知覺而待蕭戴之正救焉使㣲二子則唐令惟新自相二三矣是故天下不可無正救之臣也謹始論程大昌政之所始其重乎天下於此占終焉始善耶民意其必終於善而否則民不復以善期之矣故是非之被民也於此時為著而喜怨之入民也於此時為堅君子畏之非畏一時之喜怨也畏其譏議既定他日有不可回奪者也夫人惟未習乎我也而虚心兩擇焉其喜怨無成心也故喜可致而怨可使不萌若兩擇之初不應所徯而以私邪疑焉則疑者為主而信心難入矣噫疑心勝而施設無是矣齊宣愛觳􅑌而易牛與成湯之祝網奚擇焉一以為好生一以為貪得自古及今以疑信為是非者不獨一事也亡鈇既獲則鄰人行動無或類竊牆壞失財則鄰父勸築反疑於盜尚有真是非也哉是以魯人不敢踐栁下惠之陳迹而曰栁下惠則可吾則不可盖不容以未信而處可疑之地也嗚呼悲夫天下之事無定形也爵人於朝以賞善也而可疑以飾喜刑人於市以棄惡也而可疑以作威興作之鄰於生事也安静之似於因循也謂之是可也謂之非亦可也無有必然可指之形也彼天下操疑似不信之心以觀無形可指之事雖堯禹臨之不能無扞格也然則奈何傳曰君子謹始差若毫釐謬以千里又曰同言而信信在言前誠能謹千里於毫釐而立信以素則役民以築臺而猶子來以勸趨植羽以從田而猶欣欣乎有喜向之所可畏者乃吾之所可恃焉者也夫人移其疑是為非之心而信吾之所措則有所建立其能搖之使疑乎夫以謹始之暫而結終身不移之信出治之道無要於此古文集成巻三十七
