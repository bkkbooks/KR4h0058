body:
  text: 古文集成巻五十六宋王霆震編前辛集二封事壬午應詔封事朱文公八月七日左迪功郎監潭州南岳廟臣朱熹謹昧死再拜上書於皇帝闕下臣恭惟太上皇帝再造區宇受命中興憂勤恭儉三十六年春秋未高方内無事乃深惟天下國家之至計一旦而舉四海之廣天位之尊㫁自宸衷傳之聖子皇帝陛下恭承慈訓應期御厯爰初踐祚曾未幾何而設施注措之間所以大慰斯民之望者新而又新曾靡虚日其規模固已宏逺矣然猶且謙冲退託不以聖智自居首下眀詔以求直言此尤足以見帝王之高致知為治之先務也天下幸甚臣切伏草茅深自惟念天下之大不為無人忠言嘉謨崇論谹議計已日陳於陛下之前尚恐不足仰望清光無以少備採擇况臣之愚雖欲效其區區豈能有補於萬分之一哉又惟即位求言累聖相承以為故事則朱知今日陛下之意姑以備故事而已耶抑真欲博盡羣言以兾萬一之助也臣誠愚昧不知所出愛君尊主出於犬馬之誠有不能自己者故昧死言之惟陛下留聴臣伏讀詔書有曰朕躬有過失朝廷有闕遺斯民有戚休四海有利病並許中外士庶直言極諫者臣切以陛下潛徳宫府幾三十年不邇聲色不殖貨利無一物之嗜好形於宴私無一事之過失聞於中外昧爽而朝嚴恭寅畏仁孝之徳孚於上下所以大繫羣生之仰望濬發太上之深慈以至於膺受付託奄有萬方者其必有以致之矣然則聖躬之過失臣未之聞也今者臨御未幾而延豋故老召用直臣抑僥倖以正朝綱雪寃憤以作士氣貢奉之私不輸於内帑恭儉之徳日聞於四方凡天下之人所欲而未行所患而未去者以次罷行幾無遺恨然則朝政之闕遺臣亦未之聞也至於斯民之戚休四海之利病則有之矣然臣屏伏閩陬十有餘年足跡未甞及乎四方其見聞所及之一二内自隠度皆非今日所宜道於陛下之前者不敢毛舉以溷聖聴至若隂拱噤黙終不為陛下一言則又非臣之所敢安也臣聞召公之戒成王曰若生子罔不在厥初生自貽哲命孟子之言亦曰雖有智慧不如乗勢方今天命之眷顧方新人心之蘄向方切此亦陛下端本正始自貽哲命之時因時順理乗勢有為之㑹也又况陛下聖徳隆盛天下之人傳誦道説有年於兹今者正位宸極萬物咸覩其心蓋皆以非常之事非常之功望於陛下不但為守文之良主而已也然而祖宗之境土未復宗廟之讎恥未除戎虜之奸譎不常生民之困悴已極方此之時陛下所以汲汲有為以副生靈之望者當如何哉然則今日之事非獨陛下不可失之時抑國家盛衰治亂之機廟社安危榮辱之兆亦皆决乎此矣蓋陛下者我宋之盛主而今日者陛下之盛時於此而不副其望焉則祖宗之遺黎裔胄不復有所歸心矣可不懼哉可不懼哉臣愚死罪竊以為聖躬雖未有過失而帝王之學不可以不熟講也朝政雖未有闕遺而修攘之計不可以不早定也利害休戚雖不可徧以䟽舉然本原之地不可以不加意也蓋學不講則過失萌矣計不定則闕遺大矣本不端則末流之弊不可勝言矣臣請得為陛下詳言之臣聞之堯舜禹之相授也其言曰人心惟危道心惟微惟精惟一允執厥中夫堯舜禹皆大聖人也生而知之宜無事於學矣而猶曰精猶曰一猶曰執者明雖生而知之亦資學以成之也陛下聖徳純茂同符古聖生而知之臣所不得而窺也然竊聞之道路陛下毓徳之初親御簡䇿衡石之程不過諷誦文辭吟詠性情而已比年以來聖心獨詣欲求大道之要又頗留意於老子釋氏之書踈逺傳聞未知信否然私獨以為若果如此則非所以奉承天錫神聖之資而躋之堯舜之盛者也蓋記誦華藻非所以探淵源而出治道虚無寂㓕非所以貫本末而立大中是以古者聖帝明王之學必將格物致知以極夫事物之變使事物之過乎前者義理所存纎微畢照瞭然乎心目之間不容毫髪之隠則自然意誠心正而所以應天下之務者若數一二辨黒白矣苟惟不學與學焉而不主乎此則内外本末顛倒繆戾雖有聰明睿智之資孝友恭儉之徳而智不足以眀善識不足以窮理終亦無補乎天下之治亂矣然則人君之學與不學所學之正與不正在乎方寸之間而天下國家之治不治見乎彼者如此其大所繫豈淺淺哉易所謂差之毫釐繆以千里此類之謂也蓋致知格物者堯舜所謂精一也正心誠意者堯舜所謂執中也自古聖人口授心傳而見於行事者惟此而已至於孔子集厥大成然進而不得其位以施之天下故退而筆之以為六經以示後世之為天下國家者於其間語其本末終始先後之序尤詳且明者則今見於戴氏之記所謂大學篇者是也故承議郎程顥與其弟崇政殿説書頤近世大儒實得孔孟以來不傳之學皆以為此篇乃孔孟遺書學者所當先務誠至論也臣愚伏願陛下捐去舊習無用浮華之文攘斥似是而非邪詖之説少留聖意於此遺經延訪真儒深明厥㫖者置諸左右以備顧問研究充廣務於至精至一之地而知天下國家之所以治者不出乎此然後知體用之一源顯微之無間而獨得乎堯舜禹湯文武周公孔子之所傳矣於是考之以六經之文監以厯代之跡㑹之於心以應當世無窮之變以陛下之明聖而所以浚其源輔其志者如此其備則其所至豈臣愚昧所能量哉然臣非知道者凡此所陳特其所聞於師友之梗㮣端緒而已陛下由是講學而自得之則必有非臣之言所能及者惟陛下深留聖意毋忽則天下幸甚臣又聞之為天下國家者必有一定不易之計而今日之計不過乎修政事攘敵國而已矣非隠奥而難知也然其計所以不能定者以講和之説疑之也夫金人於我有不共戴天之讎則其不可和也義理明矣而或者猶為是説者其意必曰今本根未固形勢未成進未有可以恢復中原之䇿退未有可以備禦衝突之方不若縻以虚禮因其來聘遣使報之請復土疆示之以弱使優游驕怠未遽謀我而我得以其間從容興補而大為之備萬一天意悔禍或誘其𠂻則我之所大欲者將不用一士之命而可以坐得何憚而不為哉臣切以為知義理之不可為矣而猶為之者必以有利而無害故也而以臣䇿之所謂講和者有百害而無一利何苦而必為之夫復讎討賊自彊為善之説見於經者不啻詳矣陛下聰明稽古固不待臣一二言之請始陳其利害而陛下擇焉夫議者所謂本根未固形勢未成進不能攻退不能守何為而然哉正以有講和之説故也此説不罷則天下之事無一可成之理何哉進無死生一决之計而退有遷延可已之資則人之情雖欲勉强自力於進為而其氣固已渙然離沮而莫之應矣其守之也必不堅其發之也必不勇此非其志之本然氣為勢所分志為氣所奪故也故今日講和之説不罷則陛下之勵志必淺大臣之任責必輕將士之赴功必緩官人百吏之奉承必不能悉其心力以聴其上之所欲為然則本根終欲何時而固形勢終欲何時而成恢復又何時而可圖守備又何時而可恃哉其不可兾明矣若曰以虚禮縻之則彼雖仁義不足而凶狡有餘誠有謀我之心則豈為區區之虚禮而驕誠有兼我之勢則亦豈為區區之虚禮而輟哉若曰示之以弱則是披腹心露情實而示之以本然之弱非强而示之弱之謂也適所以使之窺見我底藴知我之無謀而益無忌憚耳縱其不來我恃此以自安勢分氣奪日復一日如前所云者雖復曠日十年亦將何計之可成哉則是所以驕敵者乃所以啓敵而自驕所以緩冦者乃所以養冦而自緩為人計則善矣而非吾臣子所宜言也且彼盜有中原嵗取金幣據全盛之勢以制和與不和之權少懦則以和要我而我不敢動力足則大舉深入而我不及支蓋彼以從容制和而其操術常行乎和之外是以利伸否蟠而進退皆得而我方且仰首於人以聴和與不和之命謀國者惟恐失金人之驩而不為久逺之計進則失中原事機之㑹退則沮忠臣義士之心蓋我以汲汲欲和而志慮常䧟乎和之中是以跋前㚄後而進退皆失自宣和靖康以來首尾三四十年金人専持此計中吾腹心决䇿制勝縱横前却無不如意者而我墮其術中曾不省悟危國亡師如出一轍去嵗之事人謂朝廷其知之矣而解嚴未幾敵使復至彼何憚於我而遽為若是是又欲以前䇿得志於我而我猶不悟也受而報之信節未還而海州之圍已急矣此其包藏反覆豈易可測而議者猶欲以已試敗事之餘謀當之其亦不思之甚也哉至於請復土疆而兾其萬一之得此又不思之大者夫土疆我之舊也雖不幸淪没而豈可使彼仇讎之敵得以制其予奪之權哉顧吾之徳之力如何耳我有以取之則彼將不能有而自歸於我我無以取之則彼安肯舉吾力之所不能取者而與我哉且彼能有之而我不能取則我弱彼强不較明矣縱其與我我亦豈能據而有之彼有大恩我有大費而所得者未必堅也向者燕雲三京之事可以監矣是豈可不為之寒心也哉假使萬有一而出於必不然之計彼誠不我欺而不責其報我必能自保而永無他虞則固善矣然以堂堂大宋不能自力以復宗祖之土宇顧乃乞丐於仇讎之金人以為國家臣雖不肖切為陛下羞之夫前日之遣使報聘以是為請既失之矣及陛下嗣位天下之望曰庶幾乎而赦書下者方且禁切諸將毋得進兵申遣使介告諭纂承之意繼修和好之禮亦若有意於和議之必成而坐待土疆之自復者逺近傳聞頓失所望臣愚不能識其何説而切歎左右者用計之不詳也古語有之疑事無功疑行無名今敵以好來而兵不戢我所以應之者常不免出於兩塗而無一定之計豈非所謂疑事也哉以此號令使觀聴熒惑離心解體是乃未攻而已却未戰而已敗也欲以此成恢復之功亦已難矣然失之未逺易以改圖往者不可諌而來者猶可追願陛下疇咨大臣總攬羣䇿鑒失之之由求應之之術㫁以義理之公參以利害之實罷黜和議追還使人苟未渡淮猶將可及自是以徃閉關絶約任賢使能立紀綱厲風俗使吾修政事攘敵國之外孑然無一毫之可恃以為遷延中已之資而不敢懐頃刻自安之意然後將相軍民逺近中外無不曉然知陛下之志必於復讎啓土而無玩嵗愒日之心更相激厲以圖事功數年之外志定氣飽國富兵强於是視吾力之强弱觀彼釁之淺深徐起而圖之中原故地不為吾有而將焉往此不過少遲數年之久而理得勢全名正實利其與講和請地苟且僥倖必不可成之虚計不可同年而語也惟陛下深留聖意毋忽則天下幸甚至於四海之利病臣則以為繫於斯民之戚休斯民之戚休臣則以為繫乎守令之賢否然而監司之本也欲斯民之皆得其所本原之地亦在乎朝廷而已陛下以為今日之監司奸贓狼藉肆虐以病民者誰非宰執臺諫之親舊賔客乎其既失勢者陛下既按見其交私之狀而斥去之矣尚在勢者豈無其人顧陛下無自而知之耳然則某事之利為民之休某事之病為民之戚陛下雖欲聞之亦誰與奉承而致諸民哉臣以為惟以正朝廷為先務則其患可不日而自革而陛下似亦有意乎此矣蓋目前所號召數君子者皆天下所謂忠臣賢士也所正朝廷之具豈有大於此者哉然其才之所長者不同則任之宜者亦異願陛下於其大者使之贊元經體以亮天工於其細者使其居官任職以熙庶績能外事者使任典戎榦方之責明治體者使備拾遺補過之官又使各舉所知布之列位以共圖天下之事使踈而賢者雖逺不遺親而否者雖邇必棄毋主先入以致偏聴獨任之機毋篤私恩以犯示人不廣之戒進退取舎惟公論之所在是稽則朝廷正而内外逺近莫敢不一於正矣監司得其人而後列郡之得失可得而知郡守得其人而後屬縣之治否可得而察重其任以責其成舉其善而懲其惡夫如是則事之所謂利民之所謂休將無所不舉事之所謂病民之所謂戚將無所不除又何足以勞聖慮哉苟惟不然而切切然今日降一詔明日行一事欲以惠民而適增其擾者有之欲以興利而益重其害者有之紛紜叢脞既非君道所宜宣布奉行徒為觀聴之美而已則亦何補之有况今旱蝗四起民食將乏圖所以寛賦役備賑贍業流逋鎖盜賊之計尤在於守令之得其人而其本原之地則又有在願陛下深留聖意毋忽則天下幸甚蓋天下之事至於今日無一不弊而不可以勝陳以獻言者之衆則或已能畧盡之矣然求其所謂要道先務而不可緩者此三事是也夫講學所以明理而導之於前定計所以養氣而督之於後任賢所以修政而經緯乎其中天下之事無出乎此者矣伏惟陛下因此初政端本正始自貽哲命之時因時順理乗勢有為之㑹於此三言深加察納果㫁力行以幸天下則夫所謂不可勝陳之事凡見於議者之言而合乎義理之公切於利害之計者自然循次及之各得其所若其不然今雖有求治之心而致之不得其方雖有致治之方而為之不得其序一旦恭勞儉苦憂勤過甚有所不堪而不見其效則亦終於因循怠惰而無所成矣豈天下之人所以延頸舉踵而望陛下之初心哉至於是時雖欲悔之臣恐其倍勞聖慮而成效不可期也又况旱蝗之灾環數千里陛下始初清明行誼未過而天戒赫然若是其甚其必有說矣臣愚切以為此乃天心仁愛陛下之厚不待改過行失其先致其警戒之意以啓聖心使盛徳大美始終純全無可非間如商中宗周宣王因異而修徳以致中興也是宜於此三術屢省而亟圖之以順民心以答天意以陛下之聖明必將有以處此愚臣所慮獨患議者不深維其所以然之故以為其間不免有所更張或非太上皇帝之意者陛下所不宜為以咈親志臣切以為誤矣恭惟太上皇帝至公無心合徳天地臨御三紀艱難百為其用人造事皆因時循理以應事變未甞膠於一定之説先後始末之不同如春秋冬夏之變相反以成嵗功存神過化而無有毫髪私意凝滯於其間其所以能超然逺引屣脱萬乗而不以為難者由是而已本其傳位陛下之志豈不以陛下必能緝熙帝學以繼跡堯禹乎豈不以陛下必能任賢修政以惠康小民乎誠如是也則臣之所陳乃所以大奉太上詒謀燕翼之聖心而助成陛下尊親承志之聖孝也議者顧欲守一時偶然之跡一二以循之以是為太上皇帝之本心則是以事物有形之粗而語天地變化之神也豈不誤哉且古者禪授之懿莫如堯舜之盛而舜承堯禪二十有八年之間其於禮樂刑政更張多矣其大者舉十六相皆堯之所未舉去四凶皆堯之所未去然而舜不以為嫌堯不以為罪天下之人不以為非載在虞書孔子錄之以為大典垂萬世法而况臣之所陳非欲盡取太上皇帝約束紛更之也非貴其所賤賤其所貴而悉更置之也因革損益顧義理如何耳亦何不可而陛下何以之有哉願早圖之以幸天下毋疑於臣之計也若夫戰守之機形制之勢則臣未之學不敢妄有所陳然切念上流督帥物望素輕黜陟宜效於已試下流戍兵直棄淮甸長江之險與虜共之斯乃古今之所共憂愚智之所同惑臣雖鄙闇亦切疑之况今秋氣已高敵情叵測傳聞洶洶咸謂當復有去嵗之舉雖虚實未可知然是二者實强弱安危形勢所係呼吸俯仰之間未足以喻其急也願陛下并留聖意臣不勝大願臣凡愚不學頃嵗冒昧羣試有司太上皇帝賜之末第獲叨官祿既又誤聴人言猥加収召適以疾病留落不前今則血氣益衰精神益耗屏居山田未知所以仰報大恩之日敢因明詔罄竭愚衷昧死獻書以聞古文集成巻五十六
