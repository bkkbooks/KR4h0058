body:
  text: 古文集成巻三十四宋王霆震編前戊集四論亷論篔䆫亷者吏之元氣也他能枝榦也枝榦彊而元氣弱則所謂彊者不足以樹福適所以賈患今之人固有夷常齷齪無赫赫名而得免於謗藪者以其亷也亦有吏事魁梧機惠捷出而為君子之所不恕者以其貪也貪之不如亷信矣然亷者吏之常也設若饕餮嗜利如漁獵然則何吏之為然則亷固未足深異也乃今天下見能吏不甚掛口見亷吏則景星也鳳凰也競喜幸歆艶之其異之若是豈常者足為異邪夫異蓋生於少也天下皆亷則貪者異天下皆貪則亷者異嗚呼為天下而至於使亷者異亦重可歎矣惟其然也故為小人者則曰當貪之世吾可以飽貪之利浚吾溪洞吾壑務得而已矣於是乎益貪其中人者曰吾與彼姻黨也故等夷也彼皆然吾奚為不可夫亦與世同波而已矣於是乎益貪其中人以上者則曰彼為彼我為我彼雖濁而我清焉彼雖汚而我潔焉逮夫清不勝濁則見忌於濁潔不勝汚則見嫉於汚忌嫉之心生則胥譸張為怨怨不已則罵且攻隨之以一二而受千百之罵且攻則亦有不堪焉者矣夫是以心雖不貪而亦不得以安行於亷嗟夫小人不足責中人難深責中人以上固可喜者也而亦不得以安行焉亷吏之難得也如此哉曰天下固有忌之而不沮嫉之而不困罵且攻之而不挫不回者豈以不得安行而遂輟於行哉特不多見爾然吾有説焉當亷而不亷貪也不當亷而亷亦貪也當亷而不亷者貪於利不當亷而亷者貪於名其所以為貪者不同而皆不免於議也世之君子固有枯槁自命皓不淄俗以弗愛禄養為髙以屏絶人事為介斯亷也亦非所以為天下訓也然則將柰何曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰吾聞諸孟子者如此作論亷去能論程大昌能莫大於無能而有能為下名莫大於不可名而可名為小夫有形於専専故偏而易見無冺於兼兼故莫得窺其全孰知偏全之分而擅不可名之能者其知宰相之體乎天子之臣一職一事等而上之各有所職而惟宰相無職天下之才明可折獄文可典禮武且仁者可為司冦司馬而不聞長於某者可為宰相惟其無職故無所不職惟其無長故無所不長此其能髙視天下而獨制其表也歟今夫元氣之散也得其温且燠者物資以生得其凄且肅者物資以成信有能矣方其含四氣於未形而求生且成其可能乎能生是春而已誰與啓秋能成是秋而已誰與發春惟其自處於不生不成之外則生生而不自生成成而不自成也是無能之能而非有能之能也知此可以論大能矣書曰如有一个臣斷斷猗無他技其心休休焉其如有容人之有技若已有之夫惟其無技也故凡有技者惟我容亦惟我用若彼以其技而吾亦以其技則我與彼同物於物而曾不能以相髙其能裁品長短而運用之歟故用技者之不可有技也非禁其有也亦不容有也昔者房杜之佐唐也帝定禍亂而房杜不言功王魏善諫而房杜遜其直英衛善用兵而房杜濟以文夫自迹觀之房杜其亦無能矣君定亂而我不著功人善諫而我不著直人善用兵而我不能武合是數者皆無有也而公議賢之何賢乎賢其不専而兼不偏而全得體故也使房杜亦計其功則濟武之文孰與經之使房杜自行其直則王魏之直必不能相遜下也惟其自處於無能故能自冺於無迹所謂輔相彌縫藏諸用使斯人由而不知乃其房杜之大者歟冗官論楊誠齋任官者寜以事勝人無以人勝事寜以恩棄人無以人棄恩先王之時一事一官也不惟一事一官也蓋有數事而一官也以一官而任數事是之謂事勝人事勝人故居官者日無餘暇而身無餘力心無餘思無餘思則明無餘力則精無餘暇則不懈精明而不懈則一人無餘也而治百事有餘矣况數事今則不然一官而數人居之一事而數人治之數人而居一官則不競其公而競其私數人而治一事則任其功而不任其責甲則曰吾之官正也彼則増也乙則曰官無異官事無異事也我何增爾何正焉至於事之闕而不理民之不恱而有辭上以責之則皆曰非我也責將誰執哉此以人勝事之病也先王之時官者不於才未論之先而禄者必於位既定之後以才詔官則非才不官也以位詔禄則禄不及於無位矣非才不官則天下願官者不僥於官而趨於才禄不及於無位則天下干禄者不冐於禄而求有所立以得位蓋有有才而不官有所立而不位者矣未有不才而官無立而位者也則禄之為禄誰得竊取而素餐之是之謂寜以恩棄人今則不然人有餘而官不足於是有無官而増官官有餘而位不足於是有無位而制禄夫有是人有是官有是位而禄之蓋曰子大夫之勤也不可以不食也今也臨無民也治無事也而創為空虚之名以為之位而賦之禄不曰禄之棄耶此以人棄恩之病也昔者堯舜在上禹臯䕫龍在下何其事之多而人之寡也一日萬幾事不多耶而臯陶一人也明刑則斯人焉弼教則斯人焉制蠻夷則斯人焉治冦賊則斯人焉刑也教也蠻夷也冦賊也是得為細事耶舉數大事而一士師之官兼之而數事如一事也大事如細事也則天下之官有下於士師而天下之事有小於此數者其有以人勝事者乎三代之士蓋有貧而禄仕者矣疾而食於上者矣抱闗擊柝也乘田委吏也此貧而禄仕者也然士則禄仕也而非抱闗擊柝非乘田委吏則禄亦有及之者乎無也則必有職而且功也瞽者食於樂跛者食於門此疾而食於上也然人則食也而非能樂非能門則禄亦有及之者乎無也則必有事而且勞也則當時之禄其有以人棄恩者乎古今之官蓋未有冗於今日者也祖宗之制每路監司提轉而已今日提専之外又有提鹺茗常平者焉郡有常賦賦有常入更運牙籌足矣不可以無官長也臨之以一轉運足矣今則有使有副又有判焉小郡兵馬之官至於五六人而同一職小邑征稅之官至於二三人而共一事以人勝事莫甚於此老氏之宫嶽靈之祠率建官以領焉自宰執侍從之斥者歸老者與夫庶官之一命以上而貧者惰者客者髙之為置使為提領卑之為主管為監此何職哉此職何事哉國之安危民之休戚政之利害不知也而一日不廩之則怨問之則曰我奉祠也如是者千百焉國得而不貧民得而不病耶以人棄恩莫甚於此楚人有拙於耕者患於踐其所種而莫之生也則以數人肩輿而已坐於上以種焉自以為計之得也既而鄰田之稻已生而已之稻不生夫楚人者非不知愛稻也而愛非其愛也以已之不踐之為不踐而忘其數人之踐為踐之大也設官以為民也恐官一人之不治而以數人治一官得無踐吾民者多耶人之毁瓦畫墁而得食則食人與食於人者交受其笑制禄而食功也以士大夫之無位而創為奉祠空虚之位以禄之得無與毁瓦畫墁者類耶臣願朝廷痛革其弊毎路之監司止設提轉之一職而運轉止於一員析鹺茗以𨽻於刑舉常平以歸於漕則監司之冗員省矣大郡之兵官不踰於二而小郡則止於一大邑之征稅設官者一而小邑則兼以令丞至於幕職有簽書而又有判官者簿尉之可以併省者則存其一而廢其一則郡邑之冗員者省矣庶乎人不勝事也先嚴任子試吏之法三嵗一試而補吏者不過五百則來者徐而官曹漸清然後乘其清而去其浮食所謂祠禄者一切罷之庶乎不以人棄恩乎嗟乎不制其來勿病其衆不散其衆勿病其冗前之説行所以制其來而散其衆也制之散之而後去其冗則盡去天下之冗官而天下有不覺者矣覺且不覺也怨且得而怨也耶備官論程大昌一代之興必則其治之煩簡以定建官之制多寡一定後世因焉人與員不容不相當也人多於員則為冗人不充位則為闕冗非也闕亦非也惟其稱焉可也唐虞之建官以百周人益之為三百六十其多寡固有定制矣以其員之百而受之以三百六十則人無所容及其員之既為三百六十而止以百人處之則事無所屬故冗之與闕其失均也書曰兢兢業業一日二日萬幾無曠庶官天工人其代之曠之為言闕也一日二日而其幾萬者天以委君而君以付人者也一官曠則一事隳曠者多則隳者不容言也故上而朝廷之官總治之大者列為九官是九官者如人之有耳目也口手也相須致用而後成其為人也世豈有視而不聴言而不作者哉是故貴其備也九官之設自百揆之外治禮者不預於典樂而作虞者不兼於納言人各有官官各有掌無相叅也有夷無䕫韶音必虧有益無龍民言不通九官之官也孰可曠哉嘻以舜為君而禹相之官之定員猶不可闕而謂後世可闕歟謂其可闕則併省其員以貽方來可也省之不可而直闕焉吾恐天工之無代也詩曰濟濟多士文王以寜又曰維仲山甫愛莫助之聞以多士為夸矣未聞以寡士為美也聞以無助為歎矣未聞以多助為累也且天下之事又有大不可者人之智慮雖不一稟而其精力要亦有限盡心一邑者至戴星出入僅勝百里之政而振職内史者至積旬稽審而後勑詔不相背戾若官闕事叢直以人兼焉彼智力竭則苟而已嗚呼其何便焉孔子曰修廢官四方之政行焉夫官者政之所托也官廢而不修則政墜而無托故官之廢者尚當修之以行其政豈有有官而無人坐視曠闕而不為之慮哉吏論止齋昔者秦之趨亡非一道也而其若是其亟者吏不肖也吾觀始皇之初陋三代之封建其弊至於戰國髖髀相依以蹙王室故夷其城而郡縣之其慮誠逺矣既而天下之吏習於嬴氏之暴斬艾斵剥草芥其民而弊之重之以頭㑹之斂閭左之徭又重之以阿房驪山土木之役當時之吏非殘忍侵漁痛民以逢其君者則貪釁幸災不逞之人也於是民之欲亡秦者十户而八九矣闗東之豪投袂而起一呼響從毛奮而鱗集戮力以傾秦族者不可勝計烏合之師所至如破竹者大率皆郡馘其守邑俘其令以應之者也不然則吏為自全之計挈地以賂敵而市一旦之命者也又不然則談士掉三寸之舌傳檄而風靡者也亦孰為秦守哉其閒黨秦之惡不肯遽臣妾如三川之守由南陽之守齮泗川之守壯亦徒驅欲潰之民疾鞭而戰之不敗而塗地則亦為降虜而已亦奚救於秦之斃耶秦以虎噬之彊尺攻寸取以吞天下一旦有變三十六郡皆無人之墟子嬰之席未煖而天下為漢何也秦人之憂素不及吏也故夫天下之禍莫大乎視以為常而不之憂者皆他日之所不及支也且天下不可以一人守分疆析壤環居而羅衛之者皆吏也吏之不肖人主將誰倚仗哉而朝廷之上方病夫財之不豐兵之不彊以為大患至於守令之姦民號而訴者牘相銜也則謾不之省重者不過罷去次則賄免而已舒之嵗月民之寃血未乾而謫籍之書又以恩貸矣甚者至於公卿大夫貪沓冗耗以不勝任聞者皆剖之符而左遷之嗟夫不意父母斯民之職而為逐臣之淵藪也有秦之弊幸而無秦之亂吁可畏哉可畏哉循吏論東萊風俗之變初無常也道隆則從而隆道汙則從而汙曷嘗有古今之異哉昔之陋儒以為風俗自厚而之薄猶人自少而之老古之俗厚猶人之方少者也今之俗薄猶人之已老者也薄者不可復厚亦如老者不可復少嗚呼何其不思甚邪將以三皇之俗為厚乎則黄帝之末胡為有蚩尤之亂將以五帝之俗為厚乎則帝舜之世胡為有三苗之亂將以三王之俗為厚乎則夏商之季胡為有桀紂之亂蚩尤之亂無以異項羽之亂也亂既除而俗有厚薄之異者非秦民之不如古特髙帝不如黄帝耳三苗之亂無以異七國之亂也亂既除而俗有厚薄之異者非漢民之不如古特景帝之不如大舜耳桀紂之亂無以異煬帝之亂也亂既除而俗有厚薄之異者非隋民之不如古特太宗之不如湯武耳自古及今同戴一天同履一地同賦一性日月不變也耳目鼻口亦不變也風俗何為不如古哉善乎魏鄭公之言曰五帝三王不易民而教行帝道而帝行王道而王顧所行何如耳若人漸澆詭不復返朴今當為鬼為魅尚安得而化哉蓋嘗觀韓延夀之治潁川而益信風俗之未嘗不如古也蓋承戰國孤秦之弊禮樂廢弛異端並奮世以古先王化民之道為姗笑賢如髙帝乃曰以馬上治之安事詩書賢如文帝乃曰卑之無甚髙論賢如宣帝乃曰漢家自有制度本以霸王雜之君臣上下同趨於刑名法律簿書期㑹之間無復逺畧惟延夀承潁川趙廣漢告訐之俗獨能取世所姍笑為陳腐迂濶者次第而行之百姓遵用其教至於賣偽物者棄之市道其在東都馮翊如潁川之治洋洋乎絃誦之聲肅肅乎俎豆之容庶幾乎治古矣謂風俗不可復古者果何如哉大抵後世之患出於待古太髙而待已太卑惟待古髙故自疑而不敢為待已卑故自棄而不復為殊不知三代雖逺其理常存苟能盡其理則夫何逺之有哉故萬石君處家而子孫燕居申申此一家之三代也王烈居鄉而訟者望廬而還此一鄉之三代也魯恭治中牟而童子不取乳雉此一邑之三代也延夀之治潁川庸非一郡之三代乎以是論之則風俗古不必厚今不必薄古不必易今不必難惟其行而已安可是古而非今哉古文集成巻三十四
