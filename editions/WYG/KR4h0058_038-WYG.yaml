body:
  text: 古文集成巻三十八宋王霆震編前戊集八論治體論陳謙為大者不屑於其細而事之非甚迫者君子不枉已以從之也今夫千金之家必不肯為負販之所為詩書之後雖其甚窶終不敢鬻先世之圖籍何者所傷者大也夫位者姦之窺也名者孽之乘也揭二者而制於上巍焉而尊確焉而公圭芒崖角悶焉而不露是以無所於窺而無所於争如操其柄而䙝用之齪齪焉與民相貸於尋常彼習其勢之輕也則誰不欲如上之所為欲而不得則不肖之心誰憚而不發嗚呼計天下者豈下顧區區之小利而深防乎亷隅之際者以此昔晁錯之為漢謀欲令民入粟以授爵免罪夫上之獲利以佐國也下之脫禍以省刑也一舉而二利從至便也而識者毎不可曰長惡而傷死也儒之論大抵迂濶而不切時變然使稍知體者觀之慮稽其弊則寜不食而死無寜貿貿然以自蹙也今天下所可慮徇一切而忘大體也淫湎者先王所禁今反觀焉減榖粟之養盛醪醴之設白晝大都之中列倡優具帷帟耀市人而招之曰吾酣爾吾色爾此甚可愧也負乘者聖人所戒今反誘焉閭巷之子儈賈商俠輕剽以逐什一之利輩流所不齒國家捐吾身而委之曰吾官爾吾禄爾此甚可惜也問其然曰利之也豈惟是哉牒數萬以髠天下絲粟之入耳滋異端耗生齒不恤也楮數寸以權有無嵗月之智耳長奸偽濫桎梏不顧也夫伐氷之家不與民争利而詭遇以獲禽一藝者所羞為至於朝廷獨安為之玩其細而忘其大愚恐天下之窺且争也一二年僅有寢者以今用度而欲盡革是固難也然今之言治者動皆欲堯舜其君至反革其所為中智以下有不敢刮目焉然則去其太甚亦當柄者之所宜講也賈子曰使管仲而愚人也則可管子而少知體豈不為之寒心哉作體論治本論陳謙天下喜寛而惡嚴便簡而刻詳㳂人之情至無已也然則㳂之乎雖然深於治道者不能不懼於此也盖天下有至迫之機其狀常麗於歡欣愛順之中而渙於乖獷不相受之際君子固憂大渙而幸夫麗也無寜亦㳂而重毒之也昔者漢秦之先其世醇其政仁其有司賢且恕曰我以治之云耳應而無倡也補而無缺也彼與天下從事於誶訶之域未數數也夫故其民便安之浸入之心膂念慮竭於上而無遺數百年而治未冺也嗚呼不幸而天下不得如昔者之無事則棼吾求理也泛吾求底也不至與之俱靡而已矣待之紓故承之也安安之者可乆之道容之大故受之也樂樂之者不懈之術也吾觀今之時法宻也非紓也事悉也非大也其為見近而非逺其為謀拙而非工其為說蔽而不通也斂焉燎也搉焉癘也征焉禦也今之吏非是三者無議也今之民非是三者無抵也國之大民之細至絶也立法而置之掩其口腹之尋常而與之為市市之不酬而還與之為仇勢至蹙事至不美也是奚足哉數百里之地設數大穽棊而布之武夫悍吏苟逃責大體不恤也不必譏也真征而已矣不獨征也真攘而已矣行者重趼而逺避迂險而深逝虎視吏坎乎視國也非苛政而奚若然而獻計者猶曰無顧足國耳嗟夫足國而蹙其本拔本而救其末何如其智也昔文王之政賦不二澤不禁闗不征今之吏皆犯之矣人之虐於斯讟於斯聚族歎於斯非一日也幸而天下未有故孰測其倪涇原之卒長安市上之呼去爾架除爾陌撤爾僦有不争赴者乎夫履九軌之道短足而蹈武步可羈而束也倚之於窮蹊踧之於阨區計闕而支得鋌而險無擇也天下之勢其灼灼也如是嗚呼執天下之柄者其亦少察乎此也作本論治術論張耒嗚呼治天下之難也其為物也大而難舉其為情也雜而不類為之不得其要用之不中其節用力勞而功不成是故聖人本諸道而明於術凡吾所為術者制物以使入於吾之道也然則何其不直致吾之所欲而為是委曲迂緩而使之從也夫人之情使之從我而刧之以刑則成功難隂有以役其心使之不得不從我則成功易今夫欲天下之畏也而陳之以刀鋸欲天下之愛也而陳之以金帛此直致其畏愛者也夫刑戮賞賜非不足以立畏愛也使必陳其物設其具則刀鋸金帛亦不給矣且天下固有不愛金帛之賞者則賞之所不能恱也天下有不畏刀鋸之刑者則刑之所不能懼也故務求吾欲而直遂焉者其事煩其教粗吾與物以力相勝而物之從之也内有不伏之心而吾力之所不周者亂之所從起今夫四馬之於車也奔驟舒遲至難齊也夫人之於馬必待夫躬臨之而後如意耶則一車而四馭未能足也今以一御而四馬之遲速惟十指之聴者以吾所執者轡也以一轡之約制四馬之節者執馬之要雖欲不吾聴不可得也是先王之所以役天下者執天下之轡也今夫權衡之舉物也右仰則左俯右抑則左揚夫苟欲俯則卑之而仰者何與焉欲揚則舉之而抑者何與焉夫惟卑者有不能使之卑而後抑者用也舉者有不能使之舉而後抑者用也先王知天下之卑髙有不可以形為也故為其所以卑髙者而不為其形古之知是道者執天下之所以必從者如轡而制物理之必應者如衡四凶天下之巨姦也商容比干箕子商之望也舜欲使天下不犯於有司而度罪之不可以盡刑也取天下之巨姦者而擊之天下雖有悍彊不服者知所畏矣舜非徒能施刀鋸也能沮其不畏之情也武王得啇之善者而度其未可盡賞也取世之望者三人而尊禮之而商之為善者恱矣夫武王非徒知尊賢能也能動其恱我之心也故舜武王善執天下之轡者也昔梁惠王以利問孟子而孟子非之然其終曰未有仁而遺其親者也未有義而後其君者也何必曰利夫使不遺其親不後其君利之大者也梁王以為利而孟子非之何也孟子者以謂不求不遺於民而後民守之不求不後於民而後民先之彼以利而責望於民則民散而惟利之從而卒不獲吾之所求梁王之術疎而孟子之術精梁王之事拙而孟子之事㣲老子之道絀術者也其言曰將欲翕之必固張之將欲奪之必固與之又曰非以其無私耶故能成其私夫將翕而合之將取而奪之行其私以成其私是以暑致暑以寒致寒隂陽之所不能為也天之將寒也不以霜雪為之也金石烈土山焦者所以為今日之霰雪也天之將暑也不以蒸鬱為之也震風積雪者所以為今日之炎烈也故邀其反物之功不能逺守其復物之情不能伏故孟子之術祗是天下之衡也夫術有小大道有邪正天下之士徒見夫世之淺人執小術蹈邪徑而流入於譎詐之域而曰聖人無術直道而已矣嗚呼亦惑矣聖人之所謂直道非無術之言也過乎術者之言也故其道平易而常有成常人之所謂直道不及術者之言也故其道疎魯而多敗文王以仁義而王宋襄公以仁義而亡仁義同而存亡之勢異何也烏獲之力弛而不用遇盜而三揖之則盜知服矣無烏獲之力遇盜而揖焉則死矣文王過乎術者也宋襄公不及乎術者也而况乎聖人之未必不尚乎術也治具論陳謙天下不可以勝治也亦求其所以然而已矣形有格勢有禁彼之所以附我者吾不知其然也力可殫智可窮我之所以御彼者吾不知其然也今夫四肢百體之所運孰使則氣而已矣視聴照了之所及孰詰則神而已矣盖其為物也無迹而其為狀也無證悠然行乎萬物之表而不可控持及其索然消盡則亦漠然潰聱然戾也燕之南􅈎之北營豳之東西若是其曠且夥也而坐一人於堂奥之間使彼曠且夥者環而拱之合之而不離固之而不散嗚呼是豈徒然哉豈非有以隂驅而潜率之者邪是故古之為天下者必有紀綱維持之具凡天下之人繫之以區區之形盖轇轕齟齬而不定也至於心恱而誠服則不約而自定繩之以一切之法盖抑遏剪拂而不順也使之浸漬乎義理之所安則不待告語而自順吾求其順且定者不必其形也心可也不必其法也理可也然則心者盖維之之地而理者又維之之具也昔者三代之治惟其從事於内而置諸其外與之周旋乎哀樂之中而脫畧乎勉彊之際是以其民優游以入之安静以守之上下相馴數百年而不變而後世亦恃以為憑藉扶持之具今夫下之勢至難言也征搉峻而箠楚深法令繁而禁網宻天下之吏酷者逞其聰懦者縱其姦此其凡也自始至以迄於終更無他業也課辦否耳慮非願行也督責之嚴也迫趣之苛也而天下之民無歡心矣下之於上直以形相制而所謂心者漠然不相及也怵迫拘急之際剽者嘯者時接乎聴聞及其弭之也非力復不可制也則其勢可見矣且夫今有所謂學云者是淑之之具也今之吏名主之而實棘之也今有所謂農云者是安之之具也今之吏名勸之而實擾之也嗚呼有天下者而無其具上下以形相制則可呼而來亦可呌而去可約而合亦可約而散也鄉閭之人同宴於堂凶盜猝至則羣走而不顧何則形合而心異也左氏曰本先顛葉從之管子曰維不張一國從之韓子曰脈病而肥者死矣夫惟固其本張其維夀其脈而後天下治矣治機論陳謙事之不立也我知之矣執之者敗之也然則不可以執乎夫甚弊之俗不懲不可也苟懲矣不執不可也然則曷敗之天下之事其動有機夫機者發於至宻而藏於不可臆料今夫一事之立也昭昭然若揭日月而行也立的於此使過者皆得引弓而射之吾知其不足以成也何者天下之情不一衆多之口難制欲者不止議者無窮則吾心不得不徇吾説不得不搖事垂立而徇且搖者繼之則宜其不足以成也昔漢之患匈奴之彊也賈誼欲削之晁錯又欲削之二子發其謀而皆不享其成彼特恃必削之説以與之相抗於必争之中是以事未發而迹已暴於天下使之得自為謀者固乆也至主父偃之䇿則不然予之以意之所欲而吾無削之之名使之有不能不分之心而有不得不弱之勢嗚呼機之所動乃在於此故夫昔之持必然之説以律天下者未有能濟者也愚觀今之世上欲立一事革一弊則羣起而議之議之不勝則極力而撼之上之人亦極力而悍之捍之不勝則終舉而從之若然者是未得夫機之説也試以一二端論之郊賞之汰也任子之濫也庶官之冗且蠧也當世之君子未嘗不悒悒於此然其説大抵皆曰必去是否則曰必省是夫上之祖宗之已行下之人情之不順則吾之説不直夫惟其不直也故其隙之易破君子思夫事機之發不在於灼灼明辨之日亦不在於斷斷乖違之際郊賞不必廢省乎郊以遷乎賞如蘇文忠之云是機也任子不必廢嚴乎銓以難其任如近日之議是機也冗曹不必廢多其攝而缺其人如紹興之初是機也此機之可言者也其不可以告人者吾文不能悉數也夫三者之名舉不廢而吾之説獨行於其間人不得而議我不得而搖若是者可以立乎嗚呼有餘矣丙魏之佐宣帝號為樞機周宻以愚觀之則未也膠東户口如故而王成受賞惟其以必然者待天下持之愈急執之愈嚴彼進不得攻之使破則退而飾之以為欺然則安在其為周宻也易曰神而化之使民宜之是吾之説也作機論古文集成巻三十八
