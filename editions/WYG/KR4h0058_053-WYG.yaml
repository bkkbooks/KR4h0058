body:
  text: 古文集成巻五十三宋王霆震編前庚集七箴大寳箴張藴古唐太宗初即位幽州記室直中書省張藴古上今來古往俯察仰觀惟辟作福惟君實難主普天之下處王公之上任土貢其所求具寮陳其所唱是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎无妄固以聖人受命拯溺亨屯歸罪於己因心於民大明無私照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時調其慘舒三光同其得失故身為之度而聲為之律勿謂無知居高聽卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災壯九重於内所居不過容膝彼昏不知瑶其臺而瓊其室離騷經曰望瑶臺之偃蹇兮通鑑外紀紂作鹿臺為瓊室玉門羅八珍於前禮天官膳夫珍用八物注所食不過適口唯狂罔念丘其糟而池其酒紂為糟丘酒池長夜之飲勿内荒於色勿外荒於禽勿貴難得貨老子不尚賢篇不貴難得之貨勿聽亡國音禮記樂記内荒伐人性外荒蕩人心難得之貨侈亡國之音淫勿謂我尊而傲賢慢士勿謂我智而拒諫矜已聞之夏后據饋頻起亦有魏帝牽􅅂不止辛毗事安彼反側如春陽秋露巍巍蕩蕩恢漢髙大度撫兹庶事如履薄臨深戰戰慄慄用周文小心詩之不識不知書之無偏無黨一彼此於胷臆損好惡於心想衆棄而後加刑衆恱而後加賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鑒者妍蚩自生勿渾渾而濁勿皎皎而清勿汶汶而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心乎湛然之域遊神於至道之精知之者應洪纎而效響酌之者隨深淺而皆盈故曰天之經地之寧王之貞四時不言而代序萬物無言而化成豈知帝力而天下和平吾王撥亂戡以智力民懼其威未懐其德我皇無運扇以淳風民懐其始未保其終爰述金鏡唐張九齡上千秋金鑑録窮神盡聖使人以心應言以行包括治體抑揚詞令天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之諍臣司直敢告前疑舟扆箴六首李德裕唐李德裕傳敬宗立昏荒數游幸狎比羣小聽朝簡忽德裕上舟扆六箴表言心乎愛矣遐不謂矣此古之賢人篤於事君者也夫迹䟽而言親者危地逺而意忠者忤臣竊惟念㧞自先聖偏荷寵私不能竭忠是負靈鑒云云辭皆明直婉切帝雖不能用其言猶敕韋處厚諄諄作詔厚謝其意宵衣箴諷視朝希晚也先王聽政昧爽以俟鷄鳴既盈日出而視伯禹大聖寸陰為貴光武至仁反仄不忌無俾姜后獨去簮珥彤管記言克念前志正服箴諷服御非法也聖人作服法象可觀雖在宴游尚不懐安汲黯莊色能正不冠楊阜慨然亦譏縹紈魏志阜常見明帝着㡌被縹綾半褒䄂阜問帝曰此於禮何法服也帝黙然不荅自是不法服不以見阜四時所御各有其官事見魏相傳非此勿服惟辟為難罷獻箴諷斂求怪珍也漢文罷獻詔還緑駬鑾輅徐駈焉用千里厥後令王亦能恭已翟裘既焚晉武帝紀程據獻雉頭裘帝焚之殿前筒布則毁道德為麗慈儉為美不過天道斯為至理納誨箴諷侮棄忠言也惟后納誨以求厥中從善如流乃能成功漢騖前成帝諱沉酒舉白浮鍾魏叡魏明帝諱汰侈凌霄作宫帝復崇華殿時郡國有九龍見故改曰九龍殿凌霄闕忠雖不忤而善不從以視為瑱是謂塞聰辨邪箴諷任羣小也居上處深在察微萌雖有䜛慝不能蔽明漢之孝昭睿過周成上書知詐照姦得情燕盍既折王猷治平百代之後乃流淑聲昭帝贊昔周成以孺子繼統而有管蔡四國流言之變孝昭㓜年即位亦有燕盍上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名防微箴諷偽游輕出也天子之孝敬遵王度安必思危乃無遺慮亂臣猖獗非可遽數𤣥服莫辨觸瑟始仆栢谷微行豺豕塞路覩貌獻飱斯可戒懼端拱箴王元之天生蒸民樹之司牧開物成務膺圗受籙為君實難惟辟作福在以欲而從人不以人而從欲位既尊大時惟開泰漸忘焦勞或生懈怠乃有諌諍乃陳箴誡箴誡既艱斥君之過諌諍惟艱救君之禍君或好諌臣何不忠臣或盡忠君何不從君臣之義今古攸同普天之下人誰不賓如父如母為妾為臣虐之則讎撫之則親是以王者可畏非民率土之濱物何不足乃犀乃貝惟珠惟玉寒不被體餒不充腹是以聖人所寳惟榖無侈乗輿無奢宫宇當念貧民室無環堵無崇臺榭無廣陂池當念流民地無立錐御服煌煌有采有章一裘之費百家衣裳御饍郁郁有粱有肉一食之用千夫口腹勿謂豊財輕費之竭須知府庫聚民膏血勿謂彊兵征伐不息須知干戈害民稼穡賞罰者國之大柄喜怒者人之常情賞雖由已勿因喜而行罰雖在我勿因怒而刑喜賞或濫虧損天鑒怒刑不正枉屈人命大臣元老經邦論道禆補聰明于何不照樂成尹夀所以為其師友小臣閹宦執巾沃盥干議政事于何不亂竪刁易牙所以敗其國家孰為君子先人後己信而用之斯為至理孰為小人害物謀身察而斥之斯為至仁無好人辯或有虚誕喋喋之言侈而多訕無惡人詘或有淳質期期之口直而不屈浮圗之教乃戎乃蕃漢明之際始入中原行之既乆存而不論匃奴之種無義無仁秦皇之後常苦邊塵禦之以道踈而勿親計口授田兼并何有是謂仁政及于黔首約人署吏侵漁則少是謂能官惠于無告父天母地日兄月姊乃郊乃禋勸其孝悌左輔右弼前疑後丞一舉一動戒其驕矜罔或明察政體用傷罔或弛紊國經不張行乎大中之道漸乎無何之鄉游神乎簡易之域息慮乎清浄之場斯則妙有垂之無疆誰謂古道革而不還君或行之是亦非難誰謂淳風去而不返君或繼之是亦何逺慎始則多克終盖鮮朽索當手覆車在眼庸庸祗祗兢兢戰戰小臣司箴敢告旒冕鑒成箴陳同父紹熈元年上五閏失馭偽主僣竊綱常絲棼㝢縣𤓰裂干戈日尋湯沸火熱元元悴憔無所存活藝祖勃興天為民設受命之日兵刃不血痛兹版圖尚爾割截丙夜不安往就普說獨立門外衝冐風雪謀定戈指莫敢我遏首征揚州重進誅亟旋征澤潞李筠就殺復掩湖南保權力屈爰取荆南繼沖悚懾一鼓孟昶蜀城斯抜徂征嶺南劉鋹面縛馳使江南李煜踧踖傳檄吳越錢俶納國十餘年間憂慮危慄頭若蓬葆雨沐風櫛東征西伐天下始一解兵修貢降王在列絁袴麻鞋縁布衣褐訓練六軍法度階級太宗繼之乾乾夕愓親征河東督勵士卒人百其勇城無全堞下詔寛赦繼元乃伏收復漳泉洪進屏息真宗嗣之二祖是法契丹來冦人心業業刻意親征俯從凖䇿親御鞍馬躬秉黄鉞白旄一麾王師奮發我氣既盈敵氣斯竭稽首請和干戈載戢譬以禍福實頼臣弼於皇仁祖善繼善述未㡬元昊在西復悖謀臣勇將連年討伐邊民既困厥用亦乏厥後智高忽爾猖獗南嶺東西擾擾數月以時討平狄青之力靖康之難言之汗浹二帝北廵狼窠熊窟沙漠萬里風霜洌洌飛塵撲面驚弦慘骨國祚若旒孰任其責頼有高宗克紹前烈怱遽渡江心膽如折皇天降鑒風濤安帖所至成市暫都于淛顔亮兇熖震撼六合投箠采石意謂無越幸而倒戈自取夷滅壽皇履位求賢如渇崇事高宗孝心尤切二十八載始終無缺高宗上仙哀號哽咽四方來觀其容慘怛王業艱難坦然明白今王嗣位祖宗是則無湎于酒無耽于色色能荒人之心酒能敗人之德以宰相為腹心以臺諌為耳目以將帥為爪牙以尚書為喉舌登崇俊良斥退姦枿勿謂天高常若對越勿謂民弱實闗治忽勿俾禍起於蕭墻勿使患生於倉卒勿私賞以格公議勿私刑以虧國律勿侮老成之人勿貴無益之物勿妄費生靈之財勿妄興土木之役勿謂嚬笑之微而莫我知勿謂號令之嚴而莫我逆盡孝乃明王之治論相乃人主之職聖言不可侮人言不可咈傾耳乎公卿之言游心乎帝王之術勿謂和議已成而不慮乎逺圗勿謂大位已得而不恤乎小失當效夏王寸隂是惜當效文王日昃不食勿效夏王瓊臺瑶室勿效商王斮渉剖直如履薄冰深虞没溺如馭六馬竊虞奔軼勿謂微過當絶芽蘖勿謂小患當窒孔穴左右前後當用賢哲王惟戒兹民罔不恱草茅作箴敢告司闕古文集成巻五十三
