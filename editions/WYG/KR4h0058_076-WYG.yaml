body:
  text: 古文集成巻七十六宋王霆震編前癸集七問對設漁者對智伯栁子厚史世家智宣子以瑶為後智果諌弗聴智果别族於太史為輔氏瑶立是為智襄子智伯為政請地於韓康子康子使使者致万家之邑又求地於魏桓子桓子復與之万家之邑智伯又求蔡狼臯之地於趙襄子襄子弗與智伯怒帥韓魏之甲以攻趙氏襄子乃走晉陽三家以國人圍而灌之城不浸者三版沈竈産鼃民無叛意智伯行水曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也趙襄子使張孟談潜出見二子曰臣聞唇亡齒寒今智伯帥韓魏而攻趙趙亡則韓魏為之次矣二子乃隂與張孟談約而决水灌智伯軍智伯軍救水而亂韓魏翼而擊之大敗智伯之衆遂殺智伯盡㓕智氏之族斆齋批註智氏既㓕范中行志益大一篇主意合韓魏圍趙水晉陽智伯瑶乘舟以臨趙且又往來觀水之所自務速取焉羣漁者有一人坐漁智伯恠之問焉又意曰若漁幾何曰漁者荅臣始漁於河中今漁於海今主大兹水臣是以來曰又問若之漁何如曰漁者又荅臣幼而好漁始臣之漁於河有魦沙鱮似吕切鱣氊鰋於幰切者不能自食以好臣之餌日收者百焉臣以為小去之龍門之下伺大鮪焉夫鮪之來也從魴鯉數萬垂涎流沫後者得食焉然其飢也亦返呑其後愈肆其力逆流而上慕為螭龍及夫抵大石亂飛濤折鰭音耆禮記羞魚儒者夏石鰭禿翼顛倒頓踣音匐順流而下宛委冐懵牟孔切環抵溆而不能出嚮之從魚之大者幸而啄食之臣亦徒手得焉猶以為小聞古之漁有任公子者其得益大於是去而之海上北浮於碣音竭石山名求大鯨焉臣之具未及施見大鯨驅羣鮫逐肥魚於渤澥之尾震動大海簸掉巨島一啜而食若舟者數十勇而未已貪而不能止北蹙於碣石槁焉嚮之以為食者反相與食之臣亦徒手得焉猶以為小聞古之漁有太公者其得益大釣而得文王於是舍而來智伯曰以文王自比今若遇我也如何漁者曰嚮者臣已言其端矣始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利而不見其害主之家與五卿甞裂而食之矣是無異魦鱮鱣鰋也腦流骨腐於主之故鼎可以懲矣然而猶不肯寤又有大者焉若范氏中行氏貪人之土田侵人之勢力慕為諸侯而不見其害主與三卿又裂而食之矣脫其鱗鱠其肉刳其腸斷其首而棄之鯤鮞音而遺𦙍莫不備爼豆是無異夫大鮪也可以懲矣然而猶不肯寤又有大者焉吞范中行以益其肥猶以為不足力愈大而求食愈無饜驅韓魏以為羣鮫以逐趙之肥魚而不見其害貪肥之勢將不止於趙臣見韓魏懼其將及也亦幸主之蹙於晉陽其目動矣而主乃慠魚到切然以為咸在几爼之上方磨其舌抑臣有恐焉今輔果舍族而退不肯同禍注見前叚規深怨而造是謀主之不寤臣恐主為大鯨首解於邯鄲地名鬛摧於安邑胷披於上黨尾斷於中山之外而腸流於大陸為鱻鮮同薧音槁二字出周禮以充三家子孫之腹臣所以大懼不然主之勇力彊大於文王何有智伯不恱然終以不寤於是韓魏與趙合㓕智氏其地三分春秋之世晉自范氏中行氏智氏魏氏趙氏韓氏之卿各有采邑為晉卿春秋之末晉公室弱六卿强更相攻伐貞定王十二年智氏趙氏韓氏共伐范氏中行氏㓕之而分其地十六年智氏驕侈韓趙魏又共㓕智氏而分其地假陸賈對胡五峯迂齋批議論正大規摹開闊不可獨以文字觀而抑揚起伏假設高帝陸賈問對之辭尤可玩味全篇依迂齋批陸賈為漢高帝太中大夫時前說稱引詩書帝罵之曰乃公居馬上得之安事詩書賈再拜對曰臣竊以為陛下馬上之功不如項王也上曰何謂不如對曰天下初發難時秦軍常乘勝逐北項王獨破秦軍虜王離懾服諸侯將降章邯及欣翳西攻破函谷東繫死田榮蹙漢軍於榖泗困陛下於滎陽成臯七十餘戰未嘗敗北揚陛下失太公於彭城抑亡衆於滎陽跳身於玉門中伏弩於廣武勇不振於鴻溝既及羽於固陵必待信越而後敢戰此臣所謂不如也上曰是則然矣而我得天下項王失天下者何也賈對曰項王失信抑弑君意忌聴讒行姑息樂殺人殖貨利犯聖王之法此其所以失天下也陛下本以寛大長者受懐王入闗之命為天下除殘賊所過亡鹵掠赦秦降王子嬰財物無所取婦女無所幸約法三章父老唯恐陛下不為秦王揚此三代得天下之仁也項王負約王陛下於蜀漢陛下忍而就國用蕭何為丞相養其民以致賢人收用巴蜀還定三秦項羽賊殺義帝陛下舉軍縞素告諸侯而伐之此三代取天下之義也不齷齪自用多大畧得英雄心師張良任陳平將韓信此堯舜禹湯文武知人之明也以野戰略地之功譬狗以文墨議論之功為人此堯舜禹湯文武尚徳不尚戰之心也鎮撫百姓下令軍士不幸死者吏為衣衾棺斂轉送其家此堯舜禹湯文武哀鰥寡恤孤獨之政也此五者陛下所以得天下成大漢磐石之基非歟馬上一時之功乃河漢之波瀾起伏耳上忻然而笑曰設為之辭生言起吾意殊非腐儒之論吾欲治天下法先聖何若而可賈再拜對曰陛下及此言天下之福也天下法制自周幽厲掃蕩幾盡平莊之後浸微浸滅五霸假托仁義以自封其志不在於斯民至于七雄益以戰争强大為務秦據形勝以利誘民鬬取一時之勝而不知其勝為僥倖也遂安而行之居十有三嵗天下争起而亡之矣願陛下退叔孫通聘魯二生亦設為陸賈之辭使與張良四皓及如臣者共論所以承三代之宜定一代之典以幸天于以詔子孫以傳萬世上曰善然吾老矣不能用也明年丙午夏四月甲辰帝崩於長樂宫寥寥千餘嵗未有能明漢家承三代之宜者也又可論承漢家之宜乎大宋癸酉嵗有士嘆曰嗚呼天乎使陸生有是對而漢祖用其言則必六宫有制適庶有辨教養子弟有法后夫人嬪媍各得其所矣又安有戚夫人為人彘張美人以恨死趙王如意以酖死淮陽王友以餓死梁王恢以殺死燕王建絶嗣山朝武彊不疑幾於亂姓之事哉又安有審食其入於死誅不赦之辠而吕氏至於族㓕後世世有外戚之禍哉則必制國有法荆王賈楚王交代王喜齊王肥不封數十縣而伏羲神農黄帝堯舜禹湯文武及臯陶伊傅周吕之裔得血食矣則必體貌大臣韓信彭越之夷三族可悔蕭相國不繫獄黥布陳豨盧綰韓王信不背叛矣則必不襲秦故尊君抑臣而朝廷之上制禮以道謙尊而光乾剛不亢臣道上行致天地於交泰而大臣可以託天下委六尺之孤矣則必封建諸侯藩垣屏翰根深蔕固難於崩陷可以正中國四夷之分不至畏匈奴與之和親而首足倒置矣則必復井田之制不致後世三十稅一近於貊道冨者田連阡陌僣擬諸侯而貧民寃苦失職矣則必用靈制五刑使好生之徳洽於黎民不下三大赦以啓後世惠姦宄賊良民之原矣則必侍御僕從罔匪正人有疾病不枕宦者卧臨棄天下公卿大夫受顧命婦寺不得與而大正其終矣則必兼用仲尼立嫡與賢之法嗣天子繼離之明行乾之健不受制於母后遂飲為淫樂不聴政矣鳴呼天道往而必返三代之盛其有終不復者乎所以望後世也惰農者對孫定齋孫子學於天竺之山北登乎廪丘之上見一惰農焉驅羸牛曵朽索操不時之耒而耕乎烈日之中炎風薄其肌暑色燋其面人畜之汗交流而疲薾之聲不已孫子不知其惰也過而撫之曰叟何勤邪叟何勤邪人皆畏暑而叟獨若是其力邪往而視其田則宿土之若焦而蓬蒿之高三尺顧而循其牛則脊脅出乎外而蹄角之纍然者僅存細而察其鋤耰之具則外黄而朽中菌衣之集乎其上者若魚鱗焉仍之而未去也孫子矍然而驚曰此豈惰農者耶已而視其四隣之田則蒔者已蕃耘者已抽决水而注之滿塍環而綠者皆是而叟之田塊然其宿莽者猶在也孫子曰嘻信矣其果惰農者矣向吾見其力也不知其惰也見其耕也不知其晚也良農之田啓蟄也而耕鳴蜩也而耨授衣也而穫入暑而操其耒其名曰不時今雖勤且勞其後穫也必粗惜哉其初之惰也惰農者蹙然不悦曰吾豈樂為是惰者耶吾之家業農者十世矣吾見其鹵莽而耕㓕裂而耘其報也皆從其初若是者吾亦笑之矣今吾豈不自知耶顧吾之家十口而九其弱也吾以一夫之耕而仰哺焉者衆吾朝夕奔走焉猶懼口腹之不繼也方嵗之春田事既作食之艱也滋甚吾旦而起操耒而去之門則牽衣索飯者留而不我决也吾割而去之則一日之炊不贍而又吏之理我者役焉豪民之貸我者役焉僦我以居傭我以田凡有私乎我者盡役焉吾以一人之身而百役之是奉將耕也而奪之耕將動也而抽其力夫是以田之遲而種之晚也子又焉可尤吾之惰子欲哀吾之惰乎胡不告乎涖事者寛我征節我力而勤我恤焉則吾之惰也有瘳矣今不哀其窮而曰惟我是惰且子過矣子知農之惰亦知所以自惰者乎十嵗而讀書十五而能文二十而擢高科登膴仕高車大馬徜徉乎四方人皆曰士之力學者如是吾亦曰耕之勤而穫之早也今吾視子則不然子之才自視以為翹翹而挾古以為高斥今以為庸則子之田非不腴家貧而富於書羅六藝之羞列百家之饌曵輪蹄而充棟宇則子之耕具非不富問津乎師友之源染指乎聖賢之鼎渇而盈飢而豐隨所取焉必具則子之灌溉非不足三者備矣而耕之不及其時斂之不見其効方其少也猶不如人今壯且立矣吾視子之隣皆耕且穫矣而子獨塊然室於深山事童子之吟哦習癡兒之句讀木石之與曹猿鳥之與朋旦暮營營而蒼蠅同乎聲則子之耒耜毋乃晚而不時乎操不時之耒而耕於宿土之喧囂吾懼炎風烈日之傷子也子不謂子為惰士而反以我為惰農亦將有說乎孫子赧然失容困乎其辭而未有以對也惰農者笑曰嘻戯之矣子之惰不至是也而取才者惰焉夫是以棄子吾聞屈於人者伸於天吾力寡而病於耕人不我恤也而天或助焉故嵗之收也常獲螟蝗雀䑕之害無我及焉而隣之先種者或罹其患是天閔其窮而相我也焉知子之惰不有閔其窮而相之者乎且吾與子皆惰也而皆其小者焉猶不足以病子吾視世之惰復有大於此者食人之禄尸人之位飽食而遨遊荒其職而不思其憂名之曰為惰之尤而吾切以為羞故郡也而媮邑也而慵文吏之惰也其政荒武吏之惰也其兵弛其位愈尊而其惰愈大以至佐天子調隂陽擎槃水之重而措之閫外者天下名之曰將相而其為惰也實多機有可乘而不乗隙有可投而不投慮患之遲見利之晚驚脫兔於處女而悠悠以敗事者相繼也其為害不既多乎且夫吾與子之惰也惰於身彼之惰也惰於國惰於民較之吾與子則為瘳矣由是言之世之惰者庸有既乎於是釋然而笑悠然而散退而書其説以寘諸座右而警乎朝夕窮客逹主人問荅曽撙齋有窮客過逹主人主人為具客不識恠而問其名則堯之漿舜之泉禹之粮也反而思平時食淡而已孔蘖孟菜之外未嘗及箸焉今遽享此恐為殃遂固辭主人大笑以為玉食非近臣莫由得今以所自享者享客意客食淡乆必饜而思甘乃以不識辭客殆秪有窮分邪客曰誠如主人言則客有說更髙顧主人悟不悟爾食堯舜禹之食食於事者也食孔孟之食食於道者也食其食不道其道客自責而已客不自責它無責之者食其食不亊其事主人不自責天下獨不責主人邪一時人不責萬世獨不責主人邪眇然一身而百責集焉當是時窮客未必不為逹逹主人未必不為窮於其末也而為之劑量則堯舜禹之甘比孔孟之淡尤為易饜者饜孔孟盖有不思堯舜禹者矣饜堯舜禹未有不思孔孟以雪之者也敢以所自享者反享主人主人若未領㑹者已而悟曰客言然吾當辭事而就道客曰雖然遲矣不俟撤具而退古文集成巻七十六
