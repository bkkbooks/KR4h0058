body:
  text: 古文集成巻十宋王霆震撰前乙集四記諌院題名記司馬光迂齋批首尾二百來字而包括無餘識治體明職守筆力髙簡如此可以想見其人古者諌無官自公卿大夫至于工商無不得諌者此句關涉大漢興以来始置官夫以天下之政四海之衆得失利病萃于一官使言之其為任亦重矣居是官者當志其大捨其細先其急後其緩専利國家而不為身謀彼汲汲於名者猶汲汲於利也此一斡尤竒非温公不能此其間相去何逺哉天禧初眞宗詔置諌官六員責其職事慶歴中錢君始書其名於版光恐久而漫滅嘉祐八年刻著于石後之人將歴指其名而議之曰某也忠某也詐某也直某也曲嗚呼可不懼哉結尾三四語凜凜乎秋霜烈日待漏院記王元之迂齋批句句見待漏意是時五代氣習未除未免稍徘然詞嚴氣正可以想見其人亦自得體天道不言而品物亨歳功成者何謂也四時之吏五行之佐宣其氣矣聖人不言而百姓親萬邦寧者何謂也三公論道六卿分職張其教矣是知君逸於上臣勞於下法乎天也古之善相天下者自咎䕫至房魏可数也是不獨有其徳亦皆務于勤爾微見待漏意况夙興夜寐以事一人卿大夫猶然况宰相乎朝廷自國初因舊制設宰臣待漏院于丹鳯門之右示勤政也至若北闕向曙東方未明相君啓行煌煌火城相君至止噦噦鸞聲金門未闢玉漏猶滴徹蓋下車于焉以息待漏之際相君其有思乎其或兆民未安思所泰之四夷未附思所来之兵革未息何以弭之田疇多蕪何以闢之賢人在野我將進之佞臣在朝我將斥之六氣不和災𤯝洊至願避位以禳之五刑未措欺詐日生請修徳以釐之憂心忡忡待旦而入九門既啓四聰甚邇相君言焉時君納焉皇風于是乎清夷蒼生以之而冨庶若然則總百官食萬錢非幸也宜也其或私讎未復思所逐之舊恩未報思所榮之子女玉帛何以致之車馬器玩何以取之姦人附勢我將陟之直士抗言我將黜之三時告災上有憂色構巧詞以恱之羣吏弄法君聞怨言進謟容以媚之私心慆慆假寐而坐九門既開重瞳屢回相君言焉時君惑焉政柄于是乎隳哉帝位以之而危矣若然則死下獄投逺方非不幸也亦冝也是知一國之政萬人之命懸于宰相可不愼歟復有無毀無譽旅進旅退此一轉尤切竊位而苟禄備員而全身者亦無所取焉棘寺小吏王禹偁為文請誌院壁用規于執政者岳陽楼記范仲淹迂齋批首尾布置與中間狀物之妙不可及矣然最妙處在臨了㫁遣一轉語乃知此老胷襟宇量直與岳陽洞庭同其廣大後山詩話云文正為岳陽楼記用對語說時景世以為竒尹師魯讀之曰傳竒體耳傳竒唐裴所著小說也慶歴四年春滕子京謫守巴陵郡越明年政通人和百廢具興乃重修岳陽楼増其舊制刻唐賢今人詩賦于其上屬予作文以記之予觀夫巴陵勝狀在洞庭一湖衘逺山吞長江浩浩湯湯横無際涯朝暉夕隂氣象萬千此則岳陽楼之大觀也前人之述備矣然則北通巫峽南極瀟湘遷客騷人多會于此覧物之情得無異乎若夫霪雨霏霏連月不開隂風怒號濁浪排空日星隠曜山岳潜形商旅不行檣傾檝摧薄暮𠖇𠖇虎嘯猿啼登斯楼也立二柱則有去國懐鄉憂讒畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦鱗游泳岸芷汀蘭郁郁青青而或長煙一空皓月千里浮光躍金静影沉壁漁歌互荅此樂何極登斯楼也此亦一柱則有心曠神怡寵辱皆忘把酒臨風其喜洋洋者矣楼之變態萬狀而人情所感不過二端此一様人勝前一様人要之是知有己者而已嗟夫予嘗求古仁人之心或異二者之為何哉綴上生下不以物喜不以己悲人情所感不過上面二端而仁人之心出處只是一致憂樂不在已則在物故一致耳居廟堂之髙則憂其民處江湖之逺則憂其君是進亦憂退亦憂然則何時而樂邪其必曰先天下之憂而憂後天下之樂而樂歟夫子之道噫微斯人吾誰與歸結尾有力小竹樓記王元之東萊曰嘗聞之山谷云或傳王荆公稱竹楼記勝歐陽公醉翁亭記或曰此非荆公之言也某以謂荆公出此言未失也荆公評文章常先體制而後文之工拙蓋嘗觀蘇子瞻醉白堂記戯曰文辭雖極工然不是醉白堂乃是韓白優劣論耳以此考之優竹楼記而劣醉翁亭記是荆公之言不疑也黄岡之地多竹大者如椽竹工破之刳去其節用代陶瓦比屋皆然以其價亷而工省也予城西北隅雉堞圯毀蓁莽荒穢因作小樓二間與月波樓通逺吞山光平挹江瀬幽閴遼夐不可具狀夏冝急雨有瀑布聲冬冝宻雪有碎玉聲冝鼓琴琴調虚暢冝詠詩詩韻清絶冝圍棊子聲丁丁然冝投壺矢聲錚錚然皆竹樓之所助也公退之暇披鶴氅衣一無衣字戴華陽巾手執周易一巻焚香黙坐消遣世慮江山之外第見風㠶沙鳥煙雲竹樹而已待其酒力醒茶煙歇送夕陽迎素月亦謫居之勝㮣也彼齊雲落星髙則髙矣井幹麗譙華則華矣止于貯妓女藏歌舞非騷人之事吾所不取吾聞竹工云竹之為瓦僅十稔若重覆之得二十稔噫吾以至道乙未歳自翰林出滁上丙申移廣陵丁酉又入西掖戊戌歳除日有齊安之命己亥閏三月到郡四年之間奔走不暇未知明年又在何處豈懼竹樓之易朽乎後之人與我同志嗣而葺之庶斯樓之不朽也晝錦堂記歐公張子韶云予聞陳伯脩云歐陽公晝錦堂記無賢愚皆知其美至若喜雨亭記自非具眼目者未易知也唐子西語録云凡為文上句重下句輕則或為上句壓倒晝錦堂記仕宦而至將相冨貴而歸故鄉下云此人情之所榮而今昔之所同也非此兩句莫能承上句此為文之法也迂齋批文字委曲善於形容仕宦而至將相冨貴而歸故鄉此人情之所榮而今昔之所同也蓋士方窮時困阨閭里窮庸人孺子皆得易而侮之若季子不禮於其嫂買臣見棄於其妻舉其親者則踈者可知一旦髙車駟馬達旗旄導前而騎卒擁後夾道之人相與駢肩累迹瞻望咨嗟而所謂庸夫愚婦者犇走駭汙羞愧俯伏以自悔罪於車塵馬足之間此一介之士得志當時而意氣之盛昔人此之衣錦之榮也惟大丞相魏國公則不然前面意思本自淺陋得此一句斡轉公相人也先着此一句世有令徳為時名卿自公少時已擢髙科登顯仕海内之士聞下風而望餘光者蓋亦有年矣所謂將相而富貴皆公所冝素有回䕶非如窮阨之人僥倖得志於一時出於庸夫愚婦之不意以驚駭而夸耀之也然則髙牙大纛不足為公榮桓圭衮冕不足為公貴惟徳被生民而功施社稷勒之金石播之聲詩以耀後世而垂無窮此公之志而士亦以此望於公也豈止夸一時而榮一鄉哉公在至和中嘗以武康之節来治於相乃作晝錦之堂于後圃既又刻詩於石以遺相人其言以快恩讎矜名譽為可薄蓋不以昔人所夸者為榮而以為戒丞相之見却如此於此見公之視富貴為何如而其志豈易量哉故能出入將相勤勞王家而夷險一節至於臨大事决大議垂紳正笏不動聲色而措天下於泰山之安語壯可謂社稷之臣矣其豐功盛烈所以銘彛鼎而被弦歌者乃邦家之光非閭里之榮也占地步余雖不獲登公之堂幸嘗竊誦公之詩樂公之志有成而喜為天下道也於是乎書有美堂記歐公迂齋批將他用外郡宛轉假借比並形容而錢塘之美自見此别是一格嘉祐二年龍圗閣直學士尚書吏部郎中梅公出守于杭於其行也天子寵之以詩於是始作有美之堂蓋取賜詩之首章而名之以為杭人之榮然公之甚愛斯堂也雖去而不忘今年自金陵遣人走京師命予誌之其請至六七而不倦予乃為之言曰夫舉天下之至美與其樂有不得而兼焉者多矣故窮山水登臨之美者必之乎寛閒之野寂寞之鄉而後得焉覧人物之盛麗夸都邑之雄冨者必據乎四達之衝舟車之會而後足焉蓋彼放心於物外而此娛意於繁華二者各有適焉然其為樂不得而兼也今夫所謂羅浮天台衡嶽廬阜洞庭之廣三峽之險號為東南竒偉秀絶者乃皆在乎下州小邑僻陋之邦寛閑寂寞之地無盛麗雄富之觀此幽潜之士窮愁放逐之臣之所樂也若乃四方之所聚百貨之所交物盛人衆為一都會而又能兼有山川之美以資富貴之娛者惟金陵錢塘揚然二邦皆僣竊於亂世抑及聖宋受命海内為一兼説金陵錢塘金陵以後服見誅今其江山雖在而頽垣廢址荒煙野草過而覧者莫不為之躊躇而悽愴獨錢塘得金陵一邊此並形容則錢塘之美更覺精神自五代時知尊中國效臣順及其亡也頓首請命不煩干戈今其民幸冨完安樂又其俗習工巧邑屋華麗盛麗䧺富蓋十餘萬家環以湖山左右映帶而閩商海賈風㠶浪舶出入於江濤浩渺煙雲杳靄之間山水之美可謂盛矣而臨是邦者又皆朝廷公卿大臣如天子之侍從又有四方遊士為之賔客與窮愁放逐一句相應故喜占形勝治亭榭相與極遊覧之娛然其於所取有得於此者必有遺於彼獨所謂有美堂者収山水登臨之美人物邑居之繁一寓目而盡得之蓋錢塘兼有天下之美而斯堂者又盡得錢塘之美焉結宜乎公之甚愛而難忘也梅公清愼好學君子也視其所好可以知其人焉畫舫齋記歐公迂齋批文字宛轉以見出險而不忘險之意且言前日之險亦仕宦自取之爾予至滑之三月即其署東偏之室治為燕私之居而名曰畫舫齋其廣一室其深七室以户相通凡入予室者如入乎舟中其温室之奥則穴其上以為明其虚室之䟽以達則欄檻其兩旁以為坐立之倚凢偃休於吾齋者又如偃休乎舟中山石􅒞崒佳花美木之植列於兩簷之外又似泛乎中流而左山右林之相映皆可愛者故因以舟名焉周易之象至於履險難必曰渉川蓋舟之為物所以濟險難而非安居之用也今予治齋於署以為私所燕安而反以舟名之豈不戾哉矧予又嘗以罪謫走江湖間自汴絶淮浮于大江至于巴峽轉而入于漢沔計其水行幾萬餘里其覊窮不幸而卒遭風波之恐往往呌號神明以脫須臾之命者數矣當其恐時顧視前後凡舟之人非為商賈則必仕宦以仕宦比商賈因竊自歎以謂非冐利與不得已者孰肯至是哉頼天之恵全活其生今得除去宿負列官于朝以來是州飽廩食而安署居追思曩時山川所歴舟檝之危蛟鼉之出没波濤之洶歘宜其寢驚而夢愕而乃忘其險阻猶以舟名其齋眞樂於舟居者邪然予聞古之人有逃於世逺去江湖之上終身而不肯反者其必有所樂也反前説苟非冐利於險有罪而不得已使順風恬波傲然枕席之上一日而千里則舟之行豈不樂哉顧予誠有所未暇而舫者宴嬉之舟也姑以名予齋奚曰不宜予友蔡君謨善大書頗怪偉將乞其大字以題於楹懼其疑予之所以名齋者故具以告因以置于壁蘭堂記羅畸元祐四年予出而仕司法於滁五年季春作堂於廨宇之東南堂之前植蘭數十本微風飄至庭檻馥然予方休乎堂上欣然笑曰猗歟蘭哉是可以名吾堂蘭之為物幽而芳者也嘗讀楚辭每笑屈原喜命蘭以自况原之幽操峻節皭然自㧞於腐濁之俗而不受世汙染兹誠無愧於蘭矣然彼不知夫蘭之於所居非側僻險絶之層崖則幽荒寂寞之窮谷煩篠惡草相與䝉翳曽不得與黄茅白葦俱出而用於世顦顇窘辱極矣而蘭猶自若也原一不偶於楚輙自隕生為澤畔愁吟之覊客死為江上漂泊之游䰟又豈不知所謂無人而自芳者歟噫蘭之徳淡然不可以榮辱何其有道君子也故予之於蘭猶賢朋友也不敢輙玩之載以髙臺衛以脩檻所以㧞其卑汙而養其潔也冨竒不入吾庭者忌夫繁英縟彩之傷其質也嘉菊數叢錯峙而間列者懼其太孤易撓於風雨而以夫氣類稍同者助之也唯予之病於世乆矣而聞道晚世念一至往往顧影自咲軒楹之間徘徊閑吟而與蘭相值俯而視仰而思則釋然而自愧噫由斯以往朝於是焉襲蘭之馨莫於是焉擷蘭之英携書就觀引酒對酌庶幾乆與之俱化二友堂記澹庵上方側席髙人起左史福唐李公彌遜於釣築間將大用會南方告饑而廬陵特甚詔公作牧以字罷瘵既至櫛垢爬痒民獲蘇醒郡以大理則求所以慰憊懣者於視廬之偏得古松蔚然對植以竹開軒其下榜曰二友且為松竹主人命郡人胡某志之僕曰公山林十有五年窮崖怪􅊤家猿狖而宫魚龍宜於林水飽聞而厭觀者豈少此二物哉是蓋有説焉孔子曰巧言令色鮮矣仁夫能牧養小民恵鮮鰥寡必剛毅不囘之士然剛難不失之虐則奪於慾故曰棖也慾焉得剛而書則曰剛而無虐蓋不虐不慾可以言剛惟剛故能行仁公獨有取於松竹焉者非以其徳全於剛邪方公問於簿書日哦其中見夫檀欒膠轕冷風薄人清隂澡慮則思所以大庇我民以澣以濯見夫落落髙標陵轢霜雪有不可犯之色則思所以上列利病與當途要人争可否而不折見夫幽姿勁質鸞鵠對峙而不受鷃雀則思所以擊奸尚賢使君子有所恃而小人有所畏卒之雨暘以時物物得職威令神行恵澤川流仁周乎骩桑義髙乎偃伯曽不旬嵗而民和年豐是豈巧言令色四體若無骨者所能乎至若心逺地偏境與意會萬事不到胷次聴號鍾之松風挹寒塘之竹露遼歴物表便有濠濮間趣回視軒冕所謂九萬里則風斯在下矣雖然是固可友而不可屈公將羽儀天朝固不能屈之使西如磨頂者然能卓然特立臨大節而不可奪以措天下於泰山之安則豈惟無愧二友實丘壑䕫龍之友遯齋記澹庵余里人周召挾其有走行在䟽朝廷得失號一時狂直他日語余將買書歸築齋以遯且以遯名人其謂何余曰易有遯在象為大過春秋不見書盖遯非聖賢之得已也殆如詩考槃考槃賢者不得志退而窮處者作也子以一介草茅一言而善廟堂擇焉使待試禮部則與衛之賢者不得於時者異矣而欲遯焉左也雖然是固左已然衆方炙轂以昧進已獨脫屣塵軫作沐猴禪正自不惡請因考槃之義以鍵子之决夫考槃賢者處澗阿能成其樂者也其章言永矢弗諼永矢弗過永矢弗告鄭子云弗諼不忘君之惡弗過不入君朝弗告不告君以善道也歐陽子云弗諼不忘隠處之樂弗過獨樂不他適也弗告不告人以此樂也伊川子云弗諼不忘君弗過傷不得過君之朝弗告不得告以善也從鄭說則流而為行吟塗哭欎而獨嗔者之為也從歐陽説則流而為槁木凍灰往而不返者之為也從伊川説則流而為假隠釣名足巖壑而志城闕者之為也是三說者將安從子歸闡繹優游異不及排怨不及非有合於吾易喜好之吉則善矣反是君子或所不取古文集成巻十
