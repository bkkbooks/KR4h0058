body:
  text: 古文集成巻六十二宋王霆震編前壬集一河圖之文前七二後一六左三八右九四居中者五與十洛書之文戴九履一左三右七二四為肩六八為足五居中央晦庵啟䝉朱子曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此一節夫子所以發明河圖之數也天地之間一氣而已分而為二則為隂陽而五行造化萬物終始無不管於是焉故河圖之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中盖其以所以為數者不過一隂一陽一竒一耦以兩其五行而已所謂天者陽之輕清而位乎上者也所謂地者隂之重濁而位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數耦故二四六八十皆屬乎地所謂地數五也天數地數各以其類相求所謂五位之相得者然也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之此又其所謂各有合焉者也積五竒而為二十五積五耦而為三十合是二者而為五十有五此河圖之全數皆夫子之意而諸儒之説也至於洛書則雖夫子之所未言然其象其説已具於前有以通之則劉歆所謂經緯表裏者可見矣或曰河圖洛書之位與數其所以不同何也曰河圖以五生數統五成數而同處其方盖掲其全以示人而道其常數之體也洛書以五竒數統四耦數而各居其所盖主於陽以統隂而肇其變數之用也曰其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二是所以參天兩地者也三二之合則為五矣此河圖洛書之數所以皆以五居中也然河圖以生數為主故其中之所以為五者亦具五生數之象焉其下一㸃天一之象也其上一㸃地二之象也其左一㸃天三之象也其右一㸃地四之象也其中一㸃天五之象也洛書以竒數爲主故其中之所以爲五者亦具五竒數之象焉其下一㸃亦天一之象也其左一㸃亦天三之象也其中一㸃亦天五之象也其右一㸃則天七之象也其上一㸃則天九之象也其數與位皆三同而二異盖陽不可易而隂可易成數雖陽固亦生之隂也曰中央之五既為五數之象矣然則其為數也奈何曰以數言之則通乎一圖由内及外固各有積實可紀之數矣然河圖之一二三四各居其五象本方之外而六七八九十又各因五而得數以附于其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其類以附于竒數之側盖中者為主而外者為客正者為君而側者為臣亦各有條而不紊也曰其多寡之不同何也曰河圖主全故極於十而竒偶之位均論其積實然後見其耦贏而竒乏也洛書主變故極於九而其位與實皆竒贏而耦乏也必皆虛其中也然後隂陽之數均於二十而無偏爾曰其序之不同何也曰河圖以生出之次言之則始下次上次左次右以復于中而又始于下也以運行之次言之則始東次南次中次西次北左旋一周而又始于東也其生數之在内者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也洛書之次其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次東北而究于南也其運行則水克火火克金金克木木克土右旋一周而土復克水也是亦各有説者矣曰其七八九六之數不同何也曰河圖六七八九既附于生數之外矣此隂陽老少進退饒乏之正也其九者生數一三五之積也故自北而東自東而西以成於四之外其六者生數二四之積也故自南而西自西而北以成於一之外而七則九之自西而南者也八則六之自北而東者也此又隂陽老少互藏其宅之變也洛書之縱横十五而七八九六迭為消長虛五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉此變化無窮所以為妙也然則聖人之則之也奈何曰則河圖者虚其中則洛書者總其實也河圖之虚五與十者太極也竒數二十耦數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兑震巽艮者八卦也洛書之實其一為五行其二為五事其三為八政其四為五紀其五為皇極其六為三徳其七為稽疑其八為庶徴其九為福極其位與數尤曉然矣曰洛書而虚其中五則亦太極也竒耦各居二十則亦兩儀也一二三四而含九八七六縱横十五而互為七八九六則亦四象也四方之正以為乾坤坎離四隅之偏以為兑震巽艮則亦八卦也河圖之一六為水二七為火三八為木四九為金五十為土則因洪範之五行而五十有五者又九疇之子目也是則洛書固可以為易而河圖亦可以為範矣又安知圖之不為書書之不為圖也邪曰是其時雖有後先數雖有多寡然其為理則一而已但易乃伏羲之所先得乎圖而初無待乎書範則大禹之所獨得乎書而未必追考於圖耳且以河圖而虚十則洛書四十五之數也虚五則大衍五十之數也積五與十則洛書縱横十五之數也以五乘十以十乘五則又皆大衍之數也洛書之五又自含五則得十而通為大衍之數矣積五與十則得十五而通為河圖之數矣苟明乎此則横斜曲直無所不通而河圖洛書又豈有先後彼此之間哉晦庵書河圖洛書後世傳一至九數者為河圖一至十數者為洛書考之於古正是反而置之予於啟䝉辨之詳矣讀大戴禮書又得一證甚明當篇有二九四七五三六一八之語而鄭氏註云法龜文也然則漢人固以此九數者為洛書矣閤皂甘君叔懐欲刻二圖山中覽者未必深考又當大啟争端聊書以諗之慶元丁巳上元節日遯翁書推伏羲神禹畫卦作範之原辨劉牧易置圖書之失晦庵易學啟䝉孔安國云河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九類歆云伏羲氏繼天而王受河圖而畫之八卦是也禹治水賜洛書法而陳之九疇是也河圖洛書相為經緯八卦九章相為表裏關子明云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵子曰員者星也厯紀之數其肇於此乎厯法合二始以定剛柔二中以定律厯二終以紀閏餘是所謂厯紀也方者土也畫州井地之法其放於此乎州有九井九百畝是所謂畫州井地也盖員者河圖之數方者洛書之文故羲文因之而造易禹箕叙之而作範也蔡西山元定曰古今傳記自孔安國劉向父子班固皆以為河圖授羲洛書錫禹關子明邵康節皆以十為河圖丸為洛書盖大傳既陳天地五十有五之數洪範又明言天乃錫禹洪範九疇而九宫之數戴九履一左三右七二四為肩六八為足正龜背之象也惟劉牧意見以九為河圖十為洛書託言出於希夷既與諸儒舊説不合又引大傳以為二者皆出於伏羲之世其易置圖書並無明驗但謂伏羲兼取圖書則易範之數誠相表裏為可疑耳其實天地之理一而已矣雖時有古今先後之不同而其理則不容於有二也故伏羲但據河圖以作易則不必預見洛書而已逆與之合矣大禹但據洛書以作範則亦不必追究河圖而已暗與之符矣其所以然者何哉誠以此理之外無復他理故也然不特此耳律呂有五聲十二律而其相乘之數究於六十日名有十幹十二支而其相乘之數亦究於六十二者皆出於易之後其一數又各不同然與易之隂陽䇿數老少自相配合皆為六十者無不若合符契也下至運氣參同太一之屬雖不足道然亦無不相通盖自然之理也假令今世復有圖書者出其數亦必相符可謂伏羲有取於今日而作易乎大傳所謂河出圖洛出書聖人則之者亦汎言聖人作易作範其原皆出於天之意如言以卜筮者尚其占與莫大乎蓍龜之類易之書豈有龜與卜之法乎亦言其理無二而已爾合沙先生曰大衍之數與爻成七八九六而連山歸藏之文變統而謂之三易作於文王大衍之數五十者一與九為十二與八為十三與七為十四與六為十五與五為十共五十也其用四十有九者一用五行其數五二用五事其數五三用八政其數八四用五紀其數五六用三德其數三七用稽疑其數七八用庶徵其數五九用五福六極其數共十有一筭至四十九也五用皇極其數一不曰一而曰極大衍所虚太極之皇極之一適在五數五為六函三所引之數也於五十五數之中亦得夫四十有九焉此自然之理所謂河出圖洛出書聖人則之豈苟云乎哉學者試思之合沙先生曰八卦之位始于虙重于夏商衍于周作經於孔皆不易其方位實本河圖洛書之本文本數也其述作之意一歸於中所謂執中惟一之道皇極一而繫于五共得六數乃太極函三之引六也近太極莫若乾出中而居六位正吾曾子謂貫一之忠恕也用太極者莫若震故以震居三位蓋得六極函三之圓不動正吾子思所謂發而中節之和也判太極者莫若以與坤坎得其一坤得其二一即二矣二即三矣此水土所以並生於申善與惡陰與陽執其一者皆非道是曰失中而中庸之學不取也以大㮣論之一三七陽數布于四方分至之義二四六八陰數布于四隅啓閉之義求中氣而積閏之理也古文集成巻六十二
