body:
  text: 古文集成巻七十一宋王霆震編前癸集二辭歸去來兮辭并序陶淵明五臣註銑曰潛為彭澤令是時郡遣督郵至縣吏當束帶見督郵潛乃歎曰我不能為五斗米折腰向鄉里小兒乃自解印綬將歸田園因而命篇曰歸去來胡仔苕溪漁隠叢話曰韓子蒼云以淵明傳及詩攷之自庚子嵗始作建威參軍由參軍為彭澤令遂棄官歸是嵗乙巳凡為吏者六嵗故云疇昔居上京六載去還歸然淵明乙巳嵗三月尚為參軍下一月去彭澤而云家貧耕植不足自給何也傳言淵明以郡遣督郵至即日解印綬去而淵明自序以程氏妹喪去奔武昌余觀此上既以違已交病又愧役於口腹意不欲仕乆矣及因妹喪即去盖其孝友如此世人但以不屈於州縣吏為高故以因督郵而去此士識時委命其意固有在矣豈一督郵能為之去就哉躬耕乞食且猶不耻而恥屈於督郵必不然矣懶真子曰淵明之為縣令盖謂貧爾非為酒也聊欲弦歌以為三徑之資盖欲得公田之利以為三徑閑居之資用其非謂旋創田園也舊本云公田之利過足為潤後人以其好酒遂易為過足為酒遂有公田種秫之説且仲秋至冬在官八十餘日此非種秫時也故凡本傳所載與歸去來序不同者當以序為正定齋曰世謂淵明歸去來詞亦得漢魏之賦體而為是詞予以為不然賦則漫衍其詞體亦叢雜長卿長於叙事淵雲長於説理張平子而下着意以為之其律愈切而辭愈庳淵明盖沛然出肺腑中不見斧鑿痕如首云歸去來兮田園將蕪胡不歸間又云歸去來兮請息交以絶游疑為二章而自無端緒此如莊列言大道縱横飄忽而其中有繩削但人不得而窺蹈之耳冷齋夜話云李格非善論文章嘗曰諸葛孔明出師表劉伶酒徳頌陶淵明歸去來辭李令伯乞養親表皆沛然肺腑中流出殊不見斧鑿痕是數君子在後漢末兩晉之間未嘗以文章名世而其詞意超邁如此是知文以氣為主氣以誠為主東坡云歐陽公言晉無文章唯陶淵明歸去來一篇而已余家貧耕植不足以自給幼稚盈室一作兼稚子盈室缾無儲粟生生所資未見其術親故多勸余為長吏脫然有懐求之靡途㑹有四方之事諸侯以惠愛為徳家叔以余貧苦遂見用為小邑于時風波未静心憚逺役彭澤去家百里公田之利一作秫足以為酒一作過足為潤故便求之及少日眷然有歸歟之情何則質性自然非矯勵所得飢凍雖切違已交病嘗一作曾從人事皆口腹自役於是悵然慷慨深愧平生之志猶望一稔當斂裳宵逝尋程氏妹喪于武昌情在駿奔自免去職仲秋至冬在官八十餘日因事順心命篇曰歸去來兮乙巳嵗十一月也歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追翰曰悟已往之事亦不可諫而來事亦可追改謂雖為官今將歸去是追改也實迷途其未逺覺今是而昨非向曰言如人行迷失道路尚未逺可早迴也謂休仕也舟揺揺以輕颺風飄飄而吹衣問征夫以前路恨晨光之熹微良曰日欲暮也乃瞻衡宇載欣載奔僮僕歡迎稚子候門三徑就荒松菊猶存攜幼入室有酒盈樽引壺觴以自酌盼庭柯以怡顔倚南窗以寄傲審容膝之易安銑曰北郭先生妻云今結駰列騎所安不過容膝園日涉以成趣門雖設而常闗策扶老以流憩時矯首而游觀濟曰䇿杖以扶老弱周流而憩息也雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶游世與我而相遺復駕言兮焉求恱親戚之情話樂琴書以消憂農人告余以春一有及字將有事乎西疇或命巾車濟曰巾飾也或棹孤舟既窈窕以尋壑亦﨑嶇而經丘翰曰謂行舡以尋之駕車以涉之也木欣欣以向榮泉㳙㳙而始流羨萬物之得時感吾生之行休己矣乎寓形宇内復幾時曷不委心任去留胡為遑遑欲何之富貴非吾願帝鄉不可期濟曰帝郷即仙都也懐良辰以孤往或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乗化以歸盡樂夫天命復奚疑銑曰乗化謂乗其運㑹也和淵明歸去來辭并引蘇東坡東塾燕談曰東坡和歸去來辭謂湯稼之終枯遂不溉而不耔盖用嵆叔夜養生論夫為稼於湯世偏自一溉之功者雖終歸於焦爛必一溉者後枯然則一溉之益固不可誣也子瞻謫居昌化追和淵明歸去來辭盖以無何有之鄉為家雖在海外未嘗不歸云爾出三峯蔡夢弼註歸去來兮吾方南遷安得歸卧江海之澒洞淮南子鴻濛澒洞莫知其門弔鼓角之悽悲迹泥蟠而愈深時電往而莫追懐西南之歸路夢良是而覺非悟此生之何常猶寒暑之異衣豈襲裘而念葛盖得觕而䘮微我歸甚易匪馳匪奔俯仰還家下帷闔門藩援雖缺堂室故存挹我天醴注之窪罇窪俞矩切與窳同器空中也飲月露以洗心飱朝霞而眩顔混客主以為一俾婦姑之相安知盗竊之何有乃掊門而折闗廓圜鏡以外照納萬象而中觀治廢井以晨汲滃百泉之夜還守静極以自作時爵躍而鯢桓歸去來兮請終老於斯游我先人之弊廬復捨此而焉求均海南與漠北挈往來而無憂畸人告余以一言非八卦與九疇方飢須糧已濟無舟忽人牛之皆喪但喬木與高丘驚六用之無成自一根而反流望故家而永息曷中道而三休己矣乎吾生有命歸有時我初無行亦無留駕言隨子聴所之豈以師南華而廢從安期唐法師成𤣥英莊子䟽序莊子姓莊名周字子休生宋國睢陽䝉縣師長桑公子受號南華真人又劉向列仙傳安期先生者琅琊阜郷人也賣藥於東海邊時人皆言千歳翁秦始皇東遊請見與語三日夜王賜八璧度數千萬出於郷亭皆置去留書以赤玉舄一量為報曰後年求我於蓬萊下始皇即遣使者徐市盧生等數百人入海未至蓬萊山輙逢風波而還立詞阜郷亭海邊數十處云謂湯稼之終枯遂不溉而不耔師淵明之雅放和百篇之清詩子瞻和淵明詩一百有九篇賦歸去來之新引我其後身盖無疑和淵明歸去來辭蘇潁濵予謫居海康子瞻以和淵明歸去來之篇要予同作時予方再遷龍川未暇也辛巳嵗予既還潁川子瞻渡海浮江至淮南而病遂没於晉陵是嵗十月理家中舊書復得此篇乃泣而和之盖淵明之放與子瞻之辯予皆莫及也示不逆其遺意焉耳歸去來兮歸自南荒又安歸鴻乗時而往來曾奚喜而奚悲曩所惡之莫逃今雖歡其足追蹈天運之自然意造物之良非盖有口之必食亦無形而莫衣苟所頼之無幾則雖喪其亦微吾駕非良吾行弗奔心游無垠足不及門視之若窮挹之則存俯仰衡茆亦有一尊既飯稻以食肉撫簞瓢而愧顔感烏鵲之夜飛樹三繞而未安有父兄之遺書命却掃而閉闗知物化之如幻盍捨物而内觀氣有習而未忘痛斯人之不還將築室于西㕓堂已具而無桓歸去來兮世無斯人誰與遊龜自閔於牀下息眇緜乎無求閱嵗月而不移或有為子深憂解刀劔以買牛前龔遂傳拔蕭艾以為疇蓬累而行捐車捨舟獨棲棲於圖史或以佞而疑丘散衆說之糾紛忽冰潰而川流曰吾與子二人取已多其罷休己矣乎斯人不朽誰知時時不我知誰為留嵗云往矣今何之天地不吾欺形影尚可期相冬廪之億秭勤春壟之耘耔眎白首之章韍信稚子之書詩若妍醜之已然豈復臨鏡而自疑和淵明歸去來辭張宛丘子由先生示東坡公所和陶靖節歸去來辭及侍郎先生之作命之同賦耒輙自憫其仕之不偶又以弔東坡先生之亡終有以自廣也歸去來兮行世不偶余曷歸其出無所為喜兮舍去而何悲盼一世之無與兮古之人逝莫追求不疚於余義兮又奚恤餘子之是非彼好惡之罔極兮或顛倒其裳衣顧吾涉之已深兮媿哲人之見微吾歸甚安無所事奔既守吾室又杜吾門一氣孔神於中夜存納至和於靈根兮挹天醖於𤣥尊既充溢于幽闕兮亦粹然而見顔往有坎而兹夷兮昔或危而今安將從他人于西域兮面藏吏於函闗將以一世為芻狗兮廢與興吾厭觀彼福旤之一源兮必兹出而兹還彼自以為無隙兮何異夫石椁之桓歸去來兮吾悲斯人不返兮豈招仙聖與之游昔惠我以好音忽逺去而莫求余曷異於世人兮初為哽塞而増憂彼錢鎛則深藏兮盍視夫已墾之田疇萬古芸芸共逝一舟半夜而失旦號其丘畏逹觀之誚余沛已泣而不流悟榮名之取憎兮善斯人之獲休己矣乎萬物之作各其時吾獨與時而去留豈或能力而違之既往莫或追來者尚可期盖雨暵之在天豈吾稼之不耔彼蜀雄之必傳作猶媿於書詩嗟身屈而道伸於斯人兮曷疑和淵明歸去來辭東萊先生集註陳瑩中歸去來兮人生之樂無如歸捨軀命而不保兹明哲之所悲悼前言於既往舌駟馬兮焉追語十二惜乎夫子之說君子也駟不及舌持孤願以取戮叢一身之百非心耿耿兮如醉淚浪浪兮霑衣情犬馬兮恩厚選曹植求通親親表臣伏以為犬馬之誠不能動人命螻蟻兮力微乃瞻帝闕夢馳心奔俯步駑蹇曽嘶君門筋力已竭皮骨空存煙不染突酒離空尊縱傷戚之盈抱遣飢渇而違顔先衆餒而獨飽非素懐之所安偶隻影而南騖度桂嶺之遥闗頼皇明之獨照邁曦娥而監觀逸二句稽白刃於槁頸察忠精之枅枅淵明此句云撫孤松而盤桓歸去來兮息心猿之外遊覓波鏡而不得奚泡像之可求聴自他之可幻寂閑忙之兩憂吾既知之矣又將以告乎朋儔事海無際身如輕舟葵轉動以傾日曹植通親親表若葵藿之傾葉太陽雖不為之迴光然終向之者誠也狐終盡而首丘記檀弓古之人有言曰狐死正丘首仁也金百死而不化水萬折而東流審物性之莫奪戒餘習之未休己矣乎岫雲舒巻各有時出者自出留者自留誰能比迹而同之華胥非一途遊寢不可期列黄帝篇黄帝晝寢而夢遊華胥氏之國諒飢穰之莫易聊致力於耘耔感子牟之昨夢莊遜王篇中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下繼天保而成詩雖死生之事大矣安之若命復何疑和淵明歸去來辭并引胡澹庵子瞻謫居儋耳追和淵明歸去來辭邦衡遷新興亦追和之東坡以無何有之郷為家予則以醉鄉為家雖在嶺外未嘗不歸云爾歸去來兮醉郷吾家奚不歸盖自賦形於大塊常少樂而多悲念隙駒之忽過驚脫兔之難追翁自號曰亡是冠奚名於却非寄天地以為宇何室廬之作衣猶太空之一塵悟此生之甚微樂哉痛飲萬象崩奔驚懼死生皆不及門大道自通非目而存萬壑雕爼百川窪樽盡鯨汲於一吸海揚塵而酡顔固弗知於乗墜亦何有於危安不南望於𡨕山奚西出於陽闗得壺觴之三昧忘露電之六觀付萬刼於一喘了羣迷於八還既何思以何慮亦無堂而無桓歸去來兮邈無期而獨游如去國之流人返故都兮焉求孰為寢而不夢孰為覺而無憂農人問余以田園視八荒而同疇悠然浮雲汎然虚舟非假道於麴封曷回車於糟丘蝶自適於化城魚相忘於清流任夫物之芸芸獨予心之休休己矣乎是中真樂無盡時萬户不必須擇留胡為御風欲何之姑射寜足羨華胥非所期自耕耘於何有豈稊稗之堪耔黙超無眼之禪妙入無聲之詩一云静不聞於雷霆妙不容於聲詩聊優游以卒嵗坦然歸路復奚疑古文集成巻七十一
