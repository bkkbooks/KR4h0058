body:
  text: 古文集成巻五十四宋王霆震編前庚集八箴守性箴濂溪人之守性實為防城仁義禮智周張四營心為謀帥直氣為兵耳為金鼓目作旗旌堅剛勇銳動不缺傾邪誘攻之端守静待彼衰我鼓自當散潰冦攘之來有時而至築陴浚濠怵愓户備邪之所攻旦夕動作或乗其間則崩厥角善克御之乃明而誠性誠既固身因以寧和氣悠揚煒􅂱嘉名聊書諸紳内制外情守中箴濂溪我或高剛或謂我傲則非所長取禍之道我或卑柔或謂我懦不簡語言則得侮嫚傲不可作懦不可由非和非同非剛非柔中以為之無為身羞心箴蘭溪茫茫堪輿俯仰無垠人於其間眇然有身是身之微太倉稊米參為三才曰惟心耳往古來今孰無此心心為形役乃獸乃禽惟口耳目手足動静投間抵隙為厥心病一心之微衆欲攻之其與存者嗚呼㡬希君子存誠克念克敬天君泰然百體從令四箴伊川顔淵問克己復禮之目夫子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也由乎中而應乎外制乎外所以養其中也顔子事斯語所以進於聖人後之學聖人者宜服膺而勿失也因箴以自警視箴心兮本虚應物無迹操之有要視為之則蔽交於前其中則遷制之於外以安其内克己復禮乆而誠矣聽箴人有秉彛本乎天性知誘物化遂亡其正卓彼先覺知止有定閑邪存誠非禮勿聽言箴人心之動因言以宣發禁躁妄内斯静專矧是樞機興戎出好吉凶榮辱惟其所召傷易則誕傷煩則支已肆物忤出悖來違非法不道欽哉訓辭動箴哲人知㡬誠之於思志士厲行守之於為順理則裕從慾惟危造次克念戰兢自持習與性成聖賢同歸主一箴南軒人禀天性其生也直克順厥彛則靡有忒事物之感紛綸朝夕動而無節生道或息惟學有要持敬勿失驗厥操捨乃知出入曷為其敬妙在主一曷為其一惟以無適居無越思事靡它及涵泳于中匪忘匪亟斯須造次是保是積既乆而精乃㑹于極勉哉勿倦聖賢可則調息箴晦庵鼻端有白我其觀之隨時隨處容與猗移静極而嘘如春沼魚動已而噏如百蟲蟄氤氲開闔其妙無窮孰其尸之不宰之功雲卧天行非予敢議守一處和千二百歲夜氣箴西山子盍觀夫冬之為氣乎木歸其根蟄坯其封凝然寂然不見兆朕而造化發育之妙實胚胎乎其中盖闔者闢之基正者元之本而艮所以為物之始終夫一晝一夜者三百六旬之積故冬為四時之夜而夜為一日之冬天壤之間羣動俱閴窈乎如未判之鴻濛維人之身嚮晦宴息亦當以造物而為宗必齋其心必肅其躬不敢弛然自放於牀第之上使慢易非辟得以賊吾之𠂻雖終日乾乾靡容一息之間斷而昏㝠易忽之際尤當致戒謹之功盖安其身所以為朝聽晝訪之地而夜氣深厚則仁義之心亦浩乎其不窮本既立矣而又致察於事物周旋之頃敬義夾持動静交養則人欲無隙之可入天理皦乎其昭融然知及之而仁弗能守之亦空言其奚庸爰作箴以自砭常凛凛乎瘝恫四益箴南軒先君晚歲嘗大書四言以詔杓弟曰無益之言勿聽無益之事勿為無益之文勿觀無益之友勿親杓受而藏之惟謹先君既没之九年則以謀于棊四伏自推念大懼無以承先君之意自以四益名堂願兄追述其義將列之座右朝夕敬戒以庶㡬乎萬一某奉書而泣退而為箴以告之若古有訓聽德惟聰聞過以改聞善以從匪是之聞則為無益謟言溺心奸言敗德嗟哉勿忘敬共朝夕卓爾有定聽斯不惑朝夕之間何莫非事事所當事是為君子惟欲之動則亂于為營營何益擾擾孰知止之有道當取放心曷喻其功履薄臨深異説異道我則弗邇浮文妨實我則弗貴而况末俗骫論俚辭當絶于前勿亂于思潜心聖賢博考載籍聞見之多于以蓄德大倫惟五友居其一我觀昔人敬戒無斁以狎而比以順而同德惟日喪友亦曷終必端爾心忠信是親神之聽之終和且平敬齋箴晦庵正其衣冠尊其瞻視潛心以居對越上帝足容必重手容必恭擇地而蹈折旋蟻封出門如賓承事如祭戰戰兢兢罔敢或易守口如瓶防意如城洞洞屬屬罔敢或輕不東以西不南以北當事而存靡他其適弗貳以二弗參以三惟心惟一萬變是監從事於斯是曰持敬動静無違表裏交正須臾有間私欲萬端不火而熱不氷而寒毫厘有差天壤易處三綱既淪九法亦斁於乎小子念哉敬哉墨卿同戒敢告靈臺勿齋箴西山箕子陳洪範五事曰貌言視聽思顔淵問仁夫子既告之以克己復禮為仁至問其目則又告之曰非禮勿視非禮勿聽非禮勿言非禮勿動而思勿與焉何哉某嘗聞之勿之為言禁止之謂也耳目口體因物而動非心為之主宰孰能止之然則勿云者正指心而言也特學者弗之察作勿齋箴天命之性得之者人人之有心其孰不仁人而不仁曰為物役耳蕩於聲目眩於色以言則肆以動則輕人欲放紛天理晦㝠於焉有道禮以為凖惟禮是繇匪禮勿徇曰禮伊何理之當然不雜以人一循乎天勿之為言如防止水孰其尸之曰心而已聖言十六一字其機機牙既斡鈞石必隨我乗我車駟馬交驟孰範其駈維轡在手是以君子必正其心翼翼兢兢不顯亦臨萬夫之屯一將之令霆鍧飈馳孰敢奸命衆形役役統于心官外止弗留内守愈安其道伊何所主者敬表裏相維動静俱正莠盡苖長醅化醴醇方寸盎然無物不春惟勿一言萬善自出念兹在兹其永無斁思誠齋箴誠者天道本乎自然誠之者人以人合天曰天與人其本則一云胡差殊盖累於物心為物誘性逐情移天理之真其存㡬希豈惟與天邈不相似形雖人斯實則物只皇皇上帝命我以人我顧物之抑何弗仁維子思子深憫斯世指其本原祛俗之蔽學問辨行統之以思擇善固執惟日孜孜狂聖本同其忍自棄人十已干弗至弗已雲披霧巻太虚湛然塵掃鏡空清光自全曰人與天既判復合渾然一真諸妄弗作孟氏繼之命曰思誠更兩鉅賢其指益明大哉思乎作聖之本歸而求諸實近非逺古文集成巻五十四
