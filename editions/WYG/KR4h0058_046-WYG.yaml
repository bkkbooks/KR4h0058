body:
  text: 古文集成巻四十六宋王霆震編前已集八論仁論王十朋世之言仁者多矣不知其果何物也孔子曰若聖與仁則吾豈敢又曰仁者樂山智者樂水夫自其對聖而言之則仁為道之妙自其之智而言之則仁者五常之一爾然則仁果何物也耶以吾觀於夫子蓋未嘗輕言仁而亦未嘗以與人故曰子罕言利與命與仁至於令尹子文陳文子則曰未知焉得仁子路冉有公西華則曰不知其仁也是可謂難矣雖然竊猶有疑焉論語一書孔子言仁居其半其自言也曰巧言令色鮮矣仁曰剛毅木訥近仁曰君子去仁惡乎成名曰民之於仁也甚於水火曰仁者夀曰仁者不憂凡此類者無非仁也其與羣弟子言也樊遲問仁則曰仁者先難而後獲子張問仁則曰恭寛信敏惠顔淵問仁則曰克己復禮為仁仲弓問仁則曰出門如見大賓使民如承大祭司馬牛問仁則曰其言也訒凡此類者亦無非仁也未嘗輕曰仁於伯夷叔齊曰求仁而得仁於箕子微子比干曰三仁是皆以仁與之也而何獨於令尹子文子路陳文子之徒此不可不辯也吾意論語之所謂仁則易之所謂性命也性與天道自子貢不可得而聞而况其他乎故因人言之然而皆非其至也管仲之仁仁之功也夷齊之仁仁之行也三仁之仁又仁之節也是亦非其至也吾故謂孔子之於仁也其罕言也如其所謂聖而其所以與羣弟子言者亦如其所以許管仲夷齊之類也蓋其難也如此然則為仁者果無其道乎哉蓋嘗論之仁不可為也去其害仁者而仁自至仁性命之理也人曷嘗無是仁哉然而害之者多水非不清也而土渾之鑑非不明也而塵昏之顔淵問為仁孔子曰克己復禮為仁一日克己復禮天下歸仁焉請問其目曰非禮勿視非禮勿聽非禮勿言非禮勿動夫禮與仁異而為仁必於復禮則非禮者仁之害也非禮勿視非禁其為視也以視無非禮也非禮勿聽非禁其為聽也以聽無非禮也非禮勿言非禁其為言也以言無非禮也非禮勿動非禁其為動也以動無非禮也視聽言動無非禮則害仁者去害仁者去而仁可勝用哉土去而水自清塵去而鑑自明故曰克己復禮為仁非顔子不足以語此故舉以告之而又曰回也其心三月不違仁其餘則日月至焉而已矣夫孔子之於仁不敢輕之如此自孟子以仁義逰説而仁遂為愛人之一術學者至輕言仁義然孟子曰仁者人也合而言之道也則凡孟子之書可謂仁也亦非其至也惟以其至者言之故論語一書言仁者居其半惟顔子為得盡聞當時之人未嘗不為仁惟顔子為獨可許是可不謂難哉由是而言則知論語之所謂仁即性命之理也蓋進于習而與乎聖矣不然則仁果何物者耶利者義之和論老泉義者所以宜天下而亦以拂天下之心苟宜也宜乎其拂天下之心也求宜乎小人邪求宜乎君子邪求宜乎君子也吾未見其不以至正而能也抗至正而行宜乎其拂天下之心也然則義者聖人戕天下之器也伯夷叔齊徇大義以餓于首陽之山天下之人安視其死而不悲天下而果好義也伯夷叔齊其不以餓死矣雖然非義之罪也徒義之罪也武王以天命誅獨夫紂掲天下大義而行夫何恤天下之人而其散財發粟何如此之汲汲也意者雖武王亦不能以徒義加天下也乾文言曰利者義之和又曰利物足以和義嗚呼盡之矣君子之恥言利亦恥言夫徒利而已聖人聚天下之剛以為義其支派分裂而四出者為直為㫁為勇為怒於五行為金於五聲為商凡天下之言剛者皆義屬也是其為道決裂慘殺而難行者也雖然無之則天下將流蕩忘返而無以節制之也故君子欲行之必即於利即於利則其為力也易戾於利則其為力也艱利在則義存利亡則義喪故君子樂以趨徒義小人悦懌以奔利義必也天下無小人而後吾之徒義始行矣嗚呼難哉聖人滅人國殺人父刑人子而天下喜樂之有利義也與人以千乘之富而人不奢爵人以九命之貴而人不驕有義利也義利利義相為用而天下運諸掌矣五色必有丹而色和五味必有甘而味和義必有利而義和文言之所云雖以論天徳而易之道本因天以言人事説易者不求之人故吾猶有言也禮樂論上陳謙水準平繩準直律準聲音規矩準方圎權度量準輕重長短小大多寡天下萬事何所準曰準於禮禮無形準於中中無定準於心權度未審準心為甚心無偏繫發乃中節事之中節準亦大矣將欲作室室無定準心酌廣狹將欲制器器無定準心量小大夫室諧於居器便於用豈人之能乎天也飲食欲可於口衣服欲愜於身一言一動欲當人情猶是也百事百體天理素定心誠求之鮮有不中理具於天地之先而用因於散殊之後仰觀俯察細大不遺彼一拜一揖之間行之尊者貴者則歛容以致恭至卑賤則安坐而受其禮易位而施人情不快賓及門延之坐盗及門操戈而逐之書䇿琴瑟置於几箒箕甕盎置於地金玉藏於笥瓦礫棄於糞壤之場易而處之亦人情以為可笑而不安孰使然者人心天理自如是也聖人差别天下尊卑貴賤親踈小大嫌疑是非而一為之節文非生事也因理而已夫理適當舉目前皆帖㤗之域惟私惟作惟故惟鑿百用偏頗天地萬物始不得其所聖人逆將來如是以啓大亂其一一為之節文者所以準天下而使之和始於吉凶賓嘉達乎朝廷閨門鄉黨俾尊尊貴貴親親老老長長幼幼養生送死各得其節而安樂和易之情充且暢矣發於手足詠歌播於琴瑟管磬亦準此而已禮樂存國家存禮樂亡國家亡周公制作致太平魯齊之鄰國不敢動叔孫通得其遺且以輯寜擊柱之亂老氏破其説曰禮者忠信之薄晉王何輩如其言棄準割繩中原遂以割裂晉以放誕失梁以浮屠失陳隋以荒淫失禮樂不可一日亡雖盗亦有之矧國家失諸曰所欲不踰矩此乃其矩也曰行法曰法家此乃其法也曰經天曰大經反經此乃其經也曰順則作則曰物則此乃其則也曰皇極曰中和之極此乃其極也曰天鍚洪範此乃其範也曰節以度數紀綱章程亦惟此起也觸類而通名殊準一禮云樂云鐘鼓玉帛云乎哉禮樂論下陳謙仁名義生義名禮顯禮得樂斯得義質也禮文義而行之行之而當準矣準乃樂而樂生焉天地準動靜常隂陽準推盪常三辰準晷度常四時準寒暑常鬼神準變化常岳瀆準地勢常家國準君臣父子夫婦長幼朋友常得常太平和氣生反常刑兵横流作得常鳥獸魚鼈寜反常山冢陵谷易太康畋遂十旬桀滅徳敷虐紂刑以焚炙飲以長夜幽厲傾城紀綱蕩蕩始皇苛法厚歛力役窮征反常也反常不度不度而能國古未之有心天也以君之曰天君以宰之曰天宰以官之曰天官以正之曰天政以準之曰天常心準則身準身準則國家準國猶家天下猶國一心易治天下非難治一心易正天下非難正君一心正天下自定一心準人倫百事準矣理有自然心所素具在人行之耳至理宜於不説而寓於尋常智者意得愚者名惑智少愚多故非禮之禮非義之義常半天下禮野則夷樂繁則哀邪氣動蕩乖節易生何以然無準則也非準非則任私意隨流俗浸乆則成風矣天下滔滔食焉鮮知味行焉鮮知徳不知天何以知禮樂知天者聖故能作知聖者明故能述行為法作為則著為經掲為範序為彛倫建為民極無巨無細一一天成無過無不及自有至當適當曰中得中曰和開和曰常通行曰庸泛應曰恕名物數度因其當等差之聲音舞蹈因其和導達之器不適當用不和服不適當身不和聲色臭味不適當耳目口鼻不和情文事理不適當如之何和於天下也適當曰中失中曰過直過絞勇過亂恭過勞謹過葸明過傷節過苦柔過懦剛過折井過困益過損陽過亢隂過戰中則不立和末從生中和者天地萬物之所由位育也禮樂根於太上周流於日用交際起居之間人自不察察猶可能也蹈為難蹈猶可能也安為難安乆而天動容周旋中矣非盛徳蔑以加此主忠信論象山人不可以無所主尤不可以主非其所主蓋人而無所主則倀倀然無所依歸將至於無所不為斯固有所不可也然至於主非其所主則念慮云為舉出於其心之所主方且陷溺於其中而自以為得雖有至言善道賢師良友亦無如之何則又不若無所主者之或能入於善也此夫子所以屢言之忠者何不欺之謂也信者何不妄之謂也人而不欺何徃而非忠人而不妄何徃而非信忠與信初非有二也特由其不欺於中而言之則名之以忠由其不妄於外而言之則名之以信果且有忠而不信者乎果且有信而不忠者乎名雖不同總其實而言之不過良心之存誠以無偽斯可謂之忠信矣由是言之忠信之名聖人初非外立其徳以教天下蓋皆人之所同有心之所同然者也然人之生也不能皆上智不惑氣質偏弱則耳目之官不思而蔽於物物交物則引之而已由是向之所謂忠信者流而為放僻邪侈而不能以自反矣當是時其心之所主無非物欲而已矣然則聖人將欲導還其固有舍曰主忠信其何以哉是故為人子而不主於忠信則無以事其親為人臣而不主於忠信則無以事其君兄弟而不主於忠信則傷夫婦而不主於忠信則乖朋友而不主於忠信則離視聽言動非忠信則不能以中理出處語嘿非忠信則不能以合宜凡文辭之學與夫禮樂射御書數之藝此皆古之聖賢所以居敬養和周事致用備其道全其美者一不出於忠信則雖或能之亦適所以崇奸而長偽况其餘乎嗚呼忠信之於人亦大矣欲有所主捨是其可乎故夫子兩以告門人弟子而子張之問崇徳亦以是告之至於贊易則又以為忠信所以進徳也誠以忠信之於人如木之有本非是則無以為木也如水之有源非是則無以為水也人而不忠信果何以為人乎哉鸚鵡鸜鵒能人之言猩猩猿狙能人之技人而不忠信何以異禽獸者乎嗚呼學者能審其所主則亦庶幾乎其可矣國以君為主則一國之事莫不由君而出軍以將為主則一軍之事莫不由將而出家以長為主則一家之事莫不由長而出人能以忠信為主則念慮云為舉一身之事莫不由忠信而出然而不能進於聖賢者吾未之信也君子喻於義論象山非其所志而責其習不可也非其所習而責其喻不可也義也者人之所固有也果人之所固有則夫人而喻焉可也然而喻之者少則是必有以奪之而所志所習之不在乎此也孰利於吾身孰利於吾家自聲色貨利至於名位禄秩苟有可致者莫不營營而圗之汲汲而取之夫如是求其喻於義得乎君子則不然彼常人之所志一毫不入於其心念慮之所存講切之所及惟其義而已夫如是則亦安得而不喻乎此哉然則君子之所以喻於義者亦其所志所習之在是焉而已耳古文集成巻四十六
