body:
  text: 古文集成巻二十五宋王霆震編前丁集四劄論經筵第一劄子程伊川迂齋云此等議論闗渉大自伊訓字說命無逸立政之後方見此等文自古人君守成而致盛治者莫如周成王成王之所以成徳由周公之輔養昔者周公傅成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善教子弟者以小形大亦必延名徳端方之士與之居處使之薫染成性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得於天稟而輔養之道非謂告詔以言過而後諫也在涵養薫陶而已大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化徳器成就臣欲乞朝廷慎選賢徳之士以侍勸講講讀旣罷常留二人直日夜則一人直宿以備訪問皇帝讀習之暇游息之間時於内殿召見從容宴語不獨漸磨道義至於人情物態稼穡艱難積久自然通達比之常在深宫之中為益豈不甚大切聞間日一開經筵講讀數行羣官列侍儼然而退情意畧不相接如此而責輔養之功不亦難乎今主上沖幼太皇太后慈愛亦未敢便乞頻出但時見講官久則自然接熟大抵與近習䖏久熟則生䙝慢與賢士大夫䖏久熟則生愛敬此所以養成聖徳為宗社生靈之福天下之事無急于此論經筵第二劄子程伊川迂齋云探本之論後世以為迂緩古人以為急切三代之時人君必有師傅保之官師道之教訓傅傅其徳義保保其身體後世作事無本知求治末而不知正君本知規過末而不知養徳本傅徳義之道固已疎矣保身體之法無復聞焉無人及此伏惟太皇太后陛下聰明睿哲超越前古皇帝陛下春秋之富輔養之道當法先王臣以為傅徳義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜尤切存畏慎之心臣欲乞皇帝左右扶持祇應宫人内臣並選年四十五已上厚重小心之人服用器玩皆須質朴一應華巧奢麗之物不得至於上前要在侈麗之物不接於目淺俗之言不入於耳及乞擇内臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之所謂保養有剪桐之戲則隨事箴規違持養之方則應時諫止調䕶聖躬莫過於此乞復召伊川還經筵劄子祖禹道命錄云元祐七年三月伊川先生將免䘮宰相吕正愍公奏欲與職判撿院蘇文定為門下侍郎奏云但恐不肯靖宣仁云只與西監遂除直秘閣備判西京國子監其月丁亥也先生之在經筵也諫官朱公掞賈明叔皆其門人推敬甚備而給諫顧子敦劉器之與先生不合每屢攻之先生亦以輔道自居故簾中以為不靖四月先生免䘮上疏再辭新命極論儒者進退之道而監察御史董敦逸奏以為有怨望輕躁語五月丙戌改管勾西京嵩山崇福祠從所請也未拜以疾尋醫八年九月宣仁崩哲宗視政用伸秘閣西監之命先生再辭九年三月丁酉蘇文定自門下侍郎守本官知汝州四月壬子蘇文忠自中山府路安撫使落兩職知英州癸丑改元紹聖范公先已數求去是日除龍圖閣學士知陜州其薦先生必九年三四月間事蓋遲二蘇公之去後言之也臣自居講職切謂天子當博求天下賢才置之左右以備顧問禆益聖學追觀祖宗之時講筵之臣多由舊官薦引故臣每思得人開達天聴然無因而言懼為煩瀆或渉親舊言則有嫌今臣已三奏乞外任將去講職肝膈所懷不敢不吐露于陛下臣伏見元祐之初陛下召程頤對便殿自布衣除通直郎崇政殿說書天下之士皆謂得人雖真宗待种放亦不過於此也孔子曰舉逸民天下之民歸心焉夫舉一人而天下莫不歸心者何哉為善於幽隱者知其以不廢陛下用頤實為希闊之美事而讒及嵗餘即以人言罷之頤之經術行誼天下共知司馬光吕公著皆與頤相知二十餘年然後舉之此三人者必非為欺罔以誤聖聴也頤在經筵切於皇帝陛下進學故其講說語常繁多頤草茅之人一旦入朝與人相接不為闗防未習朝廷事體迂疎則固有之而言者謂頤大佞大邪貪黷請求奔走交結又謂頤欲以故舊傾大臣以意氣役臺諫其言皆誣罔非實也蓋當時臺諫官王巖叟朱光庭賈易素推伏頤之經行故不知者指為頤黨頤匹夫也有何權勢動人而能傾大臣役臺諫自古處士入朝無有不被謗毁蓋處士本不求仕進能輕富貴公卿大夫自以已不能如此故無不稱重將謂處士入朝必有過人之能致太平之術故其責望常重至於不賢者則直以處士為矯詐為沽激為釣名又處士多不次得美官故其憎嫉之人多是以處士入朝未嘗不遭毁謗也陛下慎擇經筵之官如頤之賢乃足以輔道聖學至如臣輩叨備講職實非敢望頤也臣久欲為頤一言懷之累年猶豫不果使頤受誣罔之謗於公正之朝臣每思之愧也今臣已乞去職若復召頤侍講必有補聖明臣雖老在外無所憾矣取進止乞封爵邵張二程列從祀劄胡文定道命錄云先是紹興改元之秋吕頤浩秦檜並相秦欲傾吕而奪之柄乃託内修政事外攘夷狄之名俾吕督軍于外置修政局自領之多引望士聚于朝廷首召胡文定為給事中兼侍講其所深敬也吕覺之欲盡去秦所引而未得其方過平江太常席益語之曰目為黨可也然黨魁在瑣闥當先去之吕大喜至常州會其後軍叛去乃引疾不進復還行在召朱丞相於紹興以為同都督胡公駁之改提舉萬夀觀兼侍讀命檢正黄龜年書讀行下胡公以失職求去乃落職奉祠其年八月也秦相三上疏留之不報旋被斥於是程伯禹張子公之徒二十餘人皆罷去臺省一空九月朱丞相復拜右僕射三年秋吕丞相免四年秋偽齊入㓂朱丞相亦罷趙忠簡相張忠獻自謫籍中以趙公薦除知樞密院拒賊兵却之五年春張公相夏四月張公出行邊五月建國公制下自是二公始有違言趙公素尊伊川之學士大夫翕然鄉之然趙公實不識伊川故有偽稱河南門人者亦蒙進用張公之門多才吏趙公亦不樂之趙公每言於上前謂元祐之人與紹聖崇觀之黨決不可合而張公本黄英州所薦習聞紹述之論數以孝弟之説陳于上前二公所操浸異趙公改修神哲兩朝實錄明著王氏及章蔡諸人之罪張公又不然之六年冬偽齊再入㓂趙公建議棄淮守江張公以為不可力戰却之十二月趙公免相陳公輔遂上疏乞禁伊川學朱内翰在經不敢諫胡公時奉祠居衡聞而非之遂上此奏然未達也七年三月十四日有㫖召文定赴行在初趙公既去位張公復引秦丞相為樞宻使秦陽為柔佞一切無所異會文定春秋傳成朱内翰乞嘉奬乃命召之張公既批㫖矣四月二十一日張公徃淮西視師五月十三日有旨胡公除提舉萬壽觀兼侍讀委潭州守臣以禮津遣用金字遞行張公既以事不已出形於言而文定之奏至公輔乃與中丞周祕侍御史石公揆共劾胡公學術頗僻行義不修疏文上六月十二日有旨胡安國累上章引疾可與便郡除知永州胡公力辭復提舉太平觀仲并者江都人胡公弟子也以薦對特改京秩其後通判湖州坐與倡女違踰抵罪王明清玉照志載其禱天之祠所謂辟纑織屨早諧夫夫婦婦之儀者是也并嘗遺胡公書云近者伊川之學稍行于世固可喜矣然天下之士乃有飾此為進取計者徃徃剽竊仁義之說故示椎魯之狀譊譊然言必稱伊川使在位者知其虚名而用之書為石公揆所得繳上于朝并之責人如此而其所自為者乃有甚焉此學者所以貴於力行也臣忝預從臣職當次對雖嬰疾疹尚竊祠宫苟有見聞自當論奏庶逃尸素之責以酬隆厚之恩伏見元祐之初宰臣司馬光吕公著秉政當國急於得人首薦河南處士程頤以為言必忠信動遵禮義實儒者之髙蹈聖世之逸民乞加召命擢以不次遂自韋布起居講筵而臺諫臣僚光庭等又奏頤道徳純備學問淵愽有經天緯地之才有制禮作樂之具寔天民之先覺聖世之真儒也頤之見知於當世至矣自頤之司勸講不為辨辭解釋文義所以積其誠意感通聖心固不可得而聞也及當官而行舉動必由乎禮奉身而去進退必合乎義其修身行法規矩準繩獨出諸儒之表門人髙弟莫獲繼焉雖崇寧間曲加禁防學者向之私相傳習不可遏也其後頤之門人如諫議楊時右史劉安節舍人許景衡殿院焉伸待制呉給等稍稍進用於是傳者浸廣士大夫争相淬礪而其間志於利祿者託其說以自售學者莫能别其真偽傳者旣失之河洛之學幾絶矣壬子年臣嘗至行闕有教授仲并者言伊川之學近日盛行士大夫將轉而為伊川矣臣語之曰伊川之學不絶如綫可謂孤立而以為盛行何也豈以其說滿門人人傳寫耳納口出而以為盛乎自是服儒冠者以伊川門人妄自標榜如喻樗輩真其人也乃不見知近臣亦有信之而稱嘆者故樗之改官入館舍人王居正命其辭曰頃窮西洛之淵源遂見古人之大體夫西洛淵源古人大體雖其髙弟謝良佐游酢楊時諸人尚難言之而況樗等曷為者也乃更許於詞命妄加褒借識者有憂之士大夫所學各分黨與互相排擊自此起矣紹興五年省試舉人經都堂陳乞不用元祐人朱震等攷試蓋從於新學者耳目見聞旣已習熟安於其說不肯遽變而傳河洛之學者又多失其本真妄自尊大無以屈服士人之心故衆論洶洶深加詆誚夫有為伊洛之學者皆欲屏絶其徒而乃上及於伊川臣竊以為過矣夫聖人之道所以垂訓萬世無非中庸非有甚髙難行之說離世異俗之行此誠不可易之至論也然中庸之義不明乆矣自頤兄弟始發明之然後其義可思而得也不然則或謂髙明所以處已中庸所以接物本末上下析為二途而其義愈不明矣士大夫之學宜以孔孟為師庶幾言行相稱可濟時用此亦不可易之至論也然孔孟之學不傳乆矣自頤兄弟始發明之而後其道可學而至也不然則或以六經語孟之書資口耳取世資以干祿愈不得其門而入矣今欲使學者蹈中庸師孔孟而禁使不得從頤之學是入室而不由户也不亦誤乎夫頤之文於易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發其微旨而知求仁之方入徳之序然則狂言怪語淫說鄙喻豈其文也哉頤之行其行已接物則忠誠動於州里其事親從兄則孝悌顯於家庭其辭受取捨非其道義則一介不以取與諸人雖祿之千鍾必有不顧也其餘則亦與人同耳然則幅巾大袖髙視闊歩豈其行也哉昔者伯夷栁下惠之賢微仲尼則西山之餓夫東國之黜臣耳本朝自嘉祐以來西都有邵雍程顥及弟頤闗中張載此四人者皆以道學徳行名於當世公卿大夫之所欽慕而師尊之者也如司馬光吕公著韓絳吕大防等莫不論薦之會王安石當路重以蔡京得政曲加排抑故有西山東國之賢而其道不行深可惜也今雍所著有皇極經世書六十巻載有正蒙書一十七篇頤有易春秋傳一十巻顥雖未及著述而門弟子質疑答問之語存於世者甚多又有書疏銘詩並行於世而傳者多失其真臣愚欲望陛下特降㫖揮下禮官討論故事以此四人加之封號載在祀典比於荀揚之列以見聖朝雖當禁暴誅亂奉辭伐罪之時猶有崇儒重道尊徳樂義之意仍詔館閣裒集四人之遺書委官校正取㫖施行便於學者傳習羽翼六經以推尊仲尼孟子之道使邪說者不得乘間而作而天下之道術定豈曰小補之哉取進止貼黄臣昨見成都府席益奏有吕錫山者師事闗中大儒張載乞與差遣契勘載居鳯翔切恐其門人子弟必有流落在川蜀之間者乞詔席益尋訪取索其著文字附遞聞奏又貼黄臣切見朝廷累召尹焞赴闕乃程頤之門人而館職王蘋亦崇寧初年從學之士也乞以頤及其兄顥之文字付焞等校正庶無差誤古文集成巻二十五
