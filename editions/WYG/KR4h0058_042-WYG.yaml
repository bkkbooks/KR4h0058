body:
  text: 古文集成巻四十二宋王霆震編前已集四論貴助論程大昌獨力所勝不如兼力之輕獨智所謀不如兼智之明有助之勝乎孤立也固矣而天下之論者曰才兼人者不資助也嗚呼天施地生日月遞明隂陽錯行猶不能無待以獨成而人獨能天地日月隂陽之所不能者歟召公之求去也周公作書留之其言曰予徃暨汝奭其濟小子同末在位誕無我責吉甫之誦山甫也曰衮職有闕維仲山甫補之愛莫助之周公吉甫才絶人矣猶以召公諉責之為憂而補衮無助之為嘆曷嘗以智力有餘而了然無所事助歟政使無所事助而猶得助焉不害乎分已責以自逸也而况幾微之兆藏於眇忽千里之謬差於毫釐固有不得師心而自是者歟征苗之役舜命禹而行之蓋未有不以兵而為能柔逺也逮伯益陳徳以賛而禹始班師兩階之舞七旬之格非益莫致誠使才如大禹猶資益焉而謂人可無助歟漢唐以來世有相而惟蕭曹丙魏房杜姚宋擅聲稱於千百年間未必世世無與匹或者獨智獨力之所就不如兼智兼力之宏大也夫惟有規而有隨焉則美成於乆矣有寛而有嚴焉則治不偏矣以至謀㫁之相因正變之相資率皆習彼此以成能焉故其能為全能而功為全功非獨力之可跂也雖然勢得相兼者數公之幸也致其兼而使肯相兼者亦數公之善處也房𤣥齡之建謀也曰非如晦莫能㫁及如晦至卒用𤣥齡䇿是如晦初未嘗㫁而𤣥齡亦無資㫁也然必歸重於如晦者若已不能決而求決焉所以和其助也曹參之對惠帝亦自以為不及蕭何故事無所變更此其肯為之助也歟故夫才大則難明勢敵則易忌挾難明之才而資以易忌之勢則勢可兼而不肯兼固有不平於其心也作史者不稱數公之才而俱以同心美之其知本哉其知本哉贊襄論曾毅齋古之相也無異而有異今夫其位崇如其爵穹如其禄豐如是佐君者所同也其接從容其與宻勿其懽也魚水其固也膠漆是得君者所同也家可亡吾君不可忘身可殺吾國不可奪命焉斯寄孤焉斯托是報君者所同也然有異焉非所操之異也用不同焉非所用之異也遇不同焉由今觀之周公大聖人也而求如伊尹所為有弗能非弗能也弗容能也伊尹大聖人也而求如禹臯所為有弗得非弗得也弗可得也是故禹臯之相也大以簡大以簡故其徳備伊尹之相也直以遂直以遂故其業巨周公之相也艱以婉艱以婉故其功顯且夫拮据捋荼憂勤以思周公豈願哉然欲堯舜君民以重自任是弗容能也五就辛勤一訓諄複伊尹豈樂哉然欲賡歌一堂都俞數語是弗可得也雖然有聖賢之時有聖賢之權有聖賢之道時之所在而權用焉權之所在而道形焉故曰禹臯伊周則一轍也漢唐非無相也髙惠之間大業已定然而寛大襟懐不無猜防之心鎮静基業不無動搖之患諰諰然周護宻備而不敢肆蕭曹之為相也何其畏且謹也孝宣非不曉解也傷其過曉解也精明有餘而寛裕不足以嚴相徇而不知相濟雖或號為寛大而所就無幾丙魏之為相也何其懍且促也太宗雖好名雅有志於前古之規轍一時翕合諫諍征伐悉有其人藉第弗皆當也然總持其綱以遂其君臣相與從事之意而有可否焉房杜之為相也何其裕且整也明皇非無姿也不由其道鋭而輕明而不固崇之進也要之也而璟之日又甚淺姚宋之為相也何其隘且迫也嗟乎數君子之所立雖不無優劣也三代以來僅有此耳而於大者俱缺焉是不能不令人慊然也非咎之也望之也惜之也故嘗以謂隨世以就功名君子所不免也講之平時用之一旦君子所當思也盡其在我勉其在君君子所當思也隨今為異而不悖古以為異君子所當思也能其君者孔明也因其君者漢唐數子也大其君者傅説召公也聖其君者伊周也神其君者禹臯也作贊襄論燮調論曾毅齋天地之大則一指也宇宙之廣則一握也古之聖賢出而有立於斯世夫豈眇其身而自小其用哉劵霄壤為四肢而不知其有異也貫隂陽為一息而不知其有間也是故體此以出治者君也體此以佐治者相也君能是而相不能是其失則孤相能是而君不能是其失則偏兩能是則昌兩不能是則荒循而星辰時而雨暘鎮而山嶽寜而河海遂而人民孳而鳥獸亭毒之間無一毫足以疥吾治則天下理太平立矣帝王盛時疇弗用是道然而咸若裕如僅見一二語若不切切於是者彼蓋視為當然而君相所當共留意焉者故隨其效著而輙及之非差事也周官作大小職以分六卿帥屬事悉就理綱維是主張是者不容缺也燮理寅亮始立三太少而一不以他故屑之無幾何也泰和之風藹然薫塞於四方萬里之間雅頌詠歌迄今不泯則亦有自也然嘗攷之陳平之於文帝反覆開説言非不切也漢家水旱盜賊隂陽之變為相者輙不免責非不嚴也自是而來未見有如雅頌之所稱者則是何故後元以降熈然豐殖亦云可矣政恐干戈之禍暫息穹壤之和俶集醖釀淑郁於五六十載之間天與人因治與時偶兩相際焉有非六出竒計者所能獨了是也不然天馬白麟黄龍五鳯遽以為隂陽和嘉瑞應且謂黄霸二三君子實召之寜不啓窽言滋媚習乎兹非為是鍥論也漢之君責其相則是而所以責其相則非也朝夕汲汲困其身於簿書期㑹㫁獄聽訟之叢俾之惶焉怛焉救過之弗給何暇從容静嘿思所以與天地造物接哉雖然誠與天通念與事接兩不相掩夜以繼日坐以待旦此心運用初何有一刻息機務酬酢要不容以自逃陶鈞斡旋要不容以自已顧不與之俱馳而淪於叢脞以自累則一念明淨一念貫通也一事端忠一事感格也交際同流太和保合天地逺乎哉作燮調論經綸論曾毅齋天下大物也不可以小智私不可以小道持必有大於是者從而掎挈焉運動焉斯可以乆安長治而無後患蓋萬鈞之鼎非烏獲而舉之則必絶臏以斃器一不用而置之於屏處則菌衣生之蝸蛛叢之不至於腐壊不止也古之君子出而佐人之國静則觀勢動則觀變經營圖回不敢暫息為是物也大易曰雲雷屯君子以經綸經綸為言猶曰運用區處各有攸當四方萬里必使無一隅偏而不舉也必使無一民梗而不帖也必使無一事悖而不順也如斯而已矣而或者獻疑曰開闢也創造也是之須爾守成其何庸所謂開闢云者天地劃分人獸交迹疆理弗辨綱常弗立天下不可一日居也則必正民彛設民極辨正體經綱維分畫發十三卦之藏使民用以足夫是以四方正而萬民奠古之人有為之者風后力牧舜禹臯陶之佐其君是也所謂創造云者上無明君下無賢臣紀綱蕩然制度隳然八紘絶而四維墮天下不可一日堪也則必興師鞠旅南征北伐以救瘡痍以脱塗炭夫是以基緒植而事功成古之人有為之者伊尹太公之佐其君是也又其下也志於立國而未必為民志於取天下而未必憂天下然而權謀之中有仁義焉戰伐之中有公恕焉是亦可以自附於前古之人有為之者張子房諸葛孔明之佐其君是也若夫有盈可持有成可守統紀素明也禮法素具也京師有奠枕之安邊陲無挿羽之警則雍容廟堂唯諾殿陛光輔太平優游樂嵗尚何以經綸為哉雖然竊嘗譬之人之少也四體盛强百骸堅耐觸風冒露一無不可而六氣運行間所侵薄猶不能不為鍼熨攻療之具况其壯乎况其老乎一指之大一脛之瘇豈無如賈誼之所當憂者乎養以膏粱伐以藥石豈無如崔實之所當審者乎在膏之上在肓之下豈無如秦緩之所當防者乎風寒數處何者當先禦脉病人病何者當速療昔人有言無病而服藥與有病而不服皆足以殺人作經綸論用望論程大昌用人望以順衆嚮也一鄉一國之望一鄉一國嚮之矣天下之望天下嚮之矣衆固嚮之我獨置之是為咈衆咈衆者衆亦咈我也我之所用衆不謂是我之所措衆莫肯孚其咈衆邪適以自咈也且其嚮是人也以謂是惟無用用之決能表治而福民也吾其咈之彼謂我遏膏澤使不流也雲行於天雷震於地未遽雨也而槁民有生意焉意期之故心嚮之也是以君子乘此機而用此人也則功未效而成形已著於事先矣舜之用賢也元凱先焉為元凱者非不能施功而水土自平也不用力而五教自叙也選用之初天下固許舜以為功者何也是十六人者世濟其美斯民注其耳目乆矣堯未及用則天下欎欎如有負焉舜申其欎欎則天下欣欣如有獲焉是元凱雖未功而天下固必其功矣舜非能悦天下也而能不咈乎天下也是謂以民治民以天下治天下因其嚮而答之之謂也且夫衆望所屬固有父天下而號天下之大父者又有能子一邑而得冠天下之名者至於景星之覩龍門之登鳳鳴朝陽之賀心順嚮之徃徃以其人之用舍卜天下之幸不幸豈可咈其嚮而無所答邪是故以已用人庸有不宜而因衆用望者無適而不宜也衆望在循吏則龔黄用矣衆望在名節則嚴周聘矣衆望以舊士為重則紀顧之徒擢於晉衆望以文儒為重則瀛洲之選重於唐彼以所欲嚮之我以所嚮用之縱横曲折豈有時而不宜哉故周人典賢之法因民之所自擇而還使之入長出治孟子用賢之術必徇國人之所共賢而徐加採擇其亦求順衆嚮而宜天下者矣諏訪論曾毅齋嚴尊卑者謂之分畫上下者謂之勢通彼此者謂之情達可否者謂之辭分與勢有截情與辭無窮是故賢且明者不以分廢情不以勢廢辭守其分履其勢巋然其崇而弗有其崇􅂱然其榮而弗有其榮降而下之抑而晦之使天下之人無智愚無賢不肖欣欣然津津然皆欲自進於其前而無所於憚有言得聞有語得達辭之喜怒者情之屈伸也辭之善惡者情之好惡也㑹通焉紬繹焉一人之辭無阻抑捍絶之憂則一方之情無壅底滯塞之患推而大之八表以達萬事以察功緒以挈民庶以悦勲績以傑聲實以晰古之善相人之國者捨是何説哉不善者反此昂昂然􅑲􅑲然使人仰之如天神之尊而不敢親望望然皆將求去之之不暇敢有言乎有言矣敢盡言乎一節之塞萬善之窒一隅之蔽萬法之敝無疑也雖然世未有如是之人而足以佐人國也世未有如是之襟懐器局而能成大功立大業也然而尊固根於卑養尊之乆者有時乎不自卑髙固基於下養髙之乆者有時乎不自下富驕貴侈豈期而至獨不防其將也哉况夫輕王公藐大人世每不多見而仰視貴人之光容則低回瑟縮而不敢近者比比皆是鋭然而進恐然而退蒼然而來慴然而去夫豈少哉嗚呼千百人中而有一人焉不獲其情固未足以疵吾相然使千百人中而有一人焉不獲其情亦豈足以示吾相哉且夫還贄貌執之士多至百人又多至千人使其皆賢也則必如閎散顛适著其聲者矣而未聞焉其不足以進於周公之前亦明矣而僕僕吐握不敢少後豈直借此以自牧哉諮諏訪問當必有在不然虚揖黙拱一覿而退竊意聖人不爾為也一家之中有子弟焉有臧獲焉有親故鄰曲焉通其情達其意使洞然無所隔是家道所由以肥也戞戞然藐而不之接恩怨爾汝懵不聞焉則家必睽睽則替矣是相天下之説也作諏訪論選掄論曽毅齋君不能自治故屬之相相不能獨任故屬之人一日萬機之繁千官億醜之多寸心兩耳目之聰明安能盡籠而睹記焉是必有屬故夫君屬之相相屬之卿卿屬之監司監司屬之郡上下相維等級相傳然而散之下則衆歛之上則寡崇正斥邪進賢退不肖提綱挈領相實任責寜不大哉寜不重哉然嘗聞之天之生人也氣不皆全也一有偏焉性質以異隂柔陽剛各品殊形賢者常少而不肖者常多君子常難逢而小人常滿天下此一説也苗莠相欺朱紫相奪偽假真售姦託直遂出入翻覆千蹊萬轍有未易以窺且詰此又一説也君子常剛小人常柔君子多梗概小人多脂韋君子惡詭隨小人喜順適而又身為天子之宰輔崇嚴威重每未易以犯徃徃熟聞軟媚而聽激烈正直之言則易驚習見柔順而逢剛方挺特之士則易憚此又一説也矧夫揆之於時所忌者若人也揣之於俗所便者若人也所與親者未必樂斯人也則進之終弗安所與處者未必快斯人也則用之終弗果雜是數説有一柴於胷次間則變目易耳移情改意姦且佞進而賢與君子日以逺矣嗟夫一賢見踈未足恤也一不肖見用未足慮也然亦有以外補利害試一數之者乎一路之間輕畀一節纔一節耳而一路為之騷一郡之間輕畀一麾纔一麾耳而一郡為之擾始有所牽而求以悦一人終有所悞而至於不悦者千萬人即其千萬人所不悦者而推原之則亦豈無所歸也哉又况所牽者愈上則所不悦者愈大矣雖然於此有鈞焉於此有衡焉運之於中提之於上洪也纎也良也窳也軒也輊也悉聽物自取而不亂以人不參以已則賢不肖判君子小人不至於易位而天下定矣作選掄論古文集成巻四十二
