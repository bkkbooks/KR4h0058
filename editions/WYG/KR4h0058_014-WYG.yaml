body:
  text: 古文集成巻十四宋王霆震編前乙集八記復齋記五峯易卦有復孔子曰復反也所以反本復始求全其所由生也人之生也父天母地天命固所有也方孩提未免於父母之懐及少長聚而嬉戱愛親敬長良知良能在而良心未放也逮成童既冠嗜慾動於内事物感於外内外紛紏流於所偏勝故去於道日以逺也此大學所以不傳而人心之所以流漫支離不可會歸於一歟扶風馬君名其種學績文之所曰復齋不汨於流俗慨然有志於大學之道因予友彪子也來求言予安能知然從事於斯如老農之服田力穡也乆矣請試言其耕耨収穫之功焉夫人非生而知之則其知皆縁事物而知縁事物而知故迷於事物流蕩失中無有攸止自青陽至于黄髪茫茫如旅人不得歸家而安處也今欲驅除外誘不失其赤子之心以復其所由生之妙則事事物物者乃人生之所不可無而亦不能掃滅使之無者也儒者之道率性保命與天同功是以即事即物不厭不棄必身親格之以精其知焉夫事變萬端而物之感人無窮格之之道必立志以定其本而居敬以持其志志立於事物之表敬行乎事物之内而知乃可精目流於形色則知自反而以理視耳流於音聲則知自反而以理聴口流於唱和則知自反而以理言身流於行止則知自反而以理動有不中理未嘗不知知之未嘗復行此顔子所以克己復禮不逺復而庶幾於聖人者也及其久也徳盛而萬事一體仁熟而變通不窮豈特不為事物所迷亂而已哉視聴言動皆由至理形色音聲唱和行止無非妙用事各付事物各付物人我内外貫而為一應物者化在躬者神至此則天命在我無事於復而天地之心可一言而盡矣復之道於是為至馬君勉之哉母驚焉而謂予言之狂也必顧名思義與其朋友牽連而復於道然後為稱矣復齋記晦庵昔者聖人作易以擬隂陽之變於陽之消於上而息於下也為卦曰復復反也言陽之既往而來反也夫大徳敦化而川流不窮豈假夫既消之氣以為方息之資也哉亦見其絶於彼而生於此而因以著其往来之象爾唯人亦然大和保合善端無窮所謂復者非曰追夫已放之心而還之録夫已棄之善而屬之也亦曰不肆焉以騁於外則本心全體即此而存固然之善自有所不能已耳嗚呼聖人於復之卦所以賛其可見天地之心而又以為徳之本者其不以此與敬齋記南軒孟氏没聖學失傳寥寥千數百載間學士大夫馳騖四出以求道泥傳註溺支辭又不幸而髙明汨於異說終莫知其所止嗟夫道之難明也如此非道之難明也求之不得其本也宋興又百餘載有大儒出於河南兄弟並立發明天地之全古人之大體推其源流上繼孟氏始曉然示人以致知主敬為聖學始終之要顧世方樂於荒唐放曠之論窮大而失其居視斯言若易焉者而曽莫思其然也天下之生乆矣紛綸膠轕曰動曰植變化萬端而人為天地之心葢萬事具萬理萬理在萬物而其妙著於人心一物不體則一理息一理息則一事廢一理之息萬理之紊也一事之廢萬事之隳也心也者貫萬事統萬理而為萬物之主宰者也致知所以明是心也敬者所以持是心而勿失也故曰主一謂之敬又曰無適之謂一噫其必識夫所謂一而後有以用力也且吾視也聴也言也手足之運動也曷為然乎知心之不離乎是則其可斯須而不敬矣乎吾飢而食也渴而飲也朝作而夕息也夏葛而冬裘也孰使之乎知心之不外乎是則其可斯須而不敬矣乎葢心生生不窮者道也敬則生矣生則烏可已也怠則放放則死矣是以君子畏天命不敢遑寧懼其一失而同於庶物也仁壽崔子霖以敬名齋而請予記之予嘉其志之美也則不敢辭吾鄉之士往往秀偉傑出而吾子霖方有志於斯道以與朋遊共講之予歎夫同志之鮮也乃今得吾子霖而子霖又将與其朋友共之益知吾道之不孤也故樂為之書敬齋記南軒誠者天之道敬者人事之本敬道之成則誠而天矣然則君子之學始終乎敬者也人之有是心也其知素具也意亂而欲汨之紛擾臬兀不得須㬰以寧而正理益以蔽塞萬事失其統矣於此有道焉其惟敬而已乎伊川先生曰主一之謂敬又曰無適之謂一夫所謂一者豈有可玩而執者哉無適乃一也葢不越乎此而已嘗試於平居暇日深體其所謂無適者則庶乎可識於言意之表矣故儼若思雖非敬之道而於此時可以體敬焉即是而存之由是而察之事事物物不得遁焉涵泳不舍思慮將日以清明而其知不蔽矣知不蔽則敬之意味無窮而功用日新矣天地之心其在兹歟學者舍是而求入聖賢之門難矣哉至於所進有淺深則存乎其人用力敏勇與緩怠之不同耳吾友臨川吳仲權志於古道將以敬名其所居之齋而日勉焉於其行也書此以贈之葢朋友相與警勸之義也存齋記南軒太極動而二氣形二氣形而萬物化生人與物俱本乎此者也原物之始亦豈有不善者哉其善者天地之性也而孟子道性善獨歸之人者何哉葢人稟二氣之正而物則其繁氣也人之性善非被命受生之後而其性旋有是善也性本善而人稟天氣之正初不隔其全然者耳若物則為氣所昏而不能以自通也惟人全夫天地之性故有所主宰而為人之心所以異乎庶物者獨在於此也是以君子貴於存之存之則在此不存則孰知其極哉存之則有物不存則果何所有哉故主一無適敬之方也無適則一矣主一則敬矣存之之道曷要於此乎誠能從事焉真積力久則其所存者將洋洋乎察于上下而不可掩功用無窮變化日生性可得而全矣吾友吕季克敬而好義以存名齋其志逺矣屬予為之記若予者葢矻矻自保之不暇而何以善於友朋然則斯記也非特以勉季克且將自警歟不息齋記五峯紹興二十有九年春友生毛子請曰以謨齋房衡麓先生名曰不息惟義之奥至于今十年若存若亡請先生辭而逹之以比盤盂几杖之銘戒庶幾可以朝夕從事予聞其言喟然歎曰先兄既為子名我其可不敷暢厥義以厲子志然難言也子試察夫天地之間有一物息者乎仰觀於天日月星辰不息於行也俯觀於地鳥獸草木不息於生也進而觀乎朝廷之上卿士大夫不息於爵位也退而觀乎市井之間農工商賈不息於貨財也滔滔天下若動若植是曽無一物息者矣今予兄以不息教子無乃使子泯泯然與萬物同波淪胥以亡乎將何以収子之放志表萬物而正之邪惟予知其有道也子其審聴吾之言乎夫日月星辰雖不息於行而息於象鳥獸草木雖不息於生而息於形卿士大夫之不息於爵位也而固息於名農工商賈之不息於貨財也而固息於利夫有所息則滯於物滯於物者不全於天不全於天者雖日月星辰不能以自化而况於六尺之軀乎噫六尺之軀有神妙而世俗之人不自知也聖人闓之曰人者天地之心也此心宰制萬物象不能滯形不能嬰名不能榮辱利不能窮通幽賛於鬼神明行乎禮樂經綸天下充周徧滿日新無息雖先聖作乎無始而後聖作乎無窮本無二性又豈有隂陽寒暑之累死生古今之間哉是故學為聖人者必務識心之體焉識其體矣不息所以為仁也此聖人與天為一之道大哉言乎舜禹知之乎吾徒其可以日月至焉而已乎孔子曰學而時習之此不息之端也言有盡㫖無窮有志於道者可忽諸弗措齋記南軒金華邵元通名齋曰弗措以為朝夕講習居處之地而求予為記其請厪甚予焉能忘言也中庸論誠之道其目有五曰學曰問曰思曰辨曰行而五者皆貴於弗措葢聖學與天地並髙明博厚而悠乆無疆也學者竭終身之力勉勉不已猶懼不及而况於若存若亡暫作復輟其何益乎弗措之義大矣雖然入徳有門户得其門而入然後有進也夫子之教人循循善誘始學者聞之即有用力之地而至於成徳亦不外是今欲求所持循而施吾弗措之功其可不深攷之於夫子之遺經乎試舉一端而論夫子之言曰弟子入則孝出則弟謹而信汎愛衆而親仁行有餘力則以學文嗟乎是數言者視之若易而為之甚難驗之不逺而測之愈深聖人之言化工也學者如果有志盍亦於所謂入孝出弟所謂謹而信所謂汎愛親仁者學之而弗措乎學然後知不足其間精微曲折未易盡也其亦問之而弗措乎思之未至終不為己物盍亦思之而弗措乎思之而有疑盍亦辨之而弗措乎思而得辨而明又盍行之而弗措乎是五者葢同體以相成相資而互相發也真積力乆所見益深所履亦固而所以弗措益有不可以已髙明博厚端可馴而識矣噫學不躐等也譬諸燕人適越其道里之所從城郭之所經山川之阻脩風雨之晦𡨕必一一實履焉中道無畫然後越可幾也若坐環堵之室而望越之渺茫車不發軔而欲乘雲駕風以遂抵越有是理哉且夫為孝必自冬温夏凊昏定晨省始為弟必自徐行後長者始故善言學者必以洒掃應對進退為先焉唯夫弗措之為貴也吾子母忽於予言誠能服夫子之教而用力焉則希音至味吾子將自得於心矣克齋記晦庵性情之徳無所不備而一言足以盡其妙曰仁而已所以求仁者葢亦多術而一言足以舉其要曰克已復禮而已葢仁也者天地所以生物之心而人物之所得以為心者也惟其得夫天地生物之心以為心是以未發之前四徳具焉曰仁義禮智而仁無不統已發之際四端著焉曰惻隠羞惡辭遜是非而惻懚之心無所不通此人之體用所以涵育渾全周流貫徹専一心之妙而為衆善之長也然人有是身則有耳目鼻口四肢之欲而或不能無害夫仁人既不仁則其所以滅天理而窮人欲者將益無所不至此君子之學所以汲汲於求仁而求仁之要亦曰去其所以害仁者而已焉非禮而視人欲之害仁也非禮而聴人欲之害仁也非禮而言且動焉人欲之害仁也知人欲之所以害仁者在是於是乎有以拔其本塞其源克之克之而又克之以至於一旦豁然欲盡而理純則其胷中之所存者豈不粹然天地生物之心而藹然其若春陽之温哉黙而成之固無一理之不具而無一物之不該也感而通焉則無事之不得於理而無物之不被其愛矣嗚呼此仁之為徳所以一言而可以盡性情之妙而其所以求之之要則夫子之所以告顔淵者亦可謂一言而舉也與然自聖賢既逺此學不傳及程氏兩先生出而後學者始得復聞其說顧有志焉者或寡矣若吾友會稽石君子重則聞其說而有志焉者也故嘗以克名齋而屬予記之予惟克復之云雖若各為一事其實天理人欲相為消長故克己者乃所以復禮而非克己之外别有復禮之功也今子重擇於斯言而獨以克名其室則其於所以求仁之要又可謂知其要矣是尚奚以予言為哉自今以往必將因夫所知之要而盡其力至於造次顛沛之頃而無或怠焉則夫所謂仁者其必盎然有所不能自已於心者矣是又奚以予言為哉顧其所以見屬之勤有不可以終無言者因備論其本末而書以遺之幸其朝夕見諸屋壁之間而不忘其所有事焉者則亦庶乎求仁之一助云爾無欲齋記勉齋家本仲訪予於于山之下相與讀周子程子以及先師朱子之書探其端緒以求其本原至於周子無欲則静之㫖本仲喟然歎曰入徳之要其在兹乎是可以名吾齋矣盍為我言其義予嘉本仲擇之精信之篤幸吾黨之有人斯文之未墜吾為之言曰寂然不動心之體也事物未接思慮未萌湛然純一如水之止如衡之平則其本静矣蔽交於前其中則遷而欲生焉欲熾而益蕩感之而動者既失其節寂然不動者亦且紛紜膠擾而不能以頃刻寧動静相因展轉迷亂天理日微人欲日肆矣故主静者所以制乎動無欲者所以全乎静此周子之意而亦有所自來也艮其背不獲其身行其庭不見其人主乎静也旦晝之梏亡則夜氣不足以存無欲則静也豈惟聖賢之教為然哉春夏陽之動也秋冬隂之静也方其静也一物不生萬籟不鳴人木于根冰凝于淵不若是無以嘘衆陽而生萬物及其動也物各付物天何言哉天且無心欲何有焉不若是無以肅羣隂而成嵗功矣天且不違而况於人乎夫健順五常性也精氣百骸形也君臣父子夫婦兄弟朋友之交道也徇耳目口腹之欲以厭足其蕞爾之形静以賊本然之性動以害當然之道上以逆天地之化下以違聖賢之教於禽獸奚擇焉誠能反而思之天之所以予我者如是其尊且貴也先立乎其大者則小者莫能奪焉視世之功名冨貴人之所大欲眇然若浮埃之在太空而况車馬輕裘飲食之間乎葢將與造物者相從於沖漠之境而非人世之所能覊縶也所謂襟懐洒落如光風霽月者其所養可知矣周子推明無極動静之義以繼孔孟不傳之緒而斷之以無欲則静之一言至其論聖學則曰無欲則静虚動直論養心則曰無欲則城立明通然則聖傅之樞要學者之塗轍果不出於斯言也哉毋自欺齋記勉齋李君徳進自太學歸蜀祭酒袁公喜其篤實而嗜學也為書毋自欺以勉之李君將歸以名其齋踰江過灊山屬予為之記予聞學之之道知與行而已自昔聖人繼天立極不曰知而曰精不曰行而曰一知不精行不一猶不知不行也聖賢相傳啓悟後學言知必曰知至言意必曰意誠至則事物之理無不通誠則念慮之發無不質曰至焉誠其精一之謂歟知與行者學之塗轍至與誠者學之歸宿有志於道者可不孳孳求止於是歟江出岷山東望滄海不知其幾千里也滔滔不息卒亦至焉誠故也觀於此則毋自欺之意可見矣予方懐信道不篤之懼而徳進之請適有感於予遂不辭而述其所聞以諗之且以自警云古文集成巻十四
