body:
  text: 古文集成巻七十八宋王霆震編前癸集九戒守戒韓昌黎斆齋云此篇論備在得人全篇斆齋批注詩曰大邦維翰按詩大雅板篇价人維藩大師維垣大邦維屏大宗維翰疑邦翰二字必有一誤書曰以蕃王室蔡仲之命諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴援而外施陷穽以待之宅於都者知穿窬之為盗則必峻其垣墻而内固扃鐍音訣鎻鑰也莊子固扃鐍以防之以小喻大此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈彊屈渠勿切强居亮切义臣兩切之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為之而有不足歟盖以謂不足為而不為耳天下之禍莫大於不足為而不為說透病源一無而不為三字非材力不足一有為字者次之不足為者敵至而不知材力不足一有為字者先事而思則其於禍也有間矣彼之屈彊者帶甲荷戈不知其多少其緜地則千里而與我壤地相錯無有丘陵江河洞庭孟門之闗其門又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乗吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒善譬童子之不抗魯雞之不期蜀雞之不支今夫鹿之與豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人結有力敵戒柳子厚斆齋云此篇論敵存滅禍皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國兢兢以彊六國既除􅑲􅑲音怡自得皃又淺意乃亡晉敗楚鄢范文為患厲之不圖舉國造怨左成十六年晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也六月晉楚遇于鄢陵戰楚師宵遁十七年范文子反自鄢陵使祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣六月戊辰士爕卒孟孫惡臧孟死臧恤藥石去矣吾亡無日左襄二十三年孟孫惡臧孫季孫愛之孟孫卒臧孫入哭甚哀其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣智能知之猶卒以危矧今之人曽不是思敵存而懼敵去而舞廢備自盈祗益為瘉俞愈二音敵存滅禍敵去召過有能知此道大名播懲病克壽矜壯死暴縱欲不戒匪愚伊耄我作戒詩思者無咎三戒序柳子厚東坡云予讀柳子厚三戒而愛之乃作河豚魚烏賊魚二說并序以自警全篇並依斆齋批㸃吾恒惡世之人恒胡登反常也不知推已之本而乘物以逞此下提出三件或依勢以干非其類出技以恣彊竊時以肆暴然卒迨于禍有客談麋驢鼠三物似其事作三戒臨江之麋斆齋云此篇戒依勢以干非其類者臨江之人畋得麋麑音眉宜鹿子也畜之入門羣犬垂涎揚尾皆來其人怒怛之自是日抱就犬習示之使勿動稍使與之戯善叙事積久犬皆如人意麑稍大忘已之麋也以為犬良我友抵觸偃仆益狎犬畏主人與之俯仰甚善然時啖其舌轉三年麋出門見外犬在道甚衆走欲與為戯外犬見而喜且怒共殺食之狼籍道上麋至死不悟言其不知覺悟黔之驢斆齋云此篇戒出技以恣强者黔無驢有好事者船載以入至則無可用放之山下虎見之尨然大物也以為神蔽林間窺之稍出近之憗憗魚僅切然莫相知他日驢一鳴虎大駭逺遁以為且噬已也甚恐然往來視之覺無異能者漸知其技益習其聲又近出前後終不敢摶稍近益狎蕩倚衝冐驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大􅗏虎檻切斷其喉盡其肉乃去噫形之尨也類有徳聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫永某氏之䑕斆齋云此篇戒竊時以肆暴者永地名有某氏者畏日拘忌異甚以為已生歳直子䑕子神也因愛䑕不畜猫犬一作又禁僮勿擊䑕倉廪庖厨悉以恣䑕不問由是䑕相告皆來某氏飽食而無禍某氏室無完器椸音移方言榻前几趙魏之間謂之椸一曰衣架無完衣飲食大率䑕之餘也晝累累與人兼行肆暴之時夜則竊齧鬭暴其聲萬狀不可以寢終不厭數歳某氏徙居他州後人來居䑕為態如故其人曰是隂類惡物也盗暴尤甚且何以至是乎哉假五六猫闔門撤瓦灌穴惡貫已滿購童羅捕之殺鼠如丘棄之隠處臰與臭同數月乃已嗚呼彼以其飽食無禍為可恒也哉藥戒宛丘斆齋批云此篇首論治痞之疾不可急攻以求快苦用藥之速則必耗元氣中間引秦啇君求快之過後歸美先王之治斡歸主意有力客有病痞部鄙反腹内結痛積於其中者伏而不得下自外至者捍而不得納從毉而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘造語向之捍者柔而不支焦鬲導逹呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是不逾月而痞五作五下文老每下輙愈然客之氣一語而三引體不勞而汗股不步而慄膚革無所耗於前而其中薾然莫知其所來嗟夫心痞非下不可已予從而下之術未爽也薾然獨何歟聞楚之南有良毉焉往而問之毉嘆曰子無歎是薾然者也凡子之術固為是薾然也坐吾語汝天下之理有甚快於予心者其末必有傷一篇主意求無傷於終者則初無望於快吾心夫隂伏而陽蓄氣與血不運而為痞究得病源横乎子之胷中者其累大矣擊而去之不須㬰而除甚大之累和平之物不能為也必將擊搏震撓而後可夫人之和氣沖然而甚微泊乎其易危意高擊搏震撓之功未成而子之功盖已病矣由是觀之則子之痞凢一快者子之和一傷矣不終日而快者五則子之和平之氣不既索乎故膚不勞而汗股不步而慄薾然如不可終日也且將去子之痞而無害於和乎子歸燕居三月齋戒而復請之毉曰子之氣少復矣取藥而授之曰服之三月而疾少平又三月而少康終是年而復常且飲藥不得亟進客歸而行其說然其初使人懣莫困反然遲之盖三投藥而三反之也然日不見其所攻之效則月異而時不同盖終歳疾平客謁毉再拜而謝之坐而問其故毉曰是毉國之說也豈特毉之於疾哉子獨不見夫秦之治乎引秦為證民悍而不聴令情而不勤事放而不畏法令之不聴治之不變則秦之民嘗痞矣商君見其痞也引歸本意厲以刑法威以斬伐悍戾猛鷙不貸毫髮痛剗而力鋤之於是乎秦之政如建瓴流蕩四逹無敢或拒而秦之痞嘗一快矣自孝公以至二世也凢幾痞而幾快矣乎頑者已圯彊者已柔而秦之民無歡心矣史商君傳孝公用衛鞅鞅欲變法孝公曰善卒定變法之令令民為什伍而相牧司連坐不告奸者腰斬告奸者與斬敵首同賞匿奸者與降敵同罰故猛政一快者歡心一亡積快而不已而秦之四支枵然徒有其物而已民心日離而君孤立於上故匹夫大呼不終日而百病皆起秦欲運其手足肩膂而漠然不我應矣故秦之亡者是好為快者之過也昔者先王之民歸美先王之治其初亦嘗痞矣先王豈不知砉然擊去之以為速也惟其有懼於終也故不敢求快於吾心優柔而撫存之教以仁義導以禮樂隂解其亂而徐去其滯文工使其悠然自趨於平安而不自知方其未也旁視而懣然者有之矣然月計之嵗察之前嵗之俗非今嵗之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心於是政成教逹安樂悠久而無後患矣是以三代之治皆更數聖人歴數百年而後俗成則予之藥終年而愈疾盖無足怪故曰天下之理有甚快於予心者其末也必有傷求無傷於其終則初無望於快吾心昭前主意結有力雖然豈獨於治天下哉客再拜而記其說言戒洓水迂叟曰言不可不重也子不見鐘鼔乎夫鐘鼔扣之鳴鏗鏘鍧鞳人不以為異也若不扣而自鳴人孰不謂之妖邪可以言而不言猶叩之而不鳴也亦為廢鐘鼓也古文集成巻七十八
