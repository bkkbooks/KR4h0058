body:
  text: 古文集成巻二十三宋王霆震編前丁集二表進春秋傳表紹興六年十二月上胡文定伏觀春秋二百四十二年其行事備矣仲尼因事属辭深切著明非五經比也本夫周室東遷禮樂征伐自諸侯出及平王末年王迹旣熄故春秋作於隱公之初逮莊僖而下五霸迭興假仁義而行以推戴宗周為天下之共主號令征伐莫敢不從其文則史官稱述無制作之法其義則以尊周為名而仲尼固曰丘竊取之矣霸徳旣衰諸侯放恣政在大夫専權自用官及失徳寵賂益彰然後陪臣執國命夷狄制諸夏皆馴致其道是以至此極耳仲尼徳配天地明並日月自以無位與時道不行於天下也制春秋之義見諸行事垂訓方來雖祖述憲章上循堯舜文武之道而改法創制不襲虞夏商周之迹葢洪水滔天下民昏墊與簫韶九成百獸率舞並載於虞書大木斯拔與嘉禾合穎鄙我周邦與六服承徳同垂乎周史此上世帝王紀事之例至春秋則凡慶瑞之符禮文常事皆削而不書而災異之變政事闕失則悉書之以示後世使鑒觀天人之理有恐懼祇肅之意若事斯語若書諸紳若列諸座右若几杖盤盂之有銘有戒乃史外傳心之要典於以反身日加修省及其旣乆積善成徳上下與天地同流自家行國措之天下則麟鳯在郊龜龍游沼其道亦可馴致之也故始於隱公止於獲麟而以天道終焉比於闗雎之應而能事畢矣書火於秦賴諸儒口相傳授及漢初興張子房為韓滅秦以明春秋復讎之義三老董公請漢為義帝發喪以暴項羽弑君之惡下逮武宣之世時君信重其書學士大夫誦說用以斷獄決事雖萬目未張而大綱克正過於春秋之時其效亦可見矣粤自熙寧崇尚釋老䝉莊之學以虛無為宗而不要義理之實殆及崇寧曲加防禁由是用事者以災異之變政事闕失則黙不敢言而慶瑞之符與禮文常事則詠歌賛誦洋洋乎盈耳是與春秋正相反也侈心益縱至夷狄亂華莫之能遏豈不痛哉陛下天錫勇智聖徳日新嗣承寶位於三綱九法淪斁之後發於獨斷崇信是經將以撥亂世反之正聖王之志旣自得之又命臣下有能誦習其書者使訓明其義而臣以荒蕪末學榮奉詔音輙不自揆罄竭所聞修成春秋傳三十巻十萬餘言上之御府恭惟肅將天討之餘萬幾之暇特留宸念時賜省覽取自聖裁鑒天人休咎之符覈賞罰是非之實懋檢身之盛徳恢至治之逺圖式叙邦經永康國歩進書集傳表淳祐七年八月上蔡抗臣抗言惟精惟一以執中蓋三聖傳心之法無黨無偏而建極乃百王立治之經念先臣親繹於師承而遺帙粗明乎宗旨恭逢叡聖敢效涓埃臣抗惶懼惶懼頓首頓首臣竊攷典謨訓誥誓命之文無非載道及更劉班賈馬鄭服之手浸以失真二孔註疏之雖存諸家箋釋之愈衆黨同伐異已乖平平蕩蕩之風厭常喜新又失渾渾灝灝之旨訛以相襲雜而不純曁皇圖赤伏之中興有大儒朱熹之特出經皆為之訓傳義理洞明書尤切於討論工夫未逮謂先臣沉從游最乆見道已深俾加探索之功以遂發揮之志微辭奥旨旣得於講貫之餘大要宏綱盡授以述作之意徃復之緘具在刪潤之墨如新半生殫採摭之勞六巻著研覃之思帝王之制坦然明白聖賢之言炳若丹青使登徹於九重亦緝熙之一助茲者恭遇皇帝陛下智由天錫徳與日新任賢勿貳去邪勿疑旣從民情而罔咈保邦未危制治未亂益思君道之克艱雖聰明之憲天猶終始而典學臣誤蒙拔擢獲玷班行自惟章句之徒莫效絲毫之報抱文書而永歎望宸闕以冒塵倘獲清閒乙覽之俯臨豈但疇昔辛勤之不朽置之座右常聞無怠無荒之規冒于海隅咸仰克寛克仁之治進大學衍義表端平元年十月丁夘上真西山伏以汗竹雖厪何補聖經之奥食芹欲獻誤蒙天語之温以十年纂輯之餘欣一旦遭逢之幸中謝惟大學設八條之教為人君立萬世之程首之以格物致知示窮理乃正心之本推之於齊家治國見修已惟及物之原曽子之傳獨得其宗程氏以來大明厥旨迨師儒之繼出有章句之昭垂臣少所服膺晚而知趣謂淵源逺矣實東魯教人之微言而綱目粲然乃南面臨民之要道曩叨侍從論思之列適當姦䛕蒙蔽之時念將開廣於聰明惟有發揮於經術使吾君之心炳如白日於天下之理洞若秋毫雖共兠雜進於堯朝豈魑魅能逃於禹鼎不量菲薄欲效編摩遽罹三至之讒徒結九重之戀旣投閑而置散因極意以研精畎畆不忘君每惓惓於報上藩牆皆置筆幾矻矻以窮年首列聖賢性命道徳之言旁采古今治亂安危之迹必提其要皆聚此書凡諸老先生之講明粗加該括於君子小人之情狀尤極形容載瞻海岳之崇深期效涓埃之禆補兹葢恭遇皇帝陛下乾旋坤轉日就月將於緝熙單厥心基命遹隆於成后念終始典于學遜志克邁於商宗方將切磋琢磨而篤于自修定静安慮而進於能得事欲明於本末理期貫於精粗適粹成編冒塵清燕止其所止願益加止善之功新以又新更推作新民之化上資治通鑑表元豐七年十一月上司馬光臣光言先奉勑編集歴代君臣事迹又奉聖旨賜名資治通鑑今已了畢者伏念臣性識愚魯學術荒疎凡百事為皆出人下獨于前史粗嘗盡心自幼至老嗜之不厭每患遷固以來文字繁多自布衣之士讀之不徧況於人主日有萬幾何暇周覽臣常不自揆欲刪削冗長舉撮機要専取闗國家興衰係生民休戚善可為法惡可為戒者為編年一書庶使前後有倫精粗不雜私家力薄無由可成伏遇英宗皇帝資睿智之性敷文明之治思厯覽古事用恢張大猷爰詔下臣俾之編集臣夙昔所願一朝獲伸踊躍奉承惟懼不稱先帝仍命自選辟官屬於崇文院置局許借龍圖天章閣三館秘閣書籍賜以御府筆墨繒布及御前錢以供果餌以内臣為承受眷遇之榮近臣莫及不幸書未進御先帝違棄羣臣陛下紹膺大統欽承先志寵以冠序錫之嘉名每開經筵常令進讀臣雖頑愚荷兩朝知待如此其厚隕身䘮元未足報塞苟智力所及豈敢有遺會差知永興軍以衰疾不任治劇乞就冗官陛下俯從所欲曲賜容養差判西京留司御史臺及提舉嵩山崇福宫前後六任仍聴以書局自隨給之祿秩不責職業臣既無他事得以研精極慮窮竭所有日力不足繼之以夜徧閲舊史旁采小説簡牘盈積浩若淵海抉摘幽隱校計毫釐上起戰國下終五代凡一千三百六十二年修成二百九十四巻又畧舉事目年經國緯以備檢尋為目錄三十巻又參考羣書評其同異俾歸一塗為考異三十巻合三百五十四巻自治平開局迨今始成嵗月淹久其間抵捂不敢自保罪負之重固無所逃臣光誠惶誠懼頓首頓首重念臣違離闕廷十有五年雖身䖏于外區區之心朝夕寤寐何嘗不在陛下之左右顧以駑蹇無施而可是以専事鉛槧用酬大恩庶竭涓塵少禆海岳臣今筋骸癯瘁目視昏近齒牙無幾神識衰耗日前所為旋踵遺忘臣之精力盡於此書伏望陛下寛其妄作之誅察其願忠之意以清閒之燕時賜省覽監前世之興衰考當今之得失嘉善矜惡取是捨非足以懋稽古之盛徳躋無前之至治俾四海羣生咸䝉其福則臣雖委骨九泉志願永畢矣進續資治通鑑長編表乾道四年四月上李燾臣燾言先於去年八月准尚書省劄子三省同奉聖旨依敷文閣直學士汪應辰奏取臣所著續資治通鑑自建隆迄元符令有司繕寫校勘藏之秘閣臣尋於十四日䝉恩賜對面奉聖旨令臣早投進遂除官郎省兼職史局續又准尚書省劄子奉聖旨令臨安府給札臣今先次寫到建隆元年至治平四年閏三月五朝事迹共一百八年計一百八巻内建隆元年至太平興國元年太祖一朝事迹雖曽於隆興元年臣知榮州日具表投進已蒙降付史館後來稍有增益謹重别抄錄投進外餘治平以後文字増多兼見修四朝正史未畢欲望聖慈特賜寛假臣更加整齊節次修寫投進疎逺微賤僣為此書罪當誅絶聖主不即麾斥乃過聴而兼收之臣死且不朽矣臣誠惶誠恐頓首頓首臣竊聞司馬光之作資治通鑑也先使其僚採摭異聞以年月日為叢目叢目旣成乃修長編唐三百年范祖禹實掌之光謂祖禹長編寧失於繁無失於略當時祖禹所修長編蓋六百餘巻光細刪之止八十巻今資治通鑑唐紀自一百八十五巻至二百六十五巻是也故神宗皇帝序其書以為博而得其要簡而周於事臣誠不自揆度妄意纂集雖義例悉用光所創立錯綜銓次皆有依憑其間扺捂要亦不敢自保區區小忠前表葢嘗具之仰惟祖宗之豐功盛徳當與唐虞三代比隆乾坤之容日月之光繪畫臻極訖弗能近矧令拙工强施丹墨臣誠愚䦣豈不知罪然而統會衆説掊擊偽辯使姦欺訛訕不能乘隙亂真祖宗之豐功盛徳益以昭明譬諸海岳或取涓埃之助顧臣此書詎可便謂續資治通鑑姑謂續資治通鑑長編庶幾可也其篇帙或相倍蓰則長編之體當然寧失於繁猶光志云爾伏惟皇帝陛下煥乎文章固已經緯兩儀黼黻萬化如臣薄技又安足陳陛下徒以祖宗之孫謀彜憲徃徃在是委曲加恵之使前承命距躍冥冒來獻夤緣幸會得御燕閑千百有一倘符神指更擇耆儒正直若光者属以刪削之任遂勒成我宋大典垂億萬年如神宗皇帝所謂博而得其要簡而周於事者則將與六經俱傳是固非臣所能而臣之區區小忠因是亦獲自盡誠死且不朽矣所有續資治通鑑長編一百八巻今寫成一百七十五冊并目錄一冊謹隨表上進進新唐書表嘉祐五年六月上曽公亮切惟唐有天下幾三百年其君臣行事之始終所以治亂興衰之蹟與其典章制度之英宜其粲然著在簡冊而紀次無法詳略失中文采不明事實零落又百有五十年然後得以發揮幽昧補緝闕亡黜正偽謬克備一家之史以為萬世之傳成之至難理若有待臣某誠惶誠恐頓首頓首伏惟體天法道欽文聰武聖神孝徳皇帝陛下有虞舜之智而好問躬大禹之聖而克勤天下和平民物安樂而猶垂心積精以求治要日與鴻生舊學講誦六經考覽前古以謂商周以來為國長乆惟漢與唐而不幸接乎五代衰世之士氣力卑弱言淺意陋不足以起其文而使明君賢臣雋功偉烈與夫昏虐賊亂禍根罪首皆不得暴其善惡以動其耳目誠不可以垂勸戒示乆逺甚可歎也乃因邇臣之有言適契上心之所閔於是刋修官翰林學士兼龍圖閣學士給事中知制誥臣歐陽脩端明殿學士兼翰林侍讀學士龍圖閣學士尚書吏部侍郎臣宋祁與編脩官禮部郎中知制誥臣范鎮刑部郎中知制誥臣王疇太常博士集賢校理臣宋敏求秘書丞臣吕夏卿著作佐郎臣劉義叟等並膺儒學之選悉發秘府之藏俾之討論共加刪定凡十有七年成二百二十五巻其事則増於前其文則省於舊至於名篇著目有革有因立傳紀實或増或損義類凡例皆有據依纖悉綱條具載别錄臣某典司事領徒費日月誠不足以成大典稱明詔無任慙懼戰汗屏營之至進唐鑑表元祐元年二月二十八日上范祖禹臣切以自昔下之戒上臣之戒君必以古驗今以前示後禹益之於舜則言其所無于佚于樂傲虐之作防於未然周召之於成王則相古先民歴年墜命日陳于前皆所以進哲徳而養聖功也臣某誠惶誠懼頓首頓首臣昔在先朝承乏書局典司載籍實董有唐嘗於紬次之餘稽其成敗之迹以義理緝成一書忍與庶人傳言百工執藝獻之先帝庶補萬分比臣赴職不幸先帝遽揚未命伏遇皇帝陛下嗣膺大統睿智日躋詳延耆儒啟沃聖學監于前代宜莫如唐儀刑祖宗之典則四方承式萬世永賴臣之此書雖不足以發揮徳業廣助聰明拳拳之忠不能自己苟有所得不敢不告輒以狂愚塵玷日月罪當誅死伏惟清閒之燕少賜省覽其唐鑑十二巻繕寫成六冊謹隨表上進以聞古文集成巻二十三
