body:
  text: 古文集成巻五十宋王霆震編前庚集四銘存誠齋銘并序陳幾叟余嘗問所以爲道之方於外舅楊先生曰大學之書聖學之門庭也是可讀而求之余退而學焉觀其修身齊家治國平天下之道其本在於誠吾意而已其説簡而盡其理直而周其用要而博雖不敢疑而未知其可行也已而質之先生先生曰是固然又辱教之曰中庸之書天道之淵源也是可讀而知之余又退而學焉至其論至誠不息其極至於不見而章不動而變無爲而成則作而嘆曰嗚呼盛哉誠若此天下國家其不足爲也已又從而考之則天之所以高明地之所以博厚山岳之所以峙江河之所以流莫不以此葢嘗收視反聽一塵之慮不萌於胷中表裏洞然機心自息既自以爲知之矣又以謂其致之也不凝則其居之也必不安其養之也不熟則其發之也必不粹斯道也其可須叟離哉以其不可離也而莫之違之故吾誠常存焉葢古聖賢未有釋此而能至者以余之不肖幸與知之而數年之間汨没於奔走曽未得少暇以休滌其心而坐進乎此此余之所以乆而不入於道也大觀元年先生官於餘杭夏四月余自親側復來因即縣宇之東舊屋數椽治爲講習之所揭其榜曰存誠齋葢有志乎力行其所知也自今而往凡吾飲食起居出處語黙之際必常見其所謂誠者了然於吾心然後出之庶幾日進於君子而不爲小人之歸也則命名之意可無愧矣既以自矢且爲之銘曰天地之道爲物不貳君子養心致一而已喜怒哀樂未發其幾意必固我絶之於微正當此時寂然不動有物感之全體即用是之爲一以一故誠一日至焉天下歸仁我觀聖賢異域殊世惟是之存若合符契敬以為宅忠恕其門自我闢之推而及人唯我與物初無二體各私其私則有彼己私智磨盡成性渾然無物非我其天守全天理所在如鏡如像有來斯應不與俱往又如月影散落萬川定相不分處處皆圓相彼世儒内外不一不勝其私機變横出孰知至人動莫非真飲食起居誠無不形我作此齋大可容膝宴坐其間虚而不迫廻光内照隱几無言氣專神凝息調而淵表裏俱融焉有所倚或紛乎前行以無事古人逺矣斯道莫傳以名存誠其庶㡬焉主一齋銘南軒為范文叔作人之心一何危紛百慮走千岐惟君子克自持正衣冠攝威儀澹以整儼若思主于一復何之事物來審其㡬應以專匪可移理在我寧彼隨積之乆昭厥㣲静不偏動靡違嗟勉哉自邇卑惟勿替日在兹敬恕齋銘晦庵為陳師中作出門如賓承事如祭以是存之敢有失墜已所不欲勿施於人以是行之與物皆春胡世之人恣已窮物惟我所便謂彼奚卹孰能反是斂焉厥功于墻于􅃵仲尼子弓内順于家外同于邦無小無大罔時怨恫為仁之功曰此其極敬哉恕哉永永無斁敬齋銘南軒為劉氏作天生斯人良心則存聖愚曷異敬肆是分事有萬變統平心君一頺其綱泯焉絲棼自昔先民脩已以敬克持其身順保常性敬匪有加惟主乎是履薄臨深不昧厥理事至理形其應告響而實卓然不與俱往動静不違體用無忒惟敬之功恊乎天德嗟爾君子敬之敬之用力之乆其惟自知勿憚其艱而或怠遑亦勿迫切而以不常毋忽事物必精吾思察其所發以㑹于㣲忿慾之萌則杜其源有過斯改見善則遷是則天命不遏于躬魚躍鳶飛仁在其中於焉有得學則不窮知至而至知終而終嗟爾君子勉哉敬止成已成物匪曰二致任重道逺其端伊邇毫釐有差繆則千里惟建安公自力右義我作銘詩以諗同志敬齋銘誠齋維事維萬維心維一聽奕思鴻維弍維忽弍豈其忱忽豈其欽維動維言其弗喪心三堂孫子學以為己欲趾聖門主一為址謹獨凛然履臨氷淵及臻厥成對越昊天恕齋銘東萊為陳同父作實理難精實德難居實責難受實病難除實知其難於人則寛惟實惟寛惟恕之端天地變化草木繁廡賾厥實然可求其故陳子作齋侑坐有勒匪尚其通亦尚其塞中齋銘東萊為陳同父作泝流之舟挽之猶遲下坂之車柅之猶馳木火金水燥濕不齊有習有積有居有移亦既用力蘄適厥宜凢此數者盖陰乗之潛有所贅黙有所虧是過不及察之甚㣲凛乎其嚴岌乎其危匪曰設戒理則如斯不將不迎不留不處敬而無失大中之矩所性齋銘山谷道行不加窮處不病此之謂性由思入睿由睿入覺此之謂學性則聖質學則聖功謂予不能倒戈自攻天下求師四海取友道立德尊宗吾性有求放心齋銘晦庵為程正思作天地變化其心孔仁成之在我則主于身其主伊何神明不測發揮萬變立此人極晷刻放之千里其奔非誠曷有非敬曷存孰放孰求孰亡孰有詘伸其臂反覆惟手防㣲謹獨兹守之常切問近思曰惟以相謹獨齋銘澹庵為黄世永作謹獨伊何請條其目安而行之如顔之浴利而行之如顔之宿勉而行之如禇之燭由勉至安信道乃篤猗歟哲人盱江黄先戒謹恐懼闇不愧天非利非勉得之自然作銘者誰廬陵胡銓學古齋銘晦庵為周嗣恭作相古先民學以為己今也不然為人而已為己之學先誠其身君臣之義父子之仁聚辨居行無怠無忽至足之餘澤及萬物為人之學􅂱然春華誦數是力纂組是誇結駟懐金煌煌煒煒世俗之榮君子之鄙維是二者其端則㣲眇綿弗察胡越其歸卓哉周侯克承先志日新此齋以廸來裔此齋何有有圖有書厥裔斯何衣冠進趍夜思晝行咨詢謀度絶今不為惟古是學先難後獲匪亟匪徐我其銘之以警厥初務本齋銘為左揆作誠齋畯穡乎穫梓穡乎斵伊士所穡何穡非學學將奚先何學非賢自賢而聖自聖而天澮則有岸甽則有畔天人之道畔岸河漢河漢可涯道可方思其端惟四乃六其藝既三其綱亦五其常闖之彌幽跂之彌悠據其一原萬善來求人有怙恃誰無孟季執柯伐柯乃睨而視二典兩帝參天兩地曷躋登兹不曰孝弟有若肖尼參乎攸嗤本立道生是以似之瑟彼學子遐不務此聖其逺而子其反而邵業齋銘撙齋為夏德謙作孰狃匪安孰揉匪囏孰知夫安者囏之端孰囏弗遂孰安弗累孰知夫囏者安之地學譬則山㡬簣始完初未着工雖輟奚歎半焉而廢前功是喟况九仞高但虧一簣我始子期乃聖乃賢子今我聽乃䇿乃鞭維其聽之不石而䥴尚其竟之不䥴而傳時術齋銘山谷禹初無功洪水滔國作十三載民降丘宅君子觀於蟻而知學之可積囦乎齋銘南軒嗚呼囦乎性命之㣲言之實難孰探其源匪言之艱天高地下而人其心在躬者神統乎高深其端伊邇曷睨以視當落其華而究斯理嗚呼信其為囦乎也已至樂齋銘晦庵為葉學古作呻吟北窻氣鬰不降我讀我書如病得甦客問此書中作何味君乃嗜之如此其至趣為子語無味乃然是有味者乃㾞乃羶天下之樂我不敢知至歐陽子乃敶斯詩我思古人實感我心惟曰愔愔式鈎且深虚舟齋銘南軒為詹體仁作心本虛理則實應事物無轍迹來不迎去不留彼萬變我日休行斯通險可濟孚豚魚貫天地曷臻兹在克已去其室斯虛矣師立齋銘水心為魏華甫作人之睎聖資盖匪夷亦或僅有而患失時我材甚良我年孔當捨彼雋轍鮮為物降命以義知心非外假至於不踰夫孰禦者雖則云然有言于兹是一非一必也貫之曽參之忠端木之恕浩乎兩間何憂何懼既見其易復思其難一簣苟止無以為山卓哉淵㣲大矣文獻式昭斯銘亹亹不倦古文集成巻五十
