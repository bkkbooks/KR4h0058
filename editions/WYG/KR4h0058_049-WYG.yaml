body:
  text: 古文集成巻四十九宋王霆震編前庚集三銘西銘張横渠横渠先生銘其書室之兩牖東曰砭愚西曰訂頑伊川先生曰是起争端不若止謂之東西銘葉采云頑者暴忍而不仁愚者昬塞而不智訂頑主仁而義在其中砭愚主智而禮在其中明道先生曰孟子之後只有原道一篇其間言語固多病然大要儘近理若西銘則是原道之宗祖也又曰游酢得西銘讀之即渙然不逆於心曰此中庸之理也能求於語言之外者也又曰西銘顥得此意只是須得子原如此筆力他人无縁做得孟子以後未有人及此文字省多少言語要之仁孝之理備于此須叟即不於此則便不仁不孝也二程語録云楊時問於伊川曰西銘深發聖人之㣲意然言體而不及用恐其流至於兼愛後世有聖賢推本而論未免歸過於横渠夫子盍為一言推明其用乎子曰横渠立言誠有過者乃在正䝉至於訂頑推理以存義曠前聖所未發與孟子性善養氣之論同功豈墨氏之比哉西銘明理一而分殊墨氏則二本而无分分殊之蔽私勝而失仁无分之害兼愛而无義分立而推理一以止私勝之流仁之方也无别而迷兼愛至於无父之極義之賊也子比而同之過矣夫欲使人推而行之木為用也反謂不及是不亦異乎時曰時也始從明道即授以此書於是始知為學之大方固將終身服之豈敢疑其失與墨氏比也然其書以民為同胞鰥寡孤獨為兄弟非明者黙識安知理一而分殊哉故恐其深至於兼愛非謂其言之發與墨氏同也夫惟理一而分殊故聖人稱物逺近親踈各當其分所以施之其心一焉所謂平施也昔意西銘有平施之心无稱物之義疑其辭有未逹也今夫子開諭學者无惑矣龜山曰西銘之書以民為同胞長其長㓜其㓜以鰥寡孤獨為兄弟之无告者所謂明理一也然其辭無親親之教非明者嘿識於言意之表烏知所謂理一而分殊哉故竊恐其流遂至於兼愛非謂西銘之書為兼愛而發與孟子同也故人之所以大過人者无他善推其所為而已老吾老以及人之老㓜吾㓜以及人之㓜所謂推之也孔子曰老者安之少者懐之則无事乎推矣无事乎推者理一故也理一而分殊故聖人稱物而平施之兹所以為仁之至義之盡也歟何謂稱物親踈逺近各當其分所謂稱也何謂平施所以施之其心一焉所謂平也某昔者竊意西銘之書有平施之心无稱物之義故曰言體而不及用葢指仁義為説也故仁之過其蔽无分无分則妨義妨義之過其流自私自私則害仁害仁則楊氏之為我也妨義則墨氏之兼愛也二者其失雖殊其所以得之於聖人則均矣西銘之旨隱奥難知固前聖所未發也龜山曰如西銘一篇伊川謂與孟子性善養氣之論同功皆前聖所未發也詳味之乃見其用意之深性命之説雖揚雄尤未能造其藩籬况餘人乎而世儒易言之多見其妄也又曰横渠作西銘亦只是要學者求仁而已龜山語録云論西銘言河南先生曰理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民仁民而愛物其分不同故所施不能无差等或曰如是則體用果離而為二矣曰用未嘗離體也且以一身觀之四體百骸皆具所謂體也全其用處則屨不可加之於首冠不可納之於足則即體而言分在其中矣無垢先生云余觀西銘大意此謂人梏於形體而不知我天地之子不與動植同生上與聖賢同氣要當窮神知化不愧屋漏存心養性以盡為子之道又當惡㫖酒育英才不為持已接人之方以合天地之心而遇因苦遭患難當如舜如申生如曽參如伯竒以聽天地之命而富貴福澤為天地之厚我貧賤憂戚為天地之成我存則順天地没則安天地乃為大孝之子耳又云西銘只是發明一箇事天底道理所謂事天者循天理而已晦庵先生曰天地之間理一而已然乾道成男坤道成女二氣交感化生萬物則其大小之分親踈之等至於十百千萬而不能齊也不有聖賢者出孰能合其異而反其同哉西銘之作意葢如此程子以為明理一而分殊可謂一言以蔽之矣葢以乾為父坤為母有生之類无物不然所謂理一也而人物之生血氣之屬各親其親各子其子則其分亦安得而不殊哉一統而萬殊則雖天下一家中國一人而不流於兼愛之蔽萬殊而一貫則雖親踈異情貴賤異等而不梏於為我之私此西銘之大指也觀其推親親之厚以大无我之公因事親之誠以明事天之道葢无適而非所謂分立而推理一者夫豈專以民吾同胞長長㓜㓜為理一而必黙識於言意之表然後知其分之殊哉且所謂稱物平施者正謂稱物之宜以平吾之施云爾若无稱物之義則亦何以知夫所施之平哉龜山第二書葢欲發明此意然言不盡而理有餘也故愚得因其説而遂言之又云西銘則推人以之天即近而明逺於學最為親切又云昨日說西銘都相穿透所以大極圖説五行一陰陽也陰陽一太極也二氣交感所以化生萬物這便是天地之塞吾其體天地之帥吾其性只是説得詳畧有緩急眞西山云西銘推事親之心以事天葢父母生我者也而所以生之者天地也天賦以氣地賦以形父母固我之父母也天地亦我之父母也朱文公曰父母者一身之父母也天地者人與物已與人皆共以為父母者也父母生我也四肢百骸無一不全必能全其身之形然後為不忝於父母天地之生我也五常百善無一不備必能全其性之理然後為不負於天地故仁人事親如事天事天如事親此又西銘之妙指不可以不知也兼山與艮齋論西銘曰西銘言乾稱父坤稱母予兹藐焉乃混然中處伊川謂理一分殊理一則無賤民分殊則有貴君揚中立謂其言體不及用同於墨氏兼愛葢似之而非者也墨氏不知三才之理反謂分一於西銘之義兩失之中立先生西銘之論劣於中庸當觀先生於中庸不當觀先生於論西銘之日且自墨子者以君臣並耕為義是不知理一者在道分殊者在事而欲君臣之分同並耕之事此亂天下也孟子闢之而後分始明後世分明之主至殫竭天下財力宫室車服飲食以私一人奢侈之奉政煩賦重民失其業又豈知同胞之民當均所愛哉此張氏之論所由以發所以救分殊之弊也伊川曰分殊之弊私勝而失仁正謂是也分而推理一以止私勝之流仁之方也理一之道在君分殊之道在臣民文王之時無凍餒之民知理一也庶民攻之不日成之知分殊也理一而貴民故無秦皇漢武之事分殊而尊君故無墨子並耕之説墨子既不知理之一而謂分之一如此則民得以賤君也艮齋答曰理一仁說也分殊義說也專於理而分之不知墨之所以為仁者然也專於分而理之不知楊之所以為義者然也墨之仁仁也而所以不得曰仁者分有迷也楊之義義也而所以不得曰義者理有虧也欲知楊墨之仁義是銘亦能為蓍龜乾稱父坤稱母予兹藐音眇焉乃混然中處晦庵云天陽也以至健而位乎上父道也地隂也以至順而位乎下母道也人稟氣於天賦形於地以藐然之身混合無間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者健而無息之謂萬物之所資以始者也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父母乎萬物者故指而言之張子韶云乾吾父坤吾母吾乃乾坤之子與人物混然處于中間者也吕與叔云人者萬物之靈受天地之中以生為天地之心者也能知其所自出故事天如事親故天地之塞吾其體天地之帥吾其性晦庵云乾陽坤隂此天地之氣塞乎兩間而人物之所資以為體者也故曰天地之塞吾其體乾健坤順此天地之志為氣之帥而人物之所得以為性者也故曰天地之帥吾其性深察乎此則父乾母坤混然中處之實可見矣子韶云吾之體不止吾形骸塞天地間如人物如山川如草木如禽獸昆蟲皆吾體也吾之性不止吾視聽言貌思凡天地之間若動作若流峙若生植飛翔濳泳必有造之者皆吾性也與叔云克已復禮天下歸仁此之謂體盡其心則知其性知其性則知生矣此之謂性民吾同胞物吾與也晦庵云人物並生於天地之間其所資以為體者皆天地之塞其所得以為性者皆天地之帥也然體有偏正之殊故其於性也不无明暗之異惟人也得其形氣之正是以其心最靈而有以通乎性命之全體於並生之中又為同類最貴者焉故曰同胞則其視之也皆如己之兄弟矣物則得夫形氣之偏而不能通乎性命之全故與我不同類而不若人之貴然原其體性之所自是亦本之天地而未嘗不同也故曰吾與則其視之也亦如已之儕輩矣惟同胞也故以天下為一家中國為一人如下文復云物吾與也故凡有形於天地之間者若動若植有情無情莫不有以若其性遂其宜焉此儒者之道所以必至於參天地贊化育然後為功用之全而非有所彊於外也子韶云既為天地生成則凡與我同生於天地者皆同胞也既同處於天地間則凡林林而生蠢蠢而殖者皆吾黨與也與叔云均有是性彼傷則我傷故有怵惕惻隱之心均有是生彼傷則我所不欲故血氣之類弗身踐而草木以時伐大君者吾父母宗子其大臣宗子之家相也尊高年所以長其長慈孤弱所以㓜其㓜聖其合德賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也晦庵云乾父坤母而人生其中則凡天地之人皆天地之子矣然繼承天地統理人物則大君而已故為父母之宗子輔佐大君綱紀衆事則大臣而已故為宗子之家相天下之老一也故凡尊天下之高年者乃所以長吾之長天下之㓜一也故凡慈天下之孤弱者乃所以㓜吾之㓜聖人與天地合其德是兄弟之合德乎父母者也賢者才德過於常人是兄弟之秀出乎等夷者也是皆以天地之子言之則凡天下之疲癃殘疾惸獨鰥寡非吾兄弟之无告者何哉子韶云大君謂人主吾為天地之子人主主天地之家事是大君吾父母宗子也大臣相天子以繼天地之業是大臣者宗子之家相也高年先我生於天地間者也有若吾兄弟然吾尊之是長天地之長也孤兒弱子後吾生於天地間者也有若吾弟然吾慈之是㓜天地之㓜也聖人合天地之德者也賢人特天地之秀也疲癃老疾也殘疾廢疾也惸獨鰥寡㓜而无父者老而无子者老而无妻者老而无夫者皆天民之窮者也然數等无告者與吾周生於天地其困苦如此是乃吾兄弟顛沛而无告訴也吾其可不恤乎與叔云大君者裁成天地之道輔相天地之宜奉天命代天治猶宗子治吾父母之家事也大臣爕理陰陽寅亮天地相其大君猶家相也宗子家相吾所以敬者治吾父母之事云乎大君大臣治吾天地之事可不敬乎以天下為一家中國為一人則天下之長於我者皆吾父兄天下之㓜於我者皆吾子弟天下之有聖人其敬之也猶父之執友盖與天地合徳也天下之有賢者皆吾之執友天地之秀賢於我者也天下之貧民皆吾宗族兄弟之貧者也于時保之子之翼也樂且不憂純乎孝者也晦庵云畏天以自保者猶其敬親之至也樂天而不憂者猶其愛親之純也子韶云畏天之威若畏父母之嚴保其心而不敢少肆焉是子之敬者也樂天之命雖患難而不憂此天地純孝之子也與叔云聽於無聲視於無形敬親不敢慢也恐懼乎其所不睹戒謹乎其所不聞敬天不敢慢也惟順於父母可以解憂樂於事親者也不識不知順帝之則樂於事天者也舉天下之重無以加此誠敬乎此者也舉天下之樂無以間此誠樂乎此者也事親事天雖異所以敬樂則一也違曰悖德害仁曰賊濟惡者不才其踐形惟肖者也晦庵曰不循天理而循人慾者不愛其親而愛他人也故謂之悖德戕滅天理自絶本根者賊殺其親大逆無道也故謂之賊長惡不悛不可教訓者世濟其凶増其惡名也故謂之不才若夫盡人之性而有以充人之形則與天地相似而不違矣故謂之肖子韶云違天地之心是不愛其親者故謂之悖德害天地之仁是父母之賊也世濟其惡是天地不才之子踐履天地之形以貌言視聽思之形為恭從聰明睿之用是克肖天地之德也與叔云違天者天之悖德之子害仁者天之賊子長惡不悛者天之不才之子與天地相似者天之克肖之子知化則善述其事窮神則善繼其志晦庵云孝子善繼人之志善述人之事者也聖人知變化之道則所行者無非天地之事矣通神明之徳則所存者無非天地之心矣此二者皆樂天踐形之事也子韶云天地之事不過乎化天地之志不過乎神故知化則善述天地之事者也窮神則善繼天地之志者也與叔云可以贊天地之化育則能述天地之事矣齋戒以神明其德則能繼天地之志矣事所以行也志所以存也不愧屋漏為無忝存心養性為匪懈晦庵云孝經引詩曰無忝爾所生故事天者仰不愧俯不怍則不忝乎天地矣又曰夙夜匪懈故事天存其心養其性則不懈乎事天矣此二者畏天之事而君子所以求踐夫形者也子韶云天地之心無幽明之間止不欺而已故不愧屋漏之隱者乃無忝於天地也心性即天地夙夜存心養性是夙夜匪懈以事天地也與叔云天命我以信而不信則辱天之命天付我以道而墮不守則擴天之職惡㫖酒崇伯子之顧養育英材穎封人之錫類晦庵云好飲酒而不顧父母之養者不孝也故遏人欲如禹之惡㫖酒則所以顧天之養者至矣性者萬物之一源非有我之得私也故育英材如穎考叔之及莊公則所以永錫爾類者廣矣子韶云崇伯之子禹也禹惡㫖酒酒能亂德今惡㫖酒顧天地父母之養者也穎谷封人請遺􅃵於母以生鄭莊公之孝心今我育天地所生之英材則是以孝心與其類也與叔云不窮人欲所以存天德以善養人所以廣天德不施勞而底豫舜其功也無所逃而待烹申生其恭也晦庵云舜盡事親之道而瞽䏂底豫其功大矣故事天者盡事天之道而天心豫焉則亦天之舜也申生無所逃而待烹其恭至矣故事天者夭夀不貳而脩身以俟之則亦天之申生也子韶云舜祗載見瞽瞍䕫䕫齋慓瞽亦允若是舜不弛勞而致父母之恱豫其事父母之孝大有功於名教吾能在困苦中竭力為善以致天地之喜是乃舜之功也大舜逄父怒大杖則走小杖則受申生不明乎道乃以死為恭而成父之惡不可以訓者也横渠意謂遭遇讒邪此命也順受其死以恭順乎天地如申生之恭可也與叔云自彊不息至於與天地合德則天下底豫故先天而天弗違无妄之以大非其自取則天無所逃故順受其正體其受而歸全者參乎勇於從而順令者伯竒也晦庵云父母全而生之子全而歸之若曾子之啓手啓足則體其所受乎親者而歸其全也况天之所以與我者無一善之不備亦全而生之也故事天者能體其所受於天者而全歸之則亦天之曾子矣子於父母東西南北唯令之從若伯竒之履霜中野則勇於從而順令也况天之所以命我者吉凶禍福非有人欲之私故事天者能勇於從而順受其正則亦天之伯竒矣子韶云曽子之疾病而易大夫之簀是順其受不以父母遺體處於不正者也吾今能順天地之正而不以患難易其節是於天地有曾參之孝矣伯竒尹吉甫子也吉甫惑於後妻虐其子無衣無履而使踐霜挽車伯竒從父之命順父之令不敢有辭焉人當患難之際順而受之無怨尤於天地是乃伯竒之孝也與叔云天全德於予既全而予之可不全而歸之故行一不義殺一不辜而得天下不為也曽子曰吾得正而斃焉斯已矣吾又何求皆全而歸之者也子之於父母東西南北惟令之從素其位而行不願乎其外安時處順其順令之至者焉富貴福澤將厚吾之生也貧賤憂戚庸玊汝於成也晦庵云富貴福澤所以大奉於我而使吾之為善也輕貧賤憂戚所以拂亂於我而使吾之為志也篤天地之於人父母之於子其設心豈有異哉故君子之事天也以周公之富而不至於驕以顔子之貧而不改其樂其事親也愛之則喜而弗忘惡之則懼而無怨其心亦一而已矣子韶云富貴福澤是天地厚吾之生也貧賤憂戚是天地愛汝欲成就我也此天將降大任之說與叔云父母厚汝之生使汝仁及宗族天地厚汝之禄使汝澤及於民皆不可自致危暗父母苦汝使汝知艱難以成其身天地窮汝使汝由疾疚以成其德愛汝故苦汝福汝故窮汝皆不可妄生疾怨存吾順事没吾寧也晦庵云孝子之身存則其事親也不違其志而已没則安而无所愧於親也仁人之身存則其事天也不逆其理而已没則安而无所愧於天也葢所謂朝聞夕死吾得正而斃焉者故張子之銘以是終焉子韶云吾存則順事天地而不逆吾死則安於其志而不亂是乃終始聽命於天地而為天地至孝之子也與叔云无終食之間違仁足以順吾生無一行之有不慊足以安吾死東銘横渠葉采解戯言出於思也戯動作於謀也發於聲見乎四支謂非己心不明也欲人無已疑不能也葉曰言雖戯必以思而出也動雖戯必以謀而作也戯言發於聲戯動見乎四支雖非本於吾心是惑也本於吾心而欲人之不我疑不可得也過言非心也過動非誠也失於聲繆迷其四體謂已當然自誣也欲他人已從誣人也葉曰言之過者非其心之本然也動之過者非其誠之實然也失於聲而為過言繆迷其四體而為過動謂之過者皆誤而非故也或者吝於改過遂以為已之當然是自誣其心也既憚改而自誣又欲人之從之是誣人也此夫子所謂小人之過也必文孟子所謂過則順之又從而為之辭或者謂出於心者歸咎為已戯失於思者自誣為已誠不知戒其出汝者歸咎其不出汝者長傲且遂非不智孰甚焉葉曰戯謔出於心思乃故為也不知所當戒徒歸咎以為戯則長傲而慢愈滋矣過誤不出於心思乃偶失耳不知歸咎於偶失反自誣以為實然則遂非而過不改矣又曰學者深省乎此則崇德辨惑矯輕警惰之功亦大矣然其於戯且誤者克治尚如此之嚴况乎過之非戯誤者豈復留之纎芥以累其身心哉古文集成巻四十九
