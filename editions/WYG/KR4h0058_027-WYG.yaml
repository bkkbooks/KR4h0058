body:
  text: 古文集成巻二十七宋王霆震編前丁集六劄移滄州過闕上殿劄子曾南豐迂齋云㸔他布置開闔文勢次求其叙事措詞之法而一篇大意所以詳於歸美乃所以切於警戒不可専以歸美觀臣聞基厚者勢崇此說祖宗力大者任重說當時故功徳之殊垂光錫祚舄奕繁衍乆而彌昌者天人之理必至之符然生民以來能躋登兹者未有如大宋之隆也先說本朝只一字以禹之績大矣却又說古而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲旣立不明雖是說古其實却是引此以和合本朝之所以盛周自后稷十有五世至于文王而大統未集武王成王始收太平之功而康王之子昭王難於南狩昭王之子穆王殆於荒服曁于幽厲陵夷盡矣及秦以累世之智并天下然二世而亡漢定其亂而諸吕七國之禍相尋以起建武中興然冲質以後世故多矣魏之患天下為三語省而意明又有包括晉宋之患天下為南北善措辭隋文始一海内然傳子而失唐之治在於貞觀開元之際而女禍世出天寶以還綱紀微矣至于五代葢五十有六年而更八姓十有四君其廢興之故甚矣便做說本朝之漸宋興再説轉太祖皇帝為民去大殘致更生兵不再試而粤蜀呉楚五國之君並致闕下九州來同復禹之迹内輯師旅而齊以節制外卑藩服而納以繩墨大小規模許多施設被兩句道盡所以安百姓禦四夷綱理萬事之具雖創始經營而彌綸已悉莫貴於為天子莫富於有天下而舍子傳弟為萬世䇿造邦受命之勤為帝太祖功未有髙焉者也太宗皇帝遹求厥寧旣定晉疆錢俶自歸作則垂憲克紹克類保世靖民丕丕之烈為帝太宗徳未有髙焉者也真宗皇帝繼統遵業以涵煦生養蕃息齊民以并容徧覆擾服異類葢自天寶之末又將唐畧比並宇内叛盪及真人出天下平而西北之人猶間入闚邊至于景徳二百五十餘年契丹始講和好徳明亦受約束而天下銷鋒灌燧無雞鳴犬吠之警以迄于今故於是時遂封泰山禪社首薦告功徳以明示萬世不祧之廟所以為帝者宗仁宗皇帝寛仁慈恕虛心納諫慎注措謹規矩不可移之他人早朝晏退無一日之懈在位日乆明於羣臣之賢不肖忠邪選用政事之臣委任責成然公聴並觀以周知其情偽其用舍之際一稽於衆故任事者亦皆警懼否輙罷免世以謂得馭臣之體春秋未髙援立有徳付畀惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然殆古所未有其豈弟之行足以附衆者非家施而人悅之也積之以誠心民皆有父之尊有母之親形容仁祖得出故棄羣臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為宋仁宗英宗皇帝聰明叡智言動以禮上帝眷相大命所集而稱疾遜避至于累月自踐東朝淵嘿恭慎無所言議施為而天下傳頌稱說徳號彰聞形容五聖功業徳美全無一語重疊及正南面勤勞庶政每延見三事省决萬機必咨詢舊章考求古義聞者惕然皆知其志在有為雖早遺天下成功盛烈未及宣究而明識大略足以克配前人之休故皇考之廟為宋英宗陛下神聖文武可謂有不世出之姿仁孝恭儉可謂有君人之大徳憫自晚周秦漢以來世主率皆不能獨見於衆人之表其政治所出大抵踵襲卑近因於世俗而已於是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出於數千載之大志變易因循號令必信使海内觀聴莫不奮起羣下遵職以後為羞可謂有能行之效今斟酌損益革敝興壞制作法度之事日以大備非因陋就寡拘牽常見之世所能及也繼一祖四宗之緒推而大之可謂至矣蓋前世或不能附其民者刑與賦役之政暴也再挈起兩事為後面立柱要說本朝好先説前代不好此作文之法宋興以來所用者鞭扑之刑然猶詳審反復至於緩故縱之誅重誤入之辟蓋未嘗用一暴刑也田或二十而稅一然猶嵗時省察數議寛減之宜下蠲除之令蓋未嘗加一暴賦也民或老死不知力役然猶憂憐惻怛常謹復除之科急擅興之禁蓋未嘗興一暴役也所以附民者如此前世或失其操柄者又再挈起前世三事天下之勢或在於外戚或在於近習或在於大臣宋興以來戚里宦官曰將曰相未嘗得以擅事也所以謹其操柄者如此而況輯師旅於内應前天下不得私尺兵一卒之用卑藩服於外天下不得專尺土一民之力其自處之勢如此至於畏天事神仁民愛物之際未嘗有須臾懈也其憂勞者又如此葢不能附其民而至於失其操柄又怠而忽此前世之所以危且亂也民附於下操柄謹於上前面分開四項此又合來處勢甚便而加之以憂勞此今之所以治且安也故人主之尊意諭色授而六服震動言傳號渙而萬里奔走形容妙山巖窟穴之氓不待期會而時輸嵗送以供其職者惟恐在後航浮索引之國非有發召而籝齎槖負以致其贄者惟恐不及西北之戎投弓縱馬相與祗服而戲豫看他造語東南之夷正冠束袵相與挾冊而吟誦此說髙麗至於六府順叙百嘉鬯遂凡在天地之内含氣之属皆裕如也蓋逺莫懿於三代近莫盛於漢唐然或三四世或一二世又應前而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至于荒陬海聚無變容動色之慮萌於其心無援枹擊柝之戒接於其目臣故曰生民以來未有如大宋之隆也竊觀於詩其在風雅陳太王王季文王致王迹之所由與武王之所以繼代而成王之興則美有假樂鳬鷖戒有公劉泂酌其所言者蓋農夫女工築室治田師旅祭祀飲尸受福委曲之常務看得親切至於兔罝之武夫行修於隱牛羊之牧人愛及微物無不稱紀所以論功徳者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以歸美其上非徒薦告鬼神覺寤黎庶而已也書稱勸之以九歌俾勿壞蓋歌其善者所以啟其嚮慕興起之意防其怠廢難乆之情養之於聴而成之於心其於勸帝者之功美昭法戒於將來聖人之所以列之於經垂為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以徳猶武王成王而羣臣之於考次論撰列之簡冊被之金石以通神明昭法式者闕而不圖此學士大夫之過也葢周之徳盛於文武而雅頌之作皆在成王之世來得委曲今以時考之則祖宗神靈固有待於陛下此應力大任重一句臣誠不自揆輙冒言其大體至於尋類取稱本隱以之顯使莫不究悉則今文學之臣充於列位惟陛下之所使至若周之積仁累善至成王周公為最盛之時而泂酌言皇天親有徳饗有道所以為成王之戒蓋履極盛之勢而動之以戒懼者明之至智之盡也前面歸美太過故終之以警戒善救首尾如此者非周獨然唐虞至治之極也其君臣相敕曰兢兢業業一日二日萬幾則處至治之極而保之以祇慎唐虞之所同也今陛下履祖宗之基廣太平之祚而世世治安三代所不及則宋興以來全盛之時實在今日陛下仰探皇天所以親有徳饗有道之意而奉之以寅畏俯念一日二日萬幾之不可以不察而處之以兢兢都收拾在此使休光美實日新嵗益閎逺崇侈循之無窮至于萬世永有法則此陛下之素所蓄積臣愚區區愛君之心誠不自揆欲以庶幾詩人之義也惟陛下之所擇召除禮侍上殿劄子乙酉六月上真西山臣聞國於天地必有與立焉三綱五常是也夫自髙卑奠位而大分已明帝降之衷而善性均有然維持而主張之繄君師是賴故聖人者作躬行此道以標的乎天下君臣之綱正於上而天下皆知有敬父子之綱正於上而天下皆知有親夫婦之綱正於上而天下皆知有别三者正而昆弟朋友之倫亦莫不正使凡生人之類各有寧宇不相鬬暴賊殺者此唐虞三代數聖人之功所以與天地同其大也夫所謂五常者亦豈出乎三綱之外哉父子之恩即所謂仁君臣之敬即所謂義夫婦之别即所謂禮智者知此而已信者守此而已未有三綱正而五常或虧亦未有三綱廢而五常獨存者嗚呼是理也其抉持宇宙之棟幹奠安生民之柱石歟人而無此則冠裳而禽犢矣國而無此則中夏而裔夷矣臣嘗讀詩至六月之序曰小雅盡廢則四夷交侵而中國微夫小雅之詩才二十餘篇而綱常之義略備中國之所以為中國者賴此而已而至於盡廢焉是自為夷也四夷交侵之禍安得不以其類至乎又嘗攷觀古昔有當衰微削弱之世而綱常未至冺絶猶足以僅存者亦有治安强盛之世綱常隳弛卒至於大壞而不可捄者周自東遷日以卑矣然威文出力以奬王室則猶有君臣也諸侯會盟以定世子則猶有長幼也故能擁持虚器尚數百年晉氏之興奄有呉蜀再傳而至惠帝可謂極盛矣而陽徳不剛陰慝内熾䜛巧交煽國本遽搖諸王跋扈主威遂奪三綱盡廢而劉石之變興唐至明皇亦太平極治之日而宫闈怙寵黷亂天常姦諛肆欺潜竊國命兇邪造釁戕伐本支三綱盡廢而外寇之難作即晉唐之事以驗序詩者之言千載相望若合符契有天下者奈何其不鑒哉惟我祖宗繼天立極其於事親教子之法正家睦族之道尊主御臣之方大抵根本仁義故先朝名臣或以為家法最善或以為大綱甚正或以為三代而下皆未之有猗歟休哉聖子神孫所當兢兢保持而勿墜也恭惟陛下天啟睿明肇膺大寶此正端本澄源之時臣來自逺方竊聞朝野之論以謂陛下有承順太母之孝有憂憫元元之仁苟推是心何徃非善獨不幸處天倫之變有未盡其道者雖棣華之愛方篤而布粟之謠遽興流聞四方所損非淺夫一政之行一令之出苟乖於理害且隨之綱常大端是謂人極人極不立國將奈何且民無常情惟上所導大學曰上老老而民興孝上長長而民興弟又曰一家仁一國興仁一家譲一國興譲蓋情雖無常而性則本善倡之則應作之則興故慈孝隆於上則下有忠順之風愛敬虧于上則下有陵犯之俗影響相從至為可畏伏惟陛下深懲徃悔而思所以補過者焉夫天子之孝與臣庶不同陛下欲報先皇之大徳則繼志述事所當先衰麻之數哭踊之節其次也欲報慈闈之至恩則先意承志者不可後滫瀡之奉跪拜之恭其末也兢兢朝夕惟實徳是充惟大政是習使朝廷以治而宗社以安則子道修矣誦二南正始之詩而思異時之擇配者不可不謹玩大易正家之義而思平居之反身者不可不嚴近而九族必有以廣親睦之仁内而六宫必有以示肅雍之化則家道正矣委任臣工者人君之大體躬親聴斷者人君之大權二義並行初不相悖必使政令出於公門而絶多門之私威柄歸於王室而無倒持之失則君道立矣子道修者仁之本家道正者禮之源而君道之立則又天下大義所由定陛下倘能明此三者而行之一本於誠則不求感人而人自孚不求正俗而俗自化姦雄不得為辭以動衆逺人不得伺隙以生心治安長乆之計無越諸此古文集成巻二十七
