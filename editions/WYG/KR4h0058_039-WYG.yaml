body:
  text: 古文集成巻三十九宋王霆震編前已集一論封建論柳子厚迂齋批以封建為不得已以秦為公天下之制皆非正論所以引周之失秦之得證佐甚詳然皆有説以破之但文字絶好所謂強辭奪正理東萊批註増入天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也不取封建勢不可也勢之來則其生人之初乎吕曰起伏不初無有以封建封建非聖人意也應勢不可一句彼其初與萬物皆生直推向前去草木榛榛鹿豕狉狉人不能搏噬而且無毛羽莫克自奉自衛荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能㫁曲直者而聽命焉此等議論自不可破其智而明者所伏必衆告之以直而不改必痛之而後畏由是君長刑政生焉此説鄉胥里師之屬故近者聚而為羣羣之分其爭必大大而後有兵有徳又有大者衆羣之長又就而聽命焉以安其屬於是有諸侯之列則其爭又有大者焉徳又有大者諸侯之列又就而聽命焉以安其封於是有方伯連率之類則其爭又有大者焉徳又有大者方伯連率之類又就而聽命焉以安其人然後天下㑹於一此説天子吕曰結一段意是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連率有方伯連率而後有天子自天子而至於里胥其徳在人者死必求其嗣而奉之故封建非聖人意也勢也吕曰封建本意夫堯舜禹湯之事逺矣省文及周而甚詳周有天下裂土田而瓜分之設五等邦羣后布履星羅四周于天下吕曰宻輪運而輻集合而為朝覲㑹同離而為守臣扞城然而降于夷王害禮傷尊下堂而迎覲者厯于宣王挾中興復古之徳雄南征北伐之威卒不能定魯侯之嗣國語周語魯武公以括與戲見王王立戲樊仲甫諌曰不可立也不順必犯犯王命必誅今天子立諸侯而建其少是教逆也王卒立之魯侯歸而卒及魯人率懿公而立伯御三十二年宣王伐魯立孝公諸侯從是不睦陵夷迄於幽平王室東遷而自列為諸侯矣厥後問鼎之輕重者有之左宣三年射王中肩者有之左桓五年伐凡伯誅萇𢎞者有之左隠七年天下乖盭無君君之心余以為周之喪乆矣徒建空名於公侯之上耳厯數封建之失蓋其意不喜此制吕曰結周語好得非諸侯之盛強末大不掉之咎歟判為十二十二諸侯見史記表合為七國七雄見史記威分於陪臣之邦吕曰如威烈王二十三年命韓魏趙為諸侯等事是也國殄於後封之秦史秦記其先有非子者善養馬周孝王封為附庸邑之秦昭襄王五十一年西周君盡獻其邑荘襄王元年東周謀秦秦誅之盡入其國則周之敗端在乎此矣秦有天下裂都㑹而為之郡邑廢侯衛而為之守宰史秦始皇紀據天下之雄圖都六合之上游攝制四海運於掌握之内此其所以為得也不數載而天下大壞其有由矣明明是取他郡縣又見有許多失處却推向他處去以為非郡縣之過亟役萬人暴其威刑竭其貨賄負耡梃謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏吕曰謂陳勝吳廣之徒人怨於下而吏畏於上天下相合殺守刼令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉徇周之制剖海内而立宗子封功臣前漢諸侯王表數年之間奔命扶傷之不暇困平城病流矢陵遲不救者三代匈奴傳後乃謀臣獻畫而離削自守矣然而封建之始郡邑居半時則有叛國而無叛郡吕曰謂吳楚之屬事見本傳秦制之得亦以明矣十分取之繼漢而帝者雖百代可知也此句言州縣之制唐興制州邑立守宰唐地理志髙祖改郡為州太守為刺史又置都督府以治之此其所以為宜也然猶桀猾時起虐害方域者失不在於州而在於兵時則有叛將而無叛州言州與郡不叛州縣之利可知吕曰謂魏傳盧龍之屬事見藩鎮傳州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者苟其心思遷其秩而已何能理乎余又非之周之事跡㫁可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得變其政天子不得變其君私土子人者百不有其一失在於制不在於政周事然也出脱吕曰間架事見史記十二諸侯世家秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也吕曰事見史記趙髙李斯傳漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳吕曰淮南厲王孝文六年謀反廢徙蜀楚王戊孝景三年反誅之類大逆未彰奸利浚財怙勢作威大刻於民者無如之何及夫郡縣可謂理且安矣何以言之且漢知孟舒於田叔前田叔傳得魏尚於馮唐馮唐傳聞黄霸之明審觀汲黯之簡靖並本傳拜之可也復其位可也卧而委之以輯一方可也吕曰上四人下三句結得用事法有罪得以黜有能得以賞朝拜而不道夕斥之矣夕受而不法朝斥之矣此固郡縣之得然失亦在此設使漢室盡城邑而侯王之縱其令亂其人戚之而已孟舒魏尚之術莫得而施黄霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之只因漢有許多不好事故子厚得以為辭締交合從之謀周於同列則相顧裂眦勃然四起幸而不起則削其半削其半民猶瘁矣吴王濞傳曷若舉而移之以全其人乎漢事然也吕曰間架今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促賈誼治安䇿夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循而不革通典職官篇魏王公侯伯子男次縣侯次鄉侯次亭侯次闗内侯凡九等晉亦有王公侯伯子男又有開國郡公縣公郡侯縣侯伯子男及鄉亭闗内等侯凡十五等而二姓陵替不聞延祚今矯而變之垂二百祀大業彌固何繫於諸侯哉或者乂以為殷周聖王也而不革其制固不當復議也是大不然夫殷周之不革者是不得已者也應前封建非聖人意也一句蓋以諸侯之歸殷者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝殷武王不得而易皆是强辭初非正理然就其説中可謂警䇿矣徇之以為安仍之以為俗湯武之所以不得已也夫不得已非公之大者也從不得三字綴下來私其力於已也私其衛於子孫也秦之所以革之者其為制公之大者也其情私也吕曰承得好私其一已之威也私其盡臣畜於我也然而公天下之端自秦始十分取之有激之論夫天下之道理安斯得人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聽則又有世大夫世食禄邑以盡其封畧聖賢生於其時亦無以立於天下封建者為之也吕曰罪封建豈聖人之制使至於是乎吾固曰非聖人之意也勢也復古王者之制論胡澹菴荀卿知有三代而不知有一王之法知天之無王而不究尊王之義知矯革時弊而適以啓天下之紛紛嗚呼卿乎以春秋之義責之則不免為罪人也卿之復古之説曰道不過三代法不貳後王謂復古當以三代為凖也謂天下之無王可閔也是直以矯革時弊自任亦有意乎春秋而作也愚謂卿之意則善而其説則疏也夫隆虚談者不濟實用古今之通患士大夫立人之朝髙言大論誰不自期以臯陶稷契亦誰不許其君以堯舜三代言則髙矣其尚論古人則善矣幸而偶合古人之塵迹亦足以聳動時主之觀聽矣然鹿豕魚鱉世所珍者人子誰不欲獻於親而居山者不能致魚鱉居澤者不能致鹿豕於其所不能致而必曰吾須此為吾親之養孰若即吾所居以求可致之物常不闕於孝養哉是則堯舜信古也三王信古也勢若不可行則徒膠空文無益復古之實效也為是説者是未得春秋尊一王者之法之説客有難者曰子以春秋責卿似矣若如子言是簠簋可去而盤杅桮桉當御矣韶濩可抵而箜篌笙笛應奏矣春秋何取也曰春秋非惡夫異代也惡夫崇飾前古之虚荒誕幻以棄滅當代之舊制者也凡人之情貴耳賤目為朝夕所常見者人皆不注視也一覩古人之恠珍則且驚且愕抱烏號之弓以為古則必以彤盧之制為可賤保曲阜之履以為古則必以革舄之制為可賤考追蠡存昌歜以為古則必以雅歌時饌為可賤世之好為譎恠者徃徃慕羲皇之髙蹤蔑視祖宗之制度不啻脱屣今日變某事明日復某政改削更革畧無顧藉遂使先朝百年之基業為之一空嗚呼信如卿言三軍魯所當去也郊祀魯所當用也逆祀魯所當行也春秋不當書而譏之也曰吁子責卿亦甚矣卿非不知國家自有制度也謂凡非雅聲者舉廢也凡非舊文者舉變也凡非舊器者舉毁也以是為可以復三代也愚則曰聲非雅聲未害也色非舊文未害也械用非舊器未害也春秋所最害者正謂兵暴而非古刑煩而非古賦歛用度之非古故凡書伐某侵某戰扵某者謂某兵暴而非古也書放大夫殺大夫者謂其刑煩而非古也書初税畆作丘甲者謂其賦歛用度之非古也不聞書曰廢某聲變某色毁某器然後為復古也必如卿言是猶飢渴濵死而投以大羮元酒曰此其古也古則古矣其不頓仆餓踣者幾希其謂復古而適以害之春秋所深罪也曰然則先儒稱春秋之道亦通三王則春秋豈無取於古歟曰為此説者何休也仲尼無此言也晉鑄刑鼎仲尼専以唐叔之法度責之不聞其通稱三王也季孫問田賦仲尼専以春秋之典責之不聞其通稱三王也屬刑古良法紂行之則弊肉刑古良法漢行之則弊井田古良法唐行之則弊三代法非本弊也後世不能復三代也故仲尼嘗論夏商損益之理矣至春秋則一以周典㫁之謂其欲興復文武之緒不當雜以異代也故其書不告朔猶朝於廟者幸其猶朝於廟以存周之遺典也是未嘗不尊一王之法也謂春秋必通於三王者此僻儒之迂論也以是又知卿言之謬也嗚呼荀卿閔天下之無王似亦有意乎春秋之作者而復古之論迂闊如此後世執其説以敗亂國家者十常八九且如褒賞一功臣直引周公錫山土田以為故事至用兵則直援春秋車戰以為法翹然逺追遐想掇取古人空談以欺其君漫不知何許有得所謂終日食龍肉而未嘗一飽者良亦可笑然竊恠李斯師事荀卿既而焚滅其書於其師反眼若不相識及觀斯之相秦奮不顧患焚燒夫子之六經則變古也暴滅三代之諸侯則變古也列都㑹而廢封建則變古也破壊周公之井田則變古也是必嘗用荀卿復三代之説髙而難行遂至大壊先王之法以甘心焉其父殺人其子且必行刼李斯師事荀卿而遂亂天下亦卿之詭辭恠説有以激之也吁春秋必謹始蓋重夫始為患者也卿其始作俑者乎愚故曰以春秋之義責之則不免為罪人也嗚呼惜哉復井田論林之竒齊宣王一悟仁術而可語王道之本滕文公一明性善而可與興井田之制孟子車轍未嘗淹留於一邦徜徉乎梁宋翔􅕽乎鄒魯或邈而退或言而退或仕不得志而退其所拳拳者莫若齊足未嘗履其庭而心已親者莫若滕吾觀孟子童而習之壯欲舉而行之而視王道若可掌上而為之一日不遇則皇皇然不暇安席惟恐斯民不復見堯舜文武成康之治是心何如哉然其為齊宣發明者獨詳於他國為滕公規畫者又詳於齊宣聖賢不私於齊滕必矣嗚呼欲復古者亦可以知復古之由哉古先聖明致太平恢逺業非一道也其大者曰井田井田一法富民之藪也安民之基寓兵之府也興禮樂行政教之本也有如是之良法而秦人忍壊之秦人何愚也非愚也功利之心奪之也由漢而下莫有能復之者又不惟一功利之心奪之也夫已成之法心有一奪則壊之如覆手既壊之餘有一毫不得於心則復之如回天井田之法不幸而復於新氏之世幸而遺意粗見於太宗之時使庸醫用藥必能廢藥使賤工御馬必能廢馬井田復於新氏必廢於新氏何也井田之法廢於秦而井田之利未嘗廢於秦一經新氏之害而民聞井田如畏豺虎夫安得而不廢漢復為東尚二百年未嘗敢有一人談古制於朝者獨荀悦慨然明其利害猶有難行之歎蓋欲得如髙祖光武之時然後可以為之噫是非懲新氏之禍歟晉人懲之而井田亦不敢行宋齊而下吾何望焉千百年間乃有一元魏之主其施設快人意然而元魏之主非深知古也特果於立事而適當時之可者也元魏不足言而為太宗太平基地可喜也元魏有可喜太宗乃有可恨太宗宜三代矣而卒不三代愚故曰井田遺意幸而粗見於太宗之時也太宗以來議者皆曰井田可復矣可復而不復則亦有説乎愚前所謂既壊之餘有一毫不得於心則復之如回天此古道興廢之機也將大復先王之法度必先正人主之心術以堯舜三代之臣而致其君為堯舜三代之君必能盡堯舜三代經綸天下之道智者規之仁者慮之強者達之天下井井乎其成周矣古文集成巻三十九
