body:
  text: 古文集成巻五十七宋王霆震編前辛集三封事庚子應詔封事朱文公四月二十一日宣教郎權發遣南康軍事兼管内勸農事提轄本軍界分諸鋪逓角借緋臣朱熹謹齋沐奉䟽東向再拜昧死獻於皇帝陛下臣伏覩三月九日陛下可議臣之奏申勑監司郡守條具民間利病悉以上聞無有所隠臣以布衣諸生䝉被聖恩待罪偏壘乃獲遭值仁聖永言願治不間踈逺如此其敢不悉心竭慮以塞詔㫖然臣甞病獻言者不維天下國家之大體而毛舉細故以為忠聴言者不察天下國家之至計而抉擿隠伏以為眀是以獻言雖多而實無所益於人之國聴言雖廣而實無以盡天下之美臣誠不佞然不敢専以淺意小言仰奉明詔惟陛下幸於其大者垂聴而審行之則天下幸甚臣甞謂天下國家之大務莫大於恤民而恤民之實在省賦省賦之實在治軍若夫治軍省賦以為恤民之本則又在夫人君正其心術以立紀綱而已矣董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方蓋謂此也夫民之不可不恤不待智者而後能知亦不待明者然後能言也然欲知其憔悴困窮之實與其所以致此之由則臣請以所領之郡推之然後以次而及其所以施置之方焉臣謹按南康為郡土地瘠薄生物不暢水源乾淺易得枯涸人民稀少穀賤農傷固已為貧國矣而其賦税偏重比之他處或相倍蓰民間雖復盡力耕種所収之利不足以了納税賦須至别作營求乃可陪貼輸官是以人無固志生無定業不肯盡力農桑以為子孫久逺之計幸遇豐年則賤糶禾穀以苟目前之安一有水旱則扶老擕幼流移四出視其田廬無異逆旅之舎蓋出郊而四望則荒疇敗屋在處有之故臣自到任之初即甞具奏乞且將星子一縣税錢特賜蠲减又甞具申提㸃坑冶司乞為敷奏將夏税所折木炭價錢量减分數其木炭錢已䝉聖慈曲賜開允獨减税事漕司相度方上版曹若得更䝉聖恩特依所請則一方憔悴困窮之民自此庶幾復有更生之望矣然以臣計之郡之接境江饒等州土田瘠薄類此者非一郡一縣而已也賦税重大如此者非一料一色而已也若不大為經理深加隠恤雖復時於其間少有縱舎如以杯水捄一車薪之火恐亦未能大有所濟而剥膚椎髓之禍必且愈深愈酷而不可救元氣日耗根本日傷一旦不幸而有方數千里之水旱則其横潰四出將有不可如何者未知陛下何以處此此臣所謂民之憔悴困窮而不可不恤者然也而臣所謂省賦理軍者請復言之夫有田則有租為日久矣而今日民間特以税重為苦者正緣二税之入朝廷盡取以供軍而州縣無復贏餘也夫二税之入盡以供軍則其物有常數其時有常限而又有貼納水脚轉輸之費州縣皆不容有所寛緩而减免也州縣既無贏餘以給官吏養軍兵而朝廷發下離軍歸正等人又無紀極支費日增無所取辦則不免創於二税之外别作名色巧取於民且如納米収耗則自七斗八斗以至於一倍而未止也豫借官物則自一年二年以至三年四年而未止也此外又有月樁移用諸雜名額抛賣乳香科買軍器寄招軍兵打造鐵甲之屬自版曹總所以至漕司上下相承遞相促迫今日追究人吏明日取勘知通官吏無所從出不過一切取之於民耳蓋不如是無以補舊欠支目前雖明知其一旦發覺違法抵罪而不及顧也夫以罪及其身而不暇恤尚何暇於民之恤乎以此觀之則今日民貧賦重其所從來亦可知矣若不計理軍實而去其浮冗則民力决不可寛然國家蹙處東南恢復之勲未集所以養兵而固圉者常患其力之不足則兵又未可以遽减竊意惟有選將吏覈兵籍可以節軍資開廣屯田可以實軍儲練習民兵可以益邉備誠能行此三者而又時出禁錢以續經用民力庶其可寛也今將帥之選率皆膏粱騃子厮役凡流徒以趍走應對為能苞苴結托為事物望素輕既不為軍士所服而其所以得此差遣所費已是不貲以故到軍之日惟務裒斂刻剝經營賈販百種搜羅以償債負債負既足則又别生希望愈肆誅求蓋上所以奉權貴而求陞擢下所以飾子女而快已私皆於此乎取之至於招収簡閲訓習撫摩凡軍中之急務往往皆不暇及軍士既已困於刻剝苦於役使而其有能者又不見有優異無能者或反見親寵怨怒鬱積無所伸訴平時既皆悍然有不服之心一旦緩急何由可恃至於軍中子弟亦有素習弓馬諳曉戰陣者例皆不肯就本軍投募而朝廷反為之分責州縣枉費錢物拖拽短小生踈無用之人以補軍額凡此數端本末巨細無不乖錯而所謂將帥者私欲飽滿鑚研有效則又可以束裝問塗而望他軍之積以為已資矣故近嵗以來管軍臣僚遷代之速至有一嵗再易者是則不為軍中利病無由究知冗兵浮食日益猥衆而此人之所盜竊破費與夫送故迎新百色支用已不知其幾何矣至於總餽輸之任者亦皆負倚幽隂交通賄賂其所程督駈催東南數十州之脂膏骨髓名為供軍而輦載以輸於權倖之門者不可以數計若乃屯田民兵二事又特為誕謾小人竊取官職之資而未聞其有絲毫尺寸可見之效凡此數弊天下之人孰不知之而任事之臣畧不敢一言以告陛下惟務迫趣州縣使之急征横賦狀伐邦本而其所以欺陛下者則曰如是而國可富如是而兵可强陛下亦聞其説之可喜而未究其實徃徃誤加奬寵畀以事權是以比年以來此輩類皆高官厚祿志滿意得而生民日益困苦無聊賴草茅有識之士相與私議竊歎以為莫大之禍必至之憂近在朝夕顧獨陛下未之知耳為今之計欲討軍實以紓民力則必盡反前之所為然後乃可兾也蓋授將印委利權一出於朝廷之公議則可以絶苞苴請託之私務求忠勇沉毅實經行陣曽立勞效之人則可以革輕授非才之弊無苞苴請託之私則刻剝之風可革將得其人則軍士畏愛奮厲蒐閲以時而竄名冗食者不得容私於其間得人而久其任則上下相安緩急可恃而又可以省送迎之費軍之汰卒與凡北來歸正添差任滿之人皆可歸之屯田使之與民雜耕而漸損其請給其有材勇事藝之人則計其品秩而多與之田因以為什伍之長使教其人習於馳射擊刺行伍之法罷去諸州招軍之令而募諸軍子弟之驍勇者别授以田使𨽻尺籍大抵令與見行屯田民兵之法相為表裏擇老成忠實通曉農兵之務者使領其事付以重權久其事任毋貪小利毋急近功俟其果能漸省列屯坐食之兵稍損州郡供軍之數然後議其課最增秩而因任之如此十數年間自然漸見功效若其功效未能遽見之間而欲亟圖所以紓州縣民間目前之急者則願深詔主計將輸之臣且於見今樁積金榖絹綿數内每嵗量撥二三十萬視州郡之貧乏者特與免起上供官物三五分而代其輸向後軍籍既核屯田既成民兵既練則上項量撥之數可以漸减而州郡免起之數可以漸增州縣事力既益寛舒然後可以禁其苛斂責以寛恤嵗課而時稽之不惟去其加耗預借非法科敷之弊又視其土之肥瘠税之輕重而均减之庶幾窮困之民得保生業無復流移漂蕩之意所在曠土亦當漸次有人開墾布種而公上之賦亦當自然豋足次第增羡不俟程督迫促而國真可富兵真可强矣此臣所謂省賦治軍之説然也至於所謂其本在於正心術以立紀綱者則非臣職之所當及然天下萬事之根本源流有在於是雖欲避而不言有不可得者且臣頃於隆興初元誤䝉召對蓋已畧陳其梗㮣矣今請昧死復為陛下畢其説焉夫所謂綱者猶網之有綱也所謂紀者猶絲之有紀也網無綱則不能以自張絲無紀則不能以自理故一家則有一家之綱紀一國則有一國之綱紀若乃鄉總於縣縣總於州州總於諸路諸路總於臺省臺省總於宰相而宰相兼統衆職以與天子相可否而出政令此則天下之綱紀也然而綱紀不能以自立必人主之心術公平正大無偏黨反側之私然後綱紀有所係而立君心不能以自正必親賢臣逺小人講眀義理之歸閉塞邪私之路然後乃可得而正也古先聖王所以立師傅之官設賔友之位置諫諍之職凡以先後縱臾左右維持惟恐此心頃刻之間或失其正而已原其所以然者誠以天下之本在是一有不正則天下萬事將無一物得其正者故不得而不謹也今天下之事如前所陳亦可見矣陛下欲恤民則民生日蹙欲理財則財用日匱欲治軍則軍政日紊欲恢復土宇則未能北向以取中原尺寸之土欲報雪讎恥則未能繫單于之頸而飲月氐之頭也此其故何哉宰相臺省師傅賔友諫諍之臣皆失其職而陛下所與親宻所與謀議者不過一二近習之臣也此一二小人者上則蠱惑陛下之心志使陛下不信先王之大道而悦於功利之卑説不樂莊士之讜言而安於私􅉏之鄙態下則招集天下士大夫之耆利無恥者文武彚分各入其門所喜則隂為引援擢寘清顯所惡則宻行訾毁公肆擠排交通貨賂則所盜者皆陛下之財命卿置將則所竊者皆陛下之柄雖陛下所謂宰相師保賔友諫諍之臣或反出入其門墻承望其風㫖其幸能自立者亦不過齪齪自守而未甞敢一言以斥之其甚畏公論者乃畧能驚逐其徒黨之一二既不能深有所傷而終亦不敢明言以𢷬其囊橐巢窟之所在勢成威立中外靡然向之使陛下之號令黜陟不復出於朝廷而出於此一二人之門名為陛下之獨㫁而實此一二人者隂執其柄蓋其所壊非獨壊陛下之綱紀而已乃并與陛下所以立綱紀者而壊之使天下之忠臣賢士深憂永歎不樂其生而貪利無恥敢於為惡之人四面紛然攘袂而起以求逞其所欲然則民又安可得而恤財又安可得而理軍政何自而修土宇何自而復而宗廟之讎恥又何時而可雪耶臣誠至愚不勝憤懣因伏惟念自頃進對得竭狂瞽陛下不唯赦而不誅其後十七八年間兩䝉収召五被除擢雖臣愚暗自知無用於世又為疾病憂患之所牽留有不得祇拜恩命者然陛下之知臣不為不深憐臣不為不厚顧臣乃獨畏懦藏縮熟視天下之綱紀廢亂生靈困苦至於如此而不能捐生出死一為陛下言之是陛下不負臣而臣負陛下也今者幸值聖眀開廣言路而臣官守適在可言之數於此而又不言則臣之罪雖萬死不足以自贖是以敢冒言之伏惟陛下曲加容貸留神省察奮發剛㫁一正宸心斥逺佞邪建立綱紀以幸四海困窮之民則臣不勝大幸干冒斧鉞臣無任瞻天望聖戰慄俟命之至臣熹昧死再拜謹言貼黄本軍管内去秋晚田旱損去冬地震有聲臣已各具奏聞去訖是後一向缺雨耕牛疫死今雖得雨恐已後時而牛死不止勢甚可慮伏乞睿照臣昨䝉賜對面奉玉音治天下當以正心誠意為本常切仰歎聖學高明深達治本如此天下安得不治比年以來乃聞道路之言妄謂陛下惡聞正心誠意之説臣下當進對者至相告戒以為語忌臣雖有以决知其不然然竊深慮此語流傳上累聖徳下惑羣聴伏望睿明更賜裁擇古文集成巻五十七
