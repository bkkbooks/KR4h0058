body:
  text: 古文集成巻十三宋王霆震編前乙集七記江州濂溪書堂記晦庵斆齋摽凖評曰此篇論道未嘗亡惟托於人行於世故有絶續明晦之異中間鋪叙濂溪不繇師傳黙契道體建圗屬書根極領要可謂見微識逺之論也道之在天下者未嘗亡惟其託於人者或絶或續故其行於世者有明有晦是皆天命之所為非人智力之所能及也夫天髙地下而二氣五行紛綸錯揉升降往来於其間其造化發育品物散殊莫不各有固然之理理到而其最大者則仁義禮智信之端君臣父子昆弟夫婦朋友之倫而已是其周流充塞無所虧間夫豈以古今治亂為存亡者哉然氣之運也則有淳漓判合之不齊人之稟也則有清濁昏明之或異是以道之所以託於人而行於世者惟天所畀乃得與焉决非巧智果敢之私所能億度而強探也河圖出而八卦畫洛書呈而九疇叙而孔子於斯文之興䘮亦未嘗不推之於天聖人於此其不我欺也審矣若濂溪先生者其天之所畀而得乎斯道之傳者歟不然何其絶之乆而續之易晦之甚而明之亟也文老意正葢自周衰孟軻氏没而此道之傳不續更秦及漢歴晉隋唐以至于我有宋藝祖受命五星集奎實開文明之運然後氣之漓者淳判者合清明之稟得以全付乎人而先生出焉發明本朝好不繇師傳黙契道體建圖屬書根極領要當時見而知之有程氏者遂擴大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不同然畢貫于一而周公孔子孟氏之傳煥然復明於當世有志之士得以探討服行而不失其正如出於三代之前者嗚呼盛哉非天所畀其孰能與於此先生姓周氏諱敦頥字茂叔世家舂陵而老於廬山之下因取故里之號以名其川曰濂溪而築書堂於其上今其遺墟在九江郡治之南十里而其荒茀不治則有年矣淳熙丙申潘侯慈明與其通守吕侯勝已始復作堂其處掲以舊名以奉先生之祀而吕侯又以書来屬某記之某愚不肖不足以及此獨幸嘗切有聞於程氏之學者因得伏讀先生之書而想見其為人比年以來屏居無事常欲一泛九江入廬阜濯纓此水之上以致其髙山景行之思而病不得往誠不自意乃今幸甚獲假文字以託姓名於其間也於是竊原先生之道所以得於天而傳於人者以傳其事如此使後之君子有以觀攷而作興焉是則庶幾兩侯之意也云爾道州濂溪祠堂記南軒宋有天下明聖相繼承平日乆元氣胥會至昭陵之世盛矣宗工鉅儒磊落相望於是時濂溪先生實出於舂陵焉先生姓周字茂叔晚築廬山之下以濂名其溪故世稱為濓溪先生舂陵之人言曰濂溪吾鄉之里名也先生世家其間及寓於他邦而不忘其所自生故亦以是名溪而世或未之知耳惟先生仕不大顯於時其澤不得究施然世之學者攷論師友淵源以孔孟之遺意復明于千載之下實自先生發其端由是推之則先生之澤其何有窮哉葢自孔孟没而其微言僅存於簡編更秦火之餘漢世儒者號為窮經學古不過求於訓詁章句之間其於文義不能無時有所益然大本之不究聖賢之心欎而不章而又有顓從事於文辭者其去古益以逺經生文士自歧為二塗及夫措之當世施於事為則又出於功利之末知力之所營若無所與於書者於是有異端者乘間而入横流於中國儒而言道徳性命者不入于老則入于釋間有希世傑出之資攘臂排之而其為說復未足以盡吾儒之指歸故不足以抑其瀾而或反以激其勢嗟乎言學而莫適其序言治而不本於學言道徳性命而流入於虚誕吾儒之學其果如是乎哉陵夷至此亦云極矣及吾先生起於逺方乃超然有所得於其心本乎易之太極中庸之誠以極乎天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治先王之禮樂刑政可舉而行如指諸掌於是河南二程先生兄弟從而得其說推明究極之廣大精微殆無餘藴學者始知夫孔孟之所以教葢在此而不在乎他學可以至於聖治不可以不本於學而道徳性命初不外乎日用之實其於致知力行具有條理而詖邪淫遁之說皆無以自隠可謂盛矣然則先生發端之功顧不大哉隆興濂溪祠堂記晦庵葢嘗切謂先生之言其髙極乎無極太極之妙而其實不離乎日用之間其幽探乎隂陽五行造化之􅄨而其實不離乎仁義禮智剛柔善惡之際其體用之一源顯微之無間秦漢以下誠未有臻斯理者而其實則不外乎六經論語中庸大學七篇之所傳也葢其所謂太極云者合天地萬物之理而一名之耳以其無器與形而天地萬物之理無不在是故曰無極而太極以其具天地萬物之理而無器與形故曰太極本無極也是豈離乎生民日用之常而自為一物哉其為隂陽五行造化之􅄨者固此理也其為仁義理智剛柔善惡者亦此理也性此理而安焉者聖也復此理而執焉者賢也自堯舜以來至於孔孟其所以相傳之說豈有一言以易此哉顧孟氏既没而諸儒之智不足以及此是以世之學者茫然莫知所適髙則放於虚無寂滅之外卑則溺於雜博華靡之中自以為道固如是而莫或知其非也及先生出始發明之以傳於程氏而其流遂及於天下天下之學者於是始知聖賢之所以相傳之實乃出於此而有以用其力焉此先生之教所以繼往聖開來學而大有功於斯世也袁州州學三先生祠記晦庵宜春太守廣漢張侯既新其郡之學因立濂溪河南三先生之祠于講堂之東序而以書來屬熹記之葢自鄒孟氏没而聖人之道不傳世俗所謂儒者之學内則局於章句文詞之習外則雜於老子釋氏之言而其所以脩已治人者遂一出於私智人為之鑿淺陋乖離莫適主統使其君之徳不得比於三代之隆民之俗不得躋於三代之盛若是者葢已千有餘年於今矣濂溪先生􅁬于百世之下乃始深探聖賢之奥䟽觀造化之原而獨心得之立象著書闡發幽秘詞義雖約而天人性命之微脩已治人之要莫不畢舉河南兩程先生既親見之而得其傳於是其學遂行於世士之講於其説者始得以脱於俗學之陋異端之惑而其所以脩已治人之意亦往往有能卓然不惑於世俗利害之私而慨然有志於堯舜其君民者葢三先生者其有功於當世於是為不小矣然論者既未嘗考於其學又拘於今昔顯晦之不同是以莫知其本末源流之若此而或輕議之其有略聞之者則又舎近求逺處下窺髙而不知即事窺理以求其切於脩已治人之實也嗚呼張侯所以作為此祠而屬其筆於熹者其意豈不有在於斯與鄂州州學四賢堂記勉齋隂陽分而五行具人物生而萬事出而太極之妙為之根柢而周流其間充塞宇宙貫徹古今不可須㬰離也形交氣感而稟受不齊慾動情勝而好惡無節心以形役志以氣移理以慾昏性以情鑿鄉之不可離者梏亡茅塞莫之存矣圖書出而天文始兆聖賢生而人文始開二儀肇分仁義著矣五氣順布五事備矣禮以天秩典以天叙而教行焉因至顯之象驗至微之理即人事之當然察天命之本然加之以操存持養則動容周旋無適而不由於斯道之中矣聖賢之功與天無間凡有血氣莫不尊親心之秉彛不容己也周徳既衰邪說並作言道者祖虚無論治者尚功利談經者溺訓詁工文者騁詞華千有餘年天理湮晦雖閎博俊偉之才未有能窮其㫖歸者也聖宋龍興徳配天地尊道以儒出治以仁經術文章一根於理鴻儒碩士彬彬輩出上擬三代下軼漢唐何其盛哉漸摩積累斯道之乆蝕者復明焉濂溪周先生不由師傅洞見道體推無極太極以明隂陽五行之本人物化生萬事紛擾則定之以中正仁義而人極立焉蓋與河圖洛書相為表裏周子以授伊洛二程子程子所言道徳性命皆自此出而微詞奥義學者未之達也新安朱先生稟資髙明厲志剛毅深潜黙識篤信力行體用一源顯微無間之㫖超然獨悟而又條畫演繹以示後學周程之道至是而始著矣窮理盡性以至命存心養性以事天非四先生孰能發之道之不明以學者無所見而異端禍之也四先生之道本諸人心之所固有天理之所不可易則邪說不得肆而皆趍於至正之途止於至善之地矣天下學者尊信崇尚以為孔孟之徒復生斯世祠之學宫以起學者敬慕之心是則師儒之職會稽石君繼喻之意也石君為鄂州教授而某適分符於沔石君之先太常寺簿師朱先生為門人髙第以某為同門後進也嘉定八年二月四先生祠成遣其學正張某来請記四先生之書家傳而人誦之矣述其關於道體之大要以見四先生之道光明盛大其本原固有自也夫以天命之在人甚明前賢之教人甚至聖朝之重道甚隆師儒之衛道甚切則遊於學校而拜於祠下者亦思所以自勉哉南雄州學四先生祠記真西山南雄州始立周子二程子朱子之祠于學教授陳應龍屬真某為之記某曰四先生之道髙矣美矣抑某之愚未能闚其籓也將何辭以記之雖然昔嘗聞其畧矣道之大原出于天其用在天下其傳在聖賢此子思子之中庸所以有性道教之别也葢性者智愚所同得道者古今所共由而明道闡教以覺斯人則非聖賢莫能致與故自堯舜至于孔氏率五百嵗而聖人出孔子既没曽子子思與鄒孟氏復先後而推明之百有餘嵗之間一聖三賢更相授受然後堯舜禹湯文武周公之所以開天常立人紀者粲然昭陳垂示罔極然則天之生聖賢也夫豈苟然哉不幸戰國嬴秦以後學術涣散無所統盟雖以董相韓文公之賢相望于漢唐而於淵源之正體用之全猶有未究其極者故僅能著衛道之功於一時而無以任傳道之責於萬世天啟聖朝文治休洽於是天禧明道以来迄于中興之世大儒繼出以主張斯文為己任葢孔孟之道至周子而復明周子之道至二程子而益明二程之道至朱子而大明其視曽子子思鄒孟氏之傳若合符節豈人所能為也哉天也然四先生之學豈若是之立竒見尚新説求出乎前人所未及耶凡亦因乎天而已葢自荀楊氏以惡與混為性而不知天命之本然老莊氏以虛無為道而不知天理之至實佛氏以剗㓕彛倫為教而不知天叙之不可易周子生乎絶學之後乃獨深探本原闡發幽秘二程子見而知之朱子又聞而知之述作相承本末具備自是人知性不外乎仁義禮智而惡與混非性也道不離乎日用事物而虛無非道也教必本於君臣父子夫婦昆弟而剗㓕彛倫非教也闡聖學之户庭祛世人之矇瞶千載相傳之正統其不在兹乎嗚呼天之幸斯文也其亦至矣南雄為郡邈在嶠南士習視中州號稱近厚迪之以至正之學必將有俛焉自力者然陳君之所望於學者果焉屬耶天之命我萬善具全一毫有虧是曠天職昔之君子凜然淵冰没世弗懈者凢以全吾所受焉耳嗟後之世何其與古戾也利欲之風深入肺腑理義之習目為闊迂已之良貴棄置如弁髦而軒裳外物則决性命以求之弗舍也吁是不可謂之大惑乎志於道者其將何所用力乎緬觀往昔百聖相傳敬之一言實其心法葢天下之理惟中為至正惟誠為至極然敬所以中不敬則無中也敬而後能誠非敬則無以為誠也氣之决驟軼於奔駟敬則其衘轡也情之横放甚於潰川敬其隄防也故周子主静之言程子主一之訓皆其為人最切者而子朱子又丁寧反復之學者儻於是而知勉焉思慮未萌必戒必懼事物既接必㳟必欽動静相因無少間斷則天徳全而人欲泯大本之所以立達道之所以行其不由此歟陳君幸以為然則願以此刻于祠之壁為學者觀省之助若夫誦其言而不反諸躬惟其名之趍而匪實之踐是豈四先生立教之意又豈陳君所望於南邦之士者哉古文集成巻十三
