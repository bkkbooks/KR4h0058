body:
  text: 古文集成巻四十五宋王霆震編前已集七論盡性論上張宛丘一言而盡天下之道者性而已夫道之在萬物雖泮散殊别無所徃而不得然其歸有二而已自内而本之者為聖人之神故凡大至於參天地廣至於贊化育禍福大故也而不得蕩其和死生至變也而不得干其常所以極天下之髙明而寂然不動以待萬物之至者皆道之在内者也自外而致用者為王者之事故凡觀變以應天下之動而利用以成天下之務大之為禮樂小之為政刑所以鼓衆動民而與一世同患無所感而不通盛徳大業待之以立者皆道之在外者也嗚呼道則廣矣大矣然不在外則必在内不在已則必在物所謂道者不外是矣且天下之道不過於内外而内外之道其初曷出哉凡在内者乃吾之所受於天而虚靜明達無所待於外者所謂喜怒哀樂之未發者也凡在外者取吾所受於天者而顯諸形名事物之際與物兩得而布之天下取諸心而施諸事本乎天而成乎人動於無為而著於有形使天下萬物䝉其利所謂喜怒哀樂發而中節者也故内外之道雖殊而同出於吾性故兩言而盡天下之道者曰内外一言而盡内外之道者曰性而已然則天下之物未有逃於吾性之表則吾性者盡天下之能事者也聖人之所以為聖人者豈能強其性之所無而附益其所不足哉然盡其性之所受於天者而無有闇蔽不照之累天之全受於我者能全之而已矣故能盡已之性則能盡天下之道能盡天下之道而後為聖人自聖人而下之至於庶人其别蓋多矣彼其為是小大之辨者亦豈有他哉其於性也所見有廣狹故其為徳也所立有小大性猶山也自聖人至於庶人登山者也或蹈其半或止其下而其強力者出入上下無所不至陟焉而窮其髙降焉而極其深盡一山之視而無不至之處故無不至者聖人也或蹈其半或止其下者賢否之别也均是性也因其所見而為聖賢之别均是山也因其所止而知強弱之異故人之繕性也有不求而性之於人也無不足人之登山也有不盡而山之於人也無不與子思曰天命之謂性率性之謂道脩道之謂教故道出於性教出於道一得吾性而道與教舉矣盡性論下宛丘孟子曰萬物皆備於我矣嗚呼此性之説也蓋孟子嘗以謂性善矣夫善者萬物之一也萬物皆備於我則我之所受於天者獨善矣乎故吾知孟子為性善之説其有救乎當世之變而非性之至論也揚子曰善惡混揚子之論出於萬物皆備於我者也然則盡已之性而為聖人則聖人之於性豈亦兼受其惡者哉是不然聖人之於聖其智足以知之者無不盡矣凡性之可以為善者聖人達之無不至其極凡性之可以為惡者聖人察之無不及其微於是乎有學焉開其所由達之途使趨者必至其極而無蔽閼於前治其所能察之隙使避而逺者必盡其微而無有鑠奪陷溺之累故能盡性之大體則趍善而逺過也兩皆至其極故善之在我者無不舉惡之在我者無不去自聖人而下之至於庶人自上智而下之而為下愚所以為賢否之殊者亦計夫所趨之善有淺深所避之惡有小大之殊者豈有他哉其於性也所見有全有不全故也昔者顔子之於孔子蓋仰之彌髙鑽之彌堅夫髙與堅也凡人之性舉有之也孔子至焉而顔子之力幾弊於是矣是何也孔子得其善之授於天者盡而顔子得之也有不至者矣夫子之門人自子路子貢之徒皆嘗有不善於其身賜之貨殖由之兼人是也二人者蓋終身而不知止而顔子之於不善也未嘗不知知之未嘗復行也夫顔子之於子路子貢其性之質一也然其於不善也逺闕天而存既已謂之存孰能亡其存哉情論葉肅虛而靜者性也應而隨者情也情亦性也流於情則害性也善治情者莫若養之養情者所以養性也性合於神神凝於無情合於識識散於有統情者性統識者神情離乎性則反以害性識離乎神則反以傷神養情者毋使情離性是情與性一也毋使識離神是識與神一也如此則何物之不可格何事之不可辨哉有為忘情之説不知忘情者情之所以滋也有為制情之説不知制情者情之所以縱也君子之於情致其養而已情無極也安之人命以養之情無常也止於至善以養之養之以禮而其情安養之以樂而其情和夫如是人之有情亦何患哉養之而乆其性定矣其神全矣君子不流於情得所養也人有居深山之中麋鹿之與居草木之為伍淡乎而無欲也何也情不著乎識也引而處之㕓肆之間日與物接則洋洋然而其物動矣語之曰汝其忘之不知其可也人之在於孩提之時所慕者乳哺所識者姆傅淡乎其無欲也何也情不著乎識也及其年運而曉然知利欲之端則洋洋然而其慾動矣語之曰汝其忘之不知其可也情猶火也火之炎炎火之常也聚薪而壓之欲其不炎炎也其始也猶云可也乆則愈熾矣情如何而可忘也情猶水也水之浩浩水之常也為防以遏之欲其不浩浩也其始也猶云可也乆而愈决矣情如何而可制也嗟乎忘情制情之説惑天下者也豈知聖人固有以養情者哉命論葉肅欲榮而惡辱欲利而惡害人之常情也常情之所欲君子亦欲之常情之所惡君子亦惡之然而君子所以異於常人者君子明夫欲惡之道而常人不明夫欲惡之道也欲之而斯至惡之而斯去以吾明夫欲惡之道也欲之而愈去惡之而愈至以吾不明夫欲惡之道也榮耶辱耶有定命也利耶害耶有定命也命孰為之天為之也天孰為之已為之也所以榮所以利必有道也其道不同同歸於善而已矣所以辱所以害必有道也其道不同同歸於惡而已矣欲之而愈去者不知所就也惡之而愈至者不知所避也君子知其所就知其所避者知命也命不可易也此其所以反也榮與利是吾之所欲也致之之道必謹就之而有不可致者定命也安之可也要其終榮利之實必將與吾為無窮者也命豈吾易哉辱與害是吾之所惡也致之之道必謹避之而有不可免者定命也安之可也要其終吾必不辱而不害也命豈吾易哉彼之所為無以致榮與利而徒與之必不能得矣其得者幸也要其終榮與利將必失之以其所為者反之而命亦從之也彼之所為有以致辱與害而徒惡之必不能免矣其免者幸也要其終辱與害將必及之以其所為者道之而命亦從之也是故知命者常得其所欲不知命者常遇其所惡知命者順道以俟命道亦從之奚為不得其所欲哉不知命者悖道以儌幸道亦悖之奚為不遇其所惡哉知命者無憂不知命者多怨故曰不知命無以為君子也宅心論安正忘筌易有太極是生兩儀兩儀藴太極於中是為天地之心而天地之心實無欠體大包六合細入秋毫本無限量與太虛等虚包萬有而無畛所可證者感應而已故雖見其心於復乃無心之心唯見其情於咸而感應獨存焉有感斯應悉縁象類感之以其道則正感之非其道則忒蓋以本自無心特隨感而應惟影響耳是以文武適正則致天之届幽厲反是則天之方虐是則天地之心必待聖人而後立為人上而思所以福天下豈他道哉慎所以宅心而已心之所居位正則體正體正則天地正是以隂陽寒暑七政四時靡不悉歸於正而天下和平災害不生禍亂不作質其本源由宅心正位而已正位之居喜怒哀樂未發之先也是謂大中惟兩端無偏重則至焉聖人之所以為聖人如斯而已致知在格物論洓水人之情莫不好善而惡惡慕是而羞非然善且是者蓋寡惡且非者實多何哉皆物誘之也物迫之也桀紂亦知禹湯之為聖也而所為與之反者不能勝其欲心故也盗跖亦知顔淵之為賢也而所為與之反者不能勝其利心故也不軌之民非不知穿窬探囊之可羞也而冒行之驅於饑寒故也失節之臣亦非不知反君事讎之可愧也而忍處之逼於刑禍故也况於學者豈不知仁義之美廉恥之尚哉斗升之秩錙銖之利誘於前則趍之如流水豈能安展禽之黜樂顔子之貧乎動色之怒毫末之害迫於後則畏之如烈火豈能守伯夷之餓徇比干之死乎如此則何暇仁義之思廉恥之顧哉不惟不思與不顧也抑亦莫之知也譬如逐獸者不見㤗山彈雀者不覺露之霑衣也所以然者物蔽之也故水誠清矣泥沙汨之則俛而不見其影燭誠明矣舉掌翳之則咫尺不辨人眉目况富貴之汨其智貧賤之翳其心哉惟好學君子為不然已之道誠善也是也雖茹之以藜藿如粱肉臨之以鼎鑊如茵席誠惡也非也雖位之以公相如塗泥賂之以萬金如糞壤如此則視天下之事善惡是非如數一二如辨黒白如日之出無所不照如風之入無所不通洞然四達安有不知者哉所以然者物莫以蔽故也於是依仁以為宅遵義以為路誠意以行之正心以處之脩身以帥之則天下國家何為而不治哉大學曰致知在格物格猶扞也禦也能扞禦外物然後能知至道鄭民以格為來或者猶未盡古人之意乎古文集成巻四十五
