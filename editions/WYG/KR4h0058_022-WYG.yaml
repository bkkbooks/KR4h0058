body:
  text: 古文集成巻二十二宋王霆震編前丁集一表出師表孔明東坡云孔明出師一表簡而且盡直而不肆大哉言乎與伊訓說命相表裏非秦漢以下事君為悅者所能至也戴溪筆議孔明出師表淵然如肺腑流出無一㸃浮偽氣象皆真意所形故也冷齊夜話李格非善論文章嘗曰諸葛孔明出師表李令伯乞養親表皆沛然肺腑中流出殊不見斧鑿痕是數君子在後漢末兩晉之間未嘗以文章名世而其詞意超邁如此是知文以氣為主氣以誠為主樓迂齋云規模正大志念深逺詳味乃見呉魏二國未說有此人物有此文章否先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衞之臣不懈於内忠志之士忘身於外者葢追先帝之殊遇此亦孔明自謂欲報之於陛下也誠宜開張聖聽以光先帝遺徳先開廣其心志恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體一篇之文精髓在此兩句陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使内外異法也侍中侍郎郭攸之費禕董允等分別内外之任此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵以為督愚為營中之事悉以咨之必能使行陣和穆優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頹也先帝在時每與臣論此事未嘗不嘆息痛恨於桓靈也可見先主孔明平日所講論者侍中尚書長史參軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽自述出處本末苟全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂嘆恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當奬帥三軍北定中原庶竭駑鈍攘除姦凶興復漢室還于舊都此臣之所以報先帝而忠陛下之職分也武侯之職分至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所云後出師表孔明迂齋云一篇首尾多是說事不可已之意所以不可已者以漢賊不兩立王業不偏安故也血脈聮属條貫統紀森然不亂宜與前表兼看先帝慮漢賊不兩立王業不偏安此是主張故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏安於蜀都足前意故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然陟險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計舉引聖人羣疑滿腹衆難塞胷今嵗不戰明年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也彷彿孫呉然困於南陽險於烏巢危於祁連偪於黎陽幾敗伯山殆死潼闗然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委夏侯而夏侯敗亡先帝每稱操為能猶有此失況臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年矣然䘮趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之内所糾合四方之精銳非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虚圖之深識事勢欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下以定然後先帝東連呉越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後呉更違盟雲長毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已此孔明本心至於成敗利鈍非臣之明所能逆覩也陳情表李令伯五臣注翰曰蜀志云李密字令伯揵為武陽人父早亡母何氏更適人密見養於祖母以孝聞侍疾日夜未嘗解帶蜀平後晉帝徴為太子洗馬詔書累下郡縣逼迫密上疏武帝覽其表嘉其誠欵賜奴婢二人使郡縣供祖母奉膳服遷漢中太守也臣以險釁夙遭閔凶生孩六月慈父見背行年四嵗舅奪母志祖母劉愍臣孤弱躬親撫養臣少多疾病九嵗不行零丁孤苦至于成立旣無叔伯終鮮兄弟門衰祚薄晚有兒息外無朞功强近之親内無應門五尺之僮向曰朞功謂大功小功之親煢煢孑立形影相弔而劉夙嬰疾病常在牀蓐臣侍湯藥未曽廢離逮奉聖朝沐浴清化前太守臣逵察臣孝廉後刺史臣榮舉臣秀才臣以供養無主辭不赴良曰聖朝謂晉朝也逵榮並刺史字也命詔書特下拜臣郎中尋蒙國恩除臣洗馬猥以微賤當侍東宫非臣隕首所能上報臣具以表聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急於星火臣欲奉詔奔馳則以劉病日篤欲苟順私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶蒙矜育況臣孤苦特為尤甚且臣少仕偽朝歷職郎署本圖宦達不矜名節今臣亡國賤俘至㣲至陋銑曰偽朝謂蜀朝也軍所虜獲曰俘蜀為晉滅故云此過蒙拔擢寵命優渥豈敢盤桓有所希兾但以劉日薄西山氣息奄奄向曰日薄西山喻劉年老暮也人命危淺朝不慮夕臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以區區不能廢逺臣密今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報劉之日短也烏鳥私情願乞終養翰曰烏鳥反哺其母言有此烏烏之私情乞念祖母之養也臣之辛苦非徒蜀之人士及二州牧伯所見明知皇天后土實所共鑒銑曰二州謂梁州益州也牧伯謂榮逵也願陛下矜愍愚誠聴臣微志庶劉僥倖保卒餘年臣生當隕首死當結草臣不勝犬馬怖懼之情謹拜表以聞論佛骨表依韓文樊汝霖韓醇洪興祖孫汝聴注韓愈韓曰新舊史皆具載於本傳先是鳯翔法門寺有䕶國真身塔塔内有釋迦文佛指骨一節其法三十年一開開則嵗稔人泰至是憲宗遣中使杜英竒押宫人三十持香花迎入大内畱禁中三日乃送佛祠王公士庶奔走賛歎公為刑部侍郎上表極諫帝大怒欲抵死崔羣裴度戚里諸貴皆為公言乃貶潮州刺史時宰相疑公此表為馮宿所草以宿嘗與公同年進士又同佐裴度淮西故疑之遂貶宿歙州刺史時宰必皇甫鏄也亦可謂無識鑒矣此表豈宿所能了耶補注聞見錄云憲宗元和十四年自鳯翔法門寺迎佛骨入禁中韓退之以諫逐十五年有陳洪志之禍懿宗咸通十四年又迎其骨入禁中諫者以憲宗為戒懿宗曰生得見之死亦無恨不數月崩送佛骨還法門寺愈之諫云奉佛以來享年不永者其知言哉補注邵太史曰𫝊奕上疏請除佛法云降自羲農至于有漢皆無佛法君明臣忠祚長年久漢明帝始立胡神洎于苻石羌胡亂華主庸臣佞祚短政虐云云予謂愈之言葢廣奕之言也故表出之林之竒曰崔浩闢佛而死於魏韓愈闢佛而貶於唐此浮屠者得為口實以為闢佛者之戒至于梁武三捨身而餓死臺城宋齊以下事之漸謹而年代尤促則浮屠之徒又以為學佛不盡其道之過自非卓然不惑之士未有不為其所迷也臣某言伏以佛者夷狄之一法耳自後漢時流入中國洪曰表云自後漢時流入中國又詩云佛法入中國爾來六百年按後漢西域傳云明帝時入中國而梁劉孝標注世說新語引劉向列仙傳序曰歴觀百家之中以相檢驗得仙者百四十六人其七十四人已在佛經即如此說則漢成哀之間已有經矣漢武故事曰昆邪殺休屠王以其衆來降得其金人之神上置之甘泉宫金人者皆長丈餘其祭不用牛羊唯燒香禮拜上使依其國俗祀之此神全類於佛葢漢武時其經未行於中土但以神明事之耳又開皇歴代三寶記云平帝世劉向稱念覽典籍亦見有佛經將知周時乆流釋典秦雖􅉯除漢興復出也又漢武作昆明池掘得黒灰東方朔云可問西域道人西域道人佛之徒也又真誥云裴真人有三十四人弟子十八人學佛道餘者學仙道陶隱居云長安中似已有佛裴君即是其事以此考之中國之有佛尚矣退之所云據正史也孫曰後漢明帝夜夢金人長丈餘頭有光明飛行殿庭以問羣臣傅毅曰西方有神名曰佛其形丈六尺而黄金色帝於是遣郎中蔡愔及秦景使天竺求之得佛經四十二章及釋迦𤣥像并取沙門攝摩騰竺法蘭東還愔之來也白馬負經因立白馬寺於洛城雍門西以處之其經緘于蘭臺石室又畫像于清源臺及顯節陵上自國是始傳中國補注唐史作始入中上古未嘗有也昔者黄帝在位百年年一百十嵗少昊在位八十年年一百嵗顓頊在位七十九年年九十八嵗帝嚳在位七十年年一百五嵗帝堯在位九十八年年一百一十八嵗帝舜及禹年皆百嵗孫曰已上年嵗皆出皇甫謐帝王世紀此時天下太平百姓安樂夀考然而此時唐史無此時字中國未有佛也其後殷湯亦年百嵗湯孫大戊在位七十五年武丁在位五十九年書史不言其年夀所極葢亦俱年不減百嵗周文王年九十七嵗武王年九十三嵗穆王在位百年孫曰書穆王享國百年此時佛法亦未至中國非因事佛而致然也漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促惟梁武帝在位四十八年補注唐史作四十八年今本作四十九年前後三度捨身施佛孫曰大通元年三月辛未中大通元年九月癸巳太清元年二月庚子凡三幸同泰寺捨身宗廟之祭不用牲牢孫曰郊廟牲牷皆代以麫盡日一食止於菜果孫曰武帝煽信佛道日止一食膳無鮮腴惟豆􅃵糲飯而已其後竟為侯景所逼餓死臺城孫曰太清三年侯景攻陷臺城帝憂憤崩于浄居殿國亦尋滅事佛求福反更得禍由此觀之佛不足信事亦可知矣髙祖始受隋禪則議除之當時羣臣材識不逺唐史作識見不逺不能深知先王之道古今之宜推闡明聖唐史作聖明以救斯弊其事遂止樊曰武徳九年髙祖詔有司沙汏天下僧尼道士女冠事竟不行臣常恨焉伏惟睿聖文武皇帝陛下神聖英武數千百年已來未有倫比即位之初不許度人為僧尼道士又不許創立寺觀臣常以為髙祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨於鳯翔御樓以觀舁音輿入大内又令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂徇人之心為京都士庶一有設字詭異之觀戲翫之具耳安有聖明若此而肯信此等事哉然百姓愚㝠易惑難曉苟見陛下如此將謂真心事佛皆云天子大聖猶一心敬信百姓何人豈合更惜身命以故一本故作至一本無以故二字焚頂燒指百十為羣解衣散錢自朝至暮轉相倣傚惟恐後時老少奔波棄其業次若不即加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛者一無者字本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情假如其身至今尚在奉其國命一無其字來朝京師陛下容而接之不過宣政一見孫曰宣政殿名禮賔一設孫曰元和九年置禮賓院以待四夷之使設宴也賜衣一襲衞而出境一作出之於境不令惑衆也況其身死已乆枯朽之骨凶穢之餘豈可直入宫禁可直一作宜令孔子曰敬鬼神而逺之古之諸侯行弔於其國尚令巫祝先以桃茢音列袚除不祥然後進弔祝曰禮記君臨臣䘮以巫祝桃茢執戈惡之也注桃鬼所惡茢葦苕可掃不祥今無故取穢朽之物親臨觀一作視之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍􅑂凡有殃咎宜加臣身上天鑒臨臣不怨悔無任感激懇悃之至潮州謝表韓愈樊汝霖註本傳具載公此表憲宗得表謂宰相曰昨得知愈到潮州表因思其所諫佛骨事决是愛我我豈不念然愈為人臣不當言人主事佛乃年促也帝欲復用愈故先語及觀宰相意皇甫鎛恐其復用乃率先對曰愈終太疎狂且可量移一郡遂授袁州刺史歐陽文忠公云前世有名人當論事時感激不避誅死真若知義者及到貶所則戚戚思嗟有不堪之窮愁形於文字雖韓文公不免此累或者又罪其以封禪諛帝皆非也漢楊惲見廢報孫會宗書語渉譏訕遂坐腰斬雷霆之怒臣子所當知畏公之此表不為過矣臣以狂妄戇愚不識禮度上表陳佛骨事言渉不敬正名定罪萬死猶輕陛下哀臣愚忠恕臣狂直謂臣言雖可罪心亦無他特屈刑章以臣為潮州刺史旣免刑戮又獲祿食聖恩𢎞大天地莫量破腦刳心豈足為謝臣某誠惶誠恐頓首頓首臣以今年正月十四日蒙恩除潮州刺史即日奔馳上道經渉嶺海水陸萬里以今月二十五日到州上訖與官吏百姓等相見具言朝廷治平天子神聖威武慈仁子養億兆人庶無有親疎逺邇雖在萬里之外嶺海之陬待之一如甸畿之間輦轂之下有善必聞有惡必見早朝晚罷兢兢業業惟恐四海之内天地之中一物不得其所故遣刺史面問百姓疾苦苟有不便得以上陳國家憲章完具為治日久守令承奉詔條違犯者鮮雖在蠻荒無不安泰聞臣所稱聖徳惟知鼓舞讙呼不勞施為坐以無事臣某誠惶誠恐頓首頓首臣所領州在廣府極東界上去廣府雖云纔二千里然來徃動皆經月過海口下惡水濤瀧音雙壯猛難計程期􅄓風鱷魚患禍不測州南近界一作州之南境漲海連天毒霧瘴氛日夕發作臣少多病年纔五十髮白齒落理不乆長加以罪犯至重所處又極逺惡憂惶慙悸死亡無日單立一身朝無親黨居蠻夷之地與魑魅為羣苟非陛下哀而念之誰肯為臣言者臣受性愚陋人事多所不通惟酷好學問文章未嘗一日暫廢實為時輩所見推許一作表臣於當時之文亦未有過人者至於論述陛下功徳與詩書相表裏作為歌詩薦之郊廟紀泰山之封鏤白玉之牒鋪張對天之閎休揚厲無前之偉蹟編之乎詩書之䇿而無愧措之乎天地之間而無虧雖使古人復生臣亦未肯多讓伏以大唐受命有天下四海之内莫不臣妾南北東西地各萬里自天寶之後政治少懈文致未優武剋不剛嬖臣姦𨽻嬖一作孽蠧居棊處搖毒自防外順内悖父死子代以祖繼孫如古諸侯自擅其地不貢不朝六七十年四聖傳序以至陛下即位以來躬親聽斷旋乾轉坤闗機闔闢雷厲風飛日月清照天戈所麾莫不寧順大宇之下生息理極髙祖創制天下其功大矣而治未太平也太宗太平矣而大功所立咸在髙祖之代非如陛下承天寶之後接因循之餘六七十年之外赫然興起南面指麾而致此巍巍治功也宜定樂章以告神明東巡泰山奏功皇天補注范太史唐鑑曰終唐之世惟栁宗元以封禪為非以韓愈之賢猶勸憲宗則其餘無足怪也具著顯庸明示得意使永永萬年一作年代服我成烈當此之時所謂千載一時不可逢之嘉會而臣負罪嬰亹許慎切自拘海島戚戚嗟嗟日與死迫曽不得奏薄伎於從官之内𨽻御之間窮思畢精以贖罪過懷痛窮天死不閉目瞻望宸極魂神飛去伏惟皇帝陛下天地父母哀而憐之無任感恩戀闕慙惶懇迫之至古文集成巻二十二
