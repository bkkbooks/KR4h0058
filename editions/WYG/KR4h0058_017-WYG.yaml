body:
  text: 古文集成巻十七宋王霆震編前丙集三書荅韋中立書栁宗元迂齋批㸔後面三節則子厚平生用力於文字之功一一可考韓退之與本朝老蘇陳後山凡以文名家者人人皆有經厯但各有入頭處與自得處耳二十一日宗元白辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京都來蠻夷間乃幸見取僕自卜固無取假令有取亦不敢為人師為衆人師且不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉氏以下人益不事師今之世不聞有師有輒譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師説因抗顔而為師世果羣怪聚罵指目牽引而憎與為言詞愈以是得狂名居長安炊不暇熟又挈挈而東如是者數矣屈子賦曰邑犬羣吠吠所怪也就引喻作議論僕往聞庸蜀之南恒雨少日日出則犬吠予以為過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州之犬皆蒼黄吠噬狂走者累日至無雪乃已然後始信前所聞者今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎非獨見病亦以病吾子然雪與日豈有過哉出脱顧吠者犬耳度今天下不吠者幾人以犬比當時之人此子厚最薄處而誰敢衒怪於羣目以召閙取怒乎僕自讁過以來益少志慮居南中九年増脚氣病漸不喜閙豈可使呶呶尼交切者早暮咈吾耳騷吾心則固僵仆煩憒愈不可過矣平居望外遭齒舌不少獨欠為人師耳抑又聞之引類以證之古者重冠禮將以責成人之道是聖人所尤用心也數百年來人不復行近有孫昌𦙍者獨發憤行之既成禮明日造朝至外廷薦笏言於卿士曰某子冠畢應之者咸憮音武然京兆尹鄭叔則怫然曳笏却立曰何預我耶廷中皆大笑天下不以非鄭尹而怪孫子何哉獨為所不為也有力今之命師者大類此吾子行厚而辭深凡所作皆恢然有古人形貌雖僕敢為師亦何所増加也假而以僕年先吾子聞道著書之日不後誠欲往來言所聞則僕固願悉陳中所得者吾子苟自擇之取某事去某事則可矣若定是非以教吾子僕材不足而又畏前所陳者其為不敢也决矣應前吾子前所欲見吾文既悉以陳之非以耀明于子聊欲以觀子氣色誠好惡何如也今書來言者皆大過吾子誠非佞譽誣諛之徒直見愛甚故然耳自此以下歴言畢生用工夫處始吾幼且少為文章以辭為工及長乃知文者以明道固不苟為炳炳烺烺音朗務采色夸聲音而以為能也凡吾所陳皆自謂近道而不知道之果近乎逺乎吾子好道而可吾文或者其於道不逺矣自此以下皆歴陳所得故吾毎為文章未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昏氣出之懼其昧没而雜也未嘗敢以矜氣作之懼其偃蹇而驕也抑之欲其奥揚之欲其明疎之欲其通亷之欲其節激而發之欲其清固而存之欲其重一句中字又更移易不得此吾所以羽翼夫道也此心術中出故直説羽翼夫道本之書以求其質本之詩以求其恒本之禮以求其宜本之春秋以求其㫁本之易以求其動此吾所以取道之原也看他下許多本字又看下面下許多參字參之穀梁氏以厲其氣參之孟荀以暢其支參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史公以著其潔只是五經用五个本字其餘只用參字不可移動此吾所以旁推交通而以為之文也凡若此者果是耶非耶有取乎抑其無取乎吾子幸觀焉擇焉有餘以告焉苟亟來以廣是道子不有得焉則我得矣又何以師云爾哉取其實而去其名無招越蜀吠怪而為外庭所笑則幸矣應前雪日應冠禮宗元復白與韓愈論史書栁宗元迂齋批掊擊辨難之體沈著痛快可以想見其人前獲書言史事云具與劉秀才書及今見書藁私心甚不喜與退之往年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以爲苟以史榮一韓退之耶若果爾退之豈宜虚受宰相榮已而冒居館下近宻地食奉養役使掌故利紙筆為私書取以供子弟費古之志於道者不宜若是且退之以為紀録者有刑禍避不肯就尤非也史以名為褒貶猶且恐懼不敢為設使退之為御史中丞大夫其褒貶成敗人愈益顯其宜恐懼尤大也以重明輕則又揚揚入臺府美食安坐行呼唱於朝廷而已耶在御史猶爾設使退之為宰相生殺出入升黜天下士其敵益衆則又將揚揚入政事堂美食安坐行呼唱於内庭外衢而已耶何以異不為史而榮其號利其禄者也又言不有人禍必有天刑若以罪夫前古之為史者然亦甚惑凡居其位思直其道議論正道苟直雖死不可回也如回之莫若亟去其位孔子之困於魯衛陳宋蔡齊楚者是也力詆紀錄者有刑禍之説其時暗諸侯不能以也其不遇而死不以作春秋故也難得倒當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也解析分明又不得以春秋為孔子累范曄悖亂雖不為史其宗族亦誅司馬遷觸天子喜怒班固不撿下崔浩沽其直以鬭暴虜皆非中道十分難得倒左丘明以疾盲出於不幸子夏不為史亦盲不可以是為戒其餘皆不出此是退之宜守中道不忘其直無以他事自恐退之之恐惟在不直不得中道議論正刑禍非所恐也句有力凡言二百年文武事多有誠一作誡如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之耶如退之但以所聞知孜孜不敢怠同職者後來繼今者亦各以所聞知孜孜不敢怠則庶幾不墜使卒有明也不然徒信人口語毎毎異辭日以滋乆則所云磊磊軒天地者决必不沈没且亂雜無可考非有志者所忍恣也果有志豈當待人督責迫蹙然後為官守耶义凡鬼神事渺茫荒惑無可准明者所不道退之智而猶懼於此今學如退之辭如退之好言論如退之慷慨自謂正直行行下浪切焉如退之猶所云若是則唐之史述其卒無可託乎明天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可為速為果卒以為恐懼不敢則一日可引去又何以云行且謀也今當為而不為又誘館中他人及後生者此大惑已不勉已而欲勉人難矣哉與李睦州論服氣書栁宗元迂齋批曉警深切詞氣勁拔開闔曲盡其妙所恨太厲聲色二十六日宗元再拜前四五日與邑中可與遊者遊愚溪上池西小丘坐栁下酒行甚歡坐者咸望兄不能俱以為兄由服氣以來貌加老而心少歡愉不若前去年時既言皆沮然眄睞上莫見切下各代切斜視也思有以已兄用斯術而未得路聞一日濮陽呉武陵最輕健先作書道天地日月黄帝等下及列仙方士皆死狀出千餘字頗甚快辯伏觀兄貌笑口順而神不偕來及食時竊睨和糅女救切雜也燥濕與啖飲多寡猶自若見兄陽徳其言而隂黜其忠也言其拒善不納若古之彊大諸侯然負固怙力敵至則諾去則肆是不可變之尤者也攻之不得則宜濟師今呉子之師已遭諾而退矣愚敢厲鋭擐音患堅鳴鐘鼔以進决於城下惟兄明聴之借興師討罪之意以闢之凡服氣之大不可者呉子已悉陳矣悉陳而不變者無他以服氣書多美言而以為得恒乆大利則又安能棄吾美言大利而從他人之苦言哉今愚甚呐訥亦從口見集韻不能多言大凡服氣之可不死歟不可歟夀歟夭歟康寜歟疾癘歟若是者愚皆不言亦因武陵已言之故但以世之兩事已所經見者類之以明兄所信書必無可用愚幼時嘗嗜音見有學操琴者不能得碩師而偶傳其譜要見服氣無所師承此是攻他要領讀其聲以布其爪指蚤起則嘐嘐火苞切譊譊馨么切以逮夜又増以脂燭燭不足則諷而鼔諸席如是十年以為極工出至大都邑操於衆人之座則皆得大笑曰嘻何清濁之亂而疾舒之乖歟卒大慚而歸及年少長則嗜書又見有學書者亦未能得碩師獨得國故書伏而工之其勤若向之為琴者而年又倍焉出曰吾書之工能為若是知書者又大笑曰是形從而理逆卒為天下棄又大慚而歸是二者皆極工而反棄者何哉無所師而徒狀其文也結有力其所不可傳者卒不能得故雖窮日夜弊嵗紀愈疎而不近也今兄之所以為服氣者果誰師耶應上無所師承疑詞始者獨見兄傳得氣書於盧遵所伏讀二三日遂用之其次得氣訣於李計所又參取而大施行焉是書是訣遵與計皆不能知然則兄之所以學者無碩師矣决詞是與向之兩事者無毫末差矣宋人有得遺契者宻數其齒曰吾富可待矣兄之術或者其類是歟兄之不信今使號於天下曰孰為李睦州友者今欲已睦州氣術者左袒不欲者右袒則凡兄之友皆左袒矣則又號曰孰為李睦州客者今欲已睦州氣術者左袒不欲者右袒則凡兄之客皆左袒矣則又以是號於兄之宗族則皆左袒矣號姻婭則皆左袒矣入而號之閨門之内則子姪親䁥皆左袒矣下之號於臧獲僕妾則臧獲僕妾皆左袒矣出而號於素為將率胥史者則將率胥史皆左袒矣則又之天下號曰孰為李睦州讎者今欲已睦州氣術者左袒不欲者右袒則凡兄之讎者皆右袒矣友與客以下凡七句而讎只一語蓋名之曰讎則無可分别者然則利害之原可知也並列恩讎兩端有許多文字却以一句結之所以佳友者欲久存其道客者欲乆存其利宗族姻婭欲乆存其戚閨門之内子姪親䁥欲乆存其恩臧獲僕妾欲乆存其主將率胥史欲乆存其勢與徐公之妻之妾之客句法同此一段文字是從鄒忌告齊宣王闗轉來六个字都不可移動讎欲速去其害亦只一句兄之為是術凡今天下欲兄乆存者皆懼而欲兄速去者獨喜兄為而不已則是背親而與讎不及中人者皆知其為大戾而兄安焉固小子之所懍懍也兄其有意乎卓然自更使讎者失望而慄親者得欲而忭則愚願椎肥牛擊大豕刲羣羊以為兄餼窮隴西之麥殫江南之稻以為兄夀鹽東海之水以為鹹醯敖倉之粟以為酸極五味之適致五臟之安心恬而志逸貌美而身胖醉飽謳歌愉懌訢歡流聲譽於無窮垂功烈而不刋不亦㫖哉孰與去味以即淡去樂以却愁分别利害之言悴悴焉膚日皺肌日虚守無所師之術尊不可傳之書終始破他無所師承悲所愛而慶所憎用字錯綜徒曰我能堅壁拒境以為彊大是豈所謂彊而大也哉終始借興師用兵而言無任疑懼之甚荅皇甫湜書李翺迂齋批觀翺此書直欲以當代史筆自任中間品量前代史筆之髙下發明人所未及辱書覽所寄文章詞髙理直歡恱無量有足發予者自别足下來僕口不曽言文非不好也言無所益衆亦未信秪足以招謗忤物於道無明故不言也僕到越中得一官三年矣材能甚薄澤不被物月費官錢自度終無補益雖是大綱所説已含著書意累求罷去尚未能以為愧僕性不解謟佞坐不能曲事權貴以故不得齒於朝廷而足下亦抱屈在外故累有所説凡古賢聖得位於時道行天下皆不著書以其事業存於制度足以自見故也其著書者蓋道徳充積阨摧於時此其所以任史筆身卑處下澤不能潤物恥灰燼而泯又無聖人為之發明故假空言是非一代以傳無窮而自光耀於後故或往往有著書者僕近寫得唐書史官材薄言詞鄙淺不足以發揚髙祖太宗列聖明徳使後之觀者文采不及周漢之書以史筆自任僕以為西漢十一帝髙祖起布衣定天下豁達大度東漢所不及其餘唯文宣二帝為優自惠景以下亦不皆明於東漢明章兩帝而前漢事跡灼然傳在人口者以司馬遷班固叙述髙簡之工發明人所未及故學者恱而習焉其讀之詳也發足下讀范曄漢書陳夀三國志王隠晉書生熟何如左丘明司馬遷班固書之温習哉故温習者事跡彰未有人如此發明而罕讀書者事跡晦讀之疏數在詞之髙下好理必然也唐有天下聖明繼於周漢而史官叙事曽不如范曄陳夀所為况足擬望左丘明司馬遷班固之文哉僕所以為恥當兹得於時者雖負作者之才其道既能被物則不肯著書矣應前僕竊不自度無位於朝幸有餘暇而詞句足以稱讃明盛紀一代功臣賢士行跡灼然可傳於後自以為能不滅者不敢為讓故欲筆削國史成不刋之書用仲尼褒貶之心取天下公是公非以為本羣黨之所謂為是者僕未必以為是羣黨之所謂為非者僕未必以為然使僕書成而傳則富貴而功徳不著者未必聲明於後貧賤而道徳全者未必不烜赫於無窮韓退之所謂誅姦諛於既死發潜徳之幽光是翺心也僕文采雖不足以希左丘明司馬子長足下視僕叙髙愍女楊烈婦豈盡出班孟堅蔡伯喈之下耶自任如此仲尼有言曰不有博奕者乎為之猶賢乎已僕所為雖無益於人比之博奕猶為勝也足下以為何如故古之賢聖當仁不讓於師仲尼則曰文王既没文不在兹乎又曰予欲無言天何言哉孟軻則曰予不遇魯侯天也臧氏之子安能使予不遇哉司馬遷則曰成一家之言藏之名山以俟後聖人君子僕之不讓亦非大過也幸無怪古文集成巻十七
