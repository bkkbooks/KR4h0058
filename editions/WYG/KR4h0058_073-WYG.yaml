body:
  text: 古文集成巻七十三宋王霆震編前癸集四議晉文公問守原議柳子厚東萊集註左僖二十五年晉侯朝王王享醴命之宥請隧弗許與之陽樊温原攅茅之田冬晉侯圍原原降遷原伯貫于冀晉侯問原守於寺人勃鞮音孛低對曰昔趙哀初危切晉大夫以壺飱從徑餒而弗食故使處原東萊批看回互轉換貫珠相似辭簡意多大抵文字使事須下有力言語晉文公既受原於王難其守問寺人勃鞮以畀趙衰先說事因使事起頭要接有力余謂守原政之大者也主意所以承天子植霸功致命諸侯文勢見意已着寺人不宜謀及媟近以忝王命接有力分開鋪叙見得出處應而晉君擇大任不公議於朝而私議於宫不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗正文公罪輕過了而賊賢失政之端由是滋矣上說朝與宫下說卿相寺人下四句不合掌所謂異様不俗承上說雙闗回互下字好輕過况當其時不乏言議之臣乎此一叚生下句先理一句亦應卿相大抵如貫珠前既說不謀於卿相到此説䟽外狐偃為謀臣先軫將中軍左僖二十八年晉君䟽而不咨外而不求下字乃卒定於内竪與媟近相應其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也換新意好與政之大者相應然而齊桓任管仲以興進竪刁以敗史齊世家桓公既得管仲脩齊國政桓公始霸管仲病桓公問誰可相者曰竪刁如何對曰自宫以適君非人情難親管仲死桓公不用管仲言竪刁専權公卒竪刁立公子无詭為君五公子争立作亂則獲原啓疆適其始政所以觀視諸侯也文勢下字文字好處而乃背其所以興跡其所以敗引意到語壯然而能霸諸侯者以土則大以力則彊以義則天子之冊也誠畏之矣烏能得其心服哉過好換好下文回緩衰既是賢説到此正難解說故以土則大幾句見得有力回互好處其後景監得以相衛鞅史本傳公孫鞅八秦因孝公寵臣景監以求見孝公以鞅為左庶長後封為商君𢎞石得以殺望之縁他好誤了蕭望之傳誤之者晉文公也趣上說嗚呼得賢臣以守大邑則非失舉也盖失問也此一叚餘意精神又是一意舉趙衰未為不是問寺人則非然猶羞當時陷後代如此况於問與舉又兩失者其何以救之哉精神余故著晉君之罪以附春秋許世子止趙盾之義外事結切又是一个意繳結好事見左昭十九年楚議宛丘楚雖三户亡秦必楚楚人之志也而言卒驗何也曰殺人者必見殺虐人者還自虐自有覆載以來未有能免者何則天道也秦㓕六國秦雖㓕乎楚楚怨秦最深怨深者復之必力人事也此理之所必至也又何怪焉韓信議宛丘或問韓信服高帝乎余曰韓信為高帝將數年常將重兵㓕大國而動以武涉蒯通之邪説信無所顧召之而至令之而行何為不服然則何為卒反余曰信服高帝之智力而不服其為人是以反也然則何也夫信之反非重失楚也在夫偽遊雲夢而執之也夫偽遊雲夢之計是市井下俚之智而萬乗之主親行之此信所以怏怏北面而薄其君以謂不足為其下也夫暴奪人之冨貴而幽囚之欲使夫雄桀者帖然而無怨非服之以徳屈之以理則不可夫以下俚市井之策而詐韓信彼身可執心輕其上矣彼且問其計出於謀臣則君臣皆輕是不反何待然則為高祖者奈何必從夫反形明白乃明其罪引天下兵誅之耳信雖難制然不過數年而定一偽遊而縛韓信自爾出令天下誰敢信之歟韓信議宛丘自古士有所負而功名見於世者未嘗有肯以身輕就人者也何者彼輕就人者其規矩凖繩將在彼矣夫如是則我之所有安得盡布之哉且保鏌鎁之利者不以試薪售和氏之璧者不以登門彼皆不求人而人自求之若不得已焉而後即之者亦自其理然也韓信當秦之亡天下之窮士也非有孔孟進退之節然蕭何獨察其非汲汲於求顯待之不厚禮之不至則不為用也故以高帝之倨必使之築壇齋戒備禮而後官之舉之三軍之下而加之諸將之上而不疑知不若是信將不滿而無留心矣諸葛亮戰國之䇿士也高卧於隆中其主就而後起而後能使劉備三分天下而伸於彊敵彼孫武求試兵法於宫人叔孫通度上所能行而蕝禮其事業功名卒以不顯有以也夫平江南議宛丘余聞諸故老言樊若水不得志於李氏乃獻浮梁自采石濟江卒用其策取江南余嘗恨焉若水李煜之臣叛其主而來且不當受况獻䇿以㓕其國乎是時藝祖西平巴蜀南朝吳越威徳響震而李氏自周以來國蹙民懼亡可立待朝廷使㳂江諸郡大治舟師順流而下由歴陽趨金陵李煜不足亡也何患無䇿而用此姦人叛夫之計乎晉文不以原易信而諸侯服漢高帝斬丁公以正君臣之大義余謂當縛若水送李煜使甘心焉不然正其叛主之罪而誅之以示天下江南君臣當望風向義之不暇豈不諒乎偉哉惜乎當時在廷無為此言者也救災議南豐東萊批此一篇後面應得好説利害體河北地震水災隳城郭壊廬舍百姓暴露乏食主上憂憫下緩刑之令遣持循之使恩甚厚也轉然百姓患於暴露轉非錢不可以立屋廬患於乏食非粟不可以飽兩句綱目二者不易之理也此一叚文字有操縱非得此二者雖主上憂勞於上使者旁午於下無以救其患塞其求也有司建言請發倉廪與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見於衆人之所未見也闗鎻破前説結前説今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者亦必有非常之恩然後可以振之應常行字今百姓暴露乏食已廢其業矣使之相率日待二升之廪於上則其勢必不暇乎他為作文好散說是農不復得修其畎畆商不復得治其貨賄工不復得利其器用閒民不復得轉移執事開說文字暢一切棄百事而專意於待升合之食以偷為性命之計是直以餓莩之徒養之而已非深思逺慮為百姓長計也警策以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石下得好難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來嵗麥熟賑之未可以罷自今至於來嵗麥熟凡十月一户當受粟五十石筭得分明今被災者十餘州州以二萬戸計之中戸以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬户食之不遍則為施不均而民猶有無告者也食之徧則當用粟五百萬石而足何以辦此又非深思逺慮為公家長計也至於給授之際有淹速有均否有真偽有集㑹之擾有辨察之煩厝置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳轉其於屋廬構築之費將安取哉屋廬構築之費既無所取而就食於州縣必相率而去其故居雖有頹墻壊屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可頼者必棄之而不暇顧甚則殺牛馬而去者有之伐桑棗而去者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽盖流亡者亦已衆矣警䇿如不可止則將空近塞之地失鬬戰之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也結生下意結前生後何則失戰鬬之民異時有警邊戍不可以不増爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出於無聊之計有窺倉庫盗一囊之粟一束之帛者彼知己負有司之禁則必鳥駭鼠竄竊弄鋤梃於草茅之中以扞游徼之吏不重説盗賊文字有回互强者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼔之警國家胡能晏然而已乎回互况今外有夷狄之可慮内有郊祀之將行安得不防之於未然銷之於未萌也然則為今之䇿前説害自此以下説利下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則今被災之州為十萬户如一戸得粟十石得錢五千下户常産之貲平日未有及此者也說利破有司說獻䇿彼得錢以完其居得粟以給其食應則農得修其畎畆商得治其貨賄工得利其器用閒民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廪於上而勢不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之說則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石説利害分明况貸之於今而收之於後足以振其艱乏而終無損於儲峙之實所實費者錢五鉅萬貫而已此可謂深思逺慮為公家長計者也與前相應得劉向文字體又無給授之弊疾癘之憂民不必去其故居苟有頹牆壊屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可用者皆保而不失况於全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居食足則有樂生自重之心各復其業則勢不暇乎他為雖驅之不去誘之不為盗矣夫飢嵗聚餓殍之民而與之升合之食無益於救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足頼而自安於畎畆之巾負錢與粟而歸與其父母妻子脫於流離轉死之禍則戴上之施而懐欲報之心豈有已哉天下之民聞國家厝置如此恩澤之厚其孰不震動感激恱主上之義於無窮乎如是而人和不可致天意不可恱者未之有也人和洽於下天意恱於上然後玉路徐動就陽而郊荒夷殊陬奉幣來享文字疆内安輯里無囂聲豈不適變於可為之時消患於無形之内乎此所謂審計終始見於衆人之所未見也結不早出此或致於一有枹鼓之警則雖欲為之將不及矣或謂方今錢粟恐不足以辦此夫王者之富藏之於民有餘則取不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足盖百姓富實而國獨貧與百姓餓殍而上獨能保其富者自古及今未之有也故又曰不患貧而患不安此古今之至戒也是故古者二十七年耕有九年之蓄足以備水旱之災然後謂之王政之成前食貨志唐水湯旱而民無捐瘠者以是故也同上今國家倉庫之積固不獨為公家之費而已凡以為民也雖倉無餘粟庫無餘財至於救災補敗尚不可以已况今倉庫之積尚可以用獨安可以過憂將來之不足而立視夫民之死乎古人有言曰剪爪宜及膚割髮宜及體先王之於救災髮膚尚無足愛况外物乎且今河北州軍凡三十七災害所被十餘州軍而已他州之田秋稼足望令有司於糴粟常價斗増一二十錢非獨足以利農其於増糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虚估不過捐茶荈香藥之類為錢數鉅萬貫而其費已足茶荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五鉅萬貫又捐茶荈香藥之類為錢數鉅萬貫而足以救一時之患為天下之計利害輕重又非難明者也顧吾之有司能越拘攣之見破常行之法與否而已此時事之急也故述斯議焉古文集成巻七十三
