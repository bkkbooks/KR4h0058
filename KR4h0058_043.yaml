body:
  text: 古文集成巻四十三宋王霆震編前已集五論王者不治夷狄論東坡東萊批統體好前面開説長後正説甚短讀之全不覺長短蓋後面一句轉一句故也大凡罵題先説他好然後罵中間出入意外説戎乃筆力髙人處郎學士曰出公羊傳註公墓誌云秘閣試六論舊不起草以故多文不工公始具草文義粲然時以為難斆齋評曰此篇論春秋不治夷狄其不治者乃所以深治議論儘有味中間鋪叙齊晉行事未能純為中國秦楚行事未能純為夷狄聖經終抑夷而尊夏者此正可見其用法至詳處末又説戎之㑹公不敢深責其禮文意亦髙妙全篇並東萊批註夷狄不可以中國之治治也説大意起頭有力譬若禽獸然求其大治必至於大亂先王知其然是故以不治治之治之以不治者乃所以深治之也鎻處有力亦使得體春秋書㑹戎於潛何休曰王者不治夷狄録戎來者不拒去者不追也公羊隠二年夫天下之至嚴而用法之至詳者莫如於春秋凡春秋之書公書侯書字書名其君得為諸侯其臣得為大夫者舉皆齊晉也書公如葬齊桓公之類是也不然則齊晉之與國也如宋衛陳鄭之屬皆齊晉相與之國其書州書國書氏書人其君不得為諸侯其臣不得為大夫者舉皆秦楚也書州如荆人來聘之類是也不然則秦楚之與國也間架立二段若无處結便不成文字亦本原毁郎曰如崇如介人如江黄之屬皆秦楚相與之國夫齊晉之君所以治其國家擁衛天子而愛養百姓者豈能盡如古法哉散説若不如此散説都无氣此等皆是放散錯綜處蓋亦出於詐力而參之以仁義是亦未能純為中國也此是段中有力處此二段説得中國所以不與夷狄處秦楚者亦非獨貪冒無恥肆行而不顧也蓋亦有秉道行義之君焉如秦穆公楚文王之流是秦楚亦未至於純為夷狄也有力處意在後齊晉之君不能純為中國而春秋之所與者常嚮焉再整頓説起解前去有善則汲汲而書之下字切如書齊桓召陵之盟晉文城濮之戰之類惟恐其不得聞於後世有過則多方而開赦之如齊桓滅項則書師滅項晉文召王則曰王狩之類惟恐其不得為君子秦楚之君未至於純為夷狄而春秋之所不與者常在焉有善則累而後進如荆之入蔡伐鄭則以州稱至於來聘則曰荆人焉所謂善累而後進者類此有惡則畧而不録以為不足録也見所以不與處商臣弑其君頵止書楚子卒所謂畧而不録者類此是非獨私於齊晉而偏疾於秦楚也以見中國之不可以一日背而夷狄之不可以一日嚮也其不純者足以寄其褒貶則其純者可知矣統鎻冇力斡前後意此句最得體好斡下意故曰天下之至嚴而用法之至詳者莫如春秋説盡了他又生意夫戎者豈特如秦楚之流入於戎狄而已哉意外一篇好處在此説正意了自此已下一句轉一句然而春秋書之曰公㑹戎於潛公無所貶而戎為可㑹是獨何歟夫戎之不能以會禮㑹公亦明矣此學者之所以深疑而求其説也㸔上説戎狄全无分解處人皆以為如是重深絶不治處今乃出入意外而説戎如此乃見其筆髙人處故曰王者不治夷狄録戎來者不拒去者不追也夫以戎之不可以化誨懐服也彼其不悍然執兵以與我從事於邊鄙固亦幸矣此輕説過便見不治繳結有力結前後意又况知有所謂㑹者而欲行之是豈不足以深嘉其意乎彼自中國説入夷狄此自夷狄説入中國來不然將深責其禮彼將有所不堪而發其暴怒則其禍大矣見不治治之本意仲尼深憂之故因其來而書之以㑹曰若是足矣是將以不治深治之也結得盡處一過好由是觀之春秋之疾戎狄者非疾純戎狄也疾夫以中國而流入於戎狄者也闗鎖上面无此則前散漫結有力匈奴論東萊治天下者不可以夷狄之强弱為中國之安危使夷狄之勢强耶則吾中國之不可不治也使夷狄之勢弱耶則吾中國亦不可不治也吾知治吾中國耳彼夷狄奚有於我哉譬之治家者睦其宗族制其童僕謹其扄鐍髙其垣牆此治家之常法也是法也不為鄰之厚而増不為鄰之薄而損不為盜賊而設不為無盜賊而廢蓋是數者之法為吾家而設非為鄰里盜賊而設也惟治天下者亦然夫中國之與夷狄其不相為用乆矣仰觀天文俯察地理北戎為胡門自三危而至於朝鮮所以限戎狄也南戎為越門自岷山而至於甌閩所以限蠻夷也是中國之與夷狄風俗不同嗜慾不同彼之休戚何豫吾之利害哉是故先王之待夷狄其來不喜其去不怒其欣然而朝覲也特象胥之職爾特行人之職爾禮秋官象胥之職掌蠻夷閩貉戎狄之國使掌傳王之言而論説焉以和親之盛行人之職掌大賔之禮及大客之儀以親諸侯九州之外謂之蕃國世壹見各以其所貴寶為贄吾心初不為之驕其悍然而侵畧也特司馬之職爾特士師之職爾夏官大司馬之職掌建國之九法以佐王平國秋邦士師職掌國之五禁之法以左右刑罰吾心初不為之沮彼方紛然自來自去而治吾中國者亦未嘗一日廢焉及至後世當夷狄之强則自以為危危則戒戒則治當夷狄之弱則自以為安安則怠怠則亂故夷狄之强弱雖不足為中國之安危而實兆中國之治亂此無他為人君不能自治中國而每以夷狄為輕重也漢自宣帝之前匈奴盛而漢以治自宣帝以後匈奴衰弱而漢以亂觀宣帝以前太史之所書曰某年匈奴入雲中某年匈奴入上郡某年匈奴入朔方誠艱難多事之時也觀宣帝以後太史之所書曰某年斬郅支單于祠郊廟某年呼韓邪單于來朝改元某年單于來朝赦天下誠太平無事之時也有艱難多事之形而天下反治有太平無事之形而天下反亂獨何歟多事則勤而修政無事則怠而佚豫此治亂之所以分也吾嘗謂漢祚之亡不在於元帝而在於宣帝不生於王莽之强而生於渭橋之謁焉彼匈奴自髙帝以來桀驁不賔非祖宗之治不若宣帝特其勢自强耳及宣帝之世欵塞來王非宣帝之治過於祖宗也特其勢自弱耳初無一毫豫於中國而宣帝乃以為功光祖宗張皇其事以震耀於後世元成以下習熟見聞遂以為祖宗之所患者獨匈奴今匈奴既服則天下無復多事矣遂盤樂怠傲以至於亡豈非宣帝有以啓之耶自古深謀逺慮之士多以為無外患則有内憂晉與楚戰於鄢陵范文子不欲戰曰盍釋楚以為外懼乎此知其一而未知其二也夫人臣之告其君不能使之悟而徒欲其懼使夷狄敵國常强則君猶警懼敵國之患去則君必驕矣是其説雖足以致今日之懼亦所以啓他日之驕得失適相半耳盍若告人君以治内之説彼夷狄敵國之或盛或衰外患之或有或亡皆無豫於吾事惟専意於治内而已如是則吾説可以常行而無弊矣此又進言於君者所當知也和戎論止齋後世之師不可以三代用也非三代之不可用也後世之不能三代也昔湯之於葛伯大王之於狄人嘗卑而下之矣然皆出於睦鄰之誠心而非所以餌敵故惟商周而後可以為之未能商周而襲其跡則將自斃以資冦何者惟有得天下之道而無取天下之心者可以無事於術而聽其自爾也漢之髙帝自惟其無商周之徳也故其圖天下一出於術欲離之故合之欲奪之故予之雖其道異乎湯武然世之善論者未始不多其自知之明而審其所處也方其羣雄競馳躡足而爭赴者亡秦氏也周章百萬之師戰於麾下以嬰其鋒而已虀粉於章邯之手沛公誠勇者詎能徑入之哉故為之舒遲容與隂以利㗖秦將及秦將一欲連和而嶢闗之戰已合矣髙帝之入秦也和也項氏手裂土宇錯建諸侯之國其綿壤千里為楚漢輕重者無出齊右也故虜魏豹蹙陳餘帝皆付之韓信而無憂獨念夫田齊之强桀猾變詐未易以力鬭乃遣酈生説之食其之説一諧而淮隂之衆俄集於厯下則髙帝之下齊也亦和也至其身以屢衂之卒抗雷轟焱至之楚轉戰五年棄官軍而狐竄者屢矣帝之意知夫漢之不楚敵也而惟和可以驕之滎陽之圍嘗請和於楚矣而羽不聽蓋有范増者在而帝之計未行也漢之四年也羽以兵少食盡自申鴻溝之約當是時籍志衰矣漢得天下之半若可以氣要而威制之也而方懽然與之畧無難色帝豈忘羽者耶東兵未反國而垓下之追曵踵而至史臣以為良平之謀不知夫髙帝之蓄於數年者蓋至此始獲逞也髙帝所以滅項者抑又以和也嗚呼而今而後知夫豪傑有志之主其所以有就於天下者未可以小廉曲謹論也髙帝之仆勁敵而俱以和市之使帝不忍食區區之言負信誼於天下則大事去矣安能基四百年之業哉故夫髙帝之深持不校之形以陷敵人於術中者君子皆不之罪蓋其圖天下者重而負人者輕故也後之豪傑有志之主能三代則三代若猶未也得如漢髙亦足矣易敵論止齋國雖小不可以無人侮之也以無人侮人之國者是易敵也夫易敵者兵家之深忌而天下之至危道也古之人亦有犯兵家之深忌而涉乎天下之至危以濟者矣而不可以常韓信之將兵楚漢無與侶者矣而猶有難於其人其擊魏也必知其不將周叔而將栢直始以嬰孩視之及其破趙亦幸夫李左車之計不行而後喜夫以區區之趙魏而有二子者為淮隂之所難使二子而用則信之得志未可知也嗚呼天下豈有無人之國哉吾觀賈誼之謀匈奴欲以五餌㗖之而不知中行説之教其君者正欲其絶漢物趙涉之説條侯自以為從天而下之計而吳有田禄伯者其計適侔於涉唐太宗揣髙麗之上䇿而劉盧之䇿果合於太宗則夫詭思竒慮之士靡國無之用兵者挾已之長而短人其危也哉知彼而不知已此兵法之所殆也雖然輕敵者敗重敵者無成功何者傲之固不可畏之亦不可過甚也將之用兵必畏其有人則亦何徃而可善料敵者亦以其勢揆之不怯其强而怯其弱不憂其勝而憂其敗蓋惟强者易忽而勝者易驕弱者常危而敗者常戒也驕與忽之心勝則賢者之謀不入一危而戒則屈已以下人必有出而扶持之者矣蹇叔之言不用於秦師方興之日伍員之諫不行於夫差屢勝之後至於秦師壓境則鄭伯倉皇求計於之武㑹稽之恥句踐屬心於種蠡無他强弱勝負之勢使然也君子之料敵必於此乎卜之故夫窮冦不之迫而立喪埀亡之國必寛而假之者蓋恐夫急攻疾取所以深其慮合其交而使之自為計也嗚呼守即墨而田單奮入郢而申包胥哭此燕吳之所以反大敗於齊楚也悲夫知敵論林光朝以兵餌敵此最䇿之下者也而鄭楚以此獲勝何哉蓋必先知夫敵人之情偽而後可用者也茍或敵人之情偽我有所不知我之詭謀敵之諜者或得以知則其謀不可用而其兵不可勝也北戎之貪鄭人知之因其貪而餌之以兵彼惟貪是視也詎知吾有三覆之謀耶吳人之輕楚人知之因其輕而誘之以師彼惟輕是視也詎知吾有三覆之謀耶故貪則餌之輕則誘之不貪不輕而後兩敵之勢等吾於此亦有術以待之名曰審機彼之大臣相疑也吾則多出間諜以惑之彼之將臣失權也吾則虛示讒謗以擾之帳下之情變則敵酋可襲水旱之禍亟則邊民可誘未有可勝之機則拱以待一旦之變已有可勝之勢則隂以鼔三軍之心如是而乆之以嵗月持之以謹重勿以少挫而傷吾之氣勿以少勝而驕吾之氣勿以無功而墮吾之氣勿以老師而憂吾之氣氣既充實兵既持静而後可以觀敵人之變若是而不全勝者吾未之信也武備論止齋人有常言曰兵者治世之所諱也治世之士不言兵治世之民不執兵變刀為犢變劒為牛變矛㦸為鋤耰變營壘為畎畆凡鳥占雲祲金版六韜之書皆束之髙閣使天下不復知有兵之名然後足為至治之極嗚呼何其不思之甚邪治世雖未嘗好戰也亦未嘗忘戰也雖未嘗用兵也亦未嘗去兵也先王於太平至治之世嚴師徒肅號令謹閱習所以銷患於無形保治於無極曷嘗以兵為諱哉且虞周之時為治邪為亂邪雖甚愚者知其為至治也舜當至治之時固可以忘戰而去兵矣然典謨所書在内則明射侯以為教養之術在外則奮武衛以為備禦之防汲汲然惟恐兵之未練固未聞其以兵為諱也武王之時為治邪為亂邪雖甚愚者亦知其為至治也武王當至治之時固可以忘戰而去兵矣然司馬所掌於春於夏則有振旅苃舍之名於秋於冬則有治兵大閲之法汲汲然惟恐兵之未練固不聞其以兵為諱也舜之備既具固可以鼓琴而詠南風之詩武王之備既具固可以建櫜而奏戢戈之頌人見其鼓琴之逸而不知其為備如此之勞也遂以為舜之治盡於鼓琴人見其建櫜之易而不知其為備如此之難也遂以為武王之治盡於建櫜使鼓琴可以盡舜之治則房琯之惑董廷蘭何為有陳濤之敗邪使建櫜而可以盡武王之治則始皇之鑄金人十二何為有勝廣之亂邪鼓琴一也舜則可以琯則不可者有備無備之分耳建櫜一也武王則可以始皇則不可者有備無備之分耳房琯不善學舜者也始皇不善學武王者也論至於是孰謂練兵嚴備非太平之先務也愚故曰兵者非治世之所諱者也大抵銷兵不足以銷兵惟治兵乃可以銷兵偃武不足以偃武惟講武乃可以偃武人徒見文帝之結和比鄰煙火萬里以為偃武之功也殊不知文帝所以致此者以有細栁棘門之備而已人徒見章帝之儒館獻歌戎亭虚堠以為偃武之功也殊不知章帝所以致此者以有金城戍邊之備而已人徒見太宗之四夷冠帶胡越一家以為偃武之功也殊不知太宗所以致此者以有殿廷習射之備而已晉武帝當平吳之後可謂治矣恃其治而撤去州郡之備終致五胡之亂豈非忘戰之害乎元宗當開元之後可謂治矣恃其治而撤去中國之備終致禄山之亂豈非忘戰之害乎徳宗當興元之後可謂治矣恃其治而撤去河朔之備終致藩鎮之亂豈非忘戰之害乎由是觀之銷兵乃所以召兵閲武乃所以偃武其理甚明無足疑者然則人君當無事之時其可不為先事之備乎抑嘗謂衆人之所輕乃明君之所重衆人之所後乃明君之所先凡開闔操縱之權固非常情之能窺測也何以知之以光武之事知之當用兵之際衆人之所重者騎射也所輕者詩書也光武乃投戈講藝息馬論道於戰馬擾攘之中而篤仁義禮樂之用輕人之所重重人之所輕非有先物之幾孰能與於此乎當偃兵之際衆人之所先者文事也所後者武備也光武乃疏築亭障脩明烽燧於宴安閒暇之中而嚴守禦捍防之備後衆人之所先先衆人之所後非有先物之幾孰能與於此乎天下方尚武吾獨示之以文天下方尚文吾獨抗之以武一弛一張與時推移彼見其勝敵謂之勇見其治國謂之柔是皆刻舟膠柱而求其迹者也烏足以知光武古文集成巻四十三
