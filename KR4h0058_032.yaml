body:
  text: 古文集成卷三十二宋王霆震編前戊集二論大臣論蘇東坡謝相山批反覆説盡君子小人利害曲折文字縱橫議論痛快天下之權在於小人君子之欲擊之也不亡其身則亡其君然則是小人者終不可去乎聞之曰迫人者其智淺迫於人者其智深主意非才有不同所居之勢然也古之為兵者圍師勿遏窮冦勿迫用兵法作事使可謂使事不為事使誠恐其知死而致力則雖有衆無所用之故曰同舟而遇風則胡越可使相救如左右手小人之心自知其負天下之怨而莫吾赦也則將日夜為計以備一旦卒然不可測之患反復説盡曲折今君子又從而疾惡之是以其謀不得不深其交不得不合交合而謀深則其致毒也忿戾而不可解故凡天下之患起於小人而成於君子之速之也小人在內君子在外君子為客小人為主主未發而客先焉則小人之詞直而君子之勢近於不順直則可以欺衆而不順則難以令其下説透故昔之舉事者常以中道而衆散以至於敗則其理豈不甚明哉若夫智者則不然內以自固其君子之交而厚集其勢外以陽浮而不逆於小人之意以待其間寬之使不吾疾狃之使不吾慮啖之以利以昏其智順適其意以殺其怒然後待其發而乘其隙推其墜而挽其絶故其用力也約而無後患莫為之先故君不怒而勢不逼如此者功成而天下安之此數行若非正大語然世降俗末欲善處小人之間而求辦天下之事恐未能廢此今夫小人急之則合寬之則散是從古以然也見利不能不爭見患不能不避無信不能不相詐無禮不能不相瀆是故其交易間其黨易破也而君子不務寬之以待其變而急之以合其交已過矣再説破小人易散之狀而君子者不可急之以合其交君子小人雜居而未決為君子之計者莫若深交而無為明白設策苟不深交而無為則小人倒持其柄而乘吾隙昔漢髙祖之亡以天下屬平勃及髙后臨朝擅王諸吕廢黜劉氏平日縱酒無一言及用陸賈計以千金交歡綘侯卒以此誅諸吕定劉氏單用事須甚切使此二人者而不相能則是將相相攻之不暇而何暇及於劉吕之存亡哉説著痛快故其説曰將相和調則士豫附士豫附則天下雖有變而權不分嗚呼知此其足以為大臣矣夫用事結簡捷相體論鄭莆陽大臣欲相其君大有為於天下者必自正其君心始何者心者將大有為之本也心正則天下之事無不可為者矣小人不待逐而去也政事不待更而修也心不先正今日逐一小人明日復用一小人今日修一政事明日復害一政事用力戛戛而勢愈疏矣假令其君能暫親君子逺小人屏私意立政事以與我戮力有為於一時他日之敗必自其心發之也傅説之相髙宗也其反復啓沃之端惟曰典於學耳方商之中衰髙宗之所以夢想良弼者固欲與共中興之業也説起版築之間謀不及此者蓋説之所恃與中興商家者髙宗之心也先之以學以正其有為之本則撻荆楚朝諸侯有天下者固已在説與髙宗二人規摹中矣管仲一見威公便許以霸業不數年九合諸侯一匡天下功烈非不偉也然仲不知正君之學以為肉腐於俎酒腐於觴不足害霸及威公之心一蠧則三姦擅國六嬖多寵齊敗掃地矣向來九合之功何益於救敗邪夫仲之所以先正於君心者度其君不能聽則功業齟齬而不立也然與其功業齟齬止於圖霸不成耳君心既蠧其禍豈止於不霸哉觀仲之速成而遽壞則知傅説之相業所從來逺矣戰國之世士益急於就功名獨孟子以格君心為已任以為一正君而國定君不嚮道而不志於仁而求為之富強是輔桀而富之也後世貶管仲最深者莫若孟子蓋學術之源殊也嗚呼傅説不作正君之事不復見孟軻既沒正君之學不得其傳後之君子雖有致君澤物之意而不探古人之本衷略者能以謀謨舉天下之事功而已然知求治而未知正君也直亮者能危言正論繩君之愆謬而已然知規過而未知養德也君不正治不可保也德不養過不可勝改也魏徵能使其君信力行仁義之説而不能救其晚節窮兵之失宋璟能使其君厲精以成開元之治而不能去其女寵奢侈之敗裴度能使其君果斷以成平蔡之功而不能止其貪利䁥小人之害夫太宗喜功好大之心即向者與徵力行之心也元宗荒於女寵奢侈之心即向者與璟厲精圖治之心也憲宗貪利無厭之心即向者與度果斷成功之心也心一爾曷為正於前遽變於後乎曰此非三宗之過也徵未死已有欲殺此翁之語則太宗好諫之心已敗於此矣璟猶居相位宇文融遽以言利幸則元宗侈心已萌於此矣度平蔡未歸李揆皇甫鏄已相則憲宗明斷已荒於此矣吾謂璟與度知求治而未知正君之過也徵知正君矣然知規過而未知養德之過也然則正君之術果如何哉邪正之機一也導人以邪者必委曲彌縫之然後陷於邪而不自知使其心果知邪之為非寧肯從吾於邪乎况強人以正者豈可以一趣而直入於正哉蓋嘗以易求之孟子而觀之正君之術焉坎之六四曰樽酒簋二用缶納約自牖釋者曰牖明處也言人臣欲以忠信善道牖納之君者必自其明處乃能入也人心有所蔽有所明就其明處而導之推而及於所蔽則自悟矣暌之六二曰遇主于巷釋者曰巷致曲之地言當睽之世君心未合直不可直致其意者當盡誠致曲使之信合也孟子因齊宣王不忍一牛之死遽以為是心可以合於王而語之王道者方其不忍殺一牛之時乃其仁心所發見也於此引而達之則油然生矣此納約自牖之義也宣王之自言其好貨好色之疾孟子不直折其所好乃就其所好而為之説也使之與民同者大捐色與貨與民同之則已之所好者必薄矣所以潛移其病根也此遇主于巷之義也大臣所以啓沃其君者豈止如諍臣徒強之於言語口舌哉惟因其所明而悟入之使得其天理之本然致曲而達之使漸入而不苦其難夫然故開之易悟誘之易入君心庶其正乎或曰古之帝王正心誠意之學先已得於上故君臣之間以都俞訓誥相與磨礱浸潤之耳後世人主生長於深宫所以害其心者非一朝一夕也豈遽得而正諸曰是心天理之所寓也使天理可滅邪則吾不知天理果不可滅豈終不可感悟以復其正邪特患吾所以正之之術有未至耳論相上誠齋聖人不能為天下求宰相而能為天下受宰相惟能受之是乃能求之歟知所以求之而不知所以受之則雖焦心側席而相不至搜岩剔藪而相不出夢卜物色而相不真蓋有出而至者矣其如不真何人主曰賢天下曰否人主曰忠天下曰邪人主曰才天下曰謬夫是之謂相不真是故一言而天下譁之一動而天下折之非天子悟而逐斯人則斯人慙而去之耳且夫一邑不可欺一令一郡不可欺一守而天下獨可欺一相哉聖人之求宰相初不求也非不求也不求者所以深求之也是故聽天下之自求其人而我無與焉其得之也蓋曰爾自求之爾自得之吾為爾用之焉耳其用之也則曰爾遺我以其人吾為爾相之矣其人欲去而天下不允則曰還爾相夫是之謂能為天下受宰相古之聖人惟其求而不求是以求而必得得而必任任而必久久而必成蓋得而必任而其人敢於盡任而必久故其功不敗於搖敢於盡而不敗於搖亦何事之不成哉而古之君子之相其君亦不敢犯天下之所不許天下不許而君許之君子有深藏逺遁以自脫天下之機而已昔者漢武帝相車千秋而取譏於胸奴魏文帝以賈詡為太尉而貽笑於孫權張昭薦李濤為宰相而周世宗薄其無大臣體夫能言天下不敢言之事而回人主不可回之疑有如千秋之賢乎䇿袁紹則取袁紹䇿馬超則取馬超有如詡之謀乎知張彥澤之必為晉患知周髙祖之必不為漢臣有如濤之先見乎而或以譏笑於敵國或以不取於其君古者人主之用相如此其難也楚以還子馮為令尹而子馮不食以避之晉以蔡謨為司徒而曰我為司徒後世必哂竟不拜唐李鄘為宦者引為相而鄘恥之竟不就職三君子之皆賢者也夫豈不堪於相而不欲富貴哉古者君子不輕以身相人如此其嚴也後之君子違天以利其身咈衆以欺其君不計其身之所有以僥其分之所無可謂不智乎及得其所無而天下皆責之以所有上以誤其國下以誤其身者皆是也可謂智乎陛下即位之初蓋嘗謀之國人而得賢相矣天下方以為賀而陛下以為疑非陛下疑之也姦臣有以啓陛下之疑也使陛下持之不堅天下恨之陛下悔之亦無及矣而近嵗以來每虛宰席以待其人天下聳而望曰其必有慰我既而麻制一傳則天下悱然誹之或曰此無聞之人也或曰此非君子或曰此何人而何以了此事故朝廷輕用之輕視之亦輕罷之其來不為朝廷重其去不為朝廷輕其進不為天下喜其退不為天下戚舜之於臯陶湯之於伊尹武王之於太公齊桓之於管仲蜀先主之於諸葛亮似不如此蓋陛下知為天下求宰相而不知為天下受宰相也故老相傳仁宗朝嘗闕宰相天下之望在於韓琦富弼故洛之人則曰我丞相三詔不起也相之人則曰我侍中屢詔不行也此天下之人自擇宰相以遺朝廷今天下豈無其人天下之望豈無所在陛下從其望之所在者而用之擇之在天下受之在聖主用而觀其效則久之此真天下之相也而獨擾擾然何也論相下誠齋臣聞天子之相必其人有以自恃而後其人為足恃蓋天下大器也有有此器者有負此器者天子者有此器者也宰相者負此器者也匹夫有百金之器則必擇其負擇其負故重其人夫惟重其人而後負之者輕其器蓋人可以勝器而器不可以勝人人勝器者全器勝人者顛舉天下之大而負之負之而不能堪挈之而不能舉事至而亂變起而驚且無以自恃而天子何恃焉古之大臣居天下之至安而不驕居天下之至危而不懾不勞談笑不動聲色而天下自定此其意非苟為不測之量虛為不懾之氣以鎮服物情而已其必有以自恃也恃在應應在裕夫敵國之相圖姦雄之相窺固輕發於吾之所窮而重發於吾之所裕夫惟先事而破其謀有事而出其不意發則應應則不窮天下安得而不定天子者得斯人而相之則天下可以髙枕而無足憂何則有足恃者也後之君子懦者既不足與有為而其勇者又往往得其所恃之似而無以實之蓋亦有所謂不勞談笑而不動聲色者矣然可與之居安而不可與之居危可與之守常而不可與之應變此其中無應變之機而其外示鎮服之度故無事則若不可測而有事則敗矣故夫古之相其君而當天下之變者蓋有鎮物以破敵者矣有同乎鎮物而不同乎破敵者焉有推誠以解紛者矣有同乎推誠而不同乎解紛者焉有示強以止亂者矣有同乎示強而不同乎止亂者焉謝安遨遊飲博以當苻堅房琯彈琴清談以當安史此同乎鎮物也然淝水大勝而陳濤大敗何也人不同也蓋安有謝玄而琯有劉秩此其所以不同於破敵歟郭子儀單騎而入回紇張延賞亦使渾瑊撤備以盟吐蕃此同乎推誠也然回紇拜子儀而唐以安吐蕃幾擒瑊而德宗欲出避何也情不同也蓋回紇之冦子儀知其情之不得已故變冦以為盟吐蕃之盟延賞不知其情之欲圖唐故變盟而為冦此其所以不同於解紛歟裴度答朱克融以兵匠速來之語景延廣答契丹以橫磨大劒之語此同乎示強也然克融卒不敢動而契丹遂滅晉何也勢不同也蓋以克融之犯唐則以臣而叛君以晉而怒契丹則背惠而立怨此其所以不同於止亂歟當天下之變而決天下之機不可以一法應也得其一法而不得其不一之法未有不敗事者方晉之未捷謝安與王衍何以異而陳濤之未敗平涼之未變契丹之未動所謂房琯者延賞者景延廣者誰不以為謝安子儀裴度復出也哉蓋應變之難如此今強虜盜有中原之半者四十年矣自逆亮之斃其君臣日夜伺吾之隙而求吾之便又五六年矣此何等時耶然無事則玩而不戚有事則驚而失措不知朝廷所恃以應變者何人耶豈其以天下之大而空無一人之足恃上之人獨得而不憂也然則將以求謝安子儀裴度之才何從而得之夫子曰如有所譽者其有所試人之能不能雖聖人不能逆知之其能知之者以其試之也然才可試而變不可試臨變而試才者垂死而試醫者也古之聖人惟能擇天下甚難之事以試天下之才故一旦有急而不亂則試之者熟而儲之者素也嘗聞冦凖以小臣言事而為太宗之所知太宗屢以事密詢於凖已知其有宰相之才當是之時天下承平豈有他變其何事於凖哉其後真宗澶淵之役獨決親征之議對敵髙卧天子恃之以為無恐諸將恃之以成大功者乃前日太宗所密詢之人也今宰相之才無事而不求不試裘而不絺明年何衣稻而不麥明年何食臣實憂之古文集成卷三十二
