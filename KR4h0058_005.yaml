body:
  text: 古文集成卷五宋王霆震編前甲集五序送王陶序論易歐陽文忠公東萊批凡文字用易象多失之陳此篇使得疏通不陳窒塞處能通疏六經皆載聖人之道而易著聖人之用吉凶得失動靜進退易之事也其所以為之用者剛與柔也乾健坤順剛柔之大用也精神大體至於八卦之變六爻之錯變錯二字引下來剛與柔迭居其位而吉亨利無咎凶厲悔吝之象生焉蓋剛為陽為德為君子自此鋪叙間架去好說剛柔體分拆開便狀柔為隂為險為小人自乾之初九為姤而上至於剝其卦五皆隂剝陽之卦也㸃化流通小人之道長君子靜以退之時也自坤之初六為復而上至於夬其卦五皆剛决柔之卦也小人之道消君子動以進而用事之時也應後夫剛之為德君子之常用也已說不好且說剛好處庇民利物功莫大焉其為卦遇泰之三而四為大壯五為夬下字好語新壯者壯也夬者决也四陽雖盛而猶有二隂然陽衆而隂寡則可用壯以攻之故其卦為壯五陽而一隂隂不足為直可决之而已故其卦為夬然則君子之用其剛也審其力視其時關上意一篇意結在此二句上知隂險小人之必可去然後以壯而决之夫勇者可犯也强者可詘也轉換好不敢用剛聖人於壯决之用必有戒焉故大壯之彖辭曰大壯利貞其象辭曰君子非禮勿履夬之彖辭曰健而說决而和其象辭曰居德則忌以明夫剛之不可獨任也故復始而亨總說見剛有漸漸方得臨浸而長泰交而壯繳應得好以衆攻其寡夫乘其衰而决之夫君子之用其剛也有漸而不失其時又不獨任必以正禮以說以和而濟之則功可成應前若不說一句在此與前面都不相連此君子動以進而用事之方也此篇自頭來盡結在此數句上簡而有力應前視其初一句簡文法太原王陶字樂道好剛之士也常嫉世隂險之小人多居京師不妄與人逰力學好古以自信自守今其初仕於易得君子動以進之象應入易句為主故豫為剛說以贈之大壯之初九曰壯于趾征凶夬之初九亦曰壯于趾往不勝為咎使兩卦初事的當為初時事說見親切處以此見聖人之戒用剛也不獨於其彖象而又常深戒於其初在前見文字緊處嗚呼世之君子少而小人多君之力學好剛以蓄其志未始施之於事也蓄字見不敢用剛意今其往尤宜慎乎其初結最有力依前結歸初字易序伊川易之為書伏羲始作八卦文王因而重之孔子繫之以辭於是卦爻彖象之義備而天地萬物之情見聖人之憂天下來世其至矣先天下而開其物後天下而成其務是故極其數以定天下之象著其象以定天下之吉凶六十四卦三百八十四爻皆所以順性命之理盡變化之道也散之在理則有萬殊統之在道則無二致所以易有太極是生兩儀太極者道也兩儀者隂陽也隂陽一道也太極無極也萬物之生負隂而抱陽莫不有太極莫不有兩儀絪緼交感變化不窮形一受其生神一發其知情僞出焉萬緒起焉易所以定吉凶而生大業也故易者隂陽之道也卦者隂陽之物也爻者隂陽之動也卦雖不同所同者竒耦爻雖不同所同者九六是以六十四卦為其體三百八十四爻互為其用逺在六合之外近在一身之中暫於瞬息微於動靜莫不有卦之象焉莫不有爻之義焉至哉易乎其道至大而無不包其用至神而無不存時固未始有一而卦未始有定象事固未始有窮而爻亦未始有定位以一時而索卦則拘於無變非易也以一事而明爻則窒而不通非易也知所謂卦爻彖象之義而不知所謂卦爻彖象之用亦非易也故得之於精神之運心術之動與天地合其德與日月合其明與四時合其序與鬼神合其吉凶然後可以謂之知易也雖然易之有卦易之已形者也卦之有爻卦之已見者也已形已見者可以言知未形未見者不可以名求則所謂易者果何如哉此學者所當知也易傳序伊川易變易也隨時變易以從道也其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下蓋無傳矣豫生千載之後悼斯文之湮晦將俾後人沿流而求源此傳所以作也易有聖人之道四焉以言者尚其辭以動者尚其變以制器尚其象以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不達其意者有矣未有不得於辭而能通其意者也至微者理也至著者象也體用一源顯微無間觀㑹通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也豫所傳者辭也由辭以得意則在乎人焉易傳序誠齊易者何也易之為言變也易者聖人通變之書也何謂變蓋隂陽太極之變也五行隂陽之變也人與萬物五行之變也萬事與人萬物之變也古初以迄于今萬事之變未已也其作也一得一失而其究也一治一亂聖人憂焉幽觀其變湛思其通而逆紬其圗易之所以作也易之為言變也故易者聖人通變之書也其窮理盡性其正心修身其齊家治國其處顯其傃窮其居常其遭變其參天地合鬼神萬事之變方來而變通之道先立變在彼變變在此得其道者蚩可哲慝可淑眚可福危可安亂可治致身聖賢而躋世泰和猶反手也斯道何道也中正而已矣唯中為能中天下之不中唯正為能正天下之不正中正立而萬變通此二帝三王之聖治孔子顔孟之聖學也後世或以事物之變為不足以攖吾心舉而捐之於空虛者是亂天下者也不然以為不足以遁吾術挈而持之以權譎者是愈亂天下者也然則學者將欲通變於何求通曰道於何求道曰中於何求中曰正於何求正曰易於何求易曰心愚老矣嘗試與二三子講之二三子以為愚之言乎非也愚聞諸先儒先儒聞諸三聖三聖聞諸天易傳後序誠齊六經至夫子而大備然書非夫子作也定之而已耳詩非夫子作也刪之而已耳禮樂非夫子作也正之而已耳惟易與春秋所謂夫子之文章者歟昔者伏羲作易矣時則有其畫無其辭文王重易矣時則有卦辭無餘辭至吾夫子特起乎兩聖之後而超出乎兩聖之先發天之藏拓聖之疆挹彼三才之道而注之於三絶之簡於是作彖辭作象辭又作小象之辭又作文言之辭又作二繫之辭又作說卦之辭又作序卦之辭又作雜卦之辭大之為天地纎之為毫末顯之為人物幽之為鬼神明之為仁義禮樂微之為性命炳然蔚然聚此書矣其辭精以幽其㫖淵以長其道溥以崇是書也其緼道之玊府陶聖之大鈞也歟季札聘魯見易象而喜曰周禮盡在魯矣當是時豈易之書唯魯有之歟抑諸國皆有而吳未有歟宜其見之而喜也然札之所見者羲文之易而已未見夫子之易也見羲文之易其喜已如此使見夫子之易其喜又當何如哉今乃得見季札之所未見嗚呼後之學者一何幸也子貢在三千七十之中其科在乙其名在六其不在升堂入室之間乎然嘗嘆夫子之言性與天道不可得而聞夫子之易書非性與天道之言乎而子貢獨不得聞者豈嘆之之時此書未作歟抑已作而未出歟今乃得聞子貢之所不得聞嗚呼後之學者又何幸也學者每謂聞而知不若見而知蓋聞者疏見者親聞者略見者詳也觀子貢之嘆則見而知者反不若聞而知者歟然則學者之羡子貢又安知子貢之不羡學者也嗚呼後之學者又何幸也中庸章句序晦庵中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也蓋嘗論之心之虛靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之傳若吾夫子則雖不得其位而所以繼往聖開來學其功反有賢於堯舜者然當是時見而知之者惟顔氏曾氏之傳得其宗及曾氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其說之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歷選前聖之書所以提挈綱維開示緼奧未有若是其明且盡者也自是而又再傳以得孟氏為能推明是書以承先聖之統及其沒而遂失其傳焉則吾道之所寄不越乎言語文字之間而異端之說日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不泯故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其說而得其心也惜乎其所以為說者不傳而凡石氏之所輯録僅出於其門人之所記是以大義雖明而微言未析至其門人所自為說則雖頗詳盡而多所發明然倍其師說而淫於老佛者亦有之矣熹自蚤嵗即嘗受讀而竊疑之沈潜反覆蓋亦有年一旦恍然似有以得其要領者然後乃敢㑹衆說而折其中既為定著章句一篇以俟後之君子而一二同志復取石氏書刪其繁亂名以輯略且記所嘗論辨取舍之意别為或問以附其後然後此書之㫖支分節解脈絡貫通詳略相因巨細畢舉而凡諸說之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然初學之士或有取焉則亦庶乎行逺升髙之一助云爾中庸集解序晦庵嘗竊謂秦漢以來聖學不傳儒者惟知章句訓詁之為事而不知復求聖人之意以明夫性命道德之歸至於近世先知先覺之士始發明之則學者既有以知夫前日之為陋矣然或乃徒誦其言以為髙而又初不知深求其意甚者遂至於脫略章句陵籍訓詁坐談空妙展轉相迷而其為患反有甚於前日之為陋者嗚呼是豈古昔聖賢相傳之本意與夫近世先生君子之所以望於後人者哉熹誠不敏私竊懼焉故因子重之書特以此書題其篇首以告夫同志之讀此書者使之毋跂於髙毋駭於竒必沈潜乎章句文義之間以㑹其歸必戒懼乎不睹不聞之中以踐其實庶乎優柔饜飫真積力久而於博厚髙明悠久之域忽不自知其至焉則為有以真得其傳而無徒誦坐談之弊矣兼山中庸說序南軒萬理歸於一者也萬事本於經者也萬變統於元者也萬物成於性者也天德不明則萬理喪其歸萬事紊其經萬變錯其統萬物失其性而天地之化或幾乎息矣中庸之書蓋以明夫天德極體用之妙措之天下而與天地並行者也中庸之學不傳久矣而傳於本朝之程氏之門人雖其所造有淺深要其本盩於正者鮮矣栻之所藏有侯氏楊氏游氏之書近又得兼山郭氏所述於其姪孫見義觀其言有曰道無乎不在也神無乎不為也知無乎不在我則不廢天下之事而求其道之大原知無乎不為我則不廢天下之務而求其神之妙用學者試以是思之大學章句序晦庵大學之書古之大學所以教人之法也蓋自天降生民則既莫不與之以仁義禮智之性矣然其氣質之禀或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿智能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性此伏羲神農黃帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法寖備然後王宫國都以及閭巷莫不有學人生八嵗則自王公以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修已治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俯焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀內則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而內有以盡其節目之詳者也三千之徒蓋莫不聞其說而曾氏之傳獨得其宗於是作為傳義以發其意及孟子沒而其傳泯焉則其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學而無用異端虛無寂滅之教其髙過於大學而無實其他權謀術數一切以就功名之說與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子不幸而不得聞大道之要其小人不幸而不得䝉至治之澤晦盲否塞反覆沈痼以及五季之衰而壞亂極矣天運循環無往不復宋德隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦切附已意補其闕略以俟後之君子極知僣踰無所逃罪然於國家化民成俗之意學者修已治人之方則未必無小補云禮序伊川禮經三百威儀三千皆出於性非僞貌飾情也鄙夫野人卒然加敬逡巡遜郤而不敢受三尺童子拱而趨市暴夫悍卒莫敢狎焉彼非素習於教與邀譽於人而然也蓋其所有於性物感而出者如此故天尊地卑禮固立矣類聚羣分禮固行矣人者位乎天地之間立乎萬物之上天地與吾同體萬物與吾同氣尊卑分類不設而彰聖人循此制為冠昏喪祭朝聘射饗之禮以行君臣父子兄弟夫婦朋友之義其形而下者具於飲食器服之用其形而上者極於無聲無臭之微衆人勉之賢人行之聖人由之故所以行其身與其家與其國與其天下禮治則治禮亂則亂禮存則存禮亡則亡上自古始下逮五季質文不同罔不由是然而世有損益惟周為備是以夫子嘗曰郁郁乎文哉吾從周逮其弊也忠義之薄而情文之繁林放有禮本之問而孔子欲先進之從蓋所以矯正反弊也然豈禮之過哉為禮者之過也秦氏焚滅典籍三代禮文大壞漢興購書禮記四十九篇雜出諸儒傳記不能悉得聖人之㫖考其文義時有抵牾然而其文繁其義博學者觀之如適大通之肆珠珍器帛隨其所取如遊阿房之宫千門萬户隨其所入博而約之亦可以弗畔蓋其說也粗在應對進退之間而精在道德性命之要始於童幼之習而終於聖人之歸惟達於道者然後能知其言能知其言然後能得於禮然則禮之所以為禮其則不逺矣昔者顔子之所從事不出乎視聽言動之間而鄉黨之記孔子多在於動容周旋之際此學者所當致疑以思致思以達也詩集傳序晦庵或有問於余曰詩何為而作也余應之曰人生而靜天之性也感於物而動性之欲也夫既有欲矣則不能無思既有思矣則不能無言既有言矣則言之所不能盡而發於咨嗟詠歎之餘者必有自然之音響節奏而不能已焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下達於鄉黨閭巷其言粹然無不出於正者聖人固已協之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子巡守亦必陳而觀之以行黜陟之典降自昭穆而後寖以陵夷至於東遷而遂廢不講矣孔子生於其時既不得位無以行帝王勸懲黜陟之政於是特舉其籍而討論之去其重復正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久逺使夫學者即是而有以考其得失善者師之而惡者改焉是以其政雖不足行於一時而其教實被於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也惟周南召南親被文王之化以成德而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而莊其義寬而密其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意猶非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之情性隱微之間審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣問者唯唯而退余時方輯詩傳因悉次是語以冠其篇云古文集成卷五
