body:
  text: 古文集成巻二十九宋王霆震編前丁集八劄論遣使劄子胡致堂迂齋云根本經誼曉暢事情毅然有不可奪之色臣竊聞遣使臣入雲中已有定議臣愚陋䝉陛下擢寘從班職在獻納雖小事失當猶合上聞況遣使體大縱使初不預議苟心有所未安豈敢緘黙輙形論奏伏望陛下留神省察昔孔子作春秋以示萬世人君南面之術無不備載而其大要則在父子君臣之義而已魯桓公為齊所殺魯之臣子於齊有不共戴天之讎而莊公者乃桓公之子也非特不能為父雪恥又與齊通好元年為齊主王姬四年及齊狩于禚五年會齊同伐衞八年及齊同圍郕九年及齊盟于蔇是年為齊納子糾仲尼惡之備書于䇿以著其釋怨通和之罪魯莊惟忘父子君臣之義也魯之臣子則而象之故公子牙弑械成於前慶父無君動於後卜齮圉人犖之刃交發於黨氏武闈之間魯之宗祀不絶如綫此釋怨通和之效也豈非為後世之永鑒乎金人者驚動陵寢戕毁宗廟劫質二帝塗炭祖宗之民乃陛下之讎也頃者誤國之臣自知其才術不足以勘定禍亂而又貪慕富貴是故譸張為幻遣使求和以苟嵗月九年于此其效如何彼之一身叨竊爵位而去曽何足道而於陛下聖徳國家大計則虧䘮多矣所幸陛下勇智日躋灼然獨見於邪言乆惑之後奉將天討罪狀豫賊再安國歩漸圖恢復天下忠臣義士聞風興起各思自效以佐丕烈譬如人行萬里登車出門又如支梧厦屋初正基柱存亡治亂實係此時今乃無故蹈庸臣之轍踐阽國之址犯孔子之戒應前循魯莊之事忘復讎之義陳自辱之辭臣竊為陛下不取也或謂不若是少有貶屈其如二帝何臣應之曰自建炎丁未以至甲寅所為卑辭厚禮以問安迎請為名而遣使者不知幾人矣知二帝所在者誰歟見二帝之面者誰歟聞二帝之言者誰歟得金人之要領者誰歟因講和而能息敵兵者誰歟臣但見丙午而後通和之使歸未息肩而黄河長淮大江相次失險矣臣但聞去年冬使者還言將帥帖服國勢奠安形于奏章傳播逺近曽未數月而劉豫挾敵稱兵犯順矣金人者知中國所重在二帝中國所恨在劫質知中國所畏在用兵則常示欲和之端增吾所重平吾所恨匿吾所畏而中國坐受此餌旣乆而後悟也天下其謂自是改圖必矣何為復出此謬計耶苟曰姑為是爾則豈有修書稱臣厚費金幣而成就一姑為之事也苟曰以二帝之故不得不然則前效可考矣況嵗月益乆敵情益閟必無可通之理也臣嘗思之陛下與金人絶則臣下無所得而人主為義舉若通和則利歸臣下而人主受其惡故凡願奉使通和者皆身謀非國計也陛下何不據孔子之論而决此䇿乎自王安石廢黜春秋天下學士不知尊尚一旦亂臣賊子接跡乎四海幸遇陛下篤信此書孔子之志將仲於今日便當攷筆削之意斷當今之事只行一二大者陛下美名輝映千古矣當今之事莫大於靖康之怨也欲紓此怨必殄此讎則用此之人而不用講和之臣行此之政而不修講和之事使士大夫三軍百姓皆知金人為不共戴天之讎人人有致死于金人之志百無一還之心然後二聖之怨有可平之日陛下為人子之職舉臣等駑下伸眉吐氣食息世間亦預榮矣苟為不然以中國萬乗之君而稱臣於外人則宰相而下皆其陪臣也借使金人欣然講解以一將軍將數萬衆駐兵泗水之上學張儀約從文字願與陛下面相結約㰱盟而退不知陛下何以待之則又欲變置吾之大臣分部吾之兵將割我之地土而取其租賦有一于此其能從之乎從之則無以立國不從則隳敗和好將何據而可臣實戇昩思之不通是以略具古義凂瀆聰聴惟陛下試加采擇或合聖意即以世讎當復無可通和之義明降指揮寢罷奉使之命刻印銷印俄頃之間初無害於明適足以彰陛下好謀能聴之美免累聖徳誤國大計再論遣使劄子胡致堂迂齋云說利害明切却是就理上見得如此臣竊聞宰相張浚有論使事為兵家機權與臣所論事理不同今何蘚遂行不可救止臣待罪侍從初有所陳已荷聖知今浚以輔國謀臣陛下之所改顔而禮貌之者也勢難以臣故以沮其議臣不當力論取勝徒成紛紛然臣再三思慮終未曉浚之說須至剖析聞於聰聴望陛下留神省覽姑且志之聖懷俟他日驗臣所計與浚孰忠孰否則使事之利害決矣今則未敢求直也粘罕總師二十餘年破大遼弱我宋雖無逺略亦精於用兵其所行事盡詭詐也今我之虚實彼豈不知尚須卑辭執謙然後足以驕其心示弱屈服然後足以平其怒乎此遣使之無益一也庚戌後不遣使敵兵亦不來及癸丑遣使則鈎引金使入國熟視而去曽不旋踵而淮南之警奏至矣此遣使之無益二也前我所遣四輩皆朝廷之選侍從之臣聞其入敵境晝夜驅遞略無禮節及見粘罕坐受欺紿怱怱而歸未嘗得其要領也而況何蘚一使臣其何能任覘國之事乎此遣使之無益三也昔富弼之使也以一言息南北百萬之兵可謂偉矣使歸行賞遷進官職弼方以中國未能用兵徒賴使人口舌下之為莫大之恥終不肯受其識度如此乃可辦國今奉使者首先論其私事祈求恩澤一一足意而後行所慮卑近與市井之人無異尚能明目張膽不辱君命乎此遣使之無益四也萬一金人臨以兵威肆其恐脅使人必不能就死則反以我之情告之是自敗也死生之際唯烈士不懼曽謂何蘚而能之乎此遣使之無益五也金人之所大欲者誰不知之旣有無厭之心正使劉豫明日就亡今日亦必赴救而況豫賊祈哀乞援秋髙草熟來㓂何疑此不待窺覘自可坐照於一堂之上也此遣使之無益六也今淮以北劉豫自以為其封疆矣河之北粘罕自以為其土宇矣使者之行豈能乗雲馭風徑至朔庭哉必渡清河之阻經濁河之限然後能至也去冬下詔罪狀劉豫明其為賊今豫肯賔吾使人達之於金哉臣恐戌伐凡伯則有之矣此遣使之無益七也今我與金人勢如兩家有沒世之怨一弱一强强者侵陵不休弱者必固其門墉嚴其戒備待時而動庶能有濟乃欲命一僕夫啗以酒肉悅以金帛適足以重吾之弱増彼之强而已此遣使之無益八也自古兵强馬衆玩武不戢而無自焚之變者此朔方英傑勒曜垂珪之所難也尼堪生於幽朔幼習戰攻特騎將鬬將耳非有保國永世兼并天下之術也度其勁兵壯者老老者死其馬之齒日已長矣其謀臣志滿意得況酣乎子女玉帛之間不越數年必有禍敗此易見也萬一今冬黨助豫賊昧於一來陛下申嚴將士據大江之險以禦之彼再而衰三而竭必矣小小勝負兵家之常今未有兵交之形而遽自納侮以示畏恐情見力屈當反為所乘非兵家形格勢禁之法此遣使之無益九也夫和人之心學從人衡人句法迎合粘罕之意為身謀而已陛下寤寐賢才日昃不倦菲衣節食卑宫室陋器用以養戰士固將為父兄攄覆載不同之憤雪滄溟不滌之恥也若堅用和䇿則謀臣解體義士䘮氣將帥偷安而卒伍泮散以為無復有輸忠效智建立功名之日使和人自謂其說可用如此必有進為之漸以國與人取悅粘罕大事去矣此遣使之無益十也獨有一說使陛下難處者以二帝為言耳然自建炎改元以來使命屢遣無一人能知兩宫起居之狀謦欬之音者況今嵗月益乆敵必重閟惟懼我知之今以金為父兄之讎絶不復通則名正而事順他日或有異聞在我理直易為處置若通而不絶則彼握重柄歸曲於我名實俱䘮非陛下之利也使或有知二帝所在一見慈顔宣達陛下孝思之念雖嵗一遣使竭天下之力以將之亦何不可之有其如艱梗悠邈必無可達之理乎以此揆之則以二帝為言者理不難處也臣聞善為國者必有一定不可易之計正其大義不僥倖以為之漢髙祖出闗得董公之謀以弑君討項羽後雖屢敗然項羽負不義之罪雖彊必弱漢守其䇿不變終有天下然張良嶢闗之舉養虎之喻君子猶羞道之及劉先主諸葛武侯志在復漢目操為賊亦能三分鼎立魏延出竒欲速孔明不求近功君子以為真以天下自任者古之英雄規模注措大抵如此三國崛起曹氏先據利勢蜀最後立豈以微弱之故卑下於操以苟存耶孟子曰君如彼何哉彊為善而已今日大計只合明復讎之義用賢才修政事息民訓兵以俟北向更無他䇿倘或未可惟是堅守若夫二三其徳無一定之論必恐不能有為至於何蘚之行非特無效決須取辱臣所見如此豈得以張浚有言而自抑也古文集成巻二十九
