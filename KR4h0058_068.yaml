body:
  text: 古文集成卷六十八宋王霆震編前壬集七原原道朱文公校昌黎集補注云山谷嘗曰文章必謹布置每見學者多告以原道命意曲折又云石守道曰孔子之易春秋自聖人以來未有也吏部原道原人原毁行難禹問佛骨表諫臣論自諸子以來未有也西山先生批云程正公曰退之晚年為文所得處甚多學本是修德有德然後有言退之因學文日求其所未至遂有所得如云軻死不得其傳似此言語非蹈襲前人非鑿空撰出必有所見若無所得不知言所傳者何事又曰韓愈亦近世豪傑之士如原道中語言雖有病然自孟子以後能將許大見識尋求者才見此人又曰孟子而後却只有原道一篇大意儘近理又曰原道云孟氏醇乎醇又曰荀揚擇不精語不詳若不是見得豈千餘年後便能斷得如此分明也又曰韓文不可漫觀晚年所見尤髙朱文公曰自古罕有人說得端的惟退之原道庶幾近之或問揚子韓子優劣曰各有長處韓公見得大意已分明如原道不易得也揚子之學似本於老氏如清淨淵默之語皆是韓公綱領正却無他近老氏底說話又曰原道中說得仁義道德極好問定名虛位之說如何曰恐未必便如此然謂如此亦無害蓋此仁也此義也固是總名此仁之道仁之德義之道義之德則道德乃總名乃虛位也須要知他此語為老子說老氏謂失道而後德失德而後仁失仁而後義失義而後禮所以原道云吾之所謂道德合仁與義言之也須知此意方看得程朱二先生有取於原道者如此惟發端二語則程子嘗曰仁是性愛是情豈可專以愛為仁退之言博愛之謂仁非也仁者固博愛然便以愛為仁則不可而朱子亦曰韓愈云云是指情為性又曰仁義皆當以體言若曰博愛曰行而宜之則皆用矣又曰以博愛為仁則未博愛之前將非仁乎問由是而之焉之謂道曰此是說行底非是說道體問足乎已無待於外之謂德曰此是說行道而有得於身者非是說自然得之於天者也學者即二先生之說而參玩之則此篇大指瞭然於胸中矣詩眼云山谷每言文章必謹布置布置必得正體如官府甲第廳堂房室各有定處不可亂也韓文公原道與書之堯典蓋如此其他皆謂之變體可也譬如山林園圃各有首尾前後至於以正為變以變為正以首為尾以尾為首臨時變化妙用無方如行雲流水初無定質出於精微奪乎天造是又難以形器求矣然要以正體為本自然法度行乎其間譬如用兵竒正相生若初不知正而徑出於竒則紛然無復紀綱終於敗亂而已矣原道仁義立意而道德從之故老子捨仁義則非所謂道德也其言仁義也豈不既大矣乎乃叙異端之汨正道又歷叙古之聖人不得不用仁義以治天下也如此佛老捨仁義則不足以治天下如彼反覆皆數疊既而復結之以治天下中庸之道言堯舜禹湯文武相傳之仁義非吾胸臆之論也終之以人其人火其書必以是禁止而後可以行仁義於是乎成篇迂齊批詞嚴義正攻擊佛老有開闔縱橫文字如引繩貫珠全篇依東萊批注全篇增迂齊批㸃博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德散起仁與義為定名道與德為虛位總結故道有君子有小人而德有凶有吉樓曰見得是虛位老子之小仁義非毁之也其見者小也老子病原坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜吕曰綱目一篇之意其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也史本傳老子乃著書上下篇言道德之意五千餘言周道衰孔子沒異端之行有所自火于秦史始皇紀李斯請史官非秦記悉燒之天下敢有藏詩書百家語者悉詣守尉雜燒之黃老于漢曹參傳聞膠西有蓋公善治黃老言使人厚幣請之蓋公言治道貴清靜而民自定於是避正堂舍蓋公焉其治要用黃老術又儒林傳孝景不任儒竇太后又好黃老術汲黯傳黯學黃老言治官民好清靜佛于晉宋齊梁魏隋之間其言道德仁義者不入于楊則入于墨孟子序異端並起若楊朱墨翟放蕩之言不入于墨則入于老不入于老則入于佛入于彼必出于此入者主之出者奴之入者附之出者汚之此處說人從異端噫後之人其欲聞仁義道德之說孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也呂曰從異端之病原也亦曰吾師亦嘗師之云爾不惟舉之於其口而又筆之於其書家語觀周篇孔子謂南宫敬叔曰吾聞老聃博古知今通禮樂之原明道德之歸則吾師也今將往矣問禮於老聃噫後之人雖欲聞仁義道德之說其孰從而求之甚矣人之好怪也吕曰接有力不求其端不訊其末惟怪之欲聞古之為民者四左成元年古者有四民士商農工今之為民者六吕曰併佛老而為六也樓曰古今並說添了佛老古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六吕曰用得新警䇿奈之何民不窮且盜也古之時樓曰說古人之害多矣有聖人者立吕曰一句生文然後教之以相生養之道為之君為之師吕曰眼目聖人治天下有條理驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其天死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠倦吕曰與倦同疲也懈也莊子學道不倦為之刑以鋤其强梗相欺也吕曰轉文好為之符璽斗斛權衡以信之相奪也吕曰轉文好為之城郭兵甲以守之害至而為之備患生而為之防樓曰看他連下十四個為字今其言曰樓曰再說佛老聖人不死大盜不止剖斗折衡而民不爭樓曰此佛老之說吕曰反覆論莊胠篋篇夫川竭而谷虛丘夷而淵實聖人已死則大盜不起天下平而無故矣聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽而信之則并與符璽而竊之為之仁義以矯之則并與仁義而竊之故絶聖棄智大盜乃止擲玉毁珠小盜不起焚符破璽而民朴鄙剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人樓曰再起人之類滅久矣吕曰一假之相應何也無羽毛鱗介以居寒熱也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米絲麻作器皿通貨財以事其上者也君不出令則失其所以為君臣不能行君之令而致之民則失其所以為臣民不出粟米絲麻作器皿通貨財以事其上則誅吕曰說佛老不可行之意今其法曰樓曰亦佛老之說必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者吕曰又說佛老所以不可行之意嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也吕曰健而有力意外意關鍵帝之與王其號名雖殊其所以為聖一也夏葛而冬裘渴飲而飢食其事雖殊其所以為智一也今其言曰樓曰又是佛老之說曷不為太古之無事樓曰攻擊佛老是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傳曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意大學然則古之所謂正心而誠意者將以有為也今也樓曰說佛老欲治其心而外國家天下滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之左僖二十七年春杞桓公來朝用夷禮故曰子夷而進於中國則中國之穀梁文九年楚子使荻來聘楚無大夫其曰荻何也以其來我褒之也經曰夷狄之有君不如諸夏之亡八佾詩曰戎狄是膺荆舒是懲閟宫吕曰引證有力今也舉夷狄之法而加之先王之教之上樓曰應在後幾何其不胥而為夷也吕曰收歸夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德吕曰反覆應前面說樓曰與前面許多說話相應此是作文法其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服麻絲其居宫室其食粟米果蔬魚肉其為道易明而其為教易行也是故以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也吕曰關鍵鎖盡一篇之意堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉吕曰流暢承上幾句有力一篇精神在此荀與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其說長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居樓曰又言所以去異端之術明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也吕曰言語下得好主意又見於此原性昌黎性原一作斆齊批此篇論性之品有三孟荀揚之說皆舉其中而遺其上下全篇斆齊批㸃性也者與生俱生也情也者接於物而生也雙關說起性之品有三而其所以為性者五下明性情之異情之品有三而其所以為情者七曰一無曰字何也問曰答性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一一無一字不少有焉則少反一作及焉其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其一作於中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善引三說證荀子之言性曰人之性惡見本篇揚子之言性曰人之性善惡混闕夫始善而進惡歟始惡而進善歟始也混而今也善惡歟辨難皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也引性惡三事辨其母視之知其必以賄死國語晉語叔魚生其母視之曰是虎目而豕喙鳶肩而牛腹溪壑可盈是不可饜也必以賄死遂不視楊食我之生也叔向之母聞其號也知必滅其宗食音嗣左昭二十八年夏晉殺祁盈及楊食我遂滅祁氏羊舌氏初叔向娶申公巫臣氏生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視注楊叔向邑食我叔向子伯石也越椒之生也子文以為大一無大字戚知若敖氏之鬼不食也左宣四年楚左司馬子良生子越椒子文曰必殺之是子也熊虎之狀豺狼之聲弗殺必滅若敖氏矣子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而人之性果善乎辨性善說后稷之生也其母無災其始匍匐也則岐岐然嶷嶷然詩生民篇誕實匍匐克岐克嶷注云云文王之在母也母不憂既生也傅不勤既學也師不煩國語晉語文王在母不憂在傅弗勤處師弗煩人之性果惡乎堯之朱舜之均文王之管蔡辨善惡混說習非不善也而卒為姦史本紀瞽叟之舜鯀之禹習非不惡也而卒為聖人一無人字史本紀人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也責三子得其一而失其二者也曰然則性之上下者終不可移乎辨問曰應上之性就學而愈明下之性畏威而寡罪是故上者可學一作教而下者可制也發明學力其品則孔子謂不移也曰今之言性一作情字者異於此何也曰今之言者雜佛老而言也責後世雜佛老而言者奚言而不異原人昌黎斆齊批此篇論人者夷狄禽獸之主聖人一視而同仁東萊批增入形於上者謂之天鼎足立說形於下者謂之地命於其兩間者謂之人極好形於上日月星辰皆天也形於下草木山川皆地也命於其兩間辨析三說夷狄禽獸皆人也曰然則辨論吾謂禽獸曰人可乎曰非也指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指山之一草而問焉曰山乎曰山則不可故天道亂而日月星辰不得其行反說地道亂而草木山川不得其平人道亂而夷狄禽獸不得其情天者日月星辰之主也正說地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺吕曰結得極好原毁昌黎斆齊批此篇論古之君子責已重以周後世怠者不能修忌者畏人修迂齊批曲盡人情古之君子其責已也重以周斆齊曰立二說起其待人也輕以約重以周故不怠斆齊曰應上迂齊曰繳上兩句輕以約故人樂為善聞古之人有舜者斆齊曰引舜證其為人也仁義人也孟離婁下求其所以為舜者責於已曰彼人也豫人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者聞古之人有周公者斆齊曰引周公證其為人也多才與藝人也書金縢求其所以為周公者責於已曰彼人也豫人也彼能是而我乃不能是早夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉迂齊曰便含重以周意了是人也乃曰不如舜不如周公吾之病也是不亦責於已者重以周乎其於人也斆齊曰證下句曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責一作取其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣是不亦待於人者輕以約乎今之君子斆齊曰貶後世則不然趙本無此三字其責人也詳迂齊曰詳者輕約之反其待已也亷迂齊曰亷者周重之反詳故人難於為善亷故自取也少已未有善曰我善是是亦足矣已未有能曰我能是是亦足矣外以欺於人內以欺於心未少有得而止矣是不亦待於已者已亷乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是之一無之字謂不以衆人待其身斆齊曰繳上意而以聖人望於人吾未見其尊已也雖然為是者有本有原怠與忌之謂也迂齊曰怠與忌雖不同只是一般病原怠者不能修而忌者畏人修吾嘗試之矣嘗試語於衆曰某良士某良士斆齊曰正說其應者必其人之與也不然則其所疏逺不與同其利者也不然則其畏也不若是彊者必怒於言懦者必怒於色矣又嘗語於衆曰某非良士某非良士斆齊曰反說其不應者必其人之與也不然則其所疏逺不與同其利者也不然則其畏也不若是彊者必說於言懦者必說於色矣是故事修而謗興德髙而毁來嗚呼士之處此世斆齊曰發明本意而望名譽之光道德之行難矣將有仕一作化於上者得吾說而存之其國家可幾而理也古文集成卷六十八
