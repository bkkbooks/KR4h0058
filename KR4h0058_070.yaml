  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0058_WYG_070-1a, image: WYG1359/WYG1359-0487a.png}
body:
  text: 古文集成巻七十宋王霆震編前癸集一辭秋風辭并序漢武帝休齋曰詩變而騷騷變而為辭皆可歌也詞則兼詩騷之聲而尤簡邃焉者漢武帝因祠后土於汾隂作秋風辭一章凡三易韻其節短其聲哀此詞之權輿乎上行幸河東祠后土顧視帝京欣然中流與羣臣飲燕上歡甚乃自作秋風辭曰秋風起兮白雲飛草木黄落兮雁南歸蘭有秀兮菊有芳懐佳人兮不能忘濟曰佳人謂羣臣也休齋曰此三韻一叶泛樓船兮濟汾河横中流兮揚素波簫皷鳴兮發棹歌歡樂極兮哀情多少壯幾時兮奈老何休齋曰六韻一叶錯雜成章亦楚詞之體也連昌宫辭元稹東萊先生集註連昌宫中滿宫竹歳久無人森似束又有牆頭千葉桃風動落花紅簌簌宫邊老人為余泣小年選進因曽入上皇正在望仙樓太真同凭欄干立貴妃召内禁中號太真樓上樓前盡珠翠炫轉熒煌照天地歸來如夢復如癡何暇備言宫裏事初過寒食一百六荆楚歳時記去冬至百五日即有疾風甚雨謂之寒食節店舍無煙宫樹緑夜半月髙絃索鳴賀老琵琶定場屋力士傳呼覔念奴開元天寳遺事念奴者善歌唱未嘗一日離左右每執板當席顧盼左右帝謂妃子此女妖麗色媚人每轉聲歌喉則聲出於朝霞之上雖鐘鼓笙竽嘈雜而莫能遏念奴潜伴諸郎宿須臾覔得又連催特勑街中許燃燭春嬌滿眼睡紅綃掠削雲鬟旋裝束飛上九天歌一聲二十五郎吹管逐逡廵大徧梁州徹曲名色色龜兹音丘慈轟録續畨樂名李謩擪笛傍宫牆偷得新畨數般曲平明大駕發行宫明皇次蜀郡萬人鼔舞途路中百官隊仗避岐薛諸工楊氏諸姨車鬭風貴妃三姊帝呼為姨封韓虢秦國三夫人明年十月東都破御路猶存禄山過驅令供頓不敢藏萬姓無聲淚潜墮兩宫定後六七年肅宗即位於靈武尊皇帝曰太上皇却尋家舍行宫前莊園燒盡有枯井行宫門闥樹宛然爾後相傳六皇帝不到離宫門久閉徃來年少說長安𤣥武樓成花萼廢樓名去年勑使因斫竹偶值門開暫相逐荆榛櫛比塞池塘狐兔嬌癡縁樹木舞榭欹傾基尚存文牎窈窕紗猶緑塵埋粉壁舊花鈿烏啄風箏碎珠玉上皇偏愛臨砌花依然御榻臨堦斜虵出燕巢盤鬬栱菌生香案正當衙寢殿相連端正樓太真梳洗樓上頭晨光未出簾影黒至今反掛珊瑚鉤指似傍人因慟哭却出宫門淚相續自從此後還閉門夜夜狐狸上門屋我聞此語心骨悲太平誰致亂者誰翁言野父何分别耳聞眼見為君說姚崇宋璟作相公勸諌上皇言語切爕理隂陽禾黍豐調和中外無兵戎長官清平太守好㨂選皆言由相公開元欲末姚宋死朝廷漸漸由妃子禄山宫裏養作兒通鑒天寳十載召禄山入禁中貴妃以錦綉為大襁褓裹禄山使宫人以綵輿舁之上聞後宫喧笑問其故左右以貴妃洗禄兒對上自往觀之喜賜貴妃洗兒錢復厚賜禄山盡歡虢國門前閙如市見前注弄權宰相不記名依稀憶得楊與李楊國忠李林甫凡在相位十九年廟謨顛倒四海揺五十年來作瘡痏羽軌切今皇神聖丞相明憲宗詔書纔下吳蜀平官軍又取淮西賊此賊亦除天下寜年年耕種宫前道今年不遣子孫耕老翁此意深望幸努力廟謨休用兵延陵懐古辭誠齋予假守延陵盖州來季子之墟也迨暇登城游目四顧慨然想見季子之風烈既而問諸故老古今之士或邑於斯或寓於斯者獨三人焉作延陵懐古辭延陵季子􅍮之溪兮澹以幽惠之山兮雲侔思君子兮不見莽草兮脩脩面句吳兮東而坐背朱方兮北卧齊楚豈不彊而大兮吾王以妥賢於國其無禆兮不曰季子存而吳賀被懵者之躗言兮謂兆亡於遜王弗丕承於考心兮用五湖之與三江祀太伯其忽諸兮顧襲譽於子臧曽不知民無遜而不立兮自古皆有亡諏屺岵與鋤箕兮疇莫知其重輕若千乗暨簞食兮絜豐約而則明迨躬逢而利怵兮亦幾何而靡争謂吾札之不懿兮札亦恬受而茹聲思復思兮君子乾坤毁而日月息兮則君子之亦死蘭陵令宻雲兮終風健順閉兮罔寸蹊之通喟葵丘踐土而迹熄兮矧冀方岐山之與逢單棠谿以鑄兵兮靡遺蒲於董澤燕簴無趾而造齊廟兮楚甿而秦其魄鬬六王於一說兮微儀衍之舌而不國嗟若先生兮雞知時之不如儲唐虞之故冕兮鬻洙泗之敝裾乗方輪與折軸兮欲先鞭而疾驅豈不家捐而人棄兮載之萬世之亨衢伊素王兮中都若蘭陵兮聖之徒征九伯而佩六印兮晞二邑宰而不得俱倘不欲以天球玉磬而貿康瓠兮嗟爾後死者其舍諸東坡先生吹赤壁之月笛兮瞻黄州之雪堂彈湘妃之玉瑟兮織天孫之錦裳招先生其來歸兮何必懐眉山之故郷歴九州而猶隘兮誕寘之祝融之汪酌乳泉以當醴兮餐荔子以為糧葺榕葉以作屋兮托桄榔之䕃以為堂驅海濤以入硯滴兮挽南斗文星於筆鋩昌黎兮歐陽視先生兮雁行韞不洩兮忠憤炯不揜兮文章乞鏡湖兮九闗營菟裘兮是邦予之來兮云暮與先生兮相望視屐跡兮焉在問故宫兮就荒俯仰兮永懐渺山川兮蒼蒼録蝗蟲辭孫因嘗試掇蝗之魁傑者數輩置于前詰之曰使汝害稼天歟人歟惟天惠民必不使爾為吾民痡也且食民天也汝啖民之天以餓其體膚天將汝誅矣速去毋乆居頃之若有卬首揚眉趯趯而股鳴者聴之則曰今為害者豈我乎牟人之利以饜己之欲者非蝗乎食人之食而誤人之國者非蝗乎利口而邦之覆磨牙而民之毒者非蝗乎故窮竒饕餮虞之蝗也夷羿豷浞夏之蝗也受臣億萬啇之蝗也蹶楀家伯仲允棸子周之蝗也齊豹庶其牟夷黒肱春秋之蝗也儀衍申韓楊墨列惠戰國之蝗也鞅睢斯髙翦邯翳欣蝗於秦者也酷吏游俠外戚佞宦蝗於漢者也大者如是小者不可算也自漢而下蝗日益盛民日益病蝗日益碩民日益瘠雖唐正觀開元間號多樂歳蝗未嘗熄也嗚呼其為害三千餘年矣跔跔躣躣實繁有徒去之復生芟之益蕪其庸有既乎必有良史特書屢書而胡獨罪予且夫節按常程無非急征鬻獄賣判價隨重輕外托公計内為己贏若是者不謂之蝗可乎囊金櫃帛峙如山岳轉餽苞苴道途盤錯一筵之費或至千索咀嚼已竭未厭溪壑不稼不穡取禾三百若是者不謂之蝗可乎大昕退朝崇朝退食水珍陸羞映照巾羃是中其誰羔羊正直乗馬從徒呵哄塞衢鳴玉曳履鏘鏘步趨明旦封事問之則無月糜都内錢日廪太倉粟輔郡致醇醴京府飾居屋休問坎伐檀不論鼎覆餗若是者不謂之蝗可乎屯雲百萬耄弱相半問其所工鍼韗鳬鍜負米已喘執弮已汗褒衣麗襦市㕓嬉媮私第一占終身晏如食粟而已烏知其餘此冗兵之為蝗也官如傳舍彼長子孫所在朋曹蟄蟄詵詵舞文冐賄齧吾本根幸而黥涅復為官軍此吏胥之為蝗也傑閣廣殿金臒炳㶷土偶䝉珠牆壁湧鈿黔首無知禍福驅煽此夷鬼之為蝗也節察防團遥刺等官本待有功豈為養安養安以佚坐糜厚秩率民户百不足供一贓吏斥歸更得真祠豈念祠廪亦民膏脂推此以往其他可知貴介姻族乃及僮僕倚勢豪奪飛食人肉鼓吻弄翼道路側目凡此皆人其形而蝗其腹者也其為民害章章如是若夫惰田之農淫浮之技曳縞之商纂組之女倚市門之子假飾衣冠之士𤨏𤨏碌碌者尚不與此然則豐年樂歳常有數十百億萬飛蝗在天下齚人骨髓豈特食稻黍而已况害稼者有時害民者無期害稼者遇官吏如魯中牟則不入境遇人主如唐太宗則不為災而彼害民者誰憚而不為邪然則今為害者豈特我邪愚愧其語書以為有位儆焉録蠧書魚辭楊億東萊集註蠧書魚曰吾常游於文字間韓雜詩古史散左右詩書置後前豈殊書蠧虫生死文字間文字有所殘缺者人則曰吾蠧之故目予曰蠧書魚夫書豈吾蠧之邪昔者孔子脩春秋帝王之道取三代之政述而為經則謂之書其又要而簡其道正而一所以扶世而佑民示萬世常行不易之道也後世之有悖之者則其書或息其書息則聖人之道隳壊也斯得不謂之蠧乎文中子曰九師興而易道微三傳作而春秋散齊韓毛鄭詩之末也大戴小戴禮之衰也天地篇云又楊墨之言出而孔子之道塞孟滕文公下佛老之教行而堯舜之道潛韓原道斯則易其九師之蠧乎春秋其三傳之蠧乎詩其齊韓毛鄭之蠧乎禮其大戴小戴之蠧乎孔子道其楊墨之蠧乎堯舜道其佛老之蠧乎魏晉以降迄於今又有聲律對偶之言彫鏤文理刓刻典經浮華相淫巧偽相衒劘削聖人之道離析六經之旨道日以刻薄而不脩六經之㫖日以解散而不合斯文其蠧也書之蠧有自來矣而謂予曰蠧書魚予敢辭古文集成巻七十
