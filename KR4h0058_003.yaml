body:
  text: 古文集成卷三宋王霆震編前甲集三序六一居士集序東坡歐文六一居士傳云客有問曰六一何謂也居士曰吾家藏書一萬卷集録三代以來金石遺文一千卷有琴一張有棊一局而嘗置酒一壺客曰是為五一爾奈何居士曰以吾一翁老於此五物之間豈不為六一乎東萊云此篇曲折最多破頭説大故下面應亦言大今人文字上面言大下面未必言大言逺下面未必言逺如以文章配天孔孟配禹果然大而非誇唐子西語録云凡為文上句重下句輕則或為上句壓倒居士集序云言有大而非誇此雖只一句而體勢則甚重下乃云達者信之衆人疑焉非用兩句亦載上句不起夫言有大而非誇大説立一句達者信之衆人疑焉下兩句承得好孔子曰天之將喪斯文也後死者不得與於斯文也孟子曰禹抑洪水孔子作春秋孟子距楊墨蓋以是配禹也文章之得喪何與於天而禹之功與天地並孔子孟子以空言配之不已誇乎小説自春秋作而亂臣賊子懼孟子之言行而楊墨之道廢天下以為是固然而不知其功孟子既沒有申商韓非之學違道而趨利殘民以厚生其説至陋也而士以是罔其上上之人僥幸一切之功靡然從之而世無大人如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者十八九天下蕭然洪水之患蓋不至此也警䇿説可以配禹方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不至若是烈也使楊墨得志於天下其禍豈減於申韓哉由此言之雖以孟子配禹可也太史公曰蓋公言黃老賈誼朝錯明申韓此語見太史公本傳錯不足道也而誼亦為之余以是知邪説之移人雖豪傑之士有不免者况衆人乎自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子蓋庶幾焉輕重愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏貫前著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世不恱者譁而攻之能折困其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣仁宗年號而斯文終有愧於古回互士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顔納諌為忠長育成就至嘉祐末仁宗年號號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之喚起歐陽子沒十餘年士始為新學以佛老之似亂周孔之實識者憂之賴天子明聖詔修取士法風厲學者專治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書豫得其詩文七百六十六篇於其子棐歐公有四子發奕棐辦是也乃次而論之曰歐陽子論大道似韓愈論事似陸贄記事似司馬遷詩賦似李白此非余言也天下之言也豐贍不窮歐陽子諱修字永叔既老自謂六一居士云戰國䇿目録序南豐東萊云此篇節奏從容和緩且有條理又藏鋒不露初讀若大羹玄酒須當子細味之若他練字好過換處不覺其間又有深意存迂齋批議論正關鍵密質而不俚太史公之流亞也咀嚼愈有味劉向所定戰國䇿三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始得盡其書正其誤謬而疑其不可考者然後戰國䇿三十三篇復完敘曰向敘此書言周之先明教化修法度所以大治平説及其後謀詐用而仁義之路塞所以大亂其説既美矣卒以謂此書戰國之謀士度時君之所能行不得不然吕曰破向説此樓曰向之失在則可謂惑於流俗而不篤於自信者也吕曰下字夫孔孟之時去周之初已數百嵗其舊法已亡舊俗已熄久矣吕曰要説難二子乃獨明先王之道吕曰愈難以謂不可改者豈將強天下之主以後世之所不可為哉樓曰舉孔孟之道以證戰國之失吕曰不是孔孟強天下以太古難行之事最有力警䇿處亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而已吕曰説孔孟活法最有力二帝三王之治其變固殊其法固異而其為國家天下之意本末先後未嘗不同也二子之道如是而已吕曰轉換好接得自然處應上説破有力樓曰結得定蓋法者所以適變也不必盡同道者所以立本也不可不一吕曰此數句蓋一篇骨子綱目此理之不易者也故二子者守此豈好為異論哉能勿苟而已矣可謂不惑乎流俗而篤於自信者也吕曰文字相承好不費力有上四句無下四句文字弱樓曰與向相反戰國之遊士則不然不知道之可信而樂於説之易合其設心注意偷為一切之計而已吕曰説出骨髓苟樓日一切與不相反故論詐之便而諱其敗言戰之善而蔽其患樓曰説盡謀士態度其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也吕曰説戰國䇿士掩破骨髓其害尤可轉佳警䇿便樓曰利害得失輕重相形見分數多少卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身樓曰此是大害大失而諸侯及秦用之者亦滅其國其為世之大禍明矣吕曰害掩不得結佳而俗猶莫之寤也吕曰接佳惟先王之道因時適變為法不同而考之無疵用之無敝吕曰過換好應前故古之聖賢未有以此而易彼也吕曰結有力或曰邪説之害正也吕曰餘意宜放而絶之則此書之不泯其可乎對曰君子之禁邪説也固將明其説於天下使當世之人皆知其説之不可從然後以禁則齊使後世之人皆知其説之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是吕曰關鎖好中結有力雖平易有千鈞之力量至此一端甚有力勢是以孟子之書有為神農之言者有為墨子之言者皆著而非之吕曰至此前之意思都明至於此書之作則上繼春秋下至楚漢之起二百四五十年之間載其行事固不得而廢也吕曰有許多事不可廢此書有髙誘注者二十一篇或曰三十二篇崇文總目存者八篇今存者十篇云唐鑑序徂徠夫前車覆後車戒前事之失後事之鑑湯以桀為鑑故不敢為桀之行而湯德克明隆六七百周以紂為鑑故不敢為紂之惡而周道至盛傳世三十漢以秦為鑑故不敢為秦之無道而漢業甚茂延洪四百年唐以隋為鑑故不敢為隋之暴亂而唐室攸乂永光十八葉國家雖承五代之後實接唐之緒則國家亦當以唐為鑑臣逖覽往古靡不以女后預事而喪國家者臣觀唐最盛矣武氏變唐為周韋庶人安樂公主鴆殺中宗太平公主潛謀逆亂楊貴妃召天寶之禍臣厯觀前世鮮不以閹宦用權而傾社稷者臣視唐尤傷矣代宗遭輔國之侮蔑憲宗被陳慶之弒逆昭宗為季述之囚辱臣眇尋厯代無不以姦臣專政而亂天下者臣視唐至極矣祿山之禍則林甫國忠為之也朱泚之亂則盧杞為之也陳慶之弒則皇甫鎛為之也嗚呼姦臣不可使專政女后不可使預事宦官不可使任權明皇始用姚崇宋璟則治終用林甫國忠則亂德宗始用崔祐甫陸贄則治終用皇甫鎛則亂自武后奪國迄于中睿暨天寶末年政由女后而李氏幾喪自肅宗踐位厯于代宗德宗順宗憲穆文宗武宣僖昭權在中官而唐祚終去詩曰赫赫宗周褒姒滅之然則巍巍巨唐女后亂之姦臣壞之宦官覆之臣故採托唐史中女后宦官姦臣事迹各類集作三卷謂之唐鑑噫唐十八帝惟武德正觀開元元和百數十年禮樂征伐自天子出女后亂之於前姦臣壞之於中宦官覆之於後顛倒﨑危綿綿延延乍傾乍安若續若絶僅能至於三百年何足言之後之為國者鑑李氏之覆車勿專政於女后勿假權於中官勿委任於姦臣則國祚延洪厯世長逺當傳于子傳于孫可至千萬世豈止齪齪於十八帝局促三百年者哉伏惟明主戒之古文集成卷三
