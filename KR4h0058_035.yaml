body:
  text: 古文集成卷三十五宋王霆震編前戊集五論維民論屏山古無自固之國君有維民之道有國之大猶人之形神其君也氣其民也神氣相資形乃生焉君民相資國乃固焉相資之道必先有與也神與氣氣乃與神君與民民乃與君蓋上者下之倡本者未之附也民有駭亂離析與民者之過也氣有乖戾泮渙與氣者之過也是以神存其氣則氣盛而形充君維其民則民歸而國固甚哉民心之無常也浸浸下歸蕩蕩俄往去就之端最為難察自昔觀我政於廟堂之間得民情於肝鬲之內有要道矣政苛歟刑酷歟賦斂重歟徭役數歟有是四者民必不樂其生不待聞其怨嗟之聲見其蹙頞之色時雖治安民必畔已無是四者時雖艱難民必附已不待足閭巷訪鰥寡而知其必樂其生也夫民之樂不樂其生至微何規規察察蓋不樂之意鬱於胸中亦不能自制也積而為怨怨積則怒怨怒之心蓄而未發甚於敵國之兵戈過於天災之水旱不見其形莫不警懼彼其疾上如仇讐伺有釁隙與之偕亡而為上者方且偃然撫之曰此吾赤子也猶木蠧於中魚潰於腹一旦破壞其可支哉民心無常如此去就之端難察如此故有國者兢兢業業不敢自安思有以維之也自古及今天下之民必有所屬堯舜之民禹維之桀解其維而夏亡商之民文武維之幽厲解其維而周亡自秦漢以來或解或維此治亂興亡循環不已也我宋統御十聖雖武略文經其道不同要之皆以寬厚為治至哉仁宗之仁也三代以來一人而已笑言為恩咳唾為澤薰酣沈浸四十餘年所以維民者盡矣故金人崛興過於劉石德光之暴靖康竒禍同乎永嘉開運之酷而人心戴宋亂而不離宜乎主上之所以中興也竊惟南渡以來天步窘蹙宸心鬱焦凡咨詢之及詔令之頒惟勤恤元元是先豈非鑒古昔之治道紹祖宗之遺澤以祈安耶愚嘗考維民之四說焉政苛無有也刑酷無有也徭役之類無有也惟賦斂一事不可輕且今日國家非有橫給浮費也特以軍旅之興資用不可一日闕耳有司奉承無術益費增繁故常稅之外月有樁嵗有糴有明耗暗耗有帶科折科有和買有預借如市庚良如貨鹺茗如賣僧鬻爵如造甲修船其微至皮角竹木之類一取於民名之曰和其實彊估名之曰借其實不償以瘡痍之民供多多之賦豈易枝梧耶膏萎凉暍必有道焉幸兹邊燧暫息戎事稍紓當講畫究明蘇雕氓活遺噍以成康阜之治噫求瘼必瘼施恩弗恩維民之道輕斂為急民事論林之竒民生乎成周之前其命制乎君民生乎成周之後其命制乎天命制乎君凡其所以為生皆道命制乎天凡其所以為生皆數也天非獨任乎數而純乎天則不得不謂之數以人參焉乃所謂道蓋數者行乎適然之間而道則有必然之理天之愛民豈曰不仁一嵗而豐一嵗而歉水而旱蝗而螟仁有所不行焉謂之數可也謂之道不可也豐而仁行焉歉而仁亦行焉水旱蝗螟無所害乎吾仁是必道行乎其間惟道也者濟數於所不及天之立君正為是耳為天下者一委民命於天無乃失天職虧天道乎哉嗚呼三代往矣民之任乎天也久矣以為法不良歟未嘗無良法也以為吏不賢歟未嘗無賢吏也法良而吏賢民宜無不受其賜矣法良矣吏賢矣民之受賜鮮矣此其積弊豈一端也哉堯湯適遭一時之㑹固不能使天無水旱而能使民無菜色成周之天下又非幸其無水旱而必非水旱所能憂也堯湯逺矣吾不得其政之詳矣周家有司徒之荒政有遺人之委積有廩人倉人以預掌移民頒榖之政所謂良法可條述矣自李悝建平糶之䇿其苗裔遂為常平之制起於中丞夀昌而宣帝信之其後東都永平西晉泰始皆汲汲舉其䇿而行之義倉一法根於北齊條於隋蔓於唐以此二法為天下備吾意天下可使為堯湯之世而民已非堯湯之民矣或曰法有未立固當議法法既立矣非人不行如常平義倉先王美意無以加此無亦其人不足以舉其法歟然而天下未嘗無賢人也考諸史籍發河內粟無汲長孺乎開張掖倉無第五訪乎以倉曹而發州粟不聞韓思復之名乎以一尉發縣粟不聞員半千之名乎散富家之聚以飽貧民之腹如王起輩又不知其幾人乎彼皆以民自任而為政於法之外况有良法可守則若人等輩豈不能沛其澤於下之人哉君也者立法任人以相天者也法既良吏既賢而惠不及民則是民之命終亦制於人而已是果何故哉曰是其弊固有自來而法與天俱不免其弊宜乎其不足恃也嘗熟思之矣法雖良僅舉其大綱吏雖賢亦僅有於絶無之中所貴乎君者以道制數而無一之不足若未盡也是民之命果制乎天也又奚疑哉成周之民井里而居於其私也猶可使之相賙相救因而斂之以為委積則其斂必均因而散之以為賑給則其散必平後世君民之術得如古乎惟其與古異也於是有計田科斂之弊有輕重肆意之弊及其出粟也又有逺近不均之弊有奸民欺誣之弊胥吏乘間抵巇殆有不可勝窮之弊若夫縣官轉移以為他費又不在言也惟其得賢吏而舉行之則百弊俱息抑今之用人宜無愧於古而大不如古矣古者國中自五家為比以至於五州為鄉郊野自五家為鄰以至於五縣為遂教化日漸漬於人心然後賓興其能者賢者而還以治其政令曰比曰鄰其為長者所治止於五家猶今之執賤役者耳必有下士以任其責後之世取人混於雜流用人拘於資格賢與不肖淆雜乎天下嗚呼吾民幸而遇豐年天也又幸而遇明時天也又幸而遇賢吏亦天也天所不能如之何哉君天下者誠知民命當制於我而無任乎天則廟堂燮理萬國召和雖水旱無作焉可也况水旱之變可得以困吾民乎民論陳止齊天下之事有可畏之勢者易圖而無可畏之形者難見也易圖者亦易應難見者必難支故明智之君不畏夫方張之敵國而深畏夫未見其隙之民心蓋民心之搖慘于敵國之變其變之遲者其禍大而患在於內者必不可以復為也古者有畏民之君是以無可畏之民後之人君狃於民之不足畏而民之大可畏者始見於天下嗟夫民而至於見其可畏其亦無及也夫秦之先蓋七國也自孝公至於莊襄亟耕力戰薦食諸侯之境歷七世而并於始皇之手吁亦艱矣始皇唯知天下之難合而其患在六國也故墟其社稷裂其土地而守置之以絶內爭之釁中國不足慮而所以為吾憂者猶有四夷也於是郡桂林城磧石頸繫百粵而郤胸奴於千里之外始皇之心自以天下舉無可虞足以安意肆志拱視於崤函之上而海內晏然者萬葉矣而不知夫天下之大可畏者伏於大澤之卒隱於巨鹿之盜而其睥睨覘覷者已滿於山之西江之東也一呼而起氓𨽻雲合雖邯鄲百萬之師建瓴而下而全關之地已稅駕於灞上之劉季矣嗚呼秦以七世而亡六國之民以幾月而亡秦以秦之彊不能當民之弱天下真可畏者果安在乎人君不得已而用其民以從事於敵國可不懼哉厚俗論程大昌自有天地以來俗幾變矣結繩之世民以恬淡相忘故其俗朴可封之世民以輯睦相親故其俗和至叔世則乖矣以利害相讎而已故其民可誅相親之不能反乎相忘勢也勢聖人無如之何也直以和凝朴使不流於乖則已矣相親之變而為讎政也身先而民隨焉不可禁也則亦付之無可奈何而已使聖人能復太古之相忘吾知聖人有所必為使叔世能樂其民之相讎吾意夏商亦自不棄吾獨怪夫商君之治秦也民故相親而立法以攜之俗未相讎而設法以鬭之勢可為而不為反推而納之至乖至戾之地吁可駭也鞅之立法也設什五以相師而専以告姦為賞罰有兩男者必出分而不分者倍其賦是驅民為告訐而禁民為孝弟嗚呼孝弟親睦之所從生也而禁之則民若何而可親告訐怨仇之所從起也而導之則民若何而不讎故鞅之法行而秦民無歡心矣怡愈之樂不暢於閨門窺伺之惡交相於鄰里使之無熙熙自遂之適而嘗有惴惴意外之憂鞅固前知其然而為之不恤也趙廣漢之治潁川惡其俗之相黨設缿筒以招訐俗行詭譎以啓怨讎務使其民不為朋而已而不知告訐之禍慘於民俗之相黨也行之未幾潁川家家作仇特未相兵耳儻微韓延夀開禮遜之端黃霸闡循良之政則廣漢刻薄所被安知潁川之不秦也漢之文帝承秦之餘舊染猶在文帝一以君子長者待之鎮之以淵默示之以敦朴行之以質木重厚之人比其久也昔之告訐無行誶語無親者人人自重恥言人過大漢之人蕩然與太和同風乃知書可焚儒可坑是古者可禁惟民生厚者不鎖鑠也封德彛曰三代以來驕詭日滋秦任法律漢雜霸道蓋欲治而不能非能治而不欲豈其然哉豈其然哉激俗論方鑑軒不有以起天下之懦無以絶天下之偷不有以致天下之愧無以杜天下之姦天下之俗天下之人為之也而風俗成壞則必有為之先者矣非為之先者能成壞天下之風俗也天下之人固視夫斯人者而為趨向也天下之人舉不為而斯人獨先為之則舉天下皆觀夫斯人斯人者獨奮而上之人莫之沮也則天下爭先效之矣是故斯人者天下之鋒也天下之鋒易以鋭亦易以折天下之人其剛毅不屈直道自守雖死而不回者天下固知其少也天下而有斯人也則天下之觀必有在矣是以明主因其獨為者而優容之以聳天下之觀以厲天下之鋒而不敢輕折天下之鋭何者懼其一折而不振也昔者漢武之世汲黯以直道倡於朝矣而黯以此被疏元帝之世蕭望之又嘗以直道倡於朝矣而望之竟以此遇禍成帝之世王章又嘗以直道倡於朝矣而章竟卒不免此三人者皆天下之鋒也而當時之君不能優容之以信天下之氣而遂折其鋒天下之鋒一折於武帝而姦佞之風起矣再折於元帝而姦佞之風成矣三折於成帝而姦佞之風極矣故漢之風俗始壞於武帝大壞於元成風俗大壞而漢遂以亡非有能亡之也漢自亡也天下之人其剛者不百一而懦者常十九是懦者常多也有一人焉立於羣懦之中而卓然有以自奮此羣懦者之所聳觀也天下方聳觀於斯人而斯人者不旋踵而逐去則天下之觀沮矣天下之觀沮則天下之氣索天下之氣索則不懦者將折而入於懦而懦者愈懦矣天下之士習於偷懦而不羞則安於為之而不恥平居不敢一犯人主之怒而有急則臨大事而不敢爭此張禹孔光之流所以誤人之國而獨全其身者也嗚呼悲夫天下之士豈皆務全其身而誤人之國耶上之人逆折其鋒而勸之使苟容耳平居有敢言之士雖臨難多死義之人何者義固有以激之也是故明主以名驅人而以義激之使之震厲奮迅自援於庸人而不肯為苟容之行然後天下之懦風始得而回之矣天下之人惟其樂於名而勇於義也是故名可以率而趨而義可以作而起也否則惟利之趨而已而今世議者往往以好名而咎天下之士士之慷慨徑正好議論者則遂以好名而詆之不目之以訐則斥之以狂而士之立志不堅中無所守者每有所為復以近名而自沮嗚呼近名者不取而惟近利者乃可耶古今天下惟兩端原闕
