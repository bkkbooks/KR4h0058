body:
  text: 古文集成巻三十宋王霆震編前丁集九劄論遣北使事劄子戊辰四月為太博上時許舍人奕奉使出國門真西山臣切謂為國者當示人以難犯之意不可示人以易窺之形昔春秋時晉師入齊齊使國佐求盟於晉其勢亟矣一聞齊之封内盡東其畆之言雖僨軍之餘不肯苟從以紓一旦之禍蓋敵國之相與有以折其謀則為和也易有以啟其嫚則為和也難況敵情叵測變詐百出又非可以隣國常理待之乎側聞日者小行人之遣也敵人欲多嵗幣之數而吾亦曰可増敵人欲得奸臣之首而吾亦曰可與至於徃來之稱謂犒軍之金帛根括歸明流徙之民承命惟謹曽亡留難切揆謀國之意不過以樂天保民為心幸和好之亟就耳獨不思金人得以闚吾之情而滋嫚我之意乎雖然此旣徃之咎矣所以圖制方來者猶可謹其初也蓋古者敵國通和有養其事力以待可為之機者越之事呉是也有聴命於敵以圖苟安之計者六國之事秦是也今日尋盟於金臣不知姑欲養其事力而待可為之機乎抑將聴命於敵而圖苟安之計乎勾踐之行成於呉也葢忍恥以志仇讎之復而非倚和以自固也是以三十年間蚤朝晏罷卧薪嘗膽未嘗一日忘會稽之恥故雖詘辱一時迄能伸其志於異日若夫六國則不然其求和於秦也葢委國以為仇讎之役而非用權以蘄濟也故朝割地以賂秦則莫棄謀臣之言夕遣質以入秦則旦絶鄰國之援撤防弛備冀秦之矜已而不加兵奚異委肉虎狼而幸其弗食也夫是以六國之地卒歸於秦豈秦之力能亡六國哉六國實自亡耳今日而知是則當以越之事為法而以六國之事為戒可也抑臣聞之善謀國者不觀敵情之動静而觀吾政之修否元祐初用司馬光為相盡更王安石弊法契丹聞之以勿生事戒其邊吏今日號為更化矣而敵之傑驁無異前日母亦我之所為尚有可思者乎故臣妄論今日之事必吾無以取輕於敵而後和可成必有以深服其心而後和可固臣觀昨者竄殛柄臣之始不惟四方萬里咸服英斷而敵國亦竦然易視矣誠使剛健不息之誠愈篤於初振厲有為之志益加於舊則國勢日强敵自退聴奈何朝綱方整而紛紊之漸已萌政事方修而懈弛之形已露正人雖進志未獲伸言路雖開忠罕見用我之更化者僅如此其能使敵情之畏服哉況夫彼之待我者方驕我之恃和者太重一介行李曽未越境而動色相慶若無事然臣恐盟好既成志氣愈惰宴安鴆毒之禍作浮淫冗蠧之事興彼資吾嵗賂以厚其力乘吾不備以長其謀加之數年聲勢浸盛然後發難從之請挑必争之端而吾徬徨四顧將無以應之此長慮逺識之士所為寒心者也臣願陛下以通和講好為權宜以修徳行政為實務君臣之間朝夕儆戒于敵情之難保禍至之無日蒐討軍實申飭邊防凜然敵師將至而國勢張外患弭矣論金元劄子真西山時奉使回甲戌二月上殿臣聞中國有道外敵雖盛不足憂内治未修外敵雖微有足畏蓋昔者永嘉之紛擾與單于争立之事同而拓跋氏之東西與匈奴之分南北亦亡以異然宣帝因呼韓之朝而益强其國劉石符姚之變晉迄不能以成寸功光武因南單于之歸拓地千里而侯景内附適以召蕭梁之釁所遇略同而成敗以異者豈固有幸不幸哉蓋宣光之政修而晉梁之政失也今金運衰微雖吾宗社之慶然臣等審觀事勢竊以為深可慮者三亟當為者二何謂深可慮者三曰對境之流民僅存之遺孽驟興之勁敵是也臣等近抵山陽聞淮北之民扶攜老稚結筏欲渡者日以百數雖邊臣謹守疆場拒卻使還然蝟集而南者其勢未已蓋其仍嵗洊饑重以師旅遺黎何辜死者什七苟非越境亡以偷生故其謀遂出諸此今將容而納之固未易處若一切拒絶彼或萌等死之心設有不幸隨之以潰散之兵繼之以羣行之盜其將何以防之此其可慮者一臣等又聞金主之子改元僣號於山東比者攻圍海州距吾新邊才數十舍倘其粗能自立遂成瓜裂之形因而撫柔尚易為力萬一蒙古得志必欲滅完顔之宗干戈相尋為力弗敵兔奔豕突迫吾邊陲又將何以禦之此其可慮者二昔宣和中金源始大耶律浸微識者豫知必貽中國之患蓋雖均出北方然習安者易制崛起者難馴理固然也今金人土傾魚爛埶必不支萬一蒙古遂能奄有其土疆境交壤接剥牀以膚卻之則怨接之則驕重以亡金舊臣各圖自售指嗾之計何所不為設或肆谿壑之求要吾以待金國之禮從之則不可以立國拒之則必至於交兵宣和舊事可為龜鑑此其可慮者三何謂亟當為者二曰内固邊防外精間諜是也書曰惟事事乃其有備有備無患傳亦有云無恃其不來恃吾有以待之今邊庭探報未必盡然臣等所陳亦似過慮然未至豫言固常為虚若其已至又無所及況積薪欲然之勢日長不已者乎而封疆扞圉之臣徃徃内實驚危外示閒暇其說曰吾將以鎮安物情也獨不知人心有所恃則雖不鎮而自安若其未然則雖無故而自擾與其避張皇之小害孰若圖倉猝之深憂夫自古立國東南未有不以兩淮荆襄為根本紹興中李綱建議六朝之能保守江左者以强兵重鎮盡在淮襄雖曹魏之雄符石拓跋之衆率不能一闚江表後唐李氏有淮南則可都金陵其後失之遂以削弱今朝廷欲為守備則當於兩淮荆襄置三大帥屯重兵以臨之分遣偏師進守支郡小築城壘如開新邊遇有賊馬則大帥遣兵應援稍能自守商旅必通乃可召人來歸漸次葺理假以嵗月則藩籬成矣綱之言政今日所宜用也臣等間者自揚而之楚自楚之盱眙經行所及凡數百里平疇沃壤極目亡際重湖陂澤渺莽相連而田野之民又皆堅悍强忍亡呉兒驕脆之氣迨乆駐邊城訪問益審凡兩淮形勢之利如在目中然後喟然嘆曰此天賜吾國以為大江之屏障使强兵足食為進取之資也而士大夫習尚因循視其荒殘漫弗之惜田疇不闢溝洫不治有險要不知所以控扼有丁壯不知所以練習有豪傑武勇不知所以牢籠收拾之方一旦驚急但思委而去之以長江為足恃是猶咽喉見搤於人而欲與之角藩牆扃鐍為盜所有而欲保堂奥之安亡是理也且徃者極邊之地城壘不建戍守不増徒以區區要盟之故今事變一新政吾更張規模之日臣等謂宜及今亟行經理選儒臣之有威重知兵略者二三人俾之督䕶諸將其掊克自封巽愞不立者易之沿江列屯亡慮十數萬勁騎精卒皆當移駐並邊而増募舟師以扼江面凡城池樓櫓之未固若要害之未築者就遣屯兵併力繕治使治邊數千里脈絡相聨有貫珠之勢首尾相應有率然之形兵力旣雄民志自固然後大修墾田之政倣漢搜粟故事顓為一司以領之力本務農如周秦之用西土數年之後積貯充實邊民父子争欲自保因其什伍勒以軍法不待糧饟皆為精兵金湯之勢成磐石之基立則退足以守進足以攻此亟當為者一也夫間諜不明最兵家之深忌今金人與蒙古相持蓋非一日戰鬬離合不知其幾而吾邊臣迄未有得其要領者至如吾林答忠之歸紇石烈執中之死並邊諸郡言人人殊即此推之他可㮣見臣等比至維揚首聞金都摧陷之報質諸邊帥亦復謂然迨次修門其說又異夫敵國存亡兹非細事風傳不一迺至於斯脫有緩急其將何及昔中興初韓世忠呉玠諸人捐金募間如用砂礫故敵人深謀秘計靡不豫知取勝之術大抵由此臣等謂宜申飭主兵之臣顓任遣間之責事之驗否特示勸懲庶幾實事必聞而聞事必實此亟當為者二也臣等區區本亡竒䇿獨念將命之初違去殿陛蒙陛下温顔賜諭以江淮之事歸日奏聞故敢罄竭愚忠期報萬一惟聖明裁察古文集成巻三十
