body:
  text: 古文集成卷十九宋王霆震編前丙集五書上席侍郎書唐子西迂齊批古人未嘗鑿事以為功故有功不為誇無功不為慊若恥於無功則不安於無事矣發明甚佳此是規諷宣政間紛紜制作之病何函相則何㮚也某備員學校三載於此在輩流中年齒最為老大詞氣學術最為淺陋教養訓導之方最為疏拙所以未即逐去正賴主人以為重今閣下還朝曉夕大用為執政為宰相為公為師此誠門下小子之所願聞然孤宦小官遽奪所依此其胸中不能無介然者日夜思慮求所以補報萬一而書生門户無有他技因效其所得於古人者惟閣下裁擇某初讀書時未習時事意謂古之聖賢例須建立功名其後涉世益深更事益多考論前代經史益見首尾乃知古人之心本不如此舟遇險則有功燭遇夜則有功藥遇病則有功桔橰遇旱則有功戈弩劔㦸臨衝兜鍪遇戰鬬則有功以物諭人精於物理凡物有功悉非得已結上生下龍蛇雜處而禹有功草木障塞而益有功民不粒食而稷有功天理人倫顛倒失次而卨有功夷蠻賊冦干紀亂治而咎繇有功說人之功自此以降不可勝舉然皆因時立功非聖賢本意伊陟臣扈巫咸相太戊無他竒功以格上帝乂王家為功巫賢甘盤傅說相祖乙武丁不聞有功以保乂有商為功君陳相成王畢公相康王不自立功以循周公之業為功使禹稷臯益處伊陟臣扈巫賢甘盤傅說之時功業亦只得如此使此數人者當禹稷臯益之世則不容無功後世知有功之為功而不知無功之為功佳其去道已逺至謂聖賢有心於功名其探聖賢亦淺矣天下承平日久綱紀文章纎悉備具無有毫髮未盡未便一部周禮舉行略遍但不姓姬爾竊謂今日正當持循法度不宜復有增廣建置主意歌呼於吏舍者勿問醉吐於車茵者勿逐客至欲有所開說者飲以醇酒勿聽擇士唯取通大體知古誼者用之雖不立功功在其中矣斡旋佳某之所得於古人者如此不知其當否也閣下倘以為然歸見何丞相其亦以此說告之上范待制書李泰伯嘗聞之鶡冠子曰賤於無所用中流失船一壺千金始猶未信今乃知之嗟乎古之為士者何其顯榮哉身敝緼而寵踰華衮腹藜糗而富埒千乘故有以南面之王而擁篲於匹夫公子國相而執轡於羸老兹戰國之士尚未足法漢有天命四海之逺化戎為華而猶求如不及州郡察焉四府辟焉一介之善無敢漏落縣鄉小吏名汙賤者也翼之而仕角之而朝者往往有焉此無他蓋有國者慮下情之壅遏得人以快耳目當途者畏曠官之罪以舉賢為稱職習俗相尚氣焰薰灼而然也故于時能言以上多自瑑飾閨門為進仕之階鄉黨乃榮名之路奬助風教夫豈小歟厥後古道不逞詞科浸長不由經濟一出聲律源而海之以至今日矧惟真帝在上皇天乃眷太平之根穩貫坤厚四鄙酣寢無雞鳴犬吠之驚法令流暢罔或枝梧役夫賤類馳一乘之傳則足以呼舞諸侯矣三尺童子據桉弄筆則足以斬决彊梗矣不待偉人深智而職事已治故雖浮華賤類之輩率為可用聲律取士孰不曰宜學小則易工利近則可欲員位有數而求之者多國朝患其或私謁也於是糊其名易其書混致於考官之手固不知其立身之行幹蠱之才雖有仁如伯夷孝如曾參直如史魚亷如於陵一語不中則生平委地况執其柄者時或非人聲律之中又有遺焉薦於鄉奏於禮部第於殿廷偶失偶得如奕棋耳名卿大臣以其無舉知之責也閉其口不復言天下士俯視同術疏若秦越養威重崇愛惡管庫之𨽻灑掃之僕皆得以保任而惜一言以舉遺逸雖然好古亷潔之士寧忍飢而死耳安得仰面以希其咳唾於戲道之無益如此夫宜其腐儒小生去本逐末父詔其子曰何必讀書姑誦賦而已矣兄教其弟曰何必有名姑程試而已矣故有縑緗凝塵不記篇目而致甲科帷薄行辱市井不齒而階美仕勸善懲惡將安在邪萬一史臣示書法於後世則赤墀之下當有任其責者矣噫非大賢君子其曷敢矯之某建昌南城人也生二十九年矣齠齔喜事以進士自業摘花蘂寫雲烟為世俗辭語頗甚可取愚不惟道之隆替時之向背輒游心於聖人之藴志將堯吾君羲吾民晨夜精思頗為有得視缺政如已之疾視惡吏如已之讎恨無斗水以自濯瑕穢四顧悲歌時或涕洟然而命薄計拙動成顛仆鄉書之不録况爵命乎孤貧無依載其空文走南北楫焉而川澤竭蹄焉而道路窮嘗遊京邑凡時之所謂文宗儒師者多請謁焉但伏執事之名時最久矣謀之於儒林則又謂執事表知樂之士有自褐衣得召者如某等輩庶可依歸不幸未及弛擔而執事以言左遷時異事變卒無所遇倣徨而歸又黜鄉舉身病矣力窮矣仰喜朝車適留兹土故不逺五百里犯風雨寒苦來拜於廡下古之君子居易以俟命不患人之不已知今某也踽踽而來若行賈之為者其故何哉伏念家世貧乏幼孤無兄弟老母年近六十飢焉而無田寒焉而無帛喁喁科舉求不可望之祿以為養抑疏濶矣每朝夕進側則見其髮體臞而食淡衣粗烏鳥之情痛劈骨髓王城百舍天門九關銖銅不畜何路自達遐方小郡知已斷絶姦邪所怒哆沾所笑身無油膩日就乾臘往時多事勤苦成疾今兹憂愁益復發作長恐醫餌不繼忽沈溝壑內孤慈母上負明時所懷不伸抱恨泉裏以此計較不宜默默是以來也答談思順書淡菴向者辱箋教扳援河伯海若問答及引孟子觀海難為水遊聖門難為言之論以至正人心之說反覆數百言三復感歎知足下之望於僕也至矣鄉以方有私家戚不即裁答因循至今夫言辭之不酬雖孔子不得行於互鄉况如足下之學誠非互鄉之比而又於僕懇懇耶又安得默默而但已哉夫自古論聖人之道以江海為諭者多矣而皆未能盡河海之極致何者以其未嘗識海也某嘗浮於海矣竊自謂世之知海之極致者宜莫如某今夫海之為器也南灔炎荒北灑璇極東演濛汜西薄月􅒸渺滄溟與渤澥波黏天以漭沆浟湙㶑灎浮空迷岸襄陵廣舄㶀㵧浩汗彯砂礐石蕩穹沃日􅀢雲屑雨崩濤捲雪狀如天轂膠戾而激轉倐若坤輿挺拔而幅裂飛流濺沫决眥股栗其蟲魚千怪萬狀而不可悉數其鳥獸詭類殊形而不可致詰其舟如凌空之山其帆如垂天之雲千尋之艬萬斛之􅀈巨艦廣􅀈若般若舶若䑽若􅀈若吳之艅艎艂艭若楚之艨艟迅鶻千艘萬柁舳艫相銜翩若鴻驚瞥若鷗沒飄風一日踔數千里漫不見畔岸决檣摧撞冏然鳥逝吁可畏哉水怪則有海童邀路馬銜當蹊河馮蝄像出沒隱見蜃樓忽起突兀萬仭摩雲排空天地黯黮斗變異色則有吞舟之䲔峌􅒈孤遊長鬐稍雲巨鬛刺天哆口修牙劔㦸差差崇島巨鼇延袤千里擘洪濤而㨖北斗五嶽鼓舞窮世間萬彚舉不足以盡其變態雖極班彪之覽木華之賦酈元之經盧肇之說韓愈之碑雄辭傑識曾莫能詰其髣佛信乎觀於海者難為水也知海之難為水則知聖門之難為言亦猶是矣今夫源深者流必洪必至之理也有德者必有言亦必至之理也難為水者非水之難也其淵源之大為難難為言者非言之難也其德之盛為難德水也言浮物也水之大而物之浮者小大畢浮德盛則其言也㫖必逺亦其理宜也昔者孔子道大而德博其垂世立教非有心於言也而能言之類莫能加焉門弟子得其微辭奧義者寡矣惟許顔回於吾言無所不說至於商也賜也可與言詩雍也然偃也是於漆雕開則說之於曽㸃則與之亦庶幾矣然子夏之學流而為田子方子方流而為莊周周之書喜稱子方之為人則商雖可與言詩其失也誕子貢之辨多為聖人所詘至答原憲之問終身恥以為過則賜雖可與言詩其失也躁子遊習於禮至論本末而子夏以為過則偃雖言是而其失也誣若夫宰豫善為說辭而聖人且有失之子我之譏顓孫師論致命思義善矣而偃也參也皆詆其不仁聖人亦疑其忠信不足有若彊識好古能明孝弟善矣而於羣弟子之問懵不能對夫數子者皆號升堂入室而不若回也得聖人之所以言其不謂之難乎哉善乎齊太史子與之言曰乃今而後知泰山之為髙滄海之為大惜乎夫子之道德不加於民也信乎其知聖人之道也某也學苦而身益窮何足與論聖人之道而足下不以為可鄙乃至扳援古者以發固陋辭義髙逺殆非區區者所宜得也然僕竊有疑焉惜足下不期至乎海而自比於河伯而止也夫㳂河而下苟不止雖有疾遲必至於海故學者必慎其所道道於曲學異端而欲究聖人之言誠韓愈所謂航斷港絶潢以望至於海也故欲究聖人之言必自韓子始士固伸於知已足下其毋謂僕嘵嘵不一答汪主簿書淡菴某聞古之君子其所謂知與遇者天今之君子其所謂知與遇者人古之君子其所謂知與遇者非天也已也今之君子其所謂知與遇者非人也利也古之君子其言曰下學而上達知我者其天乎又曰吾之不遇魯侯天也其知也其遇也皆天也而以為非天何邪曰聖人嗟時不已知而曰知我者其天乎言人不已知亦不必天之已知也君子自知明已有善必知之已有不善必知之不謂天知而為善不謂天不知而為不善天之知不知我何與焉故曰知我者其天乎疑辭也然則不遇魯侯天也亦疑辭邪曰然曷疑哉曰君子之遇不遇在已而已耳已誠善則在困亦亨雖不遇猶遇也已誠不善居寵亦危雖遇猶不遇也夫在困亦亨天豈得而否之居寵亦危天豈得而安之是遇不遇在已而已天何與焉故曰吾之不遇魯侯天也疑辭也然則天生德於豫天未欲平治天下皆歸之天亦疑辭邪曰然曷疑哉曰聖人固云我非生而知之而肯自矜曰德為天生乎曰天生德云者有為而言之也或曰固天縱之將聖云者亦非聖人意乎曰非也夫聖孔子不居况肯居天縱之名乎若夫平治天下人主職耳亦何與於天其曰天云者甚嗟之之辭紂云我生不有命在天其臣固非之曰乃罪多參在上乃能責命於天而謂軻也誠以治亂聽於天乎故曰古之君子其知與遇非天也已也今之君子則異矣其求知也不求諸已其遇合也不在於道附麗匪人而謂之知已同流合汙而謂之遇主夫不患人之不已知求為可知也已無可知之善而附麗匪人以為知已其知也豈仲尼之所謂知也哉遇主於巷惡其委曲求合若委巷然不由其道也而同流合汙以遇主豈軻老之所謂遇也哉故曰今之君子其所謂知與遇者利也某也辱書為賜始未及古人所謂知與遇之道其論甚美至於稱道過實則非僕之所敢知也輒叙所聞於師友者以為謝執事以為然否上張子韶書誠齊某嘗言之士窮於窮亦通於窮達於達亦病於達且夫爵三公得萬鍾達矣謂道必待達而後達則公孫之相徒足為其曲學阿世之資飯􅟿茹草曲肱飲水窮矣謂道必以窮而遂窮則顔氏之巷乃適借之以心齊坐忘之地嗟夫吾然後知富貴者中人之膏肓而貧賤者君子之榖粟歟昔者孔孟嘗言如有用我而舍我其誰矣豈嘗矯情而不願於達哉蓋其用也意乃在於為東周其不舍也意乃在於平治天下爾此孔孟之不忍獨樂其樂而欲以天下樂其樂也若其所以真樂者豈用不用舍不舍之謂邪自常人觀之忠恕之味固不足以療不糝之飢仁義之恱心亦豈足以蘇轍環之疲也哉然非不糝非轍環非伐木非削迹非自衛反魯非退自齊梁則吾之真樂猶有未遂其極不然重圍之中胡為援琴而歌其出晝也初無不悅之色此其心果何所屬而其樂果將安寄邪故曰吾得之於桑落之下又曰我豈若處畎畝之中此聖賢之意也厥今天下之士何病哉志欲澤物而忘其我道欲被乎天下而曽不用其一身皆曰達則行惜乎吾之窮也幸而達矣叩之則空空無有矣蓋前日之惜窮所以為今日之無有也歟某也生乎今之世而慕乎古之樂獨嘗歎中庸一貫之妙致知格物之學此聖賢授受之祕而六經流出之源子思不識堯舜而以是識堯舜孟子不見孔子而以是見孔子聖賢之所以內而正心誠意外而開物成務不待富貴而欣不因貧賤而悲者也蓋有志焉而其學莫之傳其盟莫之主也竊聞浙江之西有君子焉異時䇿多士之先居朝廷之上人皆賀其達而曾不以為達一旦置之於蠻徼投之以黜辱人皆惜其窮而曽不以為窮居約置散者且將二十年矣而聞其貌夷然無自失之色其氣盎然無不平之憤方且日泳洙泗登杏壇而入由也未入之室在回也所在之寢啓中庸大學之管籥而决論語孟子之淵泉渺渺焉若仲尼居而參侍若與回言而終日也此其心必有至樂乎其中而不可以聲臭窺測者某也願撰履攝齊以躬灑掃應對之役求聞所以好之樂之之旨舊矣而未之得此來天誘其衷管庫於此而適遇從者之至是以踽踽焉自進於函丈而竊有請也夫語道於非其人不智語人以非其道不仁先生必不其然上蘇仁仲書誠齊某聞君子之於世無意於合也有意於合者折旋委曲惟合之求然未得其所無先喪其所有古之君子所以合者惟無意於合也無意於合人者有守於已者也有守於已者是惟無合於人合則膠固而不可解者昔齊人鼓瑟以干齊王而有罵之者曰王好竽而子鼓瑟瑟雖工如王之不好何說者往往笑齊人之工於瑟而不工於求齊以為不求合者之戒嗟夫是知齊人之拙於合而不合未知唐人之巧於合而不合韋蘇州之詩天下之所同美也客有效韋公之體以見公者而公不恱既而以已平生之詩見公而公悅之當其效人之詩體以求合於人自以為巧矣而其巧適所以為拙則夫舍已以狥於人與夫信已以俟於人其巧拙未易以相過也彼齊人者患瑟之不工而已矣瑟果工矣天下必有好瑟者矣無遇於此安知不有遇於彼哉且吾之所能者瑟也所不能者竽也今舍瑟而學竽竽未能而瑟先忘矣吾且不吾信安能使王之吾信乎與其學竽而未必能也孰若工瑟以有待也世之君子不懲於唐人之巧而懲於齊人之拙則亦誤矣閣下乘使者車方春而行部其風采之所動聲光之所臨士之挾寸長負片善者孰不翹首企足願忠而望賜也哉甲則曰蘇公之所好者何道乙則曰蘇公之所惡者何事趨其所好而避其所惡惟恐後也噫是知所以求合之合而未知不求合之合也閣下以元祐名相之子孫而退然若一介之寒士文學行藝加人數等而欿然如有所不及其未用也初不愠於退用之而未盡也亦不懌於進小人之所異而忌焉君子之所同而怙焉公之於人蓋未始有意於求合者公則不欲求合於人而顧欲人之求合於已耶某生晚而學無朋地寒而時無遭將欲挈不肖之身以自進於門下既無可喜之狀以取悅又無求合之言以取售而獨持此書以見焉不知者又以為拙也夫以巧而求合於人者某實恥之不惟某恥之閣下實恥之也見虞彬甫書誠齊某聞之天下之情必有憂有憂必有所在不在民則在君不在君則在相天下有事無一人出而任之者當是之時其憂在君與民雖然天下之所甚憂而君子以為不足憂何者無一人任此事安知果無一人任此事者至於有一人焉出而任之任之而不堪不堪而不能憂此真可憂者也蓋吾既相吾君而任此事則吾君不任憂矣天下之民舉其憂以歸之君君舉其憂以諉之相至於相則復誰諉者故夫天下之憂至於相之身而止矣不去矣又不去於吾身而吾乃躍然欲自寧於憂之外嗟夫殆哉昔者白公之役楚子髙之入也楚之人或曰恐傷君若之何不胄或曰國人望君如望嵗若之何胄欲子髙之胄者愛之者也欲子髙之不胄者亦愛之者也子髙何修而得此於民哉蓋子髙者楚之命也無子髙是無楚也憂其不胄而至於傷雖然斯言也既見子髙者之言也見子髙者一人而未見子髙者千萬人千萬人未見則有千萬人之憂國人欲解此憂而皇皇焉不知所付子髙而胄也國人何從而識也國人無從而識則憂無從而解子髙何修而得此於民哉無乃任之而能堪故歟無乃堪之而能憂故歟任之而能堪堪之而能憂楚無事矣今之天下其可為耶其不可為耶聞之曰孟賁之手無重負倉公之鄉無沈痼何則天下之事自有能之者也獨患能者不得為為者不能爾異時虜囚乘我積安不戰之後卒然而臨長江天下之憂何如也樞密與紫岩張公今副樞陳公起而麾之天下之不憂何如也然則任之而能堪堪之而能憂不在樞密而誰耶自樞密之歸蜀也國之人西其首者幾何時矣至於屢召而未至也不特天下之憂吾君亦憂之矣三數日來竊怪國之人何其喜也問之則曰吾相虞公既至云耳非喜也喜其憂之解也喜樞密之來果足以付此憂也某也逺方書生未嘗有足迹於王公貴人之門非敢倨也重於從也有從則無改矣可不重乎自至都下獨一見副樞陳公天幸又遇樞密之至私竊自喜將得其從也且陳公曰吾將言子於虞公某之所以來也某有書三十篇極陳天下之事而不知時之所諱欲有獻於上而未能某貧故也敬納其副於東閣當今之世不惟士求宰相宰相實求士古者不相求而相值者有矣兩相求而不相值者有矣某之此來也樞密不謂之去不敢去不謂之留不敢留將惟樞密之所以命古文集成卷十九
