body:
  text: 古文集成卷二十一宋王霆震編前丙集七書答李詡論性書歐陽公前辱示書及性詮三篇故思與吾子卒其説修患世之學者多言性故常為説曰夫性非學者之所急而聖人之所罕言也易六十四卦不言性其言者動靜得失吉凶之常理也春秋二百四十二年不言性其言者善惡是非之實録也詩三百五篇不言性其言者政教興衰之美刺也書五十九篇不言性其言者堯舜三代之治亂也禮樂雖不完而雜出於諸儒之記然其大要治國修身之法也六經之所載皆人事之切於世者是以言之甚詳至於性也百不一二言之或因言而及焉非為性而言也故雖言而不究豫之所謂不言者非謂絶而無言蓋其言者鮮而又不主於性而言也論語所載七十二子之問於孔子者問孝問忠問仁義問禮樂問修身問為政問朋友問鬼神者有矣未嘗有問性者孔子之告其弟子者凡數千言其及於性者一言而已豫故曰非學者之所急而聖人之罕言也書曰習與性成語曰性相近習相逺者戒人慎所習而言也中庸曰天命之謂性率性之謂道者明性無常必有以率之也樂記亦曰感物而動性之欲者明物之感人無不至也然終不言性果善果惡但戒人慎所習與所感而勤其所以率之者耳豫故曰因言以及之而不究也修少好學知學之難凡所謂六經之所載七十二子之所問者學之終身有不能達者矣於其所達行之終身有不能至者矣以豫之汲汲於此而不暇乎其他因以知七十二子亦以是汲汲而不暇也又以知聖人所以教人垂世亦皇皇而不暇也今之學者於古聖賢所皇皇汲汲者學之行之或未至其一二而好為性説以窮聖賢之所罕言而不究者執後儒之偏説事無用之空言此豫之所不暇也或有問曰性果不足學乎豫曰性者與身俱生而人之所皆有也為君子者修身治人而已性之善惡不必究也使性果善邪身不可以不修人不可以不治使性果惡邪身不可以不修人不可以不治不修其身雖君子而為小人書曰惟聖罔念作狂是也能修其身雖小人而為君子書曰惟狂克念作聖是也治道備人斯為善矣書曰黎民於變時雍是也治道失人斯為惡矣書曰殷民頑又曰舊染汙俗是也故為君子者以修身治人為急而不窮性以為言夫七十二子之不問六經之不主言或雖言而不究豈略之哉蓋有意也或又問曰然則三子言性過歟曰不過也其不同何也曰始異而終同也使孟子曰人性善矣遂怠而不教則是過也使荀子曰人性惡矣遂棄而不教則是過矣使揚子曰人性混矣遂肆而不教則是過也然三子者或身奔走諸侯以行其道或著書纍千萬言以告於後世未嘗不區區以仁義禮樂為急蓋其意以謂善者一言不教則失而入於惡惡者勤而教之則可使至於善混者驅而率之則可使去惡而就善也其説與書之習與性成語之性近習逺中庸之有以率之樂記之慎物所感皆合夫三子者推其言則殊察其用心則一故豫以為推其言不過始異而終同也凡論三子者以豫言而一之則譊譊者可以息矣豫之所説如此吾子其擇焉答橫渠張子厚書程明道承教諭以定性未能不動猶纍於外物此賢者慮之熟矣尚何俟小子之言然嘗思之矣敢貢其説於左右所謂定者動亦定靜亦定無將迎無內外苟以外物為外牽已而從之是以已性為有內外也且以性為隨物於外則當其在外時何者為在內是有意於絶外誘而不知性之無內外也既以內外為二本則亦烏可遽語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若擴然而大公物來而順應易曰貞吉悔亡憧憧往來朋從爾思苟規規於外誘之除將見滅於東而生於西也非惟日之不足顧其端無窮不可得而除也人之情各有所蔽故不能適道大率患在於自私而用智自私則不能以有為為應迹一作物用智則不能以明覺為自然今以惡外物之心而求照於無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟氏亦曰所惡於智者為其鑿也與其非外而是內不若內外之兩忘也兩忘則澄然無事矣無事則定定則眀眀則尚何應物之為纍哉聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不繫於心而繫於物也是則聖人豈不應於物哉烏得以從外者為非而更求在內者為是也今以自私用智之喜怒而視聖人喜怒之正為如何哉夫人之情易發而難制者惟怒為甚第能於怒時遽忘其怒而觀理之是非亦可見外誘之不足惡而於道亦思過半矣心之精微口不能宣加之素拙於文辭又吏事匆匆未能精慮當否佇報然舉大要亦當近之矣道近求逺古人所非惟聰明裁之寄張欽夫書胡五峯比得款論竊識左右胸中正矣大矣大體既是正好用工近察諸身逺察諸物窮竟萬理一以貫之直造寂然不動之地然後吉凶與民同患為天之所為矣此聖門事業也欽夫勉之哉則又有進於左右者堯授舜舜授禹曰人心惟危道心惟微微言微妙也危言無常也故孔聖自十五志於學積十五年工夫然後敢以立自許自是而後每積十年工夫而一進未至從心所欲不踰矩則猶有人心消磨未瑩徹也及至從心所欲不踰矩方才純是道心與天無二故中庸稱孔聖之德終以天地之所以為大結之不更稱仲尼也今之學道者少有所得則欣然以天地之美為盡在已自以為至足矣就世俗而言之亦可謂之君子論於聖人之門乃是自暴自棄耳左右方妙年所見大體已是知至矣當至之知終矣當終之則顔曽地位何患不到欽夫戒之哉乾乾不舍工夫深後自然已不得也今且當以速成為戒耳答陸子靜書晦菴前書誨諭之悉敢不承教所謂古之聖賢惟理是視言當於理雖婦人孺子有所不棄或乖理致雖出古書不敢盡信此論甚當非世儒淺見所及也但熹竊謂言不難擇而理未易明若於理實有所見則於人言之是非不翅白黑之易辨固不待訊其人之賢否而為去取不幸而吾之所謂理者或但出於一已之私見則恐其所取舍未足以為羣言之折衷也况理既未明則於人之言恐亦未免有未盡其意者又安可以遽絀古書為不足信而直任胸臆之所裁乎來書反復其於無極太極之辨詳矣然以熹觀之伏羲作易自一畫以下文王演易自乾元以下皆未嘗言太極也而孔子言之孔子贊易自太極以下未嘗言無極也而周子言之夫先聖後聖豈不同條而共貫哉若於此有以灼然實見太極之真體則知不言者不為少而言之者不為多矣何至若此之紛紛哉今既不然則吾之所謂理者恐其未足以為羣言之折衷又况於人之言有所不盡者又非一二而已乎既蒙不鄙而教之熹亦不敢不盡其愚也且夫大傳之太極者何也即兩儀四象八卦之理具於三者之先而緼於三者之內者也聖人之意正以其究竟至極無名可名故特謂之太極猶曰舉天下之至極無以加此云爾初不以其中而命之也至如北極之極屋極之極皇極之極民極之極諸儒雖有解為中者蓋以此物之極常在此物之中非指極字而訓之以中也極者至極而已以有形者言之則其四方八面合輳將來到此築底更無去處從此推出四方八面都無向背一切闕故謂之極耳後人以其居中而能應四外故指其處而以中言之非以其義為可訓中也至於太極則又初無形象方所以可言但以此理至極而謂之極耳今乃以中名之則是所謂理有未明而不能盡乎人言之意者一也通書理性命章其首二句言理次三句言性次八句言命故其章內無此三字而特以三字名其章以表之則章內之言固已各有所屬矣蓋其所謂靈所謂一者乃為太極而所謂中者乃氣稟之得中與剛善剛惡柔善柔惡者為五性而屬乎五行初未嘗以是為太極也且曰中焉止矣而又下屬於二氣五行化生萬物之云是亦復成何等文字義理乎今來喻乃指其中者為太極而屬之下文則又理有未明而不能盡乎人言之意者二也若論無極二字乃是周子灼見道體逈出常情不顧旁人是非不計自己得失勇往直前説出人不敢説底道理令後之學者曉然見得太極之妙不屬有無不落方體若於此看得破方見得此老真得千聖以來不傳之祕非但架屋下之屋疊牀上之牀而已也今必以為未然是又理有未明而不能盡人言之意者三也至於大傳既曰形而上者謂之道矣而又曰一隂一陽之謂道此豈真以隂陽為形而上者哉正所以見一隂一陽雖屬形器然其所以一隂而一陽者是乃道體之所為也故語道體之至極則謂之太極語太極之流行則謂之道雖有二名初無兩體周子所以謂之無極正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也今乃深詆無極之不然則是直以太極為有形狀有方所矣直以隂陽為形而上者則又昧於道器之分矣又於形而上者之上復有况太極乎之語則是又以道上别有一物為太極矣此又理有未明而不能盡乎人言之意者四也至熹前書所謂不言無極則太極同於一物而不足為萬化根本不言太極則將淪於空寂而不能為萬化根本乃是推本周子之意以為當時若不如此兩不説破則讀者錯認語意必有偏見之病聞人説有即謂之實有見人説無即以為真無耳自謂如此説得周子之意已是大煞分明只恐知道者厭其漏泄之過甚不謂如老兄者乃猶以為未穩而難曉也請以熹書上下文意詳之豈謂太極可以人言而為加損者哉是又理有未明而不能盡乎人言之意者五也來書又謂大傳明言易有太極今乃言無何耶此尤非所望於髙明者今夏因與人言易其人之論正如此當時對之不覺失笑遂至被劾彼俗儒膠固隨語生解不足深怪老兄平日自視為如何而亦為此言耶老兄且謂大傳之所謂有果如兩儀四象八卦之有定位天地五行萬物之有常形耶周子之所謂無是果虛空斷滅都無生物之理耶此又理有未明而不能盡乎人言之意者六也老子復歸於無極無極乃無窮之義如莊生入無窮之門以遊無極之野云爾非若周子所言之意也今乃引之而謂周子之言實出乎彼此又理有未明而不能盡乎人言之意者七也髙明之學超出方外固未易以世間言語論量意見測度今且以愚見執方論之則其未合有如前所陳者亦欲奉報又恐徒為紛紛重使世俗觀笑既而思之若遂不言則恐學者終無所取正較是三者寧可見笑於今人不可得罪於後世是以終不獲已而竟陳之不識老兄以為如何古文集成卷二十一
