body:
  text: 古文集成巻三十六宋王霆震編前戊集六論練兵論方恬凡戰兵多以治勝兵少以精勝兵多而不治兵少而不精均敗之道也驅三軍之士若役一夫非治不能濟也舉數千之兵而當數倍之衆非精不為用也治則整整則無間無間則敵不能犯精則銳銳則無前無前則敵不能禦不能犯而後可以不敗不能禦而後可以必勝故兵多而治者所以務為不可敗也兵少而精者所以求為必可勝也夫兵多易撓也兵少易壓也易撓者隙易乘也易壓者勢易孤也易乘者易伺其便易孤者易兼其衆多而治則無隙矣少而精則勢勁矣無隙則不可撓以寡勢勁則不可壓以衆故用兵者毋邀正正之旗勿擊堂堂之陣者畏其整也銳卒勿攻歸師勿遏者避其銳也善戰者使敵畏其整而避其銳然後可保其全勝故兵多而不治者亂軍也兵少而不精者危軍也苻堅以百萬之衆而敗於淝水者軍亂而不整也楚之三軍以迭出相救為竒而困於黥布者軍危而不武也故聚無行散無列飲無序鼔之不進金之不止在伍而失次在陣而加囂者兵雖多而必敗也進不敢獨先退不敢獨後未戰而氣先奪未陣而意先沮者兵之少而愈危也惟治而後可以用衆惟精而後可以用寡治在乎紀律精在乎鋒銳紀律以嚴整為先鋒銳以選練為彊兵而無紀律者驕將也士而無鋒銳者惰兵也將驕卒惰而求戰勝守固不可得也昔李廣為將無部曲行伍人各自便然虜卒犯之而無以禁也虜卒犯之無以禁敗繼之矣霍去病一常人也而戰數有功者乃諸將常選也夫士之不能无勇怯也兵之不能无老壯也馬之不能無駑與駿也技之不能無精與觕也是皆不容無擇者也勿雜焉而已矣勇怯雜而驅之老壯雜而用之駑駿雜而乘之精觕雜而隊之則勇者未必奮而怯者先遁矣壯者未及鬭而老者先敗矣駿者未及騁而駑者先顛矣精者未及施而觕者先潰矣凡兵未及戰而先知其必敗者此類也今天下之兵其治耶其否耶其精耶其未精耶愚竊窺軍政之不嚴而吏士之未精也穰苴之治兵戮一後期之莊賈而三軍之士争奮為之赴戰者令嚴而必行也呉起之論兵也以為一軍之中必有虎賁之士力輕扛鼎足輕戎馬若此之等選而别之可以擊倍者士勇而用命也故兵無死令之士而將無用命之人必敗之道也則今日之軍政在諸將豈可以不嚴而今日之吏士在諸將豈可以不選哉原守論方恬用兵之道戰欲暇守欲豫戰非暇則不力守非豫則不固暇生於豫豫生於戒惟戒而後可以擇勝故我利則動不利則止善戰者常使制勝在乎我而不使制勝在乎敵敵未至而先戒敵將至而先備敵已至而先勝寓守於戰藏戰於守敵雖衆可使不得鬭敵雖銳可使不得犯敵雖出吾之不意可使不得乘善兵者藏於𠖇𠖇故敵莫知其聲動於黙黙故敵莫知其極夫惟敵不能知則制勝在我矣天下之勢譬之操斧先制其柄則伸縮進退莫不在我何則恃吾先有以待之也凡兵以有待勝以應卒敗非至於應卒而後敗也蓋宿敗也未戰而敗之證先形矣善戰者之於兵不使之至於應也非不欲應也懼其奪於彼也故奪於勢則不得應奪於機則不暇應奪於人則不能應奪於氣則不敢應以勢之不得而乘機之不暇以人之不能而因氣之不敢如是則茫然而無以應事至於茫然而無以應則將泛然而應之救之於東而喪之於西扶之於左而迫之於右舉一事而百弊起掩一方而四面病徘徊四顧而其力已屈其勢已窮嗚呼吾見其殆矣昔尹公洙之論兵也以為䇿之長在於戰與守䇿之失在於禦與救何也戰則暇救則不暇守則豫禦則不能豫也敵至而後命將兵交而後濟師則吾之勝勢已與敵共之矣故敵逸而我勞敵主而我客敵静而我譁則制勝不在我矣兵法曰善戰者致人而不致於人又曰善陳者不戰夫使敵自至而我不勞則不戰在我矣故兵之使敵不得與吾戰者三先奪其所愛而不得與吾戰先奪其所恃而不得與吾戰先奪其所忌而不得與吾戰夫惟敵至而不得與吾戰則不可勝在我矣不戰在我然後戰必勝守必固矣禁衛論澹菴自古禁衛之兵大㮣有四有以宰相而領之者有以宿將而領之者有以宗室而領之者有以外戚而領之者晉嘗以外戚而領禁衛矣羊琇典職十三年其計得也然漢上將軍禄相國産以肺腑之親握兵柄幾為劉氏之禍漢嘗以宰相領禁衛矣周勃一入北軍卒安其計得也然唐昭宗誅宦官以崔嗣判六軍十二衛適以啓東遷之難漢嘗以宿將領禁衛矣李廣程不識俱東西衛尉其計得也然王叔文以故將范希朝為左右神䇿以奪宦者權適以兆僖宗幸蜀之危漢嘗以宗室領禁衛矣東牟朱虚宿衛長安共誅禄産其計得也然唐昭宗畏藩臣跋扈以嗣覃王允典神䇿而興平五十四軍一日俱潰適以啟李茂正犯闕之變則宰相外戚宿將宗室又若不可以領宿衛矣是大不然安危在出令存亡係所任任得其人則羊琇之謹審周勃之重厚程李之忠肅東牟朱虚之赤心雖處禁司不嫌於握兵之重任非其人則禄産之險賊何取於外戚崔嗣之昏庸何取於宰相嗣覃王之駑材何取於宗室希朝之淺謀何取於故將故夫典禁衛者不必外戚得如羊琇則可不必宰相得如周勃則可不必宗室得如東牟朱虚則可不必宿將得如程李則可此漢武所以肅建章之衛而唐太宗所以嚴諸衛之軍誠知夫禁衛之不可輕也雖然漢武肅建章之衛其亡也兵移於奸臣太宗嚴諸衛之軍其亡也兵移於宦官兵移於奸臣其禍遲兵移於宦官其禍速方漢之季曹操於相府自置領軍後改為中領軍乃使韓浩史􅀈同領禁衛自是忠臣義士耘除畧盡靈獻之間北面朝者拱而觀變漢魏何擇焉彼見宗廟社稷之無與也執太阿而用其穎以司一世之命則漢之亡非既亡而後知也禁衛之權一移於奸臣之手而天下之勢去矣然而靈獻猶擁虚器而曹操亦終身腹毒而色取仁及丕而易漢姓者其禍遲也唐之季始以禁衛假魚朝恩既又以假竇文場已而又以假焦希望夫䕶軍中尉中䕶軍皆古官也當時假寵奄寺兵奪於内亂訌於外李茂正一犯闕則殺一中尉王行瑜一犯闕則殺一宰相韓建一犯闕則歸十六宅殺十一王自是朱全忠之難作於肘腋天子無一人之衛昭宗不終其身而唐已亡其禍速也禍之遲速不同而其亡同一轍故曰吾恐季孫之憂不在顓㬰誠有味其言哉作原禁衛機論一方鑑軒事以銳而奮亦以銳而惰銳宜不惰也而銳之終則惰繼之何也氣銳而功不隨也古之大有為者不憑氣以舉事以事不集則惰繼之矣衝風之衰不能起羽漂流之餘不能蕩芥勢固有所窮也故明主折其氣而不使之窮蓄其銳而待之而不肯輕用其鋒故其銳不挫而其鋒不可犯何者彼固有以養其銳也至陽之潜於九淵也葉焉者零波焉者冰凄焉者慄而不知其温然者之將復也逮其乆也温然者蓊然於下勃然而達於上劃然而為雷則惰者肅懦者悚蟄者伸甲而拆萌而達者無不遂生而如意蓋其復之也漸故其蓄之也厚其出之也遲故其震也驚不銳於其始而銳於其終怯於前而勇於後静於乆而動於卒天下之事惟其發於卒然者人之所不能料也髙帝之為漢王也項羽奪之闗中而不敢争驅之南鄭而不敢怒帝非真能下人也而隐忍不校以就蜀漢之封者所以安羽而求出於其不意也迨夫漢中之席未温而三秦之師已舉鴻溝之約方成而垓下之圍已合帝於此何其銳也夫惟其始也不銳故其終也獨勇帝之始非真不銳所以養其銳而就大事也故夫人主之為天下不病其怯而病其勇不取其銳而取其堅盖銳者其氣也堅者其志也髙帝曰吾意欲東耳安能鬱鬱乆居此乎此髙帝之志也天下之事無必為之志而徒恃其輕為之勇無先定之謀而欲求速成之效愚未見其能濟也何者輕為者不量力而欲速者不知變故也方今天下其可有為之時邪未可有為之時邪以為可以有為也則未見其可為之機以為未可有為也而將遂不為邪則愚未見可如此而遂已也古者敵國相持其為䇿有二而已可戰則戰不可戰則守過是無䇿焉其所謂守者非不戰之謂也先為戰備以待其可戰者也故以戰則勝以守則固戰則天下莫能支守則天下莫能窺惟其先莫之窺也是以一發而莫之支也今也以為戰而忘於戰以為守而懈於守在彼既有可勝之形在我亦無不可勝之備則亦僅自立耳嗚呼以今日事勢其將大有為邪其欲僅自立而已邪如其志不止於僅自立也則今日之所以待敵者愚不知其故也愚雖不肖竊嘗妄論當今之故以為今日之失在於志太銳術太疎舉事太輕責效太速此天下之事所以顛倒錯亂而無所成就符離之舉非不銳也愚獨歎其疎而恨其失於太早也雖然符離之事既已往矣則夫後日之事豈可不先為之謀而復蹈其轍也哉機論二鑑軒今天下之大勢不戰而勝者為上䇿戰勝而能有其地者為中䇿戰勝地闢而不能堅守之者為下䇿故内修政事者上䇿也復闗中者中䇿也取河南者下䇿也所謂上䇿者愚前所謂正論之書其説備矣然所謂復闗中為中䇿者何也愚非以為東兵不可進取也亦非不知帝京祖宗舊都所宜先復也而曰復闗中為中䇿者何也非以事論也以勢論也天下之事勢之所不便者雖英雄有所不敢争而勢之所當先者此明智之所力攻而無疑者也自古至今事變之興亦多途矣然大抵攘羣盜者則先據其㑹而對大敵者必扼之於險夫人惟其易與也是以可疾驅而争先為其難圖也是以可乘便而自固是故擊蛇者奮臂於夷塗而刺虎者先據於要地何則其勢不同也是故敵小則併兵以乘其卒敵大則斂兵以襲其懈乘其卒則敵不能抗敵不能抗則一舉而墟其國襲其懈則敵不及慮敵不及慮則一戰而分其勢用兵之道敵小則銳於一舉敵大則審於一戰一戰不勝後難救也戰有五易勝則戰必勝則戰有所恃則戰有大利則戰不得已則戰不得已而戰者死地也凡戰之道有不量力而與戰者一死地是也自不得已而上未有勝負不可必而輕與人戰者也光武之中興也而首事於河北曹公之争天下也先據於許兖二君一舉事而遽與羣雄角者彼與争馳於中原者皆非其敵故也天下之事譬如有物衆雜而取之則力争者獲必多兩分而有之則直奪者未必得是故縱獵者必於獸駭之時而刺虎者必於負嵎之際髙帝之取天下與光武曹公異也光武以勇戰怯曹公輕戰髙祖持重非他也勢也項籍之據梁楚虎而負嵎者也帝不與之争於梁楚而固守成臯未嘗與之交鋒也而韓信之師已翺翔於燕趙矣彼其所争者不争而争其所不争者何也彼以梁楚不可一戰而遂有也是以乘便而疾趨於其不意不攖其前而竊出其後不戰其膺而斷其臂髙帝之斃項籍武帝之困匈奴同一術也今天下之勢兩淮者盖吾之成臯闗中者盖吾之燕趙也以愚之計莫若重兵戍兩淮精兵取闗中而别以輕兵援河洛重兵所以守精兵所以戰守者務為不可敗而戰者務為必可勝東兵脅之以其聲西兵掩之以其實而輕兵之趨河洛者則撓之以張其勢聚重兵於東而脅之以聲所以疑敵也敵疑則其備於東者必力備於東者力而我持重而不戰則勝負之勢未有所决兩勢相持而勝負不决則兵不可解兵不可解則備於西者必輕而吾精兵之向闗中者可以乘虚而入矣然後悉荆襄之兵連西蜀之甲數道並進以趨闗中可一戰而定也既得闗中然後出闗搏戰東向以臨天下當此之時天下大勢在南不在北矣機論三鑑軒愚之計必欲重兵戍兩淮何也愚故曰聚重兵於東而脇之以聲所以疑敵也曷為而必脇之以聲也所以成吾西討之計也或曰成吾西討之計則善矣曷為不東西齊舉而東兵獨専於守也應之曰東兵可以必有功而不能必其不敗也可以復河南而不能保其不復失也然則河南不可取乎曰可取而不可守也古之善兵者不攻不可有不取不可守攻而不可有謂之棄士取而不可守謂之棄功兵以勢攻以形守勢者有所不擊而敵不能拒也形者有所不戰而敵不能争也故戰以勢合守以形固形之不足恃者則守之有不能堅也地之所必争而不能使敵之不能争則知兵者不輕處之矣河南者盖敵之所必争而不能使敵之不能争也易奪而難有易定而難集易乘而難固易得而難備是故梁汴者天下之戰場也車徒之所必由馬蹄之所交道環地而守之而兵之向某城者四面而至雖有墨子之技吾知其不能固也非不能固也能固而不能持乆也東晉之初祖逖嘗據譙矣黄河以南盡為晉土逖死未幾而旋失之宋文之初嘗北伐矣取碻磝取虎牢取滑臺取洛陽而卒不能有是何也河北之未平則河南不可留而處夫以新定未集之勢而當河北悍堅之虜以驟勝乆暴之師而嬰欻起四合之鋒雖湯武臨之未保其全勝也昔陳宣帝嘗取彭汴矣而王喜以為棄舟楫之功踐車騎之地去長就短非呉人所便喜之意非以彭汴為不可取也以為取之易而守之難也國家往日符離之舉未為全失也而獨首事於河南則愚以為計之疎也而又東兵决䇿進取西師堅持不戰故東兵敗退而西師無功者失於西師之不出而東兵之獨進也昔商浩連年北伐而師屢敗元温一出而幾定闗中王元謨平蕩河南旋即敗退而栁元景進攻潼闗所向皆捷非人謀之不同也盖東西異勢也舉兵以攻人而不能數道並進使敵勢不分而萃於一道非計之得也誠使當時内外叶謀數道併力乘利伺便東西掩擊未有不勝也就使東兵小衂而西兵必大捷矣不能出此而詢謀不僉議論不一進退異意一前一却此所以自困歟愚故曰失於西師之不出而東兵之獨進也愚嘗觀天下之勢以為今日之事東兵宜緩戰而西師利竒襲宜緩戰則持重隂伺而有所置而不取利竒襲則乘間大出而疾趨於其不意東兵則示之以攻而實出於守西兵則形之以守而實出於戰東兵則以竒而用吾之正西兵則以正而出吾之竒使敵不測吾之所為而不知為吾之備則墮吾計中矣不此之思而趨夫敵所必争之地此愚所以謂計之疎也古文集成巻三十六
