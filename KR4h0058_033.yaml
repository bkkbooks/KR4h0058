body:
  text: 古文集成卷三十三宋王霆震編前戊集三論爭臣論韓退之東萊批意勝反題格迂齊批此篇是針規攻擊體是反難文字之格當以范司諫書相兼看或問諫議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其德而善良者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不色喜雖說他好已自開難他一端在此居於位五年矣視其德如在草野此句便含不諫意彼豈以富貴移易其心哉愈應之曰是易所謂恆其德貞而夫子凶者也取易斷有力惡得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事陽城不出時如此蹇之六二則曰王臣蹇蹇匪躬之故陽城既出時如此夫亦以所居之時不一而所蹈之德不同也若蠱之上九居無用之地而致匪躬之節蹇之六二在王臣之位而髙不事之心雖分兩段此幾句亦自應回則冒進之患生曠官之刺興志不可則尤之不終無也今陽子實一匹夫在位不為不久矣此一句最有力以匹夫為諫官天下所望如何聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政含蓄下意視政之得失若越人視秦人肥瘠忽焉不加喜戚於其心綱目露於此問其官則曰諫議也問其祿則曰下大夫之秩也問其政則曰我不知也責得他最深引證陽城不可不諫有道之士固如是乎哉且吾聞之兩端說有官守者不得其職則去有言責者不得其言則去今陽子以為得其言乎哉得其言而不言與不得其言而不去無一可者也一段關鎖大抵難文字須教他不可逃難自前難到此都無辭了陽子將為祿仕乎又設兩段說古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也意收於此又就此轉主意蓋孔子嘗為委吏矣嘗為乘田矣舉小形大亦不敢曠其職都避不得必曰㑹計當而已矣必曰牛羊遂而已矣若陽子之秩祿不為卑且貧章章明矣而如此其可乎哉不可逃避或曰否非若此也又設難夫陽子惡訕上者惡為人臣招音翹其君之過而以為名者故雖諫且議使人不得而知焉解書曰爾有嘉謀嘉猷則入告爾后於內爾乃順之于外曰斯謀斯猷惟我后之德夫陽子之用心亦若此者愈應之曰又難若陽子之用心如此兹所謂惑者矣入則諫其君出不使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隱於蓬蒿之下段段重起說主上嘉其行誼擢在此位官以諫為名說陽子職在此而非宰相之職誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僣賞從諫如流之美枝葉相生有經緯庶巖穴之士聞而慕之束帶結髮願遊於闕下而伸其辭說致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也又生一意或曰陽子之不求聞而人聞之不求用而君用之不得已而起守其道而不變解何子過之深也愈曰又難自古聖人賢士皆非有心求於聞用也意新閔其時之不平人之不乂一段意起于此得其道不敢獨善其身而必兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇暖而墨突不得黔證一段之意彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者也耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也最警䇿切當之尤者意有餘辭意俱到且陽子之不賢則將役於身以奉其上矣若果賢則固畏天命而閔人窮也惡得以自暇逸乎哉一段意結歸此一句或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於德而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子其亦聞乎左成十八年愈曰君子居其位則思死其官未得位則思修其辭以明其道引前說後我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺此意更好傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及已陽子將不得為善人乎放他一著應結從前難到此已極了末後須用放他一著蓋陽子在當時畢竟是個賢者大抵文字須當抑揚若作漢唐君臣文字先須取他長處后說他短處先須取他長處自子告我下是諫官論王安石以賢治不肖以貴治賤古之道也所謂貴者何也公卿大夫是也所謂賤者何也士庶人是也同是人也或為公卿或為士何也為其不能公卿也故使之為士為其賢於士也故使之為公卿此所謂以賢治不肖以貴治賤也今之諫官者天子之所謂士也其責則天子之三公也惟三公於安危治亂存亡之故無所不任其責至於一官之廢一事之不得無所不當言故其位在卿大夫之上所以貴之也其道德必稱其位所謂以賢也至士則不然修一官而百官之廢不可以預也守一事而百事之失可以毋言也稱其德副其材而命之以位也循其名傃其分以事其上而不敢過也此君臣之分也上下之道也今命之以士而責之以三公士之位而受三公之責非古之道也孔子曰必也正名乎正名也者所以正分也然且為之非所謂正名也身不能正名而可以正天下之名者未之有也蚳蛙為士師孟子曰似也為其可以言也蚳蛙諫於王而不用致為臣而去孟子曰有言責者不得其言則去有官守者不得其守則去然則有官守者莫不有言責有言責者莫不有官守士師之諫於王是也其諫也蓋以其官而已矣是古之道也古者官師相規工執藝事以諫其或不能諫謂之不恭則有常刑蓋自公卿至於百工各以其職諫則君孰與為不善自公卿至於百工皆失其職以阿上之所好則諫官者乃天子之所謂士耳吾未見其能為也俟之以輕而要之以重非所以使臣之道也其俟已也輕而取重任焉非所以事君之道也不得已若唐之太宗庶乎其或可也雖然有道而知命者果以為可乎未之能處也唐太宗之時所謂諫官者與丞弼俱進於前故一言之謬一事之失可救之於將然不使其命已布於天下然後從而爭之也正觀政要求諫篇王圭曰云云太宗稱善自是宰相入內平章國計必使諫官隨入預聞政事君不失其所以為君臣不失其所為臣其亦庶乎其近古也今也上之所欲為丞弼所以言於上皆不得而知也及其命之已出然後從而爭之上聽之而改則是士制命而君聽也不聽而遂則是臣不得其言而君恥過也臣不得其言士制命而君聽二者上下所以相悖而否亂之勢也然且為之其亦不知其道矣及其諄諄而不用然後知道之不行其亦辨之晚矣或曰周官之師氏保氏司徒之屬而大夫之秩也曰嘗聞周公為師而召公為保矣周官則未之學也朋黨論歐公東萊批議論出人意表大凡作文妙處須出意外臣聞朋黨之說自古有之平說惟幸人君辨其君子小人而已大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也解上意然臣謂小人無朋驚人句惟君子則有之應後句其故何哉小人所好者祿利也所貪者財貨也當其同利之時暫相黨引以為朋者僞也及其見利而爭先或利盡而交疏則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者僞也應前句君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之僞朋用君子之真朋則天下治矣一篇大意警䇿有力處堯之時小人共工歡兜等四人為一朋下得好說少君子八元八凱十六人為一朋下得好舜佐堯退四凶小人之朋而進元凱君子之朋應前堯之天下大治及舜自為天子過接處而臯䕫稷契等二十二人並列於朝更相稱美更相推讓凡二十二人為一朋說多而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以此亡國周武王之臣三千人為一大朋而周用以興警䇿有力後漢獻帝時盡取天下名士囚禁之目為黨人及黃巾賊起漢室大亂後方悔悟盡解黨人而釋之然已無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士或投之黃河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗之世然皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二人舜亦不疑而皆用之此㸃化處皆提起說如人反說話然而後世不誚舜為二十二人朋黨所欺而稱舜為聰明之聖者以能辨君子與小人也下得好上幾句說有力若無一句承得有力亦􅑫然譬之千鈞一眇未承之則腰折了下一句須有力周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周有力然周用此以興者善人雖多而不厭也夫興亡治亂之迹為人君者可以鑒矣尤有力五代史朋黨論歐陽公東萊批文忠公歐陽修五代史最得春秋之法蓋文忠公學春秋於胡瑗孫復故褒貶謹嚴雖司馬子長無以復加奈何五十二年之間皆戎狄亂華君臣之際無赫赫可紀之功業故張子韶云歐公五代史其間議論多感歎又多設疑蓋感歎則動情設疑則意廣此作文之法嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉豫嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以夸耀於世又讀梁實録見文蔚等所為如此未嘗不為之流涕也夫以國與人而自夸耀及遂相之此非小人孰能為也漢唐之末舉其朝皆小人也而其君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡夫欲空人之國而去其君子者必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者故常寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指為朋黨耳故其親戚故舊謂之朋黨可也交遊執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨見善者必相薦引薦引則謂之朋黨使人聞善不敢稱則人主之耳不聞有善於下矣見善不敢薦則人主之目不得見善人矣善人日逺小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之說也一君子存羣小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志而無所不為則漢魏唐梁之際是也故曰可奪國而子人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之說人主可不察哉傳曰一言可以喪邦者其是之謂歟可不鑒哉可不戒哉續朋黨論蘇東坡歐陽子曰小人欲空人之國者必進朋黨之說嗚呼國之將亡此其兆歟禍莫大於權之移人而君莫危於國之有黨有黨則必爭爭則小人者必勝而權之所歸也君安得不危哉何以言之君子以道事君人主必敬之而疏小人惟豫言而莫豫違人主必狎之而親疏者易間而親者難睽也而君子者不得志則奉身而退樂道不仕小人者不得志則徼幸復用惟怨之報此其所以必勝也蓋嘗論之君子如嘉禾也封殖之甚難而去之甚易小人如惡草也不種而生去之復蕃世未有小人不除而治者也然去之為最難斥其一則援之者衆盡其類則衆之致怨也深小者復用而肆威大者得志而竊國善人為之掃地世主為之屏息譬斷蛇不殊刺虎不斃則傷人其愈多矣齊田氏魯季孫是已齊魯之執事莫匪田季之黨也歷數君不忘其誅而卒之簡公弒昭哀失國見左傳及史記世家小人之黨其不可除也如此而漢黨錮之獄後漢黨錮傳唐白馬之禍五代史唐六臣傳序云云又李振傳云云忠臣義士斥死無餘君子之黨其易盡也如此使世主知易盡者之可戒而不可除者之可懼則有瘳矣且夫君子者世無若是之多也小人者亦無若是之衆也凡才智之士鋭於功名而嗜於進取者隨所用耳孔子曰仁者安仁智者利仁未必皆君子也冉有從夫子則為門人之選從季氏則為聚斂之臣唐栁宗元劉禹錫使不陷叔文之黨栁宗元傳劉禹錫傳其髙才絶學亦足以為唐名臣矣昔欒懷子得罪於晉其黨皆出奔樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃亦子之勇也左襄二十一年嗚呼宣子蚤從王鮒之言豈獨獲二子之勇且安有曲沃之變哉左襄二十三年愚以謂治道去泰甚耳苟黜其首惡而貰其餘使才者不失富貴不才者無以致憾將為吾用之不暇又何怨之報乎人之所以為盜者衣食不足耳農夫市人焉保其不為盜而衣食既足盜豈有不能返農夫市人也哉故善除盜者開其衣食之門使復其業善除小人者誘以富貴之道使隳其黨以力取威勝者蓋未嘗不反為所噬昔曹參之治齊曰謹無擾獄市獄市姦人之所容也本傳知此亦庶幾於善治矣姦固不可長而亦不可不容也若姦無所容君子豈久安之道哉牛李之黨遍天下而李德裕以一夫之力欲窮其類而致之必死此其所以不旋踵罹仇人之禍也本傳姦臣復熾忠義益衰以力取威勝者果不可邪愚是以續歐陽子之說而為君子小人之戒古文集成卷三十三
