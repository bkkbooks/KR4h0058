body:
  text: 古文集成卷二十四宋王霆震編前丁集三劄用君子保泰道劄子元祐六年上王巖叟臣聞論者曰致天下之泰難守天下之泰易臣獨曰天下之泰致之易守之難蓋方其未也莫不急於求賢渴於聞諫得一善惟恐未之能行見一不善惟恐未之能去潜心於隱微而用意於人之所不到兢兢業業不敢暇豫故卒至於安樂而無事此天下之泰所以致之易也既泰矣我尚何求哉心日益驕志日益怠謂賢者足矣而忽於求謂善言盡矣而厭於聽謂患之隱者為不足慮謂事之微者為不足防姦生而不知禍變而不悟故卒至於敗亂而莫之救此天下之泰所以守之難也易曰君子安而不忘危存而不忘亡治而不忘亂又既濟之象曰君子以思患而豫防之此皆聖人戒懼於治安無患之時也伏惟陛下臨御七年于兹進賢去佞協天下之公興利除害同百姓之欲無淫刑無橫斂不聞一夫有怨嘆之聲姦宄不作兵革不試時和嵗豐海內寧謐以古驗今可謂泰矣陛下又所以守之者有道無宫室之好無聲樂之玩無畋遊之樂無神仙之惑無干戈之喜私謁不行苞苴絶迹百王之蔽乃無一焉進學勤政寒暑不渝德日以新天下之勢固已不憂矣而臣尚區區若此亦何心哉以謂今日之治不易至此臣愚誠過計竊憂朝廷恬於無事稍怠初心或容小人乘間而隳我泰道為陛下惜耳夫小人而無能不足畏也惟小人而材然後可畏正在陛下審問之深考之明辨之謹遏之不使小人得以雜其間必擇端良忠信不二之君子而用之則今日所以保泰道者至矣備矣陛下以純一之德守于上羣臣以純一之意守于下使泰道日長而無窮天下無患臣不勝大願留劉摯蘇轍劄子王巖叟通鑑長編元祐六年十月樞密王巖叟言不為一劉摯蘇轍為陛下惜腹心之人難得宣諭曰劉摯排斥奸邪殊有功朕極重之乃聞與邢恕柬延接章惇子弟巖叟曰惇使摯分付宰相亦牢籠不得言事官未必皆忠直聞楊畏乃惠卿面上人知被用意安在但欲去除陛下腹心之人便是與姦邪開道路耳時有詔草麻制罷摯而巖叟未知初太皇太后獨遣中使得轍入省供職十一月摯為觀文殿學士知鄆州切以為天下國家者必藉腹心之臣腹心之臣非一日可得得而用之必加保全勿使讒邪得以雜間則忠於事君者知所勸矣腹心之舊尚或不保則後來之人何可倚信況腹心既虛外邪可入乃必然之理也臣之所憂實在於此摯與邢恕通簡及接見章惇子弟蓋其思慮所不周防慎所不嚴之罪也謂牢籠為後日之計則願陛下更加體照摯與蔡確不惟仇怨深切非小小禮數施其黨人可以宛轉收確之心兼臣每見摯感戴寵榮常有以死報國家之意豈復肯負陛下此真陛下腹心之臣也今大奸未死人心危疑朝廷之上與之為敵者摯為首焉一旦以小愆遂將疏棄天下之人不知所以皆妄意陛下之心有所變易反與大姦報仇也前日陛下用摯作宰相姦黨之氣自然消伏今待罪纍日羣邪相顧已復增氣蘇轍之進大約相類皆正人之所繫望而姦黨之所忌嫉者也顧其去就豈不重哉今所犯者小所繫者大幸陛下於輕重之間更賜較量則陛下所得者多矣夫姦邪難防自古公患莫不因人主意有所動急為傾擠陛下於此不可不察切聞楊畏乃吕惠卿門人及受張璪知過最深舒亶作中丞日舉為臺官前者再除御史公議沸騰交章排斥命遂不行自此忿嫉正人常有報復之志後又因趙君錫無所執持為人所使再三薦引竟除此職諫官虞䇿亦是張璪面上相知之人嘗受璪特力論薦陛下試將此本末考究還可保其所懷無他意否臣惓惓之心常恐巧言有誤陛下故不避煩瀆委曲聞奏願陛下於聽言之際加意鑑察使不能以疑似之罪誣陷善良而陰與姦邪為地則不勝社稷天下之甚幸且摯轍之留於臣無所利而利在陛下摯轍之去於臣無所害而害貽國家但臣忝聮近輔久荷異恩見聞所及不敢不竭其愚論左右無雜邪正劄子元祐五年六月上蘇子由言行録公使契丹還為御史中丞自元祐初革新庶政至是五年矣一時人心已定惟元豐舊黨分布中外多起邪說以搖撼在位吕微仲與中書侍郎劉革老二人尢畏之皆持兩端為自全計遂建言欲引用其黨以平舊怨謂之調亭宣仁居疑不决轍于延和面論其非退復以劄子論之奏入宣仁后命宰執于簾前讀之仍諭之曰蘇轍疑吾君臣遂兼用邪正言極中理諸公相從和之自此參用邪正之說裒矣切觀元祐以來朝廷改更弊事屏逐羣枉上有忠厚之政下無聚斂之怨天下雖未大治而經今五年中外帖然莫以為非者惟奸邪失職居外日夜窺伺便利規求復進不免百端遊說動搖貴近臣竊憂之若陛下不察其實大臣惑其邪說遂使忠佞雜進於朝以示廣大無所不容之意則冰炭同處必致交爭薰蕕共器久當遺臭朝廷之患自此始矣昔者聖人作易內陽外陰內君子外小人則謂之泰內陰外陽內小人外君子則謂之否蓋小人不可使在朝廷自古而然矣但當置之於外每加安存無失其所不至憤恨無聊謀害君子則泰卦之本意也昔東晉桓溫之亂諸桓親黨布滿中外及溫死謝安代之為政以三桓分蒞三州彼此無怨江左遂安故晉史稱安有經逺無競之美然臣切謂謝安之於桓氏亦用之於外而己未嘗引之於內與之共政也向使安引桓氏而置諸朝人懷異心各欲自行其志則謝安將不能保其身而況安朝廷乎頃者一二大臣專務含養小人為自便之計既小人內有所主故蔡確邢恕之流敢出妄言以欺愚惑衆及確恕被罪有司懲前之失凡在外臣僚例蒙摧沮盧秉何正臣皆身為待制而明堂薦子止得選人蒲宗孟曽布所犯明有典法而降官禠職惟恐不甚明立痕迹以示異同為朝廷斂怨二者皆過矣故臣以為小人雖决不可任以腹心至於牧守四方奔走庶事各隨所長無所偏廢寵祿恩賜常使彼此如一無迹可指此朝廷之至計也近者朝廷用鄧溫伯為翰林承旨而臺諫雜然進言指為邪黨以謂小人必由此彚進臣嘗論溫伯之為人粗有文藝無大惡但性本柔弱委曲從人方王圭蔡確用事則頤指如意及司馬光吕公著當國亦脂韋其間若以其左右附麗無所損益遇流便轉緩急不可保信誠不過也若謂其懷挾姦詐能首為亂階則甚矣蓋臺諫之言溫伯則過至為朝廷逺慮則未為過也臣願陛下謹守元祐之初政久而彌堅謹用左右之近臣無雜邪正至於在外臣子以恩意待之使嫌隙無自而生愛戴以忘其死則垂拱無為安意為善愈久而愈無患矣乞不推治黨人劄子范純仁言行録前蔡確坐詩語譏訕簾中臺諫章疏交上必欲朝廷誅殛宰執侍從皆為當然公獨以為不可遂於簾前開陳方今聖朝宜務寬厚不可以語言文字之間曖昧不明之過誅竄大臣今日舉動宜與將來為法式此事甚不可開端也宰臣奏蔡確黨人甚盛不可含糊不開公面奏以為朋黨難辨却恐誤及善人此事正宜詳審不可容易繼入奏曰云云公初與諸公議蔡確之命惟左丞王存與公相協是日上前方開陳論列之際諸公畫可皆不顧公而先退公獨留身因揖王存上前論之益堅宣仁怒卒貶確新州言者交章擊公黨確公遂以疾請外即日以公知潁昌府王存知蔡州又聞見録云元祐三年有吳處厚者以蔡確題安州車蓋亭詩來上以為謗訕宣仁太后得知怒曰蔡確以吾比武后當重謫吕汲公為左相不敢言忠宣乞薄確罪不從初議貶確新州忠宣謂汲公曰此路荆棘已七八十年吾輩開之恐自不免汲公又不敢言忠宣因乞罷政切以朋黨之起蓋因趣向異同同我者謂之正人異我者疑為邪黨既惡其異我則逆耳之言難至既喜其同我則迎合之佞自親以至真僞莫知賢愚倒置國家之患何莫由斯至如王安石自負學術即非全無智識止因喜同惡異遂至黑白不分引吕惠卿為大儒黜司馬光為異黨至今風俗猶以觀望為能後來柄臣固合永為商鑒恭惟仁宗皇帝政教施設實為帝王之師從諫慎刑任賢容衆與陛下今日之政相同慶厯中先臣仲淹與韓琦富弼同時大用歐陽修石介以夏竦姦邪因以嫉其黨類遂起大謗誣先臣與琦弼有不臣之心歐陽修尋亦坐罪石介幾至斫棺其時朋黨之論大起識者為之寒心上賴仁宗容覆使兩黨之隙帖然自消此事至今以為美談陛下聞之必熟則是仁宗所行陛下可以取為成法今蔡確之罪自有國家典刑不必推治黨人旁及枝葉臣聞孔子曰舉直錯諸枉能使枉者直則是舉用正直而可化邪枉為善人矣又曰舜有天下舉皋陶不仁者逺則是舉用仁者而不仁者自當屏迹矣何煩分辨黨人或恐有傷仁化而況陛下聖度包荒與天同德至公克己今古無儔前來特降詔書盡釋臣僚往咎不復究治恐纍太和自此內外反側皆安上下人情浹洽盛德之事誠宜久行臣心拳拳實在于此仰惟皇慈深加采納乞開言路劄子元祐元年七月上時為給事中上官均切聞比下詔書慰安中外今日以前凡宿姦舊惡一切置而不問臺諫仍不得彈治臣始聞之疑惑不信數日以來搢紳士人傳者愈衆以為信然臣以不肖備位風憲聞而不陳則為隱情疑而不論則為曠職仰負陛下任使之意臣切推詔旨必以為前日黜去一二大吏姦諛刻深掊斂罔上之臣恐黨與反側無自全之意故為此詔以慰安之臣以為賞罰者人主之大柄所以示天下之公議使為善者勸為惡者懼要在處之至當斷之必行而已若懲一二奸臣而以同類恐懼為疑又為善辭以慰勞之則是行姑息之政非所以信賞罰而示天下之公議也不知陛下以前日斥去一二姦諛險陂之臣為是邪為非邪以為非邪則命出之日天下之士莫不心悅而誠服皆以為陛下聰明睿智洞照枉直不當疑其非也以為是邪則去邪勿疑不當惑而中止為姑息之政也夫諫官御史以言為職至於政事之得失人臣之邪正凡係天下之利病理亂者皆得上聞所以廣朝廷之耳目而通天下之情也自古求治之君導之使言戒其鉗默者有矣未聞預白曰某事當言某事不當言如天下之事必待詔許而後得言則諫官御史為徒設而天下之事朝廷有所不得聞矣陛下臨御之初詔四方士人下及芻蕘之賤皆得上議朝政下言利病是時天下之人莫不歡欣鼓舞罄竭所聞以禆日月之明而又歌頌詠嘆以為陛下有寬明從諫之實今日之詔乃戒言職有所不得彈治倘或有之實恐上纍陛下從諫之美異乎前日開闢言路之意也方今法度未為完具生民未為充富內有未舉之政事外有未賔之夷狄實朝廷廟堂孜孜夙夜講求利害博採衆言之時若使諫官御史上觀朝廷之旨次窺大臣之意中心菀結所懷有不得論列天下之事有不得上達恐非朝廷之福也若陛下以為宿愆舊惡務欲蓋覆許以洗心自新則言者有謫發細故不足深治者陛下置其言而勿用可也誠恐不當預戒以有所不得彈治仰纍陛下從諌納言之美臣愚欲乞追寢詔書以副前日開言路之意古文集成卷二十四
