body:
  text: 古文集成卷四十八宋王霆震編前庚集二銘九成臺銘東坡韶陽太守狄咸新作九成臺玉局散吏蘇軾為之銘曰自秦并天下滅禮樂韶之不作蓋千三百二十有三年其器存其人亡則韶既已隱矣而况於人器兩亡而不傳雖然韶則亡矣而有不亡者存蓋嘗與日月寒暑晦明風雨並行於天地之間世無南郭子綦則耳未嘗聞地籟也而况得聞天籟使耳聞天籟則凡有形有聲者皆吾羽旄干戚管磬鞄弦嘗試與子登夫韶石之上舜峯之下望蒼梧之渺莾九疑之聮綿覽觀山川之吐吞草木之俯仰鳥獸之鳴號衆竅之呼吸往來唱和非有度數而均節自成者非韶之大成乎上方立極以安天下人和而氣應氣應而樂作則夫所謂蕭韶九成來鳳皇而舞百獸者既已粲然畢陳于前矣三槐堂銘東坡迂齊云太宗始欲相王晉公祐公請以百口保符彥卿不反忤太宗意遂不相親戚有惜之者曰吾雖不做兒子二郎必做二郎文正公旦也發明天人意好又批序文理致甚長然亦人所可到至於銘詩則不可及矣學者須是看了序文且掩卷默想銘文當如何下語却來看他所作方有長進天可必乎賢者不必貴仁者不必夀從史記伯夷傳來天不可必乎仁者必有後二者將安取𠂻哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盜跖之夀孔顔之厄此皆天之未定者也松柏生於山林其始也困於蓬蒿厄於牛羊而其終也貫四時閲千歲而不改者其天定也善惡之報至於子孫則其定也久矣吾以所見所聞而考之其可必也審矣轉入下一腳國之將興必有世德之臣議論說晉公厚施而不食其報好然後其子孫能與守文太平之主共天下之福說文正公此數語義理甚長而於王氏尤親切故兵部侍郎晉國王公顯於漢周之餘歷事太祖太宗文武忠孝厚施天下望以為相而公卒以直道不容於時不食其報蓋嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗皇帝於景德守文祥符太平之間朝廷清明天下無事之時與守文太平之主共享其福享其福祿榮名者十有八年今夫寓物於人明日而取之有得有否而晉公修德於身責報於天取必於數十年之後如持左契交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公以直諌事仁宗皇帝出入侍從將帥三十餘年位不滿其德天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣真不相上下而栖筠之子吉甫其孫德裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福蓋未艾也懿敏公之子鞏與吾遊好德而文以世其家吾是以録之銘曰嗚呼休哉起頭便逈别魏公之業與槐俱萌言種槐即是種德封植之勤必世乃成既相真宗四方砥平歸視其家槐隂滿庭言成之速吾儕小人朝不及夕相時射利皇恤厥德庶幾僥幸不種而獲不有君子其何能國接有力王城之東晉公所廬鬱鬱三槐惟德之符若以為功名之符則淺了嗚呼休哉正平堂銘山谷畏首畏尾不自尊已牽於勢放於利虐鰥寡以奉高明是謂不平忠不足而詐有餘躬不行而責從令是謂不正夫平者如執權衡以司重輕如天四時不言自行夫正者渴飲而饑食冬裘而夏葛喜怒豫奪由已而不由物故行天下而不屈靈龜負圗告人吉凶刳腸在前中黑如漆揚子耄毛思配寧蘧涪翁為銘周旋其樞陋室銘劉禹錫山不在高有仙則名水不在深有龍則靈斯是陋室帷吾德馨苔痕上階緑草色入簾青談笑有鴻儒往來無白丁可以調素琴閲金經無絲竹之亂耳無案牘之勞形南陽諸葛廬西蜀子雲亭孔子云何陋之有書室銘誠齊室不厭虛書不厭整牖不厭明几不厭淨君子資之君子師之四物敢侮非天疇欺我躬匪户我性匪牖莫整莫虛心有弗疚叢書銘并序樽齊清江鄉貢進士鄒師韓揭其家孰曰叢書屬余為記余適坐官紛而師韓又怵於歸立須不容冥搜姑從省文法而為銘曰萬物華前或耽以娛君豈惡華而易以書問書幾何淆籖亂裛姑撮其概經史子集君味其間經辟則醪至史子集漉餘而糟吾書六經吾道一貫以書視經猶物之玩况吾書外復以他亂君曰太初併經則無文字生焉精粗已俱一非不足萬非有餘吾齊吾名吾何擇夫精粗文冢銘并序劉蛻東萊注唐之劉蛻於平生作文傳二千一百八十紙不肯棄其草聚而封之曰文冢謂其所以工於文者天之助至於不能自振而見知於人者是不獲助於人也於是銘於兜率之寺云在梓州兜率寺文冢者長沙劉蛻復愚為文不忍棄其草聚而封之也蛻愚而不鋭於用百工之技天不工蛻也而獨文蛻焉故飲食不忘於文晦冥不忘於文悲戚怨憤疾病嬉遊羣居行役未嘗不以文為懷也適當無事而天下將以文為號文明代生殖明晦皆效文用故日月星辰文乎旗常昆蟲鳥獸文乎彛器徐方之士文於侯社夏翟之羽文於旌旄登龍於章升玉於藻百工婦人雕礱涂涷即練字出周禮以供宗廟祭祀之文豈獨蛻也生知效用不及時文哉然而意常獲助於天而不獲助於人故其雖窮無憾也當勤意之時不敢嚏不敢咳不敢唾不敢跛倚嗜欲躁競忘之於心其祗祗畏畏如臨上帝故有粲如星光如貝氣如蛟宫之水又有黯如屯雲如久隂如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如海運如震怒動蕩怪異夫十為文不滿十如意少如意則豈非天助乎常欲使天下聞之而必行觀之而必蹈散之茫洋以為道演之浸淫以及物然後為農文之使風雨以時兵文之使戎虜以順文於野文於市使其所隱之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲人助乎嗚呼十五年矣實得二千一百八十紙有塗者乙者有注楷者有覆背者有朱墨圍者於是以周易筮之遇復震下坤上之同人離下乾上筮者曰鳴于地中殷殷隆隆七日而復復來而天下昭融乎他日更召龜而合將聽襲吉卜於火如秦兆秦焚書惟曰不吉卜於水不成乎河洛兆周公相宅則亦惟曰不吉卜於木而悶悶上協吉纍纍為冢則汲之兆乎汲冢書峭峭為壁則魯之兆乎孔壁書且其占曰土之文為山河為華英將不崩不竭為滋味而傳乎結為丘陵為其設險乎融為川瀆率其朝宗乎華為百榖以潔祭祀之粢盛乎不然使其速腐為虛壤生芻藁以食牛羊乎化塗泥為陶甄以作器乎將塊為五色而茅社分封乎流於樂為土鼓為凷苦怪切桴以泄其和聲乎夷為都邑以興宫廟乎坎為汙池以澤生殖乎祀為壇竈乎窽為井墓乎吾皆不得而知也當既不為吾用唯速化為百工之用慎無朽為芝菌以怪人自媚慎無堅為金鐡以作貨起爭慎無潏為醴泉以味乎諂口慎無禱為城社以狐鼠慿妖慎無聳為良材以雕琢傷性慎無萌為蘭茝以佩服見藝嗚呼介而為石使之能言舒而為蚓使之飲泉既而他年遊魂之未返者亦命巫師而弔三招之號曰在几閣而來歸兮掩為塵垢在耳目而來歸兮奄視汝醜在口吻而來歸兮譽不汝久噫筆絶之年而麟見崇文其無崇乎唅非珠玉斂無裙𥜗後世詩禮之儒無驚吾之幽墟其冢也在莾蒼之野大塊之丘莊子儒以詩禮發冢大儒曰東方作矣事之若何小儒曰未解裙𥜗口中有珠詩有曰青青之麥生於陵坡生不布施死何含珠推控其頥别其頰無傷口中珠時有唐大中丁卯而戊辰之季秋銘曰文乎文乎有鬼神乎風水惟貞將利其子孫乎洗玉池銘東坡復齊謾録云洗玉池銘始豫讀之皆不得其說其後得李伯時石刻叙跋乃能明其意蓋元祐八年伯時仕京師居紅橋子弟得峽川馬臺石愛而置之山中一日東城過而謂曰斫石為沼當以所藏玉時出而浴之且刻其形於四旁豫為子銘貝唇而號曰洗玉池而所謂玉者凡一十有六雙琥璏三鹿盧帶鈎琫珌瑑杯水蒼佩螳蜋帝鈎佩刀柄珈瑱拱璧是也伯時既下世池亦湮晦徽宗嘗即其家訪之得於積壤中其子碩以時禁蘇文因濳磨去銘文以授使者於是包以䄄褥棲於髹匣舁致京師置之宣和殿十六玉惟鹿廬環從葬龍眠餘者咸歸內府矣東坡銘刻與伯時叙跋昔雖有之今乃亡去而池亦歸天上惜其本末不著因存亡苕溪漁隱曰洗玉池銘云維伯時父云云至以幸斯石固已叙其事矣復齊以謂始豫讀之皆不得其說何也世忽不踐以用為急秦漢以還龜玉道熄六器僅存周官大宗伯以玉作六器以禮天地四方如蒼璧黃琮青圭赤璋白琥元璜是也五瑞莫輯公侯伯子男之圭璧趙璧婦玩史記藺相如傳趙王遣相如奉璧入秦秦王喜乃傳示諸美人魯璜盜竊左定八年經書盜竊寶玉大弓謂陽虎也杜預云寶玉乃夏后氏之璜鼠亂鄭璞戰國䇿應侯曰鄭人謂玉未理者為璞周人謂鼠未臘者為朴周人懷朴過鄭賈曰欲買朴乎鄭賈曰欲之出其朴視之乃鼠也因謝不取鵲抵晉棘鹽鐡論崇禮篇云昆山之旁以玉抵烏鵲抵擲也言玉之多晉棘即垂棘之璧維伯時父弔古啜泣道逄玉人解驂推食劔璏鏚珌錯落其室既獲拱寶遂空四壁哀此命世久就淪蟄時節沐浴以幸斯石注見前孰推是心施及王國如伯時父琅然環玦援手之勞終睨莫拾得喪在我匪玉欣戚和仲父銘之維以咏德公一字和仲見墓志采石征舍銘淡庵掩耳盜鍾閉目捕雀自欺其心謂人不覺咄哉揚沙此溪之鱷古文集成卷四十八
