body:
  text: 古文集成卷四十宋王霆震編前已集二論正統論陳后山統者一也一天下而君之王事也君子之所貴也吾於詩春秋孟子見之也周南自風而雅王者之事也召南自家而國諸侯之事也公羊子曰王正月者大一統也孟子曰伊尹孔子得百里之地皆能朝諸侯而有天下也夫正者以有二也非謂得之有正與否也天下有二君子擇而與之所以致一也不一則無君無君則人道盡矣吾於中説見之也王子曰中國有一聖人明之中國有並聖人除之夫列國並力而不相尚君子必致於一者不欲天下一日而無君也吾於春秋見之也詩降於風書絶於文侯之命則天下無王矣春秋所以作也天下無王而正月必書王者所以君之也由周而上天下為一學者所不論也由周而下至於五代其所論者五焉有其位而不一者東周是也有天下而無位者齊晉是也有其統而為閏者秦新是也無其統而為偽者魏梁是也上無所始下無所終南北是也正之説有三而其用一三者天地人也天者命也天與賢則賢天與子則子非人所能為也故君子敬焉地者中國也天地之所合也先王之所治也禮樂刑政之所出也故君子慕焉人者德功也德者化也功者事也故君子尚焉一者義也可進則進可黜則黜而統有歸矣吾於詩與春秋見之也西伯諸侯也君子與其王平桓周之餘而君子奪其王也隱公攝位而先君之元子君子與其君也桓公世子也王與諸侯大夫國人君之而王法之所討君子黜之文王西夷之人秦與吳楚戎蠻也君子進而中國之也杞夏裔也君子斥而夷狄之也自周之東夷於諸侯其所有號爾故詩降而書絶之君子蓋有待也夫詩降而書絶則天下無周矣王者可以作也而卒無以代之徒以先王之世天下須君而復與之豈君子所欲哉桓文一中國却外夷出民水火之中有功矣而天命未改故管仲不得而革也夫周存之者天也文武之澤也黜之者人也天下之法也此周與齊晉之辨也秦之昭襄始亡周而臣諸侯及始皇又合六國而為一而學者不以接統豈不已甚矣哉以秦之暴疾之可也而不謂天下為秦可乎奪之其誰與哉新莽漢之盜也而漢討之是猶夏之窮羿衛之州吁而齊之無知也而學者疑其年吾於春秋見之也魯昭公之失國寓於諸侯而季氏服君之服行君之事者七年君子以其前繫之昭其後繫之定則以元始屬之建武其可矣此秦新之辨也三國之一吾於續書見之也漢中邦之舊也劉葛之所造也君子之所尚也而地則四隅也德逺而功邇君子不得而私焉吳魏皆有志於天下又皆有功於民而魏則中州也於是與之其得已乎此曹魏之辨也自晉而下則為陳陳亡於隋則有終自隋而上則為魏魏而上為燕趙趙繼晉者也晉之亡猶秦也非人亡之也舉天下而棄之智者得之而謂之逆乎其事則漢唐其名則霸其義則雖非桓文亦晉之罪人也則有始石氏羯也慕容氏鮮卑也然居中國之位有中國之民而行中國之政矣是猶書之秦春秋之吳楚也燕趙不為夷而謂魏為狄乎南北之變吾於元經見之也晉之東猶漢也屬而繼宗古之制也其所以貴者以中土之無代也君子因其舊而與之猶周也皇始授魏進之也天也而帝晉者人也魏可貴而未貴晉可賤而未賤故君子待之也待之者待其定也晉宋有其志又有其功而魏未有以勝之武文沒而孝文興於是南北定矣故宋亡而帝魏也孝建之後可以奪矣而君子不忍者武文之澤也故因其亡而取之或曰魏假之華齊梁陳斥之蠻無乃悖乎曰夷而變雖未純乎夏君子進之也夏而變猶未純乎夷君子斥之也矧其純乎孔子曰一日克已復禮天下歸仁而不考其素善其變也又况終身由之者乎色斯舉矣而不察其著惡其變也又况言弗行乎此南北之辨也學者擬梁於新而唐非其族也且其取之奪也非討也吾於春秋見之也楚比盜也而棄疾殺之君子書之曰公子棄疾殺公子比以情不以迹也梁之存猶魏也此朱梁之辨也吾於正統質之經以定其論資之公以濟其義折衆説之枉而歸諸正庶乎其可也國勢論陳止齋天下之勢其立也難成其成也難變故強不易弱而弱者不易遽強太公之治齊周公之治魯雖數十世之子孫而先覩其強弱之形者蓋其積非一日也故夫積強之後雖甚懦者處之而其烈猶未可以犯積弱之久雖甚武者處之而其流亦未能以頓起昔者秦祖七世之君扼六國之吭而奪之地至於始皇夷名城芟傑士係百粵之頸而走胸奴天下之立者無不側足而懼也二世以庸暗承之而山東之豪傑競起以投其罅雖嬴氏不得再傳而其救亡奔命之師猶足以斃周章蹶魏咎潰陳兵覆田項何者其強猶故也李唐之世自中睿不綱而天下趍弱漸矣而極乎天寶之變肅宗克復兩京而不能翦河北之盜德宗收洛博定魏地而不能俘孤窮之田悅一軍大變軍奪氣沮専以姑息稔藩鎮之驕至於憲宗海內八九為唐有矣其殘孽之存者尚頡頑自若也而死於肘腋之禍嗚呼數君者非不鋭而斷也而無救於唐衰者何也其弱久也蓋嘗論秦人之勢如康強之人空中立僵而其手足便利耳目聰明猶未可狎而侮之唐之勢如人之血氣疲薾筋力頓萎雖其脈氣猶夀而亦不能以復壯故凡善處天下之強弱者不以亟而以緩其欲敝人之強也不嬰其猶鋭之鋒而欲堅守徐伺以隂入其隙欲振其國之弱則亦不悻然而忿以徼成功日夜淬礪以作其氣厚其力而後舉此酈生張良之所以謀秦而李訓鄭注之徒所以失之而促唐之不永也髙帝之入秦也酈生憂其瓦合之卒徑入虎口而勸其盤礴陳留之間至其戰嶢關張良亦以秦未可輕試宜堅壁以陷其將需其懈而後擊之敝人之強其術固如此也訓注之徒不知唐勢之弱而欲浮躁躑躅盡擊閹宦以收朝廷之權而倡佯於天下謀未成而腰領已入於刑餘之手嗚呼有天下者不幸而以久弱之國當積強之冦宜以食其留侯之䇿處之無出於李鄭之謀以自取天下之笑恢復論上止齋自古爭天下常易收天下者常難唐人有言神堯以一旅取天下後世子孫不能以天下取河北嗟夫是亦其勢然也夫以匹夫而爭天下與失天下而收之者其勢甚不相若也凡人之情輕於用人之所有重於用已之所愛輕則勇重則怯何者非吾有而用之雖失之於吾無損也其勢烏得不勇以其所愛而用之一或不濟則併亡之矣其勢不能無怯此爭天下與收天下之所以異也昔漢髙帝資三尺之任五載而成帝業且秦以虎狼之強猶數世而合之漢獨何其鋭也蓋髙帝崛起豐沛之微無寸土為之階兵秦兵也粟秦粟也城邑秦之城邑也驅非已之民食非已之粟而收非已之城邑故得肆意而為之降數十郡而喪之不恨也捐數千里以授三將不惜也睢水之逃滎陽之脫濵於死而不衰也以匹夫而爭天下其幸而集則帝王不幸而不集吾如彼何哉髙帝亦不得不勇為之矣晉元之南渡也撫江都之勝兼吳會之饒亦足以奮矣而沒齒不能侵歸疆之咫尺者非他也其心愛夫一隅之可以自託惴惴然惟恐夫用之而併失之也故曰是亦其勢然也三代以後中興之功莫易於光武豈光武獨能也哉蓋其勢亦髙帝之勢而光武亦以其髙帝為之也嗚呼後之人主不幸而失天下之全顧得為漢之光武猶幸而獨得天下之半乃止於晉之元帝亦孰能處元帝之勢而以光武用之也哉恢復論下止齋處晉元之世而以光武用之者未必學光武也亦有所棄而已矣大抵不有所棄不能有所就有志於取天下者特未可深留而固閉之也以天下之大深留而固閉之雖守之不足况於攻乎哉髙帝之所以踣項氏者以其棄燕齊於韓信劉備之不能一駕於魏者以其不棄吳於孫氏也方信之虜魏豹也請益兵三萬北舉燕趙東擊齊帝灑然與之不吝也及其破厯下也請自王之帝幾誤矣良平附耳一語帝翻然置之不爭也嗚呼何帝之明於前而良平善料之於其後也且帝以五諸侯之兵顛頓於滎陽成臯之間帝不脫者屢矣帝之力果能遂并齊哉假如帝之能并齊項氏亦躡而奪之矣三秦之事可見矣以燕齊之壤綿亘萬里而為楚得之則楚全而漢孤嗟夫楚全而漢孤則漢之不敵楚決矣孰若棄之於信使之自戰其地自兼其衆而又自王其國時出而佐我則項氏必不能捨相持之漢而東矣羽之使龍且救齊也非不勇於自行也有漢王者在也則夫棄齊於信所以錮項氏於不能進退之域分其力而弱其權也漢之帝也信實掎角之歟劉備亦一時之傑也而其志不若髙皇之大且蜀之讎莫若於魏而其力之不能有吳亦明矣蜀之急於吳者失也使其掃巴蜀之甲趍於江陵一舉而兼之則曹氏肯拱揖之而授之蜀哉是以其勢必爭爭則便且強者勝是蜀之併吳所以資魏也斃吳而踣魏蜀能自為蜀哉故莫若使吳自吳與之權而併力於魏方權之請降也其機至矣因其欲降而德之權之所以奮於魏也以吳蜀之二當魏之一其力足以舉魏蹙魏而圖吳未晚也惜乎其不棄於孫氏而更生一敵是以卒無所成夫不忍棄之而委之為敵人之資取天下者為之哉昔祖逖之渡江也晉之中興其兆成矣而元帝不棄之逖遽使戴若思代之嗚呼君子是以知晉之不能西也固本論方鑑軒為天下者不可使天下無錙銖之利亦不可使天下無錙銖之姦夫使天下利無錙銖之遺而姦無錙銖之遁宜若天下之可以大治也而天下之心益怨而日離天下之俗益詐而日偷則天下之勢固不可不少寬之也昔者堯舜之世民不知德其君亦不知有其吏三代之民知德其君矣而未知德其吏也降及後世則民知德其吏矣夫不知德其君而德其吏者吏仁其民也吏仁其民而民愛之民愛其吏而因以不忘君則吏者君民之所恃以固結者也又降而後世則吏毒其民矣吏毒其民則民怨之然民怨其吏而猶不以咎其君嗚呼天下之民至於與吏為怨焉極矣猶幸而不至於咎其君也與吏為怨焉而不止則將移其怨於君天下之民至於移其怨於君則亦極矣極而不止愚未見其可以久安而無危也昔者秦之亡也其吏皆與民為怨者也非特其吏與民為怨也其君亦與民為怨者也天下之怨極而秦亡秦亡漢興而循吏之稱於時者始班班而可考逮光武入洛之初漢之遺黎一見司𨽻威儀而涕泣思漢雖髙文宣帝愛民之功而吏亦不為無助也書曰豫臨兆民凜乎若朽索之馭六馬天下之心如此其難固也而吏又從而毒之其能不解乎是以古之為天下者循循焉撫摩其民而溫暖之日夜選練其百官奬用仁愛之民而汰斥其無良者而役之則有時斂之則有限不得已而刑罰加焉則時有所貸以致其寬凡此者皆所以繫天下之心也昔趙簡子使尹鐸為晉陽尹鐸曰以為繭絲乎以為保障乎簡子曰保障哉尹鐸損其户數及智氏之難沈竈産蛙人無叛意彼固有以得此於民也嗟夫後世之吏繭絲者衆矣古文集成卷四十
