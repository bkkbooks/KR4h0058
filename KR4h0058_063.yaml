body:
  text: 古文集成卷六十三宋王霆震編前壬集二蔡氏皇極經世指要曰大傳曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業其法自一而二自二而四自四而八實則太極判而為陰陽陰陽之中又有陰陽出於自然不待智營而力索其叙首乾而尾坤者以陰陽先後為數也朱子曰右繫辭曰易有太極是生兩儀兩儀生四象四象生八卦邵子曰一分為二二分為四四分為八也說卦傳曰易逆數也邵子曰乾一兌二離三震四巽五坎六艮七坤八自乾至坤皆得未生之卦若逆推四時之比也後六十四卦次序放此邵伯溫曰康節先君曰孔子曰天地定位山澤通氣雷風相薄水火不相射天地定位則乾與坤對也山澤通氣則艮與兑對也雷風相薄則震與巽對也水火不相射則離與坎對也乾之初交於坤之初得震故為長男坤之初交於乾之初得巽故為長女乾之二交於坤之二得坎故為中男坤之二交於乾之二得離故為中女乾之上交於坤之上得艮故為少男坤之上交於乾之上得兑故為少女乾坤大父母也故能生八卦復姤小父母也故能生六十四卦復之初九交於姤之初六得一陽姤之初六交於復之初九得一隂復之二交於姤之二得二陽姤之二交於復之二得二隂復之三交於姤之三得四陽姤之三交於復之三得四隂復之四交於姤之四得八陽姤之四交於復之四得八隂復之五交於姤之五得十六陽姤之五交於復之五得十六隂復之上交於姤之上得三十二陽姤之上交於復之上得三十二隂隂陽男女皆順行所以生六十四卦也此伏羲之易也蔡氏指要曰大傳曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也其法自子中至午中為陽初四爻皆陽中前一爻皆隂後二爻皆陽上一爻為隂二爻為陽三爻為隂四爻為陽自午中至子中為隂初四爻皆隂中前二爻為陽後二爻為隂上一爻為陽二爻為隂三爻為陽四爻為隂在陽中上二爻則先隂而後陽陽生於隂也在隂中上二爻則先陽而後隂隂生於陽也其叙始震終坤者以隂陽消息為數也原卦畫晦庵古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情易有太極是生兩儀兩儀生四象四象生八卦朱子曰大傳言包犧畫卦所取如此則易非獨以河圖而作也蓋盈天地之間莫非太極隂陽之妙聖人於此仰觀俯察逺求近取固有以超然而默契於其心矣故自兩儀之未分也渾然太極而兩儀四象六十四卦之理已粲然於其中自太極而分兩儀則太極固太極也兩儀固兩儀也自兩儀而分四象則兩儀又為太極而四象又為兩儀矣自是而推之由四而八由八而十六由十六而三十二由三十二而六十四以至于百千萬億之無窮雖其見於摹畫者若有先後而出於人為然其已定之形已成之勢則固已具於渾然之中而不容毫髮思慮作為於其間也程子所謂加一倍法者可謂一言以蔽之而邵子所謂畫前有易者又可見其真不妄矣世儒於此或不之測往往以為聖人作易蓋極其心思探索之巧而得之甚者至謂凡卦之畫必由蓍而後得其誤益以甚矣蔡氏指要曰八卦重而為六十四卦一卦之上各有八卦也實則自八而十六自十六而三十二自三十二而六十四也大傳曰因而重之爻在其中矣者是也此陰陽流行之數前三十二卦為陽後三十二卦為陰古往今來者也邵伯溫曰先君曰先天圖者伏犧八卦也伏犧八卦即有六十四卦蓋上世聖人皆有易作用不同其道一也今之易經文王之易也故謂之曰周易伏犧之易無文字語言獨有卦畫次序而已孔子於繫辭實述之矣圓者為天方者為地天地之理皆在是也朱文公曰右伏犧四圖其說皆出於邵氏蓋邵氏得之李之才挺之挺之得之穆修伯長伯長得之希夷先生陳摶圖南者所謂先天之學也此圖圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南此二者隂陽對待之數圓於外者為陽方於中者為隂圓者動而為天方者靜而為地者也天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之邵子曰此一節明伏羲八卦也八卦相錯者明交相錯而成六十四也數往者順若順天而行是左旋也皆已生之卦也故云數往也知來者逆若逆天而行是右行也皆未生之卦也故云知來也夫易之數由逆而成矣此一節直解圖意若逆知四時之謂也朱文公曰以橫圖觀之有乾一而後有兌二有兌二而後有離三有離三而後有震四有震四而巽五坎六艮七坤八亦以次而生焉此易之所以成也而圓圖之左方自震之初為冬至離兌之中為春分以至於乾之末而交夏至焉皆進而得其已生之卦猶自今日而追數昨日也故曰數往者順其右方自巽之初為夏至坎艮之中為秋分以至於坤之末而交冬至焉皆進而得其未生之卦猶自今日而逆計來日也故曰知來者逆然本易之所以成則其先後始終如橫圖及圓圖右方之序而已故曰易逆數也蔡氏指要曰一動一靜之間者易之所謂太極也動靜者易所謂兩儀也陰陽剛柔者易所謂四象也太陽太陰少陽少陰少剛少柔太剛太柔者易所謂八卦也太陽日暑性目元皇太隂月寒情耳㑹帝少陽星晝形鼻運王少隂辰夜體口世伯少剛石雷木色嵗易少柔土露草聲月書太剛火風飛氣日詩太柔水雨走味辰春秋蔡氏指要曰動者為天天有隂陽陽者動之始隂者動之極隂陽之中又各有隂陽故有太陽太隂少陽少隂太陽為日太隂為月少陽為星少隂為辰是為天之四象日為暑月為寒星為晝辰為夜四者天之所變也暑變物之性寒變物之情晝變物之形夜變物之體萬物之所以感於天之變也靜者為地地有柔剛柔者靜之始剛者靜之極剛柔之中又有剛柔故有太剛太柔少剛少柔太柔為水太剛為火少柔為土少剛為石是為地之四象水為雨火為風土為露石為雷四者地之所以化也雨化物之走風化物之飛露化物之草雷化物之木萬物之所以應於地之化也暑變走飛草木之性寒變走飛草木之情晝變走飛草木之形夜變走飛草木之體雨化性情形體之走風化性情形體之飛露化性情形體之草雷化性情形體之木天地變化參伍錯綜而生萬物也萬物之感於天之變性者善目情者善耳形者善鼻體者善口萬物應於地之化飛者善色走者善聲木者善氣草者善味蓋其所感應有不同故其所善亦有異至於人則得天地之全暑寒晝夜無不變雨風露雷無不化性情形體無不感走飛草木無不應目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味蓋天地萬物皆隂陽剛柔之分人則兼備乎隂陽剛柔故靈於萬物而能與天地參也人而能與天地參故天地之變有元㑹運世而人事之變亦有皇帝王伯元㑹運世有春夏秋冬為生長收藏皇帝王伯有易書詩春秋為道德功力是故元㑹運世春夏秋冬生長收藏各相因而為十六皇帝王伯易書詩春秋道德功力亦各相因而為十六十六者四象相因之數也凡天地之變化萬物之感應古今之因革損益皆不出乎十六十六而天地之道畢矣故物之巨細人之聖愚亦以一千百千四者相因而為十六千千之物為細物千千之民為至愚一一之物為巨人一一之民為聖蓋人者萬物之最靈聖人者又人倫之至也自天地觀萬物則萬物為萬物自太極觀天地則天地亦物也人而盡太極之道則能範圍天地曲成萬物而造化在我矣故其說曰一動一靜天地之至妙歟一動一靜之間天地人之至妙歟一動一靜之間非動非靜而主乎動靜所謂太極也又曰思慮未起鬼神莫知不由乎我更由乎誰所謂範圍天地曲成萬物造化在我者也蓋超乎形器非數之能及矣雖然亦數也伊川先生曰數學至康節方及理康節之數先生未之學至其本原則亦不出乎先生之說矣古文集成卷六十三
