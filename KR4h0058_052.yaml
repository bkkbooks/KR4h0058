body:
  text: 古文集成卷五十二宋王霆震編前庚集六銘進齋銘淡庵為王允元作騏驥一躍不能十步駑馬十駕騏驥避路稽天之潦不能終食泰山之溜可以穿石或進或止功用相百如何弗思半途而畫在易之晉如日之升自昭其德進麗大明在易之漸如鴻之翔惟進以正可以正邦明則不惑正則不諂學當觀晉仕當觀漸吾友允元超然默識觀晉觀漸兩造其域人亦有言進猶有畛有畛則極極則有盡回也屢空孰究畔岸請師子淵以退為進充齋銘誠齋人皆玉其廬莫或玉其軀人皆榖其腹莫或榖其德爾胡弗思爾則不資孰降之衷孰秉其彛有降靡竭有秉靡奪有覿靡哲天以人滅睨柯匪柯曽是逺而操存舍亡曽不反而推之而充何垤弗崇充之而實何穡弗銍績之幽幽織之油油言製其秋其衣其裘萬室燠只爾弗鞠只爾弗朂只東方旭只裕齋銘誠齋零陵嚴慶之齋以裕名而屬豫銘之豫蓋德於狹而心於懼者也將焉取裕抑敢不銘以與吾友共守之銘曰肇允民彛靡哲靡蚩則外是移而裏斯隳孰窶其脂執嗇其豐盍其反而裕哉厥躬崇崇天如若日伊煌富以萬生光施八荒仁以覺之敬以握之維其學之是以穫之乃蓽乃門則孟顔氏于經于理將不姚姒盈而沖諸伊其冦而沖而盈諸豈其授而匪授匪冦匪新匪舊人見我新我若而人我其裕矣我其怙矣怙心驕驕其裕日消瑞乙孫子孔聖孔神而好是問可自用云齋房靚如夙圖宵書弗性其性有如百聖絅齋銘西山衣錦褧衣裳錦褧裳有美于中而弗自章云乎昔人若是其晦為己之功無與乎外懍焉戒愓于隱于微我欲亡愧匪蘄人知充實光輝其積莫掩而我之心惟一韜斂細人有善汲汲暴揚敝緼中悶文錦外張孰知聖門回愚參魯朴兮若無至美森具中庸之末凡八引詩聲臭泯然繇此其基淵乎旨哉聖學之妙入德之門曰惟至要猗歟王子日處斯齋益深益微古人與偕時齋銘篔窗為趙汝闕作銖根寸莖中涵天機或遲而茂或蚤而萎方其未苞千罌莫汲及其既蕚萬户莫蟄寧為故柏毋為新蕖委順知化溶溶太虛魯齋銘撙齋為宗弟曽鼎臣作維目之初大明如矇維耳之末大聵如聰窮性源流與耳目同參丱而巾渾沌未鑿液金之礦文木之朴爐鎚斧斤遽手俄閣漢唐諸儒孰全吾元強牖厥蔀愈昭愈昏家法心傳有仍雲孫揭齋曰魯惟祖時憲問魯淵源大朴方寸况於魯中而更立論孝十八章魯膚幾重忠恕一唯魯骨皆融勉哉魯齋余觀汝功殖齋銘山谷以心為田我耒耜之慈祥弟友種而茂之忠信不貪苖而立之敦厚敬恭水而耰之師友琢磨耔而耨之先王遺言又時雨之仁義有年左右取之相彼寒窶我則與之奉以饗帝神其吐之耘齋銘龍川為剡中任氏兄弟作人生而靜動則有遷非物使之人心則然耳目鼻口實動之權聖踐而聖賢治而賢稿木不生死灰不然甚活者人鳶魚天淵敬而無失奉以周旋喜怒哀樂又何惡焉士之於學農之於田朝斯夕斯舍是奚安去其害苖則心之偏耘之又耘嘉種易捐不計其人惟其不虔不虔不力誤我豐年工貴其久業貴其專凡爾君子相與勉旃顔樂亭銘明道為孔周翰作天之生民是為物則非學非師人覺孰識聖賢之分古難其明有孔之遇有顔之生聖以道化賢以學行萬世心目破昏為醒周爰闕里惟顔舊止巷汙以榛井堙而圯鄉閭蚩蚩弗視弗履有卓其誰師門之嗣追古念今有惻其心良價善諭發帑出金巷治以闢井泄而深清泉澤物佳木成隂載基載落亭曰顔樂昔人有心豫忖豫度千載之上顔惟孔學百世之下顔居孔作盛德彌光風流日長道之無疆古今所常水不忍廢地不忍荒嗚呼正學其何可忘蒙泉銘撙齋歲在癸巳石湖居士范至能為劉晞韓題其所遊息之亭曰蒙閲四年廬陵曽丰原居士意而為銘曰汶山壓兮彼迸者泉汶泉迸兮彼瀦者淵浩莫自制漫焉平川道學淺深蓋源流然大川三百孟軻所傳至荀揚韓小川三千孔子則海衆水聚焉子亭誰題筆大於椽渠機子參有象皆筌今也發明到秋毫顛婦姑勃磎不蒙下鞭行矣收視未開闢前混沌七竅不蒙不天天耶蒙耶如盤走圜小有礙則玩余銘鐫讀書樓銘南軒洪惟元聖研幾極深出言為經以逹天心天心煌煌聖謨洋洋有赫其傳惠我無疆嗟哉學子生乎千載孰謂聖逺遺經猶在孰不讀書而昧厥旨章句是鑿文采是事矧其所懷惟以祿利茫乎四馳其曷豫暨嗟哉學子當知讀書匪有所為惟求厥初厥初惟何爾所固然因書而發爾知則全維誦維歌維究維復維以泳遊勿肆勿梏維平乃心以會其理切于乃躬以察以體積功既深有燁其明逈然意表大體斯呈聖豈豫欺實發豫機俾豫自知以永于為若火始然若泉始逹推之自兹進孰豫遏若登泰山益高益崇維理無形維經無窮嗟哉學子盍敬念兹以是讀書則或庶幾藏書閣書厨字號銘晦庵於穆元聖繼天測靈出此謨訓惠我光明永言寶之匪金厥籝含英咀實百世其承傳心閣銘南軒惟民之生厥有彛性情動物遷以隳厥命惟聖有作純乎天心修道立教以覺來今孰謂道逺始卒具陳俾爾由學而聖可成鄒魯云邈章句有師一經皓首語道則迷惟子周子崛起千載獨探其源以識其大立象盡意闡幽明微聖學有傳不曰在兹惟二程子實嗣其徽既自得之又光大之有渾其全則無不總有析其精則無不中曰體曰用著察不遺曰隱曰顯莫間其幾於皇聖心如日有融於赫心傳來者所宗有屹斯閣尤溪之濱翼翼三子繪事孔明儼然其秋溫然其春揭名傳心詔示後人咨爾後人來拜于前起敬起慕永思其傳于味其言于考其為體于爾躬以會其歸爾之體矣循其至而爾之至矣道豈異而傳心之名千古不渝咨爾後人無替厥初明倫堂銘晦庵天敘有典匪學弗明我作此堂大猷是經匪忠曷勸匪孝曷程咨爾學子永觀厥成西孰銘誠齋為寧行之作衛俞之族有西其孰維學之麓維子之淑咨爾子孫于弟于昆洗心雪神明聽話言我築我廬爾羣爾居有易春秋有詩有書琴在在牖書在在手爾誦爾弦以復爾有爾有伊何伊孝伊忠伊義伊仁于玉爾躬雞既鳴矣爾夙爾起日之夕矣爾膏爾燬具體維淵聽視動言維禮為塗雄趍聖門命世維孟盡心知性俯蹴百氏仰承三聖匪孟匪顔于跂于攀瞻彼數仞譬而登天潛而未徹如攻堅木徹而莫禦如泉赴谷由心而身由身而親由親而君氣志如神咨爾孫子爾聆爾思非道𢎞人室是逺而省庵銘誠齋人無鑑銅當鑑以身人無鑑身當鑑以心一善之萌鬼神知之非鬼神之知吾心已知一不善之作海鷗亦覺非海鷗之覺吾心已作知之斯行吾心吾朋怍之斯絶吾心吾鉞孰鉞孰朋省則勇而朋亡鉞喪省則縱而以省攻昧維聖作對以昧翳省擲植觀井參省以日吾省以時參省以三吾省千之維聖無過維賢寡過欲寡未能吾其敢惰講座銘晦庵師道絶塞以圯其居今其言言亦莫我敢都前聖後師文不在兹如或見之有行其思立之堂壇惟以有嚴厥臨孔昭式訛爾瞻葵軒石銘南軒為張氏作正爾衣冠毋惰爾容謹爾視聽毋越爾躬爾之話言式循爾𠂻爾之起居式蹈爾庸敬爾所動毋窒其通貞爾所存毋失其宗外之云肅攸保于中中之克固外斯率從天命可畏戒懼難終勒銘于石用警爾慵虛舟銘西山萬斛之舟不楫不維浟浟長川縱其所之云誰有船適與之觸舟本何心奚怨奚讟德人天遊其中休休我無愛憎物自春秋雨露零零孰知其德雪霜凝凝豈曰豫刻伯氏無尤季平見思懷哉兩賢心事可師紛紛小夫欲蔽私窒森然戈矛動與物敵涪翁有言吾誰踈親子今自名豈其後人世塗漫漫濤激浪洶往安子行萬變勿動古文集成卷五十二
