body:
  text: 古文集成巻十六宋王霆震編前丙集二書上宰相書韓愈西山批按公三上書今獨取此以其論周公之待士反復委折可為作文之法故耳然以公之賢而急於仕進如此亦可惜也迂齋批以周公與當時之事反覆對説而求士之緩急居然可見雖是退之切於求進然亦如此愈聞周公之為輔相急於見賢也方一食三吐其哺方一沐三握其髪當是時天下之人才皆已舉用姦邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻在荒服之外者皆已賔貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徴嘉瑞麟鳳龜龍之屬皆已備至而周公以聖人之才憑叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使反前其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髪為勤而止哉又進一步不待吐握矣惟其如是故於今頌成王之徳而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賓貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徴嘉瑞麟鳳龜龍之屬豈盡備至其所求進見之士雖不足以希望盛徳至一作如比於百執事豈盡出其下哉其所稱説豈盡無所補哉今雖不能如周公吐哺握髪亦宜引而進之察其所以而去就之不宜黙黙而已也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉一有閣下其亦察之六字古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之於魯於魯不可則去之於齊於齊不可則去之宋之鄭之秦之楚也精采今天下一君四海一國舍乎此則夷狄矣去父母之邦矣囘䕶善救首尾故士之行道者不得於朝則山林而已矣山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈毎自進而不知愧焉書亟上足數及門而不知止焉寜獨如此而已惴惴焉惟恐不得出大賢之門下是懼亦惟少垂察焉與孟簡尚書書韓愈東萊批此一篇須㸔大開合迂齋批出脱孟子是自出脱推尊孟子亦是自推尊文字抑揚格來示云吕本作愈白䝉惠書云却無此三字有人傳愈近少信一無信字奉釋氏者此傳之者一無上四字妄也潮州時有一老僧號大顛頗聰明識道理逺地無所可與語者故自山召至州郭留十數一作百十日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要且自一無自字胸中無滯礙一無自胸中無滯礙六字自以為難得因與往來及祭神至海上遂造其廬及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子云丘之禱乆矣吕云自此是作文凡君子行已立身自有法度吕云承上警䇿立兩句聖賢事業具在方册吕云解上意可效可師仰不愧天俯不愧人内不愧心吕云語健立身行已兩句熟有此一句上兩句新積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎豈弟君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍福一作祟非守道君子之所懼也况萬萬無此理且彼佛者果何人哉吕云再喚起其行事類君子邪類小人邪吕云設兩端若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祗昭布森列非可誣也吕云辭語壯又肯令其鬼行胸臆作威福於其間哉進退無所據而信奉之亦且惑矣吕云闗鎻上兩意且愈不助釋氏而排之者亦有説吕云平鋪兩意孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明聖賢之道不明則三綱淪而九法斁音妬敗也禮樂崩而夷狄横下孟切幾何不為禽獸也故曰能言距楊墨者聖人之徒也揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢將數百年吕云欲反難孟子以至於秦卒滅先王之法燒除經書坑殺學士天下遂大亂吕云見楊墨害深及秦滅漢興且百年尚未知修明先王之道吕云不得不重説其後始除挾書之律吕云輕説過稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公吕云不公字最下得好二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也吕云下字詞自此以下直至篇末無限曲折宛轉意方足當通作一篇㸔孟子雖聖賢不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也上面説孟子許多未盡只此一句轉了筆端有千鈞之重吕云此生一段難孟子然其中乃意與辭不與乃説孟子無功處然向一作苟無孟氏則皆服左袵而言侏離矣吕云難二百來字只作兩三句救起最警䇿處此上一句破前頭數百句侏音朱侏離蠻夷語聲也故愈嘗推尊孟氏以為功不在禹下者為此也推尊孟子亦是為自已張本吕云救起孟子漢氏以來羣儒區區修補百孔千瘡隨亂隨失其危如一髪引千鈞綿綿延延寖以㣲滅吕云下得好之見不勝佛老害警䇿於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣吕云不仁字最下得好釋老之害過於楊墨吕云此下却是韓愈自論責佛老抑揚髙下處韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後上面説不及孟子收拾在此句亦㣲見雖不及實過之之意非謂道徳過之用力過之也嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨本意在此句亦與説孟子處相應天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也吕云語壯有氣骨籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟増慚懼死罪死罪愈再拜重答張籍書韓愈東萊批此篇節奏嚴潔鋪叙回互分明吾子不以愈無似意欲推而納諸聖賢之域練語此句便有意下得好拂其邪心増其所未髙謂愈之質有可至於道者重説浚其源導其所歸溉其根將食其實此盛徳者之所辭讓造語好即重明輕况於愈者哉抑其中有宜復者故不可遂已轉換昔者聖人之作春秋也既深其文辭矣然猶不敢公傳道之口授弟子至於後世然後其書出焉其所以慮患之道㣲也應今夫二氏之所宗而事之者避就回互下及公卿輔相融化吾豈敢昌言排之哉藏人主意擇其可語者誨之舉輕明重猶時與吾悖其聲譊譊若遂成其書轉則見而怒之者必多矣重必且以我為狂為惑其身之不能恤自抑其中有宜復者至此是抑輕明重段數鋪叙不雜書於吾何有結佳夫子聖人也抑且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下文勢自然猶且絶粮於陳畏於匡毁於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣作文佳下字好長短有力賴其徒相與守之卒有立於天下繳向使獨言之而獨書之應其存也可冀乎結好今夫二氏行乎中土也蓋六百有餘年矣抑其植根固其流波漫語健下字好非所以朝令而夕禁也自文王没武王周公成康相與守之禮樂皆在至乎夫子未久也自夫子而至乎孟子未久也自孟子而至乎揚雄亦未久也文勢鋪叙間架然猶其勤若此其困若此而後能有所立吾其可易而為之哉轉其為也易則其傳也不逺結中含警䇿意故余所以不敢也生下意然觀古人得其時行其道則無所為書轉意不露而接為書者皆所為不得行乎今而行乎後者也言著書之意今吾之得吾志失吾志未可知俟五六十為之未失也天不欲使兹人有知乎則吾之命不可期如使兹人有知乎非我其誰哉使孟子捨我其誰之意此㸃化好蘇文田承相書亦同承襲孟子其行道其為書其化今其傳後必有在矣應有力一篇警䇿吾子其何遽慼慼於吾所為哉結有力前書謂吾與人商論不能下氣若好已勝者此是餘意然雖誠有之抑非好已勝也好已之道勝也已之道乃夫子孟軻揚雄所傳之道也若不勝則無所為道吾豈敢避是名哉又重説見得承孟子以道自任下得好處夫子之言曰吾與回言終日不違如愚則其與衆人辨也有矣使事牽引以無為有因彼借此才使正事便不是此文字所以好旁影甚佳駁雜之譏前書盡之吾子其復之昔者夫子猶有所戯詩不云乎善戯謔兮不為虐兮記曰張而不弛文武不為也豈害於道哉用事中間架吾子其未之思乎孟君將有適思與吾子别庶幾一來愈再拜荅陳生書師錫一云陳生商韓愈東萊批中間四㫁鋪叙齊整極好愈白陳生足下今之負名譽享榮顯者在上位幾人足下求速化之術不於其人乃以訪愈是所謂借聴於聾求道於盲雖其請之勤勤教之云云未有見其得者也愈之志在古道又甚好其言辭觀足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虚辱聊為足下誦其所聞蓋君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在已者仁義存乎内彼聖賢者能推而廣之而我蠢然為衆人所謂順乎在天者貴賤窮通之來乎吾心而隨順之不以累於其初所謂待已以信者已果能之人曰不能勿信也已果不能人曰能之勿信也孰信哉信乎已而已矣所謂事親以誠者盡其心不夸於外先乎其質而後乎其文者也盡其心不夸於外不以已之得於外者為父母榮也名與位之謂也先乎其質者文行也後乎其文者飲食甘㫖以其外物供養之道者也誠者不欺之名也待於外而後為養薄於質而厚於文斯其不類於欺歟果若是子之汲汲科名以不得進為親之羞者惑也速化之術如是而已古之學者惟義之問誠將學於大學愈獨守是説而俟見知焉與陳京給事書韓愈愈之獲見於閣下有年矣始者亦嘗辱一言之譽貧賤也衣食於奔走不得朝夕繼見其後閣下位益尊伺候於門牆者日益進夫位益尊則賤者日隔伺候於門牆者日益進則愛博而情不専愈也道不加修而文日益有名夫道不加修則賢者不與文日益有名則同進者忌始之以日隔之疏加之以不専之望以不與者之心而聴忌者之説由是閣下之庭無愈之跡矣去年春亦嘗一進謁於左右矣温乎其容其若加其新也矣屬乎其言其若憫其窮也矣退而喜也以告於人其後如東京取妻子又不得朝夕繼見及其還也亦嘗一進謁於左右矣邈乎其容其若不察其愚也悄乎其言其若不接於情也退而懼也不敢復進今則釋然悟翻然悔曰其邈也乃所以怒其來之不繼也其悄也乃所以示其意也荅陳商書韓愈東萊集註愈白辱惠書語髙而㫖深三四讀尚不能通曉茫然増愧赧又不以其淺弊無過人智識且諭以所守幸甚愈敢不吐情實然自識其不足補吾子所須也齊王好竽韓子十二篇齊宣王好竽南郭先生不知竽而濫於三百人之中以吹食禄有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律吕前律厯志陽六為律隂六為吕黄帝之所作也客罵之曰王好竽而子鼓瑟瑟雖工如王之不好何是所謂工於瑟而不工於求齊也今舉進士於此世求禄利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟文誠工不利於求求不得則怒且怨不知君子必爾為不也故區區之心毎有來訪者皆有意於不肖者也略不辭讓遂盡言惟吾子諒察荅李翊書韓愈東萊集註云樊曰公荅李翊二書或作李翔作也正元十八年陸傪佐主司權徳輿於禮部公以李翊薦於傪用是其年登第此書其十七年所作歟迂齋云吕居仁説退之荅李翊書最見為文養氣妙處李生足下生之書辭甚髙而其問何下而恭也能如是誰不欲告生以其道道徳之歸也有日矣况其外之文乎抑愈所謂望孔子之門牆而不入於其宫者烏足以知是且非耶雖然不可不為生言之生所謂立言者是也生所為者與所期者甚似而幾矣抑不知生之意蘄勝於人而取於人耶將蘄至於古之立言者耶蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利養其根而竢其實加其膏而希其光根之茂者其實遂膏之沃者其光燁仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戞戞乎其難哉其觀於人也不知其非笑之為非笑也如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黒分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其觀於人也笑之則心以為喜譽之則心以為憂以其猶有人之説者存也如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉雖然不可以不養也行之乎仁義之塗游之乎詩書之源無迷其塗無絶其源終吾身而已矣氣水也言浮物也水大而物之浮者小大畢浮氣之與言猶是也退之論佛骨表徙鱷魚文并言折王庭湊出牛元翼則氣之所養可知氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器則時用焉用與舍屬諸人君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後世法如是者其亦足樂乎其無足樂也有志乎古者希矣志乎古必遺乎今吾誠樂而悲之亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之請韓文公配享書皮日休於戯聖人之道不過乎求用用於生前則一時可知也用於死後則百世可知也故孔子之封賞自漢至隋其爵不過乎公侯至於吾唐乃䇿王號七十子之爵命自漢至隋或卿大夫至於吾唐乃封公侯曽參之孝道動天地感鬼神自漢至隋不過乎諸子至於吾唐乃旌入十哲噫天地乆否忽㤗則平日月乆昏忽開則明雷霆乆息忽震則驚雲霧久鬱忽廓則清仲尼之道否於周秦而昏於漢魏息於晉宋而鬱於陳隋遇於吾唐萬世之憤一朝而釋倘死者可作其志可知也今有人説韓愈身行聖人道口吐聖人言行如顔閔文若游夏死不得配食於夫子之側愚又不知尊先聖之道也夫孟子荀卿翼傳孔道以至於文中子文中子之末降及貞觀開元其傳者漓其繼者淺或引刑名以為文或援縱横以為理或作詞賦以為雅文中之道曠百祀而得室授者唯昌黎文公蹴楊墨於不毛之地蹂釋老於無人之境故得孔道巍然而自正夫今之文人千百士之作釋其巻觀其詞無不禆造化補時政繄公之力也公之文曰僕自度若世無孔子僕不當在弟子之列設使公生孔子之世公未必不在四科焉國家以二十賢者代用其書垂於國胄並配享於孔聖廟堂者其為典禮也大矣美矣苟以代用其書得不能以釋聖人之詞箋聖人之義哉况有身行其道口傳其文吾唐以來一人而已死反不得在二十一賢之列則未以乎典禮為備伏請命有司定其配享之位則自兹以後天下以文化未必不由夫是也古文集成巻十六
