body:
  text: 古文集成卷四十七宋王霆震編前庚集一銘塗山銘并序柳子厚通鑑外紀曰禹娶塗山氏女生子啓禹南巡狩會諸侯於塗山承唐虞之盛執玉帛者萬國惟夏后氏建大功定大位立大政勤勞萬邦和寧四極威懷之道儀刑後王當乎洪流方割災被下土自壺口而導百川大功建焉堯典湯湯洪水方割禹貢壺口治梁及岐虞帝耄期順承天歷自南河而受四海大位定焉大禹謨天之歷數在汝躬汝終陟元后孟萬章上舜避堯之子於南河之南萬國既同宣省風教自塗山而會諸侯大政立焉記王制注禹會諸侯于塗山執玉帛者萬國功莫崇乎禦大災乃賜玄圭以承帝命禹貢禹鍚玄圭告厥成功位莫崇乎執大象乃輯五瑞以建皇極舜典輯五瑞注舜斂公侯伯子男之瑞圭璧云云洪範次五曰建用皇極政莫先乎齊大統乃朝玉帛以混經制見題注是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也鳴呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而祚延于世有夏德配于二聖而唐虞讓功焉禹受舜禪功冠于三代而商周讓德焉宜乎立極垂統貽于後裔當位作聖著為世凖則塗山者功之所由定德之所由濟政之所由立有天下者宜取於此追惟大號既發華蓋既狩方嶽列位奔走來同山川守神莫敢遑寧羽毛四合衣裳咸會虔恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威震耀制立謨訓宜在長久厥後啓征有扈而夏德始衰甘誓啓與有扈戰于甘之野羿距太康而帝業不守五子之歌皇祖之訓不由人亡政墜卒就陵替向使繼代守文之君又能紹其功德修其政統卑宫室惡衣服拜昌言平均賦入制定朝會則諸侯常至而天命不去矣兹山之會安得獨光于後歟是以周穆遐追遺法復會于是山史記周穆王本紀聲垂天下亦紹前軌用此道也故余之為銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚德茂會朝侯衛統一憲度省方宣教化制殊類咸會壇位承奉儀矩禮具樂備德容既孚乃舉明刑以弼聖謨則戮防風遺骨專車史記夏本紀禹致羣臣於會稽防風氏後至禹戮之其骨可以專車克明克威疇敢以渝宣昭黎憲耆定混區傳祚後裔丕承帝圗塗山巖巖界彼東國惟禹之德配天無極即山刋碑貽後訓則崆洞山銘王元之軒轅氏之為聖也天下首冠足履者皆知之况通儒巨賢乎然則枉萬乘之駕不自為尊也降匹夫之室不自為辱也陟千巖之險不自為勞也所以然者下風問道而已哉故放勳法之以師許由重華繼之以讓善卷文命宗之以尊子高凡數帝者天下非不理也諸侯非不賓也兆民非不安也隂陽非不和也祥瑞非不至也所以孜孜于一山翁林叟者何哉蓋恐後世失尊賢好問之道爾聖人之用心也其有旨乎洎去帝及王厥道漸喪君以重為極臣以賤為隔極則以下問為恥隔則以上逹為患尊賤之不通上下之不安厥有萌矣然亦有審象于傅者謂之聖獵賢于渭者謂之明吐握于朝者謂之勤雖去道愈逺亦庶幾乎及王化下衰伯圖孔熾殉良之哀起逐客之議作高祖一沛公也見奉春君箕踞而坐霍光一將軍也使蕭望之挾持而入遂使賢者抱道以思退不肖者忍恥而求進至有劘礪其唇吻詭怪其容儀囁嚅于閽寺之前趦趄于廊廡之下朝佞夕媚髮白而不知其已者又何屑屑哉夫如是則抱帝王之道藴經綸之材者老死空谷寂寞無聞未嘗降一尺之書飛一介之使矧肯辱萬乘而顧匹夫者哉斯後代未復于古也可痛惜哉是故首陽二老佐帝者也恥于王也乃去周而採薇商山四皓佐王者也恥于霸也乃去秦而茹芝豈無意于君邪無意于民邪蓋尊賤不通上下不交之致也嗚呼不自尊者取萬乘之尊也自尊者取一時之尊也君天下者得無思邪某讀軒轅之紀嘉崆洞之請美德垂誡乃賡作歌其辭曰崆洞之叟心豈聖兮軒轅聖也不自聖哉崆洞之叟目豈明兮軒轅明也不自明哉崆洞之叟耳豈聰兮軒轅聰也不自聰哉寂寞巖隈孰為來哉吁嗟後君得無鑒哉燕然山銘班固後漢和帝永元元年惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖皇登翼王室納于大麓惟清緝熙乃與執金吾耿秉述職巡御理兵於朔方鷹揚之校螭虎之士爰該六師暨南單于東烏桓西戎氐羌侯王君長之羣驍騎三萬元戎輕武長轂四分雷輜蔽路萬有三千餘乘勒以八陳蒞以威神玄甲耀日朱旗絳天遂陵高闕下雞鹿經磧鹵絶大漠斬溫禺以釁鼓血尸逐以染鍔溫禺尸遂皆胸奴王然後四校橫徂星流彗掃蕭條萬里野無遺冦於是域滅區單反斾而旋考傳驗圗窮覽其山遂踰涿邪跨安侯水名乘燕然躡冒頓之區落焚老上之龍庭冒頓老上並單于將上以攄高文之宿憤光祖宗之玄靈下以安固後嗣恢拓境宇振大漢之天聲兹所謂一勞而久逸暫費而永寧者也乃遂封山刋石昭銘上德其辭曰鑠王師兮征荒裔勦凶虐兮截海外敻其邈兮亘地界封神丘兮建隆嵑其例切碑之圎者熙帝載兮振萬世傳巖銘吕溫昔商高宗恭默思道至誠動天天將報之以説為瑞王在于寢降神夢中審形旁求實得於此曽不待敷奏以言明試以功脫刑人之衣被公衮之服授受之際君不疑臣不慙大哉逸乎商之所以興也若非武丁之心周乎天地傳説之德通乎神明何感會欣合如此其易嗚呼見賢非難知之為難知之非難用之難用之非難特逹難君人者苟以特逹為心假無商宗之夢必自得説不然則雖咎夔稷契盡入其庭亦葉公之見龍反疑懼矣葉公子高况氤氲之中乎恍惚之際乎銘曰赫赫湯德如日不滅滔滔商祚如海不竭發祥播氣世作聖哲國誕武丁野生傅説説始胥靡武丁即祚德通神交忽夢如悟若帝導我期於皓素有無之間邂逅相遇宵衣而起爰得其人貌符心冥如舊君臣飛龍在天山川出雲感激自致其間無因捨築傳巖脫鱗鵬升作霖時和奮楫川澄金在吾礪木從吾繩君何言哉殷道中興元凱攀堯微舜曷階阿衡要湯抱鼎徘徊會合之際厥惟艱哉何如夢中天授神開惟賢是登道貴特逹匪次勿用才其壅遏高宗得説乃在恍惚揭銘摛光萬古不沒魯壁銘王元之在天成象壁星主文聖人藏書所以順乎天也噫乾坤不可以久否交之以泰日月不可以久晦又繼之以明文籍不可以久廢亦受之以興我夫子當周之衰則否屬魯之亂則晦及秦之暴則廢遇漢之王則興其廢也賴斯壁而藏之其興也自斯壁而發之矧乎三墳言大道也述乎君則堯舜禹湯文武之業備矣述乎臣則臯夔稷契伊吕之功盡矣濟乎世則六府存矣化乎人則五教立矣向使不藏魯壁盡委秦坑熖飛聖言灰歇帝道則後之為君者不聞堯舜禪讓之德禹湯征伐之功文武憲章之義將欲化民不亦難乎後之為臣者又不聞臯之述九德夔之諧八音稷之播百榖契之遜五品伊之翊贊吕之攻伐復欲致君不亦難乎世不知六府則無火食之人有卉服之衆與夷狄攸同矣人不知五教則忘父子之慈孝兄弟之友恭與鳥獸無别矣欲見熙熙之國政平平之王道不其逺乎嗚呼金有籝玉有櫝防之以關鍵固之以緘縢人必有竊而求之者蓋重利也斯壁藏君臣之道父子之教人無求而行者蓋輕義也天恐壞斯壁毁斯文命恭王以壞之伏生以誦之使天下皎然復知上古之道其大矣哉銘曰據山高兮為秦城鑿池深兮為秦坑城之高兮胡先壞坑之深兮胡先平伊斯壁兮藏家書歷秦亂兮猶不傾壞之者恭王誦之者伏生發典謨訓誥之義振金石絲竹之聲如天地兮否而忽泰如日月兮晦而復明秦之焚兮未盡我不為燼秦之坑兮未得爾滅其國江海涸竭乾坤傾側唯斯文兮用之不息厄臺銘王元之天地厄於晦冥日月厄於薄蝕山川厄於崩竭聖人生而肖天地之貌稟日月之靈鍾山川之粹得無厄乎所以虞舜厄于歷山帝禹厄于洪水成湯厄于夏臺文王厄于薑里我先生夫子厄于陳蔡其道一也于時周室卵危魯道糜潰仁義路絶奢僭源開列國用權蝟芒而起壞禮樂于粳粃視詩書于芻狗孩提王室糞壤儒風爼豆不修軍旅用事苟有衣縫掖而冠章甫者鮮不拔戟而刺之三綱五常蓋掃地矣夫子抱帝王之道處衰亂之世痛五教之大壞嫉四維之不張刳道德為舟航將欲濟天下之墊溺斫禮法為耒耜將欲芟天下之荒穢故不程其力不顧其世聚三千之徒聘七十之國應機設教與世垂範然佩蘭于鮑肆孰聞其薰施法於亂主孰聞其正斯謂天柱將傾折建一指而扶之艱哉為力乎故教不用于哀定位不崇于季孟遜辭于陽貨見忌于子西至于樹迹亦削而伐之况文行忠信果得用於世邪卒致天厭聖道絶糧于陳顔冉之徒餒目相視我先師則坦爾無悶怡然自居腹虛腸乾未始太息蓋聖人為人也不為己也憂道也不憂貧也但欲綴皇綱之絶緒闢帝道為坦途酌三代禮文垂萬古典憲興彼王澤浸于生民苟道至于是雖不食而死固何恨哉不然夫豈不知列國有膏梁之祿陪臣竊鍾鼎之食但詭辭婉貌取之如拾芥豈獨區區乎六合中以寒餓而自苦耶聖人之用心也不其逺乎吁姦喉佞舌者圖一日之飫飽道醉德者謀萬民之利故教不用于當時而用于今世位不顯于生前而顯于沒後何則祖述憲章之義雷行天地之間俾夫為君父為臣子者不可斯須而離也得非用於今世邪名載典籍身饗廟食得非顯于沒後邪與圖一日之飫者又何遼哉某客在宛丘得斯臺之址披蓁訪古馳筆而銘辭曰僭祿尸位沒則絶祀所謂伊人莫敖之鬼夫子恥之不其餒而飽德醉義沒則垂世所謂伊人箕山之士夫子求諸可謂仁乎巍巍聖人生而道迍歷聘求合絶糧于陳箕山之士可齊其名莫敖之鬼且非其倫廟食不匱祀典惟新我來舊國荒臺磷磷拂石勒銘德聲益振秦坑銘司空圖秦術戾儒厥民斯酷秦儒既坑厥祀隨覆天復儒讎儒祀而家秦坑儒邪儒坑秦邪沛國漢原廟銘柳子厚斆齋云沛國漢高祖所生之地原本始之意凡人君立國必建原廟以其推原祖宗而奉祀之也昔在帝堯光有四海元首萬邦時則舜禹稷卨佐命垂統股肱天下聖德未衰而內禪元臣謂舜也繼天而受命四姓承體迭有中邦夏殷周秦四姓五神環運謂五德之運循環炎德復起漢承堯以火德王周道削滅秦德暴戾皇天疇庸審厥保承乃命唐帝之後振而興之高祖紀贊漢帝本系出自唐帝又俾元臣之後翊而登之所以紹復丕績不墜厥祀故曲逆起為䇿士輔成帝圗吐謀洞靈奮竒如神舜之胄也陳平封曲逆侯汝隂脫帝密網摧虜暴氣扶乘天休運行嘉謀禹之苖也灌嬰封汝隂侯鄼侯保綏三秦控引漢中宏器廓度以大帝業卨之裔也蕭何封鄼侯淮隂整齊天兵導揚靈威覆趙夷魏拔齊殄楚韓信封淮隂侯平陽破三秦虜魏王曹參封平陽侯絳侯定楚地固劉氏周勃封絳侯皆稷之裔也克復堯緒昭哉甚明天意若曰建火德者必唐帝之胄故漢氏興焉翼炎運者必唐臣之孫故羣雄登焉是以高帝誕膺聖祚以垂德厚探昊穹之奧旨載幽明之休祐殺白帝于大澤以承其靈高祖夜徑澤中有大蛇當徑高祖拔劔斬蛇後人至蛇所有老嫗哭曰吾子白帝子化為蛇當道今赤帝子斬之建赤旗於沛邑以昭其神高祖為沛公旗幟尚赤假手于嬴以混諸侯謂秦併六國復歸于漢慿力于項以離關東謂項羽剽悍關東心離奉纂堯之元命而四代之後咸獻其用得乘木之大統謂周木德而秦楚之盛不保其位既建皇極謂即帝位設都咸陽撫征四方訓齊天下乃樂沛宫以追造邦之本乃歌大風以昭武成之德乃尊或作奠舊都以壯王業之基生為湯沐之邑沒為思樂之地且曰萬歲之下魂遊于此高祖謂沛父兄曰吾雖都關中萬歲之後吾魂魄猶思沛其以沛為朕湯沐邑惟兹原廟沛宫之舊也惠帝詔郡國立原廟原重也謂先已有廟祭蚩尤於是庭而赤精降高祖祠黃帝祭蚩尤於沛庭導靈命於是邦而羣雄至登布衣於萬乘而子孫得以纘其緒化環堵為四海而黎元得以安其業基岱嶽之高源洪河之長蓄靈擁休此焉發迹蓋以道備于是而後行之天下制成于是而後廣之宇內天下備其道而神復乎本宇內成其制而心懷于舊宜其正名以表功用成其始俾生靈盡其敬焉陳本以宅神用成其終俾生靈盡其慕焉故高帝定位建兹閟宫惠皇嗣服爰立清廟綿越千祀至今血食此所以成終而成始也且夫以斷蛇之威安知不運其密用佐歲功以流澤歟以約法之仁安知不流其神眷相舊邦之遺黎歟以紹唐之餘慶統天之遺烈安知不奮其聖化大祐於下土歟然則展慶乞靈烏可已也銘于舊邑以迪天命其辭曰蕩蕩明德時惟放勛揖讓而退祚于後昆羣蛇輔龍晉世家文公即位賞從亡者未至介子推子推入綿上山中至死不見子推從者憐之懸書宫門曰龍欲上天五蛇為輔龍已乘雲四蛇各入其宇一蛇獨怒終不見其處所以翊天門翊一作􅀈音工登翼炎運唐臣之孫秦網既離鹿駭東夏秦失其鹿下共逐之長蛇封豕左封豕長蛇以薦食上國蹈躍中野天復堯緒鍾祜于劉赫矣漢祖播兹皇猷揚旗沛廷約從諸侯豪暴震疊威聲布流總制虎臣委成良疇勦殄霸楚遂荒神州區宇懷濡黔黎輯柔表正萬國焱靈用休定宅咸陽以都上遊留觀本邦在鎬如周穆穆惠皇宗禋克承崇崇沛宫清廟是慿原念大業肇經兹地乃專元命亦舉嚴祀建旗釁鼓旗一作斾遂據天位魂遊故都永介丕祉煥列唐典嚴恭罔墜勒此休銘以昭本始王氣臺銘王元之古之王者築靈臺視雲物察氣候之吉凶知政教之善惡苟理合天道垂休降禎則必日新其德以奉之化失民心為妖作沴則必夕愓其躬以懼之如是則變禍福而反災祥不為難矣烏有築高臺厭王氣行巫覡之事禦天地之災者乎嬴政之有天下也始以利觜長距雞鬬六國而擅場復以鉤爪鋸牙虎噬萬方而擇肉終以多藏厚斂蠶食兆民而富國然後戍五嶺築阿房驅周孔之書盡付回祿惑神仙之術但崇方士收太半之賦則黔首豆分用三夷之刑則赭衣櫛比鯨鯤國政螻蟻人命原膏野血風腥雨膻六合嗷嗷上訴求主天將使民息肩于炎漢故望氣者云東南有天子氣于是祖龍巡狩築臺以厭之殊不知民厭秦也訴之于天天厭氣也授之于漢秦獨厭天厭民而自王乎向使築是臺告天引咎遷善樹德封六國之嗣復萬民之業薄賦斂省徭役銷戈鎔兵朂稼穡誅高斯之暴政修唐虞之墜典下從人望上答天意則王氣不厭而自銷矣劉項之族何由而興哉某遊豐沛間覩臺之舊址思古逺覽悵然有懷柅輪濡毫遂為銘曰臺之築兮救秦之衰救之不得為漢之基氣之厭兮慮漢之昌厭之不得速秦之亡秦之厭漢甘惟一身漢之厭秦乃有萬民高臺巍峩王氣氤氲秦政已矣漢德惟新快快前古茫茫後塵故國蕪沒荒臺草春行人環睇惻愴斯文古文集成卷四十七
