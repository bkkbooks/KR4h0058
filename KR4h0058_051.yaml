body:
  text: 古文集成卷五十一宋王霆震編前庚集五銘志道齋銘晦庵曰趍而挹者孰履而持曰飢而寒者誰食而衣故道也者不可須臾離子不志於道獨罔罔其何之據德齋銘晦庵語道術則無往而不通談性命則疑獨而難窮惟其厚於外而薄於內故無地以崇之依仁齋銘晦庵舉之莫能勝行之莫能至雖欲依之安得而依之為仁由已而由人乎哉雖欲違之安得而違之遊藝齋銘晦庵禮云禮云御射書數俯仰自得心安體舒是之謂遊以遊以居嗚呼遊乎非有得於內孰能如此其從容而有餘乎崇德齋銘晦庵尊我德性希聖學兮玩心神明蛻汚濁兮廣業齋銘晦庵樂節禮樂道中庸兮克勤小物奏膚功兮居仁齋銘晦庵勝已之私復天理兮宅此廣居純不已兮由義齋銘晦庵羞惡爾汝勉擴充兮遵彼大路行無窮兮力仁齋銘撙齋為胡伯槱作吾物非物不完則缺維何缺之實自則之物非吾物不芟則茀維何茀之實自茁之捫茁之端未一髮間拔之如山凡纍吾怛一髮難拔况不寧髮緬其聖門視聽動言克已惟顔繄顔之克聖門烏獲尚監而勒敬義齋銘西山惟坤六二其德直方君子體之為道有常內而立心曰直是責惟敬則直不偏以陂外而制事曰方是宜惟義則方各當其施曰敬伊何惟主乎一凛然自持神明在側曰義伊何惟理是循利害之私罔汨其真靜而存養中則有主動而酬酢莫不中矩大哉敬乎一心之坊至哉義乎萬事之綱敬義夾持不二不忒表裏洞然上逹天德昔有哲王師保是詢丹書有訓西面以陳敬與怠分義與欲對一長一消禍福斯在怠心之萌闒焉沈昏欲心之熾蕩乎狂奔惟此二端敗德之賊必壯乃猶如敵斯克怠欲既泯敬義斯存直方以大協德于坤一念少差視此齋扁嚴師在前永詔無倦尊德性齋銘晦庵惟皇上帝降此下民何以豫之曰義與仁惟義與仁維帝之則欽斯承斯猶懼弗克孰昏且狂苟賤卑汚淫視傾聽墮其四支褻天之綱慢人之紀甘此下流衆惡之委我其監此祗栗厥心有幽其室有赫其臨執玉奉盈須叟顛沛任重道逺其敢或怠震齋銘并序撙齋為裴大中秀才作易之初有八卦而已其方位所直則震次於艮其重為六十四而序卦所編則艮次於震震動也艮靜也天下之理未有靜而不動動而不靜者聖人互存其義而不明言之殆欲使學者互而參參而徹則為自得歟嗚呼第患未精於易爾精之則不惟艮之中震之義具焉震之中艮之義亦具焉又何必互參而后徹哉余銘裴子之震齋而懼其挾少年之氣以逞未領會也故作是序其銘曰伊雷之神視時卷舒有鼓莫鳴或授之桴伊龍之靈視時舒卷有門莫關或授之揵方卦云豫同應物須忽矣歸妹同返吾初是謂龍雷而卦為震孔孟曰時遞進遞退彼桴䇿勳吾竈不燼彼揵䇿勳吾卸其靷子齋誰名無乃太雋二月之卦子首其擡辟諸虎豹兒稅于胎行矣八月子鋭其摧辟諸草木老復于孩殊關同鑰一勘百開式頌且規銘子震齋艮齋銘艮齋某歸自荆北乾道乙酉之歲乃始名其齋以艮艮之為義大矣齋中之寓聞之長陽長陽聞之兼山兼山聞之廣平廣平聞之嶺北之理嶺北之理聞之泗濱泗濱聞之靈臺靈臺聞之龍紀龍紀聞之先天斯其為聞也固亦不一也或聞之於千載之後而不為踈或聞之於合堂同席之頃而不為密或聞之於寂默而不為略或聞之於諄復之辨而不為煩蓋聞其所聞而後能知其所聞知其所聞而後能信其所聞信其所聞而後能高其所聞高其所聞而後能安其所聞聞而至於安則能説諸心寒暑晝夜出入起居必有從容優遊而不可解者矣既聞之又從而銘之是安之之義也銘曰太極位奠兩儀以分天高地厚生成惟均日月有明運乎晝夜離南坎北炎上潤下至理可喻矯首遐觀言提斯綱匪張自難山上有山止之為止挾嵩合岱于壯于趾仁義忠信蓋無常名由止而推則勇于行禹稷濟時陋巷為厄一視其處二特其迹將聖於此富貴浮雲有限之抑無窮之伸傃而行之允毅伋也孟養浩然無屈移者五綦六鑿澒洞喧豗不有隄防奔川吼雷出門萬里其途蕩蕩用震以乾是曰無妄孰信所信孰契以心十全之醫良藥萬金有聞雖晚或善其後聞斯銘斯以戒坐右艮齋銘南軒為魏元履作物之感人其端無窮人為物誘欲動乎中不能反躬殆滅天理聖昭厥猷在知所止天心粹然道義俱全是曰至善萬化之源人所固存曷自違之求之有道夫何逺而四端之著我則察之豈惟慮思躬以逹之工深力到大體可明匪由外鑠如春發生知既至矣必由其知造次克念戰兢自持事物雖衆各循其則其則匪它吾性之德動靜以時光明篤實艮止之妙於斯為得任重道逺時不我留嗟我同志勉哉勿休伊我小子懼弗克力咨爾同志以起以掖蒙齋銘南軒為余端蒙作乾坤既畫八卦是生八卦相乘萬象以明下坎上艮其卦曰蒙其蒙伊何源泉在中泉之始萌其行未逹雖則未逹而理孰遏君子體之于以果行黽勉躬行動畏天命泉之始萌其勢則止止乃日澄源源曷己君子體之于以育德篤敬不渝靜保天則惟養于中大本攸立惟敏于外逹道攸飭內外交修相須以成久而有常則能日新我銘蒙齋敢越斯義惟言之難實以自厲凡百君子有觀於斯毋忽乎近尚其懋之蒙齋銘西山物盈兩間有萬其數天理流行無一不具維象之顯理寓乎中反而求之皆切吾躬觀天之行其敢遑息察地之勢亦厚于德天人一體物我一源驗之羲經厥旨昭然卦之有蒙內險外止止莫如山險莫如水曷不曰水而謂之泉濫觴之初厥流涓涓其生之微若未易逹其行之果則不可遏有崇兹山潤澤所鍾維靜而正出乃不窮始焉一勺終則萬里問奚以然有本如是是以君子法取於斯維義所在必勇于為維行有本繄德焉出是滋是培其體乃立靜而養源澄然一心動而敏行萬善畢陳厚化川流初豈二致漙博淵泉其用弗匱於惟簡肅宜有此孫揭名齋扉目擊道存養正於蒙奚必童稚終身由之作聖之地敦復齋銘南軒復卦之義以初爻為重於畫為陽於義為善於人蓋君子之道也二比於初故為休復四應於初故為獨復而三之頻復而厲則以其非比非應開其遷善而危其屢失也上之迷復而凶則以其處極而最逺往而不返也觀諸此則可見以初爻為重矣然則五之敦復奈何五體順而居中以中自考者也故為敦篤於復夫能敦篤於復宜曰吉曰亨矣而獨曰無悔奈何無悔者戒辭也以其柔而逺於陽故為之戒辭謂如是乃無悔也南徐陳希顔舊名其齋曰敦復歲壬辰與豫相遇于長沙屬豫銘豫知希顔有取警戒之意也為之銘曰惟聖作易研幾極深惟卦有復於昭天心六爻之義各隨所乘其在於五敦復是明其敦如何篤志允蹈順保其中而以自考我觀爻義厥有戒辭君子體之警戒是資人欲易萌天理難存毫釐之間消長所分凡百君子奈何不敬祗于夙宵以若天命惟積惟久匪俟乎外敢曰無悔庶幾寡悔復齋銘屏山大易之旨微妙難詮善學易者以復為先惟人之生咸具是性喜怒哀樂或失其正視而知復不蝕其明聽而知復不流於聲言而知復匪易匪輕動而知復悔吝不生惟是四知本焉則一孰覺而存孰迷而失勿謂有本勞思內馳亦勿謂無悠悠勿思廓爾貫通心冥取捨既復其初無復之者蕩蕩坦坦周流六虛昔非不足今非有餘伊顔氏子口不言易庶幾之功默臻其極今我仰止以名斯齋念兹在兹其敢怠哉克齋銘南軒為陳擇之作惟人之生父乾母坤允受其中天命則存血氣之萌物欲斯誘日削月脧噫鮮能久越其云為匪我之自營營四馳擾擾萬事聖有謨訓克己是宜其克伊何本乎致知其致伊何格物是期動靜以察晨夕以思良知固有匪緣事物卓然獨見我心皎日物格知至萬理可窮請事克己日新其功莫險於人欲我其平之莫危於人心我其安之我視我聽勿蔽勿流我言我動是出是由涵濡泳遊不競不絿允蹈彛則靡息厥修建夫既克曰人而天悠久無疆匪然而然為仁之功於斯其至我稽古人其為顔氏於穆聖學且有始終循循不舍與人同功請先致知以事克己仁逺乎哉勉旃君子存齋銘水心為蔣少韓作揭於弋陽之便坐孟存以心易存以性其入道義其出愛敬此真存邪衆善所門如彼聚粟常完倉囷性因物迷心與事往必謹司之勿抑勿放勿輒有為勿墮空寂是固無存執妄為得壯矣弋陽雚竹青蒼厥壤甚夷水廣山長上迫征求下憐愁苦依其永存以作民怙存齋銘誠齋天爽天精孔神孔明肇域彼中扃宅是瓌庭我有神舍弗掫于夜冦入在宇我出在野在宇一斯其從千之在野懷歸室是逺而將聖有續豫為孟孫之人導汝歸宿冦則逐逐匪豫汝歸汝弗去兮匪彼汝冦汝弗居兮汝室載寧汝挾載宏宗廟百官疇不汝式承尼日堯墻有覿斯煌有陟斯昂則莫我敢當道腴義梁詩冠禮裳有操無亡疇莫知其鄉顧齋銘南軒為宇文紹節作人之立身言行為大惟言易出惟行易怠伊昔君子聿思其艱嚴其樞機立是防間於其有言則顧厥為毫釐之浮則為自欺克謹于出內而不外確乎其言惟實是對於其操行則顧厥言須臾弗踐則為已愆履薄臨深戰兢自持確乎其行惟實是依表裏交正動靜迭資若唱而和若影而隨伊昔君子胡不慥慥勉哉勿渝是敬是保省齋銘水心為周慤作昔者曽子一日三省今子五載以省為請子悟何晚我言已遲相彼四體測焉必知既有念慮胡為昏迷苟非忠信奚以學為震霆洪鍾有待而發綿綿增隂見此日月勿安陋習勿隨俚説區區利心毋自溺沒專己忘人人道幾絶推己盡人己則多闕斧柯可用毫釐可别咨爾周生念念勿越力齋銘龍川為何晦之作厥初生民必完其力力完於心乃見天則形顧分之與物交役若忘若貴弗覺弗克語汝力乎明以內飭惡也則臭善如好色下學之功舉用其極此顔子所以欲罷不能而樊遲所以先難而後獲也安齋銘龍川往則俱往來則俱來義苟精矣動靜必偕心之廣矣亦可懼哉天下雖大吾安厥齋古文集成卷五十一
