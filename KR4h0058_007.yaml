body:
  text: 古文集成卷七宋王霆震編前乙集一記戴氏東池堂記柳子厚迂齊批云脉絡相生節奏相應無一字放過此文如引繩貫珠循環旡端如常山之蛇救首救尾如纍九層之臺一級髙一級而豐約不差毫厘池因堂而勝堂因人而勝戴氏之父子人物又因子厚之文而勝使無子厚大手筆為之發揮則戴氏亦一碌碌人爾况其池與堂乎當如此看𢎞農公楊憑刺潭三年因東泉為池環之九里丘陵林麓距其涯句法坁音遲島洲渚交其中其岸之突而出者水縈之若玦焉狀物池之勝於是為最勝字在後應公曰是非離世樂道者不宜有此與後面先立兩柱卒授賔客之選者譙國戴氏曰簡應在後即是賔客之選者三句相因不曾間斷為堂而令居之堂成而勝益竒應上勝字望之若連艦縻檻此是第二節與波上下就之顛倒萬物遼廓眇忽樹之松柏杉櫧音諸被之菱芡芙蕖用字欎然而隂粲然而榮凡觀望浮遊之美専於戴氏矣戴氏常以文行纍為連率所賔禮貢之澤宫而志不願仕離世與人交取其退讓受諸侯之寵不以自大其離世歟好孔氏書樂道旁及莊文莫不總統以至虛為極得受益之道其樂道歟賢者之舉也必以類匆然有此一句是要雙綰楊氏兩人對說當𢎞農公之選而専兹地之勝選字照應前面豈易而得哉地雖勝得人焉而居之又從上面一勝字綴下來專美戴氏則山若增而髙水若闢而廣一篇之精神在此數句數句之精神在此數字堂不待飾而已奐矣戴氏以泉池為宅居以雲物為朋徒攄幽發粹日與之娛則行宜益髙文宜益峻道宜益懋比之山水與堂交相贊者也既碩其內又揚于時吾懼其離世之志不果矣此一轉尤竒推是専說它離世樂道終不成一句離世便休了一生須有出時節故著此一句然不說樂道一句者上已說道宜益懋了此間却著不得此子厚最薄劣處君子謂𢎞農公刺潭得其政為東池得其勝授之得其人豈非動而時中者歟於戴氏堂也見公之德不可以不記燕喜亭記昌黎迂齊批云看他規模布置前後節級相承處可與戴氏堂記並看太原王𢎞中仲舒在連州與學佛之人景常元慧者遊異日從二人者行於其居之後丘荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激狀其自然輦糞壤焚椔翳已見鬼神隂相之意却立而視之出者突然成丘陷者呀然成谷言得之無心窪者為池而缺者為洞若有鬼神異物隂來相之終上意自是𢎞中與二人者晨往而夕忘歸焉乃立屋以禦風雨從起頭至此次第而下節節相承寒暑既成愈請名之其丘曰俟德之丘丘之名蔽於古而顯於今有俟德之道也丘之義其石谷曰謙受之谷名瀑曰振鷺之瀑名谷言德瀑言容也義其土谷曰黃金之谷名瀑曰秩秩之瀑名谷言容瀑言德也義錯四句相愈佳洞曰寒居之洞名志其入時也義池曰君子之池名虛以鍾其美盈以出其惡也義泉之源曰天澤之泉名出髙而施下也義合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也於是州民之老聞之相與觀焉曰吾州之山水名於天下然而無與燕喜者比經營於其側者相接也而莫宜其地凡天作而地藏之與前相應以遺其人乎𢎞中自吏部侍郎貶秩而來次其道途所經自藍田山入商洛涉浙湍臨漢水升峴首以望方城出荆門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猿狖所家魚龍所宮極幽遐瓌詭之觀宜其於山水飫聞而厭見也今其意乃若不足與厭飫字相應傳曰智者樂水仁者樂山底板在此𢎞中之德其所好可謂叶矣智以謀之仁以居之吾知其去是而羽儀於天朝也略與戴氏堂離世之志不果一句相似不逺矣遂刻石以記李白酒樓記沈光東萊注云李白與賀知章李適之汝陽王璡崔宗之蘇晉張旭焦遂為酒中八仙有唐咸通辛巳嵗正月壬午吳興沈光適任城題李白酒樓夫觸強者靦緬而不發乘險者帖爾而不進潰毒者隱忍而不能就其針砭摶猛者持遲而不能盡其膽勇而復視其強者弱之險者夷之毒者甘之猛者柔之信乎酒之作於人也如是翰林李公太白聰明才韻至今為天下唱首業術匡救天必賦之矣致其君如古帝王進其臣如古藥石揮直刃以血其邪者推義轂以輦其正者豈憑酒而作也憑酒而作者強非真勇太白既以峭訐矯時之狀不得大用流斥齊魯眼明耳聰恐貽顛踣故狎弄杯觴沉溺麴糵耳一淫雅目混黑白或酒醒神健視聽鋭發振筆著紙乃以聰明移於月露風雲使之涓潔飛動移於草木禽魚使之妍茂騫擲移於邊情閨思使之壯氣激人離情溢目移於幽巖邃谷使之遼歷物外爽人精魄移於車馬弓矢悲憤酣歌使之馳騁决發如睨幽并而迭意放懷盡見窮通焉嗚呼太白觸文之强乘文之險潰文之毒搏文之猛而作狎弄杯觴沉溺麴糵是真築其聰翳其明醒則移於賦詠宜乎醉而生醉而死余徐思之使太白疏其聰决其明移於行事強犯時忌其不得醉而死生也當時骨鯁忠赤遞有其人收其逸才萃於太白至於齊魯結構凌雲者有限獨斯樓也廣不踰數席瓦缺椽蠧雖樵兒牧竪過亦指之曰李白常醉于此矣廬陵所居竹室記房千里凡天地之氣煦乎春曦彤乎夏凄乎秋而冽乎冬楚之南當冬而且曦燕之北當夏而且冽是皆不得氣之中正人之百骸上陽而下隂陽戒於焮故膏肓欲寒隂戒於溺故腎脅欲燠人之外好欲軒冕文綵以為榮似若動且陽焉人之內好欲寡慮恬默以為泰似若靜且隂焉其外門欲肥馬大車以為熱者其內室欲虛堂廣厦以為清者果反是必為災耳妖且病且亂且窮矣天地之氣當夏而冽當冬而曦其歲時惡人之百骸上陽而不能寒下隂而不能煦其形神瘵外飾文綵不能動且陽而必慊其心內思恬默不能靜且泰而必汨其志外門凄凄而寒者內室彤彤而熱者其事窮豫三年夏待罪于廬陵其環堵所棲者率用竹以結其四周植者為柱楣􅀈者為榱桷破者為宙削者為障臼者為樞篾者為纒絡而籠土者為級橫而格空者為梁方大暑火烘爆霤圻壤若墜于罏若燎于原舌呀而不能持支墮而不能運赫赫熖熖如列千萬炬于室內視其門即寂寥虛閴若清秋之山焉若寒浦之波焉豫乃知嚮所謂天地之氣人之百骸與其心形之內外居室之寒燠反是果為妖且災且病且亂且窮也今豫方窮不能奮果窮也其處于是亦宜矣天地之氣不能易者也鄒子有吹律之變人之死生不可制者也俞扁有針砭之術史記俞跗扁鵲皆醫者是二者尤不可革且有道而革之今豫室之曦豫門之寒豫亦姑思其治之之道將爇其廬而斬其工其能永以爍豫書其辭于壁沔州秋興亭記賈至在陽而舒在隂而慘性之常也履險而栗涉夷而泰情之變也觀揖讓而退覩交戰而競目之感也聞韶濩而和聆鄭衛而靡耳之動也夫其舒則洽慘則悴栗則止泰則通退則無咎競則有悔和則安樂靡則憂危性情耳目優劣若此故君子愼居處謹視聽焉沔州刺史賈載吾家之良也其理沔州未朞月而政和於訟堂之西因髙構宇不出庭户在雲霄矣却負大别之固俯視滄海之浸閲吳蜀樓船之殷鑒荆衛藪澤之大亦有㫖哉性得情適耳虛目開且處動則倦理倦莫若靜處靜則明惟明以理動窮則變變則通通則久今沔州靈府恬而神用爽政是以和觀其前户後牖順開闔之義簡也上棟下宇無雕琢之飾儉也簡近於智儉近於仁仁智居之何陋之有况乎當發生之晨則攢秀木於髙砌見鶯其鳴矣處臺榭之月則納清風於洞户見暑之徂矣在搖落之時則俯灝氣於軒檻見火之流矣值嚴凝之節則棲同雲於扃闥見雪之紛矣政成訟清體安心逸而詩人之興常在常時之興秋興最髙因以命亭焉豫自巴丘徵赴宣室歇鞍棠樹之側解帶竹林之下嘉其俯仰美其動息乃命進牘抽毫志之君陽遁叟山居記陸希聲遁叟以斯世方亂遺榮于朝築室陽羡之南而遁跡焉地當君山之陽東溪之上古謂之湖洑渚遁叟既以名自命又名其山曰頤山溪曰蒙溪將以頤飬蒙昧也在易頤之象艮為山山下有震震為雷為龍頤山之下東走震澤震雷魚龍之所萃育有頤象焉蒙之象亦艮為山山下有坎坎為水為險頤山之下泉流于險而達于大溪有䝉象焉一旦遁叟觴溪山之神於庭酌而飲頤山曰吾之所以命夫山之為頤者勗子以飬也子其養雲雨以潤物養霧露以生物養風霆以長物養雪霜以肅物養巨材以充棟宇養小材以為蒸薪養茅菅以為茨藉養竹箭以為器用養百果以充口腹養百藥以蠲札瘥養昆蟲使咸樂其生養鳥獸使各遂其性噫無或養妖雲悖雨以傷良稼養苦霧淫露以澤惡植養疾風迅霆以摧朽槁養慘霜虐雪以殺根荄養臃腫之朴不為幹材養鈎棘之蘖不中樵㸑養蔓延之藟以困條柯養蟠梗之根以固膏土養弗食之實以蕃庶生養雜毒之藥以中函氣養蟒虺蜂蜴以護巢窟養豺狼梟獍以害羣類維山有神子其飲之無虧爾名而窽爾實又酌而飲蒙溪曰吾所以命夫溪之為蒙者勗子以决也子其决於夷壤以發其源决於塞垣以通其流决於腴畒以施其潤决於涸澤以溥其惠决於廣陂使介鱗蕃育决於巨浸使蚪龍變化噫無或决於險阻以資其悍激决於林藪以縱其墊溺决於潟鹵以嗇其施决於池籞以専其利决於甽竇使鼠蟹為菑决於沮洳使蛙黽得志維溪有神子其飲之無喪爾名而浮爾實於是酌而自飲之吾之所以命是山也必將有所養也命是溪亦將有所决也吾將養吾志於道而不希於世養吾行於德而不眩於俗養吾浩然之氣以合自然之英養吾誠明之意以入清明之頤又將决吾心於仁義使不違决吾志於中正使不過决吾身於天命使不憂决吾跡於遁世使無悶如此而已遂與山溪揖讓竭吾歡而罷辨且歌曰山乎溪乎吾之心乎醒乎醉乎吾與汝參乎中書政事堂記李華政事堂者自武德已來常於門下省議事謂之政事堂故長孫無忌起復授司空房𤣥齡授左僕射魏徵授太子太保皆知門下省事至髙宗光宅元年裴炎自侍中除中書令執宰相筆乃移政事堂於中書省記曰政事堂者君不可以枉道於天反道於地覆道於社稷無道於黎元此堂得以議之臣不可悖道於君逆道於人黷道於貨亂道於刑尅一方之命變王者之制此堂得以移之兵不可以擅誅權不可以擅施貨不可以擅蓄王澤不可以擅奪君恩不可以擅間私讎不可以擅報公爵不可以擅私此堂得以誅之事不可以輕入重罪不可以生入死法不可以剝害於人財不可以擅加於賦情不可以委之於幸亂不可以啓之於萌伐紊不賞削紊不封聞荒不救見饉不驚逆諌自賢違道傷古此堂得以殺之故曰廟堂之上樽俎之前有兵有刑有梃有刃有斧鉞有鴆毒有夷族有破家登此堂者得以行之故伊尹放大甲之不嗣周公逐管蔡之不義霍光廢昌邑之亂狄公正廬陵之位自君弱臣強之後宰相主生殺之柄天子掩九重之耳燮理化為權衡論思變為機務道變身傾禍敗不可勝數列國有傳青史有名可為終身之誡無罪記云廬山草堂記樂天匡廬竒秀甲天下大山山北峯曰香爐峯北寺曰遺愛寺介峯寺間其境勝絶又甲廬山元和十一年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因靣峯腋寺作為草堂明年春草堂成三間兩柱二室四牖廣袤豐殺一稱心力洞北户來隂風防徂暑也敞南甍納陽日虞祁寒也木斫而已不加丹墻圬而已不加白磩階用石幕窗用紙竹簾紵幃率稱是焉堂中設木榻四素屏二漆琴一張儒道佛書各兩三卷樂天既來為主仰觀山俯聽泉傍睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適內和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰是居也前有平地輪廣十丈中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮白魚又南抵石澗夾澗有古松老杉大僅十人圍髙不知幾百尺修柯戞雲低枝拂潭如幢竪如蓋張如龍蛇走松下多灌叢蘿蔦葉蔓駢織承翳日月光不到地盛夏風氣如小九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤堄雜木異草蓋覆其上緑隂䝉蒙朱實雜雜不識其名四時一色又有飛泉植茗就以烹燀好事者見可以永日堂東有瀑布水懸三尺㵼階隅落石渠昏曉如練色夜中如環佩琴筑聲堂西倚北崖右趾以剖竹架空引崖上泉脉分線懸自簷注砌纍纍如貫珠霏微如雨露滴瀝飄灑隨風逺去其四傍耳目杖屨可及者春有錦繡谷花夏有石門澗雲秋有虎溪月冬有爐峯雪隂晴顯晦昏旦吞吐千變萬狀不可殫紀覼縷而言故云甲廬山者噫凡人豐一屋華一簣而起居其間尚不免有驕矜之態今我為是物主物至致知各以類至又安得不外適內和體寧心恬哉昔永逺宗雷輩十八人同入此山晉惠逺法師惠永法師宗㑂雷次宗等同入廬山結白蓮社老死不返去我千載知我其心以是哉矧豫自思從幼逮老若白屋若朱門凡所止雖一日二日聊覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦蹇剝來佐江郡郡以優容撫我廬山以靈勝待我是天與我時地與我所卒獲所好又何求焉尚以冗員所羈餘纍未盡或往或來未遑寧處待餘異日弟妹婚嫁畢司馬嵗秩滿出處行止得以自遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虛范陽張允中南陽張深之東西二林長老湊朗滿晦堅等並長老名凡十有二人具齊施茶果以落之因為草堂記養竹記白樂天竹似賢何哉竹本固固以樹德君子見其本則思善建不拔者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之為庭實焉貞元十九年春居易以拔萃選及第授校書郎始於長安求假居處得常樂里故關相國私第之東亭而處之明日屨及於亭之東南隅見藂竹於斯枝葉殄瘁無聲無色詢乎關氏之老則曰此相國之手植者自相國捐館他人假居繇是筐篚者斬焉篲帚者刈焉刑餘之材長無尋焉數無百焉又有凡草木雜生其中苯䔿薈蔚有異竹之心焉居易惜其常經長者之手而見賤俗人之目剪棄若是本性猶存乃芟翳薈除糞壤疏其間封其下不終日而畢於是日出有清隂風來有清聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似於賢而人猶愛惜之封植之况其真賢者乎然則竹之於草木猶賢之於衆庶鳴呼竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書于亭之壁以貽其後之居斯者亦欲以聞於今日之用賢者云古文集成卷七
