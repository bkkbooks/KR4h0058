body:
  text: 古文集成卷二十宋王霆震編前丙集六書上蘇公書朝補之古先哲王之世士無貴賤而道同國無逺近而俗均王公大人服冠劔而坐廟堂握圖印而臨海縣所以宰制萬物役使羣動者有道而窮巖深林長嘯逺引之人所以為藏迹而不耀閉口而不傳者亦是道也鄒魯之邦洙泗之間老幼叙於席男女别於塗鄉飲時祭執籩獻豆之容不闕於堂而家孰黨庠鳴琴擊磬之聲不乏於耳流風善政相漸成俗以波及夫宋衛燕晉秦楚者亦是俗也世衰道微諸侯錯立而國自為治家自為法矣德禮之所全羣岐之所厚山川之所産風氣之所習故其民思慮不純而趣舍異向不幸而小道異術羣起而乘之駕徜徉之文張詭怪之事而使人動目駭耳而為列禦冦莊周詆前言往行而自大尊禮法刑名以為賢而為荀卿韓非峩冠博帶髙談乎九州之外閎大而不經文具而難施而為衍奭微辭隱語滑稽不窮其混迹若髙其䝉惡若卑而為淳于髠稷下學者伏車結駟東奔西馳而使楚兵不得合臨淄秦甲不得下函谷而為蘇秦張儀左手把人之袖右手揕人之胸義不返顧計不旋踵以快一時之忿而為荆軻聶政蓋先王之道披猖磔裂此其極矣而秦漢已降則又有山東出相山西出將之說魯多平原廣野土厚而水深故其民朴而少文齊北有渤海南有琅琊魚鹽貨利之與俱故其民險而多詐晉介齊秦之面搏燕楚之脅其道四平舟車之所大㑹甲兵之所馳突故其民危而好亂燕土埆北迫胸奴馬羊水草之所聚故其民健而少慮秦倚華山阻函谷鷹擊韓魏垂頭中國一夫當關百夫莫前故其民勇而輕鬭楚接吳越之封雜荆舒之地故其民剽而難恃其餘窮邦小國不可殫數要之天下蕩然無復先王之民矣由漢歷唐雖賢君相望異人間出慨然太息有憂天下之心而卒之道不同俗不均者其來有漸也某不佞嘗竊歎此夫有蓋天下之名而後可以服天下之心有服天下之實然後可以望天下之化閣下布衣單車﨑嶇出蜀一日而聲振四方四方之士拱手而來降向風而交馳可謂有蓋天下之名矣橫身當職不肯碌碌出辭吐氣無所阿避可謂有服天下之實矣然則天下之所為望而化者非閣下何以哉昔者文翁一入蜀而蜀之民雖縣邑小吏皆知文雅之可好常衮一治閩而閩之人咸厲讀書穎脫而出者相望於途夫江之南五湖之間其人便捷而多能輕清而好竒閣下亦既知之矣閣下之入吳也吳人固已有隨舳艫於末流望冠蓋於後塵者使閣下少借之以貌薄誘之以言彼孰不由然喜翕然變哉故某將首為吳人慶而次為天下有望於閣下而化者慶也某濟北之鄙人生二十年矣其才力學術不足以自致於閣下之前獨幸閣下官於吳而某亦侍親從官於吳也故願隨吳人拜堂廡而望精光焉蓋聞君子尊賢而容衆嘉善而矜不能某非能賢且善也而方其盤辟俯僂從衆人之後以幸君子之知而不自慊某雖不能亦閣下所宜容而矜之傳曰苟以是心至斯受之而已輒敢進其說以纍執事者伏惟幸恕而少進之上樓內翰書陳篔窗竊以文於天地間為物最巨放之則橫八極斥四海充塞乎宇宙之外嗇之則入秋毫卷一握掩閟乎塵坱之內抗之則翻沆瀣披鴻濛引星辰而上也抑之則洞山嶽達河漢决土壤而下也其清也則澄波月明寒松露滴孤鶴唳空驚鴻呌夕乙乙冥冥韻韶武而雜咸英也其壯也則崩濤裂山獰飈摺石雷車響空鐡騎臨敵震震栗栗絶甬道而赴趙壁也其慘然而思也則荒域悲風空山暮景逺客懷歸孤嫠弔影戚戚悽悽歌楚些而賦湘纍也其薰然而和也則春來東郊氣回寒谷發秀山川敷榮草木欣欣懌懌登春臺而歌夀域也窅窅乎其深而章章乎其眀也愔愔乎其古而肅肅乎其澤也倐幽而忽彰驟巨而遽細恍乎其不可名也逺能見之近晦能揭之著泛乎其不可形也是非文之體歟論文之至六經為至經者道之所寓也故經以載道文以飾經文近則經弗傳經弗傳而道存者妄也書之質詩之變易之動禮之宜樂之和春秋之嚴蓋與天地均闔闢與日月爭光明優優乎大哉必如是而後為天下之至文也已子思氏得之而中庸孟軻氏得之而醇屈原得之而幽莊周得之而博降是則有太史公之潔賈生之眀相如之富揚雄之雅班固之典韓愈之閎深栁宗元之健元結之約李白之逸杜甫之工門庭軌轍不能一概而皆深於文者也文乎文乎尚可以易言乎竊怪近世之士不守其根而好其葉未嘗知有古六經亦未嘗知六經之後有諸子也朝研夜誦惟時文之學焉夫今之取士固以時文而不以六經諸子也然六經諸子獨不為時文之根源邪而學者屏之是以器識淺隘而議論浮薄也然某於此病昔者未之知也某少小讀書猥欲以文詞自命每一篇出同流歎譽之頗亦自以為不可及也年來大悔悟懲創又自謂其可厭返求之六經又求之諸子既久爽然自失知向之學乃時文之學而非六經諸子之學也更以六經諸子涵泳演繹蚤夜不憊既久乃覺其胸中與曩者異把筆行墨稍洋洋然視時文之學或自謂逺過之矣然已以為然而人則不然退之云小稱意則人小怪之大稱意則人大怪之然則怪之者是歟怪於人者是歟以怪者為是則雖稱意不足道也以怪於人者為是則愈怪愈可賀也栁子厚云揚雄沒而法言大興馬遷生而史記未振夫其大興於沒後而未振於生前者何也有一時之毁譽有千載之是非君子常懼乎千載之非不懼夫一時之毁使可以耀生前而不可以垂死後君子不由也又况天下之文章苟合乎古必不合乎今苟合乎今必不合乎古學者其求合於今乎其求合於古乎此不足為俗子道也亦以俟知者知耳某偃服執事之盛名四十年矣恨未得一望顔色以快此生也去秋忽有骫骳之文呈於堂下者執事實愛賞之以為近於古人之文夫古人之文令人之所棄也而執事顧有取焉將使世俗移其所以議某者而議執事而執事不顧某之歸感宜何如哉不逺千里俯伏於門蓋欲略叙此謝以祈一言之誨庶或有所持循以幾乎道而執事私淑之名善誘之功亦昭灼於無窮顧不韙歟昔李氏子蟠年十七好古文退之嘉其志作師說以貽之故退之之名與泰山北斗等髙大某也年逺過蟠才不逮蟠而志則蟠之志也執事自許宜不在退之下執事其裁之上王司封書劉雲龍運判司封閣下六博最技之賤者不張之以氣則不勝氛霧集野旦犯焉而氣不主體則百疾緣是而作蓋氣之不可恃也如此然有甚乎此者是故有寓物以感動其氣者或相與浮海以觀渺瀰之瀾或登泰山而小無窮之天下而是人初非山與水也有因事之適然以移其氣者或觀舞劍而進乎字書繪畫之巧或攝袵式蛙而鬬士之勇百倍而是人卒與劍相忘蛙異適也庸非氣之鍾乎人者無索而不得邪匹夫無故殺人於道有折之者必屈不善用氣故也童子立至孟賁懼焉氣足故也弱趙之璧抵彊秦之府垂入者數矣相如一聣柱之頃而趙則反璧而秦則不敢售欺曹沫三喪地於齊劔鋒未揣其咽而向所負者按籍不失錙銖氣之不可不恃也如此然又有甚乎此者其文章歟其氣完者其辭渾以壯其氣削者其藻局以卑是故排而躍之非怒張也綴而留之非懼脅也遒縱捷發非吝而驕也紆餘不肆非憊而痿也時出冷汰以示其清務為龎渾以示其厚如將不得已以示其平無適而不在於理以示其専破觚掃軌以示其數鼓而不竭也丹艧繢繪以示其朝徹而更新也有毅然不可犯如汲直之面折者有時女守柔如回車以避亷頗者有省語徑說如曽子之守約者有灑落快辨無敢校對如季布之呵曹武陽者故曰文章以氣為主豈虛言哉孔子之氣周天地該萬變故六經無餘辭焉而其小者猶足以叱夾谷之彊齊孟子芥視萬鍾小晏嬰管仲而其自養則有所謂浩然者故其書卒貽後世語賦者莫如相如其作似不從人間來者以其慕藺也語史者莫如子長瑰瑋豪爽視古無上者以其上㑹稽探禹穴窺九疑浮沅湘以作其氣也唐之文人固無出退之者其入王庭湊軍也視若軒渠乳兒則足以知其氣矣若夫持正褊中禹錫浮躁元稹緣官人取寵吕溫茹便僻規進而宗元戚嗟於放廢之湘南皆其氣之不完者故其文章終綏於理亦其勢然也某從事於兹有間矣自以為有得是狂也以為無得是誣也凡此皆非所以慁凂閣下者自頃以來㑹有感發小復翺筆伸紙時時各有勝處視古人身後翰墨若冠屨然戢戢在目直未仰齎而俯納耳得非氣使之然乎不幸少失嚴訓著鞭不早三十得官拔從白丁則氣之搖奪者十一二矣愁凄脾以吟梁父物怵情以賦歸歟則氣之搖奪者十三四矣訾黑四出孤懷無所托宿而流俗病其前妬􅎱軋其後於是氣之搖奪者殆過半矣夫以拙疏之一身氣之所存才十五之餘不為孟子所謂梏亡者無幾耳方是時文章傑立有如閣下曽不自列以規一眄之遇則尚誰恃耶萬一閣下矜無庸而貸其賤割有餘而佐之教左培右擁使得稍復追緝往時過半之搖奪以完其所自養以振其存焉而未盡亡者則雖某不韻獨不得步古人後塵而髙謝翺湜溫稹等數子耶舊所為歌詩并雜著合三通謹獻諸下執事凡此皆出於平日氣之搖奪而僅存者閣下獨無意激發之乎答徐賡書誠齊宿昔辱臨晤語有頃知嗜學之不淺鑽文之不惰將有以應吾君俊茂之求而赴當世經濟之用也甚欣甚賀兹又䝉移書諏以今日科目文詞之利病某陳人也敢知時世詞章之利若病哉方掩荀躒之耳閉彌明之口之不暇而暇答乎哉非不敢也非不暇也聞之者必不信也信與不信固非所宜恤而又足下諏之而不置聊復狂言蓋聞文者文也在易為賁在禮為繢譬之為器工師得木必解之以為朴削之以為質丹雘之以為章三物者具斯曰器矣有賤工焉利其器之速就也不削不丹不雘解焉而已矣號於市曰器莫吾之速也速則速矣於用奚施焉時世之文將無類此抑又有甚者作文如作宫室其式有四曰門曰廡曰堂曰寢缺其一紊其二崇痺之不倫廣狹之不類非宫室之式也今則不然作室之政不自梓人出而雜然聽之於衆工堂則隘而廡有容門則納千駟而寢不可以置一席室成而君子棄焉庶民哂焉今其言曰文烏用式在我而已是廢宫室之式而求宫室之美也抑又有甚者作文如治兵擇械不如擇卒擇卒不如擇將爾械煆矣授之羸卒則如無械爾卒精矣授之妄校尉則如無卒千人之軍其禆將二其大將一萬人之軍其大將一其禆將十善用兵者以一令十以十令萬是故萬人一人也雖然猶有陳焉今則不然亂次以濟陳乎驅市人而戰之卒乎十羊九牧將乎以此當筆陳之勍敵不敗奚歸焉藉第令一勝所謂適有天幸耳抑又有甚者西子之與惡人耳目容貌均也而西子與惡人異者夫固有以異也顧凱之曰傳神寫照正在阿堵中又曰頰上加三毫殊勝得凱之論畫之意者可與論文矣令則不然逺而望之巍然九尺之幹迫而視之神氣索如也惡人而已乎抑又有甚者昔三老董公說髙帝曰仁不以勇義不以力惟文亦然由前之說亦未離乎勇力邦域之中也盍見董公而問之問而得之則送君者當自崖而返矣若夫前輩所謂古文者某亦嘗耳剽而手追矣顧足下方業科目夫業科目者固將有以合乎今之律度也合乎今未必不違乎古合乎古未必售於今使足下合乎古而不售於今足下何獲焉坌炭無愛也其他日之俟上陳丞相書撙齊學問貴少器識貴壯事業貴老未老之事業不出於器識者也未壯之器識不出於學問者也器識不自學問出則凡事業不自器識出則陋去凡去陋法在善養之善成之而已矣是故養事業有道器識未成莫養事業也養器識有道學問未成莫養器識也人生十年曰幼學自十年而之學心計學樂學射御此學問之端也自二十而之學禮舞大夏行孝弟如此十年則學問成矣所以養器識也故曰貴少自三十而之理男事博學無方孫友視志如此十年則器識成矣所以養事業也故曰貴壯自四十而之始仕方物出謀發慮道合則服從不可則去如此十年則事業可成矣自五十而之命為大夫而服官政豈非責其事業以成歟故曰貴老此孔孟之教也躬行如之孔子四十不惑孟子四十不動心其壯年器識固然矣養之然得學問力也魯定公十四年孔子五十有竒為魯相發少正卯奸狀而誅之周顯王三十有三年孟子五十有竒為梁師攻惠王邪心而正之七十有竒為齊卿充宣王仁心而大之其老年事業固然矣養之然得器識力也故萬世之下言器識言事業莫貴於孔孟公於今其為卿非齊卿其為相非魯相周之卿相也其為師非一國之師天下之師也視孔孟為有幸矣而公之年又與孔孟俱學問器識不得以未成為解繼自兹事業不一毫凡陋視孔孟始為無愧僕望於公如此未知公視僕如何僕自垂壯第太常衰已甚始列通籍蓋六十有三於兹矣初矢不鳴其老於人也今則伯夷太公以天下大老當天下大寄老者可一以其情鳴焉孔子去齊接淅而行曰去他國之道也孟子去齊三宿而後出晝曰王猶足用為善去豈所欲哉理無疑矣容有為焉未盡也僕考之魯昭公三十二年孔子去齊實四十二後之日猶長也未五十不稱老未老不稱叟周顯王之三十三年孟子至梁惠王曰叟則孟子蓋五十有竒也後二十三年是為赧王元年留齊對沈同伐燕之問又後始辭齊去則七十有竒後之日短矣後之日長則事業之心寬寬故不惜去不惜去故其行速後之日短則事業之心切切故惜去惜去故其行遲僕無孟子之德也犬馬之年去留齊去齊無幾鉛刀未忘一割其心切實如之區區此來進退之機重於一决雖然公之求士甚於士之求公自初參大政如歐陽文忠公然也位若年今加於文忠則求士之念今切於文忠矣其如視僕殆有寸長曽無一日雅何計於兹進退之機重於一决尤甚於僕人於是觀焉僕於是聽焉古文集成卷二十
