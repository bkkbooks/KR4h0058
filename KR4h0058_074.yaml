body:
  text: 古文集成卷七十四宋王霆震編前癸集五議舉逸民議劉龍雲探射隱伏妄意必得是前識者之詭性也要之以逹道則躓矣賤近貴逺比所從說是小智者之私嬰也概之以公心則屈矣古之人於賢者有一言焉必曰求乎云爾而未始置疑於前識小智則非以夫幽必詣逺必索然後顯乃可用近乃可得故邪斯舉逸民之意也蓋賢者退藏於深渺如罩罩之魚未易得也潔白不汚如皎皎之駒不徒來也應而非曲徇也出而非虛覯也翔而非苟集也永矢以逝而非不得已也彼將臣之必先賔之彼有饋焉必曰獻焉則何世而無逸民哉則亦無時而不舉矣竊嘗謂潛德之士如五噫之梁鴻三黜之下惠無適而不有彼惟耻與世俗子浪自沽激規巾糈末利轉徙蠻觸之域是以蟬蛻囂埃謝緣人封而在上者或不得而知之知之或不得而如審非必高逝獨往皆投淵洗耳徒也亦猶古人藏畔埋民自謂陸沉則豈率在寬間之野寂寞之濵也邪然人君之求之也不異乎衆而直取之寡不豐昵狎邇而先諸振拔之所不逮釋此稔熟之後塵佇彼方馳之來軫則亦逸民者誠在所急故也時無有莘之躬耕則三往之幣聘為虛禮人非傅巖之操築則惟肖之物色為徒飾必有臧丈人之賢然後可載而與之俱必有南陽之髙卧然後可以起而與之共事彼漢之君嘗知此矣至其久也弊卒乘焉武帝始以蒲輪迎枚生見主父偃而嘆息然猶不免有方朔之尚容光武委禮於故舊之嚴光勢適然爾未見有助也而樊英楊厚之徒激其頽波至三閲順帝之聘而不少屈李固朱穆以謂處士純盜虛名良亦有由也至於唐人則殆又甚焉士之既文而不既實非士成綺則公文軒之比也徇物而不徇己非南榮趎則滿苟得之類也李渤隱少室韓愈詆以索價高而終南嵩少區區窮絶之域至號仕途捷徑逸民之弊一至於此彼孔子所謂天下之民歸心焉果若是乎國家由祖宗以來士之䕃長松而藉豐草伍猿鶴而輩鹿豕以逸民自占者時有人焉如楊朴种放輩或召而不至或至而爵不留故大中祥符之制曰頒一尺之詔方俟於來庭馳駟馬之車未聞於戒道其急得人乃如是聖上側席異人惟恐弗及譬猶剖璞窮崖洗去埋蝕披豹䝉霧發彼幽姿下取文木之殫殘更增青黃之新飾往嵗至有徒步由處士而起頴隂者未能閲歲旋見躡文石摩螭頭而厠侍從之列矣士於斯時翕然嚮慕甚於逺壑之赴隆墀一何盛哉逮今蓋歷稔矣卒未有嗣其後者豈遂無其人邪且技癢之卜肆不無拔俗之君平末業之魚鹽時有晚出之膠鬲則况萬里之海隅乎直求之未悉爾然賢者耻於自進則惟恐人知而未嘗從人而求知緩於必得則惟恐利合而未嘗赴人而合利東海之濵有賢人焉吾得而知之然後舉北海之濵有賢人焉吾得而知之然後舉則是知之每審而舉每隨之也既已舉之則賢否不待較而明矣方復曹搜伍比角之以無益之空文則猶科舉若也彼來游來歌者能勿望望而驚乎前日之敦遣是已為今之說也莫若於每嵗之終縣委之令而舉諸守州委之守而舉之監司監司於是乎舉而升諸朝朝委二三執政大臣相與諏逮而稽察之信乎其不窽於實也然後即其地給傳遣行亦若古人之所謂勸駕之為者率一道無一人焉雖勿舉可也率數人而聚一道雖遍舉之亦可也及其用也然猶視是人適事之材否而加舉者之懲勸焉則竒偉拔出之士宜有出而應上之求矣齊之紈楚之綃㑹稽之竹箭豫章之金鐵陳夏之髹漆窮巴之文梓阿井之沉液與夫丹砂赤箭或生蠻蜒或産儋耳初非近人也惟其人近之是以中國無一物之缺而冨家巨室卒取盈焉又况於逸民者乎顧上之人所求如何耳武功爵議龍雲漢高帝提孤劒起豐沛轉戰數百以至摧項籍有天下諸將力也嘗觀夏侯絳灌之屬披荆棘沫霜露用力為多而爵之酬也方在一二計城而十百纍級也平陽舞陽視諸將功居最至由中㳙列大夫積數年僅得徹侯曾不如黥韓輩計日而王指土而食也由是言之爵賞固自有次第哉無隙可投無巇可抵則辨者滕口而耻說之不見售卧鼓韔弓無與為敵則悍者揚茀氣鷙右武而憤力之不得行與夫挂功宿名之士喪元沒齒而不自以為悔則彼誠有以驅之故也然則漢之議臣請置賞官名曰武功賞爵者豈得為無謂乎蓋勇遺身後者翣資可得而去不以力殞者兆域無從而入死且有激生亦宜然春秋之法與楚者固有不一而足則况積閲之戰士乎昔秦石權尚霸挈國以呼功利孝公接之商君業之舉其民而頓之必爭之地則武功爵其兆也秦人不愛殊死以叨大利今日之陷鋒膏鏑長為不反之腐胔是乃前日之叨名殊死而拔自上造者也欲使之無死得乎哉蓋其法斬一首賜爵一級欲為官者五千石自公士簮裊循緣而上以至徹侯等為二十視功孰多迎受其至譬猶堂有九陛禮每有加則取等而進無不可者故秦卒以并諸侯一天下則斯爵蓋與有力也高帝之始法制搶攘文景因之時惟息肩斯爵不暇講勢則然矣比及孝武承奕世之烈奮毒民之武恚彼胡馬之數窺臨以衛霍之飛將南剪徑越北却天驕于襄即序之美僅追一二而中國之罷耗與虜略相當矣彼議者因縣官之觳也乃始請置賞官則賞官之設不獨純寵戰士而止爾利在五千石入也彼抑孰知古人抑縱推挽更自有術而初不止是邪後世弗究其實一切煩為號名爵列以啓夸跋之隙於是勳階乘之而柱國開府之號每為亟奬則彌非舊矣又况若騎都尉關內侯而方之爛羊者乎昔祖宗西取巴蜀南尅嶺表吳㑹荆巫以次俱下最後殄并汾撫江左以截九有神武之所震疊如屈伸肘唯所欲加則武功爵雖未始或用固不害其為賞功也雖然戰功曰多在司勳固所不廢而昔人之兵法使貪與焉使其終身長不離故處則無慮悉掉臂引去為閭巷自好人也尚誰肯甘長勞而騖危道乎此武功爵冝在所急也若乃賞不視勞爵不酬能則鬬士體已解矣方復掇拾煩委之號名一切紛更之為彼不旋日而徼利者果可欺以美觀乎不幸功狀暗曖忮心之將方得快私欲於一日之去取虛名未移而實效旋廢是重失衆望未見能飽其貪志者也則漢人之議疑若可緩矣昔之人一避螳怒而士氣百倍一投單醪而衆舉厭足危事之譏固有作其真情者彼所謂爵賞特外之一助耳况號名乎亦因時之冝比次而已矣何必秦復圜土議龍雲先王以君子長者之道待天下而欲人之相與適其當也初無意於用刑不幸天下之人時有不出乎善人之途而後刑將不免則先王於是又有不忍之心加焉猶曰姑教之而勿殺也斯大司冦以圜土聚教罷民之意歟說者曰圜主規規主仁蓋以仁本刑者圜土是已傳曰唯强而有力者能行禮然則不能行禮者罷民是已必於罷民言不能行禮則以嘉石之所平者知之故也彼民之生天地實囿其形則疑若有拘而無肆矣其或不能强力是自棄也不能由禮是自放也放棄之民唯收乃可則彼將更自取囿而以拘即拘者也是何時而輒肆邪雖欲無怵乎圜土不可得矣不力於事散徙弗常則大司冦於是乎言聚之矣一身之至約而莫知孰置則大司冦於是乎言置之矣潰如湍水逸如放豚則司圜於是乎言收之矣往而不返流而不止則司救於是乎言歸之矣是圜土之本末也雖然大司冦之所施蓋亦有序焉坐諸嘉石役諸司空聚之圜土如是而已禮之為物譬火在木因鑽顯照棄也弗取是誰之過歟石無知物也且以嘉獲名可以人而不如石乎桎梏之所取是在我也使能知此則先王尚焉取而坐之乎坐之而猶以為不足於是又繼之以司空之役矣夫生以勞矣又况以故取勞哉不為賢已辱矣徒以不能禮而重取辱孰若以禮自克使能知此則先王尚焉取而役之乎役之而猶以為不足於是又繼之以圜土之聚教矣先王之於民惡夫置之而不恕然又惡夫恕之而不置也不教而誅仁則吾不知也教之不從而不誅義則吾不知也圜土之法施職不如耻之明刑改而反于國中猶三年不齒與夫不能改而出圜土者殺是殆所謂仁矣而卒不害其為義歟仁逺乎哉義在其中矣義逺乎哉禮名其中矣雖然請因卒其緒說焉嘗以謂禮刑相為表裏者也禮之所去是刑之所取彼其拘之乃終將愛之也其教之也幡然改而知禮則良知良能不鑠於形盤體肆之僞而放僻邪侈之習斯逺矣其教之也幡然改而行禮則力不敢身自愛情不敢家自戾向也愚者之所病不肖者之所拘今也可得而撙節矣夫如是則勇鬬好犯之氣弭而和樂豈弟之風移一旦擇吉地而投足一旦有涯而尊生彼挂身刑禍之肆而為世大戮者尚誰乎此先王之時所以有賴於圜上為不少而卒之以刑措不用歟故曰禮禁將然之前法施已然之後豈虛言哉末世尅核太至仁不下逮其所以俟民者略方復一切羅取瑕釁僅如析毫洗垢而麗人之辟往往傍及於遷就不辜至號其獄為虎穴則慘亦甚矣語曰畫地為牢義不入亦所居之勢然也然其圜土之法其可復於今乎曰道德弗明教化弗行悍民之幸願民之不幸雖煩為刑禁猶不足以督不勝之奸宄况圜土乎脫以謂必復圜土然後慊則今之犯流而加役與夫命城曰牢者去圜土蓋亦無幾矣尚焉取而復之乎唯上之人講修所以憫憐元元之道謹防範明分守相與趨嘉㑹之適而一切接以粲然之至文則禮俗成刑斯省矣何必一二而追先王之迹哉是以孝文太宗之治而斷獄數百幾致刑措則况休明之盛際乎古文集成卷七十四
