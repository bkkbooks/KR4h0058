body:
  text: 古文集成卷五十八宋王霆震編前辛集四封事戊申封事朱文公文公年譜云疏入夜漏下七刻孝宗已就寢亟起秉燭讀之終篇翌日除主管太乙宫兼崇政殿說書十一月一日朝奉郎直寶文閣主管西京嵩山崇福宫臣朱熹謹齊沐具疏昧死再拜獻於皇帝陛下臣切觀今日天下之勢如人之有重病內自心腹外達四肢蓋無一毫一髮不受病者雖於起居飲食未至有妨然其危迫之證深於醫者固已望而走矣是必得如盧扁華陀之輩投以神丹妙劑為之湔腸滌胃以去病根然後可以幸於安全如其不然則病日益深而病者不覺其可寒心殆非俗醫常藥之所能及也故臣前日之奏輒引藥不瞑眩厥疾不瘳之語意蓋為此而其言有未盡也然天下之事所當言者不勝其衆獨以天下之大本為今日之急務深為陛下言之蓋天下之大本者陛下之心也今日之急務輔翼太子選任大臣振舉綱維變化風俗愛養民力修明軍政六者是也臣請昧死而悉陳之惟陛下之留聽焉臣之輒以陛下之心為天下之大本者何也天下之事千變萬化其端無窮而無一不本於人主之心者此自然之理也故人主之心正則天下之事無一不出於正人主之心不正則天下之事無一得由於正蓋不惟其賞之所勸刑之所威各隨所向勢有不能己者而其觀感之間風動神速又有甚焉是以人主以眇然之身居深宫之中其心之邪正若不可得而窺者而其符驗之著於外者常若十目所視十手所指而不可掩此大舜所以有惟精惟一之戒孔子所以有克己復禮之云皆所以正吾此心而為天下萬事之本也此心既正則視明聽聰周旋中禮而身無不正是以所行無過不及而能執其中雖以天下之大而無一人不歸吾之仁者臣謹按尚書舜告禹曰人心惟危道心惟微惟精惟一允執厥中夫心虛靈知覺一而已矣而以為有人心道心之别者何哉蓋以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或之微而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜乎方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝乎人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安而微者著動靜云為自無過不及之差矣又按論語顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由已而由人乎哉夫仁者本心之全德也己者一身之私欲也禮者天理之節文也蓋人心之全德莫非天理之所為然既有是身則亦不能無人欲之私以害焉故為仁者必有以勝其私欲而復於禮則事皆天理而本心之德復全於我也心德既全則雖以天下之大而無一人不歸吾之仁者然其機則固在我而不在人也日日克之不以為難則私欲淨盡天理流行而仁不可勝用矣此大舜孔子之言而臣輒妄論其所以用力之方如此伏乞聖照然邪正之驗著於外者莫先於家人而次及於左右然後有以達於朝廷而及於天下焉若宫闈之內端莊齊肅后妃有關睢之德後宫無盛色之譏貫魚順序而無一人敢恃恩私以亂典常納賄賂而請行謁此則家之正也退朝之後從容燕息貴戚近臣擕僕奄尹陪侍左右各恭其職而上憚不惡之嚴下謹戴盆之戒無一人敢通內外竊威福招權市寵以紊朝政此則左右之正也內自禁省外徹朝廷二者之間洞然無有毫髮邪私之間然後發號施令羣聽不疑進賢退奸衆志咸服紀綱得以振而無侵撓之患政事得以修而無阿私之失此所以朝廷百官六軍萬民無敢不出於正而治道畢也心一不正則是數者固無從而得其正是數者一有不正而曰心正則亦安有是理哉是以古先聖王兢兢業業特守此心雖在紛華波動之中幽獨得肆之地而所以精之一之克之復之如對神明如臨淵谷未嘗敢有須臾之怠然猶恐其隱微之間或有差失而不自知也是以建師保之官以自開明列諫諍之職以自規正而凡其飲食酒水衣服次舍器用財賄與夫宦官宫妾之政無一不領於冡宰之官使其左右前後一動一靜無不制以有司之法而無一芥之隙瞬息之頃得以隱其毫髮之私蓋雖以一人之尊深居九重之邃而凜然常若立乎宗廟之中朝廷之上此先王之治所以由內及外自微至著精粹純白無少瑕翳而其遺風餘烈猶可以為後世法程也臣切見周禮天官冡宰一篇乃周公輔導成王垂法後世用意最深切處欲知三代人主正心誠意之學於此考之可見其實伏乞聖照陛下試以是思之吾之所以精一克復而持守其心者果嘗有如此之功乎所以修身齊家而正其左右者果嘗有如此之效乎宫省事禁臣固有不得而知者然不見其形而視其影不覩其內而覘其外則爵賞之濫貨賂之流閭巷竊言久已不勝其藉藉矣臣切以是窺之則陛下之所以修之家者恐其未有以及古之聖王也至於左右便嬖之私恩遇過當往者淵覿說忭之徒勢熖熏灼傾動一時今已無可言矣獨有前日臣所面奏者切以為此輩但當使之守門傳命供掃除之役不當假借崇長使得逞邪媚作淫巧於內以蕩上心立門庭招權勢於外以纍聖政而其有才無才有罪無罪自不當論况其有才適所以為奸有罪而不可復用乎且如向來主管喪事飲食几筵之命逺近傳聞無不切笑臣不知國史書之野史記之播於夷狄傳於後世且以陛下為何如主也縱有曲折如前日所以諭臣者陛下亦安能家置一喙而人曉之耶刑餘小醜不比人類顧乃熒惑聖心虧損聖德以至此極而公卿大臣拱手熟視無一言以救其失臣之痛心始者惟在於此比至都城則又知此曹之用事者非特此人而侍從之臣蓋已有出其門者臣伏見陛下即位以來臣下稍有知識無不以此事為言者既皆不䝉聽納甚者或至抵罪故自近年以來無復有言此者蓋知其根株牢固不可動搖言之無益徒取乖牾以致所言他事亦不見用故置此事於度外而姑論其次耳不唯如此亦以過失之萌人所創見故以為異而爭言之及其既久則習熟見聞以為常事而不足言正如近年冬雷秋雪時時有之人遂不以為異然此豈可常之理哉惟臣愚暗不識時宜故今日猶復論此人所諱言而厭道之事雖幸不䝉誅斥而亦未見有所施行也臣竊思之必使陛下聽踈逺之言而逐其平日深所愛幸之人誠有所難能者然此事利害既陳於前而臣所深憂又恐其不可為後世法也伏惟陛下深為宗社子孫萬世之慮忍而行之天下幸甚至其納財之塗則又不於士大夫而專於將帥臣於前日亦嘗輒以面奏而陛下諭臣以為誠當深察而痛懲之矣退而始聞陛下比於環列之尹已嘗有所易置乃知陛下固已深察其弊而無所待於人言然猶未嘗明正其罪而反寵以崇資巨鎮使即便安此曹無知何所忌憚况中外將帥其不為此者無幾陛下亦未能推其類而悉去之也臣切聞之道路自王抃既逐之後諸將差除多出此人之手蓋抃與此人專為諸將交通內侍納賂買官得其㫖意風喻軍中等第論薦以欺陛下實將帥之牙儈也今雖去之而未正其罪又聞向者鄂帥尅剝之事亦是此人內外營救遂致罪人漏網言者被罪中外至今為之不平既而又有匿名揭榜暴其過惡者亦被决配此不惟行遣太偏足為聖政之纍而自此之後遂無復有人敢言諸將之罪者以小人握重兵或在周廬肘腋之間或在江湖千里之外而中外無一人敢白其奸此於國計深恐未便前代之鑒蓋亦非細伏乞陛下少留聖慮陛下竭生靈之膏血以奉軍旅之費本非得已而為軍士者顧乃未嘗得一溫飽甚者採薪織屨掇拾糞壤以度朝夕其又甚者至使妻女盛塗澤倚市門以求食也怨詈謗讟悖逆絶理至有不可聞者一有緩急不知陛下何所倚仗是皆為將帥者巧為名色頭㑹箕斂隂奪取其糧賜以自封殖而行貨賂於近習以圖進用彼此既厭足矣然後時以薄少號為羡餘隂奉燕私之費以嫁士卒怨怒之毒於陛下且幸陛下一受其獻則後日雖知其罪而不得復有所問也出入禁闥腹心之臣外交將帥共為欺蔽以至於此豈有一毫愛戴陛下之心哉而陛下不悟反寵昵之以是為我之私人至使宰相不得議其制置之得失給諫不得論其除授之是非以此而觀則陛下所以正其左右未能及古之聖王又明矣且私之得名何為也哉據已分之所獨有而不得以通乎其外之稱也故自匹夫而言則以一家為私而不得以通乎其鄉自鄉人而言則以一鄉為私而不得以通乎其國自諸侯而言則以一國為私而不得以通乎天下至於天子則際夫天之所覆極地之所載莫非已分之所有而無外之不通矣又何以私為哉今以不能勝其一念之邪而至於有私心以不能正其家人近習之故而至於有私人以私心用私人則不能無私費於是內損經費之入外納羡餘之獻而至於有私財陛下上為皇天之所子全付所覆使其無有私而不公之處其所以與我者亦不細矣乃不能充其大而自為割裂以狹小之使天下萬事之弊莫不由此而出是豈不可惜也哉臣竊聞太祖皇帝改營大內既成躬御正殿洞開重門顧謂侍臣曰此如我心少有邪曲人皆見之竊謂太祖皇帝不為文字言語之學而其方寸之地正大光明直與堯舜之心若合符節此其所以肇造區夏而垂裕無疆也伏惟陛下逺稽前聖而近以皇祖之訓為法則一心克正而逺近莫敢不一於正矣伏乞聖照若以時勢之利害言之則天下之勢合則彊分則弱故諸葛亮之告其君曰宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也當是之時昭烈父子以區區之蜀抗衡天下十分之九規取中原以興漢室以亮忠智為之深謀而其䇿不過如此可謂深知時務之要而暗合乎先王之法矣夫以蜀之小而於其中又以公私自分彼此如兩國然則是將以梁益之半圖吳魏之全又且內小人而外君子廢法令而保姦回使內之所出者日有以賊乎外公之所立者常不足以勝乎私則是此兩國者又自相攻而其內之私者常勝外之公者常負也外有鄰敵之虞內有隂邪之冦日夜夾攻而不置為國家者亦已危矣夫以義理言之既如彼以利害言之又如此則今日之事如不蚤正臣恐陛下之心雖勞於求賢而一有所妨乎此則賢人必不得用而所用者皆庸繆憸巧之人雖勤於立政而一有所礙乎此則善政必不得立而所行者皆阿私苟且之政日往月來養成禍本而貽燕之謀未逺輔相之職不修紀綱壞於上風俗壞於下民愁兵怨國勢日卑一旦猝有不虞臣切寒心不知陛下何以善其後也然則臣之所謂天下大本惟在陛下之一心者可不汲汲皇皇而求有以正之哉臣昨來面奏劄子內一節云伏願陛下自今以往一念之萌則必謹而察之此為天理耶為人欲耶果天理也則敬以廣之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之知其為是而行之則行之惟恐其不力而不當憂其力之過也知其為非而去之則去之惟恐其不果而不當憂其果之甚也知其為賢而用之則任之惟恐其不專聚之惟恐其不衆而不當憂其為黨也知其為不肖而退之則退之惟恐其不速去之惟恐其不盡而不當憂其有偏也如此則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將為陛下之所為無不如志矣今恐日久元本不存再此具奏伏乞聖照至於輔翼太子之說則臣前日所謂數世之仁者蓋已微發其端而未敢索言之也夫太子天下之本其輔翼之不可不謹見於保傅傳者詳矣陛下聖學高明洞貫古今宜不待臣言而諭然臣嘗竊怪陛下所以調護東宫者何其踈略之甚也由前所論而觀之豈非所以自治者猶未免於踈略因是亦以是為當然而不之慮耶夫自王十朋陳良翰之後宫寮之選號為得人而能稱其職者蓋已鮮矣而又時使邪佞儇薄闒冗庸妄之輩或得參錯於其間所謂講讀聞亦姑以應文備數而未聞其有針規之效至於從容朝夕陪侍逰燕者又不過使宦官數輩而已皇太子睿性夙成閲理久熟雖若無待於輔導然人心難保習氣易汙習於正則正習於邪則邪此古之聖王教世子者所以必選端方正直道術博聞之士與之居處而又使之逐去邪人不使見惡行蓋常謹之於微不待其有過而後規也今三代之制或不可考正以唐之六典論之東宫之官師傅賔客既職輔導而詹事府兩春坊實擬天子之三省故以詹事庶子領之其選甚重今則師傅賔客既不復置而詹事庶子有名無實其左右春坊遂直以使臣掌之何其輕且䙝之甚耶夫立太子而不置師傅賔客則無以發其隆師親友尊德樂義之心獨使春坊使臣得侍左右則無以防其戲慢媟狎奇邪雜進之害此已非細事矣至於皇孫德性未定聞見未廣又非皇太子之比則其保養之具尤不可以不嚴而今日之官屬尤不備責任尤不專豈任事者亦有所未之思耶謂宜深詔大臣討論前代典故東宫除今已置官外別置師傅賔客之官使與朝夕逰處罷去春坊使臣而使詹事庶子各復其職宫中之事一言之入一令之出必由於此而後通焉又置贊善大夫擬諫官以針闕失王府則宜稍倣六典親王之制置傅友咨議以司訓導置長史司馬以總衆職妙選耆德不雜他材皆置正員不為兼職明其職掌以責功效則其官屬已略備矣陛下又當以時召之使侍燕逰從容啓迪凡古先聖王正心修身平治天下之要陛下之所服行而已有效與其勉慕而未能及愧悔而未能免者傾倒羅列悉以告之則聖子神孫皆將有以得乎陛下心傳之妙而宗社之安統業之固可以垂於永久而無窮矣此今日急務之一也臣伏見比者聖詔令皇太子參决庶務此見聖慮之深將使皇太子以時習知國家政事之得失也然臣之愚見則以為使之習事不若勉其修德况今皇太子育德春宫幾二十年其於天下之事蓋不待習而無不熟矣獨恐正心修德之學未至而於物欲之私未免有所繫纍則雖習於其事而或不能自决於取舍之間故臣切論輔養之未至者非有他也但欲陛下更留聖意於此而已伏乞聖照至於選任大臣之說則臣前所謂勞於求賢而賢人不得用者蓋已發其端矣夫以陛下之聰明豈不知天下之事必得剛明公正之人而後可任也哉其所以常不得如此之人而反容鄙夫之竊位者非有他也直以一念之間未能撤其私邪之蔽而燕私之好便嬖之流不能盡由於法度若用剛明公正之人以為輔相則恐有以妨吾之事害吾之人而不得肆是以選掄之際常先排擯此等置之度外而不取凡疲懦軟熟平日不敢直言正色之人而揣摩之又於其中得其至庸極陋决可保其不至於有所妨者然後舉而加之於位是以除書未出而其物色先定姓名未顯而中外已逆知其决非天下之第一流矣故以陛下之英明剛斷略不世出而所取以自輔者未嘗有如汲黯魏徵之比顧常反得如秦檜晚年之執政臺諫者而用之彼以人臣竊國柄而畏忠言之悟主以發其奸也故專取此流以塞賢路蔽主心乃其勢之不得已者陛下尊居宸極威福自己亦何賴於此輩而乃與之共天下之政以自蔽其聰明自壞其綱紀而使天下受其弊哉夫其所以取之者如此故其選之不得而精選之不精故任之不得而重任之不重則彼之所以自任者亦輕夫以至庸之材當至輕之任則雖名為大臣而其實不過供給唯諾奉行文書以求不失其窠坐資給如吏卒之為而已求其有以輔聖德修朝政而振紀綱不待智者而知其必不能也下此一等則惟有作奸欺植黨與納貨賂以濁亂陛下之朝廷耳其尤甚者乃至十有餘年而後敗露以去然其列布於後以希次補者又已不過此等人矣蓋自其為臺諫為侍從而其選已如此其後又擇其尤碌碌者而登用之則亦無怪乎陛下常不得天下之賢材而屬任之也然方用之之初亦曰姑欲其無所害於吾之私而已夫豈知其所以害夫天下之公者乃至於此哉陛下試反是心以求之則庶幾乎得之矣蓋不求其所喜而求其可畏不求其能適吾意而求其能輔吾德不憂其自任之不重而常恐吾所以任之者之未重不為燕私近習一時之計而為宗社生靈萬世無窮之計陛下誠以此取之以此任之而猶曰不得其人則臣不信也此今日急務之二也至於振肅紀綱變化風俗之說則臣前所謂勤於立政而善政卒不得立者亦已發其端矣夫以陛下之心憂勤願治不為不至豈不欲夫綱維之振風俗之美哉但以一念之間未能去其私邪之蔽是以朝廷之上忠邪雜進刑賞不分士大夫之間志趣卑汙廉恥廢壞顧猶以為事理之當然而不思有以振厲矯革之也蓋明於內然後有以齊乎外無諸已然後可以非諸人今宫省之間禁密之地而天下不公之道不正之人顧乃得以窟穴盤踞於其間而陛下目見耳聞無非不公不正之事則其所以薰蒸銷鑠使陛下好善之心不著疾惡之意不深其害己有不可勝言者矣及其作奸犯法則陛下又未能深割私愛而付諸外廷之議論以有司之法是以紀綱不能無所撓敗而所以施諸外者亦因是而不欲深究切之且如頃年方伯連帥嘗有以贓汙不法聞者矣鞫治未竟而已有與郡之命及臺臣有言則遂與之祠祿而理為自陳至於其所藏匿作過之人則又不復逮捕付獄名為降官而實以解散其事此雖宰相曲庇鄉黨以欺陛下然臣切意陛下非全然不悟其欺者意必以為人情各有所私我既欲遂我之私則彼亦欲遂彼之私君臣之間顔情稔熟則其勢不得不少容之且以為雖或如此亦未至甚害於事而不知其敗壞綱紀使中外聞之腹非巷議皆有輕侮朝廷之心奸贓之吏則皆鼓舞相賀不復畏陛下之法令則亦非細故也又如廷臣爭議配享其間邪正曲直固有所在則兩無所問而并去之監司挾私以誣郡守則不問其曲直而兩皆罷免監司使酒以凌郡守亦不問其曲直而兩皆與祠宰相植黨營私孤負任使則曲加保全而使之去臺諫懷其私恩隂拱不言而陛下亦不之問也其有初自小官擢為臺諫三四年聞趍和承意不能建明一事則年除嵗遷至極其選一日論及一二武臣罪惡則便斥為郡守而不與職名從臣近典東畿逺帥西蜀一遭飛語則體究具析無所不至及究析來上而所聞不實則言之者晏然一無所訶山陵諸使鬻賣辟闕煩擾吏民御史有言亦無行遣而或反得超遷御史言及畿漕則名補卿列而實奪之權其所言者則雖量加絀削而繼以進用臣伏見近年惟有王張近習一事賞信罰必無所假借自餘百事多務含容曲直是非兩無所問似聞聖意以謂如此處置方得均平此誠堯舜之用心也然臣於此切有疑焉若推其本則臣固已妄論於前只據平之一字而言則臣於易象稱物平施之言切有感也蓋古之欲為平者必稱其物之大小高下而為其施之多寡厚薄然後乃得其平若不問其是非曲直而待之如一則是善者常不得伸而惡者反幸而免以此為平是乃所以為大不平也故雖堯舜之治既舉元凱必放共兜此又易象所謂遏惡揚善順天休命者也蓋善者天理之本然惡者人欲之邪妄是以天之為道既福善而禍淫又以賞罰之權寄之司牧使之有以補助其禍福之所不及然則為人君者可不謹執其柄而務有以奉承之哉伏惟陛下深留聖意從班之中賢否尤雜至於終嵗緘默不聞一言以禆聖聽者顧亦隨羣逐隊排連儧補其桀黠者乃敢造飛語立橫議如臣前所陳者而宰相畏其凶熖反撓公議而從之臺諫亦不敢以聞於陛下而請其罪臣聞古先聖王敷求哲人俾輔後嗣然則今日正是博求賢能置之列位之時而此人趣操不謹俱為身害乃敢隂為讒慝公肆劫時遂其奸謀不為國計欲望聖慈密賜宣問陛下視此綱紀為如何耳可不反求諸身而亟有以振肅之耶綱紀不正於上是以風俗頺敗於下蓋其為患之日久矣而浙中為尤甚大率習為軟美之態依阿之言而以不分是非不辨曲直為得計下之事上固不敢少忤其意上之御下亦不敢稍咈其情惟其私意之所在則千塗萬轍經營計較必得而後已甚者以金珠為脯醢以契劵為詩文宰相可啖則啖宰相近習可通則通近習惟得之求無復廉恥父詔其子兄勉其弟一用此術而不復知有忠義名節之可貴其俗已成之後則雖賢人君子亦不免習於其說一有剛毅正直守道循理之士出乎其間則羣譏衆排指為道學之人而加以矯激之罪上惑聖德下鼓流俗蓋自朝廷之上以及閭里之間十數年來以此二字禁錮天下之賢人君子復如崇宣之間所謂元祐學術者排擯詆辱必使無所容措其身而後已嗚呼此豈治世之事而尚復忍言之哉又其甚者乃敢誦言於衆以為陛下嘗謂今日天下幸無變故雖有伏節死義之士亦何所用此言一播大為識者之憂而臣有以知其必非陛下之言也夫伏節死義之士當平居無事之時誠若無所用者然古之人君所以必汲汲以求之者蓋以如此之人臨患難而能外死生則其在平世必能輕爵祿臨患難而能盡忠節則其在平世必能不詭隨平日無事之時得而用之則君心正於上風俗美於下足以逆折奸萌潛消禍本自然不至真有伏節死義之事非謂必知後日當有變故而預蓄此人以擬之也惟其平日自恃安寧便謂此等人才必無所用而專取一種無道理無學識重爵祿輕名義之人以為不務矯激而尊寵之是以綱紀日壞風俗日偷非常之禍伏於冥冥之中而一旦發於意慮之所不及平日所用之人交臂降叛而無一人可同患難然後前日擯棄流落之人始復不幸而著其忠義之節以天寶之亂觀之其將相貴戚近幸之臣皆已頓顙賊庭而起兵討賊卒至於殺身湛族而不悔如巡逺杲卿之流則逺方下邑人主不識其面目之人也使明皇早得巡等而用之豈不能銷患於未萌巡等早見用於明皇又何至真為伏節死義之舉哉商鑒不逺在夏后之世此識者所以深憂於或者之言也雖以臣知陛下聖學高明識慮深逺决然不至有此議論然每念小人敢託聖訓以蓋其奸而其為害至於足以深沮天下忠臣義士之氣則亦未嘗不痛心疾首而不敢以識者之慮為過計之憂也陛下視此風俗為如何可不反求諸身而亟有以變革之耶此今日急務之三四也至於愛養民力修明軍政之說則民力之未裕生於私心之未克而宰相臺諫失職也軍政之未修生於私心之未克而近習得以謀帥也是數說者臣皆已極陳於前矣今請即民力之未裕而推言之臣聞虞允丈之為相也盡取版曹嵗入窠名之必可指擬者號為嵗終羡餘之數而輸之內帑顧以其有名無實積纍掛缺空載簿籍不可催理者撥還版曹其為說曰內帑之積將以備他日用兵進取不時之須而版曹目今經費已自不失嵗入之數聽其言誠甘且美矣然自是以來二十餘年內帑嵗入不知幾何而認為私貯典以私人宰相不得以式貢均節其出入版曹不得以簿書勾考其在亡其日銷月耗以奉燕私之費者蓋不知其幾何矣而曷嘗聞其能用此錢以充軍中之用如太祖皇帝之言哉徒使版曹經費缺乏日甚督趣日峻以至廢去祖宗以來破分良法而必以十分登足為限以為未足則又造為比較監司郡守殿最之法以誘脅之不復問其政教設施之得失而一以其能剝民奉上者為賢於是中外承風競為苛急監司明諭州郡郡守明諭屬邑不必留心民事惟務催督財賦此民力之所以重困之本而稅外無名之賦如和買折帛科罰月樁之屬尚未論也臣伏見祖宗舊法凡州縣催理官物已及九分以上謂之破分諸司即行住催版曹亦置不問由是州縣得其贏餘以相補助貧民些小拖缺亦得遷延以待蠲放恩自朝廷惠及閭里君民兩足公私俱便此誠不刋之令典也昨自曽懷用事始除此法盡刷州縣舊缺以為隱漏悉行拘催於是民間稅物豪分銖兩盡要登足曾懷以此進身遂取宰相而生靈受害寃痛日深得財失民猶為不可况今政煩賦重民卒流亡所謂財者又將無有可得之理若不早救必為深害臣每讀大學卒章見其所論小人之使為國家菑害並至雖有善者亦無如之何者其言丁寧痛切未嘗不為寒心惟陛下少留聖意亟發德音以幸天下其次則陛下所用之宰相不能擇中外大吏而惟徇私情之厚薄所用之臺諫不能公行紏劾而惟快己意之愛憎是以監司郡守多不得人而其賢者或反以舉職業忤臺諫而遭斥逐也至於監司太多而事權不歸於一銓法雖密而縣令未嘗擇人則又其法之有未善者然其本正則此等不難區處其本未正則雖或舉此臣恐未見其益而反有害也又嘗即夫軍政之不修而推之則臣聞日者諸將之求進也必先掊尅士卒以殖私財然後以此自結於陛下之私人而祈以姓名達於陛下之貴將貴將得其姓名即以付之軍中使自什伍以上節次保明稱其材武堪任將帥然後具為奏牘而言之陛下之前陛下但見其等級推先案牘具備則誠以為公薦而可得人矣而豈知其諧價輸錢已若晚唐之債帥哉只此一事有耳者無不聞有口者無不道然以其門戶幽深蹤跡詭祕故無路得以窺其交通之實狀是以雖或言之而陛下終不信也夫將者三軍之司命而其選置之方乖剌如此則彼智勇材略之人其孰肯抑心下首於宦官宫妾之門而陛下之所得以為將帥者皆庸夫走卒固不知兵謀師律之為何事而惟刻剝之是先交結之是圖矣陛下不知其然而猶望其修明軍政激勸士卒以彊國勢豈不誤哉然將帥之不得人非獨士卒之受其弊也推其為害之極則又有以及乎民者蓋將帥得人則尺籍嚴而儲蓄羡屯田立而漕運省今為將帥者如此則固無望其肯核軍實而豐儲蓄矣至於屯田則彼自營者尤所不願故朝廷不免為之别置使者以典治之而兵屯之衆資其撥遣則又不免使參其務然聞其占護軍人不肯募其願耕者以行而强其不能者以往至屯則偃蹇不耕而反為民田之害使者文吏其力蓋有所不能制者是以陛下欲為之切而久不得成也屯田不立漕運煩費諸州苖米至或盡數起發而無以供州兵之食則加耗斛面之弊紛紛而起而民益困矣又凡和買折帛科罰月樁之類往往亦為供軍之故而不可除若屯田立而所資於諸路者减則此屬庶乎其皆可禁矣今乃不然則是置將之不善而害足以及民也凡此數者根株深固枝條廣闊若不可以朝變而夕除者然究其本則亦在夫陛下之反諸身耳聖心誠無不正則必能出私帑以歸版曹矣版曹不至甚缺必能復破分之法除殿最之科以寬州縣矣聖心誠無不正則必能擇宰相以選牧守矣擇臺諫以公刺舉矣聖心誠無不正則必能嚴宦官兵將交通之禁而以屬將屬宰相矣宰相誠得其人則必能為陛下擇將帥以作士氣討軍實廣屯田以省漕運矣上自朝廷下達州縣治民典軍之官既皆得人然後明詔宰相議省監司之員而精其選重其責又詔銓曹使以縣之劇易分為等差而常切詢訪天下之官吏能為縣者不拘薦舉之有無不限資格之高下而籍其姓名使以次補最劇之縣果有治績則優而進之不勝其任則黜而退之凡州縣之間無名非理之供橫斂巧取之政其泰甚而可去者可以漸去而民力庶乎其可寬矣至於屯田之利則以臣愚見當使大將募軍士使者招游民各自為屯不相牽制其給授課督賞罰政令各從本司自為區處軍中自有將校可使不須别置官吏使者則聽其辟置官屬三五人指使一二十人以備使令又擇從官通知兵農之務兼得軍民之情者一員為屯田使總治兩司之政而通其奏請趣其應副又以嵗時按行察其勤惰之實以行誅賞如此則兩屯心競各務其功田事可成漕運可省而諸路無名非理之供橫斂巧取之政前日有所不獲已而未可盡去者今亦可以悉禁民力庶乎其益裕矣此今日急務之五六也屯田一事如臣之策亦是將來將帥得人之後方可施行若將帥止如今日却恐徒壞漕司已成之功無補將帥兵屯之實且乞指揮趂此水災之後廣招流亡並行民屯之策以俟見效仍詔漕臣更切詢訪利病之未盡者條具以聞然後隨事商量及時措置庶幾已成之緒不至動搖輕有廢壞伏乞聖照凡此六事皆不可緩而其本在於陛下之一心一心正則六事無不正一有人心私欲以介乎其間則雖欲憊精勞力以求正夫六事者亦將徒為文具而天下之事愈至於不可為矣故所謂天下之大本者又急務之最急而尤不可以少緩者惟陛下深留聖意而亟圖之使大本誠正急務誠修而治效不進國勢不强中原不復仇讎不滅則臣請伏斧鉞之誅以謝陛下陛下雖欲赦之臣亦不敢承也然又竊聞之今日士大夫之論其與臣不同者非一及究其實則皆所謂似是而非者也蓋其樂因循之無事者則曰陛下之年寖高而天下亦幸無事年寖高則血氣不能不衰天下無事則不宜更為庸人所擾其欲奮厲而有為者則又曰祖宗之積憤不可以不攄中原之故疆不可以不復以此為務則聖心不待勸勉而自强舍此不圖則雖欲䇿厲以有為而無所向往以為標凖亦卒歸於委靡而已凡此二說亦皆有理而臣輒皆以為非者蓋樂因循者知聖人之血氣有時而衰而不知聖人之志氣無時而衰也知天下有事之不可以苟安而不知天下無事之尤不可以少怠也况今日之天下又未得為無事乎且以衛武公言之其年九十有五矣猶針警於國以求規諫而作抑戒之詩以自警使人朝夕誦之不離於其側此其年豈不甚高而其戒謹恐懼之心豈以是而少衰乎况陛下視武公之年三分未及其二而責任之重地位之高又有十百千萬於武公者臣雖不肖又安敢先處陛下於武公之下而直謂其不能乎且天下之事非艱難多事之可憂而宴安鴆毒之可畏政使功成治定無一事之可為尚當朝兢夕惕居安慮危而不可以少怠况今天下雖若未有目前之急然民貧財匱兵惰將驕外有强暴之徑敵內有愁怨之軍民其他難言之患隱於耳目之所不加思慮之所不接者近在堂奧之間而逺在數千里之外何可勝數堂奧之說已陳於前此句更乞陛下少留聖意追計其前既未有可見之效却顧於後又未有可守之規臣切見尋常之人將欲屬人以一至微至細之事猶必為規模使其盡善然後所屬之人有所持循而不失吾之所以屬之之意况有天下者將以天下至大之事屬之於人而不先為盡善可守之規以授之乎然臣於此事不敢盡言若䝉聖明少加聖慮則當此之時誠亦一新德業重整綱維不可失之機㑹也臣狂妄僭率罪當萬死伏惟陛下裁赦亦安得遽謂無事而遂以逸豫處之乎其思奮厲者又徒知恢復之不可忘頺墮之不可久然不知不世之大功易立而至微之本心難保中原之强敵易禦而一已之私意難除也誠能先其所難則其易者將不言而自辦不先其難而徒欲僥幸於其易則雖朝夕談之不絶於口是亦徒為虛言以快一時之意而已又况此事之失已在隆興之初不合遽然罷兵講和遂使宴安鴆毒之害日滋日長而坐薪嘗膽之志日逺日忘是以數年以來綱維解弛釁孽萌生區區東南事猶有不勝慮者何恢復之可圖乎故臣不敢隨例迎合苟為大言以欺陛下而所望者則惟欲陛下先以東南之未治為憂而正心克己以正朝廷修政事庶幾真實功效可以馴致而不至於别生患害以妨逺圖蓋所謂善易者不言易而真有志於恢復者果不在於撫劒抵掌之間也論者又或以為陛下深於老佛之學而得其識心見性之妙於古先聖王之道蓋有不約而自合者是以不悅於世儒之常談死法而於當世之務則寧以管商一切功利之說為可取今乃以其所厭飫鄙薄者陳於其前亦見其言愈多而愈不合也臣以為此亦似是而非之論非所以進盛德於日新也彼老子浮屠之說固有疑於聖賢者矣然其實不同者則此以性命為真實而彼以性命為空虛也此以為實故所謂寂然不動者萬理粲然於其中而民彛物則無一之不具所謂感而遂通天下之故則必順其事必循其法而無一事之或差彼以為空則徒知寂滅為樂而不知其為實理之原徒知應物見形而不知其有真妄之别也是以自吾之說而修之則體用一原顯微無間而治心修身齊家治國無一事之非理由彼之說則其本末橫分中外斷絶雖有所謂廓徹靈通虛靜明妙者而無所救於滅理亂倫之罪顛倒運用之失也故自古為其學者其初無不似有可喜考其終則詖淫邪遁之見鮮有不作而害於政事者是以程皓常闢之曰自謂窮神知化而不足以開物成務言為無不周遍而實外於倫理窮深極微而不可以入堯舜之道天下之學自非淺陋固滯則必入於此是謂正路之榛蕪聖門之蔽塞闢之而後可與入道嗚呼此真可謂理到之言惜乎其未有以聞於陛下者使陛下過聽髠徒誑妄之說而以為真有合於聖人之道至分治心治身治人以為三術而以儒者之學為最下則臣切為陛下憂此心之害於政事而惜此說之布於來今也如或未以臣言為然則聖質不為不高學之不為不久而所以正心修身以及天下者其效果安在也是豈可不思其所以然者而亟反之哉臣聞仁宗時有程皓者與其弟頤同受學於周敦頤實得孔孟以來不傳之緒同時又有邵雍張載相與博約遂使聖道暗而復明其功甚大俗儒淺學既不足以窺其藴奧奸人鄙夫又以其言居必誠敬動由禮義有害於已之所為以故相與怨疾指為道學而加詆訕焉臣已略論於前矣夫世俗無知既以道學為不美則是必欲舉世之人俱無道俱不學悉如已之所為而後適於其意耳邪說肆行人心頗僻無所忌憚乃至於此此正閔馬父之所深憂也今敦頤等所著之書頗藏册府陛下試取而觀之聖學高明必將有默相契合而見諸行事者若遂於此賜一言以表章之則正心之效不惟自得而所以正人心亦在是矣伏惟陛下深留聖意也若夫管商功利之說則又陋矣陛下所以取之者則以既斥儒者之道為常談死法而天下之務日至於前彼浮屠之學又不足以應之是以有味乎彼之言而兾其富國强兵或有近效耳然自行其說至今幾年而國日益貧兵日益弱所謂近效者亦未之見而聖賢所傳生財之道理財之義文武之政道德之威則固所以為富强之大而反未有講之者也豈不誤哉今議者徒見老佛之高管商之便而聖賢所傳明善誠身齊家治國平天下者初無新奇可喜之說遂以為常談死法而不足學夫豈知其常談之中自有妙理死法之中自有活法固非老佛管商之陋所能倣佛其萬分也哉伏惟陛下察臣之言以究四說之同異而明辨之則知臣之所言非臣所為之說乃古先聖賢之說非聖賢所為之說乃天經地義自然之理雖以堯舜禹湯文武周孔之聖顔曾伋軻之賢而有所不能違也則於臣之言與夫論者之說其為取舍從違不終日而决矣抑臣於此又切有感而自悲焉蓋臣之得事陛下於今二十有七年矣而於其間得見陛下數不過三自其始見於隆興之初固嘗輒以近習為言矣辛丑再見又嘗論之今嵗三見而其所言又不過此臣遐方下土田野之人豈有積怨深怒於此曹而固欲攻之以快已私也哉其所以至於屢進不合而不敢悔者區區之意獨為國家之計而不敢自為身謀其愚亦可見矣然自頃以來嵗月逾邁如川之流一往而不復反不惟臣之蒼頭白髮已迫遲莫而竊仰天顔亦覺非昔時矣臣之鄙滯固不能别有忠言奇謀以禆聖聽而陛下日新之盛德亦未能有以使臣釋然而忘其夙昔之憂也則臣於此安得不深有感而重自悲乎身伏衡茅心馳魏闕切不勝其愛君憂國之誠敢冒萬死刳瀝肺肝以效野人食芹炙背之獻且以自乞其不肖之身焉臣區區私計輒冒威顔并此陳述臣賦性拙直不能隨世俯仰故自早年即自揣度决是不堪從官所以一向竊食祠祿前後九任豈不知有致身之義亦非恬無濟物之心寧為退藏蓋以避禍中間稍䝉任使果然自速顛隮七年之間措身無所今者一出又致紛紜幸賴聖明保全終始增其祿秩使足以免於饑寒進其官資使足以延於嗣息此皆已非臣平生意望所及天地之恩不啻厚矣今者奏疏止為感激陛下虛心屈已容受狂言故竭平日憂國之誠以畢前日願忠之意所兾上有補於聖明下無負於所學而已非敢變其初心而復有進為之望也若䝉聖慈詳賜觀覽循其本末次第施行使臣之言卓然實有可見之效則臣不待違心犯患以汙周行而其榮遇已不在諸臣之後矣如其謬妄無可施行則投間置散乃分之宜雖欲借之恩私適足增其慚懼决非臣之所敢當也竊恐陛下見其所論懇切誤謂尚堪使令故復具奏伏乞聖察伏惟陛下哀憐財赦而擇其中則非獨愚臣之幸實宗社生靈之幸臣之所論雖為一時之弊然其規畫實皆治體之要可以傳之久逺而無窮蓋前聖後聖其時雖異而其為道未嘗不同此臣之言所以非徒有望於今日而又將有望於後來也踈逺賤微言不敢盡伏惟聖慈憐臣愚忠赦其萬死或因皇太子參决之際特賜宣示千萬幸甚臣熹誠惶誠恐昧死再拜謹言古文集成卷五十八
