body:
  text: 古文集成卷九宋王霆震編前乙集三記連雲觀記毛東堂元祐七年夏六月和州修清風樓為連雲觀秋七月太守王公以書走鄱陽告某曰始吾於此旦日據几簿領如髮正須爬梳又當為民吏道主恩曉國禁而問所疾苦赴其願欲若吾有負於此人衆且持劵而取責必償之乃已蓋未暇遊觀事也頃之民不數至吾庭司空城旦之書束於髙閣晨起從容聊涉筆報期會而已反私自慨憐吾君遊意太平治道貴清靜四方黔首日以寧嘉此不教而定吾老矣竊二千石異時約結欲自表見者今乃了無可效殆飽食而嬉矣既日無事時步城上得與江山接殷勤始怪此樓庳陋聊葺而新之今晧旰百尺上薄光景俯瞰風雨簷牙含空雲氣吞虹朝隮南山而歸宿村礎此吾以名連雲者也兩隅别為更衣之次將從賔客徘徊其上以樂之然未有記幸以屬子可乎某書復公云公之惇大渾㴠人莫覩其畔岸者今甚欲小見於此觀也哉有濟物之性無垢氛之攖惟雲是名此豈直張其髙而已觸石而出膚寸而合不崇朝而遍雨乎天下者此泰山之雲也故君子體雲雷之象而見經綸之業得志則澤加乎民其斂而未用也又能使人憔悴枯稿渴而望之則君子於世亦何能已此其有為之氣當浩然而川瀦凄然而雲作勃鬱胸次苟出之膚寸崇朝而雨乎豈真此觀之上蜿蟬逶迤繡文錦音獨無心而倘徉乎雖然聊寓意此特以可卷舒亦何適而不自如耶此公不素見語者某竊能料之以暴於人至於登覽之樂風物之秀獨想見其處而斯文不可以髣佛然聞其東則項籍之烏江試求其平生喑嗚叱吒之氣垓下悲慨之音則已漂為驚濤紛為薄霧濛滅無所矣風急水寒葦花凄晚豈亦有艤船渡口如當年亭長輩乎聞其北則孫權之故都帶甲百萬江漢為池紫髯英發驅駕豪傑豈自知不四傳而奪之晉又奪之宋齊梁陳如拉枯然彼晉而下樂未畢也哀又繼之俯仰六朝無可把玩嗟乎世人直為物之逆旅爾其來不可圉其去不可止一世百為忽然而已公乃今日登此遐想而長思亦適然也蓋方將躊躇方將四顧付是非於亡羊歸萬物於一馬乎昔羊叔子登峴山謂從事鄒湛曰自有宇宙而有此山登此逺望如我與卿輩多矣皆湮滅無聞使人悲傷嗟乎羊叔子豈特畢一世為物逆旅邪方將以身為長廊甲第為便座燕寢日夜為主而錮留之又將數百年纍虛空以應門引魂魄而守之此亦惑歟庾亮在武昌諸佐殷浩之徒乘秋夜往共登南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此興復不淺便據胡床與浩等談詠公豈亦有客如武昌之人乎當天空月明夜氣縹眇斗酒相屬撫缶而歌客主可以頽然相忘矣既以書復公又以為記學林堂記誠齋茶陵談氏世儒其業至今郢州邵慱士始䇿上第者世選其名徑之其字也勤之兄之子知言年二十有四嗜學明經有司以秋賦之溢貟選試大學知言再在選中嘗築一堂叢書於間絶甘屏葷而以詩禮為膏梁捐綺抵縞而以文史為襟帶去絲逺竹而以簡編為笙鏞問堂名於艮齋先生謝公大書學林以扁其楣久問學林之説於余則訊之曰此班固之語而黃豫章擷之以諗學者也子嘗觀於髙山深林乎嶤嶤乎其陟而彌峻也蔚蔚乎其眺而彌廣也窈窈乎其賾而彌邃也子也入焉將奚取乎根柢乎榮華乎曰根柢哉余曰子入學林亦若是而已矣而其峻也其廣也其邃也又有甚於此者焉有義理之林有文詞之林有聖賢之林有名爵之林由於義理入自聖賢此根柢之林也由於文詞入自名爵此榮華之林也學者亦孰不曰吾將根柢之求而不榮華之求哉然咀義理者其滋淡餐文詞者其味腴蹈聖賢者其途悠趍名爵者其徑捷子能不誘於腴不厭於淡不勤於捷不惰於悠則假道義理之林有日矣不然腴與淡戰於口悠與捷戰於心吾懼榮華之勝而根柢之負又文詞之訹而義理之荒也名爵之嚮而聖賢之偭也嚮聖賢而偭名爵苟不止其嚮必至乎爾也嚮名爵而偭聖賢雖不止其嚮亦必至乎否也子將欲入其林願聞其嚮山居記誠齋山居者侍郎待制霅川沈公賔王之居也賔王之居不于其山于其郛而曰山居者癖於愛山也武子癖於馬賔王癖於山郛居而名以山居以見愛山之意無適而非山也賔王胸次灑落如風櫺月牖韻致清曠如雪山冰壑身居金馬玉堂之近而有雲嶠登臨之想職在獻納論思之地而有灞橋吟哦之色家本道場何山之麓也而世居吳興之郛非其好也爰即其居小築一室其廣三檻署以此名客有過而笑者曰君子之宅有二有晏子之宅有庾信之宅庾于林晏于市也今子之宅晏也非庾也而曰山居噫甚矣子之愛山也抑亦居則有矣惡睹其所謂崑崙哉問其户外則康衢之埃也那得青壁之倚天問其墻東則唐肆之區也那得千崖之秋氣問其極目則黃公之壚也那得飛泉之潄玉昔羊叔子有鶴嘗矜其能舞一日客至求觀公為出之竟氃氋而不能舞今子之山居將無異羊公之鶴乎賔王笑曰子知笑吾之無山而有山不知吾亦笑子之有目而無目也吾嘗仕于江西章貢之憲幕矣又嘗守會稽矣翠浪玉虹丹丘赤城若耶雲門千巖萬壑至今磊磊皆在吾目中也今吾此室之前怪石相重松竹相友泉流相輝其巉然者非崆洞天台乎其森然者非雲門禹穴乎其泠然者非瀑布廉泉乎吾居無山吾目未嘗無山子目無山吾居未嘗無山禾山龍溪亭記龍雲劉弇所不足乎物者非形也有以處其形而已矣鳥之木棲獸之陸馳螻蛄壤息蚯蚓穴處鼠穿墉垣蟻營培塿以至畦疇蠧窾豕蝨奎蹄魚鰍之江湖與夫螢緣蔓而蜩附枝凡相與為類者何啻千萬要必無負吾形然後適於足耳龍之為物神而能變者也其遁宅幽而儲密其出離偶而縱獨其騰凌而上則奔霆駭電夾之以飛一息而超千仞其蜿蜒奮揚則瞬息可以興雲霧其散利以致養則不崇朝而雨天下然其大小修短潛見飛躍猶未離乎形而不忍輕自露以取困則其心與他物亦何以異然則水之有淵固龍之所慿以處而休其無事者也且龍之在天地間非若鰍鱍鯢鮒隂姦祕怪擅尺寸水苟延其生匿隻形而庇孤影則計有以容其軀者獨窮北之天池而極南之溟海耳而舉今天下濫觴之淵穴深之竇與夫泊然鍾水之瀦號為龍之别處者往往而是何其多龍耶然切嘗推原造物者之意彼非不欲尸衆役以自騁顧以為無益然後必將使此族挾其變怪棊布四出時泄膏沫以遂物願而熟視其致力焉故凡散在人間者皆龍異時息肩之處則亦仕宦者之有府舍歟雖多無可疑也禾山甘露寺之左有溪水自絶巘出貫寺垣走東南三里餘釃龍門兩崖間束為飛湍過别層急勢淙下汨汨注彎環中相分擘以去傳者以為昔嘗有龍居此而熙寧中長老楚升惜其勝概因斬材洞石截衝波跨崖起亭構遂以龍溪名之蓋龍名其居而溪名其所以居者也先是客有以逰禾山來者方授足時外臨邅回已恨力不足以支深入之疲而道兩旁又無憩焉者之所往往浸有怠及升師之為此亭也甫控絶險孤撑修緑盤礴於飛簷屋楹之外而下蔭清泚其明可以燭鬚髮故使臨之者始忘劇至之勞而驟得難窮之趣徜徉注視孤魄恍駭眸子為之眩轉而悲憂感慨至不旋踵釋去嗚呼升師於此可不謂有力者乎雖然吾有説焉今夫倐爾自造默運於冥中而莫見其終窮者變化是已其為龍也使變化無適而不自已故以動則神則是龍者適所以寓變化者也處晦而不昏行明而無章非徒與物役役守此形也則何水而不可居則是溪者適所以寓龍者也苟龍不能出潛以興利溪不能宅龍以標靈雖洶湧萬態矯首髙卧吾固將以龍為尺澤鯢而溪為杯酌之蹄泓也尚何亭之為因升師求吾文以識之為之登焉而遂書蟠齋記劉雲龍安成劉君公濟於其暇日合里之親且舊相與觴豫於所居之西偏酒數行顧豫而言曰是乃吾平日語人所謂蟠齋者也請因以諉子且齋之前壤瘠不沃而隆窪髙埤之所附水瀦不流而濁撓弗蠲之所鍾外漫客土古道傍出其下怒蛙盤鴟迭相鳴喧而不材之栱木毀折之叢篁與夫幽芳野蔓柔藤鬖鬖相為紛披而不知四時之有流轉此蟠之地也吾之屋視其桷與櫨幾撓而若將弗支也視其隅與四阿幾頽且靡而似無所投足也而吾不以為陋圭窬隙壁謹能蔽風雨脫囂埃而其間叢書數千卷足以時其探討暇則彈琴弄碁足以娛玩其耳目心志此蟠之居也方吾少時知所以從事乎學則知所以從事乎世日數千百言落筆立就中間晷隆而影索途修而步艱志有餘而力不抗連試禮部輒斥弗遇人生安與樂耳亦孰知其他此吾之所以蟠也然世之人方且躡穹臺臨廣囿睇清漪之渺瀰掇茂植之芳香以侈其遊觀而吾則易之以卑汙狹陋之地飛甍重霤綺疏青鎖百金之壯麗以至髹鬘刻鎪藻繪彪炳矗如幻化者不知其幾區而吾則易之以容足之所彼得志之士䇿肥茹鮮綬佩而青朱了無不可意者吾則易之以半居無事之隙是三者吾率皆易之而若將無俟乎世則謂之蟠也固冝豫於是復之曰古之人誰不欲達者達卒不可得然後深居逺近不在東閭在南阡瓜疇芋區跬步可到宅居㕓而田負郭家有乳雞豐豚以卒徂歲旦暮杖䇿恣兒童相遨戲此事不得志而去與欲進而無所從者之所為也今君齒剛而氣渾一切無有是事則冝與夫追念三徑之就荒退思倦鳥之知還者異矣奈何終役役有此土以處也耶既而曰我知之矣且世固有鈍其始而終自利休於塞而通必至者使物而無蟠則孰且為己哉今兹明天子在上賢士大夫自以為無若此時為可以得志何患不勉爾吾將見其運符志偶雷奮蟄而燭破幽須逺且大正在異日則是齋之設其殆有激而已雖君亦無能終留也故為之卒其説使知君之所寓名於蟠者如此杏塢書院記曽撙齋據韻釋文塢壁也壘也小障也庳城也院周垣也余姻家鄧宗儒家西有卻丘焉中立而四顧如壁如壘如障如城故以塢名丘丘故不平隨其故阡之隴之殖杏其上故以杏名塢塢故不廣隨其故垣之舍之植杏其間故以杏塢名書院書院者無書不蓄也蓄欲讀讀欲講講欲明父兄與子弟講明者也師與子弟講明者也友與同志互講明者也宗儒有叔父焉字經邦於世業為儒於人品為慱雅君子於禮部籍為貢士於後學為鄊先生必能取所蓄書為宗儒與其子講明之然而正心誠意然而修身齊家然而治國平天下精神相融口耳自喪不須師友可也萬一宗儒未足須人為友為子弟師取所講明申之余其得以固陋為解哉廬山之杏林董奉所為寓道教也于闐之杏城毗盧旃所為寓釋教也魯國之杏壇孔子所為寓儒教也杏林杏城出杏壇後彼二教所寓殆倣吾杏壇意以借重者吾教豈借彼杏壇以重耶孔子之逰適然戾止弦歌鼓琴遂為故事非有意塢為杏設書院為讀書設則若有意然者推其所以然杏之初萼而已矣士之讀書也萼然後華士之學文也華然後實士之制行進德也實然後熟士之聞道也熟然後復命士之與道俱也士反諸已讀書之謂萼學文謂之華制行進德之謂實聞道之謂熟與道俱之謂復命是理也宗儒與其子於書院之成之後得於師友間歸而求之自得蓋多矣雖然書院古家孰餘輩里中師友耳宗儒與其子不以所得自多更出於鄉校於泮宫於辟雍參以天下之師友又歸而求之所得加多焉幸還以啓余輩也歸潔堂記撙齋吾友黎夏卿宅闤闠狃市聲目與耳鏖為固然屬厭發省耳目二而一之道也是惟無動動則彼與此胥故耳有所流目從之於子弟觀書不廢則損非便也卜可逺者得一湖於不東不北不逺不近不村不郭之間慶元戊午建堂其上面而窗几與之俱資修也背而屏坐與之俱資遊也腋而寢榻與之俱資修也明年賦考槃賦伐木籲友朋策子弟修遊休其中荷獵獵兮自翻若手不停披於百家之編然也水㶁㶁兮自湱若絃誦之聲然也魚洋洋兮自嬉若涵泳聖涯然也物態所形學機攸觸子弟於是進進而夏卿深有得矣修焉而得於窗見其參於前也遊焉而得於屏忽然在後也休焉而得於寢左右逢其原也又明年余隨牒過夏卿挑扣所得乘其入邀其歸發揮堂趣斷孟子章題以歸潔潔潔也自得其潔之謂道得道委潔之謂天得天委潔之謂水士之澡身浴德聖人之洗心取義於水惟其潔而已矣充士之潔為聖人充聖人之潔為天聖人之行逺近去就不同同歸于潔夏卿學士也更以聖人自充則學成矣學而成則已大物細未必不屑處雖然學於王之學則學之成王之恩也恩重則身輕未必不屑出繼自今出應王須能勿徇好事者為要以割烹食牛否余未知也主以癰疽侍人瘠環否余未知也余於夏卿為久要知非其義一介不以與人爾於非義不與窺之意其非義不取也於非義不取窺之意其處矣寧不出不屑非義以要出矣寧不達不屑非義以主出處不同同歸於潔余所期於夏卿者然夏卿誠能如所期以帥子弟父子兄弟浩養與水同德慱濟與水同功急流勇退與水同道顧不韙歟否則水哉水哉夏卿何取於水也桂芳堂記楊東山西昌王彥逺作堂植木犀兩株于庭扁其堂曰桂芳蓋取諸六一先生植桂比芳操之句謁豫記之豫曰桂古也清輝之芬嫓之于蘭小山之幽儕之于松仰天之髙神之于月非古也蓋自靈均以來昉乎爾昉者何騷焉而已矣騷者何文焉而已矣既而布衣韋帶之士由乎文希乎名敷奏明試乃計功而取象焉至于唐進士遂以豔科目之得雋命之曰折桂桂之初服豈端使然哉雖然進士之科目桂之似焉否也桂之在月否也月中之桂可得而折否也士取天子之科目而已折月中之桂自珍然則無天子之科目則有天上月中之桂否乎蓋神之之耳神之所以勸之不然則天子之科目誰其貴之乎弗之貴則弗之慕弗之慕則弗之學貴斯慕慕斯學學斯成至此然後知桂之功歟桂之功桂之末也盍反其本請諏諸日月之輪幾何桂之根何傅桂之幹何挺桂之枝葉何傅桂之華實何榮何謝如之何而折之如之何而即之吾將有問焉問惡在人是也人惡在學是也有學此有人有人此有桂有桂此有芳抑嘗觀其芳乎木若白玉質之淑也華若金粟花之英也葉追壁瑤非智之巧乎薌塞清霄非聖之清乎曰淑焉曰英焉曰巧焉曰清焉士者反躬不當爾耶既樹之必攀之既手之必身之故曰君子於桂比操焉然則唐人折桂之名抑末耳盍反其本彥達有子二人長曰登字君庸以文為慱士弟子貟次曰發字若正皆力學操卓名焯焉不在兹乎不在兹乎吾於是知桂之雙人之祥介然堂記東山與人同可乎同之靡則隨與人異可乎異之疚則睽譬之於水決諸東則東決諸西則西惟決者之為而水無擇焉匪隨也乎水可也人不可也與鄉人立其冠不正望望然去之若將浼焉彼冠之不正於吾無與也於吾奚浼也望而去之弗俟其親夫如是稱天下微與居匪睽也乎喻可也實不可也隨而弗睽其失也誇睽而弗隨其失也孤弗隨弗睽弗誇弗孤孰能之乎吾親友曽君名強立字立夫其人也奚繇知之立夫未始障西風之塵而不妨看南山之雲未始弋戾天之鳶而不妨騎飛仙之鸞雲雖不吾與吾將強而覩故雲留而塵去鸞雖不吾迎吾將強而乘故鸞翔而鳶𡨕曷濟登兹蓋有道焉涵茹古今不饜不止久大德業不盈不已洙泗之流吾挹其清杏壇之芳吾擷其英天地吾師也聖哲吾朋也孟子曰冨貴不能淫貧賤不能移威武不能屈此之謂大丈夫非吾立夫歟立夫以介然名其堂其伯父無疑書其扁來命余記之余曰介然烏乎名立夫曰後山先生聞徐仲車之風而恱之因其門人江季恭寄箋焉季恭為仲車言友人陳無已親賢樂善介然不羣於流俗願納交于下執事強立於後山是慕故於介然是取余曰親賢樂善介然不羣余不知也子其問諸後山後山不知也子其問諸季恭季恭口之仲車耳之後山身之立夫心之心至焉耳次焉不知後山之為立夫乎立夫之為後山乎我欲仁斯仁至矣豫於立夫乎觀立夫不羣於流俗兹其本也其學其文皆卓爾特立見稱於鄉常以周官一經之業頡頏於師友吾知其立身揚名介然於天下也必矣兹其末也本末粹矣吾於立夫乎觀古文集成卷九
