body:
  text: 古文集成巻四十一宋王霆震編前已集三論議財論鄭景望大易有訓聚人曰財洪範明疇政先食貨中庸以九經為國而足財用於百工大學以明徳平天下而論生財之大道故財者有國之司命理財者非可緩之務議財者非不急之談也髙論之士握孟子仁義之説聞言利之人急起而疾擊之不使喘息於其側置金穀為猥務視三司度支為濁流以鉤校簿書為冗職漫然不肯誰何於戯獨不以吾一身一家而思之夫飢而食渴而飲自何而至仰而事俯而育自何而給彼晉之士大夫以清談欺其妻孥果能枵腹而赤立乎天下之大事非一端百官羣吏軍旅征戍朝聘㑹同郊社宗廟城郭宫室噐服車馬之用矜寡孤獨凶荒札瘥之賑恤皆堯舜三王之常規非後世創為之也一日非財百事瓦解而欲置之度外亦幾於不辨菽麥矣雖然自周之衰先王之制亡人欲日侈用財者多秦漢而下類以四海九州之財賦養一人而不足於是賤丈夫者出而伸其喙剥膚槌髓以厭一人之欲其原既開不可復窒後之承前有增無損凡先王之予於民者奪之盡矣所以散在民者歛之極矣利析秋毫而國用常乏雖以惻怛好治之主其所奪者不能復予其所歛者不能復散也不惟不能勢亦不可也嗟乎髙論之士雖不達時宜彼其平時讀古人之書見先王之政纎悉委曲無非假民謹之重之不敢少放回視後世如許則聞言利之臣遽起而擊之望財利之司疾趍而馳之蓋亦無足怪也然時世不同事變非一古之法不可用於今猶今之法不可用於古茍不勝後世之弊欲一取先王之法而繩之此時君世主所以病其説之難流俗鄙夫所以呵其法之迂有志之士亦日悼其説之不合也抑不知先王之法雖不可遽行而其遺意猶可言也蓋先王之於民愛之也厚之也予之也散之也而猶懼其或傷焉夫財出於民而愛之厚之予之散之是豐其本之術也烏有本豐而末不茂者哉茍知此意則可以議邦財司民命矣先王之陳迹無襲焉可也議財論鄭景望夫財安從出哉弊去矣而不知養其源吾未覩其可也山有材焉旦旦而伐之人見其濯濯也斤斧休而牛羊樵牧之不呵則日夜之所息雨露之所養亦末矣先王之時為民者四而以智力交相養瘖聾跛躃㫁者侏儒各以其器食之彼廢疾之力猶必有所事而後食况耳目手足無故者哉其不得游手而食必矣今之所謂游民者何其多也髙宫大室撞鐘伐鼓談無演空惑誘癡甿謂之緇黄之游懐黄挾彈玩養鳥獸六博鬬鞠歌舞游行謂之市井之㳺冒名守闕充墀溢廡交相賛助招權為姦謂之官府之游若此之類不可殫言賈生所謂殘賊公行莫之或止者也昔句踐還越令壯無娶老老無娶壯女十七男二十不嫁不娶罪父母蓋欲人民繁息為國之用今有民而委之無用亦可惜哉今之四民亦非古之四民也士舉無用之文以媒利禄立身事君何嘗在是則士亦游矣工作無用之器以競竒巧而食用所須苦窳不堪則工亦游矣商通無用之貨以煽侈靡而實用所資徃徃不通則商亦㳺矣嗚呼民相與游而人之類未相食者幸吾農民尚守耒耜而已然而解凍而耕暴背而耘櫛風沐雨霑首濡足戴星而出戴星而入其勤極矣而又有水旱霜雹蝗蜮間為之災幸而収成則公私之債交相互奪穀未離場已非已有羣游之徒聚而饞之又從而嗤鄙之良可哀也故其子弟時出城市目覩盛麗歸視其糠粃不飽短褐不蔽其心搖搖已不安於畎畆矣不急救之是農又將㳺也古之為政闗市有譏偽飾有禁執左道以亂政者有誅作淫聲異服竒技竒器者有誅用器不中度不鬻於市姦色亂正色不鬻於市錦文珠玉成器不鬻於市不耕者祭無盛不蠶者無帛不績者無衰無職事者出夫家之征此皆先王抑末厚本之意茍損益而施之使彼輕而此重其不轉而歸南畆者寡矣至於占田有限以抑兼并之家儲粟有勸以廣凶荒之備選擇守令嚴責實之政則田畯之官何必復建也寛養農功省公家之傜則力田之科何必復立也孔子曰示之以好惡而民知禁法者天下之大防而已要當明好惡以示之則靡然向方上革其弊下養其源譬如疾已去體而厚加調養孰能禦之吁治道無難顧力行何如爾議財論鄭景望莫非王民予奪歛散其權在君何事非君治亂安危其權在民先王知人上之權不足恃也而一聽於民凡有所欲委曲彌縫不敢有已故制其常産與之相生養之道為之比閭放黨州鄉鄰里鄼鄙縣都夫遂溝洫澮川畛塗道路徑術以相居教之耕鑿種藝稼政女功飲食醫藥喪紀祭祀判妻入子蓄牧用財以安其生老弱廢疾孤窮則有恤養之政艱厄凶荒札瘥則有賙救之法巡稼移民合耦趍耕以裕其力通貨歛滯貫賖貸假以周其匱懼吏之侵牟則為之大比以周知山林川澤器械六畜之數懼役之不均則為之稽其夫家以嵗之上下為役之乆近事以民立而無長亊官以事建而無羨官思慮周宻纎悉不遺既措之温飽安樂之地而後身與其享民樂其愛已而閔其甚勤也於是輸其天育地産與已之所致之物以供王之飲膳器物匪頒賜予賔客喪祭以充府庫以供玩好多而不厭而先王亦以為當然粒粟寸帛籍之有司要㑹鉤考不敢私焉少有不登惻然變色邦計民財固未乏也而與士大夫捐膳徹樂矣嗚呼彼豈不知予奪歛散之權在已耶自井田壊而貧富不均後世不復能制民之産而先王之良法美意日以消亡廟堂之間茍曰王府充軍儲備則幸矣餘不暇問也而民始自為生矣自山海藪澤之利公家専之冗食逐末之人耗農者衆而民之為生始勞矣自粟米絲麻蔬果魚肉竹木薪炭百物有税而官司之法月較日比羨則有賞虧則有誅上下相䝉不知其自何而來也汙吏黠胥又從而私漁之而民始無以為生矣夫先王之於民與之為生而後世之民至無以為生不反其本方焦心勞思患於無財族談羣議以圖生財變法易令以求豐財吾恐民之大權有時而或用也世固有達於人情物理知先王之遺意者過而問焉其知本矣理財論方恬理財之説古今談之盡矣愚不能復有説也非不能復有説也不忍復有説也今天下之利已盡籠而歸之公矣而猶復有説則桑洪羊商君之術愚不忍復言此也今天下之財所以不足者何哉害農者繁而去本者衆也古之為民者四而農其四之一也今之為民者六而舍農者六之五也而胥吏不在焉胥吏蓋害農民而蠶食之者也而又害農者之一也則是今之為民者七而游民者居其六也而兵徒又不在焉傳曰一夫耕之十人聚而食之欲天下無飢不可得也今天下農民益少於古矣而治財之吏惟農之為困有田者耕之而輸粟於官者有増而無減也有桑者蠶之而輸帛於官者有重而無輕也故耕之而食不足於口也蠶之而衣不足於身也則誰肯利於農而不去也今蠶者之桑有折而薪之者矣耕者之田有逃而棄之者矣急而不止則農不安於田畆而盡棄其生業背本者益蕃從末者益衆而貨財之源先竭矣凡今治財之吏皆為人主驅良民而為游民者也天下之民其良者惟農而其羣不逞之民則聚為末作散為游民游民之中其雄且黠者則為商今天下之良民已重困矣而議者方以排商賈為䇿嗚呼今商賈不可更排矣今闗市之征法益苛矣征㩁之利取益重矣而商賈亦且困矣儻又從而排之則散而入於盜賊如是而又不察焉又將驅游民而為盜賊也驅良民而為游民則國貧矣驅商民而為盜賊則政亂矣國貧猶可為也政亂不可救也嗚呼胡不反其初而求之乎彼其初何為而利於農也無乃上之人以務農為至重而能寛其田租者乎故欲天下之富庶則莫若重農重農則莫若去苛歛去苛歛則農益勸農勸則趍本者衆趍本者衆然後商賈可稍抑也游惰末作可漸禁也異端之無益於世教者可驅之而復歸南畆也何者彼既利於農則不為農者雖驅之而不為盜賊也何者有農之利誘之而不至於途窮而無所入也使天下之游民不利於為農而又途窮而無所入則驅之必為盜賊矣抑商賈論三山林之竒田野之民安於耕市井之民役於利嘻亦信矣田野之間猶有帝王之遺民而市井風俗囂囂乎其深染於秦漢之習矣乎有語田野之事於市井之民則必笑以為愚有陳帝王之道於秦漢之君則必斥以為迂識者觀之直為長太息也堯之典豳之詩今人視之直為何等語而廟堂冕弁切切及此然而帝王所以灰吾民詐偽之心而域之於春風和氣之中略無他事吾觀其田野之間則見其民厖厚淳質絶無機心切以為天下皆此民何畏乎不治商鞅桑洪羊之徒視天下千智萬詐舉不能脱吾籠絡之内而算計見效霄壤於古吾觀於市井之間則見其胸腹機穽背面矛㦸竊以為天下皆此民何畏乎不亂治亂之機亦易曉矣有識之士常欲抑商賈而歸之農嗚呼是誠美意也雖然吾未知其所以抑之者何説也必将曰致均輸立平準制百貨低昂以排之乎必將曰管山澤之饒則商賈無所牟大利以侵漁百姓乎是其説非不美抑淫刑以禁姦好戰以止亂皆自文其過而已矣以此而革人之心正足以啟人之心試觀秦漢而下於前數者未有遺術何其民益異於帝王之民哉吾嘗竊恨秦始皇壞天下風俗正為行此等術也古者四民各有常職農不可以無賈而賈不可以勝農當井田未壊之前農於天下居其什九山澤之占有限器物之竒有禁雖勸之為賈猶不能盛聖王未嘗暫啓之也農之於田既不能以自有天下之民茍非愚且弱者不肯操耒耜衣襏襫以為人役儻無懋遷之路何以自養上之人乃曰奪其資塞其源使盡歸心於畎畆之間嗚呼勢不可行矣勢不可行而文其辭以行之吾知其用心不過欲使為國者自為商賈而已矣安有自為商賈而革人之為商賈哉正恐其誘人為之不暇也何者奪商賈之路而官自為之其何以流通乎始欲抑商賈而歸農卒以商賈不行而自農然則始者猶隂啟而陽抑之卒將至於公誘其民而為之也居後之世欲還古人之俗必先為民處其為農之地然後可以節其為賈之塗若曰未暇逺議而姑少抑商賈之風亦當自國始不當自民始古文集成巻四十一
