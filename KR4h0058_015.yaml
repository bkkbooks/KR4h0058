body:
  text: 古文集成卷十五宋王霆震編前丙集一書報燕惠王書樂毅迂齋批云可以見燕昭王樂毅君臣相與之際略似蜀昭烈諸葛武侯書詞明白同見肺腑西山批云戰國䇿士談説之辭臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者迂齋批曰不敢斥言故託之侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心迂齋曰書中多是解説此兩句故敢以書對臣聞賢聖之君不以祿私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有髙世主之心迂齋曰緣此所以歸燕故假節於魏以身得察於燕先王過舉厠之賓客之中立之羣臣之上不謀父兄以為亞卿迂齋曰緣此所以仕燕臣竊不自知自以為奉令承教可幸無罪西山曰此自敘所以事先王之由故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於甲兵習於戰攻王若欲伐之必與天下圖之與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒鋭兵長驅至國齊王遁而走莒僅以身免珠玉財寶車甲珍器盡收入於燕齊器設於寧臺西山曰臺名大吕陳於元英西山曰宫名故鼎反乎磨室西山曰當作厯室徐廣曰磨厯也薊丘之植植於汶篁西山曰徐廣曰竹苗曰篁謂燕之疆界移於齊之文水自五霸以來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪迂齋曰此毅所以事燕王之心緣此所以受封是以受命不辭西山曰此敘王所以幸己之由臣聞賢聖之君功立而不廢故著於春秋迂齋曰此以下轉來燕惠王身上蚤知之士名成而不毁故稱於後世若先王之報怨雪恥夷萬乘之強國收八百嵗之蓄積及至棄羣臣之日餘教未衰執政任事之臣修法令謹庶孽迂齋曰見燕昭王平日調度區處施及乎萌𨽻皆可以教後世臣聞之善作者不必善成接上善始者不必善終昔吳子胥説聽於闔閭而吳王逺迹至郢迂齋曰以闔閭比燕昭王以夫差比惠王夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沈子胥而不悔子胥不蚤見王之不同量是以至於入江而不化西山曰此下自白所以去燕之由與不敢背燕之意夫免身立功以明先王之迹臣之上計也離毁辱之誹謗墮先王之名臣之大恐也臨不測之罪以幸為利義之所不敢出也迂齋曰言已所以去燕歸趙臣聞古之君子交絶不出惡聲迂齋曰言不敢顯斥惠王之過忠臣去國不潔其名臣雖不佞數奉教於君子矣西山曰此結一篇之意而安燕王之心恐侍御者之親左右之説不察疏逺之行故敢獻書以聞唯君王之留意焉絶秦書吕相東萊曰吕相絶秦魏錡封於吕邑故稱吕相晉欲伐秦故先數秦之罪後世檄書蓋自此始觀此書亦見得風聲氣習之變春秋以前辭命未嘗有不著實者到後來以虛言相誣亦自此始晉數秦罪若以實論只有一二件其他皆虛如秦晉初間同圍鄭秦從燭之武之言遂與鄭盟此是秦曲至晉為令狐之盟而又召狄與楚伐晉諸侯是以睦於晉此秦最曲秦之曲只是數端耳見得左氏書此事有筆法如秦有韓之師此本是晉許秦賂晉不與秦取之此是晉曲今晉却言秦不是秦納文公乃是大功今言是穆之成如晉文之征魯衛使諸侯朝秦自是文公欲圖霸是時秦穆雖預諸侯之朝本不是為秦而却言有大造於西此則已未有一分恩於人却言有十分别人有十分恩於已則作一分説又曰文章不分明指切而從容委曲辭不迫切而意已獨至惟左傳為然如當時諸國往來之辭與當時君臣相告相謀之語蓋可見矣亦是當時聖人餘澤未逺涵養自别故辭氣不迫如此非后世専學言語者比西山曰此春秋列國往來應對之辭成公十三年夏四月戊午晉侯使吕相絶秦吕相魏錡子蓋口宣已命曰昔逮我獻公及穆公晉獻公秦穆公相好戮力同心申之以盟誓重之以昏姻穆公夫人獻公之女天禍晉國文公如齊惠公如秦辟驪姬也無祿獻公即世穆公不忘舊德俾我惠公用能奉祀於晉秦納惠公又不能成大勳而為韓之師秦伐晉於韓獲惠公亦悔於厥心用集我文公是穆之成也成功於晉文公躬擐音患甲胄跋草行也履山川踰越險阻征東之諸侯虞夏商周之胤而朝諸秦則亦既報舊德矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭晉自鄭二於楚故圍之鄭非侵秦也晉以此誣秦秦大夫不詢於我寡君擅及鄭盟詢謀也盟者秦伯謙言大夫諸侯疾之將致命於秦文公恐懼綏靜諸侯秦師克還無害則是我有大造於西也造成也言晉有成功於秦無祿文公即世穆為不弔蔑死我君寡弱也我襄公迭我殽地姦絶我好伐我保城殄滅我費滑伐保城誣之費滑滑國國都於費今緱氏縣散離我兄弟撓亂我同盟滑晉同姓傾覆我國家我襄公未忘君之舊勳納文公之勳而懼社稷之隕是以有殽之師敗秦師於殽猶願赦罪於穆公晉欲求解於秦穆公弗聽而即楚謀我天誘其衷成王隕命秦使鬬克歸楚求成楚莊幼弱不能與晉競欲立王子職而為商臣所弒穆公是以不克逞志於我逞快也穆襄即世康靈即位晉襄秦穆皆卒康公我之自出晉外甥又欲闕剪我公室闕其月反徐如字傾覆我社稷帥我蝥賊以來蕩搖我邊疆謂秦納公子雍我是以有令狐之役敗秦師於令狐康猶不悛入我河曲伐我涑川俘我王官剪我羈馬我是以有河曲之戰與秦師戰於河曲秦師夜遁復侵晉入瑕東道之不通則是康公絶我好也言康公自絶故不復東通晉及君之嗣也君秦相公我君景公引領西望曰庶撫我乎望秦撫恤晉君亦不惠稱盟不肯稱晉望而共盟稱尺證反利吾有狄難謂晉滅潞氏時入我河縣焚我箕郜芟夷我農功夷傷也虔劉我邊陲我是以有輔氏之聚敗秦師於輔氏君亦悔禍之延而欲徼福於先君獻穆使伯車來命我景公伯車秦相公子曰吾與女同好棄惡復修舊德以追念前勳言誓未就景公即世我寡君是以有令狐之會秦晉為成將會於令狐不肯齊盟秦伯歸而背晉城君又不祥祥善也背棄盟誓白狄及與也君同州君之仇讐而我昏姻也季隗牆咎如赤狄之女也白狄伐而獲之納諸文公君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命於吏君有二心於狄曰晉將伐女狄應且憎是用告我言狄雖應答秦而心實憎秦無信楚人惡君之二三其德也亦來告我曰秦背令狄之盟而來求盟於我昭告昊天上帝秦三公穆康共楚三王成穆莊曰余雖與晉出入猶往來也余唯利是視不榖惡其無成德是用宣之以懲不一諸侯備聞此言斯是用痛心疾首昵就寡人昵親也寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退承君之意以寧靜諸侯豈敢徼亂徼要也君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事執事實圖利之上秦皇書李斯迂齋批此先秦古書也中間兩三節一反一覆一起一伏略加轉換數箇字而精神愈出意思愈明無限曲折變態誰謂文章之妙不在虛字助詞乎臣聞吏議逐客竊以為過矣昔者繆公求士不引前代他國事只説秦亦有意西取由余於戎東得百里奚於宛迎蹇叔於宋來邳豹公孫支於晉此五子者不産於秦妙而繆公用之并國二十遂霸西戎孝公用商鞅客之法移風易俗民以殷盛國以富強百姓樂用諸侯親服獲楚魏之師舉地千里至今治強惠王用張儀客之計拔三川之地西并巴蜀北收上郡南取漢中包九夷制鄢郢東據城臯之險割膏腴之壤遂散六國之從使之西面事秦功施到今昭王得范睢客廢穰侯逐華陽強公室杜私門蠶食諸侯使秦成帝業此四君者皆以客之功由此觀之客何負於秦哉結得直是斬截向使四君郤客而不內疏士而不用正説已盡又反説是使國無富利之實而秦無強大之名也今陛下致昆山之玉有隋和之寶垂明月之珠服太阿之劔乘纎離之馬建翠鳳之旗樹靈鼉之鼓舉輕明重此數寶者秦不生一焉而陛下説之何也與五子者不産於秦同一句法必秦國之所生然後可上面一節只是順説又倒説有無限精神則是夜光之璧不飾朝廷犀象之器不為玩好鄭衛之女不充後宫而駿良駃騠不實外廏江南金錫不為用西蜀丹青不為采所以飾後宫充下陳娛心意説耳目者必出於秦然後可將上面反説一兩項又倒一倒不覺重疊愈覺精采則是宛珠之簮傅璣之珥阿縞之衣錦繡之飾不進於前而隨俗雅化佳冶窈窕趙女不立於側也夫擊甕叩缶彈筝搏髀而歌呼嗚嗚快耳目者真秦之聲也鄭衛桑間韶虞象武者異國之樂也以韶虞與鄭衛並説此戰國之習今棄擊甕叩缶而就鄭衛退彈筝而取韶虞若是者何也快意當前適觀而已矣人才滿前適用而已矣今取人則不然方正説不論可否不論曲直非秦者去為客者逐兩句一正一反然則是所重者在乎色樂珠玉而所輕者在乎人民也含無限意思此非所以跨海內制諸侯之術也説秦始皇之辭不得不然臣聞地廣者粟多國大者人衆兵強則士勇是以泰山不辭土壤故能成其大河海不擇細流故能就其深王者不郤衆庶故能明其德是以地無四方民無異國四時充美鬼神降福此五帝三王之所以無敵也今乃棄黔首以資敵國郤賓客以業諸侯使天下之士退而不敢西向裹足不入秦秦若不用必歸它國此所謂藉冦兵而齎盜糧者也它國得士而用之便成孝公惠昭夫物不産於秦可寶者多以小喻大亦以自見士不産於秦願忠者衆今逐客以資敵國損民以益讐內自虛而外樹怨於諸侯求國無危不可得也上太常博士書劉歆迂齋批辨難攻擊之體峻潔有力昔唐虞既衰而三代迭興聖帝明王纍起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行厯國應聘自衛反魯然後樂正雅頌乃得其所修易序書制作春秋以紀帝王之道及孔子沒而微言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔氏之道抑而孫吳之術興陵夷至於暴秦燔經書殺儒士設挾書之法行是古之罪道術由是遂滅漢興去聖帝明王遐逺仲尼之道又絶法度無所因襲時獨有一叔孫通略定禮儀天下唯有易卜未有它書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以為意至孝文皇帝始使掌故朝錯從伏生受尚書尚書初出於屋壁朽析散絶今其書見在時師傳讀而已詩始萌芽天下衆書往往頗出皆諸子傳説猶廣立於學官為置博士在漢朝之儒唯賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師方兼説春秋皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脫朕甚閔焉時漢興已七八十年離於全經固已逺矣及魯恭王壞孔子宅欲以為宫而得古文於壞壁之中逸禮有三十九書十六篇自起頭至此皆是説諸經更涉久逺猶未得全備之意天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所修方説左氏皆古文舊書多者二十餘通藏於祕府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發祕藏校理舊文得此三事以考學官所傳經或脫簡傳或間編傳問民間則有魯國桓公趙國貫公膠東庸生之遺學與此同抑而未施其得之如此之難豈可輕廢此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕苟因陋就寡分文析字煩言碎辭學者罷老且不能究其一藝信口説而背傳記是末師而非往古至於國家將有大事若立辟雍封禪巡狩之儀則幽冥而莫知其原猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懷妒嫉不考情實雷同相從隨聲是非抑此三學以尚書為備謂左氏為不傳春秋豈不哀哉今聖上德通神明繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓樂士與君子同之故下明詔試左氏可立不遣近臣奉指銜命將以輔弱扶微與二三君子比意同力冀得廢遺今則不然深閉固距而不肯試猥以不誦絶之欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庶之所為耳非所望士君子也辨難有方且此數家之事皆先帝所親論今上所考視其古文舊書皆有徴驗外內相應豈苟而已哉夫禮失求之於野古文不猶愈於野乎有力往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶廣立穀梁春秋梁丘易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之有力傳曰文武之道未墜於地在人賢者志其大者不賢者志其小者今此數家之言所以兼包大小之義豈可偏絶哉若必専已守殘黨同門妒道真違明詔失聖意以陷於文吏之議甚為二三君子不取也古文集成卷十五
