body:
  text: 古文集成卷七十七宋王霆震編前癸集八設論答客難東方朔五臣注銑曰漢書云東方朔字曼倩平原厭次人也武帝時舉賢良方正之士待以不次之位朔乃上書自云其才上偉之翰曰朔上書陳農戰強國之計終不見用又以位卑故假為客難以答之客難東方朔曰蘇秦張儀一當萬乘之主而身都卿相之位澤及後世今子大夫向曰謂朔也修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛脣腐齒落服膺而不可釋好學樂道之無效明白甚矣自以為智能海內無雙則可謂博聞辨智矣然悉力盡忠以事聖帝曠日持久積數十年官不過侍郎位不過執戟意者尚有遺行邪同胞之徒無所容居其故何也東方先生喟然長息仰而應之曰是故非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壞諸侯不朝力政爭權相擒以兵并為十二國未有雌雄得士者強失士者亡故説去得行焉身處尊位珍寶充內外有倉廪澤及後世子孫長享今則不然聖帝德流天下震懾諸侯賔服威振四夷連四海之外以為帶安於覆盂天下均平合為一家動發舉事猶運之掌賢與不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜銑曰虜謂冦敵抗之則在青雲之上抑之則在深淵之下用之則為虎不用則為鼠雖欲盡節效情安知前後濟曰言皇德自行故不藉盡節效情者也安知前後謂無所用其才也方今天地之大士民之衆竭精馳説並進輻湊者不可勝數悉力慕之困於衣食或失門户翰曰言土人盡力以慕天子之德欲效精誠區區於下困於衣食或失道路者門户謂道路也使蘇秦張儀與僕並生於今之世曽不得掌故安敢望侍郎乎向曰掌故卑吏也傳曰天下無害雖有聖人無所施才上下和同雖有賢者無所立功故曰時異事殊雖然安可以不務修身乎哉詩曰鼓鐘于宫聲聞于外鶴鳴九臯聲聞于天銑曰言人好學修身聲譽聞於天下茍能修身何患不榮太公體行仁義七十有二乃設用於文武得信厥説音稅濟曰用文武之道以相周室得信用其説䇿封於齊七百嵗而不絶此士所以日夜孳孳修學敏行而不敢怠也譬若鶺鴒飛且鳴矣向曰鶺鴒亦如人修身不懈怠也傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不以小人之胸胸而易其行天有常度地有常形君子有常行君子道其常小人計其功詩云禮義之不愆何恤人之言水至清則無魚人至察則無徒翰曰人至明察人所疾畏故孤立而無徒侣黨援矣冕而前旒所以蔽明黈它口切纊充耳所以塞聰明有所不見聰有所不聞舉大德赦小過無求備於一人之義也銑曰不求備才於人蓋取片善枉而直之使自得之優而柔之使自求之濟曰寬容使自求所宜也揆而度之使自索之翰曰揆度其才性所為使不相奪倫各自求分也蓋聖人之教化如此欲其自得之自得之則敏且廣矣今世之處士塊然無徒廓然獨居上觀許由下觀接輿良曰許由接輿並隱者計同范蠡忠合子胥天下和平與義相扶寡偶少徒固其宜也子何疑於豫乎若夫燕之用樂毅秦之任李斯漢用酈食其之下齊説行如流曲從如環所欲必得功若丘山海內定國家安是遇其時也子又何怪之耶語曰以管窺天以蠡測海以筳撞鐘豈能通其條貫考其文理發其音聲者哉銑曰蠡力和反蚌蛤也筳小木枝也言以管窺於天以蚌量其海以木枝擊鍾其條貫文理聲音終不可通矣朔自言答客之辭不可通發於心意也猶是觀之譬由鼱精鼩劬之襲狗孤豚之咋士白反虎至則靡耳何功之有良曰鼱鼩鼠也咋齧靡耳畏服而已矣今以下愚而非處士雖欲勿困固不得已濟曰下愚朔自謙也處士謂客也此適足以明其不知權變而終惑於大道也答賔戲并序班固斆齋曰此篇主意設為問答以解譏刺論辨精當學者不可不讀永平中為郎典校祕書専篤志於儒學以著述為業或譏以無功又感東方朔揚雄自喻以不遭蘇張范蔡之時曽不折之以正道明君子之所守故聊復應焉其辭曰賔戲主人曰設辭蓋聞聖人有一定之論烈士有不易之分亦云名而已矣故太上有立德其次有立功夫德不得後身而特盛功不得背時而獨彰是以聖哲之治棲棲遑遑孔席不暖墨突不黔五臣注善曰墨子無黔突孔子無暖席非以貪祿慕位欲起天下之利除萬民之害由此言之取舍者昔人之上務著作者前列之餘事耳今吾子設戲辭幸遊帝王之世躬帶紱冕之服浮英華湛道德矕龍虎之文舊矣孟康曰矕被也亡叛切善曰易曰大人虎變其文炳言文章之盛名也卒不能攄首尾奮翼鱗振拔汙塗跨騰風雲使見之者影駭聞之者響震徒樂枕經藉書紆體衡門上無所蒂下無所根獨攄意乎宇宙之外鋭思於毫芒之內潛神默記縆以年歲縆音亘竟也然而器不賈古於當已用不效於一世雖馳辨如濤波摛藻如春華猶無益於殿最也意者且運朝夕之䇿定合會之計使存有顯號亡有美諡不亦優乎主人逌爾而笑曰答逌讀若攸若賔之言所謂見世利之華暗道德之實守窔奧之熒燭未仰天庭而覩白日也應劭曰爾雅云西南隅謂奧東南隅謂窔善曰窔一弔切熒小光也曩者王途蕪穢援古事證周失其馭侯伯方軌戰國橫騖於是七雄虓闞分裂諸夏龍戰虎爭遊説之徒風猋電激韋昭曰猋音庖風之聚猥者也並起而救之其餘焱必遙切飛景附霅焱輒切煜弋叔切其間者蓋不可勝載銑曰言遊説之人有辭如烈火之飛熖馳逐如影之附形恣為強盛遊於其間者不可勝數當此之時搦朽摩鈍鉛刀皆能一斷是故魯連飛一矢而蹶千金濟曰齊圍燕燕將保聊城魯仲連乃為書約之係於矢射與燕將燕將得之泣而自殺又仲連遊於趙是時秦伐趙秦聞仲連在趙為謀秦軍為之退五十里趙王以千金為酬仲連棄而不受蹶棄也虞卿以顧盼而捐相印翰曰秦昭王遺趙王書索魏齊魏齊亡出見趙相虞卿虞卿度趙王終不可説恐殺魏齊乃解棄相印與魏齊間行夫啾發投曲感耳之聲合之律度淫蛙烏佳反而不可聽者非韶夏之樂也因勢合變遇時之會移風易俗乖忤而不可通者非君子之法也及至從人合之衡橫人散之良曰從人謂蘇秦合六國以備秦橫人謂張儀佐秦散六國之徒使棄君事秦亡命漂説羈旅騁辭濟曰亡命謂棄君命而外遊羈旅謂客遊不得志漂説謂浮詭之言騁辭謂馳辨之説商鞅挾三術以鑽孝公翰曰三術謂帝道王道伯道商君説秦孝公用此三術孝公用其伯術李斯奮時務而要始皇向曰要致也謂致始皇為強暴之法彼皆躡風塵之會履顛沛之勢據徼古堯切乘邪以求一日之富貴良曰言據徼幸乘邪險以求富貴朝為榮華夕為憔悴福不盈眥禍溢於世濟曰眥目匡也不盈目匡言不久也凶人且以自悔况吉士而是賴乎且功不可以虛成名不可以偽立韓設辨以激君服虔曰韓非設辨於始皇吕行詐以賈古國韋昭曰吕不韋立子楚以市秦利説難既遒其身乃囚項岱曰韓非作説難之書欲以為天下法式然為李斯所説囚死於秦秦貨其貴厥宗乃墜善曰秦昭王子子楚質於趙吕不韋賈邯鄲見曰此竒貨可居乃以五百金買竒物玩好而遊秦獻華陽夫人立子楚為嫡嗣昭王薨子楚代立為莊襄王以不韋為丞相飲鴆而死是以仲尼抗浮雲之志孟軻養浩然之氣彼豈樂為迂闊哉道不可以二也方今大漢灑掃羣穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黃唐其君天下也炎之如日威之如神涵之如海養之如春是以六合之內莫不同源共流沐浴玄德稟仰太和枝附葉著譬猶草木之植山林鳥魚之育川澤得氣者蕃滋失時者零落參天地而施化豈云人事之厚薄哉今吾子處皇代而論戰國曜所聞而疑所覿欲從堥毛敦都回切而度高乎泰山懷氿軌濫而測深乎重淵亦未至也賔曰又問若夫鞅斯之倫衰周之凶人既聞命矣敢問上古之士處身行道輔世成名可述於後者默而已乎主人曰又答何為其然也昔者咎繇謨虞箕子訪周言通帝王謀合神聖殷説夢發於傅巖周望兆動於渭濵齊寧激聲於康衢銑曰寧戚見齊桓公過於路乃為高歌公聞而用之漢良受書於邳垠張良遊下邳圯上見一老父出一編書良受之皆俟命而神交匪言詞之所信故能建必然之册展無窮之勳也近者陸子陸賈優遊新語以興董生仲舒下帷發藻儒林劉向司籍辨章舊聞揚雄覃思法言太玄皆及時君之門闈究先聖之壼奧婆娑項岱曰偃息也乎術藝之場休息乎篇籍之囿以全其質而發其文用納乎聖德烈炳乎後人斯非亞歟若乃伯夷抗行於首陽柳惠降志於辱仕顔淵樂於簞瓢孔終篇於西狩聲盈塞於天淵真吾徒之師表也且吾聞之一隂一陽天地之方善曰方常也乃文乃質王道之綱有同有異聖哲之常故曰慎修所志守爾天符性也委命供已味道之腴神之聽之名其舍諸賔又不知又答和氏之璧韞於荆石隋侯之珠藏於蚌蛤乎歷世莫視不知其將含景曜吐英精曠千載而流光也應龍潛於潢汙魚黿媟之不覩其能奮靈德合風雲超忽荒而躆昊蒼也史記注躆音戟故夫泥蟠而天飛者應龍之神也先賤而後貴者和隋之珍也時暗而久章者君子之真也若乃牙曠清耳於管絃離婁眇目於毫介濟曰伯牙師曠皆善樂者離婁目明者逄蒙絶技於弧矢般輸榷巧於斧斤良樂軼能於相馭烏獲抗力於千鈞和鵲發精於針石銑曰和鵲皆善醫研桑心計於無垠研范蠡之師也桑桑𢎞羊也以心計為侍中走亦不任厠拔於彼列故密爾自娛於斯文服虔曰走孟堅自謂也解嘲并序揚雄斆齋曰此又是一樣文體隂寓譏時之意陽詠歎之進學解送窮文皆出於此斆齋批注迂齋批點哀帝時丁傅董賢用事漢書定陶丁姬哀帝母也兄明為大司馬又孝哀傳皇后哀帝即位封后父晏為孔鄉侯又董賢傳哀帝立拜為黃門郎寵愛日甚為駙馬都尉侍中諸附離之者起家至二千石良曰人有附著其勢者時雄方草創太玄有以自守汨如也人有嘲雄以玄之尚白玄當黑而尚白將無所用雄辭之號曰解嘲其辭曰客嘲揚子雲曰設辭吾聞上世之士泛説人綱人紀不生則已生必上尊人君下榮父母析人之圭儋荷也人之爵懷人之符分人之祿紆青拖紫朱丹其轂漢制公侯紫綬九卿青綬吏二千石朱兩轓今吾子幸得遭明盛之世處不諱之朝與羣賢同行歷金門上玉堂有日矣待詔金馬門晉灼曰黃圖有大玉堂小玉堂曽不能畫一竒出一䇿嘲辭上説人主下談公卿目如曜星舌如電光一從一橫論者莫當顧默而作太玄五千文枝葉扶踈獨談數十餘萬言深者入黃泉髙者出蒼天大者含元氣細者入無間言至微也然而位不過侍郎反應上擢才給事黃門意者玄得無尚白乎何為官之拓落也問揚子笑而應之曰答客徒朱丹吾轂不知一跌將赤吾之族也因朱丹字生赤字出往昔解周網解結羣鹿爭逸喻在爵位者離為十二合為六七四分五剖並為戰國士無常君國無定臣得士者富失士者貧矯翼厲翮恣意所存故士或自盛以槖或鑿壞以遁范雎入秦藏於槖中史記王稽辭魏去竊載范雎入秦至湖見車騎曰為誰王稽曰穰侯范雎曰此恐辱我我寧匿車中魯君聞顔闔賢欲以為相使者往聘因鑿後垣而亡壞璧也是故鄒衍以頡頏而取世資齊人著書所言多大事故齊人號談天鄒衍仕齊至卿孟軻雖連音輦蹇值屯難也猶為萬乘師滕文公尊敬孟子若師今大漢反上文左東海右渠搜屬雍州在金城河間之西前畨禺南越王都也畨音潘後椒塗漁陽之北界迂齋批應四分五剖東南一尉會稽東部都尉西北一候玉門關候徽以紏墨制以鑕鈇斬腰之刑散以禮樂風以詩書曠以歲月結以倚廬漢律以為親行三年服不得選舉結為倚廬以結其心天下之士雷動雲合魚鱗雜襲雖尊大漢其實含不滿意迂齋批觀下文可見咸營于八區家家自以為稷契人人自以為臯陶戴縰所氏切垂纓而談者皆擬於阿衡五尺童子羞比晏嬰與夷吾當塗者升青雲失路者委溝渠發出主意旦握權則為卿相夕失勢則為匹夫譬若江湖之涯渤澥之島乘雁集不為之多雙鳬飛不為之少四雁曰乘昔三仁去而殷墟二老歸而周熾子胥死而吳亡種蠡存而越霸五羖百里奚入而秦喜樂毅出而燕懼范雎以折摺而危穰侯摺古拉字蔡澤以噤欺稟切吟疑甚切而笑唐舉蔡澤就唐舉相舉乃笑之噤吟語而笑貌後乃代范雎為相故當其有事也非蕭曹子房平勃樊霍則不能安含譏諷意當其無事也章句之徒相與坐而守之亦無所患故世亂則聖哲馳騖而不足世治則庸夫髙枕而有餘迂齋批以治世尊漢既不失體其實含不盡之意夫上世之士或解縛而相左傳齊鮑叔帥師來言曰云云管仲請囚鮑叔受之及堂阜而脫之歸而以告曰管夷吾治於髙傒使相可也公從之或釋褐而傅傅説被褐帶索庸築傅岩武丁得之舉為三公或倚夷門而笑侯嬴或橫江潭而漁漁父或七十説而不遇孔子或立談而封侯虞卿説趙孝成王再見為上卿或枉千乘於陋巷吕氏春秋曰齊桓公見小臣稷或擁篲而先驅鄒衍是以士頗得信其舌而奮其筆窒隙蹈瑕而無所詘也當今縣令不請士郡守不迎師羣卿不揖客將相不俯眉言竒者見疑行殊者得辟是以欲談者卷舌而同聲欲步者擬足而投迹嚮使上世之士處乎今世䇿非甲科行非孝亷舉非方正獨可抗疏時道是非高得待詔下觸聞罷又安得青紫且吾聞之也炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱髙明之家鬼瞰其室攫拿女居切者亡默默者存位極者宗危自守者身全是故知玄知默守道之極爰清爰靜遊神之庭惟寂惟寞守德之宅世異事變人道不殊彼我易時未知何如今子乃以鴟梟而笑鳳皇執蝘烏典切蜓徒典切而嘲龜龍不亦病乎説文在璧曰蝘蜓在草曰蜥蝪子徒笑我玄之尚白吾亦笑子之病甚不遇俞跗與扁鵲也悲夫俞跗扁鵲善醫者客曰又問然則靡玄無所成名乎范蔡以下何必玄哉揚子曰答范雎魏之亡命也折脅摺骼音格腰骨也免於徽索翕肩蹈背扶服入槖服蒲北反入槖見上文激卬萬乘之主介涇陽抵穰侯而代之當也激卬怒也范雎至秦上書因感怒昭王昭王乃免相國逐涇陽君於關外秦昭王母宣太后長弟曰穰侯姓魏名冉昭陽同母弟曰涇陽君蔡澤山東之匹夫也顩頥折頞涕唾流沫西揖強秦之相扼烏革切一作扼其咽而抗其氣拊其背而奪其位時也上曲曰顩欺甚切史記蔡澤聞應侯內慙乃西入秦應侯使人召蔡澤蔡澤入則揖應侯應侯延入坐數日言於秦昭王曰客有從山東來者曰蔡澤其人辨士昭王與語説之應侯請歸相印遂拜蔡澤為相説文頞鼻頸也於逹切天下已定金革已平都於洛陽婁敬委輅脫挽掉三寸之舌建不拔之䇿舉中國徙之長安適也漢書髙祖都洛陽婁敬脫挽曰臣願見上言便宜説上曰陛下都洛陽不便不如入關據秦之固是日車駕西都長安五帝垂典三王傳禮百世不易叔孫通起於枹鼓之間解甲投戈遂作君臣之儀得也叔孫通制禮儀吕刑靡弊秦法酷烈聖漢權制而蕭何造律宜也蕭何托秦法取其宜於時者作律九章故有造蕭何之律於唐虞之世則悖矣悖布內切乖也有作叔孫通儀於夏殷之時則惑矣有建婁敬之䇿於成周之世則乖矣有談范蔡之説於金張許史之間則狂矣金日磾張安世許廣漢史恭史高也夫蕭規曹隨留侯畫䇿陳平出竒功若太山嚮若坻隤天水有大坂名曰壠坻其山堆旁著即崩落作聲聞數百里故曰坻隤坻丁禮切雖其人之膽智哉亦會其時之可為也故為可為於可為之時則從為不可為於不可為之時則凶若夫藺生收功於章臺相如獻璧於章臺四皓采榮於南山公孫創業於金馬𢎞對䇿金馬門驃騎發迹於祁連驃騎將軍霍去病擊胸奴至祁連山司馬長卿竊資於卓氏東方朔割炙於細君事並見本傳僕誠不能與數子並故默然獨守吾太玄末句言不變其所守惡圓元結元子家有乳母為圓轉之器以恱嬰兒嬰兒喜之母使為之聚孩孺助嬰兒之樂友人公植者聞有戲兒之器請見之及見之趨焚之責元子曰吾聞古之惡圓之士歌曰寧方為皂不圓為卿寧方為汙辱不圓為顯榮其甚者則終身不仰視曰吾惡夫圓或有喻之以天天無窮人不能極逺視四垂因謂之圓天不圓也對曰天縱不圓為人稱之我亦惡焉次山奈何任造圓轉之器恣令恱媚嬰兒小喜之長必好之教兒學圓且陷不義躬自戲圓又失方正嗟嗟次山入門愛嬰兒之樂圓出門當愛小人之趨圓吾安知次山異日不言圓行圓動圓靜圓以終身乎吾豈次山之友也元子召季川謂曰吾自嬰兒戲圓公植尚辱我言絶忽乎吾與汝圓以應物圓以趨時非圓不預非圓不為公植其操矛戟刑我乎惡曲元結元子時與鄰里會曲全當時之歡以順長老之意歸泉上叔盈問曰向夫子曲全其歡道然也茍為爾乎元子曰叔盈視吾曲其心以徇財利曲其行以希名位當過吾吾茍全一歡於鄰里無惡然可也東邑有全道之士聞元子對叔盈恐曰吾聞元次山約其門人曰無惡我之小曲真惛鄙惡辭也吾輩全直世年未常曲氣以轉聲曲辭以逹意曲步以便往曲視以回目猶患於古人古人有惡曲者不曲臂以取物不曲膝以便坐見天下有曲於君曲於民曲於鬼神者往劫而死之今元次山茍曲言貌強全一歡以為不褻其直慁哉君能茍曲於鄰里強全一歡豈不能茍曲於鄉縣以全言行能茍曲於鄉縣豈不能茍曲於邦國以彰名譽能茍曲於邦國豈不能茍曲於天下以揚德義若言行名譽德義偕顯豈有鍾鼎不入門權位不在已乎嗚呼曲為之小為大之漸曲為之也有何不可姦邪凶惡其囮音由乎元子聞之頌曰吾以顔貌曲全一歡全直君子之惡我如此由有過於此者何以自免古文集成卷七十七
