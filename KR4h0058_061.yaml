body:
  text: 古文集成卷六十一宋王霆震編前辛集七狀論進瓜果人擬官狀陸贄本傳道有獻瓜果者帝嘉其意欲授以試官贄曰爵位天下公器不可輕也帝曰試官虛名且已與宰相議矣卿其無嫌贄奏云云信賞必罰霸王之資也輕爵䙝刑衰亂之漸也非功而獲爵則輕非罪而肆刑則䙝天寶之季嬖幸傾國爵以情授賞以寵加紀綱始壞矣外寇乘之遂亂中夏財賦不足以供賜而職官之賞興焉職員不足以容功而散試之號行焉當今所病者在爵輕也設法貴之猶恐不重若又自棄將何勸焉陛下謂試官為虛名豈思之未熟耶夫立國惟義與權誘人惟名與利名近虛於教為重利近實於德為輕凡所以裁是非立法制則存乎其義參虛實揣輕重則存乎其權專實利而不濟之以虛則物有匱耗而不給矣專虛名而不副之以實則情有誕謾而不趨矣故錫貨財列廩秩以彰實也差品列異服章以飾虛也居上者達其變相須以為表裏則為國之權得矣按甲令有職事官有散官有勳官有爵號其職事受奉者唯職事一官以序才能以位勳德所謂施實利而寓虛名者也勳散爵號止於服色資廕以馭崇貴以甄功勞所謂假虛名而佐實利者也今員外試官與勳散爵號同然而突銛鋒排禍難者以是酬之其為用也可謂重矣今獻瓜一器果一盛則受之彼忘軀命者有以相謂矣曰吾之軀命乃同於瓜果瓜果草木也若草木然人何勸哉夫田父野人必欲得其歡心厚賜之可也議學校貢舉狀東坡郎學士注公墓志云王介甫欲變更科舉神宗疑焉使兩制三館議之公議上神宗悟曰吾固疑此得蘇軾議意釋然矣遂即日召見又云此篇論知人之法在於責實熙寧四年正月某日殿中丞直史館判官告院蘇軾狀奏准勑講求學校貢舉利害令臣等各具議狀聞奏者臣伏以得人之道在於知人知人之法在於責實使君相有知人之才朝廷有責實之政則胥吏皂𨽻未嘗無人而况於學校貢舉乎雖因今之法臣以為有餘使君相無知人之才朝廷無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足矣夫時有可否物有廢興方其所安雖暴君不能廢及其既厭雖聖人不能復故風俗之變法制隨之譬如江河之徙移順其所欲行而治之則易為功彊其所不欲行而復之則難為力使三代聖人復生於今其選舉賢才亦必有道矣何必由學且天下固嘗立學矣慶厯之間以為太平可待慶歷四年三月詔立學於諸州府軍監除舊有學者餘並立學至於今日惟有空名僅存今陛下必欲求德行道藝之士責九年大成之業則將變今之禮易今之俗又當發民力以治宫室斂民財以養游士百里之內置官立師獄訟聽於是軍旅謀於是又當以時簡不率教者屏之逺方終身不齒則無乃徒為紛亂以患苦天下耶若乃無大變改而望有益於時則與慶厯之際何異故臣以為今日之學校特可因循舊制使先王之舊物不廢於吾世足矣至於貢舉之法行之百年治亂盛衰初不由此陛下視祖宗之世貢舉之法與今為孰精言語文章與今為孰優所得文武長才與今為孰多天下之事與今為孰辦較此數者而短長之議决矣今議者所欲變改不過數端或曰鄉舉德行而略文章或曰專取䇿論而罷詩賦或欲舉唐室故事兼採譽望而去彌封或欲罷經生朴學不用貼墨而考大義此數者皆知其一而不知其二者也臣請歷言之夫欲興德行在於君人者修身以格物審好惡以表俗孟子所謂君仁莫不仁君義莫不義君之所向天下趣焉若欲設科立名以取之則是教天下相率而為僞也上以孝取人則勇者割股怯者廬墓上以廉取人則敝車羸馬惡衣菲食凡可以中上意無所不至矣德行之弊一至於此自文章而言之則䇿論為有用詩賦為無益自政事言之則詩賦䇿論均為無用矣雖知其無用然自祖宗以來莫之廢者以為設法取士不過如此也豈獨吾祖宗自古堯舜亦然書曰敷奏以言明試以功自堯舜以來進人何嘗不以言試人何嘗不以功乎議者必欲以䇿論定賢愚决能否臣請有以質之近世士大夫文章華靡者莫如楊億使楊億尚在則忠清鯁亮之士也豈得以華靡少之通經學古者莫如孫復石介使孫復石介尚在則迂闊矯誕之士也又可施之於政事之間乎自唐至今以詩賦為名臣者不可勝數唐如韓栁元白本朝如二宋歐范輩何負於天下而必欲廢之近嵗士人纂類經史綴緝時務謂之䇿括待問條目搜括略盡臨時剽竊竄易首尾以眩有司有司莫能辨也且其為文也無規矩凖繩故學之易成無聲病對偶故考之難精以易學之文付難考之吏其弊有甚於詩賦者矣唐之通榜故是弊法雖有以名取人厭伏衆論之美亦有貨賂公行權要請托之害一使恩去王室權歸私門降及中葉結為朋黨之論唐制主司以通榜取人兼採譽望或自投所業或各舉所知往往多挾私意以去取通榜取人又豈足尚哉設科舉人多出三路謂進士明經學究也能文者既已變而為進士矣曉義者人皆去以為明經矣其餘皆朴魯不能化也至於人才則有定分施之有政能否自彰今進士日夜治經傳附之以子史貫穿馳騖可謂博矣至於臨政曷嘗用其一二顧視舊學已為虛器而欲使此等分别注疏粗識大義而望其才能增長亦已踈矣臣故曰此數者皆知其一而不知其二也特願陛下留意其逺者大者必欲登俊良黜庸回總攬衆才經略世務則在陛下與二三大臣下至諸路職司與良二千石耳區區之法何預焉然臣竊有私憂過計者敢不以告昔王衍好老莊天下皆師之風俗陵夷以至南渡王縉好佛捨人事而修異教大歷之政至今為笑王縉奉佛晚節尢謹代宗每從容問所以然縉盛陳福業報應帝嚮之大歷政刑日以湮陵故孔子罕言命則為知者少也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫性命之說自子貢不得聞而今之學者恥不言性命此可信也哉今士大夫至以佛老為聖人鬻書於市者非莊老之書弗售也讀其文浩然無當而不可窮觀其貌超然無著而不可挹此豈真能然哉蓋中人之性安於放而樂於誕耳使天下之士能如莊周齊死生一毁譽輕富貴安貧賤則人主之名器爵祿所以礪世磨鈍者廢矣陛下亦安用之而况其實不然而竊取其言以欺世者哉臣願陛下明勑有司試之以法言取之以實學博通經術者雖朴不廢稍涉浮誕者雖工必黜則風俗稍厚學術近正庶幾得忠實之士不至蹈衰季之風則天下幸甚論時政狀東坡郎學士注時新法既行中外皆言不便神宗亦疑之頗有感悟意介甫之黨執之亦堅故公既上萬言書後復進此熙寧四年三月某日殿中丞直史館判官告院權開封府推官臣蘇軾謹昧死上書皇帝陛下臣聞之益戒於禹曰任賢勿二去邪勿疑仲虺言湯之德曰用人惟已改過不吝秦穆喪師於崤悔痛自誓孔子録之自古聰明豪傑之主以漢高帝唐太宗皆以受責如流改過不憚號為秦漢以來百王之冠孔子曰君子之過如日月之食焉過也人皆見之更也人皆仰之聖賢舉動明白正直不當如是耶所用之人有邪有正所作之事有是有非邪正兩言而足正則用之邪則去之是則行之非則破之此理甚明如饑之必食渴之必飲豈有别生義理曲加粉飾而能欺天下者哉書曰與治同道罔不興與亂同事罔不亡陛下自去嵗以來所行新政皆不與治同道立條例司熙寧二年王安石參政立新法置三司條例司遣青苗使熙寧二年行青苗法斂助役錢熙寧二年司農寺以免役法頒行天下令五等戶皆輸錢入官以募役行均輸法熙寧二年三司條例司言發運使實總六路之賦入宜假以錢貨繼其用之不給凡糴買稅斂上供之物皆徙貴就賤用近易逺四海騷然行路怨咨自宰相已下皆知其非而不敢爭臣愚憃不識忌諱乃者上疏論之詳矣而學術淺陋不足以感動聖明近者故相舊臣藩鎮侍從雜然爭言其不便韓魏公富鄭公司馬公范蜀公皆論列以至於臺諫二三人者本其所與締交唱和表裏之人也然猶不免一言其非者豈非物議沸騰事勢迫切而不可止與溫公目録云介甫與吕晦叔素親患臺諫多橫議故用晦叔為中丞既而天下皆患條例司為民害晦叔乃建言條例司不便介甫以晦叔叛已後竟出晦叔知潁州自非見利忘義居之不疑者孰肯始終膠固不自湔洗如吳師孟乞免提舉胡宗愈不願檢詳如逃垢穢惟恐不脫之人情畏惡一至於此近者中外歡言已有悔悟意道路相慶如䝉大賚實望陛下旬日之間渙發德音洗蕩乖僻追還使者而罷條例司今者側聽所為蓋不過使監司體量抑配而已熙寧三年正月詔令諸路給散青苗錢今慮官吏不問民間願與不願輒行追呼或即均配今仰提㸃刑獄臣僚體量覺察比之未悟所較幾何此孟子所謂知兄臂之不可紾而勸以姑徐知鄰雞之不可攘而月取其一帝王改過豈如是哉臣又聞陛下以為此法且可試之三路熙寧二年九月制置三司條例司言乞於京東淮南河北三路先行青苗法臣以為此法譬如醫者之用毒藥以人之死生試其未效之方三路之民豈非陛下赤子而可試以毒藥乎今是政小用則小敗大用則大敗若力行而不已則亂亡隨之臣非敢過為危論以聳動陛下也自古存亡之所寄者四人而已一曰民二曰軍三曰吏四曰士四人者一失其心則足以生變今陛下一舉而兼犯之青苖助役之法行則農不安均輸之令出則商賈不行而民始憂矣並省諸軍迫逐老病至使戍兵之妻與士卒雜處其間貶殺軍分有同降配遷徙淮甸僅若流放年近五十人人懷憂而軍始怨矣內則不取謀於元臣侍從而專用新進小生東軒筆録云王荆公秉政宿德舊人議論不協荆公遂選用新進待以不次故兩禁臺閣內外要權莫非新進之士外則不責成守令監司而專用青苗使者多置間局以擯老成而吏始解體矣陛下臨軒選士天下謂之龍飛榜而進士一人首削舊恩示不復用熙寧二年上與輔臣論科埸之弊以進士第一例與館閣為非至十二月詔今後科埸制科第三等進士第一人及第一任回吏不與壁通判差遣所削者一人而已士莫不悵恨以陛下有厭薄其徒之意也今用事者又欲漸銷進士純取明經雖未有成法而小人招權自以為功更相扇搖以謂必行而士始失望矣今進士半天下自二十以上便不能誦憶注義為明經之學若法令一更則士各懷廢棄之憂而人才短長終不在此昔秦禁挾書而諸生皆抱其業以歸勝廣相與出力而亡秦者豈有他哉亦以失業而無所歸也故臣願陛下勿復言此民憂軍怨吏解體而士失望禍亂之源有大於此者乎今未見也一旦有急則致命之士必寡矣方是時不知希合苟容之徒能為陛下收板蕩而止土崩乎去嵗諸軍之始併也左右之人皆以士心樂併告陛下近者放停軍人李興告虎翼吏率錢行賂以求不併則士卒不樂可知矣虎翼軍名夫諂諛之人苟務合意不憚欺罔者類皆如此故凡言百姓樂請青苗錢樂出助役錢者皆不可信陛下以為青苗抑配果可禁乎不惟不可禁乃不當禁也何以言之若此錢放而不收則州縣官吏不免責罰若此錢果不抑配則願請之戶後必難收前有抑配之禁後有失陷之罰為陛下官吏不亦難乎故臣以為既行青苗錢則不當禁抑配其勢然也人皆謂陛下聖明神武必能徙義修慝以致太平而近日之事乃有文過遂非之風此臣之所以憤悶太息而不能已也昔賈充用事天下憂恐而庾純任愷俱力排之及充出鎮秦凉忠臣義士莫不相慶屈指數日以望維新之化而馮紞之徒更相告曰賈公逺放吾等失勢矣於是相為獻謀而充復留則晉氏之亂成於此矣自古惟小人為難去何則去一人而其黨莫不破壞是以為之計謀游說者衆也今天下賢者亦將以此觀陛下以為進退之决或再失望則知幾之士相率而逝耳豈特皆如臣等輩偷安懷祿而不忍去哉猖狂不遜忤陛下多矣不敢復望寬赦俯伏引領以待誅殛古文集成卷六十一
