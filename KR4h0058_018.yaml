body:
  text: 古文集成卷十八宋王霆震編前丙集四書上范司諌書歐公范文正公仲淹天聖中通判河中府召為右司諫東萊批大率平正有眼目筋骨須看他前後貫穿錯綜抑揚處迂齊批此文出於韓退之諫臣論之後亦頗祖其遺意而文字無一語一言與之重疊真是可與爭衡司諫七品官爾先立此一句解說在後於執事得之不為喜吕曰自小說起抑揚所以待范文正有此語而獨區區欲一賀者誠以諫官者天下之得失一時之公議繫焉吕曰此是一篇主意綱目亦頗說出大處今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也吕曰自旁說來然縣越其封郡踰其境吕曰主一事關鎖來雖賢守長不得行以其有守也吕曰結上意吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也吕曰二句自外面說兩段來映得諫官大亦是鎖句守與司兩字亦移易不得若天下之得失生民之利害社稷之大計應前面主張惟所見聞而不繫職司者獨宰相可行之諫官可言之爾吕曰以諫官比宰相揚抑眼目故士學古懷道者仕於朝不得為宰相必為諫官諫官雖卑與宰相等吕曰此一段最是筋骨節目警䇿處天子曰不可宰相曰可天子曰然宰相曰不然吕日鋪叙坐乎廟堂之上坐立兩字亦隱然有尊卑之分與天子相可否者宰相也天子曰是諫官曰非天子曰必行諫官曰必不可行立殿陛之前與天子爭是非者諫官也吕曰語健精神看他前面用廟堂與此間殿陛四字又看他相可否爭是非六字更移易不得亦略見尊卑之分宰相尊行其道諫官卑行其言吕曰總上二段並說怕偏故以一句轉結諫官上言行道亦行也到此則言兩道一般說盡九卿百司郡縣之吏吕曰再說前起守一職者任一職之責又生一責字宰相諫官繫天下之事亦任天下之責吕曰鎖前意說出然宰相九卿而下失職者受責於有司諫官之失職也到此又重於宰相取譏於君子有司之法行乎一時君子之譏著之簡册而昭明垂之百世而不泯甚可懼也吕曰比宰相不如諫官愈大此一段意筆最髙他人說大止於宰相今言不如極妙愈重夫七品之官應起頭一句任天下之責懼百世之譏豈不重耶吕曰此二段應前任天下之責結上說關鎖來法非材且賢者不能為也吕曰勾鎖下入說文公生下近執事始被召於陳州洛之士大夫相與語曰我識范君知其材也其來不為御史必為諫官及命下果然吕曰省文有力則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色面爭廷論者非他人必范君也期之拜命以來翹首企足竚乎有聞而卒未也竊惑之疑之豈洛之士大夫能料於前而不能料於後也吕曰總上將執事有待而為也吕曰生下段本欲責之而固緩之文字節奏當然昔韓退之作爭臣論以譏陽城不能極諫吕曰此段說破骨髓精神卒以諫顯吕曰應有待人皆謂城之不諫蓋有待而然吕曰應下段退之不識其意而妄譏修獨以謂不然當退之作論時吕曰欲說下士先立此柱城為諫議大夫已五年後又二年吕曰論陽城事最切始廷論陸贄及沮裴延齡作相欲裂其麻才兩事爾當德宗時可謂多事矣吕曰欲說下先立此句有力授受失宜叛將彊臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當時之事豈無急於沮延齡論陸贄兩事耶謂宜朝拜官而夕奏疏也幸而城為諫官七年適遇延齡陸贄事一諫而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉吕曰此一段說破骨髓精神盡在於此精神都在幸而向使兩轉上今之居官者卒三嵗而一遷或一二嵗甚者半嵗而遷也此一轉又緊此又非可以待乎七年也有從退之作論生許多話更不曽斷今天子躬親庶政化理清明雖為無事出脫然自千里詔執事而拜是官者豈不欲聞正議而樂讜言乎吕曰餘意不傷時有含蓄回互然今未聞有所言說使天下知朝廷有正士而彰吾君納諫之明也夫布衣韋帶之士窮居草茅坐誦書史常恨不見用吕曰自此下餘意皆鎖得盡及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉應前結得好極有力伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重望應前且解洛之士大夫之惑則幸甚應前惑字上富丞相書老泉富公名弼字彥國河南人東萊批此篇須看曲折抑揚開合反覆節奏好迂齊批此篇須看抑揚處開闔稱停得斤兩好又批云富公為相頗欲更張庶事羣小人多不樂者故預為之憂慮往年天子震怒出逐宰相選用舊臣堪付屬以天下者吕曰一句重一句自此皆一枝一節責望重處使在宰府與天下更始而閣下之位實在第二方是之時天下咸喜相慶以為閣下惟不為宰相也故默默在此方今困而復起起而復為宰相而又適值乎此時也不為而何為且吾君之意待之如此其厚也不為而何以副吾望吕曰間架鋪叙好故咸曰後有下令而異於他日者必吾富公也朝夕而待之跂首而望之難望望然而不獲見也戚戚然而疑吕曰此處難了反解解了又難嗚呼其弗獲聞也解必其逺也進而及於京師亦無聞焉難不敢以疑猶曰解天下之人如此其衆也數十年之間如此其不變也皆曰難賢人焉或曰彼其中則有說也解此句應在後而天下之人則未始見也然而不能無憂吕曰此應後解如砥柱立中流蓋古之君子吕曰再生意愛其人也則憂其無成吕曰一篇意且嘗聞之古之君子相是君也與是人也皆立於朝則使吾皆知其為人皆善者也而後無憂且一人之身而欲擅天下之事雖見信於當世而同列之人一言而疑之則事不可以成今夫政出於他人而不懼事不出於已而不忌精神只在出字與不出字上是二者惟善人為能見難處十分然猶欲得其心焉若夫衆人政出於他人而懼其害已事不出於已而忌其成功是以有不平之心生夫或居於吾前或立於吾後後前而皆有不平之心焉則身危吕曰鎖上面故君子之出處於其間也不使之不平於我也結上意周公立於明堂以聽天下而召公惑何者天下固惑乎大也召公猶未能信乎吾之此心也回互兩全周公定天下誅管蔡告召公以其志以安其身以及於成王故凡安其身者以安乎周也議論好召公之於周公管蔡之於周公是二者亦皆有不平之心焉以為周之天下周公將遂取之也周公誅其不平而不可告語者告其可以告語者而和其不平之心然則非其必不可以告語者則君子未始不欲和其心吕曰警䇿最要看人精神天下之人從士而至於卿大夫宰相集處其上將有所為何慮而不成不能忍其區區之小忿以成其不平之心則害其大事是以君子忍其小忿以容其小過而杜其不平之心然後當大事而聽命焉且吾之小忿不足以易吾之大事也結前不平之心故寧小容焉使無芥蒂於其間吕曰結得好古之君子與賢者並居而同樂故其責之也詳不幸而與不肖者偶不圖其大而治其細下句好則濶逺於事情而無益於當世吕曰責富公深故天下無事而後可與爭此不然則否吕曰繳結净潔昔者諸吕用事陳平憂懼計無所出陸賈入見說之使交歡周勃平用其䇿卒得絳侯北軍之助以滅諸吕夫絳侯木彊之人也非陳平致之而誰也故賢者致其不賢者也非夫不賢者之能致賢者也警䇿曩者今上即位之初冦萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正公在相府又欲以嵗月盡治天下事失於急與不忍小忿故羣小人亦急逐去之一去遂不復用以殁其身伏惟閣下以不世出之才立於天子之下百官之上首尾相應此其深謀逺慮必有所處而天下之人猶未獲見洵西蜀人也竊有志於今世願一見於堂上含不盡意惟閣下深思之毋忽上韓樞密書老泉迂齊批議論精切筆勢縱橫開闔變化曲盡其妙又批云詞嚴氣徑筆端收斂頓挫十分回斡精神深識天下之勢而議論頗從韓非孫武等書來大尉執事洵著書無他長及言兵事論古今形勢至自比賈誼所獻權書雖古人已往成敗之迹苟深曉其義施之於今無所不可昨因請見求進末議大尉許諾謹撰其說言語朴直非有驚世絶俗之談甚髙難行之論太尉取其大綱而無責其纎悉蓋古者非用兵决勝之為難而養兵不用之可畏今夫水激之山放之海决之為溝塍壅之為沼沚看他用字以水譬兵此是疏道之時是天下之人能之起之易委江河注淮泗匯為洪波瀦為大湖此四個字與前四個字都移易不得此是收斂時萬世而不溢者自禹之後未之見也言收斂之難夫兵者聚天下不義之徒授之以不仁之器而教之以殺人之事說盡從來未有人如此說夫惟天下之未安盜賊之未殄用兵决勝之時然後有以施其不義之心用其不仁之器而試其殺人之事當是之時勇者無餘力智者無餘謀巧者無餘技三個有餘字應在後故其不義之心變而為忠不仁之器加之於不仁而殺人之事施之於當殺㸃化得好及夫天下既平盜賊既殄養兵不用之時不義之徒聚而不散勇者有餘力則思以為亂智者有餘謀則思以為姦巧者有餘技則思以為詐於是天下之患雜然出矣蓋虎豹終日而不殺則跳踉大呌以發其怒蝮蝎終日而不螫則噬齧草木以致其毒其理固然無足怪者昔者劉項奮臂於草莽之間秦楚無賴子弟千百為輩爭起而應者不可勝數筆力徑轉鬬五六年天下厭兵項籍死而髙祖亦已老矣句法方是時分王諸將改定律令與天下休息而韓信黥布之徒相繼而起者七國髙祖死於介胄之間而莫能止也連延及於吕氏之禍訖孝文而後定是何起之易而收之難也劉項之勢初若决河略應前譬喻順流而下誠有可喜及其崩潰四出放乎數百里之間拱手而莫之救也嗚呼不有聖人何以善其後看過接處太祖太宗躬擐甲胄跋涉險阻以斬刈四方之蓬蒿語壯用兵數十年謀臣猛將滿天下一旦卷甲而休之傳四世而天下無變此何術也此四字喚得好荆楚九江之地不分於諸將兩句應不盡而韓信黥布之徒無以啓其心也區處之術斷得分明結定了使轉雖然天下無變而兵久不用應養兵不用可畏一句則其不義之心蓄而無所發不用之此則用之彼飽食優游求逞於良民觀其平居無事出怨言以邀其上一旦有急是非人得千金不可使也往年詔天下繕完城池西川之事洵實親見凡郡縣之富民舉而籍其名得錢數百萬以為酒食餽餉之費杵聲未絶城輒隨壞如此者數年而後定卒事官吏相賀卒徒相矜若戰勝凱旋而待賞者說當時事宛在目前不言兵驕而驕態在其中比來京師遊阡陌間其曹往往偶語無所諱忌聞之土人方春時尤不忍聞蓋時五六月矣㑹京師憂大水鋤耰畚築列於兩河之壖縣官日費千金傳呼勞問之聲不絶者數十里猶且睊睊狼顧莫肯效用看他造語且夫內之如京師之所聞外之如西川之所親見天下之勢今何如也雖不深言而婉切御將者天子之事也御兵者將之職也接得尤緊天子者養尊而處優樹恩而收名與天下為喜樂者也故其道不可以御兵人臣執法而不求情盡心而不求名出死力以捍社稷使天下之心繫於一人而已不與焉故御兵者人臣之事不可以纍天子也今之所患大臣好名而懼謗病源好名則多樹私恩懼謗則執法不堅是以天下之兵豪縱至此而莫之或制也善用字頃者狄公青在樞府號為寬厚愛人狎眤士卒得其歡心揚而太尉韓魏公適承其後彼狄公者知御外之術而不知治內之道抑此邊將材也古者兵在外愛將軍而忘天子在內愛天子而忘將軍愛將軍所以戰愛天子所以守又以戰守二字續之則文字不困狄公以其御外之心而施諸內太尉不反其道而何以為治回斡或者問以為兵久驕不治一旦繩之以法恐因以生亂昔者答郭子儀去河南李光弼實代之將至之日張用濟斬於轅門三軍股栗夫以臨淮李之悍而代汾陽郭之長者三軍之士竦然如赤子之脫慈母之懷而立乎嚴師之側何亂之敢生且夫天子者天下之父母也將相者天下之師也內外戰守兩字既是恐其易窮又添父母師之語此是字變態師雖嚴赤子不敢以怨其父母將相雖厲天下不敢以怨其君其勢然也綴上譬諭立論天子者可以生人可以殺人故天下望其生及其殺之也天下曰是天子殺之故天子不可以多殺人人臣奉天子之法雖多殺天下無以歸怨此先王所以威懷天下之術也此論偏六經中無此意是從韓非孫武等書來伏惟太尉思天下所以長久之道而無務一時之名應好名句盡至公之心而無恤三軍之多言應懼謗句天子推深仁以結其心太尉厲威武以振其惰彼其思天子之深仁則愛而不至於怨思太尉之威武則畏而不至於驕有此一邊方回護得人主恩愛不然則為姑息矣君臣之體順而畏愛之道立人臣一意行法使恩歸人主乃是識體非太尉吾誰望耶上田樞密書老泉名况字元鈞其先京兆人後徙信都嘉祐三年為樞密使東萊批此篇議論反覆極有法度切宜詳味天之所以與我者夫豈偶然哉堯不得以與丹朱舜不得以與商均而瞽瞍不得奪諸舜發於其心出於其言見於其事確乎其不可易也聖人不得以與人父不得奪諸其子於此見天之所以與我者不偶然也夫其所以與我者必有以用我也我知之不得行之不以告人天固用之我實置之其名曰棄天自卑以求幸其言自小以求用其道天之所以與我何如而我如此也其名䙝天棄天我之罪也䙝天亦我之罪也不棄不䙝而人不我用不我用之罪也其名曰逆天然則棄天䙝天者其責在我逆天者其責在人在我者吾將盡吾力之所能為者以塞乎天之所以與我之意而求免乎天下後世之譏在人者吾何知焉吾求免夫一身之責之不暇而暇為人憂乎哉孔子孟軻之不遇老於道塗而不倦不愠不怍不沮者夫固知夫責之所在也衛靈魯哀齊宣梁惠之徒不足相與以有為也我亦知之矣抑將盡吾心焉耳吾心之不盡吾恐天下後世無以責夫衛靈魯哀齊宣梁惠之徒而彼亦將有以辭其責也然則孔子孟軻之目將不瞑於地下矣夫聖人賢人之用心也固如此如此而生如此而死如此而貧賤如此而富貴升而為天沈而為淵流而為川止而為山彼不預吾事吾事畢矣竊怪夫後之賢者之不能自處其身也飢寒困窮之不勝而號於人嗚呼使吾誠死於飢寒困窮邪則天下後世之責將必有在彼其身之責不自任以為憂而我取而加之吾身不已過乎今洵之不肖何敢以自列於聖賢然其心亦有所不甚自輕者何者天下之學者孰不欲一蹴而造聖人之域然及其不成也求一言之幾乎道而不可得也千金之子可以貧人可以富人非天之所與雖貧人富人之權求一言之幾乎道不可得也天子之宰相可以生人可以殺人非天之所與雖以生人殺人之權求一言之幾乎道不可得也今洵用力於聖人賢人之術亦已久矣其言語其文章雖不識其果可以有用於今而傳於後與否獨怪夫其得之不勞方其致思於心也若或起之得之心而書之紙也若或相之夫豈無一言之幾於道者乎千金之子天子之宰相求而不得者一旦在已故其心得以自負或者天其亦有以與我也曩者見執事於益州當時之文淺狹可笑飢寒窮困亂其心而聲律記問又從而破壞其體不足觀也已數年來退居山野自分永棄與世俗日疏濶得以大肆其力於文章詩人之優柔騷人之清深孟韓之溫醇遷固之雄剛孫吳之簡切投之所向無不如意嘗試以為董生得聖人之經其失也流而為迂朝錯得聖人之權其失也流而為詐有二子之材而不流者其惟賈生乎惜乎今之世愚未見其人也作䇿二道曰審勢審敵作書十篇曰權書心術法制攻守彊弱用間髙祖項籍子貢孫武六國凡十篇洵有山田一頃非凶嵗可以無饑力耕而節用亦足以自老不肖之身不足惜而天之所與者不忍棄且不敢䙝也執事之名滿天下天下之士用與不用在執事故敢以所謂䇿二道權書十篇為獻平生之文逺不可多致有洪範論史論十篇近以獻內翰歐陽公度執事與之朝夕相從而議天下之事則斯文也其亦庶乎得陳於前矣若夫其言之可用與其身之可貴與否者執事事也執事責也洵何有哉上劉長安書欒城名敞字原父郎學士云此篇論自處髙者不合於世俗轍聞之物之所受於天者異則其自處必髙自處既髙則必超然有所不合於世俗蓋猛虎處於深山向風長鳴則百獸震恐而不敢出松柏生於髙岡散柯布葉而草木為之不殖非吾則爾拒而爾則不吾抗也故夫才不同則無朋而勢逺絶則失衆才髙者身之纍也勢異者衆之棄也昔者伯夷叔齊已嘗試之矣與其鄉人立以其冠之不正也舍而去之夫以其冠之不正也舍之而去則天下無乃無可與共處者邪舉天下而無可與共處則是其勢豈可以久也苟其勢不可以久則吾無乃亦將病之與其病而後反也不若其素與之之為善也伯夷叔齊惟其往而不反是以為天下之棄人也以夷齊之不吾屑而棄夷齊者是固天下之罪矣而以吾之潔清而不屑天下是夷齊亦有過矣古語有之大辨若訥大巧若拙何者惟天下之以吾辨而以辨棄我以吾巧而以巧困我故以拙養巧以訥養辨此又非獨善保身也亦將使天下之不吾忌而其道可長久也今夫天下之士某已略觀之矣於此有所不足則於彼有所長於此有所蔽則於彼有所見其勢然矣側聞執事之風明俊雄辨天下無有敵者而髙亮剛果士之進於前者莫不振栗而自失退而仰望才業之輝光莫不逡巡而自愧蓋天下之士已大服矣而某願執事有以少下之使天下之士樂進於前而無恐而某亦得進見左右以聽議論之末幸甚幸甚古文集成卷十八
