body:
  text: 古文集成巻七十五宋王霆震編前癸集六問對對楚王問依斆齋批㸃増五臣註解宋玉斆齋批此篇設辭先論曲彌高而和彌寡後以鳳凰鯤魚自喻其行能而王不能用也楚襄王問於宋玉曰先生其有遺行與何士民衆庶不譽之甚也宋玉對曰唯然有之願大王寛其罪使得畢其辭客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽阿薤露國中屬而和者數百人其為陽春白雪國中屬而和者不過數十人選本有而已二字引商刻羽雜以流徵國中屬而和者不過數人而已選本无此二字翰曰下里巴人下曲名也陽春白雪髙曲名也是以其曲彌高其和彌寡故鳥有鳳而魚有鯤自喻鳳皇上擊九千里絶雲霓負蒼天選有足亂浮雲四字翺翔乎杳冥之上夫蕃籬之鷃豈能與之料天地之髙哉銑曰蕃籬蒿草之屬鷃小鳥也言棲於蕃籬之上豈能料計天地之髙逺哉玉自喻髙才人安能知之乃肯輙自為聲譽鯤魚朝發崐崘之墟暴露也鬐於碣石暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉翰曰孟諸大澤名尺澤小水也鯢小魚名故非獨鳥有鳳而魚有鯤也士亦有之翰曰言亦有大才不可識知者夫聖人瑰意琦行超然獨處夫世俗之民又安知臣之所為哉對禹問昌黎斆齋云此篇論禹以傳子為慮後世或問曰設辭堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂天下争之之亂也堯舜之利一作慮民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人而不傳慮其患而不得如己者一云慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮民也則深矣傳之子而當不淑則奈何曰時益以難理傳之人則争未前定也傳之子則不争前定也前定雖不當賢猶可以守法不前定而不過賢則争且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢争傳諸子得大惡然後人受其亂一作禍禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而争且亂孰若傳之子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不苟私於其子以害天下求其說而不得從而為之辭晉問八首柳子厚迂齋批晉國之美多矣自山河而兵自兵而馬曰木曰魚曰鹽一節細如一節至於晉文公之霸業盛矣然以道觀之亦何足貴却有一項最可貴者曰堯之遺風也至此則前面所舉可以盡廢此是善占地步一着最髙者特地留在後面說譬如賈人之善售物者必不肯先將好底出來吳子問於栁先生曰吳子吳武陵先生子厚自謂先生晉人也晉之故宜知之故字下一本有封字者因下文而誤曰然然則吾願聞之可乎曰可晉之故封太行掎之掎舉綺切偏引也首陽起之黄河迤之潘云迤演爾切邪行也字亦作迆大陸靡之大陸澤名靡曼也或巍而髙或呀而淵呀虚加反張口也景霍汾澮以經其壖晉語注景大也霍山在河東汾澮水名潘云汾符分切澮古外切壖而宣切在河邊地若化若遷鈎纓蟬聮然後融為平川而侯晉之都居大夫韓趙魏之邑建焉其高壯山則騰突撑拒撑抽庚切拄也拒捍也聱岈欎怒聱五交切語不入岈許加切山深皃與谺同谷中大空若熊羆之包口虎豹之嘷音豪終古而不去攫秦搏齊攫厥縛切當者失據燕狄惴怯若卵就壓振振業業覷闗蹀户愓若僕妾其按衍則平盈旋緣紆徐夷延若飛䳒鳶同余專切之翔舞洄水之容與以稼則碩以植則茂以牧則蕃以畜則庶而人用是富而邦以之阜其河則濬源河崑崙入于天淵出乎無門行乎無垠自匈奴而南以介西鄙衝奔太華山在晉之西運肘東指混潰后土濆濁麋沸濆音汾又房吻切黿鼉詭恠于于汨汨騰倒䭿音佚越委泊涯涘呀呷欱呼合切納摧雜失墜其所盪激則連山參差廣野瓌裂轟雷怒風撼戸敢切􅟀諸韵无本作領于􅡴音戞漰石之所轉躍大木之所擢拔漰披朋切泙白明切洞踏者彌數千里若萬夫之斬伐而其舳艫之所負橦傳江切檣之所御鱗川林壑隳雲遁雨瞬目而下者榛榛沄沄百舎一赴若是何如吳子曰先生之言豐厚險固誠晉之美矣然晉人之言表裏山河者備敗而已左僖二十八年子犯曰云云非以榮觀顯大也呉起所謂在徳不在險皆晉人之藉也史吳起傳願聞其他先生曰大鹵音魯太原晉陽縣之金棠谿屬蔡州之工火化水淬器備以充為棘即㦸宇為矛為鎩音殺長矛為鉤為鏑音的為鍭侯候二音矢名出太白徴蓐收召招揺伏蚩尤肅肅褷褷山宜切一作祁合衆靈而成之博者狹者曲者直者歧者勁者長者短者攅之如星奮之如霆運之如縈浩浩奕奕淋淋滌滌熒熒的的若雪山冰谷之積觀者膽掉目出寒液當空發耀英精互繞晃蕩洞射天氣盡白日規為小語極工鑠雲破霄跕音牒用字工見馬援傳墜飛鳥弓人之弓函人之甲膠角百選犀兕七屬音注見考工記乃使跟超掖夾音挾之倫服而持之南瞰諸華北讋羣夷技擊節制荀子齊之技擊威文之節制聞於天下是為善師延目而望之固以拳拘喘汗免胄肉袒進不敢降退不敢竄若是何如吳子曰夫兵之用由徳則吉由暴則凶是又不可美觀也先軫曰師直為壯曲為老左宣二十二年况徒以堅甲利刃之為上哉先生曰晉國多馬屈焉是産馬左傳所謂屈産之乘僖二年土寒氣勁崖坼谷裂草木短縮鳥獸墜匿而馬蕃焉師師兟兟音詵進也溶溶紜紜轠轠音雷轔轔或赤或黄或𤣥或蒼或淳或駹莫江切黭然而隂炳然而陽若旌旃旂幟之煌煌乍進乍止乍伏乍起乍奔乍躓音致若江漢之水疾風驅濤擊山盪壑雲沸而不止羣飲源槁工廻食野赭浴川蹙浪噴震播灑音洒潰潰焉若海神駕雪而來下觀其四散惝齒兩切本作敞怳許往切開合萬狀喜者鵲厲怒者人搏决然坌躍千里相角風騣霧鬛斸音燭山抉壑耳揺層雲腹捎衆木寂寥逺遊不夕而復攫地跳梁堅骨蘭筋交頸互齧鬭目相馴聚溲更嘘昂首張齗其小者則連牽繳繞仰乳俯齕下没切蟻雜螽集啾啾潗潗七立切上林賦潗湁鼎沸注謂水激也旅走叢立其材之可者收斂攻教掉手飛縻指毛命物百步就覊牽以荀息谷梁僖二年荀息牽馬操璧御以王良孟滕文下趙簡子使王良與嬖奚乗超以范鞅左哀二十三年軒以欒鍼左成十六年晉楚遇于鄢陵步毅御晉厲公欒鍼為右欒范以其族夾公行陷於綽鍼乃掀公以出云云逐一看它用字以佃以戎獸獲敵摧若是何如吳子曰恃險與馬者左昭四年子不聞乎故曰冀之北土馬之所生是不一姓請置此而新其說先生曰晉之北山有異材木梓匠工師之為宫室求大木者天下皆歸焉仲冬既至寒氣凝成外凋内貞瀋昌枕切汁也液不行乃堅乃良萬工舉斧以入必求諸岩崖之欹傾磵壑之紆縈凌㠝徂丸切岏吾官切之杪顛漱泉涯之淦古南切瀯音營根絞恠石不土而植千尋百圍與石同色羅列而伐者頭抗河漢刃披虹霓聲振連巒柹音胏古廢切木札也填層谿丁丁中莖切登登硠硠吕唐切稜稜若兵車之乗凌其響之所應則潰潰漰漰洶洶薨薨若騫若崩若螭龍之鬭風霆相騰其殊而下者札􅡴捎殺摧崪昨没昨律二切坱於浪倚黨二切塵也圠音軋霞披電裂又似共工觸不周而天柱折史三皇紀伏羲末年諸侯有共工氏任智刑以强霸與祝融戰不勝而怒頭觸不周山崩天柱折鵾鸛鶖鶬昆灌秋倉號鳴飛翔貙勑俱切豻音岸虎兕奔觸讋慄伏無所入遯無所脫然後斷度收羅捎危顛芟繁柯乘水潦之波以入于河而流焉盪突硉郎兀切硉兀危石也兀轉騰冐没類秦神驅石以梁大海抵曲鱗蹙匯音㑹流雷解前者汨越後者迫隘乃下夫龍門之懸水摺拉頹踏捽昨没切首軒尾澒胡動切入重淵不知其幾百里也濤波之旋滔山觸天既停既平彌望悠焉良乆乃始昂屹涌溢挺拔而出林立峯崪穿雲蔽日渙然自撓復就行列渾渾而去以至其所唯良工之指顧叢臺趙武靈王起叢臺見選東都賦注阿房始皇紀長樂未央建章並漢宫名昭陽殿名見選西都賦注之隆麗詭特皆是之自出若是何如呉子曰吾聞君子患無徳不患無土患無土不患無人患無人不患無宫室患無宫室不患材之不已有先生之所陳四累之下也且褫音斯福也初既成諸侯叛之左昭十三年先生曰河魚之大魚上迎濤波羅壅津涯千里雷馳重馬輕車遂以君命矢而縱觀焉矢用左傳中字縱觀用西漢書字大罟斷流脩網亘山罩都教切四物皆魚罟罶力九切罣張衡西京賦設罣䍡注云魚網也音獨鹿唐韵古賣切义胡卦切皆不說是魚網今上文四物皆是魚網當音獨鹿䍡音鹿織衽其間巨舟軒昂仡仡逥環水師更呼聲裂商顔於是鼔譟沓集而從之扼龍吭户郎切㧞鯨鰭音耆戮白黿逐毒螭叱馮夷立水湄搜攪流離掬縮推移梁㑹網蹙騰天彌圍掉踔擁踴以登夫歴山之垂如川之歸如山之崔字亦作摧如雲之披其有乘化㑹神振㧞漣淪摛竒文出恠鱗騰飛濤而上逸生電雷於龍門者猶仰綸飛繳音灼頓踏而取之莫不脫角裂翼呀虚牙切嚇音赫匍匐復就臠切莫保龍籍甘糅女救切五味布列雕爼風雲失勢沮散逺去若夫魦鯔音緇鮪鯉鰋鱧音禮魴鱮音叙上聲之𤨏屑蔑裂者夫固不足悉數漏脫紘目養之水府而三河之人則已填溢饜飫腥膏舄鹵聞膾炙之美則掩鼻蹙頞賤甚糞土而莫顧者也若是何如吳子曰一時之觀不足以夸後世口舌之味不足以利百姓姑欲聞其上者先生曰猗氏之鹽晉寳之大也左成六年云云人之賴之與榖同化若神造非人力之功也但至其所則見溝塍畦畹之交錯輪囷若稼若圃敞兮勻勻渙兮鱗鱗邐瀰音彌紛屬不知其垠俄然决源釃山宜切流交灌互澍注樹二音若枝若股委屈延布脉冩膏浸潗即入切濕滑汨彌高掩庳漫平聲壠冐塊決決没没逺近混㑹抵值堤防瀴伊盈切瀛霈濊水聲偃然成淵漭音莽然成川觀之者徒見浩浩之水而莫知其以及神液隂漉甘鹵密起孕靈富媪不愛其美無聲無形熛結迅詭囬眸一瞬積雪百里語到皛皛胡了切羃羃音密奮僨離析鍜圭槌璧眩轉的皪乍似隕星及地明㓕相射氷裂雹碎巃洛孔切嵸子孔切見上林賦増益大者印纍小者珠剖形容工涌者如坻坳者如缶日晶音精熠煜螢駭電走亘步盈車方尺數斗於是裒歛合集舉而堆之皓皓乎懸圃之巍巍皦乎溔戈沼切乎狂山太白之淋灕駭化變之神竒卒不可推也然後驢音閭驘盧戈切牛馬之運西出秦隴南過楚鄧北極燕代東逾周宋家獲作鹹之利人被六氣之用和鈞兵食以征以貢其賚天下也與海分功可謂有濟矣若是何如吳子曰魏絳之言曰近寳則公室乃貧左成六年豈謂是邪雖然此可以利民矣而未為民利也先生曰願聞民利吳子曰安其常而得所欲服其教而便於已百貨通行而不知所自來老幼親戚相保而無徳之者不苦兵刑不疾賦力所謂民利民自利者是也先生曰文公之霸也霸援秦破楚囊括齊宋曹衛解裂魯鄭震恐左僖二十七年二十八年定周于温奉冊受錫僖二十五年二十八年夾輔糾逖以為侯伯齊側皆切盟踐土見上注低昂玉帛天子恃焉以有諸侯諸侯恃焉以有其國百姓恃焉以有其妻子而食其力叛者力取附者仁撫推徳義立信讓示必行明所嚮逹禁止一好尚春秋之事公侯大夫䇿文馬馳軒車出入環連貫于國都則有五筵之堂九儿之室大小定位左右有秩禽牢餼饋交錯文質饗有嘉樂宴有庭實登降好賦犧素何切象皆尊名畢出犒勞贈賄率禮無失六卿理兵左僖二十七年大戎小戎鍾鼓丁寜以討不恭車埓音劣萬乗卒半天下鼓之則震斾之則畏其號令之動若水之源若輪之旋莫不如志當此之時咸能驩娛以奉其上故其民至于今好義而任力此以民力自固假仁義而用天下其遺風尚有存者若是可以為民利也乎吳子曰近之矣然猶未也彼霸者之為心也引大利以自嚮而摟他人之力以自為固而民乃後焉非不知而化不令而一異乎吾嚮之陳者故曰近之矣猶未也先生曰三河古帝王之更都焉史年表晉阻三河而平陽堯之所理也通厯堯都平陽有茅茨采椽土型之度故其人至于今儉嗇有温恭克讓之徳故其人至于今善讓有師錫僉曰疇咨之道故其人至于今好謀而深有百獸率舞鳳皇來儀於變時雍之美故其人至于今和而不怒有昌言儆戒之訓故其人至于今憂思而畏禍有無為不言垂衣裳之化故其人至于今恬以愉此堯之遺風也願以聞於子何如呉子離席而立拱而言曰尊堯之至故如此美矣善矣其蔑有加矣此固吾之所欲聞也夫儉則人用足而不淫讓則遵分而進善其道不鬬謀則通於逺而周於事和則仁之質戒則義之實恬以愉則安而乆於其道也至乎哉今主上方致太平動以堯為准先生之言道之奥者若果有貢於上則吾知其易易焉也舉晉國之風以一諸天下如斯而已矣敬再拜受賜齊司冦對程晏齊境多冦司冦不理景公召司冦讓之反諍公曰請理君朝廷之冦也公曰君廢其職反責我欲亂其責也曰不然君不聞鼷䑕之牙乎食人與百類雖囓盡而不痛俗謂之甘口䑕也魯國之牛聞食其角矣請以是諷焉牛之寢齕有蚊蚋撓其膚毛必知鼓耳揺尾以揮之及鼷䑕食之即不知痛也䑕之一牙豈不甚於蚊蚋千噆乎以其口甘雖貫心徹骨而不知也况其角乎公誠職臣以司冦請司朝廷之冦然後司封疆之冦也朝廷之冦其鼷䑕乎食君之角矣又將貫骨與心也是患大而君不知也封疆之冦蚊蚋乎但撓君之膚毛耳君將鼔耳揺尾以揮之是患小而不知大也臣所以急其大而不知慢其小而得知也景公不喻竟坐司冦以不事晏子曰司冦死田氏為鼷䑕於齊矣寒泉子對秦惠王陸龜䝉寒泉子秦之處士見秦惠王曰客有自趙來以約從連横事說大王者為誰惠王曰東周人蘇秦也寒泉子曰事十上王弗聴有之乎曰然其道如何王耶霸耶曰黜其霸以隮王乎曰然則何上書之煩而用之踈乎惠王曰醯雞不能混雷霆嬰兒不能抗烏獲者嚮與力懸絶故也蘇子誠辯矣安能以三寸舌謀山東諸侯使西面朝秦者乎寡人非不知不破一領甲不折一隻矢之為利也顧其猶捕風耳諸侯不可一非一朝也齊桓晉文之伯也始若膠附終若冰坼豈連雞不能俱上於棲而已哉寡人塞耳義弗聞寒泉子曰不然夫齊荆三晉之人病於兵乆矣方城之金十九為兵一為鏄銚董澤之蒲十九為幹一為箕其父子兄弟之血前後濺野草齊魂為燕氛趙骨化魏土悽痛之聲入金石出絃匏聞之者悄慼酸骨泣不自禁一旦有人謂曰朝與秦連衡暮得怗怗安卧秦亦猒戰雖鼔牙頰未能吞諸侯秦休而彊吾亦勇而奮矣設有辯口安能反覆乎大王不用秦詔一武士斷其頸無令車輪輾闗下土使東諸侯聞其言從散衡敗東向以背秦王出則奪氣入則包羞及其殆也披土地以奉讎國獨不念秦仲之業艱難寒泉子耕於鄙趙即封蘇季子為武安君六國果奉教秦閉闗十五年古文集成巻七十五
