body:
  text: 古文集成卷六十四宋王霆震編前壬集三圖兼山傳家學九圖郭雍字子和兼山先生忠孝丘之之子兼山傳易於伊川雍傳其學畫為九圖性善圖郭氏善惡萌於心已非性也方其未萌之初性之所有不可得而言故孟子名之曰善即孔子子思謂之中與誠是也性善之後方流為善惡既曰善惡則非性善之善矣性善蓋赤子之心也天命之性也喜怒哀樂未發之時也故人有善惡而性無之言性惡善惡混者是言人也非論性也孟子所以力明性善者蓋謂學者必先明知性之善胸中無疑然後道可進若疑其為善惡則道不可得而進矣荀揚蓋見善人惡人而論之非知論性者也伊川曰孟子言性善蓋極本窮源之理故此為入道之始善者性也善惡性之流見於外者也克已圖郭氏學有二道曰不失赤子之心曰求其放心放心蓋已失之心所謂求其放心者復也求之而不能復者欲勝也故克之而後復復克皆內事克彼人欲復此天理也凡性分之內有害吾性善矣於作僞自私者皆人欲也孔子告顔淵之克已蓋克非禮之欲而復非欲之理也顔子不逺復進此道也謝先生論立已與物之際即是言外事其說本於躬自厚故齊物我此蓋續西銘廣大一說又非孔子告顔淵者也浩然圖郭氏養浩有二道曰不動心曰充不動心用力難而效速充者用力易而效遲充有不至者矣不動心無不至者也觀孟子養浩然之氣二者蓋兼之矣不動心又有養心之道曰寡欲其為人也寡欲雖有不存焉者寡矣孔子於易之乾明大人之道則知大者乾道也至孟子又明其養心之道而曰塞于天地之間豈欺我哉養大即浩然也所養反是皆為小人大小所養於內者也大人小人成於外者也無妄圖郭氏無妄即誠也在易曰無妄至孔子又言及中庸而後言誠又至孟子則曰性善皆一也然無妄有動象故又為誠之見於有為者如是則誠然後無妄矣以其本善故誠以其誠故無妄又為三者之序不誠則妄矣天人之分其間不能以寸伊川曰動以天故無妄動以人欲則妄矣大畜圖郭氏健為天德大畜止健畜天德也故彖曰剛健篤實輝光日新其德不能畜天德則見於有為者不能無妄故天德止於大畜而動於無妄也序外曰有無妄而後可畜是為交相養之道則知無妄者動亦無妄靜亦無妄而大畜一於止矣艮止圖郭氏艮止也天下之欲無窮而人每患於不能止者蓋不知無欲之地而止之也止於無欲之地所謂艮其背也人之耳目口鼻皆有欲也至於背則無欲矣內欲不動則外境不入是以行其庭不見其人也不獲其身止於止矣不見其人止於行矣內外兼止故人欲自滅而天理固存孟子曰養心莫善於寡欲其艮其背之義乎自一身之外言之庭與四海皆一也聖人舉而措之天下謂之事業皆行其庭之事也此道可明以理不可窮以辭即所謂中庸之道也誠明圖郭氏誠明有後先無內外異體而同功者也自源委流曰誠明因流窮源曰明誠用力多寡有至有不至則異而誠足以養明明足以養誠則一而已自誠而明生而知之安而行之也自明而誠學而知之利而行之也誠明相須以成功猶隂陽晝夜闕一不可孟子不動心近誠明擴而充之近明誠盡性圖郭氏人不能盡性者非不及於性也常過之也且飢而欲食寒而欲衣此天命之性也欲食者止於飽欲衣者止於暖是之謂盡性乃若過之則飢必食膏粱寒必衣文繡窮極人欲則天理滅矣以我飢而食也必思天下之人飢而皆食以我寒而衣也必思天下之人寒而皆衣如此則人之性盡矣故孟子之論至於五十者衣帛七十者食肉黎民不飢不寒養生送死無憾蓋明盡人性之道也數罟不入汙池斧斤以時入山林則物亦盡其性矣此自飢寒衣食言之則盡性之道皆可類推是以天地之大雖能生物實不能衣食繁息之衣食繁息使各遂其生是聖人贊化育盡其性之功也觀孔子之盡性蓋始於絶四孟子之盡性蓋始於不動心前所謂克復養浩無妄大畜艮止誠明皆欲盡其性善也性盡則功成矣三者盡則參天地豈曰小補之哉光明圖郭氏能盡其性盡人物之性則動靜不失其時其道光明矣學者成始成終之道也故曰成言乎艮然此特由學者成已成物時止時行而論也極動靜之道蓋不可得而盡言雖天地之大其為光明亦不外此古文集成卷六十四
