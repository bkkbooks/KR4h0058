body:
  text: 古文集成卷八宋王霆震編前乙集二記喜雨亭記東坡張子韶云豫聞陳伯修云喜雨亭記自非具眼目者未易知也迂齋批蟬蛻汙濁之中蜉蝣塵埃之外所謂以文為戲者亭以雨名志喜也古者有喜則以名物示不忘也解所以志喜之意周公得禾以名其書漢武得鼎以名其年文字不可無此等句叔孫勝敵以名其子左文十一年叔孫得臣獲長狄僑如名其子曰僑如其喜之小大不齊其示不忘一也豫至扶風之明年始治官舍為亭於堂之北而鑿池其南引流種樹以為休息之所是嵗之春雨麥於岐山之陽其占為有年既而彌月不雨民方以為憂越三月乙卯乃雨甲子又雨似春秋書法民以為未足丁卯大雨三日乃止官吏相與慶於庭商賈相與歌於市農夫相與忭於野憂者以樂病者以愈而吾亭適成接得甚妙於是舉酒於亭上以屬客而告之曰五日不雨可乎曰五日不雨則無麥十日不雨可乎曰十日不雨則無禾無麥無禾嵗且荐飢獄訟繁興而盜賊滋熾則吾與二三子雖欲優遊以樂於此亭豈可得耶今天不遺斯民始旱而賜之以雨使吾與二三子得相與優遊而樂於此亭者皆雨之賜也其又可忘耶既以名亭又從而歌之曰使天而雨珠寒者不得而為𥜗使天而雨玉飢者不得而為粟一雨三日伊誰之力此句已包太守天子造物太空了民曰太守太守不有歸之天子天子曰不然歸之造物造物不自以為功歸之太空太空冥冥不可得而名吾以名吾亭四者既皆無所歸則歸之於亭名迎薰堂記馬存元祐二年春三月馬子與二三子客於程氏堂程氏觴客酒半酣道古今治亂成敗事慘戚不樂有風生於簷户間飄人襟裾已而入肌骨蕩滌腸胃胸中之感拂不平者不覺散失起視萬物欣欣熙熙如春臺之人有喜笑色萬竅起音如歌詠太平之聲長枝牽柔婉蔓婀娜如翟羽庭佾舞蹈盛德客曰異哉是風何氣也馬子曰噫嘻嗟嗟此南風也遼乎邈哉曠數百千嵗有時乎一來今其時乎吾試為客歷古以數幾年幾何時乃一來今幾來矣吾聞舜孝格天五弦之上微動帝指拂拂以起被動植鳥獸魚鱉咸若湯之時吹雲橫霓霈作霖雨掃滌八載之孽而吾民傒蘇文武成康酣和塞周飄然自阿敦及路葦使天地祖考安樂福祿漢孝文時吾民阜財國亦富實太倉中都之儲者不可勝計唐太宗貞觀之間與三代同其和年榖屢登行旅不糧外户不閉斷獄希少幾至刑措宋受天命驅逐群隂聖子神孫保養休息吾聞間數十世聖人必興是風必來若合符矣禍災愁愠之氣立以滅息而生氤氲舜五百餘嵗至於湯湯五百餘嵗至于周周九百餘嵗至于漢漢八百餘嵗至于唐唐三百餘嵗至于宋自舜迄今三千三百餘嵗矣是風也凡六來非此六時其風中人狀直悽悽著物顔色零落憔悴吾與客今日之所遇何兹其幸歟客於是名其堂曰迎薰而馬子記之潛齋記朝補之潛室之廣無丈其髙如之背陽而面隂違溫而移寒髙室雙翼外蔭老木翳其前小竹叢其右朦朧暗曖光景不曜蓋若蟄蟲伏獸之所潛焉而潛之名所為得也客過豫而曰方今主聖臣良政恬俗康朝有鵷鸞野無豺狼可謂有道之世矣吾子生二十長六尺出不能提桴鼓以動百萬之師左烏號之弓右昆吾之劒喑嗚吒叱北收祈連西虜靈夏入不能陪黃閣之末議聨紫微之别班正端容色以齊肅百吏操紙握管以號令四海今反幽幽默默逃形逺迹以頑處心以潛名室非所謂倒行而逆施者耶豫躍然而驚捨然而笑曰有是哉主聖臣良此吾潛之所為甘乎分者也政恬俗康此吾潛之所為幸乎安也朝有鵷鸞野無豺狼此吾潛之所為有待乎亨也而反以是而疑我頑其亦未之思耶請為客言潛易曰雷在地中復此天地之潛也而陽氣已動乎黃泉矣尺蠖之屈以求伸也龍蛇之蟄以存身也此蟲獸之潛也而小者獲信大者獲存矣故不能靜者不能動不能處者不能出然則奚行之倒而施之逆耶昔者回憲潛於道故暗然而日彰黃綺潛於聲故默然而浸揚潛乎潛將以為不潛者矣客俯而出因記其語於壁安老堂記李方叔左朝散郎呂宗傑建甚哉老之難安也方少之時隂陽役之血氣使之心志誘其欲而迷其真勢利幻其前而誤其後未易能安之老且衰矣卻視向日之為宜其悔而求安然貪夫鄙人嗟老景之已至念短日之足惜悼前志之未充痛昔謀之匪良方且苟求無厭務得患失皇皇偷朝暮之生汲汲為子孫之計節義日衰廉恥盡喪貪於富者則曰吾老矣講貨財較虧羡之術始詳矣未忍舍也擅兼并而亘阡陌巧梯航以絶山海籠物貨而無餘藏運籌算而無遺䇿甘心於錐刀之間盡瘁於錙銖之末負戴於道路轉徙於溝壑貪夫徇富死而後止貪於貴者則曰吾老矣結知遇賈名譽之術始明矣未忍止也履公門而躩鑠遊闕庭而徘徊衒筋力強飲啖染鬚鬢呈聰明識愈隆而意愈切祿愈豐而戀愈深故位愈重而望愈輕念愈髙而德愈薄貪夫徇貴死而後止然則日暮途逺而倒行漏盡鍾鳴而未止類皆貪夫而富貴有以纍之也故曰甚哉老之難安也居士新作西堂以安老為名然居士之安非惟老而後安安之也久矣郭外之田足以給饔餼郭內之圃足以給爼茹而未嘗求羡裘葛足以具伏臘祿食足以備婚嫁而未嘗求豐居士曰富不可妄致也吾老矣求安而已居士以文學知名於時聲聞藹場屋荐為禮部九選遂擢上第名公巨卿爭欲出已門下一唯諾足以得薦擢而耻於附炎平生故人多在相輔一舉手可以登臺省而耻於自售居士曰貴不可以妄致也吾老矣求安而已故雖起家為郎於朝有曼容之髙風端居十年不調有淵明之徑節或曰嵩少箕隈山水佳秀近列左右築室巖下足以専天下之雄觀奈何局蹐於閭里之間哉居士曰吾求安也舍易就難舍近就逺則內勞吾心外勞吾力但見夫勞而未知其樂不獲其安而先撓吾天和矣此先人之故廬也即而新大之吾心猶欿然吾行年六十有二人間富貴不可妄求從吾所好行將挂冠懸車奉身以還歸老此堂志已決矣人生七十雖居是堂以安吾老知復幾何時哉則居士之所養可知故曰居士之安非惟老而後安安之也久矣夫安之為樂世之人未嘗知之及於病然後悔而求安及於勞然後慮而求安及於危然後懼而求安則向日求安之心皆妄未有能安其安者故老而能安已可尚矣非惟老而後安乃每以安老為心非達觀勇退無妄君子不能也故曰居士之所養可知矣松菊亭記山谷期於名者入朝期於利者適市期於道者何之哉反諸已而已矣鐘鼓管絃以飾喜鈇鉞干戈以飾怒山川松菊所以飾燕間者哉貴者知軒冕不可忍而有收其餘日而就間者矣冨者知金玉之不可守而有收其餘力而就間者矣蜀人韓漸正翁有范蠡計然之䇿白圭猗頓之材無所用於世而用於其楮中更三十年而富百倍乃築堂於山水之間自名曰松菊以書走京師乞記於山谷道人山谷逌然而笑曰韓子真知金玉之不可守欲收其餘力而就間者乎今將問子斯堂之作將以歌舞乎將以耕桑乎將以歌舞則獨歌舞而樂不若與人樂之與少歌舞而樂不若與衆樂之夫歌舞者豈可以徒樂之哉恤飢問寒以拊孤折劵棄債以拊貧冠婚喪祭以拊宗補耕助斂以拊客如是則歌舞於堂人皆粲然相視曰韓正翁尚能樂之乎此樂之情也將以耕桑則何時已哉金玉之為物怨入則悖出多藏則厚亡它日以遺子孫賢則損其志愚則益其過韓子知及此豈為之哉雖然歌舞就間之日以休耕桑之心反身以期於道豈可以無孟獻子之友哉昔日孟獻子以百乘之家有友五人皆無獻子之家者也必得無獻子之家者與之友則仁者助施義者助均智者助謀勇者助決取諸左右而有餘使宴安而不毒又使弟子日見所不見聞所不聞賢者以成德愚者以寡怨於此聽隱居之松風裛淵明之菊露可以無愧矣植松記陳篔窗木之無芬香艷美而無益於人之觀者莫松若也然有三異焉其心可以立獨其色可以受變其氣幹可以延年是則木之可以益乎人之觀者其有過於松者乎嗟乎世以芬香艷美取人者多矣豫於觀松得觀人之法焉辛未春得二本于圃人植諸堂下豫謹記且頌焉伊松之心匪鐡而堅一日獨夫千年比干伊松之色可霜可雪汲黯立朝聳栗在列伊松之幹終古弗畔夷齊卧山呼之不返夫松之有是三者初不假乎藻飾之功人之不能然者寧不有愧於此松梅澗記蕭大山梅澗撫張叔賢氏課詩所澗當梅時萬玉妃英英通一澗香雙清已索笑人亦清人餐芳酌瀾吐為詩詩又清四清詩其主詩無盡方踈影橫斜水清淺之詩出清疑盡然太露繼水邊離落忽橫枝之詩出清將盡然太臞至江頭千樹春欲暗之詩出清若盡然太腴是三語梅詩中截斷衆流句也不盡耶澗不竭詩不歇梅不絶詩不輟清無盡澗主續之俄雪大作南梢矜暖北梢欺寒豫曰華微實具可觀仁澗神替答云主擁鼻凍吟夢入梅魂雕碎梅心未問和羹事竹巖記蕭大山吉劉平叔有佳境號竹巖請豫記之巖雖欠寓目竹則素心知也記且竹乎生竹固大學事止至善章嘗援竹明之不大哉古以竹大者四家孤竹伯夷獨行吾義緑竹武公有斐斯文徽之謂不可一日無此君欲以清養情樂天謂竹有似賢愛惜之欲以厚養材皆能大者君子不觀竹之終觀於初筍竹初也震為篬筤於時為春筍時也初萌裁寸耳寸俄尺尺俄尋尋俄丈丈俄十丈強之長不旬餘即出萬形表為人眼界特立軒偉之觀可以觀學矣其直上為孟之勇其鋭長為顔之進其拔萃為孔之卓其髙標為中庸峻極于天之道其速化為大易不俟終日之神五者學之大也非天下之至變其孰能與於此夫竹觀以終常也觀以初變也變則植而有動意可以竦峭人使自奮可以扶策人使自持可以鞭逼人使自超能變者未有不能常者能五者未有不能四者蕭子説初劉子省初退庵記蕭大山知退清者也石溪傅氏得清江之清有二退南齋先生曰實之策第十八年耽著書倦出搢紳勇退今一人余遊廣中見素退一人曰晦之本溪𣲖僑焉號退庵翁不昏不宦不治生不適俗不怪隱不禪不動不仙不衰一退遺千慮倒蔗境也問處退法養心無妄故平養氣無暴故和養貧無求故樂艮背其樞乎翁之退蓋道進命退者嘻溪之先少監燮侍郎雱祕書肩冠衣蟬聮果退哉先之先介子持節而使者休奕捧簡而中丞亦退哉進退係時時之權係天人烏能人強進矯天殆已著利如漆絆名如罝萬情沉酣迷弗顧眚欲者進耳剛者退爭朝市為狡窟薄陵藪為愁牢失戚獲欣躁者進耳靜者退腰可折手可炙百世後臭可芳否愚者進耳智者退奪虎鹿未厭愛臯比搏之殞無悔貪者進耳廉者退夫晉至角必明夷升至冥必困易尚退矣是以常人退於分賢人退於義聖人退於密天地退於歸藏昔岩之賢築號初淡霖雨之意相商了泯舟楫之痕進之善退歟此庵之賢巧神取榮窮鬼屏辱卻立乎獨觀藝藝之復専退之福蠱髙而遁肥翁以之屈則伸理也退既在身進常在嗣人欲不失其正希乾之聖古文集成卷八
