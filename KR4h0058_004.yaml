body:
  text: 古文集成卷四宋王霆震編前甲集四序江西宗派詩序誠齋江西宗派詩者詩江西也人非皆江西也人非皆江西而詩曰江西者何繫之也繫之者何以味不以形也東坡云江瑶柱似荔子又云杜詩似太史公書不惟當時聞者嘸然陽應曰諾而已今猶嘸然也非嘸然者之罪也舍風味而論形似故應嘸然也形焉而已矣髙子勉不似二謝二謝不似三洪三洪不似徐師川師川不似陳后山而况似山谷乎味焉而已矣酸鹹異和山海異珍而調胹之妙出乎一手也似與不似求之可也遺之亦可也大抵公侯之家有閥閲豈惟公侯詩家亦然窶人子崛起委巷一旦紆以銀黃纓以端委視之言公侯也貌公侯也公侯則公侯乎爾遇王謝子弟公侯乎江西之詩世俗之作知味者當能别之矣昔者詩人之詩其來遙遙也唐云李杜宋言蘇黃將四家之外舉無其人乎門固有閥業固有承也雖然四家者流一其形二其味二其味一其法者也蓋嘗觀夫列禦冦楚靈均之所以行天下者乎行地以輿行波以舟古也而子列子獨御風而行十有五日而後反彼其於舟車且烏乎待哉然則舟車可廢乎靈均則不然飲蘭之露餐菊之英去食乎哉芙蓉其裳寶璐其佩去飾乎哉乘吾桂舟駕吾玊車去器乎哉然朝閬風夕不周出入乎宇宙之間忽然耳蓋有待乎舟車而未始有待乎舟車者也今夫四家者流蘇似李黃似杜蘇李之詩子列子之御風也杜黃之詩靈均之乘桂舟駕玊車也無待者神於詩者歟有待而未嘗有待者聖於詩者歟嗟乎離神與聖蘇李蘇李乎爾杜黃杜黃乎爾合聖與神蘇李不杜黃杜黃不蘇李乎然則詩可以易而言之哉祕閣修撰給事程公以一世儒先厭直而帥江西以政新民以學賦政如春而肅如秋而燠蓋二年如一日也逮暇則把酒賦詩以黼黻乎翼軫而金玊乎落霞秋水嘗試登滕王閣望西山俯章江問雙井今無恙乎因喟曰江西宗派圗吕居仁所譜而豫章自出也而是派之鼻祖雲仍其詩往往放逸非缺歟於是以謝幼槃之孫源所刻石本自山谷外凡二十有五家彚而刻之於學宫將以興發西山章江之秀激揚江西人物之美鼓動騷人國風之盛移書諗豫曰子江西人也非乎序斯文者不在子其將焉在豫三辭不獲則以所聞書之篇首云淡庵文集序誠齋淡庵先生胡公中興人物未能或之雙也紹興戊午帝以顯仁皇太后未返不得已將以大事小屈尊和戎先生上書力爭至乞斬宰相在廷大驚金人聞之募其書千金三日得之君臣奪氣知中國有人奉皇太后以歸自是塞馬不南者二十年昔魯仲連不肯帝秦秦軍聞之為却五十里後人疑之以為説士之夸辭以今揆古古為夸以今觀今今亦夸乎信所見疑所聞古今一也吾宋之安強不以百萬師而以先生之一書後之人聞之者烏知不若今之人聞仲連之事者乎亦以為夸未可知也若今之人親見先生之事則誰以為夸者今事之夸與否可信與否不較也使後之人無所疑於古之人者先生歟今不信古古奚病焉後不信今必當有時而無不信矣逢其事思其人嗚呼先生之功其逺矣哉先生之文肖其為人其議論閎以挺其記序古以馴其代言典而嚴其書事約而悉其為詩蓋自抵斥時宰誕置嶺海愁狖酸骨飢蛟血牙風呻雨喟濤譎波詭有非人間世之所堪耐者宜芥於心而反昌其詩視李杜夜郎夔子之音益加恢竒云至於騷辭涵茫嶄崒鉥劌刻屈抉天之幽泄神之廋稿癯而不瘁恫愀而不懟自宋玊而下不論也靈均以來一人而已夫是數者得其一猶足以行於今而傳於後而况萃其百者乎何其盛也何其盛也先生既沒後二十年其子澥與其從子渙族孫祕裒集先生之詩文七十卷目曰淡庵文集欲刻板以傳貧未能也之官中都舟過池陽太守蔡侯必勝相見因問家集慨然請其書刻之命郡文學周南董振之學録何巨源校讎之未就而蔡侯移守山陽雷侯孝友顔侯棫踵成之嗟乎先生功被于中國名振于四方文範于學者學者得其片言半簡猶寶之師之求見其書之全何可得也今三侯獨能刻而傳之以幸學者夫先生此集為之百年而始成使學者得之今乃一日而盡見三侯之用心可不謂賢矣哉而蔡侯首發其端可不謂又賢矣哉某嘗學於先生者先生之言曰道六經而文未必六經者有之矣道不六經而文必六經者無之先生之文其所自出蓋淵矣乎而某何足以知之先生廬陵人諱銓字邦衡淡庵其自號也若其世系歷官行事則丞相益國周公書于神道碑矣慶元已未八月門人楊某序杉溪集後序誠齋古今文章至我宋集大成矣蓋自奎宿宣精列聖制作於是煥乎之文日月光華雲漢昭回天經地緯衣被萬物河嶽炳靈鴻碩挺出在仁宗時則有若六一先生主斯文之夏盟在神宗時則有若東坡先生傳六一之大宗在哲宗時則有若山谷先生續國風雅頌之絶絃視漢之遷固卿雲唐之李杜韓栁蓋奄有而包舉之矣中更羣小崇姦黜正目為僻學禁而錮之蓋斯文之至此而一厄也惟我廬陵有瀘溪之王杉溪之劉兩先生身作金城以郛此道自王公遊大學劉公繼至獨犯大禁挾六一坡谷之書以入晝則庋藏夜則翻閲每伺同舍生息燭酣寢必起坐吹燈縱觀三書逮暇或哦詩句或績古文每一篇出流布輦轂膾炙搢紳紙價為髙嗟乎若兩先生當妖禽羣啾而發紫鸞之鳴折楊驟歌而奏清廟之瑟鷸冠胡服之競麗而覿黃收純衣之製其有大勳勞於斯文其偉乎哉余生十有七年始得進拜瀘溪而師焉而問焉其所以告余者大學犯禁之説也後十年又得進拜杉溪而師焉而問焉其所以告余者亦大學犯禁之説也今兩先生老矣豫亦老而歸休矣杉溪之曾孫千齡一日訪豫於南溪之上出其祖之書曰杉溪集者示余請書其後余披而讀之見丞相益國周公序其篇首凡杉溪先生拔新領異之詩登峯造極之文既攡張發揮不遺餘矣豫尚何言哉獨書兩先生所告豫者于篇末俾後學有聞焉瀘溪又云是時書肆畏罪坡谷二書皆毁其印獨一貴戚家刻印印之率黃金斤易坡文十蓋其禁愈急其文愈貴也今家有此書人習此學有知當世斯文之難得如此者乎是小人之厄斯文乃所以昌斯文也然厄斯文者今皆泯然與草木共盡而斯文之傳與日月爭光然則斯文病不厄爾厄奚病哉古者聖賢君子之所守於是可得而知矣顧吾道之是非何如耳時之好惡足為之動耶六一坡谷其知之矣至於吾州之兩先生首犯時之大禁力學衆人之不敢學所謂豪傑特立之士者不在斯人歟不在斯人歟雪巢小集後序誠齋雪巢小集天台林憲景思詩也梁溪先生尤延之既序之矣景思復徴豫序其後景思之詩似唐人信矣延之之論也然至如桃花飛後楊花飛楊花飛後無可飛天空霜無影等句超出詩人凖繩之外其遐不可追其卓不可跂矣使李太白在必一笑頷此句也似唐人而已乎然延之深愛景思之才而深惜其窮至謂豈發造化之祕而天惡此耶又謂富貴者人之所可得而才者天之所甚靳既取其所甚靳則不兼其所可得又謂才者致窮之具人何用得此而天亦何用靳此有未易以理曉者愚嘗摘此語以唁景思曰子何必以才而致窮耶子何必發天之所祕而逢天之所怒耶子何必爭天之所靳而不取人之所可得者耶景思笑曰子不見唐人孟郊賈島乎郊島之窮才之所致固也然同時之士如王涯賈餗豈不富且貴哉當郊島以飢死寒死涯餗未必憐之也及甘露之禍雖欲如郊島之飢死寒死不可得也使郊島見涯餗之禍涯餗憐郊島乎郊島憐涯餗乎未可知也子不見本朝黃秦乎魯直貶死宜州少遊貶死藤州而蔡京王黼相繼為宰相貴震天下當黃秦之死王蔡必幸其死及王蔡之誅黃秦不見其誅使黃秦見其誅亦必不幸之也然黃秦不幸王蔡之誅而天下萬世幸之王蔡幸黃秦之死而天下萬世惜之然則黃秦之貧賤王蔡之富貴其究何如也且彼四子之富貴其得者幾何而今視不啻如糞土而此四子之貧賤所得者如此而今與日月爭光何也然則孰可願孰不可願乎亦未可知也今吾不才豈敢擬郊島黃秦而吾之窮有甚於郊島黃秦吾何幸得與郊島黃秦同其窮而不與涯餗王蔡同其逹而子為我願之乎且吾與詩人同爭夫天之所靳是天之橫民也同犯夫天之所怒是又天之橫民也治橫民者宜以橫政既與詩人同為橫民又欲不與詩人同受橫政可乎余賀之曰子既無遺力以取所靳無懼心以犯所怒無怨言以安所致然則延之為君惜延之過也余舉延之之語以唁君亦過也然君心欲專享詩人所謂才之所致者而不顧不悔以不辭造物之橫政亦過也子盍持此語再見延之為余問之續後漢書序省齋曹氏代漢名禪實篡特新莽之流亞丕方登壇自形舜禹之言固不敢欺其心矣今向千載好惡豈復相沿而蘇軾記王彭之説以為塗巷談三國時事兒童聽者聞劉敗則顰蹙曹敗則稱快遂謂君子小人之澤百世不斬兹豈人力強致也歟陳夀身為蜀人徒以仕屢見黜父又為諸葛亮所髠於劉氏君臣不能無憾著三國志以魏為帝而指漢為蜀與孫氏俱謂之主設心已偏故凡當時祫祭髙帝以下昭穆制度皆略而弗書方且乞米於人欲為佳傳私意如此史筆可知己其死未幾習鑿齒作漢晉春秋起漢光武終晉愍帝以蜀為正魏為篡謂漢亡僅一二年則已為晉炎興之名天實命之是蓋公論也然五十四卷徒見於唐藝文志及本朝太平御覽之目逮仁宗時修崇文總目其書已逸或謂世亦有之而未之見也幸晉史載所著論千三百餘言大旨昭然劉知幾史通云備王道則曹逆而劉順本朝歐陽修論正統而不黜魏其賔客章望之著明統論非之見於國史近世張栻經世紀年直以先主上繼獻帝為漢而附魏吳于下方皆是意也今廬陵貢士蕭常潛心史學謂古以班固史為漢書范曄史為後漢書乃起昭烈章武元年辛丑盡少帝炎興元年癸未為續後漢書既正其名復擇注文之善者并書之積勤二十年成帝紀年表各二卷别為音義四卷惜乎夀疏略於前而常不追記英賢憲章於後以釋裴松之遺恨也昔周東遷浸以微弱至春秋僅存王城而吳楚強大綿地數千里皆僣稱王聖人斷然以夷狄字之昭烈土地甲兵甚非周比興於漢中適與沛公始封國號同天時人事決非偶然孔子復生必有以處此乃為首探魏文當日之心次舉蘇氏百世之説以合習氏之論而證舊志之非作續後漢書序梁書目録序南豐梁書六本紀五十列傳合五十六篇唐貞觀三年詔右散騎常侍姚思廉撰思廉者梁史官察之子推其父意又頗采諸儒謝吳等所記以成此書臣等既校正其文字又集次為目録一篇而敘之曰自先王之道不明百家並起佛最晚出為中國之患而在梁為尤甚故不得而不論也蓋佛之徒自以謂吾之所得者內而世之論佛者皆外也故不可詘雖然彼惡暏聖人之內哉書曰思曰睿睿作聖蓋思者所以致其知也能致其知者察三才之道辨萬物之理小大精粗無不盡也此之謂窮理知之至也知至矣則在我者之足貴在彼者之不足玩未有不能明之者也有知之之明而不能好之未可也故加之誠心以好之有好之之心而不能樂之未可也故加之至意以樂之能樂之則能安之矣如是則萬物之自外至者安能纍我哉萬物之所不能纍故吾之所以盡其性也能盡其性則誠矣誠者成也不惑也既誠矣必充之使可大焉既大矣必推之使可化焉能化矣則含智之民肖翹之物有待於我者莫不由之以全其性遂其宜而吾之用與天地參矣德如此其至也而應乎外者未嘗不與人同此吾之道所以為天下之通道也故與之為衣冠飲食冠婚喪祭之具而由之以教其為君臣父子兄弟夫婦者莫不一出乎人情與之同其吉凶而防其憂患者莫不一出乎人理故與之處而安且治之所集也危且亂之所去也與之處者其具如此使之化者其德如彼可不謂聖矣乎既聖矣則無思也其至者循理而已無為也其動者應物而已是以覆露乎萬物鼓舞乎羣衆而未有能測之者也可不謂神矣乎神也者至妙而不息者也此聖人之內也聖人者道之極也佛之説其有以易此乎求其有以易此者故其所以為失也夫得於內者未有不可行於外也有不可行於外者斯不得於內矣易曰知周乎萬物而道濟乎天下故不過此聖人所以兩得之也知足以知一偏而不足以盡萬事之理道足以為一方而不足以適天下之用此百家所以兩失之也佛之失其不以此乎則佛之徒自以謂得諸內者亦可謂妄矣夫學史者將以明一代之得失也臣等故因梁之事而為著聖人之所以得及佛之所以失以傳學者使知君子之所以距佛者非外而有志於內者庶不以此而易彼也古文集成卷四
