body:
  text: 古文集成巻二十六宋王霆震編前丁集五劄上殿論君道劄子程明道臣伏以君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先盡則多聴而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駮雜之政所牽制一作滯不為流俗因循之論所遷惑自知極於明信道極於篤一本此句在上句上任賢勿貳去邪勿疑必期致世如三代之隆而後已也然天下之事患常生於忽微而志亦戒乎漸習是故古之人君雖出入從容閒燕必有誦訓箴諫之臣左右前後無非正人所以成其徳業伏願陛下禮命老成賢儒不必勞以職事俾日親便座講論道義以輔養聖徳又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聴如是則聖智益明王猷允塞矣今四海靡靡日入偷薄末俗嘵嘵無復廉恥蓋亦朝廷尊徳樂道一作義之風未孚而篤誠忠厚之教尚鬱也惟陛下稽聖人之訓法先王之治一一作正心誠意體乾剛健而力行之則天下幸甚請修學校尊師儒取士劄子程明道臣伏謂治天下以正風俗得賢才為本宋興百餘年而教化未大醇人情未大美士人微謙退之節鄉閭無廉恥之行刑雖繁而姦不止官雖冗而材不足者此蓋學校之不修師儒之不尊無以風勸養勵之使然耳切以去聖乆逺師道不立儒者之學幾於廢熄惟朝廷崇尚教育之則不日而復古者一道徳以同俗苟師學不正則道徳何從而一方今人執私見家為異說支離經訓無復統一道之不明不行乃在於此臣謂宜先禮命近侍賢儒各以類舉及百執事方岳州縣之吏悉心推訪凡有明先王之道徳業充備足為師表者其次有篤志好學材良行修者皆以名聞其髙道一作尚之士朝廷當厚禮延聘其餘命州縣敦遣萃於京師館之寛閑之宇豐其廩餼䘏其家之有無以大臣之賢典領其事俾羣儒朝夕相與講明正學其道必本於人倫明乎物理其教自小學洒掃應對以徃修其孝悌忠信周旋禮樂其所以誘掖激厲漸摩成就之道皆有節序其要在於擇善修身至於化成天下自鄉人而可至於聖人之道其學行皆中於是者為成徳又其次取材識明達可進於善者使日受其業稍久則舉其賢傑以備髙任擇其學業大明徳義可尊者為太學之師次以分教天下之學始自藩府至于列郡擇士之願學民之俊秀者入學皆優其廩給而蠲其身役凡其有父母骨肉之養者亦通其優游徃來以察其行其大不率教者斥之從役漸自太學及州郡之學擇其道業之成可為人師者使教于縣之學如州郡之制異日則干室之鄉達於黨遂皆當修其庠序之制為之立師學者以次而察焉縣令每嵗與學之師以鄉飲之禮會其鄉老學者衆推經明行修材能可任之士升於州之學以觀其實學荒行虧者罷歸而罪其吏與師其升於州而當者復其家之役郡守又嵗與學之師行鄉飲酒之禮大會羣士以經義性行材能三物賔興其士於太學太學又聚而教之其學不明行不修與材之下者罷歸以為郡守學師之罪升於太學者亦聴其以時還鄉里復來於學太學嵗論其賢者能者於朝謂之選士朝廷問之經以考其言試之職以觀其材然後辨論其等差而命之秩凡處鄉郡之學與太學者皆滿三嵗然後得充薦其自州郡升於太學者一嵗而後薦其有學行超卓衆所信服者雖不處於學或處學而未乆亦得備數論薦凡選士之法皆以性行端潔居家孝悌有廉恥禮遜通明學業曉達治道者在州縣之學則先使其鄉里長老次及學衆推之在太學者先使其同黨次及博士推之其學之師與州縣之長無或専其私苟不以實其懷姦罔上者師長皆除其仕籍終身不齒失者亦奪官二等勿以赦及去職論州縣之長莅事未滿半嵗者皆不薦士師皆取學者成否之分數為之賞罰凡公卿大夫之子弟皆入學在京師者入太學在外者各入其所在州之學謂之國子其有當補蔭者並如舊制惟不選於學者不授以職每嵗諸路别言一路國子之秀者升於太學其升而不當者罪其監司與州郡之師太學嵗論國子之有學行材能者於朝其在學賔興考試之法皆如選士國子自入學中外通及七年或太學五年年及三十以上所學不成者辨而為二等上者聴授以筦庫之任自非其後學業修進中於論選則不復使親民政其下者罷歸之雖嵗滿願留學者亦聴其在外學七嵗而不中升選者皆論致太學而考察之為二等之法國子之大不率教者亦斥罷之凡有職任之人其學業材行應薦者諸路及近侍以聞處之太學其論試亦如選士之法取其賢能而進用之凡國子之有官者中選則増其秩臣謂旣一以道徳仁義教養之又専以行實材學升進去其聲律小碎糊名謄錄一切無義理之弊不數年間學者靡然丕變矣豈惟得士寖廣天下風俗將日入醇正王化之本也臣謂帝王之道莫尚於此願陛下特留宸意為萬世行之論程氏道學劄子劉後溪道命錄云先是王丞相秉政日乆士多失職周益公旣相拱黙無所預姜體仁元善為太學博士率同志者請于益公反復極論責以變通之理因疏納知名之士廢不用者陳傳良君舉而下三十三人淳熙十四年也益公雖不能用然其後亦多所收擢明年五月王丞相罷十六年正月留丞相為次輔與益公不合擢何澹為諫長攻益公罷之益公之門多佳士相繼去國者衆太學博士沈有開應先為留丞相所厚力勸以拔用知名之士留丞相從之自是一時善類多聚于朝而不得志者始側目矣劉公在三館時與何諫議善又是還為軍器少監首以保全善士勸之何不納會何被命同知貢舉而劉公遂有副端之命元年二月十四日也後十餘日入對首上此疏天下聞而韙之三月四日劉公被命拆號南宫與何坐席甫迫何曰近日風采一新劉公曰光祖非立異也但平日與大諫言者今則自言之耳及退同院語劉公曰何自然見公疏為恍惚者數日至餌定志丸他可知也二十三日劉公入對復論前諫議大夫陳賈今右正言黄掄檢黠佞柔清議所非二十四日批出賈與祠掄補郡二人皆攻道學者也先是劉公以拆號差誤自劾四月一日既放罪矣會上之舊給使呉端者除帶御器械何諫議論之疏三上御筆令依已得指揮又有孫璫者自言壽皇潜邸舊人亦轉行觀察使給事中胡晉臣逺封還錄黄詔趣令書讀何胡既承命十八日劉公入札子併論之不報二十一日再言之二十一日上諭留丞相遣都司沈訦楊經至臺諭指劉公即日三上章論上不樂乃坐劉公拆號差誤徙太府少卿劉公求去即以為直秘閣潼川府轉運判官其年五月也十月何諫議除御史中丞議論自此分矣始劉公之入臺也識者望其擊何去之以絶禍本而劉公不忍但擊陳黄罷之後五年遂有道學之禁矣殿中侍御史劉光祖奏臣聞是非不明則邪正互攻公論不立則私情交起此固道之消長時之否泰而實為國家之禍福社稷之存亡甚可畏也不可忽也臣本踈庸蒙陛下過聴親擢孤逺使待罪言責凡賞刑僣濫號令乖違民病未瘳官箴不戒皆可因人而舉劾隨事以奏陳既顯然而易知曽未足以深慮若是非方殽而邪得以害正清議方晦而私得以勝公則徃鑒昭然危機所伏方今之事孰急於此臣觀本朝士大夫學術最為近古足以愧漢唐追三代其端本也以居仁由義為道以正心誠意為學其交際也以共學為朋而實非朋以同道為黨而實非黨窮達知其有命進退知其有義是以進之不見其泰退之不見其戚窮而在下則以窮性命之奥為勲名樂正道之味為鍾鼎達而在上則以責難為尊主忠諫爲愛君本朝盛時初非有强國之術而國勢尊安根本深厚蓋其學術議論率由於此故也咸平景徳之間渾然不見其際當此時也道臻皇極而治保太和至於慶厯嘉祐兹謂盛矣不幸而壞於熙豐之邪說疎棄正士招來小人幸而元祐君子起而救之而末流太分事故反覆紹聖元符之際羣凶得志絶滅綱常其論旣勝其勢旣成嗟夫崇觀而下尚復言乎臣所謂道之消長時之否泰而實為國家之禍福社稷之存亡非虚語也臣從逺方誤玷班列去來之間今已一紀見聞所慮悉可指陳臣始至時雖間亦有譏貶道學之說而實未覩朋黨之分中更外艱去國六載已憂兩議之各甚每恐一旦之交攻逮臣復來其事果見因惡道學乃生朋黨乃罪忠諫嗟乎至於忠諫為罪則其去紹聖幾何日臣竊謂人言豈可因疾其人而併攻其黨因攻其黨而併棄其言得毋甚也陛下至聖至明初無彼此而衆議旣已交興賢愚豈得無惑臣本蜀人為學自有原本介在朝序與人亦無親疎但以終嵗之私憂首為明主而别白方今道學伊洛為宗然非程氏之私言出於大學之記載大學之教民明徳為先其間舉詩人之言於是有道學之目曰如切如磋者道學也然則臣所謂以居仁由義為道以正心誠意為學者又在於切磋之琢磨之今之道學其得之有淺深其行之有誠偽得之深者固已合大學之明徳矣得之淺者又可不切磋而琢磨之使之益深而遽自矜以召禍則無乃亦非歟行之誠者足以為君子矣行之偽者人將見其肺肝然是固其師友之所不予也而又何為乎臣每因論學之間必有至平之說徃徃偽者色愧淺者心服未敢一槩輕譏而痛疾之也何況其率多善士善人所至人必喜稱又以為黨若俱擯斥安得更有好人必取凡材充塞朝路陛下復位之初端拱而治凡所進退率用人言初無好惡之私豈以黨偏為主而一嵗之内斥逐紛紛中間好人固亦不少反以人臣之私意微累天日之清明方是時大臣無所異同給舍無所封駮侍從無所論救竊嘆而已委寄謂何所以斯闕今之君子不明大道自是太髙而責人太苛自是太髙則實將不副責人太苛則衆忿且怨雖然以此窮居議道猶云可也朝廷之上賢才並用名利之途智愚競馳古今然也而或者乃倡為薦士之舉若區别而封域之夫薦士非不善也然而凡有所取豈無所遺凡有所揚豈無所抑品題旣衆則疑怨叢興心雖主於至公迹已渉於朋黨謗訕先喧於羣口進退豈必於一言是以一時之虚名而賈今日之實禍彼旣得志决不我容我於窮達進退之間亦未有充實涵養之素彼如譏誚以修徃怨必至過甚而快私情徃徃忠諫之言指謂沽名之舉至於潔身以退亦曰怨懟而然欲激怒於至尊必加之以訐訕事勢至此循嘿成風國家安賴臣欲熄將來之禍故不憚反覆以陳伏幾聖心廓然永為皇極之主使是非由此而定邪正由此而别公論由此而明私情由此而熄道學之譏由此而消朋黨之迹由此而冺和平之福由此而集國事由此而理生靈之幸社稷之福也如其不然使相激相勝展轉報復為禍無窮臣實未知稅駕之所臣蒙恩擢任請對之初首以是非公論為言以免異時無所税駕之禍伏乞聖慈留神采覽必能上當於天心然後下臣此章風曉在位一洗徃陋共趨至公臣言或非甘受誅責取進止二月二十七日奉聖旨依古文集成巻二十六
