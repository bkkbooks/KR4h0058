body:
  text: 古文集成巻六十六宋王霆震編前壬集五辯桐葉封弟辯栁子厚説苑君道篇成王與唐叔虞燕居剪梧桐葉以為珪而授唐叔虞曰余以此封汝唐叔虞喜以告周公周公以請曰天子封虞耶成王曰余與虞一戲耳周公對曰天子無戲言言則史書之工誦之士稱之於是遂封唐叔虞於晉周公旦可謂善説矣東萊批此一篇文字一段好如一段大抵做文字須留好意思在後令人讀一段好一段全篇東萊批注古之傳者有言成王以桐葉與小弱弟戯曰以封汝周公入賀王曰戯也周公曰天子不可戯乃封小弱弟於唐此一段只是叙事吾意不然難王之弟當封邪開二段説周公宜以時言於王不待其戯而賀以成之也不當封耶周公乃成其不中之戯以地以人與小弱者為之主其得為聖乎且周公以王之言不可苟焉而已又難必從而成之也設有不幸王以桐葉戯婦寺亦將舉而從之乎凡王者之德在行之何若自設有不幸止何若難得倒處大抵難文字須難得倒譬如争訟須争得倒設未得其當雖十易之不為病前既難倒須説正理此㡬句却是正理要於其當不可使易也而况以其戯乎若戯而必行之是周公教王遂過也破得好吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而為之辭又不當束縛之馳驟之意思好使若牛馬然急則敗矣警䇿且家人父子尚不能以此自克况號為君臣者耶是直小丈夫缺缺者之事非周公所宜用故不可信或曰封唐叔史佚成之結束委蛇曲折有不盡意不指定史佚又設一難在此史晉世家成王與叔虞戯削桐葉為珪以與叔虞曰以此封君史佚因請擇日立叔虞成王曰吾與之戯耳史佚曰天子無戯言言則史書之禮書之樂歌之於是封叔虞於唐諱辨韓昌黎東萊注洪曰李賀父晉肅邊上從事賀年七嵗以長短之製名動京華時愈與皇甫湜覧賀所業竒之㑹有以晉肅行上言者二公因連騎造門請見其子既而總角荷衣而出面試一篇承命欣然旁若無人仍目曰髙軒過二公大驚命係鑣而還所居親為束髮年未弱冠丁内難他日舉進士或謗賀不避家諱文公特著諱辯一篇又幽閑鼓吹云賀以歌詩謁愈愈送客出歸極困解帶旋讀之首篇鴈門太守行云黒雲壓城城欲摧甲光向日金鱗開却挿帶急命邀之又云張昭論舊君諱云周穆王諱滿至定王時有王孫滿者厲王諱胡至莊王之子名胡其比衆多退之諱辯取此意全篇東萊批註愈與進士李賀書勸賀舉進士賀舉進士有名與賀争名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聴者不察和而唱之同然一辭皇甫湜曰一有若不明白字子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲音丘烏蓲草名詩音義江東呼為烏蓲之類是也記曲禮禮不諱嫌名二名不偏諱註為其難辟也嫌名謂音聲相近若禹與雨丘與蓲也偏謂二名不一一諱也孔子云母名徴在言在不言徴言徴不言在今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉一有肅字子不得舉進士若父名仁子不得為人乎議論夫諱始於何時作法制以教天下者非周公孔子歟引古人證一篇之意周公作詩不諱謂文王名昌武王名發若曰克昌厥後又曰駿發爾私則不諱也孔子不偏諱二名若曰宋不足徴又曰某在斯春秋不譏不諱嫌名者若衛桓公名完康王釗音昭康王名書用敬保元子釗之孫實為昭王曽參之父名晳曽子不諱昔若曰昔者吾友又曰裼裘而弔周之時有騏期漢之時有杜度杜操字伯度曹魏時人以其名同武帝故因以其字呼之又去其伯字呼為杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱呂后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也此引事一段盡是不諱嫌名説滸近太祖廟諱勢近太宗廟諱秉近代宗廟諱機近𤣥宗廟諱惟宦官宫妾乃不敢言諭機以為觸犯以諭為近代宗廟諱以機為近𤣥宗廟諱士君子立言行事宜何所法守也承上段有力抑彼揚此以將要收歸周孔曽參事且問起何所法守句已含周孔曽參意今考之於經質之於律稽之以國家之典賀舉進士為可耶為不可耶凡事父母得如曽參可以無譏矣作人得如周公孔子亦可以止矣收意不露今世之士不務行曽参周公孔子之行而諱親之名則務勝於曽參周公孔子亦見其惑也亦以人情反説夫周公孔子曽參卒不可勝勝周公孔子曽參乃比於宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曽參者耶警䇿有力辯姦老泉東都事畧云嘉祐初王安石名始盛歐陽脩勸洵與之游而安石亦願交於洵洵曰吾知其人矣是不近人情者鮮不為天下患乃作辯姦云云後十年安石用事其言乃信事有必至理有固然惟天下之静者為能見微而知著月暈而風礎潤而雨人人知之人事之推移理勢之相因其疎闊而難知變化而不可測者孰與天地隂陽之事而賢者有不知其故何哉好惡亂其中而利害奪其外也昔者山巨源見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今而言之其理固有可見者以吾觀之王衍之為人也容貌語言固有以欺世而盜名者然不忮不求與物浮沈使晉無惠帝僅得中主雖衍千百何從而亂天下乎盧杞之姦固足以敗國然不學無文容貌不足以動人言語不足以眩世非德宗之鄙暗亦何從而用之由此言之二公之料二子亦容有未必然也今有人暗説安石口誦孔老之書身履夷齊之行收召好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而隂賊險很與人異趣是王衍盧杞合而為一人也其禍豈可勝言哉夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣巨盧之衣食犬彘之食囚首喪面而談詩書安石嗜讀書多不及梳褁盥潄故云然此豈人之情也哉凡事之不近人情者鮮不為大姦慝竪刁易牙開方是也史齊世家威公問誰可相者管仲曰易牙殺子以適君非人情不可開方倍親以適君非人情難近竪刁自宫以適君非人情難親威公用三子三子專權以盖世之名而濟其非常之惡雖有願治之主好賢之相猶將舉而用之其為天下之患必然無疑者非三子之比也孫子曰善用兵者無赫赫之功使斯人而不用也則吾言為過而斯人有不遇之歎孰知其禍之至於此哉不然天下被其禍而吾獲知言之名悲夫辯謗徂徠余讀青州劉㮣韓吏部傳論曰憲宗迎佛骨羣臣無敢言者獨吏部論之走南荒八干里此豈利於身利於道也介於此知吏部之功也潮陽之湫鱷魚為害潮人患之吏部至投文以逐之一夕盡去鱷魚厥性暴戾無識猶感其化而去焉使吏部立巖廊輔元首施其道而化天下之暴戾無識復有如鱷魚者乎必無也鱷魚可化况於人乎介於此知吏部之道也曰使史臣謂排釋老於道未大不知大其道者復何也介於此知吏部之尊也曰諱辯其㫖不獨為賀也有激於時爾凡人怠於敦孝而亟於避諱甚無取也介於此知吏部之孝也曰鯀無徳於民猶有靈於晉國宗元有徳於民豈無靈於羅池者乎吏部碑之何所不可介於此知吏部之是也曰平蔡碑非不善也信一婦人而磨之焉知實録不類蔡碑介於此知吏部之受誣也則是吏部之誣由㮣而後釋吏部之道由㮣而後明㮣亦可稱為端直士矣天聖四年秋詔郡國舉進士時故諫議大夫滕公涉守青州謂㮣能明吏部之道特為首送㮣少則為古文專意聖人之道性僻野以介特自守常居深山中或逾年一下山未嘗一造權豪門先兩為青州舉送以是名字不得髙至是首送青人皆大怒滕之所為以滕不知人或謂㮣有化丹砂為黄金術滕意得之特為首送或以為㮣恃當塗力故得首送滕於是被此謗噫八九年矣介昨自整亂書得㮣韓吏部傳論讀之知吏部之大道知㮣之名不虚得知滕之被謗噫吏部之道二三百年得劉㮣伸之劉㮣之名二三十年得滕公發之滕公之謗八九年得石介明之故作辯謗云忠辯澹庵小大之獄雖不能察必以情曹劌曰忠之屬也古之言忠者多矣未有以情為忠者余嘗事斯語矣曽子曰自吾母而不用吾情則何所用其情哉語曰上好信則民莫敢不用情大哉情乎君臣父子兄弟朋友無所不用其情情苟至焉不欺於君不欺於親不欺於兄弟不欺於朋友一有不情而欺罔無所不至矣遂至欺其君親欺其兄弟朋友夫欺為不忠則不欺者為忠矣非必如龍逢比干殺身然後為忠非必如扣閽排闥伏蒲折檻血湔御衣血汙車輪血流殿階然後為忠使必如是而後為忠其間容有不情而為之如隠刺之亂數進忠䇿者非至誠愛君憂國者也古之君子在廟堂之上則憂其民出一言而澤被天下情乎愛民者也處江海之逺而憂其君出一言而中時病情乎愛君者也杜子美﨑嶇江湖其身不能一日巖廊之上拾遺補闕未之聞也徒以片言半辭有閔時憂國之心史臣正色稱之曰情不忘君世推其忠余然後廢巻而歎知發乎情者之為忠而不情者之非忠也石鼓辯歐公韓退之石鼔歌云周綱陵遲四海沸宣王憤起揮天戈大開明堂受朝賀諸侯劒佩鳴相磨蒐于岐陽騁雄俊萬里禽獸皆遮羅䥴功勒成告萬世鑿石作鼓墮嵯峨云云石鼓文在岐陽初不見稱於前世至唐人始盛稱之而韋應物以為文王之鼓至宣王刻詩爾韓退之直以為宣王之鼓在今鳳翔孔子廟中鼓有十先時散棄于野鄭餘慶置于廟而亡其一皇祐四年向傳師求於民間得之十鼓迺足其文可見者四百六十五磨滅不可識者過半余所集録文之古者莫先於此然其可疑者三四今世所有漢桓靈時碑往往尚見在其距今未及千嵗大書深刻而磨滅者十猶八九此鼓按太史公年表自宣王共和元年至今嘉祐八年實千有九百一十四年鼓文細而刻淺理豈得存此其可疑者一也其字古而有法其言與雅頌同文而詩書所傳之外三代文章真蹟在者惟此而已然自漢以來博古好竒之士皆畧而不道此其可疑者二也隋氏藏書最多其志所録秦始皇刻石婆羅門外國書皆有而獨無石鼓文遺近録逺不宜如此此其可疑者三也前世傳記所載古逺竒怪之事類多虚誕而難信况傳記不載不知韋韓二君何據而知為文宣之鼓也隋唐古今書籍粗備豈當時猶有所見而今不見之邪然退之好古不妄者余姑取以為信爾至於字畫亦非史籕不能作也怪竹辯歐公謂竹為有知乎不宜生於廡下謂為無知乎乃能避檻而曲全其生其果有知乎則有知莫如人人者萬物之最靈也其不知於物者多矣至有不自知其一身者如駢拇枝指懸疣附贅皆莫知其所以然也以人之靈而不自知其一身使竹雖有知必不能自知其曲直之所以然也竹果無知乎則無知莫如枯草死骨所謂蓍龜者是也自古以來大聖大智之人有所不知者必問於蓍龜而取決是則枯草死骨之有知反過於聖智之人所知逺矣以枯草死骨之如此則安知竹之不有知也遂以蓍龜之神智而謂百物皆有知則其他草木瓦石叩之乂頑然皆無所知然則竹未必不無知也由是言之謂竹為有知不可謂為無知亦不可謂其有知無知皆不可知然後可萬物生於天地之間其理不可以一㮣謂有心然後有知乎則蚓無心謂凡動物皆有知乎則水亦動物也人獸生而有知死則無知矣蓍龜生而無知死然後有知也是皆不可窮詰故聖人治其可知者置其不可知者是之謂大中之道古文集成巻六十六
