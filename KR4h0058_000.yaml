body:
  text: 古文集成總集類提要臣等謹案古文集成七十八卷舊本題廬陵王霆震亨福編不著時代觀其標識名字魏徵猶作魏證而宋人奏議於朝廷國家諸字皆空一格蓋南宋書肆本也卷端題新刊諸儒評㸃字原本於吕祖謙之古文關鍵真德秀之文章正宗樓昉之迂齊古文標注一圈一㸃無不具載其殆理宗時所刊乎集以十干為紀而自甲至癸皆稱曰前某集則有後集而佚之矣凡甲集六卷乙集八卷丙集七卷丁集九卷戊集八卷已集八卷庚集八卷辛集七卷壬集八卷癸集九卷所録自春秋以逮南宋計文五百二十二首而宋文居十之八雖多習見之作而當日名流其集不傳於今者如馬存曽丰程大昌陳謙方恬鄭景望諸人亦頗賴以存所引諸評如槐城松齊斆齊郎學士戴溪筆議東孰燕談之類今亦罕見其書且有未知其名者宋人選本傳世者稀録而存之亦足以資循覽也乾隆四十四年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0a223c58a2687ff91a8db04c0159d17c9c777d7758fc561c0ac6bc6b9891d574
