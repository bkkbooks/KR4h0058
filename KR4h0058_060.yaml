body:
  text: 古文集成卷六十宋王霆震編前辛集六疏請立梁王疏賈誼迂齋批深識事勢議論剴切筆力老健至吳楚之反而説始驗至主父偃之出而䇿始行信乎其通達國體也陛下即不定制如今之勢不過一傳再傳諸侯猶且人恣而不制豪植而大強漢法不得行矣陛下所以為藩扞及皇太子之所持者唯淮陽代二國耳代北邉胸奴與強敵為鄰能自完則足矣而淮陽之比大諸侯厪如墨子之著面適足以餌大國耳不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉好人主之行異布衣議論布衣者飾小行競小廉以自託於鄉黨人主唯天下安社稷固否耳高皇帝瓜分天下以王功臣反者如蝟毛而起以為不可故蔪去不義諸侯而虛其國擇良日立諸子雒陽上東門之外畢以為王而天下安故大人者不牽小行以成大功應異布衣一句今淮南地逺者或數千里越兩諸侯梁淮陽而縣屬於漢其吏民繇役往來長安者自悉而補中道衣敝中道衣敝則自悉其家財以補之錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其勢不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽二三列城與東郡以益梁不可者可徙代王而都淮陽又一䇿梁起於新郪以北著之河淮陽包陳以南揵之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下高枕終無山東之憂矣此二世之利也謂之二世利非誼本意當今恬然適遇諸侯之皆少數嵗之後陛下且見之矣夫秦日夜苦心勞力一節進一節以除六國之禍今陛下力制天下頤指如意高拱以成六國之禍難以言智苟身亡事畜亂宿禍熟視而不定萬年之後傳之老母弱子語好將使不寧不可謂仁臣聞聖主言問其臣而不自造事故人臣得畢其愚忠唯陛下財幸十漸疏魏徵本傳唐貞觀十三年阿史那結社率作亂雲陽石然史曰古燃字雲陽之石然妖異也自冬至五月不雨徵上疏極言曰云云疏奏帝曰朕今聞過矣願改之以終善道有違此言當何施顔面與公相見哉方以所上疏列為屛障庶朝夕見之兼録付史官使萬世知君臣之義臣奉侍帷幄十餘年陛下許臣以仁義之道守而不失儉約朴素終始弗渝德音在耳不敢忘也頃年以來寖不克終謹用條陳禆萬分一陛下在貞觀初清靜寡欲化被荒外今萬里遣使市索駿馬并訪怪珍昔漢文帝却千里馬晉武帝焚雉頭裘陛下居常議論逺輩堯舜今所為更欲處漢文晉武下乎此不克終一漸也子貢問治人孔子曰懍乎若朽索之馭六馬子貢曰何畏哉對曰不以道導之則吾讎也若何不畏陛下在貞觀初護民之勞喣光羽切之如子不輕營為頃既奢肆思用人力乃曰百姓無事則易驕勞役則易使自古未有百姓逸樂而致傾敗者何有逆畏其驕而為勞役哉此不克終二漸也陛下在貞觀初役已以利物比來縱欲以勞人雖憂人之言不絶於口而樂身之事實切諸心無慮營構輒曰弗為此不便我身推之人情誰敢復爭此不克終三漸也在貞觀初親君子斥小人比來輕褻小人禮重君子重君子也恭而逺于萬反之輕小人也狎而近之近之莫見其非逺之莫見其是莫見其是則不待間而踈莫見其非則有時而昵昵小人踈君子而欲致治非所聞也此不克終四漸也在貞觀初不貴異物不作無益而今難得之貨雜然並進玩好之作無時而息上奢靡而望下朴素力役廣而冀農業興不可得已此不克終五漸也在貞觀初求士如渴賢者所舉即信而任之取其所長常恐不及比來由心好惡以衆賢舉而用以一人毁而棄雖積年任而信或一朝疑而斥夫行有素履事有成迹一人之毁未必可信積年之行不應頓虧陛下不察其言以為臧否使讒佞得行守道疏間此不克終六漸也在貞觀初高居深拱無田獵畢弋之好數年之後志不克固鷹犬之貢逺及四夷晨出夕返馳騁為樂變起不測其及救乎此不克終七漸也在貞觀初遇下有禮羣情上達今外官奏事顔色不接間因所短詰其細過雖有忠欵而不得申此不克終八漸也在貞觀初孜孜治道常若不足比恃功業之大負聖智之明長辰兩反傲縱欲無事興兵問罪逺裔親狎者阿旨不肯諫踈逺者畏威不敢言積而不已所損非細此不克終九漸也貞觀初頻年霜旱畿內戶口並就關外攜老扶幼來往數年卒無一戶亡去此由陛下矜育撫寧故死不携二也比者疲於徭役關中之人勞弊尤甚雜匠當下顧而不遣正兵畨上復别驅任市物鏹屬於㕓遞子背望於道脫有一穀不收百姓之心恐不能如前日之帖泰此不克終十漸也夫禍福無門惟人所召人無釁焉妖不妄作今旱熯呼旱切之災逺被郡國凶醜之孽起於轂下謂阿史那結社率作亂此上天示戒乃陛下恐懼憂勤之日也千載休期時難再得明主可為而不為臣所以鬱結長嘆者也議楊綰條奏貢舉疏賈至東萊注唐書賈至字幼鄰擢明經第寶應初遷尚書左丞楊綰建請依古制縣令舉孝廉於刺史升天子禮部詔有司參議多是綰言至議以為自晉後衣冠遷徙人多僑處因緣官族所在占籍今鄉舉取人未盡請廣學校增國子博士員十道大州得置大學館詔博士領之召至生徒使保桑梓者鄉里舉焉在流寓者庠序推焉議者更附至議謹按夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也且夫述行美極人文人文興則忠敬存焉是故前代以文取士本文行也由辭以觀行則及辭也宣父稱顔子不遷怒不二過謂之好學至乎修春秋則遊夏之徒不能措一辭不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下關睢之義曰先王以是經夫婦成孝敬厚人倫美教化移風俗蓋王政之所由廢興也故延陵聽樂知諸侯之存亡左襄二十九年今試學者以帖字為精通而不窮旨義豈能知遷怒二過之道乎考文者以聲病為是非而務擇浮艷豈能知移風易俗化天下之事乎選舉志李栖筠議進士科是以上失其源而下襲其流乘流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子由是生焉臣弒其君子弒其父非一朝一夕之故其所由來者漸矣漸者何謂忠信之陵頺耻尚之失所末學之馳騁儒道之不舉四者皆由取士之失也夫一國之事繫一人之本謂之風贊揚其風繫卿大夫也卿大夫何嘗不出於士乎今取士試之小道而不以逺者大者使干祿之徒趨馳末術是誘導之差也夫以蝸蚓之餌雜垂滄海而望吞舟之魚至不亦難乎所以食垂餌者皆小魚就科目者皆小藝四人之業士最關於風化近代趨士靡然向風致使祿山一呼而四海震蕩思明再亂而十年不復逆臣傳向使禮讓之道𢎞仁義之道著則忠臣孝子比屋可封逆節不得而萌也人心不得而搖也且夏有天下四百載禹之道喪而殷始興焉周有天下八百年文武之政廢而秦始并焉觀三代之選士任賢皆考實行故能風俗淳一運祚長逺秦坑儒士二代而亡漢興雜三代之政𢎞四科之舉西京始振經術之學東都終持名節之行至有近戚竊位強臣擅權弱主孤立母后專政而社稷不隕終彼四百豈非學行扇化於鄉里哉厥後文章道弊尚於浮奢取士術異苟濟一時自魏至隋僅四百載三光分景九州阻域竊號僭位德義不修是以子孫連顛享國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆幬亭育合德天地安有捨皇王舉士之道蹤亂代取人之術此公卿大夫之辱楊綰所奏實為正論然自典午覆敗中原板蕩夷狄亂華衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因緣官族所在耕築地望繫之數百年之外而身皆東西南北之人焉今欲依古制鄉舉里選猶恐取士之未盡也請兼廣學校以𢎞訓誘今兩京有大學州縣有小學兵革一動生徒流離儒臣師氏廩祿無向貢士不稱行實胄子何嘗講習獨禮部每嵗權甲乙之第謂𢎞奬擢不其謬哉秪足長浮薄之風啓僥幸之路矣其國子博士等望加員數厚其祿秩選通儒碩士間居其職十道大郡量置大學館令博士出外兼領郡官召置生徒人循故事保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其利如此則青青不復興刺詩子襟擾擾由其歸本矣人倫之始王化之先不是過也古文集成卷六十
