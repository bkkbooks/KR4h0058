body:
  text: 古文集成巻六宋王霆震編前甲集六序易學啓䝉序晦庵聖人觀象以畫卦揲蓍以命爻使天下後世之人皆有以决嫌疑定猶豫而不迷於吉凶悔吝之塗其功可謂盛矣然其為卦也自本而幹自幹而支其勢若有所迫而自不能已其為蓍也分合進退縱横順逆亦無往而不相值焉是豈聖人心思智慮之所得為也哉特氣數之自然形於法象見於圖書者有以啓於其心而假手焉耳近世學者類喜談易而不察乎此其專於文義者既支離散漫而無所根著其渉於象數者又皆牽合傅㑹而或以為出於聖人心思智慮之所為也若是者予竊病焉因與同志頗輯舊聞為書四篇以示初學使毋疑於其說云讀論語序謝上蔡東萊云論論語雖淡然無味而辭近㫖逺天下同知尊孔氏同知賢於堯舜同知論語書弟子記當年言行不誣也然自秦漢以来開門授徒者不過分章析句耳晉魏而降談者益希既不知讀其書謂足以識聖人心萬無是理既不足以知聖人心謂言能中倫行能中慮亦萬無是理言行不類謂為天下國家有道亦萬無是理君子於此盍闕乎盖溺心於淺近無用之地聰明日就彫喪雖欲讀之故不得其門而入也陽春白雪之曲且猶三和而况此書不如是不足為聖言盖其辭近其指逺辭有盡指無窮有盡者可索之於訓詁無窮者要當㑹之以神譬諸觀人昔日識其面今日識其心在我則改容更貌矣人則猶故也坐是故難讀予鄙人也知識未離乎聞見之間曾何足以知夫子而師承之然不敢謂無其意也今日妄以讀此書之法語諸君又為知我者謂我心憂不知我者謂我何求勿以為淺近而忽勿以為髙大而驚勿以為間我而忿且怒勿以為妄誕而直不信聖人言不可以訓詁形容其㣲意今不復撰次成文直以意之所到辭達而已盖此書存於世論其切於用而取近效則無有也與道家使人精神専一之學西方見性之說並駕争衡孰全孰駁未易以口舌争也談天語命偉辭雄辯讀之使人可駭可慕曾不如莊周禦冦曼衍之言籠絡萬象葩華百出讀之使人亹亹不厭曾不如司馬子長宗元栁雄深雅健之文正名百物記祭法黄帝正名百物分辨六氣區味别性可以愈疾引年曾不如黄帝岐伯之對問神農之藥書可以資聽折獄可以識簿書㑹計曾不如申韓之刑名陶冶塵思摹冩物態曾不如顔謝徐庾流連光景之詩以至神恠卜相之書書數愽奕之技其皆可玩獲售於人而此書乃一無有也邈乎希聲一唱而三嘆誰其聽之淡乎無味酒元而俎腥誰其嗜之雖家藏人有不委塵埃者㡬希矣賴野人稚子擎誦得與鳥獸蟲魚之書俱傳而不泯乃欲使敏秀豪傑之士留精神於其間幾何其不笑且受侮邪與世不偶倀倀然若喪家狗豈特當年之形容為然今其書亦然嗚呼何其衰也臨川王丞相近世大儒其設心不役於勢利是類知尊此書先皇帝信之而不疑列於學官俾為士者誦說焉某於此時妄意干祿知讀此書其志不過餔啜而已未知好也晚得供洒掃於河南夫子之門加日月之久僅得毫釐於句讀文義之間而益信此書之難讀也盖不學操縵不能安弦不學愽依不能安詩不學雜服不能安禮記學記惟近似者易入也彼其道髙深愽厚不可涯涘也如此儻以童心淺智窺之豈不大有逕庭乎方其物我太深胷中矛㦸者讀之謂終身可行之恕誠何味方其脅肩謟笑以言餂人者讀之謂巧言令色寜病仁未能素貧賤而恥惡衣惡食者讀之豈知飯蔬食飲水曲肱而枕之未妨吾樂注心於利末得己不已而有顛㝠之患者讀之孰信不義之富貴真如浮雲誨爾諄諄聽我藐藐者讀之孰謂囘不惰師書紳為至誠服膺過此而往益髙益深可勝數哉是皆越人視秦人之肥瘠也惟同聲然後相應同氣然後相求是心與是書聲氣同乎不同乎宜其卒無見也是書逺於人乎人逺於書乎盖亦勿思耳能反是心者可以讀是書矣孰能脫去凡近以逰髙明莫為嬰兒之態而有大人之器莫為一身之謀而有天下之志莫為終身之計而有後世之慮不求人知而求天知不求同俗而求同理者乎是人也雖不必中道然其心當廣矣明矣不雜矣其於讀是書也能無得乎當不惟念之於心必能體之於身矣油然内得難以語人謂聖人之言真不我欺者其亦自知而已豈慮思之效力行之功至此盖書與人互相發也及其久也習益繁行益著知視聽言動盖皆至理聲氣容色無非妙用父子君臣豈人能秩叙仁義禮樂豈人能强名心與天地同流體與神明為一若動若植何物非我有形無形誰其間之至此盖人與書相忘也則向所謂辭近而指逺可不信乎宜其賢者識其大不賢者識其小好惡取捨之相遼也學者儻以此書為可信則亦何逺之有以謂無隠乎爾則天何言哉夫子之言性與天道不可得而聞也以謂有隠乎爾則四時行焉百物生焉夫子之文章可得而聞也是豈真不可得而聞哉詩云鳶飛戾天魚躍于淵此天下之至顯聖人惡得而隠哉所謂吾無行而不與二三子者也上天之載無聲無臭此天下之至賾聖人亦惡得而顯哉宜其二三子以為有隠乎我者也知有隠無隠之不二者捨此書其何以見之哉知有隠無隠之不二者豈非閎愽明允君子哉諸君可無意於斯乎若齊王好竽有客求仕攜瑟而往立於其門三年不得入叱曰吾瑟鼔之能使鬼神上下吾瑟合軒轅之律吕客罵之曰王好竽而子鼓瑟瑟雖工其如王之不好何如諸君之不信也則今日之語不無類是乎抑又聞昔人憂天下之不治至於涕泣而不可禁者子思曰然子之意善也以一人之身憂天下之不治而涕泣不禁是何異憂河之濁而泣之清也其為無益莫甚焉此亦天下之至愚也如諸君之不信也而我終以强聒為事者得無類是乎盖有所不暇姑自治而已論語解序南軒學者學乎孔子者也論語之書孔子之言行莫詳焉所當終身盡心者宜莫先乎此也聖人之道至矣而其所以教人者大略則亦可睹焉盖自始學則教之以為弟為子之職其品章條貫不過於聲氣容色之間洒掃應對進退之事此雖為人事之始然所謂天道之至賾者初亦不外乎是聖人無隠乎爾也故自始學則有致知力行之地而極其終則有非思勉之所能及者亦貴於行著習察盡其道而已矣孔子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也秦漢以来學者失其傳其行雖或有志於力行而其知不明擿埴索塗莫適所依以卒背於中庸本朝河南君子始以窮理居敬之方開示學者使之有所循求以入堯舜之道於是學道之傳復明於千載之下然近嵗以来學者又失其㫖曰吾惟求所謂知而已而於躬行則忽焉故其所知特出於臆度之見而無以有諸其躬識者盖憂之此特未知致知力行互相發之敬也孔子曰學而不思則罔思而不學則殆厯攷聖賢之意盖欲使學者於此二端兼致其力始則據其所知而行之行之力則知愈進知之深則行愈逹是知常在先而行未嘗不隨之也知有精粗必由粗以及精行有終始必自始以及終内外交正本末不遺條理如此而後可以言無弊然則聲氣容色之間洒掃應對進退之事乃致知力行之原也其可舍是而他求乎顧某何足以與明斯道輒因河南餘論推以己見輯論語說為同志者切磋之資而又以此序冠于篇首焉孟子講義序南軒學者潜心孔孟必求其門而入愚以為莫先於明義利之辨盖聖賢無所為而然也無所為而然者命之所以不已性之所以不偏而教之所以無窮也凡有所為而然者皆人欲之私而非天理之所存此義利之分也自未知省察者言之終日之間鮮不為利矣非特名位貨殖而後為利也意之所向一渉於有所為雖有淺深之不同而其為徇己自私則一而已矣如孟子所謂内交要譽惡其聲之類是也是心日滋則善端遏塞欲邇聖賢之門牆以求自得豈非却行而望及前人乎雖使譚髙說妙不過渺茫臆度譬諸無根之木無本之水其何益乎學者當立志以為先持敬以為本而精察於動静之間毫釐之差審其為霄壤之判則有以用吾力矣學然後知不足平時未覺吾利欲之多也灼然有見於義利之辨將日救過之不暇由是而不舍則趣益深理益明而不可以已也孔子曰古之學者為己今之學者為人為人者無適而非利為己者無適而非義曰利雖在己之事皆為人也曰義則施諸人者亦莫非為己也嗟乎義利之辨大矣豈特學者治已之所當先施之天下國家一也王者所以建立邦本垂裕無疆以義故也而霸者所以䧟溺人心貽毒後世以利故也孟子當戰國横流之時發揮天理遏止人欲深切著明撥亂反正之大綱也其㣲辭奥義備載七篇之書如栻者雖曰服膺而學力未充何足以窺萬一試以所見與諸君共講之無忽而深思焉春秋傳序伊川迂齋云自有春秋以米惟孟子說得最好後来太史公聞之董生數語好自伊川之學行而後春秋之用顯天之生民必有出類之才起而君長之治之而争奪息導之而生養遂教之而倫理明兼此三者方可以當長君之位然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以治人各因時而立政暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣聖王既不復作有天下者雖欲倣古之跡亦私意妄為而已事之謬秦至以建亥為正道之悖漢專以智力持世豈復知先王之道也夫子當周之末以聖人不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也先儒之傳曰游夏不能賛一辭辭不待賛也言不能與於斯耳斯道也惟顔子嘗聞之矣行夏之時乗殷之輅服周之冕樂則韶舞此其準的也後世以史視春秋謂褒善貶惡而已至於經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其㣲辭隠義時措從宜者為難知也或抑或縱或予或奪或進或退或㣲或顯而得乎義理之安文質之中寛猛之宜是非之公乃制事之權衡揆道之模範也夫觀萬物而後識化工之神聚衆材而後知作室之用於一事一義而欲窺聖人之用非上智不能也故學春秋者必優㳺涵泳黙識心通然後能造其㣲也後王知春秋之義則雖徳非禹湯尚可以法三代之治自秦而下其學不傳予悼夫聖人之志不明於後世也故作傳以明之俾後人通其文而求其義得其意而法其用則三代可復也是傳也雖未能極聖人藴奥庶㡬學者得其門而入矣五經論序東萊槐城云一序包五篇大意詞簡意盡說聖人因民所自有之理而作五經見趣尤髙五經之作非聖人自為之也亦因民之所自有者為之也見得破方敢如此說夫人之生不能無喜怒哀樂之情喜怒哀樂之情好惡美刺之所從生也節節有此方見五經之理果是民所自有是以有詩盖詩者民之情也夫民之情雖易以放而其辭遜之心則固有也逐節綰入議論因其固有之心而為之節文則於是乎有禮禮者敬而已矣民一於敬則待上也過髙而自居也過卑髙卑之相形而上下之情睽於是因其自卑之勢也而有書書者上之所以通乎其下也上下之情通而聖人之應之也亦已勞而民之求乎上者者亦浸凟此是自取决一句張本於是因民之有吉凶悔吝也而使之自取决於一筮好夫是以有易易者聖人洗心退藏之書也嗟乎至於易聖人亦可以無事矣轉換雍容而所以未免焉者猶有春秋也意好盖春秋之作闗鎻上四經意轉入春秋有手段情已離敬已衰上下已乖而吉凶已貿於是乎春秋終焉合下此一字是知春秋者亦因民之相是相非而無斷焉者也好吾病夫人以五經之作為聖人私意為之也又收起句意五經論序止齋槐城云合五經貫穿議論此序總題其綱引事運意過脈不露有手段有法度易因乾坤以定君臣之分者也故易作而文字始生大傳曰有天地然後有萬物有萬物然後有男女有男女然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所措有此事骨便貫得禮米故禮次之古有禮不下庶人而太史氏觀民風以詩貫事引意有脈盖禮施於君臣而詩作於民有剖判故詩又次也易也禮也詩也治乎下之道也而君之所以自通乎下者猶未也此句引入書於是乎有書書者上所以通乎下之言也故書又次之嗚呼春秋作君臣之道衰矣一句結春秋有力聖人所以維君臣之道者亦至是焉始窮意好故春秋終焉吾病學者不知六經之作相次以立君臣之道照君臣字而曰徒文而已程子雅言後序五峯風氣有淳漓故真元不常㑹則聖人不世出道時有不明賢智過乎大中之表愚與不肖䧟乎卑汙之陋統紀紛錯而天下始病矣自堯舜之盛暨乎孔子風氣浸漓上無明王天下皆病至道泯然其將滅苟非載以文而指示焉則後世雖有間氣英明之士亦且惑於異端天下㡬何其不流而入於禽獸也聖人有憂之為之作六經六經指道之大路而語孟又指入六經之闗要也自舟楫之作雖十步之川人人咸知得舟而後濟夫六經濟天下之舟楫也治身而不循六經者喪身治家而不循六經者亡家天下陵蕩紀綱摧圮未有不由弃六經之言者或謂孔子没而朱翟肆孟氏死而黄老盛六經安在其有益易曰神而明之存乎其人昔王莽誦六藝以滅身霍光聞一言而建殊績以孔子之言可因是思而知矣自秦焚書坑儒之後章句紊亂六經之義浸㣲浸昏重以本朝丞相王安石專用已意訓釋經典倚威為化以利為羅化以革天下之英才羅以收天下之中流故五十年間經術頽靡日入於暗昧支離而六經置於空虚無用之處方其時也西洛有程伯淳正叔二先生者出當五百餘嵗之數禀真元之㑹紹孔孟之教振六經之統然風氣仍衰而未盛也故明道先生早世先進髙弟相繼以亡伊川先生於六經之文猶有未賛者而先生已没然大綱張理者亦多矣十餘年間後進髙弟亦從而逝故先生之文散脫不類流落四方者率皆訛舛天下所傳無完本予小子既深知天下於六經如無舟楫之不可濟儻不為之類集則罪人也用是汲汲以成之然其言質素而不華理平淡而無竒無文之言猶璞玉也雕琢者在玉工吾能存之而已無欲之理天理也非存純粹精一之心操𢎞大毅然之志未易得也我則行之試言讀此書之法為同志起予之益乎反覆乎句讀神明乎心體知六經為啓我之要與其滯泥訓詁傳注之末不知六經之志漫然放誕不切於身者猶王莽霍光之有間其初一間而已可不謹哉又况不為霍光而希孔孟者乎必潜心於此書妙如伯樂之相馬然後足振以歴古之衰弊破王安石之姦說嗣先聖之志守先王之道以待後之學者緜緜不絶尚足以助風氣之盛而興太古之淳也胡子知言序南軒知言五峯胡先生之所著也先生諱宏字仁仲文定公之季子也自幼志於大道嘗見楊中立先生于京師又從侯師聖先生於荆門而卒傳文定公之學優㳺南山之下餘二十年玩心神明不舍晝夜力行所知親切至到析太極精㣲之藴窮皇王制作之端綜事物於一源貫古今於一息指人欲之偏以見天理之全即形而下者而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極體用該備可舉而行晚嵗嘗被召㫖不幸寢疾不克造朝而卒是書乃其平日之所自著其言約其義精誠道學之樞要制治之蓍龜也然先生之意每自以為未足逮其疾革猶時有所更定盖未及脫藁而已啓手足矣或問於某曰論語一書未嘗明言性而子思中庸獨於首章一言之至於孟子始道性善然其為說則已簡矣今先生是書於論性特詳焉無乃與聖賢之意異乎某應之曰無以異也夫子雖未嘗恒言性而子貢盖嘗識之曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也是豈真不可得而聞哉盖夫子之文章無非性與天道之流行也至孟子之時如楊朱墨翟告子之徒異說並興孟子懼學者之惑而莫知所止也於是指示大本而極言之盖有不得已焉耳矣又况今之異端直自以為識心見性其說譸張雄誕又非當時之比故髙明之士往往樂聞而喜趨之一溺其間則喪其本心萬事隳弛毫釐之差霄壤之謬其禍盖有不可勝言者先生於此又烏得而忘言哉故其言有曰誠成天下之性性立天下之有情効天下之動而必繼之曰心妙性情之徳又曰誠者人之道乎中者性之道乎仁者心之道乎而必繼之曰惟仁者為能盡性至命學者誠能因其言而精察於視聴言動之間卓然知夫心之所以為妙則性命之理盖可黙識而先生之意所以不異於古人者亦可得而言矣若乃不得其意而徒誦其言不知求仁而坐談性命則㡬何其不流於異端之歸乎某頃獲登門道義之誨浹洽於中自惟不敏有負夙知輒序遺書貽于同志不韙之罪所不得辭焉古文集成巻六
