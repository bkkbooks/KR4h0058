body:
  text: 古文集成巻二宋王霆震編前甲集二序送徐無黨南歸序六一歐公東萊批此篇文字象一个階級自下說上一級進一級草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸於腐壊澌盡泯滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽愈逺而彌存也過得佳有幹旋其所以為聖賢者修之於身施之於事見之於言自下說上是三者所以能不朽而存也脩於身者無所不獲施於事者有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也此一段歸在顔子上孔子弟子有能政事者矣有能言語者矣若顔回者在陋巷曲肱饑卧而已其羣居則黙然終日如愚人先抑然自當時羣弟子皆推尊之後揚以為不敢望而及而後世更百千嵗亦未有能及之者其不朽而存者固不待施於事况於言乎先抑後揚予讀班固藝文志自上說下唐四庫書目見其所列自三代秦漢以来著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉予切悲其人文章麗矣言語工矣造語工無異草木榮華之飄風鳥獸好音之過耳也句佳警䇿方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃者盖如此繳佳今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字間者皆可悲也下得好東陽徐生少從予學為文章稍稍見稱於人既去而與羣士試於禮部得髙第由是知名其文辭日進如水湧而山出句佳予欲摧其盛氣而勉其思也故於其歸告以是言然予固亦喜為文辭者亦因以自警焉歸自已送秦少章序宛丘迂齋批此皆老於世故之後方有此等議論凡學者當知此理深味然後有益詩不云乎蒹葭蒼蒼白露為霜起得新夫物不受變則才不成人不涉難則智不明季秋之月天地始肅寒氣欲至方是時天地之間凡植物出於春夏雨露之餘華澤充溢支節美茂及繁霜夜零旦起而視之如戰敗之軍學他譬喻巻旗棄鼓褁瘡而馳吏士無人色豈特如是而已於是天地閉塞而成冬則摧敗拉毁之者過半其為變亦酷矣然自是弱者堅虚者實津者燥皆歛其英華於腹心而各效其成深山之木上撓青雲下庇千人者莫不病焉况所謂蒹葭者乎然匠石操斧以㳺山林一舉而盡之以充棟梁桷輪輹輻巨細强弱無不勝其任者此之謂損之而益敗之而成虐之而樂者是也吾黨有秦少章者自余為太學官時以其文章示余愀然告我曰惟家貧奉命大人而勉為科舉之文也異時率其意為詩章古文往往清麗竒偉工於舉業百倍元祐六年及第調臨安主簿舉子中第可少樂矣而秦子每見余輒不樂余問其故秦子曰余世之介士也性所不樂不能為言所不合不能交飲食起居動静百為不能勉以隨人今一為吏皆失已而惟物之應少自偃蹇悔禍響至異時一身資養於父母今則婦子仰食於我欲不為吏亦不可得自今以往如沐漆而求解矣余解之曰子之前日春夏之草木也今日之病子者蒹葭之霜也凡人性惟安之求夫安者天下之大患也能遷之為貴重耳不十九年於外則歸不能覇子胥不奔則不能入郢二子者方其羇窮憂患之時隂益其所短而進其所不能者非如學於口耳者之淺淺也自今吾子思前之所為其可悔者衆矣其所知益加多矣反身而安之則行於天下無可憚者矣能推食與人者常饑者也賜之車馬而辭者不畏徒步者也苟畏饑而惡步則將有苟得之心焉為害不既多乎故隕霜不殺者物之災也逸樂終身者非人之福也送祖擇之序石介擇之罷濟南將歸闕自厯山南走三百里别明復先生孫暨于泰山徂徕相與講道徳究經術耽雲霞玩水石舉觴賦詩五日而後去以所坐乗重為明復之夀為予書先生之銘于石以為勒擇之以文章登甲科天下之望甚盛不十年當輔相天子為宋大臣為人資材已髙又自能知堯舜周孔之道顧明復與予饑寒山谷中何有毫髪利于擇之而冒苦辛傾肝膽予二人豈有求耶明復謂無以謝擇之發聖人之藴明王道之極擇之拜而受之嗚呼春秋賞罰二百四十二年至矣仲尼之心獨撥衰周一世之亂反諸於正十二經掲如日月昭昭于天後之聖人得之多者帝得之少者王不得者覇明復之報為不輕矣予經學淺不能希風明復然義不可嘿夫趨時物之情也徇道人之難也噫諸侯交迎傾國封之枉尺直尋吾死不為見之孟軻尋邑三公舜歆髙爵不作符命甘投于閣見之子雲潮州八千㡬死瘴煙歸来京兆不肯嬋娟見之吏部嗟嗟李勣徇主從昬咄咄宗元附權邀官觀而始節豈為不完弗能有終至今痕瘢擇之與予說藴深矣此去近天子得與我相磨切天下是非亦得時見上講道君政得失天子宰相曰是擇之曰是天子宰相曰非擇之曰非擇之官日進而寵日深矣天子宰相是擇之曰非天子宰相曰非擇之曰是擇之前有鼎鑊而後有鈇鉞矣古之君子辭官職而違寵祿趨鼎鑊而就鈇鉞非以官職寵祿為辱而鼎鑊鈇鉞為樂也道適當然也擇之於道安之者非利而行行之者非畏罪而强之者也予所以云姑而報之資爾送楊寘序歐公予嘗有幽憂之疾退而閒居不能治也既而學琴於友人孫道滋受宫聲數引久而樂之不知疾之在其體也夫疾生乎憂者也樂之毒者能攻其疾之聚不若聲之至者能和其心之所不平心而平不和者和則疾之忘也宜哉夫琴之為技小矣及其至也大者為宫細者為羽操絃驟作忽然變之急者悽然以促緩者舒然以和如崩崖裂石髙山出泉而風雨夜至也如怨夫寡婦之歎息雌雄雍雍之相鳴也其憂深思逺則舜與文王孔子之遺音也悲愁感憤則伯竒孤子屈原忠臣之所歎也喜怒哀樂動人之深而純古淡泊與夫堯舜三代之言語孔子之文章易之憂患詩之怨刺無以異其能聽之以耳應之以手取其和者道其堙鬰冩其憂思則感人之際亦有至者焉是不可以不學也予友楊君好學有文累以進士舉不得志反從廕調為尉於劍浦區區在東南數千里外是其心固有不平者且少又多疾而南方少醫藥風俗飲食異宜以多疾之體有不平之心居異宜之俗其能鬰鬰以久乎然欲平其心以養其疾於琴亦將有得焉故予作琴說以贈其行且邀道滋酌酒進琴以為别送孫正之序王安石時然而然衆人也已然而然君子也已然而然非私已也聖人之道在焉爾大君子有窮苦顛跌不肯一失詘已以從時者不以時勝道也故若得志於君則變時而之道若反手然彼其術素脩而志素定也時乎楊墨已不然者孟軻氏而已時乎釋老已不然者韓愈氏而已如孟韓者可謂術素脩而志素定也不以時勝道也惜也不得志於君使真儒之效不白於當世然其於衆人也卓矣嗚呼予觀今之世圎冠峨如大裙襜如坐而堯言起而舜趨不以孟韓之心為心者果異衆人乎予官於揚得友曰孫正之正之行古之道又善為古文予知其能以孟韓之心為心而不已者也夫越人之望燕為絶域也北轅而首之苟不已無不至孟韓之道去吾黨豈若越人之望燕哉以正之之不已而不至焉予未信之也正之之兄官於温奉其親以行將從之先為言以處予予欲黙安得而黙也子長逰贈盖邦式馬子才予友盖邦式嘗為予言司馬子長之文章有竒偉氣竊有志於斯文也子其為說以贈我予謂子長之文章不在書學者每以書求之則終身不知其竒予有史記一部在天下名山大川壯麗竒怪之處將與子周逰而歴覽之庻㡬乎可以知此文矣子長平生喜逰方少年自負之時足跡不肯一日休非真為景物役也將以盡天下之大觀以助吾氣然後吐而為書今於其書觀之則其平生所嘗逰者皆在焉南浮長淮泝大江見狂瀾驚波隂風怒號逆走而横擊故其文奔放而浩漫望雲夢洞庭之陂彭蠡之瀦涵混太虚呼吸萬壑而不見介量故其文停滀而淵深見九疑之絶緜巫山之嵯峨陽臺朝雲選宋玉髙唐賦蒼梧暮煙檀弓舜葬於蒼梧之野態度無定靡曼綽約春粧如濃秋飾如薄故其文妍媚而蔚紆泛沅渡湘弔大夫之魂悼妃子之恨竹上猶有斑斑而不知魚腹之骨尚無恙者乎故其文感憤而傷激北過大梁之墟觀楚漢之戰場想見項羽之喑嗚髙帝之慢罵龍跳虎躍千兵萬馬大弓長㦸俱逰而齊呼故其文雄勇猛健使人心悸而膽栗世家龍門念神禹之鬼功西使巴蜀跨劍閣之鳥道上有摩雲之崖不見斧鑿之痕故其文斬絶峻㧞而不可攀躋講業齊魯之都覩夫子之遺風郷射鄒嶧彷徨乎汶陽洙泗之上故其文典重温雅有似乎正人君子之容貌凡天地之間萬物之變可驚可愕可以娱心使人憂使人悲者子長盡取而為文章是以變化出没如萬象供四時而無窮今於其書而觀之豈不信矣予謂欲學子長之為文先學其逰可也不知學逰以采竒而欲操觚㺯墨組綴腐熟者乃其常常耳昔公孫氏善舞劍而學書者得之乃入於神張顛自言始見公主擔夫争道又聞鼔吹而得筆法意觀倡公孫舞劍器得其神庖丁善操刀而養生者得之乃極其妙莊養生篇庖丁為文恵君解牛曰臣以神遇不以目視今臣之刀十九年所解千牛矣而刀刄若新發於硎事固有殊類而相感者其意同故也今天下之絶蹤詭觀何以異於昔子果能為我逰者乎吾欲觀子矣醉把盃酒可以呑江南吴越之清風拂劍長嘯可以吸燕趙秦隴之勁氣然後歸而治文著書子畏子長乎子長畏子乎不然斷編敗冊朝吟而暮誦之吾不知所得矣俞彦明字序馬存日月星斗之明非不暐也天下不以為驚水涵太虚燈破幽室非不瑩徹也天下不以為驚物之抱負靈耀而埋藏於荒磎塵壤之中寂寞之境抑遏拂蔚終不可没而時吐光怪衝射天地天下之人始驚以為神竒吾友乃江南豫章人也請以豐城古獄之事為君道牛斗之間河漢之表昔時有異氣紅光紫氲盤礴衝激夾衡璣杓揺而奪之色此龍泉太阿之精也龍泉太阿者天下神劍也固當抉浮雲截流波刺虎南山膾蛟長橋邉城飛塵河角有彗掃戎王之庭斬佞臣之首提攜四顧間天下事誰有不平者乎此劍之得志而遇英雄之人壯烈之士取决於一時也今沈屈而在敗牢重鑰之下是其氣不得不暴露而憤發非以耀世也乃其不可遏者固如此耳嗚呼士君子得志而在廊廟之上事業昭著天下之人以為當然不以為驚至於懐負利器鬱鬱而不得於時因感慨㣲見芒刃故其可喜可愕者多發於窮時吾友自未弱冠之初已能飛步上庠取聲名於埸屋中今已及壯矣其間坎壈臲􅑶前䟦後疐其躍也如有蹶之其哆也如有鯁之豈非天欲大感怒君而使之發精煒也予雖愚弱不靈前日君自執手相許以友又謂曰子其字我而併序其意敢取寳劍鄊閭之舊事聊以相感君其自磨無刑于衆予將見張雷博識之士有為君鑒拔者矣又將見西山北巖之膏華隂之英有以拂拭君者矣煌煌燁燁奪人精爽其見有日矣晉曰君子以自昭明徳惟自昭而進者終不可揜屈故字彦明以晉叔侯孟字序馬存侯孟名夫求予為字之說予不得其意而謂之曰君以夫自名者豈慕灌將軍仲孺之為人邪君以夫字孟者豈慕洛陽劇逰俠之為人邪二子非全人儒生法士之所諱道也予以謂人各有所長甚非一介淺淺之所知摧鋒䧟堅决死讎敵名聞三軍勇冠天下不喜謟䛕而重然諾此灌將軍之所長也剛横不遜果於犯上使氣盃酒之間乃其短耳吴楚舉大事而向京師大將軍得之則知諸侯之無能為使諸侯得之則大將軍必以為憂一人之身為兩軍之輕重此劇逰侠之所長也起匹夫之私不顧國家之公議乃所短耳吾欲剔去二子之所短而収其所長持以贈君幸君無辭而受之可乎予與孟同居相悉也知孟之為人氣直而貌質行方而言謹與人要約勇於必信故喜取天下之偉士為孟激揚而稱道之雖然吾因孟竊有所感矣今孟乃趙人也古稱燕趙多慷慨謀略之士吾嘗欲登大行之巔逰邯鄲之道觀井陘常霍之險放聲而悲歌大醉以起舞劍鳴腰間精爽傍射庻㡬乎意氣必有感者恨以羇留未能也孟君還故鄊千萬為我道此言囊中之錐穎脫而立見者其誰乎賣漿之家屠牛之肆尚有昔時傲逰之叟者乎㢘藺奢牧亦有遺種可以將兵者乎如其舊態尚在幸為我望燕山之故雲梯易水之悲風扼腕乎沙漠之北可以動心否送陳自然西上序馬存東萊註朔風驚沙枯梢號寒子行亦良苦聞之京師曰米如買珠薪如束桂膏肉如玊酒樓如登天驟雨至矣黒潦滿道則馬如逰龍清霜激風客衣無𥜗抱膝而苦調則火如紅金子之逰京師所以恃此具者其挾㡬何豈子之家位髙金多父母兄弟渠渠欵欵厚撫以遺子乎曰無有也豈子之隣里郷黨相恱以義出門辭東家而西家已待贐矣寜有是乎曰無有也豈子之昵親狎友入室握手說無說有把酒相别飲酣氣張有解劍而指廪者乎見三國魯肅傳曰無有也豈子之於京師公侯富貴之家舊與欵厚有哀王孫而進食者乎曰無有也然則子之逰挟何術以往曰吾視囊中不見乎有物視吾胷中耿耿者尚在也以吾之耿耿者逰天地庻㡬必有合乎予聞其言而壯之曰今人適百里必宿舂而淅乃敢出門户莊逍遥適百里者宿舂粮今子有數千里之役徒手以往浩然無憂予因驚怪子矣果如子言予来春於江南林石之下聞北方有焰焰者必子也矣答任子厚秀才序撙齋淳祐十年秋部使者以天子詔檄官六試隆興士余其一也每一題出與五人商略若為處則以科舉律戒焉一黍絫不合輒黜士試訖余閱數百巻其為文不詭譎則腐不曠蕩則拘不峭崛則弛求其純與律合蔑如也肆余所見與其腐也拘也弛也者之終必不進寜若詭譎者曠蕩者峭崛者之容可収也雖然終必不進者與律僅合容可収者往往相違矣凡有司從事以律不以見故余所取五巻類非所喜者發而視之皆豐城人文既思豐城至寳之氣所在鍾而為人盎而為文不應若是而已明年春復以檄留府有豐城士以謁入其題為任賔坐少選出鏡古錄前有識其字為子厚余覽之大抵議論戰國君臣居多蘇秦張儀術至髙也子厚竊卑之更求出其上其為文猶其為術也余追省向所閱數百巻其中類是間有之比之腐者拘者弛者信愈矣其如不與律合何哉雖然猶幸其可收也至寳之劍其氣粹可欲之謂善也其質厚有諸已之信也其鋒藏充實之謂美也其焰屬天充實而有輝光之謂大也其躍入延平津大而化之之謂聖也其幻為龍而莫窮所歸聖而不可知之謂神也子厚收至寳之精融之文章其焰屬天矣而斷續之狀時見焉意其初非自氣粹質厚而發之歟相過從累日熟知其為人猶其為文也故余欲子厚以論語之郷黨養其氣使粹以禮記之中庸大學培其質使厚以易之坤頥大畜収其鋒使藏俟其久且滿也而自然發焉小則韓子文中子揚子荀子中則孟子曾子大則五經大而化化而神則易矣子厚識機明嘗試權之與其求吾術之出儀秦上孰若求吾道之出荀揚上耶子厚學力强嘗試踐之其持久也以堅其持滿也以虚更十年後天下不特慕子厚為文而已又將慕其為人也若夫晚年之業顧又於光輝之上加功否余未敢前言之古文集成巻二
