body:
  text: 古文集成卷十二宋王霆震編前乙集六記吉州州學記歐公慶厯三年天子開天章閣召政事之臣八人賜之坐問治天下其要有幾施於今者宜何先使書于紙以對八人者皆震恐失措俯伏頓首言此事非愚臣所能及惟陛下幸詔臣等於是退而具述為條列明年正月始詔州郡吏以賞罰勸農桑三月又詔天下皆立學惟三代仁政之本始於井田而成於學校記曰國有學遂有序黨有庠家有孰其極盛之時大備之制也凡學本於人性磨揉遷革使趨於善至於風俗成而頌聲興蓋其功法施之各有次第其教於人者勤而入於人者漸勤則不倦漸則遲久而深夫以不倦之意待遲久而成功者三王之用心也故其為法必久而後至太平而為國皆至六七百年而未已此其效也三代學制甚詳而後世罕克以舉或不知而本末不備又求於速不待其成而怠故學之道常廢而僅存惟天子明聖深原三代致治之本要在冨而教之故先之農桑而繼以學校將以衣食飢寒之民而皆知孝慈禮讓是以詔書再下吏民感悅奔走執事者以後為羞其年十月吉州之學成州即先夫子廟為學舍於城西而未備今知州事殿中丞李侯寬之至也謀與州人遷而大之事方上請而詔下學遂以成李侯治吉敏而有方其作學也吉之士率以私錢一百五十萬以助用人之力積二萬一千工而人不以為勞其良材堅甓之用凡二十二萬三千五百而人不以為多學有堂筵齋講有藏書之閣有賔客之位有遊息之亭嚴嚴翼翼壯偉閎耀而人不以為侈既成而來學者常三百有餘豫世家於吉濫官于朝廷進不能贊明天子之盛美退不能與諸生揖讓乎其中惟幸吉之學教者知學本於勤漸遲久而不倦以治母廢慢天子之詔使豫他日因得歸榮故鄉而謁於學門將見吉之士皆道德明秀可為公卿過其市而賈者不鬻竒淫適其野而耕者不爭壠畝入其里閭而長幼相孝慈於其家行其道塗而少者扶羸老壯者代其負荷於路然後樂學之道成而得從鄉先生席於衆賔之後聽鄉樂之歌飲射壺之酒以詩頌天子太平之功而周覽學舍思詠李侯之遺愛不亦美哉故於其始成也刻辭于石以立諸其廡桂陽軍學記南軒桂與郴地相接近嵗洞氓紛擾之後甫及安定郡各建學以館士亦可謂知務矣郴學之成某嘗為之記而桂之士復以請於是告之曰嗟夫學之不可不講也久矣今去聖雖逺而微言著於簡編理義存乎人心者不可泯也善學者求諸此而已雖然聖賢之書未易讀也蓋自異端之説行而士迷其本真文采之習勝而士趨於蹇淺又况平日羣居之所從事不過為覔舉謀計利耳如是而讀聖賢之書不亦難乎故學者當以立志為先不為異端惑不為文采眩不為利祿汨而後庶幾可以言讀書矣聖賢之書大要教人使不迷失其本心者也一人之心天地之心也其周流而該遍者本體也在乾坤曰元而在人所以為仁也故易曰元者善之長也而孟子曰仁者人也合而言之道也禮曰人者天地之心也而人之所以私偽萬端不勝其過失者梏於氣動於欲亂於意而其本體以陷溺也雖曰陷溺然非可遂殄滅也譬諸牛山之木日夕之間豈無萌蘖之生乎患在人不能識之耳聖賢教人以求仁使之致其格物之功親切於動靜語默之中而有發乎此也有發乎此則進德有地矣故其於是心也治其亂收其放明其蔽安其危而其廣大無疆之體可得而存矣此學之大端也然則其可一日而不講乎願與諸君共勉焉吉州州學藏書閣記楊東山吉有學學有閣閣有書自本朝慶歷三年知州事殿中丞李侯寬始也學之成歐陽文忠公為之記極盛大備壯偉閎耀棟宇凡七而閣與居一焉于今二百餘年黌舍後一再徙所謂壯偉閎耀者固非其舊閣不復存幸書存焉爾有書而無閣書將焉儲儲之直舍直舍豈書庋哉書弗庋是輕其書輕其書有書猶無書也然則書之輕重閣之有無繫不繫邪寶慶二年會稽劉君漢弼為郡文學椽偕諸生請于郡曰學之舊書有如九經則後唐長興後周廣順所刻印之帙也諸經諸史則本朝京師國子監之中本也大江之西郡有十一書亦悉萃則今兵部侍郎胡公摫之始也不既冨矣哉而弗閣焉非闕歟學無所以資舍州疇資郡可之於是前史君趙侯希刊與之粟斛五百今史君趙侯汝愚與劵緡五百永新張大夫給亦俾工師致大木焉營度斯決財用斯發直舍斯撤新閣斯傑扁榜斯揭華堂斯設燕處斯列復舊觀之列經始于丙戌之冬落成於丁亥之夏裝舊書悉叢于閣貯以四庋第以甲乙丙丁藏焉闔郡咸喜視寶慶猶慶歷然視二趙候猶李侯然漢弼以書諗某曰子為我記之某不敢以末學固陋辭財為之言曰閣之未復書之未藏君子固有憂也閣之既復書之既藏君子猶有憂也君子何憂也蓋閣易爾書為難書易爾讀為難書藏焉閣奠焉顧不美歟雖然為書謀不若為人謀繼自今後學者居是學登是閣啓是庋讀是書朝於斯夕於斯讀經則探聖賢之本原讀史則知厯代之治忽讀諸子百家則擷文章之英華繇書而心繇心而身繇身而國而天下致君澤民盛德大業皆書之用也至此則閣焉可也弗閣焉亦可也書焉可也弗書焉亦可也何則書即人人即書大哉書乎是嵗七月朔具位楊某記吉州吉水縣魁星樓記楊東山三山林侯半千為吉水宰之期年縣學成未幾樓成侯之志士之力也昔陋而今於壯故無而新於有宏謨雋功為江西諸邑甲侯謂余曰學之成毅齋先生曽公煥為之記矣樓之成子盍為吾記之匪吾之是為抑多士實為余曰余邑人也邑之故余知之邑與廬陵人物天産山川之勝實絪緼焉東山崇崇士之頴也文江沄沄士之泓也有是頴故邑之士髙以秀有是泓故士之文清以醇髙以秀則其節不屈清以醇則其學有源士不負邑也第邑負士耳何謂邑負士毋乃作成興起之未至歟邑見其所欲士將自雕琢邑見其指意士將自表異顧為之宰者作成何如耳作成施焉興起隨焉士之興起夫豈其難今學成而樓新樓新而名偉侯之所以望於士者何如哉士曰魁壘漢也人曰傑魁唐也曰魁者何冠冕之謂也月書季考第其髙下三歲大比興其賢能冠一經一賦一論一䇿者皆曰魁冠一郡一邑之多士者則曰魁賓于太常旅于集英中于科目為天下第一者則曰魁魁云魁云在天成象星以魁名斯玉衡杓建之綱也在人成名人應乎星斯麟鳯拔萃之神也綱揭而神運夫豈偶然哉然則學之有斯樓也樓之扁斯魁也侯之所以作成者於是乎始士之所以興起者於是乎生魁云魁云一樓云乎哉樓云樓云科目云乎哉聞之師曰科目有二有帝王之科目有素王之科目帝王之科目二素王之科目四曷謂二曰文曰武曷謂四曰德行曰言語曰政事曰文學冠文武之科者易冠德行言語政事文學之科者難冠其易者夫豈無人可稱者曰董仲舒冠其難曰僅僅一人焉曰顔淵冠其二而兼其四家淵而人舒柢其四而葩其二淵內而舒外此侯之所望於邑士也不于其四而于其二惟舒之是覬姑取其二而舍其四弗淵之是企豈侯之所望於邑士哉遂書以為記福州州學經史閣記朱文公福州之學在東南為最盛弟子貟常數百人比年以來教養無法師生相視漠然如路人以故風俗日衰士氣不作長老憂之而不能有以救也紹興四年今教授臨卭常君濬孫始生既日進諸生而告之以古昔聖賢後學之意又為之飭厨饌葺齋館以寧其居然後謹而出入之防嚴其課試之法朝夕其間訓誘不倦於是學者競勸始知常君之為吾師而常君之視諸生亦閔閔焉唯恐其不能自勉以進於學也故嘗慮其無書可讀而業將病於不廣則又為之益置書史合舊為若干卷度故御書閣之後更為重屋以藏之而以書來請記其事且致其諸生之意曰願有以教之也豫惟古之學者無它明德新民求各止於至善而已夫其所明之德所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理修身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數下而至於食貨之源流兵刑之法制是亦莫非吾之度內有不可得而精粗者若非考諸載籍之文沈潛參伍以求其故則亦無以明夫明德體用之全而止其至善精微之極也然自聖學不傳世之為士者不知學之有本而唯書之讀則其所以求於書不越乎記誦訓詁文詞之間以釣聲名干祿利而已是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞章愈麗論議愈髙而其德業事功之實愈無以逮乎古人然非書之罪也讀者不知學之有本而無以為之地也今觀常君之為教既開之以古人斆學之意而後為之儲書以博其問辨之趣建學以致其奉守之嚴則亦庶乎本末之有序矣豫雖有言又何以加於此哉然無已而有一焉則亦曰姑使二三子者知夫為學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清明純一真有以為讀書之地而後宏其規密其度循其先後本末之序以大玩乎閣中之藏則夫天下之理其必有以盡其纎悉而一以貫之異時所以措諸事業者亦將有本而無窮矣因序其事而并書以遺之二三子其勉之哉婺源縣學藏書閣記朱文公道之在天下其實原於天命之性而行於君臣父子兄弟夫婦朋友之間其文則出於聖人之手而存於易書詩禮樂春秋孔孟氏之籍本末相須人言相發皆不可以一日之廢焉者也蓋天理民彛自然之物則其大倫大法之所在固有不依文字而立者然古之聖人欲明是道於天下而垂之萬世則其精微曲折之際非托於文字亦不能以自傳也故自伏羲以降列聖繼作至於孔子然後所以垂世立教之具粲然大備天下後世之人自非生知之聖則必由是以窮其理然後知有所至而力行以終之固未有飽食安坐無所猷為而忽然知之兀然得之者也故傅説告髙宗曰學于古訓乃有獲而孔子之教人亦曰好古敏以求之是則君子所以為學致道之方其亦可知也已然自秦漢以來士之所求乎書者類以記誦剽掠為功而不及乎窮理修身之要其過之者則遂絶學捐書而相與馳騖乎荒虛浮誕之域蓋二者之蔽不同而於古人之意則胥失之矣嗚呼道之所以不明不行其不以此與鄂州州學稽古閣記朱文公人之有是身也則必有是心有是心也則必有是理若仁義禮智之為體惻隱羞惡恭敬是非之為用是則人皆有之而非由外鑠我也然聖人之所以教不使學者收視反聽一以反求諸心為事而必曰興於詩立於禮成於樂又曰博學審問謹思明辨而力行之何哉蓋理雖在我而或蔽於氣稟物欲之私則不能以自見學雖在外然皆所以講乎此理之實及其浹洽貫通而自得之則又初無內外精粗之間也世變俗衰士不知學挾册讀書者既不過於誇多鬪靡以為利祿之計其有意於已者又直以為可以取足於心而無事於外求也是以墮於佛老空虛之邪見而於理義之正法度之詳有不察焉其幸而或知理之在我與夫學之不可以不講者則又不知循序致詳虛心一意從容以會乎在我之本然是以急遽淺迫終已不能浹洽而貫通也嗚呼是豈學之果不可為書之果不可讀而古先聖賢所以垂世立教者果無益於後來哉道之不明其可歎已鄂州州學教授許君中應既新其學之大門而因建閣於其上櫝藏紹興石經兩朝宸翰以為寶鎮又取板本九經諸史百氏之書列置其旁不足則使人以幣請於京師之學官使其學者討論誦説得以饜飫而開發焉其役始於紹興辛亥之冬而訖於明年之夏其費亡慮三百萬而取諸廩士之贏者蓋三之一其餘則太守煥章閣待制陳公居仁轉運判官薛侯叔似實資之而總卿詹侯體仁戎帥張侯詔亦揮金以相焉既成因豫之友蔡君元定以來請曰願有記也豫雅聞許君之學蓋有志於為己而意其所以學者亦曰取足於心而已矣今以是舉觀之則見其所以誨人者甚平且實然後知其所以自為者不以泯心思滅聞見為極至之歸也因為之記其本末而并推近世所以為學讀書之病請具列焉以告登此閣而讀此書者使姑無溺於俗學之下流無迷於異端之捷徑則於理之在我者庶乎有以深求而自得之矣道之不明豈足患哉南安軍學記東坡古之為國者四井田也肉刑也封建也學校也今亡矣獨學校僅存耳古之為學者四其大者則取士論政而其小者則弦誦也今亡矣直誦而已舜之言曰庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之格之言改也論語曰有恥且格承之言薦也春秋傳曰奉承齊犧庶頑讒説不率是教者舜皆有以待之夫化惡莫若進善故擇可進者以射侯之禮舉之其不率教甚者則撻之小者則書其罪以記之非疾之也欲與之並生而同憂樂也此士之有罪而未可終棄者故使樂工採其謳謠諷議之言而揚之以安其心其改過者則薦之且用之其不悛者則威之屏之僰之寄之之類是也此舜之學政也射之中否何與於善惡而侯以明之何也曰射所以致衆而論士也衆一而後論定孔子射於矍相之圃蓋觀者如堵使弟子揚觶而序黜者三則僅有存者由此觀之以射致衆衆集而後論士蓋所從來逺矣詩曰在泮獻囚又曰在泮獻馘禮曰受成於學鄭人遊鄉校以議執政或謂子産毁鄉校何如子産曰不可善者吾行之不善者吾改之是吾師之孔子聞之謂子産仁人古之取士論政者必於學有學而不論政不取士猶無學也學莫盛於東漢士數萬人噓枯吹生自三公九卿皆折節下之三府辟召常出其口其取士論政可謂近古然卒為黨錮之禍何也曰此王政也王者不作而士以私意行之於下其禍敗固宜朝廷自慶歷熙寧紹聖以來三致意於學矣雖荒服郡縣必有學况南安江西之南境儒術之冨與閩蜀等而太守朝奉郎曹侯登以治郡顯聞所至必建學故南安之學甲於江西侯仁人也而勇於義其建是學也以身任其責不擇劇易期於必成士以此感奮不勸而力費於官者為錢凡萬三千而助者不資為屋百二十間禮殿講堂視大邦君之居凡學之用莫不嚴具增置廩給食數百人始於紹聖二年之冬而成於四年之春學成而侯去今為潮州軾自海南還過南安見聞其事為詳士既德侯不已乃具列本末嬴糧而從軾者三百餘里願紀其實夫學王者事也故首以舜之學政告之然舜逺矣不可以庶幾有賢太守猶可以為鄭子産也學者勉之無愧於古人而已建中靖國元年蘇軾書袁州學記李旴江覯迂齋批議論閧涉筆力老健皇帝二十有三年制詔州縣立學惟時守令有哲有愚有屈力單慮祗順德意有假宫僣師苟具文書或連數城亡誦弦聲倡而不和教化不行三十有二年范陽祖君無擇知袁州始至進諸生知學官闕狀大懼人材放失儒效闊踈無以稱上意旨通判頴州陳君侁聞而是之議以克合相舊夫子廟狹隘不足改為乃營治之東北隅厥土燥剛厥位靣陽厥材孔良瓦甓黝堊丹漆舉以法故殿堂室房廡門各得其度生徒有舍庖廩有次百爾器備並手偕作工善吏勤晨夜展力越明年成舍音釋菜且有日旴江李覯諗于衆曰惟四代之學考諸經可見已只一句説過便了秦以山西鏖六國欲帝萬世劉氏一呼語壯而關門不守武夫健將賣降恐後何邪詩書之道廢人唯見利而不聞義焉耳此學之廢孝武乘豐冨世祖出戎行皆孳孳學術俗化之厚延于靈獻草茅危言者折首而不悔功烈震主者聞命而釋兵羣雄相視不敢去臣位尚數十年教道之結人心如此此學之修今代遭聖神爾袁得賢君俾爾由庠序踐古人之迹天下治則談禮樂以陶吾民一有不幸猶當伏大節為臣死忠為子死孝學之設蓋為此使人有所賴且有所法是惟朝家教學之意若其弄筆以徼利達而已豈徒二三子之羞抑為國者之憂收拾得好通州重修州學記誠齋通州故有學今太守監丞周公碩來作藩既拜先聖周視厦屋雨風空穿杗桷蕞殘退而深念將欲作新亡所取資忽寤曰四鄰束修之問辭之則禮缺受之則義缺流貤之於橫舍其可乃斷乃度乃陶乃斫乃塈乃雘有殿有堂有齋有廊有門有墻有百其楹有剃其唐於是舍菜孔時齋宿孔修子佩林如誦弦鏘如有茁斯童有野斯孰旁招幽討靡不翔集邦之士民靡不闓懌公移書於余曰子盍記之余復之曰為我謝通州之士公之厚士亦劬矣士何以報公余聞學者內而不外古也外而不內古乎故自齊家而出至于平天下自修身而入至於格物出者止於三而入者極於五內外之詳略何如哉今有璞玉於此弗琢焉雕焉則大不作圭小不作珮故身不可以不修也琢且雕矣而脈理之不端瑕纇之不瑩則玉人者力倍而器無就故修身在正心理端矣纇瑩矣良工視之曰噫珉也則襮肖而裏不核故正心在誠意幸而玉也非珉也而主人慒焉莫之識則亦或毁于埴或捐諸溝而已故誠意在致知又幸而主人有寶而能識之矣問其所以寶或能言其粗莫能言其精則亦淺之為知矣故致知在格物君子之學蓋如此何謂物其綱有三其端有四其典有五是物也天生蒸民之則者非歟究而至之是之謂格物學者能用力乎此則自士而進於賢自賢而跂於聖潛乎身溥乎天下國家夫獨待於外乎哉士之報公不在此其將焉在瑞州髙安縣學記誠齊筠之負郭邑曰髙安故無學舍雖有附於州學之西廡一小齋房號焉而已矣令宰陳君公璟作而新之經始於昔歲七月八日落成於今年正月既望爰揭扁榜學子咸集且樂且詠有歎于列者曰塗巷尚陋或曰棟宇尚庳或曰廩給尚窶豫解之曰二三子學在居處乎果在是兹塗之陋不陋於顔之巷兹宇之庳不庳於憲之室兹廩之窶不窶於陳蔡之羮彼聖賢者居之何如哉不然闢以九軌廊以千區餫以萬鐘於二三子之學將益乎否也使二三子開一卷之書於竹牖之下舉目而見堯舜孔顔屬耳而聞金聲玉振潛心而得性與天道家焉而親其親官焉而民其民國焉而君其君塞則淑諸身亨則淑諸世於環堵乎取之不既充然矣乎雖微學舍可不可也學職某某謁豫記之為書其説古文集成卷十二
