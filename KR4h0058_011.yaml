body:
  text: 古文集成巻十一宋王霆震編前乙集五記南京宋城縣夫子廟記石介天地吾知其易毁一徳不脩則裂日月吾知其易䘮一政不行則缺山岳吾知其易壊一化不明則崩河洛吾知其易涸一令不善則竭大哉吾聖人之道彌亘億千萬世而不傾横維四方上下而不絶莫亂於戰國莫妖於楊墨莫毒於嬴秦莫逆於莽賊曹馬譎詐宋齊凶慝虐神猾夏曰聰曰勒唱誕放邪曰聃曰釋下至唐李接武踵迹昏君暴徳莫不㓕裂衣冠隳拆法則焚燒詩書芟刈禮易吁吾聖人之道受戕害受攻擊斯亦多矣而巍然中居竟不可毁息由根柢堅而枝榦茂也淵源濬而流𣲖逺也三才五常為根柢不亦堅乎堯舜禹湯為枝榦不亦茂乎六籍九疇為淵源不亦濬乎孟荀揚韓為流𣲖不亦逺乎故天地有裂焉日月有缺焉山岳有崩焉河洛有竭焉吾聖人之道無有窮也夫天地日月山岳河洛皆氣也氣浮且動所以有裂有缺有傾有竭吾聖人之道大中至正萬世流行不可易之道也故無有虧焉宋有天下純用文治制度禮樂一出儒術吾聖人之道盛行君君而臣臣父父而子子京師達於郡縣皆崇嚴廟貌而尊祀之宋城在南京為赤縣夫子祠宇尚闕春秋釋奠于令之㕔事噫其為䙝亦甚矣李大夫堯俞以儒學仕能知聖人為尊不敢黷慢於是拆佛宇滛祠十數區取其材作廟於縣署之右棟宇壯焉丹雘麗焉穹穹闢陽耽耽闔隂夫子被王衮冕執圭尺有二寸負斧依當宁而坐顔淵閔子騫十二人列侍翼如有嚴有威廟成俾予記之嗚呼異哉李大夫作是廟有三善焉撤佛宇弱夷法也毁滛祠革邪俗也尊聖師明大道也有三善不可不記兖州鄒縣孟子祠記孫復松齋評曰泰山孫先生學術之正足以嗣聖門之餘響故其深歎孟氏有距楊墨之功是記之作議論髙而筆力健又且鋪叙儘有條理孔子既没千古之下駕邪怪之說肆竒險之行善造語侵軼我聖人之道者衆矣而楊墨為之魁故其罪劇孔子既没千古之下攘邪怪之說夷苛險之行夾輔我聖人之道者多矣而孟子為之首故其功鉅双關論楊墨孟子好昔者二竪去孔子之世未百年也以無君無父之教行乎天下天下惑而歸之嗟乎君君臣臣父父子子邦國之大經也人倫之大本也不可斯須去矣而彼皆無之是敺天下之民而陷溺穽窖之也禍孰甚焉非孟子莫能救之故孟子慨然奮起大陳堯舜禹湯文武周公孔子之法驅除之以絶其後抜天下之民於陷溺之中而復置之中國發得孟子有功俾我聖人之道炳焉不墜故揚子雲有言曰古者楊墨塞路孟子辭而闢之廓如也韓退之有言曰孟子之功予以謂不在禹下然子雲述孟子之功不若退之之言深且至也何哉洚水横流大禹不作則天下之民魚鱉矣楊墨暴行孟子不作則天下之民禽獸矣謂諸此也景祐丁丑歳夕拜龍圖孔公為東魯之二年也公聖人之後以恢張大教興復斯文為己任嘗謂諸儒之有大功於聖人門者無先於孟子力平二堅之禍而不得血食於後兹其闕也甚矣祭法曰能禦大菑則祀之能捍大患則祀之孟子可謂能禦大菑能捍大患者也且鄒昔為孟子之里今為所治之屬邑吾當訪其墓而表之新其祠而祀之以旌其烈於是符下俾其官吏愽求之果於邑之東北三十里有山曰四基四基之陽得其基焉遂命去其榛莽肇其堂宇以公孫萬章之徒配越明年春廟成俾泰山孫復銘而志之復學孔而希孟者也世有蹈邪怪竒險之迹者常思嗣而攻之况承公命而志其廟又何敢讓嘻子雲能述孟子之功而不能盡之退之能盡之而不能祀之惟公既能盡之又能祀之不其美哉故直筆以書年月日記末結有力齊州閔子祠堂記蘇轍郎學士云此篇論夫子之力大故歴聘而求仕顔閔之力小故不敢仕迂齋批文字有關鎻首尾相綰發明理致歴城之東五里有丘焉曰閔子之墓墳而不廟秩祀不至邦人不寧守土之吏有將舉焉而不克者熈寧七年天章閣待制右諌議濮陽李公來守濟南越明年政修事治邦之耋老相與來告曰此邦之舊有如閔子而不廟食豈不大闕公唯不知苟知之其有不飭公曰噫信其不可以緩於是庀工為祠堂且使春秋修其常事堂成具三獻焉籩豆有列儐相有位百年之廢一日而舉學士大夫觀禮祠下咨嗟涕洟有言者曰惟夫子生於亂世周流齊魯宋衛之間無所不仕其弟子之髙弟亦咸仕於諸國宰我仕齊子貢冉有子游仕魯季路仕衛子夏仕魏弟子之仕者亦衆矣然其稱徳行者四人自逺及近一節進一節獨仲弓嘗為季氏宰其上三人皆未嘗仕季氏嘗欲以閔子騫為費宰閔子辭曰如有復我者則吾必在汶上矣且以夫子之賢猶不以仕為汚也而三子之不仕獨何歟言未卒有應者曰子獨不見夫適東海者乎以此譬周家之難望之茫洋不知其邊即之汗漫不測其深其舟如蔽天之山其帆如浮空之雲然後履風濤而不僨觸蛟龍而不讋若夫以江河之舟楫而誇東海之難則亦十里而返百里而溺不足以經萬里之害矣方周之衰禮樂崩弛天下大壊而有欲救之譬如涉海有甚焉者有此意方來得下文今夫夫子之不顧而仕則其舟楫之足恃也諸子之汲汲而忘返盖亦有陋舟而將試焉此江湖之舟則亦隨其力之所及而已矣若夫三子願為夫子而未能出脫得好下顧諸子而以為不足為也是以止而有待佳夫子嘗曰世之學柳下恵者未有若魯獨居之男子吾於三子亦云衆曰然退而書之遂刻於石嚴先生祠堂記范希文本傳陵本姓莊避明帝諱改姓嚴光武拜諌議不受耕釣於富春山今有釣臺祠堂在嚴州桐廬縣迂齋批字少詞嚴筆力老健先生光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆天下孰加焉惟先生以節髙之既而動星象歸江湖得聖人之清泥塗軒冕天下孰加焉惟光武以禮下之兩下並説並無抑揚便見嚴光不屈光武光武不臣嚴光之意在蠱之上九衆方有為而獨不事王侯髙尚其事先生以之在屯之初九陽徳方亨而能以貴下賤大得民也光武以之引兩卦天造地設蓋先生之心出乎日月之上光武之器包乎天地之外微先生不能成光武之大微光武豈能遂先生之髙哉結而使貪夫廉懦夫立是有大功於名教也幹歸立祠意仲淹來守是邦縁所以立祠始構堂而奠焉乃復為其後者四家以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山髙水長含無限意釣臺記東萊由東陽江而下逕新定郡五十里得嚴陵瀬蓋東漢嚴先生遯世不屈耕釣於冨春山後人因以名其瀬也孫吳析冨春為桐廬是瀬亦來屬焉顧野王輿地志曰桐廬縣南有嚴子陵漁釣處石上平可坐十人名為釣壇即今紀之釣臺也獨兩臺對峙野王所不紀葢亦觕言之耳明道二年范文正公自司諫來守是邦始築屋祠先生而為之記瀬之旁白雲源乃唐詩人方處士故廬文正公之遊釣臺也嘗絶江訪其遺蹟以其像寘祠之左文正公没郡人思之遂侑食於右坐焉歳祀浸逺此意弗嗣淳熈五年侍郎蕭公出鎮道祠下慨然曰國家稽用唐武徳舊典姓是州為嚴則先生之祠乃名教之首頽圮若是可乎顧急於民瘼未暇也居二年政成化洽以餘錢新之時某病廢卧旁郡公以書見諉記其成固辭不可乃復於公曰方王氏移國以光武之大志先生之髙氣相與共學夫豈區區呻吟佔畢之末哉漢官威儀既復薄海内外臣子之責皆塞矣亦何必奮臂其間哉没身丘壑固先生之素尚也帝睠焉有懐俾以形旁求於天下得非在廷諸臣奉令承教之不給未有當帝意者邪三聘而至車駕即日幸其館勉其相助為理所以處先生者不薄矣匪徒屈萬乘之重為故人之光寵也先生雖以巢由自命視一世若不足以凂之觀與侯霸尺牘劘切之意見於言外豈於帝惓惓未能忘邪浩然而歸使人主有終身瞻望不及之嘆施及後世賔友耆俊遂為家法士之聞風興起者堅節正操見危授命項背相望其有益人之國與朝夕獻納雲臺之下者未知其孰多孰少也枝必類本響必報聲使先生微有意於傲世立名一再傳之後且將為西晉之清虚矣而東京之俗乆而益勵名檢之外綜理幹畧亦往往髙出後世泝其流而尋其源則建武之髙節孰可訾邪至於節義之弊變為亢激特上無建用皇極之君均調消息之爾非造端者之過也後先生且千年文正公來主斯地祀典始舉曠百世而相感者固自不當遇邪今公作牧復大葺祠宇以續前人之緒繼自今以往泝江而上者欵門而心開升堂而容肅風清樾濯寒泉哦山髙水長之詩致足樂也則公豈専為一邦勸哉祠之前則羊裘軒其東則客星閣招隠堂岸江立表以識路繚山作亭以待憇或革或因面勢位置各有思致皆受成於公以非大指所存故不詳列主其役者司户叅軍吳桂刻嚴陵釣臺羅隠巖巖而髙者嚴子陵之釣臺也寥寥而不歸者光武之故人也故人之道睨蒼苔以言之尊莫尊於天子賤莫賤於布衣龍争蛇蟄兮風雨相遺干戈載靡兮悠人夢思何冨貴不易節而窮逹無所欺故得脫邯鄲之難破犀象之師造二百年之業繼三尺劒之基者其唯有始有卒者乎下之世風俗偷去禄位相尚朝為一旅人暮為九品官而親戚骨肉已有䓁差矣况故人乎嗚呼往者不可見来者未可期已而已而撫州顔魯公祠記南豐迂齋批議論正筆力髙簡而有法質而不佻贈司徒魯郡顔公諱真卿事唐為太子太師與其從父兄杲卿皆有大節以死至今雖小夫婦人皆知公之為烈也初公以忤楊國忠斥為平原太守䇿安禄山必反為之備禄山既舉兵公與常山太守杲卿伐其後賊之不能直闚潼關以公與杲卿撓其勢也有力在肅宗時数正言宰相不悦斥去之又為御史唐旻所構連輙斥李輔國遷太上皇居西宫公首率百官請問起居又輙斥代宗時與元載争論是非載欲有所壅蔽公極論之又輙斥都應在後楊炎盧杞既相徳宗益惡公所為連斥之看他連用許多斥字便見他布置猶不滿意李希烈䧟汝州杞即以公使希烈希烈初慙其言後卒縊公以死是時公年七十有五矣天寳之際乆不見兵禄山既反天下莫不震動公獨以區區平原遂折其鋒四方聞之争奮而起唐卒以振者公為之倡也有力當公之開土門同日歸公者七十郡得兵二十餘萬繇此觀之苟順且誠天下從之矣自此至公殁垂三十年小人繼續任政天下日入於弊大盗繼起天子輙出避之唐之在朝臣多畏怯觀望能居其間一忤於世失所而不自悔者寡矣至於再三忤於世失所不自悔者盖未有也若至於起且仆以至於七八應前面許多斥字遂死而不自悔者則天下一人而已若公是也接有力公之學問文章往往雜於神仙浮圖之説瑕瑜不相掩不皆合於理及其奮然自立能至於此者盖天性然也故公之能處其死不足以觀公之大何則及至於勢窮義有不得不死雖中人可勉焉况公之自信也歟惟歴忤大姦顛跌撼頓至於七八又應前而始終不以死生禍福為秋毫顧慮推本之論非篤於道者不能如此此足以觀公之大也夫世之治亂不同而士之去就亦異若伯夷之清伊尹之任孔子之時彼各有義夫既自比於古之任者矣乃欲睠顧回隠以市於世其可乎故孔子惡鄙夫不可以事君而多殺身以成仁者若公非孔子所謂仁者歟今天子嘉祐元年尚書都官郎中知撫州聶君某尚書屯田貟外郎通判撫州林君某相與慕公之烈以公之嘗為此邦也遂為堂而祠之既成二君過予之家而告之曰願有述夫公之赫赫不可盖者固不繫於祠之有無蓋人之嚮往之不足者非祠則無以致其至也聞其烈足以感人况拜其祠為親炙之者歟今州縣之政非法令所及者世不復議二君獨能追公之節尊而事之以風示當世為法令之所不及是可謂有志者也閬州新政縣顔魯公祠記唐庚迂齋批詞氣發動議論正大上元中顔魯公為蓬州長史過新政作離堆記四百餘言書而刻之石壁上字徑三寸雖崩壊剥落之餘而典刑具在使人見之凜然也元符三年余友疆叔來尹是邑始為公作祠於其側而求文以為記余謂仁之勝不仁乆矣議論好然有時乎不勝而反為所䧟者命也史臣論公晚節偃蹇為姦臣所擠見殞賊手是未必然先取彼之説而後伸己之説公孫丞相以仲舒相膠西梁冀以張綱守廣陵李逢吉以韓愈使鎮州而盧杞以公使希烈其用意正相類爾然於數君終不能有所傷而公獨不免於虎口由是觀之士之成敗存亡豈不有命邪而小人訢然自以為得計破此説好不亦繆乎且吾聞古之尚友者以友天下之善士為未足又尚論古之人誦其詩讀其書思見其人而不可得則方且欲招屈子於江濵起士會於九原盖其志所願則超然慕於數千載之後而况於公乎公之功名事業已絶於人而文字之妙又不可及因其心畫之所在而祠之與起頭数句相應此昔人尚友之意也嘗試與疆叔登離堆探石堂看他筆勢觀其遺跡而味其平生則公之精神風采猶或可以想見也夫古文集成巻十一
