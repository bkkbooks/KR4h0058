body:
  text: 古文集成巻六十五宋王霆震編前壬集四解獲麟解昌黎東萊批字少意多文字立節所以甚佳其抑揚開合只主祥字反覆作五叚説斆齋批自先秦雅訓之書不復作而學者溺於浮靡之習韓愈氏以古文起八代之衰至今天下師承之此無他盖其立意精嚴措辭簡古鋪叙繳結句法圓轉如走盤之珠後世雖有作者未易造其閫域且以獲麟解言之自首及末立為五叚抑揚開合皆以祥字為主字雖少而意則多反覆玩味使人一唱而三歎耳澹庵獲麟説已見説類全篇東萊批註麟之為靈昭昭也起得好先立此一句詠於詩承得上好周南麟之趾云云書於春秋哀十四年春西狩獲麟雜出於傳記百家之書公羊傳麟者仁獸也鶡冠子麟者盖元枵之精也廣雅麟者含仁懐義行步中規折旋中矩謂此類也雖婦人小子皆知其為祥也此見昭昭處然麟之為物難不畜於家不恒有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬造語蘇文樂論學此下句犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿作文大抵兩句短須一句長者承惟麟也序前意盡説不祥不可知不可知則其謂之不祥也亦宜雖然説祥麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰意髙百尺竿頭進一步麟之所以為麟者以德不以形若麟之出不待聖人則其謂之不祥也亦宜哉進學解昌黎本傳云公再為國子博士既才髙數黜官又下遷乃作進學解以自喻執政奇其才改比部郎中史館修撰時元和八年三月二十三日也斆齋云樊曰進學解出於東方朔客難揚雄解嘲而公過之又云孫樵曰韓吏部進學解玉川子月蝕詩莫不拔地倚天句句欲活讀之如赤手捕長蛇不施鞚勒騎生馬急不得暇莫不捉搦迂齋云設為師弟子詰難之辭以伸其已意機軸自揚雄解嘲班固賔戯來全篇迂齋批註國子先生晨入太學招諸生立館下誨之曰設為國子先生之辭業精于勤荒于嬉行成于思毁于隨方今聖賢相逢治具畢張拔去兇邪登崇俊良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光盖有幸而獲選幸字有含蓄孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑于列者曰設為弟子之辭先生欺余哉弟子事先生于兹有時矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其𤣥貪多務得細大不捐焚膏油以繼晷常矻矻以窮年一作兀兀先生之業可謂勤矣觝排異端攘斥佛老補苴罅漏張皇幽眇尋墜緒之茫茫獨旁搜而逺紹障百川而東之迴狂瀾於既倒先生之於儒可謂一有有字勞矣沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文趙作徳可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右其一作且一作具宜先生之於為一無為字人可謂成矣然而轉公不見信於人私不見助於友跋前㚄後動輒得咎暫為御史下字不苟遂一作逐竄南夷三年博士冗不見治平聲舊史三年博士作三為博士按公貞元壬午授四門博士元和丙戌為國子博士丁亥分教東都生壬辰自職方員外郎為國子博士凡四為博士矣此先言暫為御史繼言三為博士拜御史在癸未嵗自丙戌後三歴此官也若云三年則自元年夏赴召至四年春尚為博士首尾已四年矣玉川子有常州孟諫議座上聞韓員外貶國子五首云國學大頻頻謂此也命與仇謀取敗幾時冬暖而兒號寒年登而妻啼飢頭童齒豁竟死何禆不知慮此而反教人為先生曰吁設為之對子來前夫大木為杗音盲爾雅杗廇謂之梁屋大梁也細木為桷欂櫨音博蘆侏儒椳音隈户樞闑魚列切門閉爾雅在地謂之臬住即門橜也扂徒㸃切廣韻閉門也又音琰聲類扊又作扂關牡也楔音屑爾雅注門兩傍木各得其宜一作施以成室屋者匠氏之功也玉札丹砂赤箭青芝牛溲馬勃敗鼔之皮俱收並蓄待用無遺者醫師之良也登月日選公雜進巧拙紆餘為妍卓犖一作犖犖為傑校短量長惟器是適者宰相之方也歸之宰相昔者孟軻好辯孔道以明以孟荀相形轍環天下卒老于行荀卿守正一作宗王大論一作倫以興逃讒於楚廢死蘭陵史荀卿嫉濁世之政亡國亂君相屬鄙儒小拘如莊周等又滑稽亂俗於是推儒墨道徳之行事興懐序列著數萬言而卒因葬蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也含不盡之意今先生學雖勤而不繇其統言雖多而不要平聲其中文雖竒而不濟於用行雖修而不顯於衆猶且月費俸錢嵗靡平聲廩粟比之孟荀自謂是矣子不知耕婦不知織乘馬從徒安坐而食踵常途之役役一作促促窺陳編以盜竊然而聖主不加誅宰臣不見斥兹非一作非其幸歟動而得謗名亦隨之投閑置散乃分之宜若夫商財賄之有亡計班資之崇庳音卑忘量已一作已量之所稱去聲指前人之瑕疵是所謂詰匠氏之不以杙音弋莊子求狙猴之杙者斬之注杙橜為楹而訾醫師以昌陽引年欲進其狶苓也應前醫師匠氏之句楚人呼猪為狶狶苓乃猪苓也昌陽昌蒲以一寸九節乆服延年擇言解昌黎火洩於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣水發於深而為用且逺能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣言起於微而為用且博能不違於道可化可令可告可訓以推於生物及其縱而不慎反為禍矣火既我災有水而伏其焰能使不陷於灰燼矣水既我患有土而遏其流能使不仆於波濤矣言既我禍即無以掩其辭能不罹其失者亦鮮矣所以知理者又焉得不擇其言歟其為慎而甚於水火通解昌黎今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汨没以至於老死者相繼亦未見他人之稱其豈非害教賊名之術歟且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣故堯之前千萬年天下之人促促然不知其譲之為美也於是許由哀天下之愚且以争為能迺脱屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者况其小者焉一作乎下同故讓之教行於天下許由之為師也自桀之前千萬年天下之人循循然不知忠之易其死也故龍逢哀天下之不仁覩君父百姓入水火而不救於是進盡其言退就其割烹故後之臣竦然而言曰雖萬死猶有忠而不懼者况其小者焉故其忠之教行於天下由龍逢之為師也自周一作殷之前千萬年渾渾然不知義之可以換其生也故伯夷哀天下之偷且以彊則伏食其葛薇逃山而死於是後之人竦然而言曰雖餓死猶有彊一作死又作義而不懼者况其小者焉故義之教行於天下由伯夷之為師也是三人俱以一身立教而為師於一有百字千萬年間其身亡而其教存於扶持天地而功亦厚矣嚮令三師恥獨行慕通達則堯之日必曰得位而濟道安用讓為夏之日必曰長進而否退安用死為周之日必曰和光而同塵安用餓為若然者天下之人促促然而争循循然而佞渾渾然而偷其何懼而不為哉是則三師生於今必謂偏而不通者矣其可不謂之大賢人哉嗚呼今之人其慕通達之為弊也且古聖人言通者盖百行衆藝備於身通而行之者也今恒人之言通者盖百行衆藝闕於身而求合者也是則古之人言通者通於道義今之人言通者通於私曲其亦異矣將欲齊之者其由矜一作不由糞丸而擬質隋珠者乎且令今父兄教其子弟者曰爾當通於行如仲尼雖愚者亦知其不能耶曰爾尚力一行如古之賢雖中人亦希其能矣豈不由聖可慕而不可齊邪賢可及而可齊也今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或幾乎聖人今之人行不出乎中人而恥乎力一行為獨行且曰我周通同如聖人彼其欺心耶吾不知矣彼其欺人而賊名耶吾不知矣余懼其説之將深為通解文之章解韋籌垂日月所以為天也光盛而形物于地備禮樂所以成人也言成而著訓于簡非是而光者燭龍爟火亦光矣非是而言者狂童詖子亦言矣故定曰天文曰人文自文之于地之于簡者章也然而文在帝則簡在史是以堯文思章于典舜文明亦章于典文王性堯舜之文也文治于西伯章于詩易仲尼性堯舜文王之文而弗帝弗伯也盛章于禮樂經記回性仲尼之文也文不及章偃商學仲尼文而之于人也故樂章武城民而經章魏國君伋性其祖者也參以學而章于中庸軻性伋者也勤其道而章于七篇由偃至軻無有禮樂者乎是畢由人文而章者也未見不由而章者也人視影於地者仰而見爝火而不見日月必曰非天文之章也視辭章於簡者乆而見狂濫而不見禮樂則不曰非人之文章也浸有不自文而章諸國卿已降易曰觀乎人文以化成天下使章不自人文也天下孰觀而孰化仲尼不厯聘解盛均學者多稱仲尼歴聘不遇吾謂仲尼觀禮行道不歴聘不遇吾謂仲尼觀禮也夫二國交驩曰聘以臣使於君亦曰聘男輸財於女國駕帛於士皆曰聘故無財與無君國之命不曰聘也當徳蝕衰周道徂七國盖仲尼傷禮樂不起是以學韶於齊求師於周將欲鑄義以鏡國張仁以羅俗使明笥為宗資也且去魯適衛盖辭在於仕矣自宋之鄭殆非臣矣絶糧於陳蔡亦無財矣官至司冦果不為士安謂聘哉吾聞夫子觀夏道則之杞觀殷道則之宋較是而言雖他國可知也安謂歴聘哉工器解程晏匠刀者不必自用割匠弓者不必自用射善為器而已善割者不必善匠刀善射者不必善匠弓善用人之器而已庖丁豈自鍜而後操之耶由基豈自斵而後射之耶然則匠刀者不嫉庖丁之解匠弓者不嫉由基之中業已之為器而懼刃之不利𢎞之不勁也我器既利既勁稱彼之用是器得其所又何嫉哉蕭張為漢之器既利既勁矣不嫉漢祖之能刃我而解羽𢎞我而中羽天下是業已之為器也反是者所謂已匠刀不欲人之善割已匠弓不欲人之善射然則器安適乎范増之器也既利既勁矣鴻門之言不用羽非善割善射者終不能用其器也是器豈嫉人也哉痛器之失其所也是言也不足為儒者道用警乎貪民嫉上之臣也人旱解盛均涒灘嵗越垠曠旱塞諸陽遷市不雨祈山川庶神又不雨觴土龍舞巫覡愈不雨或言邦有術人能捕退龍而譟之昔嵗嘗然農剩其澤及召術人至而旱色如故太守怒亟命擒之術人遁去矣其遺囊有書一幅目曰人旱旱有三曰天旱國旱人旱曷為天旱蹇陽肆凶下土祗慎雖六七嵗黎人不飢曷為國旱君道熾災徳涸仁枯貪風暴氣蒸為時癘曷為人旱邦燬其政吏賊其行千里人心燥不為隂夫天旱求諸仁仁洽而時豐國旱求諸德德潤而澤流人旱求諸政政清而俗阜今貨遊於上利黷於下百姓焦愁結成狠暑所謂人旱者也邦守不清其政而逮龍貨雨是猶乘攆適海豢羊望翼於何可冀乎太守得書増怒是嵗自正月不雨至于五月明年殍死者數千人而太守亦以財禍古文集成巻六十五
