body:
  text: 古文集成卷七十二宋王霆震編前癸集三辭風雩亭辭南軒嶽麓書院之南有曽丘焉於登覽為曠建安劉公命作亭其上以為青襟遊息之地廣漢張栻名以風雩又繫以詞眷麓山之回隩有弦誦之一宫欎青林兮對起背絶壁之穹窿獨樵牧之往來委榛莽其蒙茸試芟夷而卻視翕衆境之來宗擢連姢之修竹森偃蹇之喬松山靡靡以旁圍谷窈窈而潛通翩兩翼兮前張擁千峯兮後從帶湘江兮浮渌矗逺岫兮橫空何地靈之久閟昉經始乎今公恍棟宇之宏開列闌楯之周重撫勝概以獨出信兹山之有逢豫揆名而諏義爰逺取於舞雩之風昔洙泗之諸子侍函丈以從容因聖師之有問各跽陳其所𠂻獨點也之操志與二三子兮不同方舍瑟而鏗然諒其樂之素充味所陳之紆餘夫何有於事功蓋不忘而不助亦何始而何終于鳶飛而魚躍實天理之中庸覺唐虞之遺烈儼洋洋乎目中惟夫子之所與豈虛言之是崇嗟學子兮念此遡千載以希蹤希蹤兮奈何盍務勉乎敬恭審操舍兮斯須凛戒懼兮冥濛防物變之外誘遏氣習之內訌寢私意之脫落自本心之昭融斯昔人之妙旨可實得於豫躬循點也之所造極顔氏之深工登斯亭而有感期用力於無窮濓溪辭并序山谷舂陵周茂叔人品甚髙胸中灑落如光風霽月好讀書雅意林壑初不為人窘束世故權輿仕籍不卑小官職思其憂論法常欲與民決訟得情而不喜其為小吏在江湖郡縣蓋十五年所至輒可傳任司理參軍轉運司以權利變其獄茂叔爭之不能得投告身欲去使者斂手聽之趙公閲道號稱好賢人有惡茂叔者趙公以使者臨之甚威茂叔處之超然其後乃悟曰周茂叔天下士也薦之於朝論之於士大夫終其身其為使者進退官吏得罪者自以不寃中歲乞身老於湓城有水發源於蓮花峯下潔清紺寒下合於湓江茂叔濯纓而樂之築屋於其上用其平生所安樂嫓水而成名曰濓溪與之遊者曰溪名术足以對茂叔之美雖然茂叔短於取名而惠於求志薄於徼福而厚於得民菲於奉身而燕及煢嫠陋於希世而尚友千古聞茂叔之餘風猶足以律貪則此溪之水配茂叔以永久所得多矣茂叔諱惇實避厚陵奉朝請名改惇頥二子壽燾皆好學承家求余作濓溪詩思味潛德茂叔雖仕宦三十年而平生之志終在丘壑故余詩詞不及世故猶髣佛其音塵溪毛秀兮水清可飯羮兮濯纓不漁民利兮又何有於名弦琴兮觴酒寫溪聲兮延五老以為壽蟬蛻塵埃兮玉雪自清聽潺湲兮鑒澄明激貪兮敦薄非青蘋白鷗兮誰與同樂津有舟兮蕩有蓮勝日兮與客就間人間拿音兮不知何處散髮醉髙荷為蓋兮倚芙蓉以當妓霜清水寒兮舟著平沙八方同宇兮雲月為家懷連城兮珮明月魚鳥親人兮野老同社而爭席白雲蒙頭兮與南山為伍非夫人攘臂兮誰余敢侮遊濓溪辭并序鄒敷道州城西十五里有村曰濓溪保蓋周茂叔先生之居也先生宦遊過九江愛廬阜不能歸故以濓溪榜書堂示不忘本山谷一世洽聞者也而曰有水發源於廬阜蓮花峯下茂叔樂之用其平生所安樂嫓水而成名曰濓而近世大夫又謂本名亷溪先生子求詩於山谷避其叔父諱遂加以水且曰亷與濓義殊而音睽不應嫓水以明其亷其説具載九江學宫先生祠堂記以敷觀之俱失也敷糜粟道州考濓溪頗詳因暇日遊焉訪先生之遺迹且悼世人之惑也敢述以辭度營川之修梁兮遡其瀕而走西路平原之瀰沱兮容飛蓋而並馳行將半於一舍兮折而涉于荒蹊漸林開而阜斷兮隱約聞乎犬雞亟引鞭而前望兮萃或瓦而或茨逢翁問之奚所兮翁告豫以濓溪閲民氏而皆周兮本其系之為誰伊茂叔之故家兮自鼻祖而占兹後昆出於兵燼兮逢掖淪於牛衣諏先生之所復兮已乎莫之知也從先生其已逺兮曷慰乎我之悲也雲山矗而崇崇兮豈絶塵之姿也泉石激而泠泠兮抑弦誦之遺乎百卉秀而不枯兮豈道德之輝乎少長羣而不囂兮抑微俗之未衰乎倣徨乎奚忍偭而去之途日暮兮既去而猶遲遲幸頽垣與敗級兮存故基而未夷還可耕者數畝兮昔帶經之所治森一丘之梧檟兮亦夙喪之所規蓋求其他而弗得兮尚矚此而庶幾惟先生之蚤嵗兮逢彼百罹奉親學於渭陽兮仕謀歸而願違故湓江之所築兮志此溪於門楣何山谷之不審兮指蓮峯而實之病後之人迷益逺兮曰亷與濓義殊而音睽妄取濓而增水兮由媚客而請詩嘻其本之不覿兮冝所言之皆非吾聞南公之語此兮云權輿於唐之時元結之刺道兮事率愛竒以􅪙涍與淔汸兮賁七泉而為題道之人祖結之故智兮溪得名之是依曰義殊而非類兮爾奚􅪙涍之不疑曰音睽而無取兮淔與直亦參差而不齊故濓者以德而嫓水兮逺矣昔人之所貽先生之桑梓兮他寓而是思何以療世之惑兮寄針砭於此辭古文集成卷七十二
