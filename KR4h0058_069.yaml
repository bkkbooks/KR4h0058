body:
  text: 古文集成巻六十九宋王霆震編前壬集八原原化皮日休斆齋批原者所自始也此篇推原聖化之所自出而闢佛教之亂中國引孟子距楊墨韓公闢佛老二事證或曰設問起聖人之化出於三皇推原聖化成於五帝定於周孔其質也道徳仁義其文也詩書禮樂此萬代王者未有易是而能理者也至于東漢西域之教始流中夏佛教興其民也舉族生敬盡財施濟子去其父佛教之興夫亡其妻蚩蚩嚚嚚慕其風蹈其梱者若百川蕩滉不可止者何哉所謂聖人之化者不曰化民乎今知化者唯西域氏而已矣西域氏即佛也後漢顯宗迎佛骨於西域國此佛入中國之始有言聖人之化者則比戸以為嗤豈聖人之化不及於西域氏邪何其戾也辨如是曰天未厭亂不世世生聖人其道也存乎言其教也順乎道彼廢其言悖其教者即戾矣古者楊墨塞路孟子辭而闢之廓如也引孟子證故有周孔必有楊墨要在有孟子而已矣今西域之教岳其基而溟其源亂於楊墨也甚矣如是為士則孰有孟子哉千世而後獨有一昌黎先生引韓公證露臂瞋視詬於千百人内其言雖行其道不勝苟軒裳之士世世有昌黎先生則吾以為孟子矣譬天下之民皆桀民也苟有一堯民處之説透病源一堯民之善豈能化天下桀民之惡哉則有心於道者乃堯民矣嗚呼今之士率邪以禦衆握亂以治天下其賢尚爾責當世求不肖者反化之不曰難哉不曰難哉原過王安石全篇依斆齋批㸃天有過乎有之陵歴鬭蝕是也取天地設喻起地有過乎有之崩弛竭塞是也天地舉有過卒不累覆且載者何救前二説問善復常也答人介乎天地之間則固不能無過言人有過卒不害聖且賢者何復救前説問亦善復常也答故太甲思庸引證太甲上孔子曰勿憚改過學而揚雄貴遷善學行篇皆是術也予之朋有過而能悔謂過而能改悔而能改人則曰是向之從事云爾今從事與向之從事弗類非其性也飾表以疑世也夫豈知言哉天播五行於萬靈人固備而有之推尊人性有而不思則失思而不行則廢一日咎前之非沛然思而行之是失而復得廢而復舉也顧曰非其性反説人上是率天下而戕性也且如設言人有財見簒於盜已而得之曰非夫人之財向簒於盜矣可歟不可也財之在已固不若性之為己有也財失復得曰非其財且不可性失復得曰非其性可乎説透本原法原淇水迂齋批以警䇿語易陳言以傑特句發新意所謂化臭腐為神竒者法者何也聖人所以齊天下之動至公大定之制也其原出於道徳禮義而其用散於號令賞罰凡有天下之君未嘗有無法而久者也昏世嘗有無法之君矣奈何乎人之多欲而趨闕市人之多欲而無法以闕有臂者攘有足者闕而奪其資智者給愚者而兼其聲色耳目之奉紛紛籍籍其去禽獸者間不容一毫故聖人為之法使天下强弱小大貴賤逺近莫敢不一於法焉由法者安不由法者危由法者得其所欲而生不由法者失其所欲而死如是故法立法立而天下之心定天下之心定而治道畢矣法為貴君位次之學孟子法壞則民亡民亡則君如之何其尊且安也故人主尊法懼法之不立也故以身先之懼天下之慢法而法壞也故一舉事而不敢忘法賞罰以法號令以法取予以法廢置以法殺生以法動静以法視法如神物而不敢侮如天墜地設不敢輒破壞改易也不以一事小害而損法不以一時苟利而増法使天下無有不由法而自為者故智者不得越法而謀辯者不得越法而議士不得背法而有名臣不得背法而有功我喜可抑我忿可窒而法不可離骨肉可刑親愛可滅而法不可屈也故雖成王之叔不得流言而亂政大綱不過是行法不私於貴近意思只是無人如此髙祖之父不得屈君臣之儀文帝元帝之子不得越王門絶馳道光武之姊不得保臧獲姦使吏民無人如此形容愛若孝王句法與上文又别要一緊字移在上嬖若韓鄧功若陳湯馮奉世義若郭解不免於有司之議而天下不敢私恐其開亂法之原而後争以為比也故明王之法左者不為右右者不為左上不奪下職下不侵上事為廷尉者不以才有餘而道禮樂尤好為太常者不以官優寡事而言刑法尤好用字不可移易士者不為工商賈人不為士也今夫大匠之起巨室彈畫一定木之曲直小大長短必皆就吾繩墨規矩焉其差參不齊齟齬不合則斤削燎括而已矣若毁吾彈畫而從木之情則工勞而事拙紛擾而不可理矣故聖王立法賢王守法立法者使法必出於道德禮義而後布之天下以為法守法者使賞罰號令必出於法而後以為賞罰號令法不出於道徳禮義者闕法非法者未乆而還賞罰號令不出於法闕非政者法壊而天下不從故法一則威法二則疑法固則君尊法揺則君削法行則要而治多法不行則煩漫而無功今夫一人之寡居深戸之中傳盈尺之紙而風驅霆行好殺生廢置人於千里之外提癯夫羸老僅勝衣冠之人付之寸印好而坐諸帷幄進退萬夫若羊彘然童子據奥室羣湖海之珍怪文字交錯處佳處女嬰珠玉而立乎衢塗烏獲戾目而不敢動以法在也故天下視法如藩籬守法如疆界彊者以攣縮弱者以安全至哉法乎人君之衛天下用字工所恃而生也闇王則不然不能以法制勝私欲不知己亦待法而後安即是趙奢之説故從欲而慢法其意若曰法者我之可自出也何有於法哉暱乎所愛則無勞而封爵有罪而不誅或利害僅如毛芥而輒變大法名分不立百職相侵日革月易人不知所循下皆知法之易撓而可踰也則險庸譎詭者舞其私意以動法倖諛便僻者倚上之恩以貨法悍暴傑健者奮其亂力以干法如是故法亡法亡而民亡民亡而國亡矣如藩籬然臧獲者超履穿穴而主人弗禁安能使盜之不窺而保其室中之所有也如封界障隧然其羊童牛牧已嘗有踐之徑之之迹矣董安于有此意安能制衆人之不來而全其果蔬稼穡也或曰法之説無乃膠固滯事而失於圓通狥物之道歟曰不然法者天下之公也千世之守也大道也通者人臣之私也一時之偷便也短術也法同而治異者吏不能舉法也吏之罪也法不可輕立亦不可屢變也立法之主必若禹湯文武漢祖唐宗者也議法之臣必若臯陶伊尹周召蕭張房杜者也晁錯且尚弗克况庸人乎臣切觀今之世朝廷或弛祖宗之法羣下或慢朝廷之法大臣或率胷臆而輕法庸士或作衆辯而侮法為牧伯者或擊斷於法外以為能臣恐綱紀制度縁是而亡故作法原勢原李清臣迂齋批能道他人説不出底意思文字傷於刻削太深些子君之所以安危國之所以存亡治亂令之所以行不行勢也不善知勢不能為創業之君不知勢之可畏而失其所以審度將順不可以為持成之君經世之臣故善用國者勢而已矣理勢循則行仵則變動則險止則平輕能重緩能速故物有至小而力不可勝既事有至易而功不可勝原發如毫芒針端而巨若丘阜本在拱把而逺際窮髮者勢也如戸之運也如車之馳也如弓之圓也如矢之激也如衡以一權而舉數倍之重也水之注於卑澤也原火之燎於風中也兵之奮寡而走衆也人之乘髙而制下也勢也豈惟萬物為然今夫一人而勝天下之大制天下之衆兼聴天下之廣沛焉有餘非勢而何如也故明者用勢闇者用於勢明者提至要之處持其關紐制其樞機動静在我開闔在我弛張在我一教一令一賞一罰必輔之以形勢故教之而行者易令之而從者速賞一而千萬人勸罰一而千萬人懼仁少而悦者多義近而服者逺無他理勢為之也教令賞罰仁義而無形勢之輔必且人人而治之矣人人而治之教之行也必艱令之出也必煩天下之善有餘而賞不足天下之惡有餘而罰不足天下之民無窮而仁義不足無他理勢不先也夫千世之君可僂指而數之矣或善或惡或仁或義其間差不能銖寸而功名輒相倍蓰禍福輒相百萬者無他形勢之異使然也成湯祝獸網而歸者三十六國文王葬枯骨而天下三分有其二千世之君徳有大於此者矣而湯文用此收天下之助其從民情而集天下之勢也方形勢之在桀紂夏臺之囚羑里之獄如拘匹夫及善惡之暴也形勢之變而遷也如林之師而莫敢射車中之木主無人道得出故天下之勢安則闕則安難當其安也垂紳端委闕拱於堂奥戸牖之内闕上尊明如天日閎隠如闕霆煦煦如雨露肅肅如闕而天下莫不趨走鞭笞海外之蠻夷若制童妾雖有劉項之魁雄曹馬之姦桀必且老死民籍至不敢唱及乎昬孺為之也席先王之位傳先王之民朝有遺老故舊事有綱目軌度先王之澤未涸天下之勢未運自視其安也以為無有危事也任一喜怒從一嗜慾矣而患未切己也以為可為而無傷也習知天下之尊服已也以為人終莫敢蹙路馬之芻觸囿兔之毛也簸頓關紐嬉弄機樞動静不以時開闔不以法張弛不以節滛樂在宫中而怨毒滿天下略易在一朝而禍患遺千日民心之他屬也君柄之旁落也勢之翻然而離也雖欲安之不可能也竊譬之山之髙厚也萬夫不能墮壊也朽壤生乎中巋石震乎上及其傾也人力不能枝拄而維持也非天事也勢也故前聖創業起今之利變昔之害所以治天下之具甚備憂天下之慮甚深綴民心而乆天下之勢堅完固密為不可拔及其久未嘗無罅缺蠧漏也然而其剥也亦有漸矣在後時節其勢而繕之耳汰則約之危則平之擾則静之微則養之弱則扶之急則縱之緩則持之塞則導之使萬事之理百物之節皆不至於窮極而大變則勢久而長無危亡之形矣故勢之在我也我蓄積之固執之審則發弗便則居故勢為我使而天下莫能逆也若一失其要則横肆奔悍於外不可復之雖有天下一旦驅擠排壓而仆矣臣故曰如戸之運也如車之馳也如弓之圓也如矢之激也如一權而舉數倍之重也如水之注於卑澤也如原火之燎於風中也如兵之奮寡而走衆也如人之乘髙而制下也其動不可不謹也人主知勢則處治如將亂處存如將亡處安如將危而亂與危亡亦且不至臣故作勢原古文集成巻六十九
